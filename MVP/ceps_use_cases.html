<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Use Cases — CEPS AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --surface:      #ffffff;
      --surface2:     #f6f8fa;
      --border:       #d0d7de;
      --border2:      #e8eaed;
      --text:         #1f2328;
      --muted:        #636c76;
      --accent:       #0969da;
      --accent-dim:   #ddf4ff;
      --accent-border:#54aeff;
      --green:        #1a7f37;
      --green-dim:    #dafbe1;
      --red:          #d1242f;
      --yellow:       #9a6700;
      --yellow-dim:   #fff8c5;
      --yellow-border:#d4a72c;
      --radius:       8px;
    }

    [data-theme="dark"] {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2128;
      --border:       #30363d;
      --border2:      #2d333b;
      --text:         #e6edf3;
      --muted:        #8b949e;
      --accent:       #58a6ff;
      --accent-dim:   #1f3a5f;
      --accent-border:#388bfd;
      --green:        #3fb950;
      --green-dim:    #0d2818;
      --red:          #f85149;
      --yellow:       #d29922;
      --yellow-dim:   #2b2006;
      --yellow-border:#9e6a03;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 20;
      gap: 1rem;
    }

    .logo {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: .5rem;
      white-space: nowrap;
      text-decoration: none;
    }

    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .header-right { display: flex; align-items: center; gap: .6rem; }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: .65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .83rem;
      padding: .4rem .7rem .4rem 2rem;
      width: 220px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }

    #search:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(9,105,218,.12); }
    #search::placeholder { color: var(--muted); }

    .add-btn {
      font-size: .8rem;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: .4rem .9rem;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }

    .add-btn:hover { background: var(--bg); border-color: var(--accent-border); }
    .add-btn.active { background: var(--accent-dim); border-color: var(--accent-border); }

    .settings-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: .38rem .5rem;
      display: flex;
      align-items: center;
      transition: color .15s, border-color .15s;
    }

    .settings-btn:hover { color: var(--text); border-color: #6e7781; }
    .settings-btn.configured { color: var(--green); border-color: #82cfaa; }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease;
    }

    .panel.open { max-height: 600px; }

    .panel-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-title {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Form elements ── */
    label {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      font-size: .8rem;
      color: var(--muted);
      font-weight: 500;
    }

    input[type="text"], input[type="url"], input[type="password"], textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      padding: .5rem .75rem;
      width: 100%;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(9,105,218,.12);
    }

    textarea { resize: vertical; min-height: 70px; }

    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .9rem;
      border-radius: 6px;
      font-size: .82rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: #1f883d; color: #fff; border-color: rgba(31,35,40,.15); }
    .btn-primary:hover:not(:disabled)  { background: #1a7f37; }
    .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg); }

    .btn-row { display: flex; align-items: center; gap: .6rem; }

    .token-notice {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .6rem .9rem;
      border-radius: 6px;
      font-size: .82rem;
    }

    .token-notice.missing {
      background: var(--yellow-dim);
      border: 1px solid var(--yellow-border);
      color: var(--yellow);
    }

    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: .38rem .5rem;
      display: flex;
      align-items: center;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }

    .theme-btn:hover { color: var(--text); border-color: #6e7781; }

    .token-notice.ok {
      background: var(--green-dim);
      border: 1px solid #82cfaa;
      color: var(--green);
    }

    .token-notice-btn {
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      padding: .2rem .6rem;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .12s;
    }

    .token-notice-btn:hover { background: var(--accent-dim); }

    .toast {
      font-size: .8rem;
      padding: .35rem .7rem;
      border-radius: 5px;
      display: none;
    }

    .toast.success { background: var(--green-dim); color: var(--green); border: 1px solid #82cfaa; display: inline-block; }
    .toast.error   { background: #ffebe9; color: var(--red); border: 1px solid #ffcecb; display: inline-block; }

    /* ── Filters ── */
    .filters {
      background: var(--surface);
      padding: .75rem 2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .filters-label {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 500;
    }

    .chip {
      font-size: .75rem;
      font-weight: 500;
      padding: .22rem .65rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
      font-family: inherit;
    }

    .chip:hover { background: var(--bg); color: var(--text); border-color: #6e7781; }
    .chip.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }

    /* ── Count bar ── */
    .count-bar {
      padding: .5rem 2rem;
      font-size: .75rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border2);
      background: var(--bg);
    }

    /* ── List ── */
    .list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* ── Use case row ── */
    .uc-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }

    .uc-row:hover {
      border-color: #6e7781;
      box-shadow: 0 1px 5px rgba(31,35,40,.08);
    }

    .uc-cell {
      padding: 1.1rem 1.25rem;
      border-right: 1px solid var(--border);
    }

    .uc-cell:last-child { border-right: none; }

    .uc-cell-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    .uc-problem .uc-cell-label  { color: var(--yellow); }
    .uc-solution .uc-cell-label { color: var(--green); }

    .uc-cell-text {
      font-size: .85rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* Right column */
    .uc-meta {
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: .75rem;
      min-width: 220px;
      max-width: 270px;
    }

    .uc-skills { display: flex; flex-direction: column; gap: .4rem; }

    .uc-skills-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Skill tag row: tag + download/repo button */
    .skill-row {
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .skill-tag {
      font-size: .78rem;
      font-weight: 600;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      padding: .2rem .55rem;
      border-radius: 5px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      white-space: nowrap;
    }

    .skill-action {
      display: inline-flex;
      align-items: center;
      gap: .2rem;
      font-size: .7rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: .18rem .45rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      font-family: inherit;
      transition: color .12s, border-color .12s, background .12s;
      white-space: nowrap;
    }

    .skill-action:hover {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    /* Footer */
    .uc-footer {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .uc-author { font-size: .72rem; color: #8c959f; }

    .uc-link {
      font-size: .75rem;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .2rem;
    }

    .uc-link:hover { text-decoration: underline; }

    /* ── Empty ── */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 4rem 0;
      font-size: .9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .uc-row { grid-template-columns: 1fr; }
      .uc-cell { border-right: none; border-bottom: 1px solid var(--border); }
      .uc-meta { max-width: 100%; flex-direction: row; flex-wrap: wrap; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      #search { width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="ceps_tool_gallery.html">
    <span class="logo-dot"></span>
    CEPS AI — Use Cases
  </a>
  <div class="header-right">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
      </svg>
      <input type="text" id="search" placeholder="Search use cases…">
    </div>
    <button class="add-btn" id="add-toggle">+ Add use case</button>
    <button class="theme-btn" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>
      <svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>

      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>

      </svg>
    </button>
  </div>
</header>

<!-- ── Settings panel ── -->
<div class="panel" id="settings-panel">
  <div class="panel-inner">
    <div class="panel-title">GitHub Configuration</div>
    <div class="form-row-3">
      <label>Repository
        <input type="text" id="cfg-repo" value="cepsai/cepsai.github.io" placeholder="owner/repo">
      </label>
      <label>
        Personal Access Token
        <a href="https://github.com/settings/tokens/new?scopes=contents&description=use-cases-cms" target="_blank" rel="noopener" style="color:var(--accent);font-weight:400;font-size:.75rem">(create one)</a>
        <input type="password" id="cfg-token" placeholder="ghp_…" autocomplete="off">
      </label>
      <label style="justify-content:flex-end">
        <div style="height:1.45rem"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="save-cfg-btn">Save</button>
          <span id="cfg-toast" class="toast"></span>
        </div>
      </label>
    </div>
    <div style="font-size:.73rem;color:var(--muted)">Token stored in your browser only — never sent to any third party.</div>
  </div>
</div>

<!-- ── Add use case panel ── -->
<div class="panel" id="add-panel">
  <div class="panel-inner">
    <div class="panel-title">Add a Use Case</div>
    <div id="token-notice" class="token-notice" style="display:none"></div>
    <div class="form-row">
      <label>Problem — what challenge needed solving?
        <textarea id="uc-problem" placeholder="Describe the problem…"></textarea>
      </label>
      <label>Solution — what approach was used?
        <textarea id="uc-solution" placeholder="Describe the solution…"></textarea>
      </label>
    </div>
    <div class="form-row">
      <label>Claude Skills (comma-separated)
        <input type="text" id="uc-skills" placeholder="e.g. /result-evaluator, /vm-job">
      </label>
      <label>Tool URL (optional)
        <input type="url" id="uc-url" placeholder="https://…">
      </label>
    </div>
    <div class="form-row">
      <label>Your name / team
        <input type="text" id="uc-author" placeholder="e.g. CEPS AI Team">
      </label>
      <div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="submit-btn">Submit use case</button>
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <span id="submit-toast" class="toast"></span>
    </div>
  </div>
</div>

<!-- ── Filters ── -->
<div class="filters" id="filters">
  <span class="filters-label">Filter:</span>
  <button class="chip active" data-skill="all">All</button>
</div>

<div class="count-bar" id="count-bar"></div>

<div class="list" id="list">
  <div class="empty">Loading use cases…</div>
</div>

<script>
  let allCases    = [];
  let cachedSha   = null;
  let activeSkill = 'all';
  let searchQuery = '';

  // ── Config ────────────────────────────────────────────────────────────────
  function getConfig() {
    return {
      repo:  document.getElementById('cfg-repo').value.trim(),
      token: document.getElementById('cfg-token').value.trim()
    };
  }

  function loadStoredConfig() {
    const repo  = localStorage.getItem('uc_repo');
    const token = localStorage.getItem('uc_token');
    if (repo)  document.getElementById('cfg-repo').value  = repo;
    if (token) {
      document.getElementById('cfg-token').value = token;
      document.getElementById('settings-toggle').classList.add('configured');
    }
  }

  function toast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `toast ${type}`;
    if (type !== 'info') setTimeout(() => { el.className = 'toast'; }, 4000);
  }

  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + Date.now().toString(36);
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── GitHub API ─────────────────────────────────────────────────────────────
  async function ghGetFile(repo, token, path) {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    return res.json();
  }

  async function ghPutFile(repo, token, path, content, sha, message) {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        Authorization:  `token ${token}`,
        'Content-Type': 'application/json',
        Accept:         'application/vnd.github.v3+json'
      },
      body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha })
    });
    if (!res.ok) throw new Error(`GitHub ${res.status}: ${await res.text()}`);
    return res.json();
  }

  // ── Load ───────────────────────────────────────────────────────────────────
  async function loadCases() {
    try {
      const res = await fetch('use_cases.json?_=' + Date.now());
      if (!res.ok) throw new Error('Failed to fetch use_cases.json');
      allCases = await res.json();
      buildFilters();
      render();
    } catch (e) {
      document.getElementById('list').innerHTML = `<div class="empty">Could not load use cases: ${e.message}</div>`;
    }
  }

  // ── Filters ────────────────────────────────────────────────────────────────
  function buildFilters() {
    const skillSet = new Set();
    allCases.forEach(uc => (uc.skills || []).forEach(s => skillSet.add(s)));
    const container = document.getElementById('filters');
    container.querySelectorAll('[data-skill]:not([data-skill="all"])').forEach(el => el.remove());
    [...skillSet].sort().forEach(skill => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.skill = skill;
      btn.textContent = skill;
      container.appendChild(btn);
    });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const q = searchQuery.toLowerCase();
    const filtered = allCases.filter(uc => {
      const matchesSkill  = activeSkill === 'all' || (uc.skills || []).includes(activeSkill);
      const matchesSearch = !q ||
        uc.problem.toLowerCase().includes(q) ||
        uc.solution.toLowerCase().includes(q) ||
        (uc.skills || []).join(' ').toLowerCase().includes(q);
      return matchesSkill && matchesSearch;
    });

    document.getElementById('count-bar').textContent =
      `${filtered.length} of ${allCases.length} use case${allCases.length !== 1 ? 's' : ''}`;

    const list = document.getElementById('list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty">No use cases match your search.</div>';
      return;
    }
    list.innerHTML = '';
    filtered.forEach(uc => list.appendChild(buildRow(uc)));
  }

  function buildRow(uc) {
    const row = document.createElement('div');
    row.className = 'uc-row';

    // Problem
    const prob = document.createElement('div');
    prob.className = 'uc-cell uc-problem';
    prob.innerHTML = `<div class="uc-cell-label">Problem</div><div class="uc-cell-text">${escapeHtml(uc.problem)}</div>`;

    // Solution
    const sol = document.createElement('div');
    sol.className = 'uc-cell uc-solution';
    sol.innerHTML = `<div class="uc-cell-label">Solution</div><div class="uc-cell-text">${escapeHtml(uc.solution)}</div>`;

    // Meta
    const meta = document.createElement('div');
    meta.className = 'uc-meta';

    // Skills + download/repo buttons
    const skillsWrap = document.createElement('div');
    skillsWrap.className = 'uc-skills';

    if ((uc.skills || []).length) {
      const lbl = document.createElement('div');
      lbl.className = 'uc-skills-label';
      lbl.textContent = 'Claude Skill';
      skillsWrap.appendChild(lbl);
    }

    (uc.skills || []).forEach(s => {
      const skillRow = document.createElement('div');
      skillRow.className = 'skill-row';

      const tag = document.createElement('span');
      tag.className = 'skill-tag';
      tag.textContent = s;
      skillRow.appendChild(tag);

      if (uc.skill_download) {
        const dl = document.createElement('a');
        dl.className = 'skill-action';
        dl.href = uc.skill_download;
        dl.download = '';
        dl.title = 'Download skill file';
        dl.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.779a.749.749 0 1 1 1.06-1.06l1.97 1.97Z"/></svg> Download`;
        skillRow.appendChild(dl);
      } else if (uc.skill_repo) {
        const link = document.createElement('a');
        link.className = 'skill-action';
        link.href = uc.skill_repo;
        link.target = '_blank';
        link.rel = 'noopener';
        link.title = 'View on GitHub';
        link.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg> GitHub`;
        skillRow.appendChild(link);
      }

      skillsWrap.appendChild(skillRow);
    });

    meta.appendChild(skillsWrap);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'uc-footer';

    if (uc.author) {
      const author = document.createElement('span');
      author.className = 'uc-author';
      author.textContent = uc.author + (uc.date ? ' · ' + formatDate(uc.date) : '');
      footer.appendChild(author);
    }

    if (uc.tool_url) {
      const link = document.createElement('a');
      link.className = 'uc-link';
      link.href = uc.tool_url;
      link.target = '_blank';
      link.rel = 'noopener';
      link.innerHTML = `View tool <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M3.5 3a.5.5 0 0 0 0 1H7.29L3.14 8.14a.5.5 0 1 0 .71.71L8 4.71V8.5a.5.5 0 0 0 1 0v-5a.5.5 0 0 0-.5-.5h-5z"/></svg>`;
      footer.appendChild(link);
    }

    meta.appendChild(footer);
    row.appendChild(prob);
    row.appendChild(sol);
    row.appendChild(meta);
    return row;
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitCase() {
    const { repo, token } = getConfig();
    if (!token) { toast('submit-toast', 'Configure GitHub token first (⚙)', 'error'); return; }

    const problem   = document.getElementById('uc-problem').value.trim();
    const solution  = document.getElementById('uc-solution').value.trim();
    const skillsRaw = document.getElementById('uc-skills').value.trim();
    const url       = document.getElementById('uc-url').value.trim();
    const author    = document.getElementById('uc-author').value.trim();

    if (!problem || !solution) { toast('submit-toast', 'Problem and solution are required', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const file = await ghGetFile(repo, token, 'MVP/use_cases.json');
      cachedSha = file.sha;
      const current = JSON.parse(atob(file.content.replace(/\n/g, '')));

      const newCase = {
        id:       slugify(problem.slice(0, 40)),
        problem,
        solution,
        skills:   skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
        ...(url    ? { tool_url: url }    : {}),
        ...(author ? { author }           : {}),
        date:     new Date().toISOString().slice(0, 10)
      };

      current.push(newCase);

      await ghPutFile(
        repo, token,
        'MVP/use_cases.json',
        JSON.stringify(current, null, 2),
        cachedSha,
        `Add use case: ${problem.slice(0, 60)}`
      );

      toast('submit-toast', 'Submitted! Reloading…', 'success');
      ['uc-problem','uc-solution','uc-skills','uc-url','uc-author'].forEach(id => {
        document.getElementById(id).value = '';
      });
      setTimeout(async () => {
        await loadCases();
        document.getElementById('add-panel').classList.remove('open');
        document.getElementById('add-toggle').classList.remove('active');
      }, 1500);
    } catch (e) {
      toast('submit-toast', `Error: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit use case';
    }
  }

  // ── Token notice ───────────────────────────────────────────────────────────
  function updateTokenNotice() {
    const notice = document.getElementById('token-notice');
    const token  = localStorage.getItem('uc_token');
    if (token) {
      notice.className = 'token-notice ok';
      notice.style.display = 'flex';
      notice.innerHTML = `<span>✓ GitHub token configured — ready to submit.</span>`;
    } else {
      notice.className = 'token-notice missing';
      notice.style.display = 'flex';
      notice.innerHTML = `<span>GitHub token required to submit. Set it up first.</span>
        <button class="token-notice-btn" id="notice-cfg-btn">⚙ Configure token</button>`;
      document.getElementById('notice-cfg-btn').addEventListener('click', () => {
        togglePanel('settings-panel', document.getElementById('settings-toggle'));
      });
    }
  }

  // ── Panel helpers ──────────────────────────────────────────────────────────
  function togglePanel(id, triggerBtn) {
    const panel  = document.getElementById(id);
    const isOpen = panel.classList.contains('open');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.add-btn, .settings-btn').forEach(b => b.classList.remove('active'));
    if (!isOpen) {
      panel.classList.add('open');
      if (triggerBtn) triggerBtn.classList.add('active');
    }
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  document.getElementById('add-toggle').addEventListener('click', function() {
    togglePanel('add-panel', this);
    updateTokenNotice();
  });

  document.getElementById('settings-toggle').addEventListener('click', function() {
    togglePanel('settings-panel', this);
  });

  document.getElementById('cancel-btn').addEventListener('click', () => {
    document.getElementById('add-panel').classList.remove('open');
    document.getElementById('add-toggle').classList.remove('active');
  });

  document.getElementById('save-cfg-btn').addEventListener('click', () => {
    const { repo, token } = getConfig();
    if (!repo || !token) { toast('cfg-toast', 'Both fields required', 'error'); return; }
    localStorage.setItem('uc_repo', repo);
    localStorage.setItem('uc_token', token);
    document.getElementById('settings-toggle').classList.add('configured');
    toast('cfg-toast', 'Saved', 'success');
    updateTokenNotice();
    document.getElementById('settings-panel').classList.remove('open');
    document.getElementById('settings-toggle').classList.remove('active');
  });

  document.getElementById('submit-btn').addEventListener('click', submitCase);

  document.getElementById('filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeSkill = chip.dataset.skill;
    render();
  });

  document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    render();
  });

  // ── Theme ──────────────────────────────────────────────────────────────────
  function applyTheme(dark) {
    document.documentElement.dataset.theme = dark ? 'dark' : '';
    document.getElementById('theme-icon-moon').style.display = dark ? 'none'  : '';
    document.getElementById('theme-icon-sun').style.display  = dark ? ''      : 'none';
  }

  applyTheme(localStorage.getItem('uc_theme') === 'dark');

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.dataset.theme === 'dark';
    applyTheme(!isDark);
    localStorage.setItem('uc_theme', !isDark ? 'dark' : 'light');
  });

  loadStoredConfig();
  loadCases();
</script>
</body>
</html>
