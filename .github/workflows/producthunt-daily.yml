name: Product Hunt — daily refresh

on:
  schedule:
    # 08:00 UTC = 09:00 Brussels (winter) / 10:00 Brussels (summer).
    # Product Hunt's day flips at 00:01 PT, so by 08:00 UTC the prior day is final.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: producthunt-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Product Hunt feed
        env:
          PH_API_TOKEN: ${{ secrets.PH_API_TOKEN }}
        run: python3 producthunt-tracker/scripts/fetch.py

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add producthunt-tracker/data/history.json producthunt-tracker/docs/data.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "Product Hunt: daily refresh $(date -u +%Y-%m-%d)"
          git push
