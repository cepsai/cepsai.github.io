<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Machine Learning Hardware — by country of origin</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #fafbfc;
    --ink: #1a2540;
    --muted: #6b7280;
    --grid: #e5e7eb;
    --us: #2563eb;
    --us-fill: rgba(37,99,235,0.55);
    --cn: #dc2626;
    --cn-fill: rgba(220,38,38,0.55);
    --other: #6b7280;
    --other-fill: rgba(107,114,128,0.45);
    --trend: #94a3b8;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
  }
  .wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 28px 48px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .count {
    font-size: 12px;
    color: var(--muted);
  }
  #chart {
    width: 100%;
    background: white;
    border: 1px solid var(--grid);
    border-radius: 8px;
    padding: 8px 12px 4px 12px;
    box-sizing: border-box;
  }
  .tick text { font-size: 11px; fill: #4b5563; }
  .tick line { stroke: var(--grid); }
  .axis-label { font-size: 12px; fill: #374151; font-weight: 500; }
  .grid line { stroke: var(--grid); stroke-dasharray: 2,2; }
  .grid path { stroke: none; }
  .dot { cursor: pointer; transition: r 0.15s; }
  .dot:hover { stroke: #111; stroke-width: 1.2; }
  .label {
    font-size: 11px;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(255,255,255,0.85);
    stroke-width: 3px;
    stroke-linejoin: round;
    font-weight: 600;
  }
  .trend {
    stroke-dasharray: 6,5;
    fill: none;
    stroke-width: 1.4;
    opacity: 0.85;
  }
  .trend-label {
    font-size: 11px;
    font-weight: 600;
    fill: #475569;
  }
  .legend {
    display: flex;
    gap: 26px;
    align-items: center;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    user-select: none;
  }
  .legend label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
  }
  .legend label.off { opacity: 0.35; }
  .swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .legend-group {
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 4px 12px;
    border-left: 1px solid var(--grid);
  }
  .legend-group:first-child { border-left: none; }
  .legend-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    line-height: 1.4;
    max-width: 260px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .tooltip strong { color: #111; }
  .tooltip .row { color: #4b5563; }
  .source {
    margin-top: 14px;
    font-size: 11px;
    color: var(--muted);
  }
  .source a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Machine Learning Hardware</h1>
  <div class="sub">ML compute performance over time, colored by country of origin. Data: Epoch AI <em>ml_hardware.csv</em>.</div>
  <div class="meta">
    <div class="axis-label">Machine learning performance (TOP/s)</div>
    <div class="count" id="count">—</div>
  </div>
  <div id="chart"></div>
  <div class="legend" id="legend">
    <div class="legend-group">
      <span class="legend-title">Country</span>
      <label data-key="US"><span class="swatch" style="background:var(--us)"></span>United States</label>
      <label data-key="China"><span class="swatch" style="background:var(--cn)"></span>China</label>
      <label data-key="Other"><span class="swatch" style="background:var(--other)"></span>Other</label>
    </div>
    <div class="legend-group">
      <span class="legend-title">Overlay</span>
      <label data-key="trend"><span class="swatch" style="background:var(--trend)"></span>Trend (regression)</label>
      <label data-key="labels"><span class="swatch" style="background:#1a2540"></span>Chip labels</label>
    </div>
  </div>
  <div class="source">Source: Epoch AI — Machine Learning Hardware database. Country derived from manufacturer.</div>
</div>
<div class="tooltip" id="tt"></div>

<script>
const CSV_URL = "ml_hardware.csv";

const COLORS = {
  US:    { stroke: "#2563eb", fill: "rgba(37,99,235,0.55)",  trend: "#2563eb" },
  China: { stroke: "#dc2626", fill: "rgba(220,38,38,0.55)",  trend: "#dc2626" },
  Other: { stroke: "#6b7280", fill: "rgba(107,114,128,0.45)",trend: "#6b7280" }
};

const HIGHLIGHT = new Set([
  "NVIDIA GB200","NVIDIA B100","NVIDIA H100 SXM5 80GB","NVIDIA V100",
  "NVIDIA P100","NVIDIA M40","NVIDIA GeForce GTX TITAN","NVIDIA Quadro K4000",
  "NVIDIA Quadro P600","NVIDIA RTX A6000","NVIDIA HGX H20",
  "Google TPU v1","Google TPU v2","Google TPU v4i","Google TPU v7 Ironwood",
  "Intel Habana Gaudi2","Intel Data Center GPU Max 1100",
  "Meta MTIA v1 (MTIA 100)","Meta MTIA 300",
  "Huawei Ascend 910A Premium","Huawei Ascend 910C","Huawei Ascend 920",
  "Cambricon Siyuan 590","Kunlunxin XPU R200","MT-3000","PEZY-SC2",
  "AMD Instinct MI355X","AMD Instinct MI300X",
  "DeepSeek N/A","Biren BR100","MetaX C500"
]);

const state = {
  visible: { US: true, China: true, Other: true },
  showTrend: true,
  showLabels: true,
  rows: []
};

const margin = { top: 24, right: 30, bottom: 56, left: 64 };

function parseRow(d) {
  const date = d["Release date"] ? new Date(d["Release date"]) : null;
  const mlops = +d["ML OP/s"];
  if (!date || !isFinite(mlops) || mlops <= 0) return null;
  let country = d["Country"] || "Other";
  if (country !== "US" && country !== "China") country = "Other";
  return {
    name: d["Hardware name"],
    manufacturer: d["Manufacturer"],
    date,
    tops: mlops / 1e12,
    country
  };
}

function render() {
  const container = document.getElementById("chart");
  const W = container.clientWidth;
  const H = Math.max(520, Math.round(W * 0.55));

  d3.select("#chart svg").remove();
  const svg = d3.select("#chart").append("svg")
    .attr("width", W).attr("height", H)
    .attr("viewBox", `0 0 ${W} ${H}`)
    .attr("preserveAspectRatio", "xMinYMin meet");

  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const rows = state.rows.filter(r => state.visible[r.country]);
  document.getElementById("count").textContent = `${rows.length} results · ${state.rows.length} total`;

  // scales
  const x = d3.scaleTime()
    .domain(d3.extent(state.rows, d => d.date))
    .nice(d3.timeYear)
    .range([0, innerW]);

  const yMin = Math.max(0.3, d3.min(state.rows, d => d.tops));
  const yMax = d3.max(state.rows, d => d.tops);
  const y = d3.scaleLog().domain([yMin * 0.7, yMax * 1.3]).range([innerH, 0]).nice();

  // gridlines
  g.append("g").attr("class", "grid")
    .call(d3.axisLeft(y)
      .tickValues([1,5,10,40,100,300,700,2000,6000])
      .tickSize(-innerW).tickFormat(""));
  g.append("g").attr("class", "grid")
    .attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(d3.timeYear.every(1)).tickSize(-innerH).tickFormat(""));

  // axes
  g.append("g")
    .attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat("%Y")))
    .call(s => s.select(".domain").attr("stroke", "#cbd5e1"));

  const tickVals = [1,5,10,40,100,300,700,2000,6000];
  g.append("g")
    .call(d3.axisLeft(y).tickValues(tickVals).tickFormat(d => d >= 1000 ? (d/1000)+"k" : d))
    .call(s => s.select(".domain").attr("stroke", "#cbd5e1"));

  // axis titles
  svg.append("text")
    .attr("class","axis-label")
    .attr("x", margin.left + innerW/2)
    .attr("y", H - 14)
    .attr("text-anchor","middle")
    .text("Release date");

  // ---- trend lines: overall + per-visible-country ----
  if (state.showTrend) {
    const groups = [{ key: "ALL", color: "#475569", data: rows, label: null }];
    if (state.visible.US)    groups.push({ key:"US",    color: COLORS.US.trend,    data: rows.filter(r=>r.country==="US"),    label: "US" });
    if (state.visible.China) groups.push({ key:"China", color: COLORS.China.trend, data: rows.filter(r=>r.country==="China"), label: "China" });

    groups.forEach(grp => {
      const data = grp.data;
      if (data.length < 3) return;
      const xs = data.map(d => d.date.getTime() / (1000*60*60*24*365.25));
      const ys = data.map(d => Math.log10(d.tops));
      const n = xs.length;
      const sumX = d3.sum(xs), sumY = d3.sum(ys);
      const meanX = sumX / n, meanY = sumY / n;
      let num=0, den=0;
      for (let i=0; i<n; i++) { num += (xs[i]-meanX)*(ys[i]-meanY); den += (xs[i]-meanX)**2; }
      const slope = num/den;
      const intercept = meanY - slope*meanX;
      const xMin = d3.min(xs), xMax = d3.max(xs);
      const yA = Math.pow(10, slope*xMin + intercept);
      const yB = Math.pow(10, slope*xMax + intercept);
      const dateA = new Date(xMin*1000*60*60*24*365.25);
      const dateB = new Date(xMax*1000*60*60*24*365.25);
      g.append("line")
        .attr("class","trend")
        .attr("stroke", grp.color)
        .attr("opacity", grp.key === "ALL" ? 0.9 : 0.7)
        .attr("stroke-dasharray", grp.key === "ALL" ? "6,5" : "3,4")
        .attr("x1", x(dateA)).attr("y1", y(yA))
        .attr("x2", x(dateB)).attr("y2", y(yB));

      const annualFactor = Math.pow(10, slope);
      if (grp.key === "ALL") {
        const midX = (x(dateA) + x(dateB)) / 2;
        const midY = (y(yA) + y(yB)) / 2 - 8;
        g.append("text")
          .attr("class","trend-label")
          .attr("x", midX).attr("y", midY)
          .attr("transform", `rotate(${Math.atan2(y(yB)-y(yA), x(dateB)-x(dateA))*180/Math.PI}, ${midX}, ${midY})`)
          .attr("text-anchor","middle")
          .text(`${annualFactor.toFixed(2)}× / year (overall)`);
      } else {
        g.append("text")
          .attr("class","trend-label")
          .attr("fill", grp.color)
          .attr("x", x(dateB) + 4)
          .attr("y", y(yB) + 4)
          .text(`${grp.label}: ${annualFactor.toFixed(2)}×/yr`);
      }
    });
  }

  // ---- points ----
  const dotG = g.append("g");
  const dots = dotG.selectAll("circle")
    .data(rows, d => d.name)
    .join("circle")
      .attr("class","dot")
      .attr("cx", d => x(d.date))
      .attr("cy", d => y(d.tops))
      .attr("r", 5)
      .attr("fill", d => COLORS[d.country].fill)
      .attr("stroke", d => COLORS[d.country].stroke)
      .attr("stroke-width", 0.9);

  const tt = d3.select("#tt");
  dots.on("mousemove", (event, d) => {
    tt.style("opacity", 1)
      .style("left", (event.pageX + 12) + "px")
      .style("top", (event.pageY + 12) + "px")
      .html(`<strong>${d.name}</strong><br>
        <span class="row">${d.manufacturer ?? "—"} · ${d.country}</span><br>
        <span class="row">Released ${d3.timeFormat("%b %Y")(d.date)}</span><br>
        <span class="row">${d.tops < 10 ? d.tops.toFixed(2) : d.tops < 100 ? d.tops.toFixed(1) : Math.round(d.tops)} TOP/s</span>`);
  }).on("mouseleave", () => tt.style("opacity", 0));

  // ---- labels (highlighted only) ----
  if (state.showLabels) {
    const labelData = rows.filter(d => HIGHLIGHT.has(d.name));
    g.append("g").selectAll("text")
      .data(labelData)
      .join("text")
        .attr("class","label")
        .attr("x", d => x(d.date) + 7)
        .attr("y", d => y(d.tops) - 6)
        .attr("fill", d => COLORS[d.country].stroke)
        .text(d => d.name);
  }
}

function setupLegend() {
  d3.selectAll("#legend label").on("click", function() {
    const k = this.dataset.key;
    if (k === "trend") { state.showTrend = !state.showTrend; this.classList.toggle("off", !state.showTrend); }
    else if (k === "labels") { state.showLabels = !state.showLabels; this.classList.toggle("off", !state.showLabels); }
    else { state.visible[k] = !state.visible[k]; this.classList.toggle("off", !state.visible[k]); }
    render();
  });
}

d3.csv(CSV_URL).then(raw => {
  state.rows = raw.map(parseRow).filter(Boolean);
  setupLegend();
  render();
  window.addEventListener("resize", () => render());
}).catch(err => {
  document.getElementById("chart").innerHTML =
    `<div style="padding:24px;color:#b91c1c">Could not load ${CSV_URL}: ${err.message}.<br>
     Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) — browsers block CSV fetch from file://</div>`;
});
</script>
</body>
</html>
