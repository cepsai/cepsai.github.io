<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital ODA channels of delivery — treemap</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#fff;color:#0f172a}
  .app{height:100vh;display:flex;flex-direction:column}
  #treewrap{flex:1;min-height:0;position:relative}
  #treemap{width:100%;height:100%}

  /* ─── BOTTOM BAR: source (left) · legend (centre) · CEPS logo (right) ───── */
  .bottom{background:#fff;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:1fr auto 1fr;
          align-items:center;gap:clamp(10px,2vw,28px);padding:clamp(8px,1.5vh,16px) clamp(14px,2.5vw,28px);
          min-height:clamp(44px,7vh,80px)}
  .ctrl-left{justify-self:start;display:flex;align-items:center;min-width:0}
  .ctrl-center{justify-self:center;display:flex;align-items:center}
  .ctrl-right{justify-self:end;display:flex;align-items:center}

  .source-text{min-width:0;font-size:clamp(12px,1.6vw,16px);font-weight:600;color:#333;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .source-text a,.source-text a:visited{color:#2756d3;text-decoration:underline}

  /* smaller than the 3-item type legend: 7 delivery families need to fit */
  .legend{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:clamp(11px,1.5vw,15px);font-weight:700;color:#334155}
  .legend-square{width:12px;height:12px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.12) inset}

  .logo-link{height:clamp(28px,5vh,48px);display:flex;align-items:center;flex-shrink:0}
  .logo{height:100%;width:auto;max-height:100%;object-fit:contain}

  /* URL switches: ?legend=0 ?source=0 ?chrome=0 */
  body.no-legend .legend{display:none}
  body.no-source .source-text{display:none}
  body.no-chrome .bottom{display:none}
  @media (max-height:380px){.bottom{display:none}}
</style>
<script src="https://d3js.org/d3.v5.min.js" integrity="sha384-M06Cb6r/Yrkprjr7ngOrJlzgekrkkdmGZDES/SUnkUpUol0/qjsaQWQfLzq0mcfg" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/d3plus-hierarchy@1.0.1" integrity="sha384-+W6NXBbslxnJQ4c4zr/o1Rga99PWp72fbuini4EP9XZNIPtshQIiNZiMcvJT9k6X" crossorigin="anonymous"></script>
</head>

<body>
  <div class="app">
    <div id="treewrap"><div id="treemap"></div></div>
    <div class="bottom">
      <div class="ctrl-left">
        <div class="source-text">Source: <a href="https://stats.oecd.org/Index.aspx?DataSetCode=CRS1" target="_blank" rel="noopener">OECD CRS</a>, classified by the v3.1 LLM ensemble</div>
      </div>
      <div class="ctrl-center"><div class="legend" id="legend"></div></div>
      <div class="ctrl-right">
        <a href="https://www.ceps.eu" target="_blank" rel="noopener" class="logo-link" aria-label="CEPS">
          <img src="ceps-logo.png" class="logo" alt="CEPS logo" />
        </a>
      </div>
    </div>
  </div>

<script src="tm_channel_data.js"></script>
<script>
  var CHANNELS = window.TM_CHANNELS || [];

  var TYPE_COLOR = { gov: "#2563eb", inc: "#16a34a", inf: "#d97706", nd: "#94a3b8" };
  var TYPE_LABEL = { gov: "Digital Governance", inc: "Digital Inclusion", inf: "Hard Infrastructure", nd: "Non-digital" };
  var FAM_COLOR = {
    "Government & public sector": "#1d4ed8",
    "Multilateral": "#0891b2",
    "NGOs & civil society": "#16a34a",
    "Universities & research": "#7c3aed",
    "Private sector": "#d97706",
    "PPPs & networks": "#db2777",
    "Other / unspecified": "#94a3b8"
  };
  var FG_LABEL = { all: "All funders", te: "Team Europe", inst: "EU Institutions",
    mem: "EU member states", oth: "Non-Team Europe", twn: "Taiwan" };
  var REGION_LABEL = { all: "all regions", af: "Africa", ap: "Asia-Pacific" };

  // ---- read URL params (same scheme as channels_explorer.html deep links) ----
  var q = new URLSearchParams(window.location.search);
  var FG = FG_LABEL[q.get("fg")] ? q.get("fg") : "all";
  var REGION = REGION_LABEL[q.get("region")] ? q.get("region") : "all";
  var METRIC = (q.get("metric") === "c") ? "c" : "d";
  var INCLUDE_ND = (q.get("nd") === "1");
  // display switches: ?legend=0 ?source=0 ?chrome=0
  if (q.get("legend") === "0") document.body.classList.add("no-legend");
  if (q.get("source") === "0") document.body.classList.add("no-source");
  if (q.get("chrome") === "0") document.body.classList.add("no-chrome");

  function activeTypes() { return INCLUDE_ND ? ["gov", "inc", "inf", "nd"] : ["gov", "inc", "inf"]; }

  // per-type value for a channel, respecting metric + funder group + region.
  function tval(ch, cat) {
    var key = cat + "_" + METRIC;
    if (REGION === "all") {
      if (FG === "all") return +ch[key] || 0;
      if (!ch.fg) return 0;
      if (FG === "te") return (+ch.fg.inst[key] || 0) + (+ch.fg.mem[key] || 0);
      return (ch.fg[FG] && +ch.fg[FG][key]) || 0;
    }
    var r = ch.fgr && ch.fgr[REGION];
    if (!r) return 0;
    if (FG === "all") return (+r.inst[key] || 0) + (+r.mem[key] || 0) + (+r.oth[key] || 0);
    if (FG === "te") return (+r.inst[key] || 0) + (+r.mem[key] || 0);
    return (r[FG] && +r[FG][key]) || 0;
  }
  function chanVal(ch) { var s = 0, ts = activeTypes(); for (var i = 0; i < ts.length; i++) s += tval(ch, ts[i]); return s; }

  function fmtUSD(m) {
    m = +m || 0;
    if (m >= 1000) return "$" + (m / 1000).toFixed(2) + "B";
    if (m >= 1) return "$" + m.toFixed(1) + "M";
    if (m > 0) return "$" + (m * 1000).toFixed(0) + "K";
    return "$0";
  }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  // ---- build rows for the current setting ----
  var ts = activeTypes();
  var rows = [];
  CHANNELS.forEach(function (ch) {
    var v = chanVal(ch);
    if (!(v > 0)) return;
    var row = { fam: ch.fam, name: ch.name, value: v };
    ts.forEach(function (t) { row["v_" + t] = tval(ch, t); });
    rows.push(row);
  });

  // browser-tab title only (no on-page heading)
  document.title = "Digital ODA channels of delivery — " + (FG_LABEL[FG] || "All funders") +
    (REGION === "all" ? "" : " · " + REGION_LABEL[REGION] + " recipients");

  // ---- family legend (small bold, one row of colours) ----
  var fams = [];
  rows.forEach(function (r) { if (fams.indexOf(r.fam) < 0) fams.push(r.fam); });
  var lg = document.getElementById("legend");
  fams.forEach(function (f) {
    var d = document.createElement("div"); d.className = "legend-item";
    var s = document.createElement("span"); s.className = "legend-square"; s.style.background = FAM_COLOR[f] || "#94a3b8";
    var t = document.createElement("span"); t.textContent = f;
    d.appendChild(s); d.appendChild(t); lg.appendChild(d);
  });

  // ---- treemap (identical config to the explorer's export) ----
  var tm = new d3plus.Treemap()
    .select("#treemap")
    .groupBy(["fam", "name"])
    .sum("value")
    .layoutPadding(1)
    .legend(false)
    .label(function (d) { if (d.depth === 0) return d.fam || d.id; return (d.name || "") + "\n" + fmtUSD(d.value); })
    .color(function (d) { return FAM_COLOR[d.fam] || "#94a3b8"; })
    .shapeConfig({
      stroke: function (d) { return d.depth === 0 ? (FAM_COLOR[d.fam || d.id] || "#94a3b8") : "rgba(255,255,255,0.65)"; },
      strokeWidth: function (d) { return d.depth === 0 ? 2 : 0.5; },
      labelConfig: { fontColor: "#ffffff", fontSize: 11, fontWeight: 600 }
    })
    .tooltipConfig({
      title: function (d) { return d.name || d.fam || d.id; },
      body: function (d) {
        if (!d.name) return "";
        var r = activeTypes().map(function (t) {
          return '<div style="display:flex;align-items:center;gap:6px">' +
            '<span style="width:9px;height:9px;border-radius:2px;background:' + TYPE_COLOR[t] + ';display:inline-block"></span>' +
            TYPE_LABEL[t] + ': <b>' + fmtUSD(d["v_" + t] || 0) + '</b></div>';
        }).join("");
        return '<div style="font-size:12px;line-height:1.55">Family: <b>' + esc(d.fam || "—") +
          '</b><br>Total: <b>' + fmtUSD(d.value) + '</b><div style="margin-top:5px">' + r + '</div></div>';
      }
    })
    .data(rows);
  tm.render();

  var rt;
  window.addEventListener("resize", function () { clearTimeout(rt); rt = setTimeout(function () { tm.render(); }, 150); });
</script>
</body>
</html>
