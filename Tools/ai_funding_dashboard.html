<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Funding & Research Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface-raised: #eef1f6;
  --surface-hover: #e6eaf2;
  --border: #dde2eb;
  --border-accent: #b4bece;
  --text: #1a2030;
  --text-muted: #4a5568;
  --text-dim: #8a97aa;
  --accent: #2f6fd4;
  --accent-glow: rgba(47, 111, 212, 0.12);
  --accent-hover: #1e5bb8;
  --green: #16a34a;
  --green-dim: rgba(22, 163, 74, 0.12);
  --amber: #d97706;
  --amber-dim: rgba(217, 119, 6, 0.12);
  --red: #dc2626;
  --red-dim: rgba(220, 38, 38, 0.12);
  --cyan: #0891b2;
  --cyan-dim: rgba(8, 145, 178, 0.12);
  --violet: #7c3aed;
  --violet-dim: rgba(124, 58, 237, 0.12);
  --radius: 8px;
  --radius-lg: 14px;
}

html.dark :root {
  --bg: #0c0f14;
  --surface: #14181f;
  --surface-raised: #1a1f28;
  --surface-hover: #1f2531;
  --border: #2a3040;
  --border-accent: #3d4a63;
  --text: #e2e6ef;
  --text-muted: #8892a6;
  --text-dim: #5c6478;
  --accent: #5b8af5;
  --accent-glow: rgba(91, 138, 245, 0.15);
  --accent-hover: #7aa2ff;
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.12);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.12);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34, 211, 238, 0.12);
  --violet: #a78bfa;
  --violet-dim: rgba(167, 139, 250, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Loading screen ---- */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; transition: opacity 0.4s;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
.loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-screen p { color: var(--text-muted); font-size: 14px; letter-spacing: 0.5px; }

/* ---- Header ---- */
header {
  padding: 40px 48px 0;
  max-width: 1440px; margin: 0 auto;
}
.header-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
h1 {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.db-badge {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 6px;
}
.db-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* ---- Stats strip ---- */
.stats-strip {
  display: flex; gap: 12px; margin: 28px 0 0; flex-wrap: wrap;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 22px; min-width: 150px;
  flex: 1;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.blue::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.amber::before { background: var(--amber); }
.stat-card.violet::before { background: var(--violet); }
.stat-card.cyan::before { background: var(--cyan); }
.stat-card.red::before { background: var(--red); }
.stat-val { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
.stat-card.blue .stat-val { color: var(--accent); }
.stat-card.green .stat-val { color: var(--green); }
.stat-card.amber .stat-val { color: var(--amber); }
.stat-card.violet .stat-val { color: var(--violet); }
.stat-card.cyan .stat-val { color: var(--cyan); }
.stat-card.red .stat-val { color: var(--red); }
.stat-label { color: var(--text-muted); font-size: 12px; margin-top: 4px; letter-spacing: 0.3px; }

/* ---- Main content ---- */
main { max-width: 1440px; margin: 0 auto; padding: 32px 48px 60px; }

/* ---- Tabs ---- */
.tab-bar {
  display: flex; gap: 4px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 4px;
  width: fit-content; margin-bottom: 24px;
}
.tab-btn {
  background: none; border: none; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  padding: 10px 20px; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 8px;
}
.tab-btn:hover { color: var(--text); background: var(--surface-hover); }
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn .count {
  font-family: 'Space Mono', monospace; font-size: 11px;
  background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 10px;
}
.tab-btn.active .count { background: rgba(255,255,255,0.25); }

/* ---- Toolbar ---- */
.toolbar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1; min-width: 240px; position: relative;
}
.search-box input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 14px 10px 38px; border-radius: var(--radius);
  outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-dim); }
.search-box svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); width: 16px; height: 16px;
}
select.filter {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 10px 14px; border-radius: var(--radius); cursor: pointer;
  outline: none; min-width: 140px;
}
select.filter:focus { border-color: var(--accent); }

/* ---- Table ---- */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 14px 16px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-dim);
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
  cursor: pointer; user-select: none;
  white-space: nowrap;
}
thead th:hover { color: var(--text-muted); }
thead th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface-hover); }
td {
  padding: 12px 16px; font-size: 13px;
  vertical-align: middle;
}
td.org { color: var(--text-muted); font-size: 12px; }
td.program { font-weight: 500; }
td a {
  color: var(--accent); text-decoration: none;
  transition: color 0.15s;
}
td a:hover { color: var(--accent-hover); text-decoration: underline; }

/* ---- Badges ---- */
.badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  letter-spacing: 0.3px; white-space: nowrap;
}
.badge.geo-eu { background: var(--accent-glow); color: var(--accent); }
.badge.geo-us { background: var(--violet-dim); color: var(--violet); }
.badge.geo-uk { background: var(--cyan-dim); color: var(--cyan); }
.badge.geo-ca { background: var(--amber-dim); color: var(--amber); }
.badge.geo-global { background: var(--green-dim); color: var(--green); }
.badge.geo-other { background: rgba(255,255,255,0.06); color: var(--text-muted); }

.badge.type-gov { background: var(--accent-glow); color: var(--accent); }
.badge.type-found { background: var(--green-dim); color: var(--green); }
.badge.type-corp { background: var(--violet-dim); color: var(--violet); }
.badge.type-acad { background: var(--cyan-dim); color: var(--cyan); }
.badge.type-multi { background: var(--amber-dim); color: var(--amber); }
.badge.type-think { background: rgba(251,191,36,0.12); color: var(--amber); }
.badge.type-other { background: rgba(255,255,255,0.06); color: var(--text-muted); }

.badge.open { background: var(--green-dim); color: var(--green); }
.badge.closed { background: var(--red-dim); color: var(--red); }

.deadline-soon { color: var(--amber); font-weight: 600; }
.deadline-passed { color: var(--red); text-decoration: line-through; opacity: 0.7; }

/* ---- Detail panel ---- */
.panel-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5); opacity: 0;
  pointer-events: none; transition: opacity 0.3s;
}
.panel-overlay.open { opacity: 1; pointer-events: all; }
.detail-panel {
  position: fixed; top: 0; right: -520px; bottom: 0; z-index: 101;
  width: 500px; max-width: 90vw;
  background: var(--surface-raised); border-left: 1px solid var(--border);
  padding: 32px; overflow-y: auto;
  transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.detail-panel.open { right: 0; }
.panel-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); width: 32px; height: 32px;
  border-radius: 8px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.panel-close:hover { background: var(--surface-hover); color: var(--text); }
.panel-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; padding-right: 40px; line-height: 1.35; }
.panel-org { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
.panel-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.panel-section { margin-bottom: 20px; }
.panel-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 8px; }
.panel-section-content { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.panel-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  padding: 10px 18px; border-radius: var(--radius); text-decoration: none;
  transition: background 0.15s; margin-top: 8px;
}
.panel-link:hover { background: var(--accent-hover); }

/* ---- Charts row ---- */
.charts-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}
.chart-card h3 {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 16px;
}
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label {
  font-size: 12px; color: var(--text-muted); width: 100px;
  text-align: right; flex-shrink: 0; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.bar-track {
  flex: 1; height: 24px; background: rgba(0,0,0,0.06);
  border-radius: 4px; overflow: hidden; position: relative;
}
html.dark .bar-track { background: rgba(255,255,255,0.03); }

/* ---- Theme toggle ---- */
.theme-toggle {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.theme-toggle:hover { background: var(--surface-hover); color: var(--text); }
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; min-width: 30px;
}
.bar-fill span {
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: rgba(255,255,255,0.9); font-weight: 700;
}

/* ---- Timeline chart ---- */
.timeline-chart { position: relative; height: 180px; }
.timeline-chart canvas { width: 100% !important; height: 100% !important; }

/* ---- Empty state ---- */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-accent); }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  header, main { padding-left: 20px; padding-right: 20px; }
  h1 { font-size: 20px; }
  .stats-strip { gap: 8px; }
  .stat-card { min-width: 120px; padding: 14px 16px; }
  .stat-val { font-size: 22px; }
  .detail-panel { width: 100%; }
}

/* ---- Animations ---- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp 0.5s ease-out forwards; opacity: 0; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader"></div>
  <p>Loading database…</p>
</div>

<header>
  <div class="header-top">
    <div>
      <h1>⚡ AI Funding & Research Tracker</h1>
      <p class="subtitle">Funding opportunities and research publications on AI & society</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
      <div class="db-badge"><span class="dot"></span> <span id="db-name">ai_funding_tracker.db</span></div>
    </div>
  </div>
  <div class="stats-strip" id="stats-strip"></div>
</header>

<main>
  <div class="charts-row animate-in delay-2" id="charts-row"></div>

  <div class="tab-bar animate-in delay-3" id="tab-bar">
    <button class="tab-btn active" data-tab="funding" onclick="switchTab('funding')">
      Funding <span class="count" id="count-funding">0</span>
    </button>
    <button class="tab-btn" data-tab="research" onclick="switchTab('research')">
      Research <span class="count" id="count-research">0</span>
    </button>
  </div>

  <div id="view-funding">
    <div class="toolbar" id="toolbar-funding">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-funding" placeholder="Search programs, organisations…" oninput="filterFunding()">
      </div>
      <select class="filter" id="filter-geo" onchange="filterFunding()">
        <option value="">All Regions</option>
      </select>
      <select class="filter" id="filter-source" onchange="filterFunding()">
        <option value="">All Sources</option>
      </select>
      <select class="filter" id="filter-status" onchange="filterFunding()">
        <option value="">All Status</option>
        <option value="1">Open</option>
        <option value="0">Closed</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="thead-funding">
            <th data-col="program_name" onclick="sortFunding('program_name')">Program <span class="sort-arrow">▼</span></th>
            <th data-col="organization_name" onclick="sortFunding('organization_name')">Organisation <span class="sort-arrow">▼</span></th>
            <th data-col="geographic_scope" onclick="sortFunding('geographic_scope')">Region <span class="sort-arrow">▼</span></th>
            <th data-col="source_type" onclick="sortFunding('source_type')">Source <span class="sort-arrow">▼</span></th>
            <th data-col="budget_amount" onclick="sortFunding('budget_amount')">Budget <span class="sort-arrow">▼</span></th>
            <th data-col="submission_deadline" onclick="sortFunding('submission_deadline')">Deadline <span class="sort-arrow">▼</span></th>
            <th data-col="still_open" onclick="sortFunding('still_open')">Status <span class="sort-arrow">▼</span></th>
          </tr>
        </thead>
        <tbody id="tbody-funding"></tbody>
      </table>
    </div>
  </div>

  <div id="view-research" style="display:none;">
    <div class="toolbar" id="toolbar-research">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-research" placeholder="Search titles, authors, organisations…" oninput="filterResearch()">
      </div>
      <select class="filter" id="filter-res-geo" onchange="filterResearch()">
        <option value="">All Regions</option>
      </select>
      <select class="filter" id="filter-res-source" onchange="filterResearch()">
        <option value="">All Sources</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="thead-research">
            <th data-col="title" onclick="sortResearch('title')">Title <span class="sort-arrow">▼</span></th>
            <th data-col="authors" onclick="sortResearch('authors')">Authors <span class="sort-arrow">▼</span></th>
            <th data-col="publishing_organization" onclick="sortResearch('publishing_organization')">Publisher <span class="sort-arrow">▼</span></th>
            <th data-col="geographic_relevance" onclick="sortResearch('geographic_relevance')">Region <span class="sort-arrow">▼</span></th>
            <th data-col="source_type" onclick="sortResearch('source_type')">Source <span class="sort-arrow">▼</span></th>
            <th data-col="publication_date" onclick="sortResearch('publication_date')">Date <span class="sort-arrow">▼</span></th>
          </tr>
        </thead>
        <tbody id="tbody-research"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Detail Panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<script>
var DB = null;
var fundingData = [];
var researchData = [];
var fundingFiltered = [];
var researchFiltered = [];
var fundingSortCol = 'submission_deadline';
var fundingSortAsc = true;
var researchSortCol = 'publication_date';
var researchSortAsc = false;

// ---- Init ----
async function init() {
  try {
    var SQL = await initSqlJs({ locateFile: function(file) { return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/' + file; } });
    var resp = await fetch('ai_funding_tracker.db');
    if (!resp.ok) throw new Error('Could not load database file. Make sure ai_funding_tracker.db is in the same folder.');
    var buf = await resp.arrayBuffer();
    DB = new SQL.Database(new Uint8Array(buf));

    loadData();
    buildStats();
    buildCharts();
    populateFilters();
    filterFunding();
    filterResearch();
    updateCounts();

    document.getElementById('loading-screen').classList.add('hidden');
  } catch (e) {
    document.getElementById('loading-screen').innerHTML = '<p style="color:var(--red);max-width:500px;text-align:center;line-height:1.6;">' + e.message + '</p>';
    console.error(e);
  }
}

function queryAll(sql) {
  var stmt = DB.prepare(sql);
  var rows = [];
  while (stmt.step()) {
    var row = stmt.getAsObject();
    rows.push(row);
  }
  stmt.free();
  return rows;
}

function loadData() {
  try {
    fundingData = queryAll([
      'SELECT',
      '  id, name AS program_name, organization AS organization_name,',
      '  UPPER(SUBSTR(type,1,1)) || SUBSTR(type,2) AS source_type,',
      '  description AS thematic_focus,',
      '  url AS access_link,',
      '  amount_notes AS budget_amount,',
      '  deadline AS submission_deadline,',
      '  eligible_regions AS geographic_scope,',
      '  date_added AS source_discovered_date,',
      '  CASE WHEN status = "active" THEN 1 ELSE 0 END AS still_open,',
      '  notes, contact',
      'FROM opportunities',
      'ORDER BY deadline ASC'
    ].join(' '));
  } catch(e) { fundingData = []; console.warn('loadData funding:', e); }
  researchData = [];
}

// ---- Stats ----
function buildStats() {
  var totalF = fundingData.length;
  var openF = fundingData.filter(function(r) { return r.still_open === 1; }).length;
  var closedF = totalF - openF;
  var totalR = researchData.length;

  var soon = fundingData.filter(function(r) {
    if (!r.submission_deadline || r.still_open !== 1 || r.submission_deadline === 'rolling') return false;
    var d = new Date(r.submission_deadline + 'T12:00:00');
    if (isNaN(d.getTime())) return false;
    var diff = (d - new Date()) / 86400000;
    return diff >= 0 && diff <= 30;
  }).length;

  var geos = {};
  fundingData.forEach(function(r) {
    var g = r.geographic_scope || 'Unknown';
    geos[g] = (geos[g] || 0) + 1;
  });
  var topGeo = Object.keys(geos).sort(function(a, b) { return geos[b] - geos[a]; })[0] || '—';

  var html = '';
  html += '<div class="stat-card blue animate-in delay-1"><div class="stat-val">' + totalF + '</div><div class="stat-label">Funding Opportunities</div></div>';
  html += '<div class="stat-card green animate-in delay-1"><div class="stat-val">' + openF + '</div><div class="stat-label">Currently Open</div></div>';
  html += '<div class="stat-card amber animate-in delay-2"><div class="stat-val">' + soon + '</div><div class="stat-label">Closing in 30 days</div></div>';
  html += '<div class="stat-card red animate-in delay-2"><div class="stat-val">' + closedF + '</div><div class="stat-label">Closed</div></div>';
  html += '<div class="stat-card violet animate-in delay-3"><div class="stat-val">' + totalR + '</div><div class="stat-label">Research Publications</div></div>';
  html += '<div class="stat-card cyan animate-in delay-3"><div class="stat-val">' + topGeo + '</div><div class="stat-label">Top Region (Funding)</div></div>';
  document.getElementById('stats-strip').innerHTML = html;
}

// ---- Charts ----
function buildCharts() {
  var container = document.getElementById('charts-row');
  var html = '';

  // Geographic distribution
  var geoCount = {};
  fundingData.forEach(function(r) {
    var g = r.geographic_scope || 'Unknown';
    geoCount[g] = (geoCount[g] || 0) + 1;
  });
  var maxGeo = Math.max.apply(null, Object.values(geoCount).concat([1]));
  var geoColors = { 'European Union': 'var(--accent)', 'United States': 'var(--violet)', 'United Kingdom': 'var(--cyan)', 'Canada': 'var(--amber)', 'Global': 'var(--green)', 'Other': 'var(--text-dim)' };

  html += '<div class="chart-card"><h3>Funding by Region</h3><div class="bar-chart">';
  var geoKeys = Object.keys(geoCount).sort(function(a, b) { return geoCount[b] - geoCount[a]; });
  geoKeys.forEach(function(k) {
    var pct = Math.round((geoCount[k] / maxGeo) * 100);
    var color = geoColors[k] || 'var(--text-dim)';
    html += '<div class="bar-row"><div class="bar-label">' + k + '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"><span>' + geoCount[k] + '</span></div></div></div>';
  });
  html += '</div></div>';

  // Source type distribution
  var srcCount = {};
  fundingData.forEach(function(r) {
    var s = r.source_type || 'Unknown';
    srcCount[s] = (srcCount[s] || 0) + 1;
  });
  var maxSrc = Math.max.apply(null, Object.values(srcCount).concat([1]));
  var srcColors = { 'Government': 'var(--accent)', 'Foundation': 'var(--green)', 'Corporate': 'var(--violet)', 'Academic': 'var(--cyan)', 'Multilateral': 'var(--amber)', 'Other': 'var(--text-dim)' };

  html += '<div class="chart-card"><h3>Funding by Source Type</h3><div class="bar-chart">';
  var srcKeys = Object.keys(srcCount).sort(function(a, b) { return srcCount[b] - srcCount[a]; });
  srcKeys.forEach(function(k) {
    var pct = Math.round((srcCount[k] / maxSrc) * 100);
    var color = srcColors[k] || 'var(--text-dim)';
    html += '<div class="bar-row"><div class="bar-label">' + k + '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"><span>' + srcCount[k] + '</span></div></div></div>';
  });
  html += '</div></div>';

  // Discovery timeline
  var discCount = {};
  fundingData.forEach(function(r) {
    var d = r.source_discovered_date || 'Unknown';
    if (d !== 'Unknown') {
      var month = d.substring(0, 7);
      discCount[month] = (discCount[month] || 0) + 1;
    }
  });
  researchData.forEach(function(r) {
    var d = r.source_discovered_date || 'Unknown';
    if (d !== 'Unknown') {
      var month = d.substring(0, 7);
      discCount[month] = (discCount[month] || 0) + 1;
    }
  });
  var maxDisc = Math.max.apply(null, Object.values(discCount).concat([1]));
  var discKeys = Object.keys(discCount).sort();

  html += '<div class="chart-card"><h3>Entries Added Over Time</h3><div class="bar-chart">';
  discKeys.forEach(function(k) {
    var pct = Math.round((discCount[k] / maxDisc) * 100);
    html += '<div class="bar-row"><div class="bar-label">' + k + '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent)"><span>' + discCount[k] + '</span></div></div></div>';
  });
  if (discKeys.length === 0) {
    html += '<div style="color:var(--text-dim);font-size:13px;padding:12px 0;">No date data available</div>';
  }
  html += '</div></div>';

  container.innerHTML = html;
}

// ---- Filters ----
function populateFilters() {
  var geos = {}; var srcs = {};
  fundingData.forEach(function(r) {
    if (r.geographic_scope) geos[r.geographic_scope] = 1;
    if (r.source_type) srcs[r.source_type] = 1;
  });
  var sel = document.getElementById('filter-geo');
  Object.keys(geos).sort().forEach(function(g) {
    var o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o);
  });
  sel = document.getElementById('filter-source');
  Object.keys(srcs).sort().forEach(function(s) {
    var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  });

  var resGeos = {}; var resSrcs = {};
  researchData.forEach(function(r) {
    if (r.geographic_relevance) resGeos[r.geographic_relevance] = 1;
    if (r.source_type) resSrcs[r.source_type] = 1;
  });
  sel = document.getElementById('filter-res-geo');
  Object.keys(resGeos).sort().forEach(function(g) {
    var o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o);
  });
  sel = document.getElementById('filter-res-source');
  Object.keys(resSrcs).sort().forEach(function(s) {
    var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  });
}

function updateCounts() {
  document.getElementById('count-funding').textContent = fundingData.length;
  document.getElementById('count-research').textContent = researchData.length;
}

// ---- Tabs ----
function switchTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.tab === tab);
  }
  document.getElementById('view-funding').style.display = tab === 'funding' ? '' : 'none';
  document.getElementById('view-research').style.display = tab === 'research' ? '' : 'none';
}

// ---- Funding table ----
function geoBadgeClass(g) {
  if (!g) return 'geo-other';
  if (g.indexOf('European') >= 0) return 'geo-eu';
  if (g.indexOf('United States') >= 0) return 'geo-us';
  if (g.indexOf('United Kingdom') >= 0) return 'geo-uk';
  if (g.indexOf('Canada') >= 0) return 'geo-ca';
  if (g.indexOf('Global') >= 0) return 'geo-global';
  return 'geo-other';
}

function srcBadgeClass(s) {
  if (!s) return 'type-other';
  if (s === 'Government') return 'type-gov';
  if (s === 'Foundation') return 'type-found';
  if (s === 'Corporate') return 'type-corp';
  if (s === 'Academic') return 'type-acad';
  if (s === 'Multilateral') return 'type-multi';
  if (s === 'Think Tank') return 'type-think';
  return 'type-other';
}

function deadlineDisplay(d, stillOpen) {
  if (!d) return '<span style="color:var(--text-dim)">—</span>';
  if (d === 'rolling') return '<span style="color:var(--green)">Rolling</span>';
  var now = new Date();
  var dl = new Date(d + 'T12:00:00');
  if (isNaN(dl.getTime())) return esc(d);
  var diff = Math.ceil((dl - now) / 86400000);
  if (diff < 0 || stillOpen === 0) return '<span class="deadline-passed">' + d + '</span>';
  if (diff <= 14) return '<span class="deadline-soon">' + d + ' (' + diff + 'd)</span>';
  if (diff <= 30) return '<span style="color:var(--amber)">' + d + '</span>';
  return d;
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function filterFunding() {
  var q = (document.getElementById('search-funding').value || '').toLowerCase();
  var geo = document.getElementById('filter-geo').value;
  var src = document.getElementById('filter-source').value;
  var status = document.getElementById('filter-status').value;

  fundingFiltered = fundingData.filter(function(r) {
    if (q) {
      var haystack = ((r.program_name || '') + ' ' + (r.organization_name || '') + ' ' + (r.thematic_focus || '')).toLowerCase();
      if (haystack.indexOf(q) < 0) return false;
    }
    if (geo && r.geographic_scope !== geo) return false;
    if (src && r.source_type !== src) return false;
    if (status !== '' && String(r.still_open) !== status) return false;
    return true;
  });

  sortFundingData();
  renderFunding();
}

function sortFunding(col) {
  if (fundingSortCol === col) { fundingSortAsc = !fundingSortAsc; }
  else { fundingSortCol = col; fundingSortAsc = true; }
  // Update header
  var ths = document.querySelectorAll('#thead-funding th');
  for (var i = 0; i < ths.length; i++) {
    ths[i].classList.toggle('sorted', ths[i].dataset.col === col);
    if (ths[i].dataset.col === col) {
      ths[i].querySelector('.sort-arrow').textContent = fundingSortAsc ? '▲' : '▼';
    }
  }
  sortFundingData();
  renderFunding();
}

function sortFundingData() {
  var col = fundingSortCol;
  var asc = fundingSortAsc;
  fundingFiltered.sort(function(a, b) {
    var va = a[col]; var vb = b[col];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    if (va < vb) return asc ? -1 : 1;
    if (va > vb) return asc ? 1 : -1;
    return 0;
  });
}

function renderFunding() {
  var tbody = document.getElementById('tbody-funding');
  if (fundingFiltered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg><p>No matching funding opportunities</p></div></td></tr>';
    return;
  }
  var html = '';
  for (var i = 0; i < fundingFiltered.length; i++) {
    var r = fundingFiltered[i];
    html += '<tr data-idx="' + i + '" data-type="funding" onclick="openFundingPanel(this.dataset.idx)">';
    html += '<td class="program">' + esc(r.program_name) + '</td>';
    html += '<td class="org">' + esc(r.organization_name) + '</td>';
    html += '<td><span class="badge ' + geoBadgeClass(r.geographic_scope) + '">' + esc(r.geographic_scope || '—') + '</span></td>';
    html += '<td><span class="badge ' + srcBadgeClass(r.source_type) + '">' + esc(r.source_type || '—') + '</span></td>';
    html += '<td>' + esc(r.budget_amount || '—') + '</td>';
    html += '<td>' + deadlineDisplay(r.submission_deadline, r.still_open) + '</td>';
    html += '<td><span class="badge ' + (r.still_open === 1 ? 'open' : 'closed') + '">' + (r.still_open === 1 ? 'Open' : 'Closed') + '</span></td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

// ---- Research table ----
function filterResearch() {
  var q = (document.getElementById('search-research').value || '').toLowerCase();
  var geo = document.getElementById('filter-res-geo').value;
  var src = document.getElementById('filter-res-source').value;

  researchFiltered = researchData.filter(function(r) {
    if (q) {
      var haystack = ((r.title || '') + ' ' + (r.authors || '') + ' ' + (r.publishing_organization || '') + ' ' + (r.thematic_focus || '')).toLowerCase();
      if (haystack.indexOf(q) < 0) return false;
    }
    if (geo && r.geographic_relevance !== geo) return false;
    if (src && r.source_type !== src) return false;
    return true;
  });

  sortResearchData();
  renderResearch();
}

function sortResearch(col) {
  if (researchSortCol === col) { researchSortAsc = !researchSortAsc; }
  else { researchSortCol = col; researchSortAsc = true; }
  var ths = document.querySelectorAll('#thead-research th');
  for (var i = 0; i < ths.length; i++) {
    ths[i].classList.toggle('sorted', ths[i].dataset.col === col);
    if (ths[i].dataset.col === col) {
      ths[i].querySelector('.sort-arrow').textContent = researchSortAsc ? '▲' : '▼';
    }
  }
  sortResearchData();
  renderResearch();
}

function sortResearchData() {
  var col = researchSortCol;
  var asc = researchSortAsc;
  researchFiltered.sort(function(a, b) {
    var va = a[col]; var vb = b[col];
    if (va == null) va = '';
    if (vb == null) vb = '';
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    if (va < vb) return asc ? -1 : 1;
    if (va > vb) return asc ? 1 : -1;
    return 0;
  });
}

function renderResearch() {
  var tbody = document.getElementById('tbody-research');
  if (researchFiltered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg><p>No matching research publications</p></div></td></tr>';
    return;
  }
  var html = '';
  for (var i = 0; i < researchFiltered.length; i++) {
    var r = researchFiltered[i];
    html += '<tr data-idx="' + i + '" data-type="research" onclick="openResearchPanel(this.dataset.idx)">';
    html += '<td class="program">' + esc(r.title) + '</td>';
    html += '<td class="org">' + esc(r.authors || '—') + '</td>';
    html += '<td class="org">' + esc(r.publishing_organization || '—') + '</td>';
    html += '<td><span class="badge ' + geoBadgeClass(r.geographic_relevance) + '">' + esc(r.geographic_relevance || '—') + '</span></td>';
    html += '<td><span class="badge ' + srcBadgeClass(r.source_type) + '">' + esc(r.source_type || '—') + '</span></td>';
    html += '<td>' + esc(r.publication_date || '—') + '</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

// ---- Detail panels ----
function openFundingPanel(idx) {
  var r = fundingFiltered[idx];
  if (!r) return;
  var html = '';
  html += '<div class="panel-title">' + esc(r.program_name) + '</div>';
  html += '<div class="panel-org">' + esc(r.organization_name) + '</div>';
  html += '<div class="panel-meta">';
  html += '<span class="badge ' + geoBadgeClass(r.geographic_scope) + '">' + esc(r.geographic_scope || '—') + '</span>';
  html += '<span class="badge ' + srcBadgeClass(r.source_type) + '">' + esc(r.source_type || '—') + '</span>';
  html += '<span class="badge ' + (r.still_open === 1 ? 'open' : 'closed') + '">' + (r.still_open === 1 ? 'Open' : 'Closed') + '</span>';
  html += '</div>';

  if (r.thematic_focus) { html += '<div class="panel-section"><div class="panel-section-label">Thematic Focus</div><div class="panel-section-content">' + esc(r.thematic_focus) + '</div></div>'; }
  if (r.budget_amount) { html += '<div class="panel-section"><div class="panel-section-label">Budget</div><div class="panel-section-content">' + esc(r.budget_amount) + '</div></div>'; }
  if (r.format) { html += '<div class="panel-section"><div class="panel-section-label">Format</div><div class="panel-section-content">' + esc(r.format) + '</div></div>'; }
  if (r.submission_deadline) { html += '<div class="panel-section"><div class="panel-section-label">Deadline</div><div class="panel-section-content">' + deadlineDisplay(r.submission_deadline, r.still_open) + '</div></div>'; }
  if (r.notification_date) { html += '<div class="panel-section"><div class="panel-section-label">Notification Date</div><div class="panel-section-content">' + esc(r.notification_date) + '</div></div>'; }
  if (r.specific_instructions) { html += '<div class="panel-section"><div class="panel-section-label">Instructions</div><div class="panel-section-content">' + esc(r.specific_instructions) + '</div></div>'; }
  if (r.source_discovered_date) { html += '<div class="panel-section"><div class="panel-section-label">Discovered</div><div class="panel-section-content">' + esc(r.source_discovered_date) + '</div></div>'; }

  if (r.access_link) { html += '<a class="panel-link" href="' + esc(r.access_link) + '" target="_blank" rel="noopener">Open Call Page →</a>'; }

  document.getElementById('panel-content').innerHTML = html;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function openResearchPanel(idx) {
  var r = researchFiltered[idx];
  if (!r) return;
  var html = '';
  html += '<div class="panel-title">' + esc(r.title) + '</div>';
  html += '<div class="panel-org">' + esc(r.publishing_organization || '') + (r.authors ? ' · ' + esc(r.authors) : '') + '</div>';
  html += '<div class="panel-meta">';
  html += '<span class="badge ' + geoBadgeClass(r.geographic_relevance) + '">' + esc(r.geographic_relevance || '—') + '</span>';
  html += '<span class="badge ' + srcBadgeClass(r.source_type) + '">' + esc(r.source_type || '—') + '</span>';
  html += '</div>';

  if (r.thematic_focus) { html += '<div class="panel-section"><div class="panel-section-label">Thematic Focus</div><div class="panel-section-content">' + esc(r.thematic_focus) + '</div></div>'; }
  if (r.summary) { html += '<div class="panel-section"><div class="panel-section-label">Summary</div><div class="panel-section-content">' + esc(r.summary) + '</div></div>'; }
  if (r.publication_date) { html += '<div class="panel-section"><div class="panel-section-label">Publication Date</div><div class="panel-section-content">' + esc(r.publication_date) + '</div></div>'; }
  if (r.source_discovered_date) { html += '<div class="panel-section"><div class="panel-section-label">Discovered</div><div class="panel-section-content">' + esc(r.source_discovered_date) + '</div></div>'; }

  if (r.access_link) { html += '<a class="panel-link" href="' + esc(r.access_link) + '" target="_blank" rel="noopener">Open Publication →</a>'; }

  document.getElementById('panel-content').innerHTML = html;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

// ---- Keyboard ----
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanel();
});

// ---- Theme toggle ----
(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.getElementById('html-root').classList.add('dark');
  }
})();

document.getElementById('theme-toggle').addEventListener('click', function() {
  var root = document.getElementById('html-root');
  var isDark = root.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  this.textContent = isDark ? '☀️' : '🌙';
});

(function() {
  if (document.getElementById('html-root').classList.contains('dark')) {
    document.getElementById('theme-toggle').textContent = '☀️';
  }
})();

// ---- Boot ----
init();
</script>
