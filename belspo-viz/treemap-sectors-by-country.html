  padding: clamp(6px, 1vh, 10px) clamp(10px, 1.4vw, 14px);
  border-radius: 8px;
  font-size: clamp(11px, 1.25vw, 13px);
  font-weight: 600;
  color: #0f172a;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  white-space: nowrap;
}
.dropdown-button:hover { background: #f8fafc; border-color: rgba(39, 86, 211, 0.4); }
.dropdown-button[aria-expanded="true"] {
  background: #eef2ff;
  border-color: rgba(39, 86, 211, 0.5);
  box-shadow: 0 0 0 3px rgba(39, 86, 211, 0.12);
}
.dropdown-button .chev {
  width: 10px; height: 10px;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(45deg) translate(-2px, -2px);
  transition: transform 0.18s ease;
}
.dropdown-button[aria-expanded="true"] .chev {
  transform: rotate(-135deg) translate(-2px, -2px);
}
.dropdown-label {
  color: #64748b;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 0.78em;
  letter-spacing: 0.04em;
}
.dropdown-value {
  color: #0f172a;
  font-weight: 700;
}

.dropdown-panel {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 1px solid rgba(17, 24, 39, 0.15);
  border-radius: 10px;
  box-shadow: 0 12px 32px rgba(15, 23, 42, 0.18);
  padding: 8px;
  min-width: 220px;
  max-width: min(360px, 92vw);
  max-height: min(48vh, 360px);
  overflow-y: auto;
  z-index: 50;
  display: none;
}
.dropdown.open .dropdown-panel { display: block; }
.dropdown-option {
  display: flex; align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  color: #1f2937;
  cursor: pointer;
  user-select: none;
}
.dropdown-option:hover { background: #f1f5f9; }
.dropdown-option.active { background: #eef2ff; color: #1d4ed8; }
.dropdown-option .opt-square {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
}
.dropdown-option .opt-check {
  width: 14px; height: 14px;
  border: 1.5px solid #cbd5e1;
  border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: #fff;
}
.dropdown-option.checked .opt-check {
  background: #2756d3;
  border-color: #2756d3;
}
.dropdown-option.checked .opt-check::after {
  content: "";
  width: 7px; height: 4px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px, -1px);
}
.dropdown-actions {
  display: flex; justify-content: space-between;
  gap: 8px;
  padding: 6px 4px 2px;
  border-top: 1px solid #e2e8f0;
  margin-top: 4px;
}
.dropdown-action {
  border: none; background: transparent;
  color: #2756d3;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 4px 6px;
  cursor: pointer;
  border-radius: 4px;
}
.dropdown-action:hover { background: #eef2ff; }

/* ── Year range slider (dual-thumb) ──────────────────────────────────── */
.year-range {
  display: flex; align-items: center;
  gap: clamp(8px, 1vw, 14px);
  padding: 6px 10px;
  background: #f8fafc;
  border: 1px solid rgba(17, 24, 39, 0.12);
  border-radius: 10px;
  min-width: clamp(260px, 32vw, 420px);
}
.year-range-label {
  font-size: 0.78em; font-weight: 700; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.year-range-value {
  font-variant-numeric: tabular-nums;
  font-size: clamp(12px, 1.3vw, 14px); font-weight: 700;
  color: #0f172a;
  min-width: 9ch;
  text-align: center;
}
.range-wrapper {
  position: relative;
  flex: 1;
  height: 30px;
  display: flex; align-items: center;
  min-width: 140px;
}
.range-track-bg {
  position: absolute; left: 0; right: 0; top: 50%;
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  transform: translateY(-50%);
  pointer-events: none;
}
.range-track-fill {
  position: absolute; top: 50%;
  height: 6px;
  background: #2756d3;
  border-radius: 3px;
  transform: translateY(-50%);
  pointer-events: none;
}
.range-input {
  -webkit-appearance: none; appearance: none;
  position: absolute; left: 0; right: 0; top: 50%;
  transform: translateY(-50%);
  width: 100%; height: 22px;
  background: transparent;
  outline: none;
  pointer-events: none;
  margin: 0; padding: 0;
}
.range-input::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #2756d3;
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(39, 86, 211, 0.4);
  pointer-events: auto;
  position: relative;
  z-index: 3;
}
.range-input::-moz-range-thumb {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #2756d3;
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(39, 86, 211, 0.4);
  pointer-events: auto;
}

@media (max-height: 500px) {
  .viz-grid { grid-template-rows: 1fr; grid-template-columns: 1fr; }
  #container1 { grid-row: 1; grid-column: 1; }
  #container-controls { display: none !important; }
}
  </style>
  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3plus-hierarchy@1"></script>
</head>
<body>
  <div class="viz-grid">
    <div id="container1" class="container viz-container">
      <div id="viz"></div>
    </div>
    <div id="container-controls">

      <div class="dropdown" id="country-dropdown">
        <button class="dropdown-button" id="country-button" type="button"
                aria-haspopup="listbox" aria-expanded="false">
          <span class="dropdown-label">Country</span>
          <span class="dropdown-value" id="country-value">—</span>
          <span class="chev" aria-hidden="true"></span>
        </button>
        <div class="dropdown-panel" id="country-panel" role="listbox"></div>
      </div>

      <div class="dropdown" id="sector-dropdown">
        <button class="dropdown-button" id="sector-button" type="button"
                aria-haspopup="listbox" aria-expanded="false">
          <span class="dropdown-label">Sectors</span>
          <span class="dropdown-value" id="sector-value">—</span>
          <span class="chev" aria-hidden="true"></span>
        </button>
        <div class="dropdown-panel" id="sector-panel" role="listbox" aria-multiselectable="true"></div>
      </div>

      <div class="year-range" id="year-range">
        <span class="year-range-label">Years</span>
        <span class="year-range-value" id="year-range-value">—</span>
        <div class="range-wrapper" id="range-wrapper">
          <div class="range-track-bg"></div>
          <div class="range-track-fill" id="range-track-fill"></div>
          <input type="range" id="range-min" class="range-input" aria-label="From year">
          <input type="range" id="range-max" class="range-input" aria-label="To year">
        </div>
      </div>

    </div>
  </div>
<script>
var RAW = JSON.parse(document.getElementById("chart-data").textContent);
var VALUE_FORMAT = RAW.value_format || "count";
var VALUE_LABEL  = RAW.value_label || "Value";
var GROUPS = RAW.groups; // [{name, color}, ...]
var YEARS  = (RAW.years || []).slice();
var TOP_N  = +RAW.top_n || 30;
var SUBTITLE_BASE = RAW.subtitle || "";
var TREEMAP_BORDER_RADIUS = 0;
var SHOW_TOOLTIP = 1;

var COUNTRIES = RAW.countries || []; // [{code, name, items: [{name, parent, by_year}]}]
var COUNTRY_BY_CODE = {};
COUNTRIES.forEach(function (c) { COUNTRY_BY_CODE[c.code] = c; });
var activeCountry = RAW.default_country || (COUNTRIES[0] && COUNTRIES[0].code) || null;

var GROUP_COLOR = {};
GROUPS.forEach(function (g) { GROUP_COLOR[g.name] = g.color; });
function getGroupColor(name) { return GROUP_COLOR[name] || "#666"; }

function smartFormatCount(v) {
  if (!isFinite(v)) return "N/A";
  if (Math.abs(v) >= 1e9) return d3.format(".2f")(v / 1e9) + "B";
  if (Math.abs(v) >= 1e6) return d3.format(".1f")(v / 1e6) + "M";
  if (Math.abs(v) >= 1e3) return d3.format(",")(Math.round(v));
  return d3.format(",")(Math.round(v));
}
function formatValue(v) {
  if (VALUE_FORMAT === "percent") return d3.format(".1%")(v);
  if (VALUE_FORMAT === "rate")    return d3.format(",.2f")(v);
  return smartFormatCount(v);
}

function getCountryItems(code) {
  var c = COUNTRY_BY_CODE[code];
  if (!c) return [];
  return (c.items || []).map(function (d) {
    return {
      name:    d.name,
      parent:  d.parent,
      by_year: (d.by_year || []).map(function (v) { return +v || 0; })
    };
  });
}

var ALL_ITEMS = getCountryItems(activeCountry);
var activeGroups = new Set(GROUPS.map(function (g) { return g.name; }));

// Year range state — inclusive [minIdx, maxIdx] into YEARS[].
var yearMinIdx = 0;
var yearMaxIdx = Math.max(0, YEARS.length - 1);

function getDataForRender() {
  var items = ALL_ITEMS.map(function (it) {
    var val = 0;
    for (var k = yearMinIdx; k <= yearMaxIdx; k++) val += (it.by_year[k] || 0);
    return { name: it.name, parent: it.parent, value: val };
  }).filter(function (d) {
    return d.value > 0 && activeGroups.has(d.parent);
  });
  items.sort(function (a, b) { return b.value - a.value; });
  if (TOP_N > 0) items = items.slice(0, TOP_N);
  return items;
}

var treemapData = getDataForRender();
var treemapInstance = null;
var vizContainer = document.getElementById("viz");

// ── Dropdown plumbing ────────────────────────────────────────────────────
function closeAllDropdowns(except) {
  ["country-dropdown", "sector-dropdown"].forEach(function (id) {
    if (id === except) return;
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("open");
    var btn = el.querySelector(".dropdown-button");
    if (btn) btn.setAttribute("aria-expanded", "false");
  });
}

function wireDropdown(rootId) {
  var root = document.getElementById(rootId);
  if (!root) return;
  var btn = root.querySelector(".dropdown-button");
  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    var willOpen = !root.classList.contains("open");
    closeAllDropdowns(willOpen ? rootId : null);
    root.classList.toggle("open", willOpen);
    btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  });
}

document.addEventListener("click", function () { closeAllDropdowns(null); });
document.addEventListener("keydown", function (e) {
  if (e.key === "Escape") closeAllDropdowns(null);
});

// ── Country dropdown ─────────────────────────────────────────────────────
function buildCountryDropdown() {
  var panel = document.getElementById("country-panel");
  if (!panel) return;
  panel.innerHTML = "";
  COUNTRIES.forEach(function (c) {
    var opt = document.createElement("div");
    opt.className = "dropdown-option" + (c.code === activeCountry ? " active" : "");
    opt.setAttribute("role", "option");
    opt.setAttribute("data-country", c.code);
    opt.setAttribute("aria-selected", c.code === activeCountry ? "true" : "false");

    var swatch = document.createElement("span");
    swatch.className = "opt-square";
    swatch.style.backgroundColor = "#2756d3";
    swatch.style.opacity = c.code === activeCountry ? "1" : "0";
    swatch.style.border = c.code === activeCountry ? "none" : "1.5px solid #cbd5e1";

    var lbl = document.createElement("span");
    lbl.textContent = c.name;
    opt.appendChild(swatch);
    opt.appendChild(lbl);

    opt.addEventListener("click", function (e) {
      e.stopPropagation();
      if (c.code === activeCountry) return;
      activeCountry = c.code;
      ALL_ITEMS = getCountryItems(activeCountry);
      buildCountryDropdown();
      updateCountryButtonLabel();
      closeAllDropdowns(null);
      updateVisualization();
    });
    panel.appendChild(opt);
  });
}
function updateCountryButtonLabel() {
  var c = COUNTRY_BY_CODE[activeCountry];
  document.getElementById("country-value").textContent = c ? c.name : "—";
}

// ── Sector dropdown ──────────────────────────────────────────────────────
function buildSectorDropdown() {
  var panel = document.getElementById("sector-panel");
  if (!panel) return;
  panel.innerHTML = "";

  GROUPS.forEach(function (g) {
    var opt = document.createElement("div");
    var on = activeGroups.has(g.name);
    opt.className = "dropdown-option" + (on ? " checked" : "");
    opt.setAttribute("role", "option");
    opt.setAttribute("data-group", g.name);
    opt.setAttribute("aria-selected", on ? "true" : "false");

    var check = document.createElement("span");
    check.className = "opt-check";

    var swatch = document.createElement("span");
    swatch.className = "opt-square";
    swatch.style.backgroundColor = g.color;

    var lbl = document.createElement("span");
    lbl.textContent = g.name;

    opt.appendChild(check);
    opt.appendChild(swatch);
    opt.appendChild(lbl);

    opt.addEventListener("click", function (e) {
      e.stopPropagation();
      if (activeGroups.has(g.name)) {
        if (activeGroups.size === 1) return; // keep at least one
        activeGroups.delete(g.name);
      } else {
        activeGroups.add(g.name);
      }
      buildSectorDropdown();
      updateSectorButtonLabel();
      updateVisualization();
    });

    panel.appendChild(opt);
  });

  var actions = document.createElement("div");
  actions.className = "dropdown-actions";

  var allBtn = document.createElement("button");
  allBtn.type = "button";
  allBtn.className = "dropdown-action";
  allBtn.textContent = "All";
  allBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    activeGroups = new Set(GROUPS.map(function (g) { return g.name; }));
    buildSectorDropdown();
    updateSectorButtonLabel();
    updateVisualization();
  });

  var noneBtn = document.createElement("button");
  noneBtn.type = "button";
  noneBtn.className = "dropdown-action";
  noneBtn.textContent = "Top only";
  noneBtn.title = "Keep only the largest sector";
  noneBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    // Pick the section with the highest total across selected year range / country.
    var totals = {};
    ALL_ITEMS.forEach(function (it) {
      var v = 0;
      for (var k = yearMinIdx; k <= yearMaxIdx; k++) v += (it.by_year[k] || 0);
      totals[it.parent] = (totals[it.parent] || 0) + v;
    });
    var top = null, topVal = -Infinity;
    GROUPS.forEach(function (g) {
      var v = totals[g.name] || 0;
      if (v > topVal) { topVal = v; top = g.name; }
    });
    if (top) {
      activeGroups = new Set([top]);
      buildSectorDropdown();
      updateSectorButtonLabel();
      updateVisualization();
    }
  });

  actions.appendChild(allBtn);
  actions.appendChild(noneBtn);
  panel.appendChild(actions);
}
function updateSectorButtonLabel() {
  var n = activeGroups.size, total = GROUPS.length;
  var val;
  if (n === total) val = "All " + total;
  else if (n === 1) {
    var only = Array.from(activeGroups)[0] || "";
    val = only.length > 24 ? (only.slice(0, 22) + "…") : only;
  } else {
    val = n + " of " + total;
  }
  document.getElementById("sector-value").textContent = val;
}

// ── Year range slider (dual-thumb) ───────────────────────────────────────
function buildYearRange() {
  var rmin = document.getElementById("range-min");
  var rmax = document.getElementById("range-max");
  if (!rmin || !rmax) return;
  var n = YEARS.length;
  if (n < 1) {
    document.getElementById("year-range").style.display = "none";
    return;
  }
  rmin.min = 0; rmin.max = String(n - 1); rmin.step = 1;
  rmax.min = 0; rmax.max = String(n - 1); rmax.step = 1;
  rmin.value = String(yearMinIdx);
  rmax.value = String(yearMaxIdx);

  if (n === 1) {
    rmin.disabled = true; rmax.disabled = true;
  }

  function commit(which) {
    var lo = +rmin.value, hi = +rmax.value;
    if (which === "min" && lo > hi) { hi = lo; rmax.value = String(hi); }
    if (which === "max" && hi < lo) { lo = hi; rmin.value = String(lo); }
    yearMinIdx = lo; yearMaxIdx = hi;
    updateYearRangeUI();
    updateVisualization();
  }
  rmin.addEventListener("input", function () { commit("min"); });
  rmax.addEventListener("input", function () { commit("max"); });

  updateYearRangeUI();
}
function updateYearRangeUI() {
  var rmin = document.getElementById("range-min");
  var rmax = document.getElementById("range-max");
  var fill = document.getElementById("range-track-fill");
  var label = document.getElementById("year-range-value");
  if (!rmin || !rmax || !fill || !label) return;
  var n = YEARS.length;
  var span = Math.max(1, n - 1);
  var leftPct  = (yearMinIdx / span) * 100;
  var rightPct = (yearMaxIdx / span) * 100;
  fill.style.left  = leftPct + "%";
  fill.style.width = (rightPct - leftPct) + "%";
  var y0 = YEARS[yearMinIdx], y1 = YEARS[yearMaxIdx];
  label.textContent = (y0 === y1) ? String(y0) : (y0 + " – " + y1);
}

// ── Treemap render ───────────────────────────────────────────────────────
function ensureTreemapInstance(width, height) {
  if (!vizContainer) return null;
  if (!treemapInstance) {
    treemapInstance = new d3plus.Treemap()
      .select("#viz")
      .data(treemapData)
      .groupBy(["parent", "name"])
      .tooltip(!!SHOW_TOOLTIP)
      .tooltipConfig({
        title: function (d) { return d.name; },
        body: function (d) {
          var grp = d.parent || d.id;
          var val = d.value || 0;
          return "<strong>Group:</strong> " + grp +
                 "<br><strong>" + VALUE_LABEL + ":</strong> " + formatValue(val);
        }
      })
      .sum("value")
      .layoutPadding(2)
      .legend(false)
      .color(function (d) { return getGroupColor(d.parent || d.id); })
      .shapeConfig({
        rx: TREEMAP_BORDER_RADIUS, ry: TREEMAP_BORDER_RADIUS,
        stroke: function (d) {
          return d.depth === 0 ? getGroupColor(d.id) : "transparent";
        },
        strokeWidth: function (d) { return d.depth === 0 ? 3 : 0; }
      })
      .config({ label: function (d) { return d.name; } });
  }
  if (typeof treemapInstance.width === "function" && width) treemapInstance.width(width);
  if (typeof treemapInstance.height === "function" && height) treemapInstance.height(height);
  return treemapInstance;
}

function updateVisualization(width, height) {
  treemapData = getDataForRender();
  var inst = ensureTreemapInstance(width, height);
  if (!inst) return;
  inst.data(treemapData).render();
}

function renderVisualizationForContainer() {
  if (!vizContainer) return;
  var rect = vizContainer.getBoundingClientRect();
  updateVisualization(rect.width, rect.height);
}

// ── Bootstrap ────────────────────────────────────────────────────────────
wireDropdown("country-dropdown");
wireDropdown("sector-dropdown");
buildCountryDropdown();
updateCountryButtonLabel();
buildSectorDropdown();
updateSectorButtonLabel();
buildYearRange();

var resizeTimer;
window.addEventListener("resize", function () {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderVisualizationForContainer, 120);
});
if (typeof ResizeObserver !== "undefined" && vizContainer) {
  new ResizeObserver(renderVisualizationForContainer).observe(vizContainer);
}
renderVisualizationForContainer();
</script>
</body>
