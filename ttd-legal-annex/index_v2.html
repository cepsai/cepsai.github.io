<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WP2 Legislative Annex (plain JSON)</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #1c1917;
    --muted: #78716c;
    --line: #e7e5e4;
    --accent: #1d4ed8;
    --pill-bg: #f5f5f4;
    --warn: #b45309;
    --ok: #15803d;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg);
    background: var(--bg);
  }
  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--line);
    background: white;
  }
  h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; }
  .container { padding: 20px 32px 60px; max-width: 1400px; margin: 0 auto; }
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .controls input, .controls select {
    padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px;
    font: inherit; background: white;
  }
  .controls input { min-width: 280px; }
  .stats { color: var(--muted); font-size: 12px; margin-left: auto; align-self: center; }
  table {
    width: 100%; border-collapse: collapse; background: white;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
  }
  th, td {
    text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  th { background: #f5f5f4; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #fafaf9; }
  tr.expanded { background: #fffbeb !important; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; background: var(--pill-bg); color: var(--fg);
  }
  .pill.in_force, .pill.granted, .pill.law_upheld { background: #dcfce7; color: var(--ok); }
  .pill.enjoined, .pill.stay_not_vacated { background: #fee2e2; color: var(--bad); }
  .pill.in_force_with_litigation, .pill.active, .pill.ongoing { background: #fef3c7; color: var(--warn); }
  .detail { background: #fafaf9; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .detail h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.04em; }
  .detail dl { display: grid; grid-template-columns: 200px 1fr; gap: 4px 16px; margin: 0 0 16px; }
  .detail dt { color: var(--muted); font-size: 12px; }
  .detail dd { margin: 0; font-size: 13px; }
  .detail ul { margin: 0; padding-left: 18px; }
  .detail li { margin-bottom: 6px; font-size: 13px; }
  .detail a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .detail a:hover { text-decoration: underline; }
  .empty { padding: 60px; text-align: center; color: var(--muted); }
  .err { padding: 20px; background: #fee2e2; color: var(--bad); border-radius: 6px; margin: 20px 0; }
</style>
</head>
<body>
<header>
  <h1>WP2 Legislative Annex</h1>
</header>
<div class="container">
  <div id="status" class="empty">Loading…</div>
  <div id="app" hidden>
    <div class="controls">
      <input id="q" type="search" placeholder="Search title, summary, ID, jurisdiction…" />
      <select id="jurisdiction"><option value="">All jurisdictions</option></select>
      <select id="category"><option value="">All categories</option></select>
      <select id="status"><option value="">All statuses</option></select>
      <span class="stats" id="stats"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Measure</th>
          <th>Jurisdiction</th>
          <th>Category</th>
          <th>Status</th>
          <th>Effective</th>
          <th>Last court action</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
const BASE = "secure/new/";
const FILES = ["measures.json", "litigation_events.json", "sources.json"];

const state = {
  measures: [],
  events: [],
  sources: [],
  expanded: null,
  filters: { q: "", jurisdiction: "", category: "", status: "" },
};

async function load() {
  try {
    const [measures, events, sources] = await Promise.all(
      FILES.map(f => fetch(BASE + f).then(r => {
        if (!r.ok) throw new Error(`${f}: HTTP ${r.status}`);
        return r.json();
      }))
    );
    state.measures = measures;
    state.events = events;
    state.sources = sources;
    document.getElementById("status").hidden = true;
    document.getElementById("app").hidden = false;
    initFilters();
    render();
  } catch (e) {
    document.getElementById("status").innerHTML = `<div class="err">Failed to load: ${e.message}</div>`;
  }
}

function unique(arr, key) {
  return [...new Set(arr.map(x => x[key]).filter(Boolean))].sort();
}

function initFilters() {
  const fill = (id, vals) => {
    const sel = document.getElementById(id);
    vals.forEach(v => {
      const o = document.createElement("option");
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  };
  fill("jurisdiction", unique(state.measures, "jurisdiction"));
  fill("category", unique(state.measures, "category"));
  fill("status", unique(state.measures, "legislative_status"));

  document.getElementById("q").addEventListener("input", e => { state.filters.q = e.target.value.toLowerCase(); render(); });
  ["jurisdiction", "category", "status"].forEach(k => {
    document.getElementById(k).addEventListener("change", e => { state.filters[k] = e.target.value; render(); });
  });
}

function matches(m) {
  const f = state.filters;
  if (f.jurisdiction && m.jurisdiction !== f.jurisdiction) return false;
  if (f.category && m.category !== f.category) return false;
  if (f.status && m.legislative_status !== f.status) return false;
  if (f.q) {
    const hay = [m.measure_id, m.title, m.jurisdiction, m.category]
      .filter(Boolean).join(" ").toLowerCase();
    if (!hay.includes(f.q)) return false;
  }
  return true;
}

function pill(value) {
  if (!value) return "";
  const cls = String(value).replace(/[^a-z_]/gi, "_");
  return `<span class="pill ${cls}">${value}</span>`;
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function detailHtml(m) {
  const events = state.events.filter(e => e.measure_id === m.measure_id);
  const sources = state.sources.filter(s => s.measure_id === m.measure_id);

  const fields = [
    ["Measure ID", m.measure_id],
    ["Title", m.title],
    ["Summary", m.measure_text_summary],
    ["Status detail", m.status_detail],
    ["Enforcement authority", m.enforcement_authority],
    ["Legal obligations", m.legal_obligations],
    ["Scope", m.scope_of_application],
    ["Verification requirements", m.verification_requirements],
    ["Procedural safeguards", m.procedural_safeguards],
    ["Technical standards", m.technical_standards_refs],
  ].filter(([_, v]) => v);

  const dl = fields.map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join("");

  const ev = events.length ? `<h3>Litigation events (${events.length})</h3><ul>${
    events.map(e => `<li><strong>${escapeHtml(e.event_date || "—")}</strong> · ${escapeHtml(e.event_type || "")} ${pill(e.status || e.status_after_event || "")}<br>${escapeHtml(e.event_summary || e.summary || "")}${
      e.source_url ? ` <a href="${escapeHtml(e.source_url)}" target="_blank" rel="noopener">[source]</a>` : ""
    }</li>`).join("")
  }</ul>` : "";

  const src = sources.length ? `<h3>Sources (${sources.length})</h3><ul>${
    sources.map(s => `<li><strong>${escapeHtml(s.source_type || "")}</strong> · ${escapeHtml(s.publisher || "")} · ${escapeHtml(s.tier || "")}<br>${escapeHtml(s.title || "")} <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">[link]</a>${
      s.notes ? `<br><em>${escapeHtml(s.notes)}</em>` : ""
    }</li>`).join("")
  }</ul>` : "";

  return `<td colspan="6"><div class="detail"><h3>Details</h3><dl>${dl}</dl>${ev}${src}</div></td>`;
}

function render() {
  const rows = state.measures.filter(matches);
  document.getElementById("stats").textContent = `${rows.length} of ${state.measures.length} measures`;
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";
  rows.forEach(m => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${escapeHtml(m.title || m.measure_id)}</strong><br><span style="color:var(--muted);font-size:12px">${escapeHtml(m.measure_id)}</span></td>
      <td>${escapeHtml(m.jurisdiction || "")}</td>
      <td>${escapeHtml(m.category || "")}</td>
      <td>${pill(m.legislative_status)}</td>
      <td>${escapeHtml(m.effective_date || "")}</td>
      <td>${escapeHtml(m.last_court_action_date || "")}</td>
    `;
    tr.addEventListener("click", () => toggle(m.measure_id));
    tbody.appendChild(tr);
    if (state.expanded === m.measure_id) {
      tr.classList.add("expanded");
      const detail = document.createElement("tr");
      detail.innerHTML = detailHtml(m);
      tbody.appendChild(detail);
    }
  });
}

function toggle(id) {
  state.expanded = state.expanded === id ? null : id;
  render();
}

load();
</script>
</body>
</html>
