<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pacific · Digital only · European donors · Disbursements</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e5e9f0;--non:#cbd5e1;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#f6f8fb;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .grid{height:100vh;width:100vw;display:grid;gap:10px;padding:10px;
    grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(1,1fr)}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    overflow:hidden;display:flex;flex-direction:column}
  .chead{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .cname{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;border-radius:8px;padding:2px 7px;white-space:nowrap}
  .cstats{font-size:12px;color:var(--muted);margin:2px 0 8px}
  .cstats b{color:var(--ink)}
  .drow{display:grid;grid-template-columns:112px 1fr auto;align-items:center;gap:8px;margin:5px 0;font-size:12.5px}
  .dname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#334155}
  .bar{display:flex;height:15px;border-radius:4px;overflow:hidden}
  .bar.non{background:var(--non)} .bar.trk{background:#eef2f6}
  .bar .s{height:100%}
  .dval{font-variant-numeric:tabular-nums;color:#475569;text-align:right;white-space:nowrap}
  .empty{font-size:12px;color:#94a3b8;font-style:italic}
</style></head>
<body><div class="grid"><div class="card"><div class="chead"><span class="cname">Fiji</span><span class="pill" style="background:#0284c7">PACIFIC</span></div><div class="cstats"><b>$6m</b> digital · <b>5</b> donors</div><div class="drow"><div class="dname" title="United Kingdom">United Kingdom</div><div class="bar trk" style="width:100.00%"><span class="s" style="width:11.585%;background:#2563eb"></span><span class="s" style="width:32.927%;background:#d97706"></span><span class="s" style="width:55.488%;background:#16a34a"></span></div><div class="dval">$3m</div></div><div class="drow"><div class="dname" title="EU Institutions">EU Institutions</div><div class="bar trk" style="width:64.02%"><span class="s" style="width:100.000%;background:#16a34a"></span></div><div class="dval">$2m</div></div><div class="drow"><div class="dname" title="France">France</div><div class="bar trk" style="width:7.62%"><span class="s" style="width:100.000%;background:#16a34a"></span></div><div class="dval">$0m</div></div><div class="drow"><div class="dname" title="Germany">Germany</div><div class="bar trk" style="width:3.00%"><span class="s" style="width:100.000%;background:#2563eb"></span></div><div class="dval">$0m</div></div><div class="drow"><div class="dname" title="Ireland">Ireland</div><div class="bar trk" style="width:3.00%"><span class="s" style="width:66.667%;background:#2563eb"></span><span class="s" style="width:33.333%;background:#16a34a"></span></div><div class="dval">$0m</div></div></div><div class="card"><div class="chead"><span class="cname">Palau</span><span class="pill" style="background:#0284c7">PACIFIC</span></div><div class="cstats"><b>$0m</b> digital · <b>0</b> donors</div><div class="empty">No data in this view.</div></div></div></body></html>
