<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital ODA — Size vs Digital Share by EU Country</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #fff; color: #0f172a; height: 100vh; overflow: hidden; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ─── CHART fills the page ─────────────────────────────────────────────── */
    #chartwrap { flex: 1; min-height: 0; position: relative; }
    #chart { width: 100%; height: 100%; display: block; }

    .dot { cursor: pointer; transition: opacity 0.12s; }
    .dot:hover { stroke: #0f172a; stroke-width: 1.5; }
    .dot-lab { font-size: 13px; font-weight: 700; fill: #1e293b; pointer-events: none; }
    .axis-line { stroke: #cbd5e1; stroke-width: 1; }
    .grid-line { stroke: #eef2f7; stroke-width: 1; }
    .ref-line { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; }
    .ref-lab { font-size: 12px; font-weight: 700; fill: #94a3b8; }
    .tick-lab { font-size: 12px; fill: #64748b; font-variant-numeric: tabular-nums; }
    .axis-title { font-size: 14px; font-weight: 800; fill: #475569; }

    /* ─── BOTTOM BAR: source (left) · legend (centre) · CEPS logo (right) ───── */
    .bottom { background: #fff; border-top: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: clamp(10px, 2vw, 28px); padding: clamp(8px, 1.5vh, 16px) clamp(14px, 2.5vw, 28px); min-height: clamp(44px, 7vh, 80px); }
    .ctrl-left { justify-self: start; display: flex; align-items: center; min-width: 0; }
    .ctrl-center { justify-self: center; display: flex; align-items: center; }
    .ctrl-right { justify-self: end; display: flex; align-items: center; }

    .source-text { min-width: 0; font-size: clamp(13px, 2vw, 20px); font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-text a, .source-text a:visited { color: #2756d3; text-decoration: underline; }

    .legend { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: clamp(13px, 2vw, 20px); font-weight: 600; color: #333; }
    .legend-square { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12) inset; }

    .logo-link { height: clamp(28px, 5vh, 48px); display: flex; align-items: center; flex-shrink: 0; }
    .logo { height: 100%; width: auto; max-height: 100%; object-fit: contain; }

    /* URL switches: ?legend=0 ?source=0 ?chrome=0 */
    body.no-legend .legend { display: none; }
    body.no-source .source-text { display: none; }
    body.no-chrome .bottom { display: none; }
    @media (max-height: 380px) { .bottom { display: none; } }

    .tip { position: fixed; pointer-events: none; z-index: 99; background: #0f172a; color: #fff; font-size: 12px; line-height: 1.5; padding: 8px 10px; border-radius: 7px; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25); opacity: 0; transition: opacity 0.1s; max-width: 280px; }
    .tip.show { opacity: 1; }
  </style>
  <script src="tm_eu_funder.js"></script>
</head>

<body>
  <div class="app">
    <div id="chartwrap">
      <svg id="chart"></svg>
    </div>

    <div class="bottom">
      <div class="ctrl-left">
        <div class="source-text" id="source-text">Source: <a href="https://stats.oecd.org/Index.aspx?DataSetCode=CRS1" target="_blank" rel="noopener">OECD CRS</a></div>
      </div>
      <div class="ctrl-center">
        <div class="legend" id="legend">
          <span class="legend-item"><span class="legend-square" style="background:#2563eb"></span>Digital Governance</span>
          <span class="legend-item"><span class="legend-square" style="background:#16a34a"></span>Digital Inclusion</span>
          <span class="legend-item"><span class="legend-square" style="background:#d97706"></span>Hard Infrastructure</span>
        </div>
      </div>
      <div class="ctrl-right">
        <a href="https://www.ceps.eu" target="_blank" rel="noopener" class="logo-link" aria-label="CEPS">
          <img src="ceps-logo.png" class="logo" alt="CEPS logo" />
        </a>
      </div>
    </div>
  </div>

  <script>
    var D = window.TM_EU_FUNDER || {};
    var YEARS = window.TM_EU_FUNDER_YEARS || [2019, 2020, 2021, 2022, 2023, 2024];
    var TYPES = [["g", "Digital Governance", "#2563eb"], ["i", "Digital Inclusion", "#16a34a"], ["f", "Hard Infrastructure", "#d97706"]];

    // ---- config via URL params (?metric=c ?years=2022,2023 ?legend=0 ?source=0 ?chrome=0) ----
    var P = new URLSearchParams(location.search);
    var metric = P.get("metric") === "c" ? "c" : "d";
    var years = new Set(YEARS);
    if (P.get("years") && P.get("years") !== "all") {
      var ys = P.get("years").split(/[,~]/).map(function (s) { return parseInt(s, 10); }).filter(function (n) { return !isNaN(n); });
      if (ys.length) years = new Set(ys);
    }
    if (P.get("legend") === "0") document.body.classList.add("no-legend");
    if (P.get("source") === "0") document.body.classList.add("no-source");
    if (P.get("chrome") === "0") document.body.classList.add("no-chrome");

    function fmtUSD(m) {
      m = +m || 0;
      if (m >= 1000) return "$" + (m / 1000).toFixed(2) + "B";
      if (m >= 1) return "$" + m.toFixed(1) + "M";
      if (m > 0) return "$" + (m * 1000).toFixed(0) + "K";
      return "$0";
    }

    function aggCountry(donor) {
      var m = metric, tot = 0, g = 0, i = 0, f = 0;
      var yrs = D[donor] || {};
      years.forEach(function (y) {
        var r = yrs[String(y)]; if (!r) return;
        tot += r["t" + m]; g += r["g" + m]; i += r["i" + m]; f += r["f" + m];
      });
      return { tot: tot, g: g, i: i, f: f, dig: g + i + f };
    }
    function domType(a) {
      var best = TYPES[0], bv = -1;
      TYPES.forEach(function (ty) { if (a[ty[0]] > bv) { bv = a[ty[0]]; best = ty; } });
      return best;
    }

    var tip = document.createElement("div");
    tip.className = "tip"; document.body.appendChild(tip);
    function showTip(html, e) { tip.innerHTML = html; tip.classList.add("show"); tip.style.left = (e.clientX + 14) + "px"; tip.style.top = (e.clientY + 14) + "px"; }
    function hideTip() { tip.classList.remove("show"); }

    var NS = "http://www.w3.org/2000/svg";
    function el(name, attrs) { var n = document.createElementNS(NS, name); for (var k in attrs) n.setAttribute(k, attrs[k]); return n; }

    function render() {
      var rows = [];
      Object.keys(D).forEach(function (donor) {
        var a = aggCountry(donor);
        if (a.tot <= 0 || a.dig <= 0) return;   // dig<=0 can't sit on a log axis
        a.donor = donor; a.pct = a.dig / a.tot * 100; rows.push(a);
      });

      var wrap = document.getElementById("chartwrap");
      var W = wrap.clientWidth, H = wrap.clientHeight;
      var mL = 86, mR = 36, mT = 30, mB = 60;
      var pw = W - mL - mR, ph = H - mT - mB;

      var minDig = rows.reduce(function (m, r) { return Math.min(m, r.dig); }, Infinity);
      var maxDig = rows.reduce(function (m, r) { return Math.max(m, r.dig); }, 0);
      var maxPct = rows.reduce(function (m, r) { return Math.max(m, r.pct); }, 0);
      var maxTot = rows.reduce(function (m, r) { return Math.max(m, r.tot); }, 0) || 1;
      var loMin = Math.floor(Math.log10(Math.max(minDig, 0.01)));
      var loMax = Math.ceil(Math.log10(Math.max(maxDig, 1)));
      if (loMax <= loMin) loMax = loMin + 1;
      var yMax = Math.max(10, Math.ceil(maxPct / 10) * 10 + 5);

      function xS(v) { return mL + (Math.log10(v) - loMin) / (loMax - loMin) * pw; }
      function yS(v) { return mT + ph - (v / yMax) * ph; }
      var rMax = Math.max(10, Math.min(48, ph / 9));
      function rS(tot) { return 5 + Math.sqrt(tot / maxTot) * rMax; }

      var svg = document.getElementById("chart");
      svg.setAttribute("viewBox", "0 0 " + W + " " + H);
      while (svg.firstChild) svg.removeChild(svg.firstChild);

      for (var p = 0; p <= yMax; p += 10) {
        svg.appendChild(el("line", { class: "grid-line", x1: mL, y1: yS(p), x2: mL + pw, y2: yS(p) }));
        var yt = el("text", { class: "tick-lab", x: mL - 10, y: yS(p) + 4, "text-anchor": "end" });
        yt.textContent = p + "%"; svg.appendChild(yt);
      }
      for (var lo = loMin; lo <= loMax; lo++) {
        var xv = Math.pow(10, lo);
        svg.appendChild(el("line", { class: "grid-line", x1: xS(xv), y1: mT, x2: xS(xv), y2: mT + ph }));
        var xt = el("text", { class: "tick-lab", x: xS(xv), y: mT + ph + 20, "text-anchor": "middle" });
        xt.textContent = fmtUSD(xv); svg.appendChild(xt);
      }

      svg.appendChild(el("line", { class: "axis-line", x1: mL, y1: mT + ph, x2: mL + pw, y2: mT + ph }));
      svg.appendChild(el("line", { class: "axis-line", x1: mL, y1: mT, x2: mL, y2: mT + ph }));

      var pcts = rows.map(function (r) { return r.pct; }).sort(function (a, b) { return a - b; });
      var med = pcts.length ? (pcts.length % 2 ? pcts[(pcts.length - 1) / 2] : (pcts[pcts.length / 2 - 1] + pcts[pcts.length / 2]) / 2) : 0;
      svg.appendChild(el("line", { class: "ref-line", x1: mL, y1: yS(med), x2: mL + pw, y2: yS(med) }));

      var xttl = el("text", { class: "axis-title", x: mL + pw / 2, y: H - 16, "text-anchor": "middle" });
      xttl.textContent = "Digital ODA (log scale)"; svg.appendChild(xttl);
      var yttl = el("text", { class: "axis-title", x: 20, y: mT + ph / 2, "text-anchor": "middle", transform: "rotate(-90 20 " + (mT + ph / 2) + ")" });
      yttl.textContent = "Digital share of own ODA"; svg.appendChild(yttl);

      rows.sort(function (a, b) { return b.tot - a.tot; });
      rows.forEach(function (a) {
        var dt = domType(a);
        var cx = xS(a.dig), cy = yS(a.pct), r = rS(a.tot);
        var c = el("circle", { class: "dot", cx: cx, cy: cy, r: r, fill: dt[2], "fill-opacity": 0.62, stroke: dt[2], "stroke-width": 1 });
        c.addEventListener("mousemove", function (e) {
          showTip("<b>" + a.donor + "</b><br>" + a.pct.toFixed(1) + "% of own ODA is digital<br>" +
            fmtUSD(a.dig) + " digital of " + fmtUSD(a.tot) + " total<br>Mostly " + dt[1], e);
        });
        c.addEventListener("mouseleave", hideTip);
        svg.appendChild(c);
        // place label right of bubble, flipping left near the right edge
        var estW = a.donor.length * 7.2 + 8;
        var right = cx + r + 6 + estW <= mL + pw;
        var t = el("text", { class: "dot-lab", x: right ? cx + r + 6 : cx - r - 6, y: cy + 4, "text-anchor": right ? "start" : "end" });
        t.textContent = a.donor; svg.appendChild(t);
      });
    }

    render();
    var raf;
    window.addEventListener("resize", function () { cancelAnimationFrame(raf); raf = requestAnimationFrame(render); });
  </script>
</body>

</html>
