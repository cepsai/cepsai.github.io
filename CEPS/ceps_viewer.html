t-of-reforms-supported-by-the-recovery-and-resilience-facility-in-the-area-of-the-labour-market/", "excerpt": "The Recovery and Resilience Facility (RRF) is the EU’s flagship instrument to support post-pandemic recovery by enhancing resilience, preparedness, adjustment c", "full_text": "", "wordcount": 184}, {"source": "publication", "date": "2026-01-27T15:05:06+01:00", "title": "JUSTICE, INTERRUPTED", "authors": ["Julia Pocze", "Sergio Carrera"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2026/01/Policy-Brief_Revisiting-transitional-justice-truthand-reconciliation-efforts-at-the-EU-level-and-in-Germany-Romania-Spain-and-Sweden.pdf", "page_url": "https://www.ceps.eu/ceps-publications/justice-interrupted/", "excerpt": "Where are we on the road towards truth, reconciliation and transitional justice for Roma communities? Following the EU-funded CHACHIPEN  project’s in-depth exam", "full_text": "", "wordcount": 249}, {"source": "publication", "date": "2026-01-23T10:36:18+01:00", "title": "European Defence Projects of Common Interest: from concept to practice", "authors": ["Steven Blockmans", "Daniel Fiott"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/european-defence-projects-of-common-interest-from-concept-to-practice/", "page_url": "https://www.ceps.eu/ceps-publications/european-defence-projects-of-common-interest-from-concept-to-practice/", "excerpt": "The development of European Defence Projects of Common Interest (EDPCIs) represents a decisive step towards strengthening the EU’s crisis response, economic com", "full_text": "", "wordcount": 215}, {"source": "publication", "date": "2026-01-20T09:54:38+01:00", "title": "How the EU can pursue strategic cooperation on secondary raw materials with the Western Balkans", "authors": ["Edoardo Righetti", "Deniz Tekin", "Vasileios Rizos"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/01/2026-01-ERCC-OSF-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-the-eu-can-pursue-strategic-cooperation-on-secondary-raw-materials-with-the-western-balkans/", "excerpt": "Europe’s green and digital transitions are increasing demand for critical raw materials (CRMs), just as geopolitical risks and trade tensions are reshaping glob", "full_text": "", "wordcount": 165}, {"source": "publication", "date": "2026-01-19T16:15:13+01:00", "title": "Annual Report 2025", "authors": ["Julien Libert", "Daniel Cassidy-Deketelaere"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/2026/01/VRYRJg9C-Annual-Report-2025-V-final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/annual-report-2025/", "excerpt": "We are happy to publish CEPS’ Annual Report 2025 . It presents CEPS’ activities, achievements and key highlights throughout the year. It features, among others,", "full_text": "", "wordcount": 43}, {"source": "commentary", "date": "2026-01-15T16:49:46", "title": "Grabbing Greenland – and how it would impact NATO and the EU", "authors": ["Steven Blockmans"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/grabbing-greenland-and-how-it-would-impact-nato-and-the-eu/", "page_url": "https://www.ceps.eu/grabbing-greenland-and-how-it-would-impact-nato-and-the-eu/", "excerpt": "An American move on Greenland wouldn’t finish NATO or the EU – but the Trump administration’s arguments already justify a dedicated European defence pillar. Its threats to ‘take over’ Greenland are inconsistent with NATO’s core logic, namely respect for members’ sovereignty. They…", "full_text": "An American move on Greenland wouldn’t finish NATO or the EU – but the Trump administration’s arguments already justify a dedicated European defence pillar. Its threats to ‘take over’ Greenland are inconsistent with NATO’s core logic, namely respect for members’ sovereignty. They contradict the principle that collective security is achieved through cooperation rather than coercion among allies. What’s more, Donald Trump’s arguments are based on conjecture rather than facts. Greenland is not encircled by Russian and Chinese warships. And Copenhagen has been willing to discuss Arctic security and to increase the US troop presence on the island, while beefing up its own military investment – only to be ridiculed by Trump. NATO has so far insisted that its task is one of collective security, i.e. including the US. The Secretary-General has insisted that the Alliance is ideal for the US, Denmark and other allies to discuss Arctic security more widely… if only Washington were to make bona fide use of it. Alas, the European response has been slow and fragmented, partly because Denmark didn’t initially want to put the issue on the EU agenda. Besides the leaders of a handful of EU Member States , a small grouping of Nordic allies and EU institutions speaking out to defend international law, Danish sovereignty and the principle of self-determination, a wider discussion among EU Member States is only now getting underway. There have been impassioned pleas for European governments to show some steel, for example, by threatening to close US military bases in Europe, ban purchases of US treasuries, or impose curbs on the reach of the tech ‘broligarchs’ in the EU, alongside tariffs on certain goods that America needs from Europe. But internal divisions will likely hold the EU back from signalling that it can increase the costs of an American adventure in Greenland, except perhaps in areas of supranational competence. While some have paid lip-service, European governments have generally adopted a policy of ‘ strategic supplication ’ towards Trump to keep the US onside over Ukraine – with some success so far. Showing some EU steel But in the current political circumstances, it’s highly unlikely that the EU would put boots on the ground to deter an American military intervention, as alluded to by the chairman of the EU Military Committee one year ago. It’s also improbable that Trump’s bellicose language provides sufficient legal grounds to trigger the EU’s mutual assistance clause (Article 42.7 TEU) – after all, Denmark hasn’t yet been ‘the victim of armed aggression on its territory’. While the means of aggression may include cyber and other covert operations, they need to be accompanied by traditional military action to meet the legal standard. And that hasn’t happened yet. Importantly, Greenland’s autonomous status doesn’t weaken Denmark’s rights under Article 42.7 TEU. According to Article 52.1 TEU, the Treaties apply in principle to the entire territory of the Member States. Even if Greenland’s involvement in external relations has increased after the island obtained ‘home rule’ from Denmark in 1979 and all but ‘left’ the European Communities in 1985 , it retained the status of ‘overseas territory’ under EU law. Denmark still maintains responsibility for Greenland’s foreign affairs, defence and security policy under the 2009 Act on Self-Government , which was passed after 75 % of Greenlanders voted for more ‘self-rule’ in a referendum on autonomy. A kinetic move by the US army against Greenland would cross the EU’s legal threshold to activate Article 42.7 TEU, but it would also, as in the case of Iraq in 2003, deepen the existing divides between Member States. While implementing Article 42.7 TEU doesn’t require any formal decision or Council conclusions, the EU’s mutual assistance clause – like NATO’s Article 5 – is purely intergovernmental in nature. Also, activating the mutual assistance clause doesn’t in itself imply a civilian mission or military operation in the sense of Article 43.1 TEU, even if the legal landscape, i.e. the part on Common Security and Defence Policy (CSDP) in the Treaty, provides for more significant EU involvement. However, given the political lay of the land in the EU, invoking Article 42.7 TEU would probably lead to mostly symbolic pledges of support. While Article 42.7 TEU implies that the neutrality of some Member States would be respected, it’s not unthinkable that other Member State governments, whose political allegiance is more with the Union’s adversaries than the EU itself, might cop out of the legally binding commitment. The end of NATO? Even if Article 42.7 TEU enables a Member State to request assistance from other Member States when the armed aggression comes from a NATO ally, the fundamental choices about security and defence made by 23 Member States are still made in relation to NATO. Yet if push comes to shove and the US annexes Greenland with a mix of military bravado and hybrid means, then this would gravely affect NATO. It simply wouldn’t be able to respond, as military action must be approved unanimously and the US is the key member of the Alliance. An American move against Greenland would probably not spell instant death for NATO, as Danish Prime Minister Mette Frederiksen has suggested. But a slower death would be still unprecedented and dangerous – for Europe and the US. As long as there’s a belief in European capitals that democracy will hold in the US and there remains near-term hope of a change in administration , it wouldn’t be in the European allies’ interest to declare NATO finished. Indeed, an intra-Alliance war of conquest could be later portrayed as a horrific, unforgivable aberration. A European defence pillar Pending a course correction from Washington, both NATO and the EU are de facto and de jure compromised. Trump is no stranger to flip-flopping on policy initiatives when the costs of a foreign adventure become too high but until he dilutes his demands or abandons his quest altogether, the dangers to Greenland, Denmark, NATO and the EU remain. That’s why willing, able and trusted states should strengthen a European pillar not within but outside and complementary to NATO, i.e. one that can ‘plug and play’ with the US in the Alliance where it can and act autonomously where it must. These states might deploy a deterrent force to Greenland via groupings such as the UK-Scandinavian Joint Expeditionary Force or the five-country Nordic Defence Cooperation format. EUROCORPS and the European Air Transport Command (EATC) are prominent examples of voluntary arrangements which supplement those of national armed forces with multilateral headquarters and military command structures. The EU states and Nordic allies that have come out in support of Denmark should waste no time in connecting and consolidating ‘minilateral’ security arrangements that can fill the gap. Turning minilateralism into strategy is essential to move ‘ from patchwork to phalanx ’. The original, longer article that this CEPS Expert Commentary is based on was first published on Verfassungblog.de .", "wordcount": 1147}, {"source": "commentary", "date": "2026-01-07T11:18:24", "title": "The European Commission is neglecting evidence-based law-making", "authors": ["J. Scott Marcus"], "topics": ["EU Institutions & Policy-making"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/the-commissions-neglect-of-evidence-based-law-making/", "page_url": "https://www.ceps.eu/the-commissions-neglect-of-evidence-based-law-making/", "excerpt": "Simplification of EU law is needed, but what is done and how are hugely important. The laws that need re-thinking are complex and intertwined. To surgically trim fat from the regulatory corpus without killing the patient, solid evidence-based analysis is needed as never before. T…", "full_text": "Simplification of EU law is needed, but what is done and how are hugely important. The laws that need re-thinking are complex and intertwined. To surgically trim fat from the regulatory corpus without killing the patient, solid evidence-based analysis is needed as never before. The European Commission is proposing a flurry of new omnibus laws, supposedly with the goal of simplifying EU regulation and reducing the burdens on firms. This is a worthy goal – no one disputes that the number and complexity of EU laws have rapidly grown over the past 20 years, or that the regulatory burdens on EU-based companies put them at a competitive disadvantage. With deglobalisation in full swing and the transatlantic relationship in tatters, there is indeed the need to strengthen the EU’s competitiveness. Legal and regulatory simplification are part of this. The second von der Leyen term began with great promise. The mission letter to the commissioner for implementation and simplification called on him not only “to reduce the administrative and reporting burden for both people and companies” but also “to ensure that EU rules are implemented and enforced better… strengthening and ensuring full compliance with the Commission’s standards for better law-making”. No one questions the need for the Commission to move more quickly or to bypass red tape during a true crisis, but this can be abused. The European Ombudsman has now identified “procedural shortcomings in how the Commission prepared the legislative proposals… which, taken together, amount to maladministration”. She found poorly substantiated claims of urgency; a failure to properly consult stakeholders; and inadequate public consultation based on her review of complaints about the ‘Omnibus I’ simplification package (dealing with corporate due diligence and sustainability in CSRD, CSDDD, and Taxonomy); migration; and the common agricultural policy (CAP). We have argued for years that the Commission makes too many weakly substantiated claims of urgency , and that this cannot be a basis to simply stop work . When we presented our own study of Omnibus I to the European Parliament, the Commission responded that there was really no duplicate reporting among the three laws – the real problems were deeper and more subtle. This proved to be correct. We were astonished that the Commission would directly contradict the strongest justification for its own legislative proposal. Now that we learn from the Ombudsman that interservice consultation was limited to 24 hours over a weekend, we can understand how one part of the Commission could fail to understand things that were well known to other parts of the Commission. The Ombudsman also found too little concern with environmental goals. We would argue that the legislative proposal for Omnibus I pays too little attention to any of the goals of CSRD, CSDDD, or Taxonomy. The Commission argued that compliance with its Better Regulation Guidelines and Toolkit is optional – it’s not obliged to regulate well. The Ombudsman forcefully rejected this claim. The public expects adherence to good governance principles, and the Treaties require it. The Commission’s lack of commitment to good evidence-based law-making practice isn’t just an academic matter – it undermines trust in the EU as a well-functioning, liberal democratic alternative to the increasingly authoritarian systems of Europe’s systemic rivals, both east and west. We need to move more quickly, but haste makes waste. Enacting ill-considered and poorly substantiated new laws, without considering the knowledge held by a sufficiently wide range of stakeholders, is unlikely to solve the problems that these new laws seek to address. And it risks replacing old errors with new errors. The Commission urgently needs to renew its commitment to good law-making practice. This CEPS Expert Commentary was originally published on Euractiv, which you can access here .", "wordcount": 616}, {"source": "publication", "date": "2026-01-06T11:57:51+01:00", "title": "Digital product passports: the golden thread through textile recycling?", "authors": ["Patricia Urban", "Vasileios Rizos", "Marika Moreschi"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/01/TsIhdxEF-c598622deb.pdf", "page_url": "https://www.ceps.eu/ceps-publications/digital-product-passports-the-golden-thread-through-textile-recycling/", "excerpt": "The European textile sector continues to operate on largely linear production models, with around 73 % of post-consumer textiles in the EU incinerated or landfi", "full_text": "", "wordcount": 283}, {"source": "commentary", "date": "2025-12-17T12:53:33", "title": "Why Ursula von der Leyen’s second term is struggling", "authors": ["Sophia Russack"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/why-ursula-von-der-leyens-second-term-is-struggling/", "page_url": "https://www.ceps.eu/why-ursula-von-der-leyens-second-term-is-struggling/", "excerpt": "The authority displayed by a Commission President doesn’t only depend on their personality and leadership qualities but also on the broader political and economic context, as well the question of whether the Commission has the competences needed for the crisis du jour. During her…", "full_text": "The authority displayed by a Commission President doesn’t only depend on their personality and leadership qualities but also on the broader political and economic context, as well the question of whether the Commission has the competences needed for the crisis du jour. During her first term, Ursula von der Leyen was a capable crisis manager. Covid-19 struck just months after she took office, followed by Russia’s invasion of Ukraine in 2022. The Commission operated in full crisis mode and von der Leyen ran it like a command centre. In such moments, centralisation and decisiveness were political assets. Her second mandate is very different. The geopolitical circumstances are far more complex, with the EU finding itself in a new world order and needing to define its place within it. Then, within the EU itself, the nature of the various crises is changing, from crisis response (e.g. supporting Ukraine) to defining long-term strategies (e.g. developing the EU’s defence capacities). While the Commission lacked competencies in the health field during the pandemic, von der Leyen put a foot in the door and leveraged those competencies for her institution. This is much more difficult in defence, an area much closer to a state’s sense of sovereignty. On top of this, the role of non-EU partners, especially the UK, constrains the Commission’s influence as cooperation begins to move outside the EU’s institutional framework. Another shift lies in the stark transition from the green to the competitiveness agenda. After driving the EU’s climate ambitions in her first term, von der Leyen has now entered a rollback phase where previous-term legislation is being delayed or watered down. This creates a credibility problem, given how strongly she had personalised the Green Deal. Political dynamics among the Member States have also changed. During her first term, power vacuums in Berlin and Paris offered her greater room to manoeuvre. Today, however, that vacuum is partially filled. Chancellor Friedrich Merz has taken a more assertive stance at EU level and even seems to embrace a more intergovernmental approach, which doesn’t rely on the Commission. A strained relationship with the EP Another factor constraining von der Leyen is her increasingly difficult relationship with the European Parliament (EP), combined with shifting majority dynamics in the chamber. Tensions between the von der Leyen Commission and the EP aren’t new, as she tends to focus far more on the Member States in the Council and the European Council. This has fuelled grievances within the EP, particularly regarding the Commission’s continuous use of Article 122 TFEU , allowing legislation to be adopted without the EP’s involvement. While legally justified in crisis situations, the repeated reliance on this procedure has reinforced the perception among MEPs that the EP is being sidelined. And there are other procedural frustrations. The Commission’s use of the omnibus procedure has drawn criticism, particularly from centre-left groups, for the substance and quality of the proposals but also for its cross-cutting nature, which clashes with the EP’s committee structure. The Commission’s MFF proposal even triggered a rarely seen display of cross-party opposition . Beyond these institutional tensions, von der Leyen also faces an altered parliamentary landscape. In her first term, her agenda was largely adopted by the so-called von der Leyen majority of the EPP, S&D and Renew. Now, however, an alternative majority has emerged and is increasingly being used: an alignment between the EPP and the far right, first visible in a resolution on Venezuela . While unstable and politically very contentious, this configuration allows the EPP to signal that it’s no longer structurally dependent on the centre-left. The EPP’s willingness to cooperate with the far-right has also intensified tensions among these political groups. But the centre-left groups aren’t easy partners either – the S&D group is increasingly diverse and lack clear leadership, while Renew is split over whether to follow the EPP in its rightward lurch. The Greens have been struggling to position themselves as partners in the ‘von der Leyen majority’ in part because they are viewed by many in the EPP as their main political rival. Most (centre-left) groups are currently frustrated with the EPP, which we can’t forget is von der Leyen’s own group. Strong centralisation inside the Commission The Commission itself has been on a long road towards centralisation, first initiated by José Manuel Barroso due to EU enlargement with 10 new Member States joining in 2004, and then Jean-Claude Juncker was the first to use the College structure to centralise political control in 2014. Von der Leyen, however, has gone considerably further. In her first College, there were three Executive Vice-Presidents who were strong personalities and powerful institutional actors, each controlling major policy fields. In her second term, she has removed most potential internal counterweights. The expansion from three to six Executive Vice-Presidents has weakened the role, and few of them – if any – stand out as political heavyweights. Overlapping portfolios (for example, three Commissioners dealing with migration, five with the green transition) diffuse responsibility while enabling a ‘divide and rule’ approach. Key decisions are often made in a very small circle, bypassing parts of the institution, on both the political and administrative levels. As such, von der Leyen’s second College consolidates her personal power much more strongly than in her first term. Centralisation isn’t inherently problematic, as it enables swift and decisive policy action, which we saw during the pandemic and the early phase of the war in Ukraine. But crisis has now become the new normal. There’s growing concern about diminished internal checks and balances and reduced input from diverse policy perspectives. Some argue this has already affected policy quality, such as aspects of the Green Deal and omnibus files, which proceeded without proper impact assessments. Public concerns about transparency are rising as well, amplified by episodes such as ‘ Pfizergate ’. Taken together, these dynamics show that von der Leyen’s second term is being constrained by a mixture of (geo)political, parliamentary and intra-institutional factors that give von der Leyen far less room to lead effectively. Alas, the jury is still out on her second term’s overall performance as we still have another three and a half years to go, but none of the factors highlighted here are likely to ease up anytime soon – least of all the geopolitical situation.", "wordcount": 1047}, {"source": "publication", "date": "2025-12-16T15:34:22+01:00", "title": "Attracting new listings: what shapes IPO activity across markets", "authors": ["Ishak Demir", "Erfan Ghofrani", "Ying Liu"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/ECMI-best-paper-2025.pdf", "page_url": "https://www.ceps.eu/ceps-publications/attracting-new-listings-what-shapes-ipo-activity-across-markets/", "excerpt": "This paper examines the factors associated with IPO activity across 79 global stock exchanges from 2002 to 2024, offering an analysis of both advanced and emerg", "full_text": "", "wordcount": 324}, {"source": "publication", "date": "2025-12-16T10:53:33+01:00", "title": "EU Payment Observatory – Annual Report 2025", "authors": ["Beatriz Pozo", "Gabriele Freo", "Alice Orlandini", "Agustina Korenblit", "Fredrik Andersson", "Gloria Paggiaro", "Cinzia Alcidi", "Sose Mayilyan", "Julia Rzepecka"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/12/AnnualReport2025_FinalN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eu-payment-observatory-annual-report-2025/", "excerpt": "Late payments remain an increasing problem in the EU, with more than half of companies reporting difficulties as a result in 2024. According to suppliers, avera", "full_text": "", "wordcount": 231}, {"source": "publication", "date": "2025-12-15T11:18:04+01:00", "title": "Investing in cybersecurity for a secure and resilient digital future", "authors": ["Lorenzo Pupillo", "Carolina Polito"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://www.ceps.eu/ceps-publications/investing-in-cybersecurity-for-a-secure-and-resilient-digital-future/", "page_url": "https://www.ceps.eu/ceps-publications/investing-in-cybersecurity-for-a-secure-and-resilient-digital-future/", "excerpt": "Digitalisation has transformed how we work, trade, socialise, and govern, driving innovation, productivity, and inclusion in the process. The ICT sector now con", "full_text": "", "wordcount": 231}, {"source": "commentary", "date": "2025-12-12T15:48:30", "title": "The EU’s (giga)factory strategy needs a Goldilocks approach", "authors": ["Nicoleta Kyosovska"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/the-eus-gigafactory-strategy-needs-a-goldilocks-approach/", "page_url": "https://www.ceps.eu/the-eus-gigafactory-strategy-needs-a-goldilocks-approach/", "excerpt": "The European Commission has placed the EU’s delay in developing and adopting AI at the heart of the continent’s competitiveness problem. It has launched several initiatives to address this, including the buildout of AI infrastructure backed by a substantial amount of public fundi…", "full_text": "The European Commission has placed the EU’s delay in developing and adopting AI at the heart of the continent’s competitiveness problem. It has launched several initiatives to address this, including the buildout of AI infrastructure backed by a substantial amount of public funding. Specifically, EUR 10 billion (split between the EU and hosting Member States) has been invested into AI factories, large data centres optimised for AI training. EUR 20 billion in public-private funding (a third being public) has been committed to building AI g iga factories, even larger clusters of AI-optimised computers. This infrastructure is supposed to boost cutting-edge AI development and finally bring Europe to the forefront of the global AI race. There’s no doubt that Europe needs more compute . But it’s no magic pill to its competitiveness problem and the strategy raises many uncomfortable questions. Are the (giga)factories designed to support the current AI ecosystem? Will they help Europe catch up? Can they keep the continent’s technological sovereignty agenda on track? What research priorities will they advance? Here’s what we at CEPS found in the eye of the storm. A doppelganger network of hubs The AI factories are supposed to become dynamic ecosystems where compute, data and talent converge. Yet where they’re located shows that a wide geographic distribution and their proximity to established, energy-efficient infrastructure – especially existing EuroHPC sites – are being prioritised over existing AI ‘hubs of excellence’. This does make sense. AI training can be done remotely, so placing compute infrastructure next to talent isn’t necessary. Thus, a site chosen to instead optimise for available land, cheap energy and pre-existing high-performance computing in each country is indeed the best for that country. But the Commission’s narrative about creating vibrant ecosystems that attract talent is essentially misguided. Talent won’t go to the factories – the factories must go to the talent. That’s why the network of AI supercomputers should be federated and allow for seamless remote access, so that it fully supports European researchers and innovators. Where will the energy come from? Electricity and water costs have become a major bottleneck for building data centres, which impacts where the giga factories should be located more than the factories. A wide coverage of countries may be sustainable for the factories, conditional upon the sites optimising for energy efficiency within each country’s borders. Yet it may fall short of meeting the energy demands of the 100 000-chip supercomputers. The EU should concentrate the gigafactories in the countries that offer the cleanest power for the cheapest price if it wants to reconcile competitiveness with sustainability. The energy question also challenges the provisionally planned use of the gigafactories for inference – the process of running a trained AI model. Placing the gigafactories in remote areas should be reconsidered because, contrary to AI training, inference demands low latency and proximity to end-users, and doesn’t require centralised workloads. Their scale and siting may make them sub-optimal for inference. Avoiding the Nvidia dependency trap Perhaps the most striking feature of the gigafactory plan is the almost exclusive reliance on Nvidia for chips. This wouldn’t be fatal for the factories’ sovereignty but only if factory users have full control of the software orchestration. Unfortunately, operational control may not be guaranteed if the AI models are developed using the CUDA software layer, Nvidia’s proprietary set of tools allowing the use of GPUs for AI training. CUDA corresponds to an intermediary layer of the AI stack , sitting between the compute and model development, which could lead to inflexibility in the latter. The solution isn’t just about diversifying GPU suppliers. The factories should prioritise open-source solutions linkable to other tools for the public good . Europe should also invest in alternative computing approaches that don’t depend on GPUs, along with strategic partnerships for supplying increasingly important components like memory chips. Otherwise, the initiative may replicate existing tech dependencies. The wrong AI at the wrong scale At its core, the AI (giga)factory plan is a leadership problem. Europe is emulating both big tech’s approach to AI and its ultimate goal for AI (to achieve artificial general intelligence ) but with daunting private investment gaps and a very different social model. Alas, the massive investments flowing into generative AI in the US and China will make it hard to ever ‘catch up’. But the technology’s continued unreliability and its increasing strain on electricity, present Europe with the opportunity to compete with alternative solutions which uphold its values. These may involve neuro-symbolic algorithms and neuromorphic chips, or simply smaller, specialised models. Crucially, AI factories must include technical work on AI safety. With the future of AI research uncertain, what’s beyond doubt is that unreliable and unsustainable AI can’t be deployed at scale, whether in business, critical infrastructure or for public services. Finetuning the gigafactories plan For the gigafactories to boost Europe’s competitiveness and sovereignty, they need a much sharper strategy. First , serve the compute to the talent, ensure the network of gigafactories can function as the cloud and mandate interoperability and collaboration. The infrastructure sites won’t substitute the existing research and innovation hubs. Second , reconcile competitiveness with sustainability. Gigafactories must be concentrated in regions with abundant renewable energy and powered by additionally generated electricity at competitive prices. Energy consumption is the big, glaring elephant in the room. Third , re-consider whether the gigafactories should support both training and inference. If their envisioned scale is non-negotiable, it implies location choices that may rule out inference or could require investment in fibre connectivity. Such trade-offs should be acknowledged early on. Fourth , make infrastructure future-proof. Secure GPU supply from multiple vendors and invest in partnerships to ensure the availability of other increasingly important components. Prioritise open-source infrastructure solutions that can pool multi-vendor resources. All of this will be critical for reducing dependencies. Finally, define strategic goals and long-term missions. What specific AI capabilities does Europe need? What alternative research directions can we promisingly pursue? How do we build trustworthy solutions? The recently launched Apply AI strategy and the newly announced Frontier AI initiative could steer gigafactories’ use towards the breakthroughs in safety and reliability that widescale AI adoption requires. At a time when the EU is under pressure to become competitive and sovereign in AI, it should abandon any dreams for AGI leadership or digital grandeur. The best Europe can do is to bet on an alternative AI growth model, one that’s based mostly on proprietary technology and gradually morphs into a more autonomous stack. What’s needed is a level of ambition that’s ‘just right’ – that doesn’t hyper-focus on scale but rather on reliability and is tailored to what industries, public services and researchers really need to innovate. To read the longer report that this commentary is based on, please click here .", "wordcount": 1128}, {"source": "commentary", "date": "2025-12-12T10:55:14", "title": "Algorithmic management isn’t the problem – what it optimises is.", "authors": ["Laura Nurski", "Francisco Ríos"], "topics": ["AI, Digitalisation & Innovation", "Employment & Social Affairs"], "units": ["Data Science", "Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/algorithmic-management-isnt-the-problem-what-it-optimises-is/", "page_url": "https://www.ceps.eu/algorithmic-management-isnt-the-problem-what-it-optimises-is/", "excerpt": "Algorithmic management (AM) can undermine job quality when it’s built solely around efficiency – but it can also improve work when human goals and ambitions are designed into the system from the very beginning. Specifically, AM is the use of computer programmes that automate func…", "full_text": "Algorithmic management (AM) can undermine job quality when it’s built solely around efficiency – but it can also improve work when human goals and ambitions are designed into the system from the very beginning. Specifically, AM is the use of computer programmes that automate functions traditionally done by human managers – assigning tasks, monitoring and evaluating performance, and disciplining or rewarding workers. While these tools originated in the platform economy, connecting riders to restaurants and customers, they’re now spreading across traditional workplaces . A recent survey by the European Commission’s Joint Research Centre found that one in four EU workers get their work schedules automatically allocated and one in five also get their tasks automatically allocated. This rapid diffusion triggered an impact assessment on AM in the workplace. The Quality Jobs Roadmap , aimed at creating and maintaining quality jobs, also emphasises the need for the responsible use of algorithmic management . Policymakers see a dual challenge – capturing productivity benefits while preventing any deterioration in working conditions, fairness and autonomy. Yet Europe needs a debate that’s more precise than merely ‘efficiency vs workers’ rights’. If done right, AM could benefit workers. In short, AM is a tool – not destiny. Its real-world effects depend on what is built into the system’s objectives and constraints, and who builds it. Instead of overregulating AM systems, policymakers should give workers a say in how they’re built. AM has a bad reputation – but it’s not the whole story The social science critique of AM is well grounded. Many deployments focus narrowly on operational optimisation, namely speed, throughput and cost control – common because they’re measurable and tied to efficiency. Recent reviews highlight a set of recurring risks for workers: loss of autonomy, work intensification, invasive monitoring, algorithmic opacity and the perpetuation of bias. As such, AM can erode meaningful work and the social fabric of workplaces by shifting decision-making power to systems that workers neither understand nor influence. Yet AM can also bring opportunities – better task allocation, fewer workplace accidents and less planning disruption. It could even better match workers’ skills or preferences with their allocated tasks. The technology is inherently neutral. Treating AM as equivalent to ‘ digital Taylorism ’ risks misdiagnosing the problem and, in turn, overregulating tools that could be repurposed towards improving job quality. Thus, the problem isn’t optimisation, but what is optimised and who optimises it. Regulation should thus target harmful design choices and governance gaps, not optimisation itself. Humanising AM means designing the algorithm for workers ‘Humanising’ AM means expanding what exactly algorithms are optimising. Today, most systems encode employer-side constraints (coverage rules, predicted demand, cost ceilings). But there’s no technical reason why worker-centred parameters can’t also be part of the algorithm’s objective function. Even relatively ‘soft’ concepts can be formalised as inputs: workers can rate tasks based on existing preferences or desired learning opportunities, specify preferred co-workers , set weekly hour bands or define minimum rest windows. These parameters should be gathered and periodically updated with workers’ involvement. This isn’t a new idea. In technical terms, it means formulating AM as a multi-objective optimisation problem in which worker-centred criteria sit alongside traditional goals such as cost or productivity. Classic optimisation techniques already support this kind of design, enabling decision-makers to weigh and balance several dimensions at once rather than minimise costs alone. Across domains such as healthcare, education, business operations and more, existing systems have incorporated elements of human wellbeing (like work-life balance, schedule stability or preference satisfaction) into their objective functions, showing that it’s possible to improve workers’ experience while still addressing core organisational constraints. What policy and practice need to change Even when AM systems aren’t fully autonomous, their opacity exacerbates power asymmetries that existing labour and occupational health and safety rules don’t adequately address. Additional safeguards are then needed to ensure that workers and their representatives can meaningfully challenge harmful optimisation choices. Getting there requires three mutually reinforcing shifts. First, worker participation must move upstream into system design and adoption. Workers hold job-specific knowledge that algorithms miss. This leads AM systems to confuse what ‘good performance’ is and triggers resentment and workarounds. Participation therefore improves the model’s relevance and legitimacy, and it makes the trade-offs between cost, productivity and worker-centred objectives explicit before they‘re silently hard-coded into the system. It’s also essential because human parameters such as preferences or perceived fairness can’t be inferred from administrative data alone. Implementing workers’ interests along the entire machine learning pipeline isn’t wishful thinking . Workers can help define the problem, shape the data and key constructs, agree on fairness criteria and set monitoring and retaining rules – especially when backed by transparency requirements and technical expertise. Second, social dialogue needs real capacity to engage with AM development, not just to react after systems are purchased. Power asymmetries mean that the employer’s self-assessment of risks is not enough. Worker representatives should be involved in evaluating risks and safeguards, including how worker-centred criteria are weighted against cost and productivity goals. This implies targeted AI literacy and technical support for unions and works councils, so they can scrutinise data sources and performance metrics. A good example is Germany’s Works Council Modernisation Act (2021) that expands the codetermination rights of work councils to deploy AI systems in the workplace but also gives workers’ representatives the right to bring in external technical expertise when they need it. Third, AM developers and adopting employers need explicit job quality obligations. The loss of autonomy, increased work intensity and reduced social interaction – resulting in psychosocial strain – are already recognised as core risks. Embedding job quality awareness into procurement, model validation and post-deployment monitoring would make these risks visible earlier. This requires insight into what’s being optimised, mandate testing for impacts on autonomy, predictability and fairness and tying OSH and psychosocial risk assessments into AM rollouts. Taken together, these steps shift AM from the ‘ past of work ’ to the future of work. Europe’s upcoming Quality Jobs agenda is an opportunity to codify that shift – not by rejecting optimisation but by insisting that what ’s being optimised isn’t just for efficiency – but also for human flourishing and meaningful work meaningfulness.", "wordcount": 1032}, {"source": "publication", "date": "2025-12-11T14:50:42+01:00", "title": "2025 ECMI Statistical Package – Key findings", "authors": ["Apostolos Thomadakis", "Felipe Calvo de Freitas"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/ECMI-Stat-Pack-2025-Key-findings-final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/2025-ecmi-statistical-package-key-findings/", "excerpt": "Offering a comprehensive collection of the most relevant data on various segments of European and global capital markets, the ECMI Statistical Package enables u", "full_text": "", "wordcount": 505}, {"source": "publication", "date": "2025-12-11T12:36:42+01:00", "title": "Why a revenue-based special purpose vehicle (SPV) is the best way to mobilise frozen Russian assets without destabilising Belgium", "authors": ["Judith Arnal", "Karel Lannoo"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/2025-08_FMI_frozen-russian-assets-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/why-a-revenue-based-special-purpose-vehicle-spv-is-the-best-way-to-mobilise-frozen-russian-assets-without-destabilising-belgium/", "excerpt": "One of the major policy dilemmas of the past few weeks has been how the EU can continue to fund Ukraine’s war effort and reconstruction. Many have been arguing", "full_text": "", "wordcount": 210}, {"source": "publication", "date": "2025-12-10T15:16:38+01:00", "title": "Unpacking the stack: how layered capital requirements shape European banking capacity", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/2025-10-FMI-Capital-stack-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/unpacking-the-stack-how-layered-capital-requirements-shape-european-banking-capacity/", "excerpt": "The EU's banking capital framework comprises multiple layers – microprudential requirements, macroprudential buffers and resolution capacity – each calibrated b", "full_text": "", "wordcount": 128}, {"source": "publication", "date": "2025-12-09T16:51:26+01:00", "title": "Rethinking materials, rethinking carbon: how the EU can build better to achieve climate neutrality", "authors": ["Luca Nipius", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/2025-09-Explainer_Buildings-as-a-carbon-sink_fomatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/rethinking-materials-rethinking-carbon-how-the-eu-can-build-better-to-achieve-climate-neutrality/", "excerpt": "The role of carbon removals in climate policy is becoming more important as countries move towards achieving their net-zero emissions targets under the Paris Ag", "full_text": "", "wordcount": 230}, {"source": "publication", "date": "2025-12-08T12:43:33+01:00", "title": "Think small, act big – why Europe needs a 28th regime for business", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/12/No-102-28th-regime-final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/think-small-act-big-why-europe-needs-a-28th-regime-for-business/", "excerpt": "Nearly 30 years after the single market’s formal completion, Europe still feels more like a patchwork of 27 business environments than one large integrated econ", "full_text": "", "wordcount": 128}, {"source": "commentary", "date": "2025-12-04T12:22:49", "title": "Women’s rights deserve protection, not partisan posturing", "authors": ["Marta Dell’Aquila"], "topics": ["Diversity, Equity & Inclusion", "Employment & Social Affairs"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/womens-rights-deserve-protection-not-partisan-posturing/", "page_url": "https://www.ceps.eu/womens-rights-deserve-protection-not-partisan-posturing/", "excerpt": "Like every year, 25 November mark ed the International Day for the Elimination of Violence Against Women . A date that should spark reflection, not complacency. While the EU and some Member States have achieved some recent milestones on women’s rights – such as the EU Directive o…", "full_text": "Like every year, 25 November mark ed the International Day for the Elimination of Violence Against Women . A date that should spark reflection, not complacency. While the EU and some Member States have achieved some recent milestones on women’s rights – such as the EU Directive on combating violence against women , the European Citizens’ Initiative ‘ My Voice, My Choice ’ reaching the Commission and Parliament, and France adding consent to its rape law after the Gisèle Pelicot case – others are moving in the opposite direction. Latvia, for example, is planning to withdraw from the Istanbul Convention, potentially becoming ‘the first EU country to leave an international human rights treaty’. Despite being delayed until next year, the Latvian proposal to quit is alarming and fits neatly into a worrying global pattern, namely the politicisation of women’s rights and the ongoing challenge of keeping women’s rights above and beyond political fights. Why Istanbul matters To understand the gravity of Latvia withdrawing, it’s worth remembering what the Istanbul Convention represents. Adopted in 2011 and ratified by the EU in June 2023 (and by Latvia in January 2024), the Convention is the first legally binding European instrument that aims to protect women from all forms of violence and discrimination, which is clearly stated in its very first article . This broader framework isn’t abstract – what it seeks to address is visible and deeply troubling . In fact, according to the latest EU survey on gender-based violence , nearly one in three women aged 18 to 74 have experienced physical or sexual violence in adulthood. Among women who have had a partner, almost 18 % report having suffered physical or sexual violence from that partner. Violence outside the home is also widespread: about one in five women have faced physical (including verbal threats) or sexual violence by someone other than a partner, and roughly one in eight have experienced sexual violence from a non-partner – including rape. These figures make it painfully clear that gender-based violence is not a marginal issue. Rather, it’s still a common reality across all EU Member States. S low progress only reinforces how important it is to preserve and strengthen every tool available to protect women. Against this backdrop, Latvia cannot afford to walk away. Is protecting women’s rights really ‘radical’? The impact of this proposal has been felt on the streets. Thousands of demonstrators united in Riga on 30 October to protest the decision taken by the Saeima, the Latvian Parliament, which was supported by 56 lawmakers, opposed by 32, and saw two abstentions. Among their reasons, those who support withdrawing claim that the Convention supposedly promotes ‘radical feminism based on the ideology of gender’, thus undermining traditional family roles and values . They also suggest that the existing national legal framework is enough to protect women from gender-based violence. It’s important to unpack these arguments. Radical feminism is a feminist perspective that emerged in the late 1960s, asserting that patriarchy is the fundamental system of power that oppresses women and that achieving gender equality requires dismantling patriarchal institutions rather than reforming them. The ‘ ideology of gender ’ (or ‘gender ideology’) is a pejorative term used by conservative movements to define a belief system that views gender as a social and cultural construct rather than a fixed biological fact, mainly adopted to oppose feminist theories that treat gender as a social construct. The association between the Istanbul Convention and ‘radical feminism’ is misleading, given the treaty’s primary purpose is to protect women from violence. Presenting such protections as ‘radical’ ignores their alignment with the EU ’s founding values under Article 2 TEU. It’s not just Latvia – it’s a global (and growing) political trend What’s happening in Latvia isn’t an isolated case. Around the world, measures to advance women’s rights have been diverted into political confrontations and culture wars, reducing them to issues that can be cast aside when they no longer serve the interests of the politicians in power. We’ve seen this with Javier Milei, who swiftly dissolved Argentina’s Ministry of Women, Gender and Diversity – a body established under the previous Fernández administration – immediately after being officially sworn in. Then came the Trump administration, cutting aid and funding, affecting women’s rights organisations worldwide, and abolishing federal support for DEI programmes. Taking all this into account, Latvia’s decision is even more significant. It’s not just a local controversy; it’s a worrying confirmation of how fragile women’s protections can become when political agendas override the commitment to fundamental rights. Rights over rhetoric in the next Gender Equality Strategy The problem lies in how women’s rights are often perceived as either negotiable or a secondary concern. If they’re framed in terms of ideology or partisan debate, protections can be undermined whenever political power shifts. Addressing gender-based violence cannot be reduced to a clash of political ideologies or moral arguments. At its core, this isn’t about ‘taking sides’ but about recognising that no one should ever have to negotiate their right to live freely from harm. Ahead of the next European Gender Equality Strategy for 2026-2030, the challenge of the far right and certain transnational networks that are threatening women’s rights and gender equality were both highlighted in the Report on the Gender Equality Strategy 2025 , adopted by the European Parliament on 13 November. Set to be adopted early next year after extensive consultations, the upcoming strategy offers a crucial opportunity to reaffirm that gender-based violence cannot depend on who holds power or on shifting political tides. But to be really ‘ ambitious ’, any new strategy must approach gender-based violence as a violation of fundamental human rights and a threat to public safety, thus depoliticising the issue – so that protecting women becomes a universal, non-negotiable responsibility. For everyone.", "wordcount": 967}, {"source": "publication", "date": "2025-12-04T09:22:42+01:00", "title": "Sweden’s competitiveness and investment priorities in key strategic technologies", "authors": ["Pierre-Alexandre Balland", "Andrea Renda"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://www.ceps.eu/ceps-publications/swedens-competitiveness-and-investment-priorities-in-key-strategic-technologies/", "page_url": "https://www.ceps.eu/ceps-publications/swedens-competitiveness-and-investment-priorities-in-key-strategic-technologies/", "excerpt": "A little more than a year ago, Mario Draghi presented his report 'The future of European competitiveness', stating that unless EU Member States make huge invest", "full_text": "", "wordcount": 234}, {"source": "commentary", "date": "2025-12-03T09:12:45", "title": "We need to urgently strengthen the EU’s transition to a quantum-safe world", "authors": ["Lorenzo Pupillo", "Swann Ashworth", "Carolina Polito"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/we-need-to-urgently-strengthen-the-eus-transition-to-a-quantum-safe-world/", "page_url": "https://www.ceps.eu/we-need-to-urgently-strengthen-the-eus-transition-to-a-quantum-safe-world/", "excerpt": "Transitioning to quantum-safe cryptography is an urgent strategic challenge for Europe. There are around 90 billion devices that use current encryption methods. But quantum computers capable of breaking today’s cryptographic systems may emerge as early as the 2030s, allowing for …", "full_text": "Transitioning to quantum-safe cryptography is an urgent strategic challenge for Europe. There are around 90 billion devices that use current encryption methods. But quantum computers capable of breaking today’s cryptographic systems may emerge as early as the 2030s, allowing for – amongst others – the unauthorised decryption of private messages and financial transactions, which could have disastrous consequences. But transitioning to post-quantum cryptography (PQC) is a lengthy and complex process. Past experiences with security standard migrations suggest such a transformation can take anywhere between 10-15 years. Thus, careful coordination and long-term planning across both the public and private sectors is required. Despite this urgency, recent surveys by the European Union Agency for Cybersecurity (ENISA) and the Information Systems Audit and Control Association (ISACA) show that most European stakeholders remain underprepared – only a small share have begun to invest in post-quantum solutions and overall awareness remains low. At the Member State level, Germany, France and the Netherlands have led the charge by issuing guidance and launching PQC pilot projects, both through national roadmaps and within the Network and Information Systems (NIS) Cooperation Group . Alas, progress across the EU remains uneven and it still lacks a coherent, unified transition framework – unlike the US. Against this backdrop, in April 2025, CEPS launched a Task Force on Strengthening the EU Transition to a Quantum-Safe World. Its objective was to draw attention to the technical, market, governance and policy challenges involved in Europe’s transition to quantum safe. Designed as a multi-stakeholder platform, the Task Force brought together private organisations, EU institutions and agencies, universities and think tanks, national research agencies and civil society organisations. The final Task Force Report is a rallying call for strengthening the EU’s transition process towards quantum safety. A systemic transformation and moving beyond the ‘Q-Day’ narrative The shift to quantum-safe cryptography shouldn’t be viewed as a routine technical upgrade but as a comprehensive, systems-level transformation. Transitioning to PQC extends beyond merely updating cryptographic libraries. Rather, it involves integrating new product versions, modifying APIs, adapting software development lifecycles and – in some cases – redesigning core business processes. It also demands the proactive management of supplier, customer and ecosystem relationships. This represents a major managerial challenge, requiring long-term planning, a skilled workforce and sustained organisational change. Public discussions also often refer to ‘Q-Day’, the hypothetical moment when quantum computers render classical cryptography obsolete. While this can help raise awareness, it’s nonetheless misleading. Quantum capability won’t arrive as a tsunami but instead as a gradual, uneven process with early machines breaking selected keys before broader capabilities are developed. Instead, a more realistic perspective is that of a ‘Q-period’, which supports balanced and adaptive migration strategies aligned with the actual pace of quantum and standards development. Post-quantum cryptography as the core of the transition PQC forms the backbone of the transition to quantum safety. These algorithms are designed to withstand attacks from quantum computers and are widely recognised by regulators and standardisation bodies as the only viable short- to medium-term solution . Other quantum technologies play more specialised roles. These include Quantum Key Distribution (QKD), which isn’t a direct substitute for public-key cryptography but rather a complementary technology that can offer diverse layered protection for specific high-security environments. And then there are Quantum Random Number Generators (QRNGs) devices that produce unpredictable numbers using quantum processes. They offer certifiable high-quality randomness, meaning their output can be embedded into cryptographic stacks and validated under recognised certification schemes. Encouraging a risk-based transition model Migrating billions of devices to quantum-safe standards requires a structured, risk-based approach. This encompasses several elements. Firstly, crypto agility (i.e. designing cryptographic systems in a modular way, allowing for cryptographic components to be easily replaced). Secondly, for effective planning, migration requires ensuring comprehensive crypto and product inventories, which include software, hardware, APIs and services. Critical systems should be prioritised for early migration. Besides, as most organisations rely heavily on third-party vendors, it’s crucial for them to understand and manage their supply chain dependencies. That’s why they need to engage suppliers, request clear timelines for quantum-safe capabilities and actively monitor supply chain readiness. Hybrid solutions can greatly assist the transition – the co-existence of classical and quantum-resistant algorithms (‘hybrid cryptography’) ensures interoperability and redundancy. One of the Task Force’s key recommendations here is that the definition of hybrid solutions should be broadened to include ‘context-aware, technically inclusive approaches’ that combine multiple cryptographic mechanisms for resilience, such as PQC/tradition and PQC/QKD. When it comes to designing and implementing a European Roadmap for Post-Quantum Cryptography, the Task Force highlights several actions that should be taken forward. First, we need to integrate quantum safety into digital systems from the outset, meaning that the European Commission and Member States should ensure digital systems (such as the European Digital Identity Wallet) are designed to be quantum-safe from the very outset. Second, the Roadmap for the Transition to Post-Quantum Cryptography should be clearly linked to a transition strategy as well as existing legislation. A roadmap defines milestones and timelines but a supporting strategy must clarify how Member States, vendors and institutions will actually meet them. Third, there needs to be alignment and coherence across roadmaps. With multiple quantum-safety roadmaps emerging at EU and national levels, the European Commission, Member States and standardisation bodies must coordinate their efforts to ensure coherence in timelines, dependencies and objectives. Coordinating with the US and other G7 partners is equally important. Fourth , the Roadmap’s current structure implicitly relies on a staged or linear approach, which may unintentionally create bottlenecks. That’s why the Task Force recommends introducing greater parallelisation into the Roadmap to accelerate progress and reduce systemic risk. Finally, the report underscores the importance of promoting awareness, cooperation and effective governance throughout the transition to quantum safety. It calls for capacity building, skills development and the establishment of dedicated crypto management units within organisations. Promoting Europe’s secure transition to quantum-safe cryptography is an urgent necessity to stop the unauthorised decryption of private messages and financial transactions, which may not be a major threat now but is likely to become one in the very near future. A lack of awareness and past experience with security standards migration indicate that the transition will be a lengthy process, one that requires effective coordination and the strengthening of all current initiatives, no matter who’s leading them, whether by the private sector, the European institutions, the research community and/or civil society. To read the full Task Force report that this commentary is based on, please click here .", "wordcount": 1082}, {"source": "publication", "date": "2025-12-03T09:09:38+01:00", "title": "Strengthening the EU tran official development", "full_text": "", "wordcount": 221}, {"source": "publication", "date": "2025-11-28T11:01:42+01:00", "title": "The future of EU tax policy harmonisation", "authors": ["Apostolos Thomadakis", "Fredrik Andersson", "Agustina Korenblit"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/the-future-of-eu-tax-policy-harmonisation/", "page_url": "https://www.ceps.eu/ceps-publications/the-future-of-eu-tax-policy-harmonisation/", "excerpt": "Since tax policy remains largely national, differences in design and enforcement could weaken the single market and limit fair competition. The study examines h", "full_text": "", "wordcount": 176}, {"source": "publication", "date": "2025-11-27T10:05:01+01:00", "title": "ECB monetary policy after the disinflation", "authors": ["Cinzia Alcidi", "Ignazio Angeloni", "Cédric Tille"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/ecb-monetary-policy-after-the-disinflation/", "page_url": "https://www.ceps.eu/ceps-publications/ecb-monetary-policy-after-the-disinflation/", "excerpt": "After the surge in inflation in 2021-2023, the return to price stability and a more challenging global environment have altered the monetary picture and present", "full_text": "", "wordcount": 116}, {"source": "publication", "date": "2025-11-26T10:20:57+01:00", "title": "Tackling the twin paradox of EU financial regulation", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/2025-07-FMI-Twin-paradox-formatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/tackling-the-twin-paradox-of-eu-financial-regulation/", "excerpt": "The Lamfalussy process has generated two opposing distortions. Excessive delegation to rulemaking at Levels 2 and 3 has sparked regulatory inflation, while over", "full_text": "", "wordcount": 117}, {"source": "publication", "date": "2025-11-25T10:23:38+01:00", "title": "Mainstreaming gender in Horizon Europe: policy progress, challenges, and pathways forward", "authors": ["Marta Dell’Aquila", "Rukudzo Nyoka"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/Mainstreaming-Gender-in-HE-Policy-Progress-Challenges-and-Pathways-Forward-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/mainstreaming-gender-in-horizon-europe-policy-progress-challenges-and-pathways-forward/", "excerpt": "Gender equality and gender mainstreaming have been established as central priorities within the European Union’s current Framework Programme for Research and In", "full_text": "", "wordcount": 213}, {"source": "commentary", "date": "2025-11-20T16:56:26", "title": "A political realignment that puts EU green policy at risk – the sustainability vote is changing the game", "authors": ["Apostolos Thomadakis"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/a-political-realignment-that-puts-eu-green-policy-at-risk-the-sustainability-vote-is-changing-the-game/", "page_url": "https://www.ceps.eu/a-political-realignment-that-puts-eu-green-policy-at-risk-the-sustainability-vote-is-changing-the-game/", "excerpt": "A recent vote in the European Parliament on the implementation of the Corporate Sustainability Reporting Directive (CSRD) may well be remembered as a turning point – not just for EU sustainability policy, but for the Parliament’s credibility and the direction of European politics…", "full_text": "A recent vote in the European Parliament on the implementation of the Corporate Sustainability Reporting Directive (CSRD) may well be remembered as a turning point – not just for EU sustainability policy, but for the Parliament’s credibility and the direction of European politics in general. On the surface, the vote concerned a relatively technical matter: whether to postpone the adoption of certain sector-specific standards for sustainability reporting. But beneath that technical layer lies a far more troubling reality. For the first time in this legislative term, the centre-right European People’s Party (EPP) voted in explicit alignment with far-right and Eurosceptic forces to weaken a cornerstone of the EU’s green and sustainability agenda. The implications are serious and urgent. A procedural pretext, a political signal The European Commission’s decision to delay the sectoral standards by two years was already a concession to mounting political pressure. It was justified on the basis of ‘administrative burden’ and ‘reporting fatigue’ – phrases that have increasingly become code for diluting hard-won transparency gains. But the Parliament still had a say. Under the EU’s scrutiny procedures, MEPs could have objected and sent a signal that delaying climate and social accountability is not politically neutral. Instead, the EPP not only endorsed the delay, but actively mobilised to defeat a progressive-led motion of objection. To achieve that, it joined forces with the far right and hard Eurosceptics, who have openly attacked the Green Deal, questioned climate science, and campaigned on dismantling EU law itself in the process. This isn’t just a policy dispute. It’s a political signal that should alarm anyone concerned about the health of European democracy and the integrity of its policymaking process. Three things were undermined The vote may have taken minutes, but its consequences span three critical domains. The CSRD’s credibility and the future of sustainable finance . The CSRD was hailed as a game-changer when adopted – a world-leading effort to bring transparency and comparability to corporate sustainability data. It promised clarity for markets, accountability for civil society, and enforcement for policymakers. But its effectiveness depends on the timely development of sector-specific standards, without which the disclosures risk becoming generic and toothless. Delaying these standards effectively hands a victory to lobbies seeking to postpone, water down or even derail transparency on environmental, social and governance (ESG) aspects altogether. Investors, banks and stakeholders relying on these standards for due diligence and risk management are now left in limbo. The EU just told the world that even its most advanced sustainability framework is vulnerable to last-minute backtracking. The integrity of the green agenda . The Green Deal is not a single law – it is a dense ecosystem of interdependent files. These cover energy, transport, finance, reporting and agriculture. Undermining any of them affects the whole system. CSRD is the foundation of many other rules as it feeds into the Sustainable Finance Disclosure Regulation , the EU Taxonomy Regulation , transition plans and corporate due diligence. By enabling this delay, the European Parliament weakens its own legislative legacy and casts doubt on the continuity of EU environmental policy across terms. It emboldens those who argue that the EU is retreating from its green commitments and that enforcement will never match ambition. If that message takes root (among investors, partners and the public), it’ll be much harder to rebuild trust. The role and standing of the European Parliament . Perhaps most concerning is what this vote reveals about the Parliament itself. For years, particularly in the last legislative term, it has been a driver of ambitious climate, social and human rights regulations – often pushing the Council and Commission to raise the bar. It has built a reputation as the defender of long-term interest over short-term expediency. But that role has reversed. The Parliament didn’t assert itself. It capitulated. Worse, it did so not through a compromise with pro-European centrists, but through convergence with the far right. A new political alignment is emerging This isn’t an isolated incident. We’re witnessing the early stages of a political realignment, where the traditional pro-European centre right is flirting with the illiberal right – not just on migration or agriculture, but now also on finance and corporate accountability. It’s a strategic gamble by the EPP: to reclaim political territory by embracing the rhetoric of ‘overregulation’, ‘burden’ and ‘competitiveness’ at the expense of climate, social and transparency commitments. That gamble may cost the EU dearly. Because the far right isn’t content with rolling back specific files, it’s seeking to delegitimise the very notion of common European rules. Every time the EPP relies on far-right votes to secure its position, it risks normalising that objective. There’s still time to draw the line The sectoral standards may now be delayed. But broader implementation of the CSRD continues. So does the legislative work on related files – from the unfolding implementation of the Corporate Sustainability Due Diligence Directive to the ongoing negotiations on the Green Claims Directive, and the broader agenda of green financial regulation. The Parliament has an opportunity, and a responsibility, to reclaim its standing as a guardian of ambition and democratic accountability. That begins with political clarity. Voting with the far right on a green rollback should never be shrugged off as tactical alignment. It must be debated, owned and, ideally, reversed. Pro-European parties have a duty to draw clear lines between themselves and those who seek to dismantle the EU from within. It also requires defending the public purpose of EU regulation. Reporting standards aren’t a ‘burden’ imposed from Brussels, they’re a tool to protect European companies, investors, the public and the environment from unpriced risk, greenwashing and abuse. Diluting reporting standards may appease certain voices in the short term, but it undermines Europe’s economic and moral credibility in the long term. Europe cannot afford to blink The vote may be a footnote in legislative procedure. But its political significance is profound. If the European Parliament starts wavering on sustainability and transparency, the entire architecture of the Green Deal becomes vulnerable. This isn’t the time for equivocation. It’s the time for political clarity, institutional courage and a recommitment to the values that made the EU a global leader in sustainable governance. Because once you start giving ground to those who do not believe in the project, it becomes much harder to defend it when it really matters.", "wordcount": 1057}, {"source": "commentary", "date": "2025-11-19T16:40:13", "title": "The new enlargement package sends the right message – now the EU needs the backbone to go forward", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/the-new-enlargement-package-sends-the-right-message-now-the-eu-needs-the-backbone-to-go-forward/", "page_url": "https://www.ceps.eu/the-new-enlargement-package-sends-the-right-message-now-the-eu-needs-the-backbone-to-go-forward/", "excerpt": "The EU’s new enlargement package puts geopolitics firmly at the centre – and rightly so. Russia’s full-scale invasion of Ukraine jolted enlargement out of a decade-long slumber and turned it into a core European security imperative. The European Commission also frames enlargement…", "full_text": "The EU’s new enlargement package puts geopolitics firmly at the centre – and rightly so. Russia’s full-scale invasion of Ukraine jolted enlargement out of a decade-long slumber and turned it into a core European security imperative. The European Commission also frames enlargement as a source of prosperity , drawing a straight line between past accession rounds and today’s stronger, safer EU. With these messages, the new enlargement package strikes the right tone – in timing and political intent – but they will only matter if the EU shows the resolve to turn momentum into action. Ambitious yet achievable? The new package outlines the front runners. In the Western Balkans, the European Commission deems Montenegro and Albania to be capable of closing accession negotiations by 2026 and 2027 respectively, if the momentum holds. On the eastern flank, the Commission supports Ukraine and Moldova’s target of wrapping up talks by 2028. While the Commission has recommended opening the negotiation clusters, Hungary’s veto keeps both Ukraine and Moldova stuck – a reminder that one Member State can effectively stall the entire process. Montenegro, Albania and Moldova are small enough for ‘absorption capacity’ to barely register. But Ukraine is the odd one out – its sheer size and wartime realities make its accession politically heavier and a likely trigger for vetoes from more than just the familiar holdout. Beyond the frontrunners Among the rest of the Western Balkan countries, Serbia remains the most advanced in accession negotiations, but the latest report is clear: the reform effort is falling short. Mass protests over corruption, accountability failures, police brutality, and pressure on civil society all appear in the report. Yet if EU ‘meritocracy’ is to mean anything, Brussels can’t keep avoiding enforceable consequences . If Serbian President Aleksandar Vučić is still greeted warmly in Brussels, while also attending Putin’s Victory Day Parade and meeting Xi with increasing enthusiasm, why should he change course? North Macedonia remains hostage to Bulgaria’s demands for constitutional changes, as the North Macedonian government refuses to proceed without guarantees that this will be Sofia’s final request. Meanwhile, limited, or in some areas no progress on key EU fundamentals continues to hamper the country’s accession process. Bosnia and Herzegovina struggles with institutional dysfunction and sluggish reforms . Meanwhile, the Commission recognises Kosovo’s commitment and strong public support for its European path and stands ready to prepare an Opinion on Kosovo ’s membership application. But this needs a request from the Council – which is unlikely as five Member States still don’t officially recognise Kosovo. A post-election political gridlock, combined with the challenge of implementing the 2023 Agreement on the Path to Normalisation of Relations with Serbia as well as lingering EU restrictive measures, further slow Kosovo’s progress. Turkey, whose accession talks have been frozen since 2018, remains more of a strategic partner – in a ‘phased, proportionate, and reversible manner’ – than as a candidate country. Georgia appears to be even further away and is the last on the list after Türkiye, ‘a candidate in name only’. As Enlargement Commissioner Marta Kos puts it , Georgia received the harshest assessment ever issued in an enlargement report . The language is strong, yet Brussels still lacks a strategy or action plan on how to engage with the country. By disengaging with Georgia, which is already becoming visible now, the EU risks gifting a win to a government that has been seeking exactly that: freedom from Brussels’ demands while steering Georgia away from the European path. Strict, fair, and merit-based? The new enlargement package repeats the EU’s old mantra: accession must be strict, fair, and merit-based. Central to the package is gradual integration, with tangible benefits before full membership. That includes full implementation of the agreements the EU already has with its candidate countries: ever deeper access to the single market, ‘roam-like-at-home’, inclusion in the Single European Payment Area, extension of the EU’s transport networks and energy community, and integration into industrial and digital value chains. Regional cooperation, with the Common Regional Market in the Western Balkans and through the new Black Sea strategy, strengthen these ties. While making these tangible benefits a reality involves a lot of technical work, political will is what really drives progress. Ukraine and Moldova’s synchronisation with European electricity grid ( ENTSO-E ) and ‘ solidarity lanes ’ shows how fast things can materialise when there’s strong political will. Still, even if advancing faster, gradual integration remains a complement for full EU membership, not a substitute. The EU’s own homework The EU can’t preach reforms while delaying its own. Institutional readiness, decision-making efficiency, and credible tools against democratic backsliding remain under slow-motion construction. This is why pre-enlargement policy reviews and work to anchor enlargement in the next Multiannual Financial Framework (2028–34) as a ‘ geostrategic priority ’, must be delivered as soon as possible. The new package also hints at how the Commission intends to curb backsliding after accession by strengthening safeguards in accession treaties. That’s a pragmatic step, but it’s only meaningful if countries actually make it to the accession treaty stage in the first place. However, the absence of any strategy for handling Member Sates vetoes remains a glaring gap in the new enlargement package. Hungary’s veto on Ukraine’s accession – and by extension on Moldova’s, as the two are coupled in the process – is only the latest example, and it’s hardly surprising after two decades of stalled Western Balkan files. Kos has hinted at continuing technical work on chapters without formally opening them, but the package provides no real roadmap on how the process could avoid being frozen by a single veto. Without such a plan, frustration will only deepen in Kyiv, Chisinau, and across the Western Balkans. EU’s credibility test Underneath its technocratic language, the new package rightly frames enlargement as a ‘ political priority and geopolitical investment ’. The country reports provide a fair and comprehensive overview of the progress, or lack thereof, made by the EU’s hopefuls. What’s missing is the procedural backbone to match the ambition: a roadmap for navigating vetoes, and pa
