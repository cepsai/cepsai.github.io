y lead to better relations with European partners. Such strong, trust-based relationships will be essential for confronting an increasingly unfriendly US administration and to support Ukraine. What should we expect in terms of EU policies? Unsurprisingly, security and defence dominated German parties’ electoral programmes. The CDU manifesto supports a stronger industrial base for the European defence industry, joint defence and security coordination, increased funding for the German military and continued support for Ukraine. Here, the CDU and SDP are likely to find compromise, even if (the departing) Scholz has shown a certain reluctance to send German tanks to Ukraine. The essential question will be how far German decision-makers will be able to shake off their transatlantic attitudes following President Trump and Vice-President JD Vance’s bombshell announcements on Ukraine – and whether they’re willing and able to provide security guarantees and funding for more European cooperation. Right after his electoral victory, Merz stated that Europe will have to become more independent from the US, giving clear indications about his intended direction of travel. On the economy, the CDU manifesto is very much in line with the Commission’s agenda, focussing heavily on competitiveness and suggesting that less red tape and deregulation will lead to a stronger EU economy. They advocate for the ‘omnibus package’ and favour rolling back some climate legislation . While the SDP also wants to strengthen the moribund German economy, there are some divergent views on getting there, particularly regarding Germany’s investment capacity and the green transition. While migration featured prominently in the campaign, it was mostly through a national lens. However, Germany’s repeated infringements of Schengen rules could become problematic at EU level, and the hardened line on migration could lead to frictions with other European partners. One key question will be whether the new government is willing to reform the constitutional debt brake, which limits German debt to 0.35 % of GDP, thus blocking support for more significant EU investment. While the CDU’s programme supports the debt brake, the SDP favours reform. Merz has shown openness to revising it, even if only for defence spending. But it remains a bone of contention, as recent discussions show. At European level, the debt brake is important because EU leaders are preparing to negotiate some controversial files, such as the next Multiannual Financial Framework (MFF) and the collection of EU ‘own resources’ . The last chance government? Regardless of whoever forms the new coalition, it’s likely to be heavily pressured by the AfD, the largest opposition party. It won more than 20 % of the vote and heavily influenced the campaign. If Merz’s government fails to perform, the AfD could potentially come first in the 2029 elections. The (already frayed) ‘ cordon sanitaire’ might then finally break. How well the AfD fares will depend on the centre parties and, most importantly, the CDU. Merz attempting to win over AfD voters by proposing harsher new migration rules a few weeks before the election did not pay off for him in electoral terms – as seen in other countries, voters prefer the original brand. Yet despite the AfD-driven campaign focus on migration, Germany’s economy over the next few years will be the decisive factor. Suffice to say, the pressure is enormous. While EU countries have grappled with high inflation and soaring living costs, Germany is also burdened with the collapse of its long-standing ‘business model’ – relying on copious trade with China, cheap energy from Russia and security guarantees from the US. Given the economic and geopolitical situation, Germany must clearly define its European policy objectives, look for common ground with its allies, showcase that it’s willing to compromise and constructively liaise with its European partners. Above all, the next German government should recognise that its national interest lays firmly in a strong EU. A first opportunity for Merz to brandish his European credentials is the upcoming European Council meeting on 6 March, with outgoing Chancellor Scholz expected to bring him along. Sophie Pornschlegel is Deputy Director at Europe Jacques Delors , where this commentary has also been published.", "wordcount": 1100}, {"source": "commentary", "date": "2025-02-25T14:36:10", "title": "The Italy v ICC row exposes deep-rooted hypocrisy in EU migration policy", "authors": ["Davide Colombi"], "topics": ["Human Rights & Justice", "Migration, Asylum & Borders"], "units": ["Justice & Home Affairs"], "types": [], "link": "https://www.ceps.eu/the-italy-v-icc-row-exposes-deep-rooted-hypocrisy-in-eu-migration-policy/", "page_url": "https://www.ceps.eu/the-italy-v-icc-row-exposes-deep-rooted-hypocrisy-in-eu-migration-policy/", "excerpt": "The Italian government’s recent refusal to comply with an International Criminal Court (ICC) arrest warrant exposes deep-rooted hypocrisy in EU migration policy. While claiming to fight ‘human trafficking’, the Italian government has shielded a high-ranking Libyan official accuse…", "full_text": "The Italian government’s recent refusal to comply with an International Criminal Court (ICC) arrest warrant exposes deep-rooted hypocrisy in EU migration policy. While claiming to fight ‘human trafficking’, the Italian government has shielded a high-ranking Libyan official accused of crimes against humanity and war crimes. This case exemplifies a broader trend where ‘migration’ concerns are used to justify legal exceptionalism, erode the rule of law and foster impunity. The case concerns Osama Elmasry (or Almasri) Njeem , chief of the Libyan judicial police. He was arrested in Turin on 19 January following an ICC arrest warrant for crimes including torture, rape and sexual violence, murder and persecution. Just two days later, he was released and flown back to Libya on an Italian state aircraft. The Italian government presented a list of unconvincing justifications for why it released him: the Court of Appeal of Rome hadn’t validated the arrest as it awaited the necessary approval from the Minister of Justice; the documents hadn’t been translated from English to Italian; and he was expelled for being a ‘ national security risk ’. However, Italy’s refusal to execute the ICC arrest warrant isn’t just a procedural failure but a direct violation of Italy’s – and the EU’s – legal obligations. The ICC is currently assessing a legal complaint against Prime Minister Giorgia Meloni, Justice Minister Carlo Nordio and Interior Minister Matteo Piantedosi, and it has given the Italian government 30 days to provide further information so it can assess its decision to not cooperate. Strong with the weak, weak with the strong Meloni has repeatedly framed migration control as a fight against criminal networks, portraying Italy as a leader in dismantling human trafficking. Following the preventable shipwreck in Cutro in February 2023, Meloni stated : ‘ We are used to an Italy that mainly focuses on searching for migrants throughout the entire Mediterranean. What this government wants to do is search for human smugglers across the whole globo terracqueo ( globe ) because we want to break this trafficking .’ The government’s refusal to comply with the ICC arrest warrant contradicts this commitment. The UN named Elmasry as one of the Libyan state officials directly involved in human trafficking, arbitrary detention, and the torture of refugees and migrants. Yet despite perfectly fitting the profile of those that Meloni vowed to capture, he was sent back to Libya. Instead of targeting high-level traffickers , the Italian authorities have been targeting sea crossing survivors, charging them with the crime of being ‘facilitators’ or ‘smugglers’. One example is Maysoon Majidi , a Kurdish-Iranian refugee detained for ten months in Italy for ‘facilitating illegal immigration’ because she assisted others during a perilous sea crossing. Such cases reveal a clear choice to punish vulnerable individuals for political gain, while shielding those responsible for large-scale trafficking, human rights violations and grave international crimes. After all, the real traffickers don’t put themselves in dinghies in the Mediterranean – they sit comfortably in their homes. So why not go after the real criminals? Since 2017 , successive Italian governments – including the current one – have systematically provided financial and technical support to Libyan authorities and funded detention centres, becoming active accomplices in human rights violations and crimes against humanity. Sending Elmasry back home instead of transferring him to The Hague raises serious questions: Would his testimony have exposed further details on Italian officials’ complicity in these crimes? Was the Italian government blackmailed with the threat of new arrivals from Libya? Of course, these two scenarios aren’t mutually exclusive. Undermining judicial independence and civil society The Italian government’s non-compliance with the ICC reflects a broader trend of treating migration policy as an ‘exception’ to legal norms – from international law to judicial and civil society’s independence. The Meloni government has often clashed with the judiciary , challenging its independence when decisions have challenged executive power. When courts suspended the detention of asylum-seekers in the infamous centres in Albania , government officials and sympathetic policymakers argued that the judiciary was undermining a government representing the ‘ will of the people ’. Similar rhetoric was used when government officials were investigated or put on trial for migration-related matters. And it’s being used again for the ongoing investigation by the Rome Prosecutor’s Office into the Elmasry case. Recent reports have also raised concerns regarding the deliberate targeting through military-grade spyware of civil society actors who have been vocal against the government and Italy and Libya’s ongoing collaboration. The Council of Europe’s Commission against Racism and Intolerance (ECRI) has warned that the political discourse around migration in Italy ‘ endangers the activities of non-governmental organisations providing support to migrants and undermines the independence of the judiciary when dealing with migration cases’ . The European Commission has also acknowledged political attacks against the judiciary for migration-related cases in its 2024 Rule of Law Report . It didn’t, however, provide any relevant recommendations, exposing the Report’s politicised nature . Partners in crime These issues don’t only concern Italy but the entire EU. In the name of ‘preventing migration’, the Commission and individual Member States have struck secretive and unscrutinised deals with authoritarian regimes and state-sponsored criminals – like Elmasry – to contain human mobility in exchange for millions in taxpayers’ money. With the upcoming Pact on the Mediterranean , the ‘ Team Europe’ formations of heads of state and government, EU Commissioners and relevant Commission services are all set to continue down this path. Claims of a ‘ balance ’ between protecting borders and protecting people, between security and humanity, or between fairness and firmness have blinded many EU and national policymakers to the EU’s fundamental foundational values: human dignity, freedom, democracy, equality, the rule of law and respect for human rights (all handily found in Article 2 TEU). Migration policy can’t continue being a pretext for deals with criminals, traffickers and authoritarian regimes, nor a tool for Member States to use to erode the rule of law. First, the Commission should firmly condemn the Italian government’s non-compliance with the ICC arrest warrant. It should also commit to ensuring that migration policies and agreements with third countries aren’t used as a loophole for impunity. This includes launching infringement procedures against Member States that violate international and EU law, undermine the separation of powers and judicial independence, and attack civil society. A comprehensive independent monitoring mechanism must be established to track all EU and national funding related to migration, with clear accountability measures and subject to democratic oversight by the European Parliament and the European Ombudsman. Without meaningful action on these points, the Commission will not just remain a bystander but will actively enable and condone further violations – both within the EU and abroad.", "wordcount": 1117}, {"source": "commentary", "date": "2025-02-25T10:10:50", "title": "An AI Liability Regulation would complete the EU’s AI strategy", "authors": ["Kai Zenner"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/an-ai-liability-regulation-would-complete-the-eus-ai-strategy/", "page_url": "https://www.ceps.eu/an-ai-liability-regulation-would-complete-the-eus-ai-strategy/", "excerpt": "In its 2025 work programme , the European Commission effectively scrapped the AI Liability Directive (AILD) – a move that threatens to unravel trust in the EU’s burgeoning AI policy landscape. This abrupt decision strips away potential critical protections for victims of AI-relat…", "full_text": "In its 2025 work programme , the European Commission effectively scrapped the AI Liability Directive (AILD) – a move that threatens to unravel trust in the EU’s burgeoning AI policy landscape. This abrupt decision strips away potential critical protections for victims of AI-related harm and denies businesses the legal certainty they need to innovate. While the Commission touts a ‘Bolder, Simpler, Faster Union’, abandoning the AILD risks undercutting Europe’s competitive edge and leaving a gaping hole in its AI legal framework. In doing so, the Commission is undermining its own goal of fostering an ecosystem of trust and promoting AI made in the EU. Why AI is challenging existing liability rules Today’s advanced AI technologies differ significantly from traditional software systems. Their complexity, opacity and potential for unpredictable outcomes make it prohibitively difficult for companies and victims alike to pinpoint where things went wrong, let alone assign responsibility. If an AI-powered hiring tool discriminates against job applicants, an automated medical diagnosis system makes a fatal error or a generative AI tool defames an individual, who should be held accountable? Neither the recently updated Product Liability Directive (PLD) nor existing national liability regimes can satisfactorily resolve these issues. The Commission’s 2022 AILD proposal was an attempt to provide a robust, harmonised framework but fell short of the mark. It took an overly cautious approach by merely complementing national regimes and overlooked critical new challenges, such as the rise of generative AI and the complexities inherent in AI value chains. The EU must uphold its role as a trustworthy AI leader and close these gaps by fully completing its legal system on AI. The myth that liability kills innovation The most common pushback against even considering AI-related legislation is the claim that such rules would stifle innovation. This argument isn’t just misleading – it’s the exact opposite of the truth . Right now, an AI company must navigate 27 different national liability regimes, on top of 27 different procedural regimes. Each one offers victims various ways to claim damages (including immaterial harms) after alleged violations of legal obligations under the AI Act or other EU laws, which national authorities often interpret differently. This patchwork creates a high level of legal uncertainty, disproportionately harming small and medium-sized enterprises (SMEs) and startups that lack the legal resources to handle the high costs stemming from these diverse liability regimes. In reality, only a few powerful US and Chinese tech giants can manage such complexity. By contrast, a codified and harmonised AI liability framework would significantly reduce legal costs for all other market players, streamline and simplify compliance, and boost investment in European AI safety. Companies would finally know where they stand, and consumers would gain greater trust in the technology – paving the way for the broader adoption of European AI solutions. In fact, a 2020 study by the European Parliament Research Service estimated that introducing new AI liability rules could add up to EUR 498.3 billion in value to the EU economy, once broader impacts – like the reduction of accidents – are taken into account. What needs to be done To trigger these positive changes, the EU’s AI Liability regime must consist of four distinct features. First , it needs to be codified in the form of a Regulation, following the general EU trend of shifting from Directives to Regulations, as has happened in other policy areas such as product safety (i.e. the Machinery Regulation) or market regulation (i.e. the Digital Services Act). Only an AI Liability Regulation (AILR) will allow for full harmonisation across Member States, eliminating the legal fragmentation that would lead to a litigation minefield for AI firms and uncertain compensation rights for claimants. Second , it’s important that EU institutions prevent a situation where victims of AI-related harm must engage in costly, years-long litigation just to prove that an AI system caused the damage. Provisions on reversing the burden of proof must be duly introduced, and be made coherent with the AI Act. Thus, the new AILR should make sure that the victim faces fewer burdens if the harmful AI system was categorised as being a higher risk. Prohibited AI systems (covered in Article 5 of the AI Act) should always trigger strict liability. Third, we need to establish a joint liability regime. It shouldn’t only be EU downstream providers or AI system deployers that face litigation if something goes wrong. As much AI-related harm originates at the model development stage, where major tech firms train foundation models that can later be fine-tuned for different purposes, it must be ensured that liability can be traced up the AI value chain – this includes model developers and component suppliers. This would also prevent developers from abusing their market dominance by forcing customers to waive their right to recourse. Fourth , we need to extend the law’s scope by identifying areas that aren’t covered by the updated PLD or by national liability regimes to establish a genuine ecosystem of trust, making sure that any AI-related harm will be compensated. This would span from professionally used property or IP rights over large-scale disinformation to personality rights or discrimination against an individual. Victims – whether companies or citizens – should not be the ones suffering from legal uncertainty or fragmentation caused by the EU’s digital policy instruments. The stakes are high for Europe The EU has positioned itself as the global leader in regulating AI but actual leadership means getting the details right. If the co-legislators fail to address liability rules for AI, the EU risks a future where victims of AI-related harm face daunting legal and technical barriers to seeking justice. At the same time, downstream EU companies will be forced to navigate a fragmented and unpredictable legal landscape, allowing the dominant Big Tech firms – with their vast legal resources – to gain an even greater edge. Consequently, AI innovation could shift away from the EU toward jurisdictions with fewer regulatory hurdles and more transparent liability frameworks, threatening Europe’s competitiveness in the global AI market. While it’s true that the EU’s competitiveness has suffered from incoherent and overlapping regulations in the past, rules on AI liability are not about saddling AI companies with more red tape. Rather, they’re about holding accountable those who develop, sell or deploy harmful technology. EU legislators must rise to the challenge and strike the right balance, creating a trustworthy AI ecosystem that also fosters innovation – ultimately protecting both consumers and EU companies. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1127}, {"source": "commentary", "date": "2025-02-21T10:25:44", "title": "To connect the dots, how about an EU Digital Clearinghouse to coordinate across EU digital law?", "authors": ["J. Scott Marcus"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/to-connect-the-dots-how-about-an-eu-digital-clearinghouse-to-coordinate-across-eu-digital-law/", "page_url": "https://www.ceps.eu/to-connect-the-dots-how-about-an-eu-digital-clearinghouse-to-coordinate-across-eu-digital-law/", "excerpt": "The complexity of EU law dealing with digital services has exploded over the past five to 10 years, both in the sheer number of laws that have come into force, and in how complicated they are. Under these circumstances, the task of ensuring consistency across these laws – not onl…", "full_text": "The complexity of EU law dealing with digital services has exploded over the past five to 10 years, both in the sheer number of laws that have come into force, and in how complicated they are. Under these circumstances, the task of ensuring consistency across these laws – not only in the laws’ text but also how they’re enforced among Member States – has absolutely exploded. The Letta report , the Draghi report and the Commission’s new Competitive Compass have all called for making EU regulation simpler, more coherent and more consistent across the Member States. Multiple reports and surveys show that businesses are not only concerned about the growing regulatory burden but are also increasingly uncertain over how to comply with multiple laws that cannot be guaranteed to be fully mutually . Despite the legislators’ best efforts, experience has shown that some inconsistencies only become evident once the laws have come into force – and that’s why we need to set up a new coordination body to rectify this, an EU Digital Clearinghouse. A growing volume of EU law A huge volume of new EU law relevant to digital policy has been enacted over the past few years. Not only has the number of digital measures grown from roughly 20 to 88 since 2012, but many of the new laws are infernally long and complex . Conspicuous among this burdensome alphabet soup of new laws are the EECC, GDPR, DSA, DMA, DGA, the Data Act, and the AI Act. The cancerous growth of EU-level legislation ought to be trimmed back by the REFIT process , ex post evaluation and the ‘one in one out’ strategy, but each of these is underperforming in one way or another. The new Competitiveness Compass seeks to trim back some of the excess but whether it’ll prove to be effective remains to be seen. Different dimensions of a lack of coherence The interactions between and among these measures, and with existing EU legislation, are difficult to foresee in full. There are at least three distinct but mutually inter-related dimensions of potential mismatches among the laws. First , with the growing links between regulatory topics that historically were little related to one another (such as, for example, privacy, competition law and consumer protection), the risk of unintended inconsistencies among different laws has grown immeasurably. Second , the volume and complexity of new laws has been exacerbated by the ever-present tensions over how EU laws are implemented among the Member States – and how that implementation is coordinated with the European institutions. As far as distinct topics are concerned, digital policy is so broad and cross-cutting that it touches on many specialised thematic areas. These include industrial policy, innovation, competition, freedom of expression, privacy and security. An expert in one of these areas will not necessarily be conversant in the others. The need for an overarching view is, however, becoming increasingly evident. A recent working paper by the European Data Protection Supervisor (EDPS) clearly expresses the problem. It notes that the proliferation of often overlapping legal requirements applicable to market players in the EU digital economy often place them – and their regulators – in a difficult position: ‘ They are compelled to implement and apply rules that cover the same or similar conduct – although to pursue different policy objectives – that may produce inconsistencies that are not easily solved by isolated interpretive efforts .’ Most of the existing and new measures have mechanism for coordination among the Member States, and between the EU institutions and the Member States, but no two use the same mechanism. Some are working well, while others have shown themselves to be problematic, with the GDPR’s ‘one stop shop’ being a good example of a mechanism that is arguably performing poorly. It’s appropriate that different legislative measures have different coordination mechanisms because they’re seeking to solve different problems. How far solutions need to be tailored to national circumstances varies with the needs of the problems that they seek to address, and with the markets that are concerned, and with the degree of consistency with pre-existing Member State laws that might be required. In short, one size cannot fit all. One still must wonder if it’s necessary – or even helpful – for every law to embody its own unique coordination mechanism. What could be done at European level? A lack of coherence has already shown itself to be a serious risk area for digital services regulation. With the explosion in new digital services legislation, there’s a much greater risk of a lack of coherence among different legislative measures and different EU and Member State implementation bodies. Regulators, courts and other policymakers do their best but current half-measures have reached their limits – comprehensive fixes are needed. The mechanisms to foster greater dialogue and coherence across the multiple areas of digital regulation that have been implemented in the Netherlands, other EU Member States and the UK might offer a useful starting point. To improve coordination across thematic areas, the EU should put in place a coordination body like the UK DRCF . This could take inspiration from the Digital Clearinghouse 1.0 that the EDPS put in place a few years ago and from the DMA’s High-Level Group . It should be supported by a paid secretariat but with as lightweight a structure as possible. The seat should be chosen for reasons of overall efficiency, independent of the ‘pork barrel’ considerations that often dictate the location of small EU independent agencies. Rather than a purely voluntary structure, the body should be able to make concrete recommendations (not necessarily limited to near unanimity). Small surgical changes in existing laws could empower regulatory bodies such as the EDPB and BEREC to participate, and to ‘take account’ of the new body’s recommendations. Poor coordination between the EU institutions and the Member States, and among the Member States themselves, constitutes a more challenging problem. The ongoing shift from directives to regulations, and from loose harmonisation to strict harmonisation, will be appropriate for enhancing harmonisation for many laws but not for all – some decisions are most appropriately taken at Member State level due to Member State specificities, and in line with the subsidiarity principle. Dealing with existing laws that have coordination mechanisms but are underperforming will be difficult and time-consuming. A necessary first step would be a re-vamping of the ex-post evaluation process together with a major expansion of the REFIT process. The most problematic coordination mechanisms could then be migrated over time to more effective mechanisms. A dedicated coordination body would be instrumental in making this a success. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1153}, {"source": "commentary", "date": "2025-02-20T10:45:36", "title": "To finally defeat neglected diseases, the EU needs to really lead in global health", "authors": ["Lisa Goerlitz", "Rosa Castro"], "topics": ["Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/to-finally-defeat-neglected-diseases-the-eu-needs-to-really-lead-in-global-health/", "page_url": "https://www.ceps.eu/to-finally-defeat-neglected-diseases-the-eu-needs-to-really-lead-in-global-health/", "excerpt": "The EU’s ambitions must be supported by adequate resources. This is particularly true for global health, where uncertainty stemming from the new US administration and other geopolitical shifts highlight the urgent need for the EU to step into the leadership role it has long sough…", "full_text": "The EU’s ambitions must be supported by adequate resources. This is particularly true for global health, where uncertainty stemming from the new US administration and other geopolitical shifts highlight the urgent need for the EU to step into the leadership role it has long sought. Neglected diseases (or ‘NDs’) present a strategic opportunity for the EU to make a smart investment that could have a real impact on global health. NDs impact around 1.6 billion people globall y , causing devastating health and socioeconomic consequences. Since those affected primarily live in low- and middle-income countries (LMICs) with limited ability to pay, there has been little to no commercial incentive for developing new medicines and vaccines targeting NDs. Both the spread of NDs as well as their global health security significance are shifting. Climate change is facilitating the (re-)emergence of vector-borne diseases in other regions; linked challenges such as rising antimicrobial resistance (AMR) are increasing the disease burden; and some NDs have epidemic or even pandemic potential. As we’ve seen for Ebola or mpox, NDs tend to be neglected – until they come (close) to us . But at that point, it may already be too late for many to benefit from a new vaccine or medicine. On the bright side, innovations such as AI for drug discovery and the use of mRNA platforms for vaccine development could see many NDs eventually eliminated. With decades of funding global health via its research and innovation framework programme (Horizon Europe and its predecessors) and direct contributions to neglected disease R&D from the European and Developing Countries Clinical Trials Partnership (Global Health EDCTP3), the EU has played a key role. These investments have started to bear fruit. The recently approved malaria vaccines are a beacon of hope for a devastating scourge as old and as widespread as humankind. And a new chikungunya vaccine is offering protection for people living in LMICs, as well as for travellers and those who live in places where mosquitoes are finding new habitats due to climate change. Yet a flurry of candidate vaccines and medicines that should be advancing through the clinical pipeline are hitting a dead end. Promising TB vaccines may get ‘stuck’ as developers urgently need cash to finance the last, costly phases of development, not to mention regulatory approval and actual commercialisation. Unless solutions are found to assist not-for-profit developers (a vast majority in this field) and small biotech companies reach the last mile of development, the EU risks missing out on a big part of the great investment return that decades of R&D investments could leverage if these products actually made it to market. That’s why DSW teamed up with US-based researchers who have developed an innovative pull funding mechanism – one that complements grants and helps innovations advance into the last phases of development – called the Priority Review Voucher (PRV). We a similar but improved scheme for the EU. Under this programme, the developer of a new medicine or vaccine for an ND would be given a voucher from the European Medicines Agency and would be able to use it to either receive accelerated review for another, commercially valuable product or they would be able to sell the voucher on to another company. The US PRV programme was crucial for the development of the first-ever vaccine against Chikungunya (which also received grant funding from CEPI/the EU ) and other global health innovations, including dengue and mpox vaccines, as well as ND drugs for children – all developed by European companies. A potential EU PRV would complement the US programme and could be tailored to advance key health goals that are often difficult to balance. Indeed, stimulating innovation and industry competitiveness while ensuring the sustainability of the EU’s public health systems and health innovations’ accessibility is a particularly complex task . An EU PRV programme could help companies reach the last stage of development. The programme alone wouldn’t guarantee equitable access to new medicines and vaccines but it could nudge companies to think about how they would ensure access to their medical innovations, both within and beyond Europe. For instance, the US PRV programme complemented EU push funding from Horizon Europe to enable the development of fexinidazole – the first oral treatment for sleeping sickness – paving the way for the elimination of this disease after decades of neglect. The programme’s requirements, such as access conditionalities and eligibility, would need to be fine-tuned. If well designed, this new pull incentive could accelerate the development of key treatments for diseases, including those that could become increasingly common in Europe due to climate change or could spark the next pandemic. Revising the EU’s general pharmaceutical legislation is the perfect opportunity to introduce this programme. However, this window of opportunity will soon close and the EU should not miss the chance to provide a real contribution to global health innovation. In short, it really would be ridiculous for the first post-Covid EU pharmaceutical legislation to leave global health innovation and access completely out of its scope! Depending on its future design, the European Health Emergency Preparedness and Response Authority (HERA) could also play a key role in introducing other pull mechanisms for ND R&D. has explored innovative financing approaches, including the joint procurement of vaccines for Covid-19 and mpox, and revenue guarantees for new antibiotics to fight against increasing AMR. DSW has also studied the impacts and feasibility of these and other pull incentive mechanisms . While expectations for decisive EU action are high, securing additional resources for global health R&D in the next multiannual financial framework remains a significant challenge amid constrained public budgets and other global challenges. This calls for the EU to seriously explore all available options to promote innovation – especially those with no cost to taxpayers and a proven track record… like the PRV programme. To be a credible leader, the EU must take on a more pivotal role in securing equitable access to global health innovations. The time is ripe for the EU to fulfil its geopolitical ambitions, capitalise on past R&D investments and deliver innovations that not only help to alleviate the heavy burden of disease but also to reduce socioeconomic inequalities around the world. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1085}, {"source": "commentary", "date": "2025-02-19T14:08:59", "title": "Enough is enough – why the EU needs sufficiency to thrive", "authors": ["Patricia Urban", "Luca Nipius"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/enough-is-enough-why-the-eu-needs-sufficiency-to-thrive/", "page_url": "https://www.ceps.eu/enough-is-enough-why-the-eu-needs-sufficiency-to-thrive/", "excerpt": "We are depleting our planet’s finite resources at a dangerous pace, driven largely by overconsumption in the Global North. This fuels emissions, pollution and biodiversity loss, despite efficiency gains. And regardless of lower net emissions, EU consumption shifts environmental h…", "full_text": "We are depleting our planet’s finite resources at a dangerous pace, driven largely by overconsumption in the Global North. This fuels emissions, pollution and biodiversity loss, despite efficiency gains. And regardless of lower net emissions, EU consumption shifts environmental harm abroad, worsening global inequities. Buildings and transport are central to this crisis. On the one hand, they’re crucial for people’s lives. On the other, the EU construction industry consumes 1.8 billion tonnes of raw materials – a third of the bloc’s total – and generates 330 million tonnes of waste annually. Meanwhile, transport emissions, particularly from road transport, account for nearly a quarter of EU emissions. This relentless resource use pushes us past planetary boundaries, threatening the Earth’s capacity to sustain life. Of course, those who consume the least often suffer the most from its consequences. In housing, unequal access is stark, with the cost-of-living crisis exacerbating disparities. Similarly, poorer EU regions still often lack access to public transport. We are facing an interlinked social-ecological challenge: lowering resource consumption and environmental impacts while addressing social inequalities. Efficiency and renewable energy are vital, but they’re not enough. We must embrace sufficiency. Sufficiency is the missing piece Sufficiency means finding the point of ‘enough’ consumption – enough for everyone’s basic needs to be met equitably, without overconsuming to the point of ecological collapse. ‘Enough-ness’ is thus constrained by a social floor, the minimum, and an ecological ceiling, the maximum. It’s about avoiding wasteful demand for energy and materials across the lifecycle of goods and services. Think of sufficiency as both a tool and a vision, a way to prioritise wellbeing within the Earth’s limits. It’s about recognising and embracing a state of ‘enough.’ Practically, sufficiency requires asking tough questions: What are our real needs? How much carbon and material use do we need to satisfy these? Finding these answers must happen through inclusive, democratic processes that respect cultural and local realities. Of course, this appears to be in stark contrast to our current economies and lifestyles. How is reducing absolute levels of production and consumption compatible with competitiveness – the trending buzzword of the new Commission? Let’s turn this question around. How do ‘competitiveness’ and growth for its own sake serve us in the face of persisting inequalities and ecological crises? If we really put societal and ecological welfare at the heart of our policies, then this requires a radical rethinking of concepts. Competitiveness doesn’t need to be measured only by productivity and GDP growth. The Draghi report mentions ‘competitiveness’ 515 times, without ever defining what it means. So, let’s define it ourselves, by focusing on long-term wellbeing and societal robustness, while minimising environmental and social costs. In this sense, sufficiency can help us be more competitive. The sufficiency concept isn’t entirely new to the EU. Initiatives like the EU Waste Hierarchy prioritise prevention above all else. Similarly, the ‘right to repair’ ensures consumers can extend their products’ lifespan, reduce waste and the demand for virgin materials. What these examples show is that we don’t need to start from scratch. All this won’t happen overnight. But there are concrete steps we can take, one by one. And we can start with those sectors that have a high environmental impact while also being crucial for meeting basic needs – buildings and transport. A practical path forward For the buildings sector, sufficiency means better use of the existing stock. This involves transforming underused or vacant spaces into housing rather than constructing new buildings, which reduces emissions and the demand for raw materials. Extending the lifespan of current buildings through maintenance and retrofitting is another critical approach, cutting down the need for new construction. Lowering the average floor space per capita, while improving housing quality and comfort, can also reduce material and energy use. Circularity plays a key role, reusing and recycling to minimise waste and resource extraction. The Energy Performance of Buildings Directive (EPBD) or the Construction Products Regulation , for example, could address these aspects . For transport, sufficiency means reducing resource-intensive trends , such as increasingly large cars – the so-called Americanisation of vehicles. Smaller, more efficient cars not only use fewer materials but also enhance road safety and reduce emissions. Such measures could be introduced through vehicle standards or the proposed End-of-life Vehicles Regulation . Policies can also shift the focus from individual car ownership to options like car-sharing schemes. Even better, expanding and improving access to public transport reduces car dependency. Sufficiency options for EU policies mainly target the ecological ceiling, rather than the social floor. It’s not easy for EU policies to design redistributive policies, given its lack of competencies in the social policy area. Still, the EU can provide a framework for Member States to tackle environmental issues while supporting national social policies through EU funding. Member States will nevertheless need to carry their own weight. The dream of becoming mainstream To bring sufficiency to the forefront of EU policymaking, much like efficiency has been, four key steps are needed. First , a unified, cross-sectoral definition of sufficiency must be established. This will provide a foundation to embed sufficiency into existing policies rather than creating entirely new frameworks. Second , we need to shape demand away from overconsumption and towards the sufficiency corridor. For example, sufficiency could be integrated into the EU’s to-be-revised Public Procurement Directives and upcoming mandatory Green Public Procurement criteria. Projects could be awarded for reducing resource consumption by focusing on product durability, repairability and appropriate sizing. Third , sufficiency should be included into the National Energy and Climate Plans . The EU could establish monitoring and reporting frameworks for national sufficiency activities, as already proposed by the European Parliament in the 2024 EPBD revision. Finally , faster access to EU funding, like the Just Transition Fund and expected Clean Industrial Deal funds, could support Member States based on adhering to sufficiency principles, i.e. avoiding excess consumption while improving equality. The European Commission could monitor progress on sufficiency in a similar way to how it tracks the implementation of the ‘Energy Efficiency First’ principle, integrating it into existing governance mechanisms. However, further work is needed to identify suitable sufficiency indicators, determine appropriate benchmarks and assess how sufficiency efforts can be allocated across sectors and products while considering national contexts. It goes without saying, this journey won’t be an easy one, especially due to increased calls for economic competitiveness rather than welfare objectives. Still, the social and ecological crises have demonstrated that we need new systemic solutions. But sufficiency isn’t just needed, it’s also something to be desired. Sufficiency can be a tool for a world that’s more just and equal, where everyone can meet their basic needs within a safe operating space for humanity to thrive in. … if we only dare to question the status quo . This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1183}, {"source": "publication", "date": "2025-02-18T16:06:43+01:00", "title": "One market, many rules: The 28th regime’s challenge in unifying Europe", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/02/No-95-One-market-many-rules-The-28th-regimes-challenge-in-unifying-Europe.pdf", "page_url": "https://www.ceps.eu/ceps-publications/one-market-many-rules-the-28th-regimes-challenge-in-unifying-europe/", "excerpt": "The 28th regime could see a potential overhaul of Europe’s capital markets that would address key challenges such as financing the green and digital transitions", "full_text": "", "wordcount": 106}, {"source": "commentary", "date": "2025-02-18T10:29:43", "title": "Why Europe needs a climate bad bank to avoid a ‘green swan’", "authors": ["Nicole Reynolds"], "topics": ["Energy, Climate & Environment", "EU Budget & Public Investment", "Finance & Banking"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/why-europe-needs-a-climate-bad-bank-to-avoid-a-green-swan/", "page_url": "https://www.ceps.eu/why-europe-needs-a-climate-bad-bank-to-avoid-a-green-swan/", "excerpt": "In the age of the poly-crisis, the world is constantly lurching from one disaster to another – from unprecedented flooding in Spain to a once-in-a-lifetime pandemic, from new bouts of political instability to ongoing conflict in the Middle East. Indeed, the poly-crisis has morphe…", "full_text": "In the age of the poly-crisis, the world is constantly lurching from one disaster to another – from unprecedented flooding in Spain to a once-in-a-lifetime pandemic, from new bouts of political instability to ongoing conflict in the Middle East. Indeed, the poly-crisis has morphed into a ‘permacrisis’ and the impacts of climate change are a clear manifestation of this new reality. One must only witness the widespread destruction caused by the recent wildfires in California to understand the urgency of the climate crisis. That’s why these novel challenges demand new ideas and policy tools, all conceived through a radical systems change that will future proof our crisis response and, by extension, policy frameworks. Climate change’s impact on financial markets is one such challenge that the world is ill-prepared for because there are no precedents and thus regulators need to come up with new solutions. The EU has enacted the most ambitious financial legislation in the world to address climate change but it still may not prepare the ECB for what the Bank of International Settlements in 2020 called the ‘ green swan ’ – where certain climate risks could result in a financial crisis triggered by the transition away from the use of fossil fuels. The European Climate Law mandates that the EU must achieve net zero by 2050. This means that virtually every sector of the EU economy will have to undergo a massive shift to achieve this – including what banks finance. But this could cause significant financial instability as the EU transitions away from carbon-based energy. If we do nothing, some 19 % of global GDP could be wiped out by the year 2050. However, if we do manage to limit global warming to 2C, this would be reduced to only a sixth of that amount. This leaves central banks with a lot of unappealing options to ensure financial stability, and none of them without costs, such as lost output, higher inflation or job losses. According to new research presented at the Green Swan 2024 conference in November 2024, reducing carbon emissions may lead to short-term productivity losses and a costly transition to reorganise production. During this period, central banks face tougher trade-offs between inflation and unemployment, along with increased inflation volatility. A higher inflation rate may be necessary to drive changes in relative prices that encourage investment in greener industries. However, tight monetary policies could slow innovation in the green sector. To balance this, additional measures like targeted credit policies and subsidies may be needed to support green investments. This would help central banks manage inflation, all while promoting a successful transition. Still, these measures may not be enough to avoid a future financial crisis. Fulfilling the Green Deal’s ambitions to steer Europe towards a sustainable future will require exploring more unconventional policy interventions. According to a 2024 ECB report , European banks face significant exposure to climate risks in their portfolios from assets linked to fossil fuels. The ECB’s survey found that a substantial portion of euro area outstanding loans were substantially misaligned with the goals of the Paris Agreement. A recent ECB stress test of the euro area financial system found that it should hold together if things mostly go to plan. However, even the baseline ‘best case’ scenario, which the ECB admits contains many unknowns and uncertainties, would be expected to generate losses. But if any scenario worse than the base case comes to pass, such as a ‘run on brown’ – meaning an abrupt shift away from lending and investing in companies with unfriendly environmental practices – and a simultaneous recession, then we could be in deep trouble. The losses would likely rival those of the last financial crisis where the European Commission approved EUR 1.5 trillion in state aid to banks. And therein lies the rub – the ways in which transition risks can materialise into a full-blown financial crisis are almost impossible to predict because they involve complex dynamics and chain reactions whose direction of travel cannot be easily predicted. And it only takes one domino falling to trigger a contagion that puts the whole financial system in jeopardy. So, what should European regulators do? To achieve the twin objectives of staving off a climate-mediated financial crisis and reaching net zero targets, regulators should consider more drastic measures than those currently being considered. The boldest measure would be to pre-emptively set up a ‘climate bad bank’. This is a special-purpose legal entity structured as a public-private partnership that’s tasked with acquiring and then winding down the assets on bank balance sheets that are likely to become stranded (illiquid and worthless) when transitioning to a low carbon economy. Bad banks are of course not new in Europe. They have been used many times in the past, including in the early 1990s in Sweden and during the financial crisis and subsequent European debt crisis , allowing banks to isolate toxic assets on their balance sheets to prevent bank failures. A climate bad bank, however, goes beyond the mandate of a traditional bad bank – it acts to both immunise the financial system from non-performing assets and to abate carbon by winding down fossil fuel assets on an accelerated timeline, while also redirecting investments to sustainable sectors. Establishing a climate bad bank would require a well-designed partnership between public financial institutions and private sector investors because decarbonisation on the scale needed to comply with the EU’s climate regulation (and to prevent a green swan) would require vastly more money than the public sector can – or should – provide. A climate bad bank partnership between the European Investment Bank, the European Stability Mechanism, EU Member State central banks and private investors could raise the required sums and ensure that fossil fuel assets are wound down in an orderly and accelerated fashion – and while recycling capital into the key industries of the future. Make no mistake about it, staying within the thresholds of 1.5C and 2C in the Paris Agreement will require enormous investments to steer the economy through the transition. Policymakers need a tool that can pull off a trifecta and a pre-emptive climate bad bank might just be that tool… whether there’s the political will to take such a bold step is another matter entirely. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1094}, {"source": "commentary", "date": "2025-02-17T10:14:52", "title": "We should revise the GDPR to unlock Europe’s digital future", "authors": ["Axel Voss"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/we-should-revise-the-gdpr-to-unlock-europes-digital-future/", "page_url": "https://www.ceps.eu/we-should-revise-the-gdpr-to-unlock-europes-digital-future/", "excerpt": "The EU’s General Data Protection Regulation (GDPR) was initially heralded as a ground-breaking legal framework for data privacy. However, in its current form and application, it has become a roadblock to digital progress, stifling innovation, impeding AI development and hampering…", "full_text": "The EU’s General Data Protection Regulation (GDPR) was initially heralded as a ground-breaking legal framework for data privacy. However, in its current form and application, it has become a roadblock to digital progress, stifling innovation, impeding AI development and hampering essential research. A review of the GDPR is now overdue, with the current rules in place since 2018. If Europe wants to remain competitive in an increasingly data-driven world, some immediate reforms to the GDPR are essential. We need urgent measures to resolve access issues to datasets, implement a risk-based approach to regulation and create a harmonised and simplified legal framework that promotes both privacy and innovation. In the digital age, data is the currency of progress. Without access to datasets, AI models cannot be trained, medical research cannot advance and businesses cannot operate efficiently. Yet under the GDPR’s stringent and often inconsistent enforcement, accessing, processing and sharing data has become an administrative nightmare. The regulation’s complexity, combined with varied national interpretations, has led to a bureaucratic bottleneck that stymies economic growth and research advancements. That’s why it’s time for a pragmatic revision that balances protecting personal information with the need to leverage data for innovation and societal benefit. A risk-based approach One of the GDPR’s fundamental flaws is its fragmented enforcement across the EU. Each Member State applies its own interpretation of the rules, leading to a lack of legal certainty for businesses and researchers operating across borders. This inconsistency results in massive compliance costs and administrative hurdles, particularly for start-ups and SMEs that lack the resources to navigate 27 different legal landscapes. A uniform interpretation of the GDPR, applied consistently across all Member States, is thus necessary to ensure a functional, streamlined regulatory environment. Moreover, the approval of a business’s data processing practices in one Member State should be recognised EU-wide, eliminating the need for redundant approvals in each jurisdiction. Germany, with its federal structure, should lead by example and implement similar recognition principles across its states. If we are to foster a truly unified digital market, regulatory harmonisation must be a top priority. Not all data processors should be treated equally. It’s illogical to impose the same stringent requirements on small businesses as on global tech giants. GDPR reforms must introduce a risk-based approach, differentiating obligations based on company size and the volume of data processed. This will ensure that SMEs are not disproportionately burdened by compliance requirements while still maintaining strong privacy protections for individuals. Similarly, the GDPR should facilitate – rather than hinder – AI development. AI models require large and diverse datasets to function effectively. Current GDPR provisions make training AI within Europe highly challenging, forcing companies to seek alternatives outside the EU. This not only puts European businesses at a disadvantage but also increases dependence on foreign technologies, essentially turning Europe into a digital colony rather than a digital leader. Rethinking data protection – from absolute control to balanced privacy There’s a deeper philosophical question that also needs to be addressed, namely is the GDPR’s rigid structure still fit for purpose? Should we continue to prioritise the control of personal data over its responsible use? The objective of data protection should be to safeguard individuals’ privacy, not to create insurmountable barriers to progress. A shift in perspective is urgently needed – one that recognises that privacy and innovation are not mutually exclusive but can be achieved together. For instance, legally secure methods for anonymised and pseudonymised data processing should be developed to allow AI training and medical research while preserving privacy. The ability to use personal data in a controlled, transparent, and accountable manner would enable Europe to lead in AI development while ensuring individuals’ rights remain protected. The GDPR, in its current form, is an outdated regulatory framework that is hindering Europe’s digital potential. A modernisation effort within the European Commission has already faltered due to bureaucratic inertia and a reluctance to challenge the status quo. However, the stakes are too high for inaction. Europe has a choice – either we revise the GDPR to enable digital innovation while safeguarding privacy or we continue down a path that leads to stagnation and increasing reliance on foreign technology. A change of perspective is urgently needed to ensure that Europe remains a competitive and sovereign digital power. The future of our data-driven world depends on it. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 772}, {"source": "commentary", "date": "2025-02-14T10:30:05", "title": "To be a true global leader in research and innovation, the EU needs to get FP10 right", "authors": ["Andrea Renda"], "topics": ["AI, Digitalisation & Innovation", "Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/to-be-a-true-global-leader-in-research-and-innovation-the-eu-needs-to-get-fp10-right/", "page_url": "https://www.ceps.eu/to-be-a-true-global-leader-in-research-and-innovation-the-eu-needs-to-get-fp10-right/", "excerpt": "In an ever uncertain and increasingly dangerous world, the EU must lead the way in tackling global challenges, using science and technology for the benefit of humanity. European Commission President, Ursula von der Leyen, has vowed to make this happen, publicly proclaiming that t…", "full_text": "In an ever uncertain and increasingly dangerous world, the EU must lead the way in tackling global challenges, using science and technology for the benefit of humanity. European Commission President, Ursula von der Leyen, has vowed to make this happen, publicly proclaiming that the EU ‘aims to put research and innovation, science, and technology at the heart of Europe’s economy’. This would also go a long way towards fulfilling another one of von der Leyen’s key second term objectives – reinvigorating European industrial competitiveness. Yes, ‘innovation’ and ‘competitiveness’ have always been particularly popular buzzwords in the Brussels lexicon but right now they’re truly capturing the zeitgeist, especially following a plethora of reports from the likes of Enrico Letta and Mario Draghi , to name but two. And the EU’s Framework Programme for Research and Innovation (R&I) – the largest R&I funding programme in the world – is one of the most potent tools in the EU’s arsenal to achieve all these lofty ambitions. With the end of the ninth Framework Programme, Horizon Europe , looming, ahem, on the horizon, the tenth (FP10) is scheduled to run from 2028-34. FP10 presents the perfect opportunity to restore and relaunch Europe’s leading role in scientific breakthroughs and groundbreaking innovation for everyone’s benefit. Even with a few years still to go before launch, now is the moment to really begin hammering down and agreeing an ambitious vision and structure for FP10. With all this in mind, CEPS recently published a comprehensive report (supported by Imperial College London and the Wellcome Trust ) on how the EU’s leaders can do this. The vision it promotes for FP10 will require several reforms – and to be clear, enacting them won’t be a simple walk in the park. But they will be absolutely worth it in the end. Five key planks for FP10 success First , FP10 will have to juggle multiple objectives. Yes, boosting European competitiveness is one of them, but others include achieving the EU’s sustainability goals to help the world remain within planetary boundaries, as well as strengthening Europe’s economic security and resilience. On top of this, it’ll need to promote the ‘ fifth freedom ’ by ensuring that every European region can thrive. Indeed, FP10 doesn’t all need to be uniform – different parts of it can (and should) prioritise some goals over others. But overall, FP10 must be balanced and oriented towards a singular guiding ‘North Star’, namely the EU Treaty commitment to promote wellbeing and sustainable development, for Europe and the wider world. Second , FP10 needs to be more agile and future-proof than Horizon Europe and this is essential for (at least) two reasons. By 2028, AI and new frontiers of collective intelligence are likely to have revolutionised the way research is carried out and translated into market-ready innovation. Failing to anticipate this in FP10’s design would be a fatal error and would make it irrelevant before it has even left the starting line. AI can also be used in many way to help implement FP10. It can speed up project selection, monitoring and evaluation, and it can be used to to match start-ups with potential funders and mentors. That’s why the newly announced AI Research Council should be a major contributor to FP10, not just in the design phase but also post-launch. Third , Horizon Europe’s current pillar structure needs to evolve for FP10, as it currently conflates two domains (industrial competitiveness and societal challenges) that increasingly require different governance and instruments, as well as mixing goals. We propose to design FP10 like a human brain – with a core motor or cerebellum, i.e. a stronger ‘excellent research area’ accessible from all over the world and centrally coordinated at the EU level, alongside two distinct ‘hemispheres’. One hemisphere would be devoted to industrial competitiveness, where an ad hoc council governed by public and private stakeholders (including industry) would work together towards systemic industrial transformation to achieve sustainable competitiveness. The second would concentrate on multistakeholder partnerships for global public goods. Both would be open beyond European borders and would involve philanthropies, international donors and researchers from low- and middle-income countries, all governed and overseen by a dedicated council. Fourth , with this new structure, the FP10 hemispheres should have different rules from each other, such as on intellectual property and the funding of dual-use R&I, which would be more possible in the competitiveness hemisphere. They should also feature a different blend of instruments, with innovative procurement, ARPA -style institutions and a platform for startups playing a prominent role in the competitiveness hemisphere. Multistakeholder, mission-oriented innovation and partnerships should become the lynchpin of the hemisphere focused on global public goods. We also recommend different forms of governance, with industrial competitiveness attracting European countries (including non-EU ones) and the private sector, whereas global public goods should be broader and have more inclusive participation. Finally , the two FP10 hemispheres would enable stronger and more coherent links with other EU and national policies – one of Horizon Europe’s weaknesses. The industrial competitiveness hemisphere would naturally be linked to industrial policy, defence, cohesion and regional policy, and trade. The global public goods hemisphere would be better coordinated with international partnerships, the Global Health Strategy and the EU’s external action priorities more generally. A rallying call – the time is now We strongly believe that our proposed structure and governance for FP10 manages to carefully balance the need to change course if required and provides direction and stable funding for researchers and innovators, in Europe and globally. Our redesigned FP10 would cater to Europe’s thirst for sustainable competitiveness but also position the EU as a true leader of a community seeking answers to the challenges of our time. It would give Europe a chance to thrive in a future of inevitable uncertainty, regain its gravitas in defending the role of science for a more prosperous future, and gather the global community of researchers and innovators around a pivotal set of actions. If done right, FP10 promises to be a beacon of European leadership, promoting science as an engine for global peace and prosperity. Our proposals offer the vision needed to do this – it’s now up to European leaders to make it happen. To read the full report that this commentary is based on, click here . This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1102}, {"source": "commentary", "date": "2025-02-13T16:21:54", "title": "A bold proposal to build the ‘EuroStack’ – because doing nothing isn’t an option anymore", "authors": ["Francesca Bria", "Andrea Renda"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/a-bold-proposal-to-build-the-eurostack-because-doing-nothing-isnt-an-option-anymore/", "page_url": "https://www.ceps.eu/a-bold-proposal-to-build-the-eurostack-because-doing-nothing-isnt-an-option-anymore/", "excerpt": "In a time of increasingly pervasive digital technologies and the gradual disruption of the multilateral order, policymakers have at least one certainty – every single country needs a sovereign digital infrastructure encompassing compute resources, a resilient supply chain for sem…", "full_text": "In a time of increasingly pervasive digital technologies and the gradual disruption of the multilateral order, policymakers have at least one certainty – every single country needs a sovereign digital infrastructure encompassing compute resources, a resilient supply chain for semiconductors, secure digital identity and digital payment platforms, a well-functioning data layer for a variety of industrial and social uses, and abundant cloud and edge computing nodes. All of these will contribute to propelling the digital transformation forward, from government to large factories, all the way to connected objects. Such infrastructure is becoming the central nervous system of our economy, as crucial as electricity, transport or water networks. It’s also increasingly crucial to make democracy work. Not having a well-developed digital technology stack condemns a country to economic decline and technological dependency, and a future at the mercy of foreign governments and private actors. For Europe, this will be an uphill battle as we’ve accumulated many delays in key layers of the technology stack. We massively depend on less than a fistful of US cloud operators. Our supply of semiconductors craves rare earths that are quasi-monopolised by China. We are dwarfed by other global powers when it comes to AI, cyber-security solutions and overall Research and Innovation (R&I) spending in the complex new technologies that compose the stack. We train busloads of leading tech researchers and yet we see so many of them leaving to make their fortune on other shores. And even when we do act, fragmentation, ineffective regulation and fruitless competition further hamper our efforts, depriving our businesses of the scale and support they need to thrive. We have known this for a long time – and we’ve repeatedly called for bold action. The Draghi report was just the latest wake-up call. A call for urgent, bold measures. And there’s really no time to lose. Enter the EuroStack In a recent report we co-authored with several experts, we call for a bold, mission-oriented initiative to build a sovereign, independent European technology stack, or ‘EuroStack’. Currently, the EU has separate policies for various digital technologies – chips, supercomputing and cloud services, among others. However, what Europe truly needs is a holistic approach that recognises how these technologies are interconnected and pursues an integrated policy across them. To do this, it must understand the political economy of digital strategic autonomy, as well as the power strategies that shape the entire technology stack. Given Europe’s ambition to regain competitiveness and at the same time promote its core values through a sustainable and trustworthy approach to technology, the EuroStack would go beyond investment in the digital public infrastructure, as done in India and (partly) in Brazil, for example. The EuroStack would stand out from these models thanks to its broader scope, linked to both industry and public services, its reliance on open-source software, federated architectures, and trustworthy, sustainable and human-centric AI solutions. In this respect, investment should include also energy-efficient public computing capacity (EuroHPCs) , data centres and next-generation chips to support AI development and adoption across key sectors. Alongside these foundational measures, Europe should promote investment in sovereign AI clouds, platforms and interoperable data ecosystems to drive innovation and adoption in industrial sectors while ensuring ethical oversight and control. These initiatives would contribute to overcoming market fragmentation and enable greater scalability across Europe. They could become the cornerstone of high-impact digital services, especially in strategic areas such as AI-driven biotech, smart manufacturing, robotics, mobility and healthcare. Initiatives such as DG CONNECT’s software-defined vehicles could be scaled up, backed by resources and compute, and lead Europe to compete for its industrial future in key sectors where it’s currently losing steam. These unified, pan-European deployments would demonstrate Europe’s capacity for high-value innovation. And they would help Europe become a global leader in an era where AI will reshape the way we do science and innovation. A mission-oriented Tech Fund Our plan entails creating a European Sovereign Technology Fund to address investment gaps, sustain innovation and help prevent the foreign acquisition of strategic firms, as happened with ARM and DeepMind. The Fund, endowed with approximately EUR 300 billion over a decade, would draw on EU and national public resources, as well as contributions from philanthropies and the private sector. It could start with an initial EUR 10 billion dedicated to the development of Digital EuroStack demonstrators, selected through a dedicated ‘open challenge’. The Fund would be essentially mission-oriented, able to pursue alternative avenues in an agile way to ensure the achievement and scale-up of key technological breakthroughs. It would benefit from professional project portfolio managers and agile institutions able to leverage smart procurement, as also evoked in the Draghi report. It would inevitably involve all European countries and would even bring the EU and UK together into a common tech future, thanks to an increasingly unreliable and hostile-looking world. The EuroStack mission could be easily linked to the upcoming ‘CERN for AI’ that was announced through the Competitiveness Compass , which is expected to focus on science, industrial applications and digital public services – as one of us has advocated in a recent CEPS In-Depth Analysis report . And it could co-exist, or even overlap, with the announced TechEU investment programme, to be operated by the European Investment Bank, which aims to ‘strengthen Europe’s industrial capacity and scale-up companies which invest in innovative technologies such as AI, clean tech, critical raw materials, energy storage, quantum computing, semiconductors, life sciences, and neurotechnology ’. Much more than just a tech stack A EUR 300 billion investment in Europe’s future shouldn’t be seen as utopic. Even without mentioning the EUR 500 billion Stargate project recently announced by President Trump, it’s sufficient to recall that the US Semiconductors CHIPS Act deployed EUR 280 billion to support one single layer of the technology stack, for the 2022-2030 period, and that the 2015-25 ‘Made in China’ plan to ensure technology independence came with a stunning EUR 1.4 trillion price tag. Most importantly, we believe that the cost of the EuroStack is a tiny fraction compared to what doing nothing – or failing to implement a sufficiently bold initiative – would cost Europe in the long term. In short, at stake is so much more than the stack. The consequences of doing nothing would reverberate on Europe’s competitiveness, sovereignty, security and democracy for decades to come. It has to be now. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1109}, {"source": "publication", "date": "2025-02-13T10:34:08+01:00", "title": "EuroStack – A European alternative for digital sovereignty", "authors": ["Francesca Bria", "Paul Timmers", "Fausto Gernone", "Andrea Renda", "Christopher Fischer", "Olesya Grabova"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/02/EuroStack_2025.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eurostack-a-european-alternative-for-digital-sovereignty/", "excerpt": "The EuroStack initiative presents a bold vision for Europe’s digital future, aiming to establish the continent as a leader in digital sovereignty. This comprehe", "full_text": "", "wordcount": 107}, {"source": "commentary", "date": "2025-02-12T15:32:52", "title": "It’s time to launch an Ecological Impact Fund", "authors": ["Thomas Pogge"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/its-time-to-launch-an-ecological-impact-fund/", "page_url": "https://www.ceps.eu/its-time-to-launch-an-ecological-impact-fund/", "excerpt": "The virus of national selfishness is degrading international relations towards distrust, hostility and confrontation. In response, we need a highly visible multilateral initiative that clearly promotes justice and the common good of humankind rather than merely the self-interest …", "full_text": "The virus of national selfishness is degrading international relations towards distrust, hostility and confrontation. In response, we need a highly visible multilateral initiative that clearly promotes justice and the common good of humankind rather than merely the self-interest of those who launch it. One promising area for such an initiative is the health sector. With pandemics, drug resistance, pollution and global warming all increasingly threatening human health around the globe, collaborative efforts can protect health worldwide. Suppressing disease in one country can reduce health risks in others; therapeutics and diagnostics developed for use in one country can (and should) benefit all people around the world. Another auspicious area is our shared planetary environment, which is increasingly threatened and degraded by human pollution. Here too, the potential benefits of international collaboration are exceptionally large as polluting activities – and efforts to reduce and contain pollution – affect all life on our planet, now and far into the future. Seemingly separate at first glance, these two areas actually overlap. The ecological crisis damages human health, destroys biodiversity and spoils the environment and climate for future life on our planet. That’s why an initiative placed firmly within this overlap would make a lot of sense. One such initiative is the creation of an Ecological Impact Fund (EIF) , which would incentivise and reward the development of green technologies for, and their deployment in, a defined set of lower-income countries (‘the EIF-Zone’). The EIF would make preannounced annual disbursements, to be divided among registered new green technologies. This division would be based on how much pollution-based harm was averted with each of these technologies in the EIF-Zone during the preceding year — with harm assessed as a weighted sum of greenhouse gas emissions (CO 2 eq) and lost quality-adjusted life years (QALYs). With participation optional, the EIF’s reward rate would be internally self-regulating and gravitate to a stable level that’s seen as fair between participating firms and the EIF’s funders – when firms find it unattractive, registrations to participate dry up and the reward rate then naturally rises among those that are left; when the reward rate is seen as generous, registrations multiply and the reward rate then declines. Fairness among participating firms would be likewise assured as all are remunerated at the same reward-to-benefit rate. In exchange for taking part in EIF disbursements for five years, innovative firms would permanently forgo their rights to patent-based monopoly privileges in the EIF-Zone (while patent privileges outside the EIF-Zone and for unregistered innovations would remain unaffected). What makes the EIF potentially so attractive is that it would give green innovator firms new opportunities to profit from delivering green technologies in EIF-Zone countries while letting them choose, for each innovation, whether to register it or to stick with patent privileges. The EIF would thus greatly increase the uptake and impact of green technologies in EIF-Zone countries, while avoiding monopoly markups that would raise their price. The added incentive of impact rewards would motiva
