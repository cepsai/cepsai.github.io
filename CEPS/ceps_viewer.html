ous feedback loops with affected communities. If communities perceive data reuse as extractive – particularly with AI model training – trust erodes and access closes. Legitimacy must be actively maintained and cannot be assumed. Investing in human infrastructure Legal frameworks alone don’t unlock data. Regulations can create rights and obligations, but they cannot by themselves broker trust, negotiate agreements or operationalise complex sharing arrangements. For that, we need institutional capacity. We also need professional data stewards – individuals and organisations capable of brokering access between data holders and data users; translating governance principles into operational practice; managing risk while enabling innovation; and aligning data supply with societally defined demand. Without dedicated stewardship roles , even the most carefully designed frameworks risk remaining aspirational rather than actionable. Data spaces may exist on paper. Open data portals may host thousands of datasets. But without intermediaries who connect questions to data, data to researchers, and researchers to communities, the ecosystem will underperform. AI may accelerate science but unless we invest equally in the ecosystems around it, we risk entering a troubling paradox: more computational power, less accessible data and diminished public value. Europe has often defined itself through its commitment to science as a public good. In the AI age, that must extend beyond funding laboratories and building supercomputers. It must encompass the design of data ecosystems that are purposeful, legitimate and stewarded with care. The future of science won’t be determined by algorithms alone. It will be shaped by how intentionally we define our questions, how responsibly we govern and provide access to data, and how effectively we build human institutions capable of connecting the two. In that sense, the most important scientific infrastructure of the coming decade may not be computational but institutional – the governance frameworks, stewardship capacities and intermediaries that can unlock fragmented data across sectors, ensure and validate its quality and legitimacy, and make it responsibly reusable for scientific discovery and public value. Stefaan Verhulst, is Co-Founder of The GovLab and The DataTank (Brussels). This CEPS commentary draws upon his keynote delivered at the closing plenary of the CEPS Ideas Lab 2026.", "wordcount": 1138}, {"source": "commentary", "date": "2026-03-06T10:06:13", "title": "Built for burnout – how job design fails women", "authors": ["Laura Nurski"], "topics": ["Diversity, Equity & Inclusion", "Employment & Social Affairs"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/built-for-burnout-how-job-design-fails-women/", "page_url": "https://www.ceps.eu/built-for-burnout-how-job-design-fails-women/", "excerpt": "The headlines are clear: women are burning out at higher rates than men. From the BBC to CNBC and Psychology Today , media outlets have sounded the alarm, especially since the pandemic, framing burnout as a ‘woman’s issue.’ Popular narratives point to women’s ‘double shift’ of pa…", "full_text": "The headlines are clear: women are burning out at higher rates than men. From the BBC to CNBC and Psychology Today , media outlets have sounded the alarm, especially since the pandemic, framing burnout as a ‘woman’s issue.’ Popular narratives point to women’s ‘double shift’ of paid and unpaid labour, cultural expectations or even internalised perfectionism. But what if the gender burnout gap isn’t about gender at all? What if it’s actually about the types of jobs women hold? The wellbeing divide – a matter of job quality The European Working Conditions Survey ( EWCS ) provides answers to these questions. The EWCS is a large-scale, cross-national survey conducted by Eurofound every five years, covering tens of thousands of workers across Europe and widely used by researchers and policymakers to assess trends in job quality and working conditions. While the full results on exhaustion and (dis)engagement are not yet in, first findings from the 2024 survey show that women have a lower subjective wellbeing score (68.0 vs 70.6) and higher anxiety levels (26 % vs 16 %) than men. The gap is real, but the above cultural explanations are missing a crucial structural point – job design. Decades of research show that job characteristics such as emotional demands and autonomy are primary predictors of exhaustion and disengagement, which are the core elements of burnout. Jobs with low autonomy and high emotional demands are burnout factories, regardless of who holds them. Women aren’t inherently more prone to burnout; they’re disproportionately concentrated in jobs that are built to burn people out. How do women end up in these burnout factories? I t’s the result of continued vertical and horizontal segregation in the labour market. Women are more likely to be stuck under the glass ceiling (vertical segregation) or in ‘pink-collar’ sectors, where emotional labour is a core requirement (horizontal segregation). The outcome is a systemic imbalance where job quality – not gender – drives burnout. The pink-collar ghetto Take sectoral segregation, which remains stark, even in 2026. Women make up 77.8 % of healthcare workers and 72.5 % of education workers. These jobs require constant emotional regulation – soothing patients, managing children and families and navigating bureaucratic hurdles – exposing women to higher emotional demands than men. In the 2024 EWCS first findings, compared to men, women report higher levels of having to handle angry clients (18 % vs 12 %), facing emotionally disturbing situations (13 % vs 8 %), all while feeling the need to hide their own emotions (29 % vs 22 %). Adverse social behaviour in these high-interaction workplaces further compounds the challenges. Women report higher exposure to verbal abuse (12 % vs 10 %), humiliating behaviour (9 % vs 6 %), bullying (5 % vs 3 %), unwanted sexual attention (4 % vs 1 %) and sexual harassment (2 % vs 0.5 %). Overall, women score lower on the social environment index than men (76 vs 79). High emotional demands, set in adverse social environments, are the first ingredient in the recipe for burnout. The glass ceiling Vertical segregation inside organisations is equally damaging and equally persistent, as women remain dramatically underrepresented in leadership roles. The 2024 EWCS first findings shows that only 34 % of managers are women, with minimal progress made over the past 25 years. While 49 % of men say their job offers good career advancement, only 43 % of women report such prospects, another gap that has persisted over the last 15 years. Women are also far more likely to have a female boss (52 %) than men (18 %), reflecting how women’s leadership is limited to already female-dominated sectors. This glass ceiling keeps women in front-line positions with less control over their work. Meanwhile, men are more likely to hold positions where they can set their own schedules, delegate tasks and influence outcomes. The consequences are stark. Only 43 % of women report having some or complete control over their working hours, compared to 50 % of men. Even within the same job and controlling for age, seniority and education, women tend to be subjected to more forms of workplace control than men. At stake is decision-making power over how work is organised. When women are excluded from leadership, they’re also excluded from shaping the conditions of their own labour. A structural problem, not a cultural or personal one Focussing on individual resilience, mindfulness or telling women to ‘ lean in ’ distracts from the root causes: how we value and design work. The glass ceiling and the ‘pink-collar’ ghetto continue to shape who gets burned out. Fixing the gender burnout gap requires dismantling occupational segregation. It requires redesigning jobs so that autonomy, manageable emotional demands and safe social environments aren’t privileges reserved for the few. First , we must break the leadership ceiling. Transparent hiring, pay equity audits and targeted training can help distribute autonomy and career progression equally. Women can’t afford to wait another 20 years for equal representation in leadership roles. Second , we need to redesign high-stress roles in healthcare, education and care work to reduce the emotional and administrative burdens that fuel burnout. This means better staffing ratios to alleviate workloads, streamlined processes to cut unnecessary bureaucracy and balancing emotional demands throughout the workday and across employees. Emotional labour must also be recognised as skilled work, ensuring these roles are valued and compensated accordingly. Finally , we must measure what matters. Companies and policymakers should track job quality metrics – autonomy, emotional demands, workload – alongside burnout and gender data. If we don’t track these disparities, we can’t fix them. It’s time we fixed it The gender burnout gap is a symptom of a broken labour market that undervalues emotional labour and reserves power for a select few. Repairing it requires more than wellbeing charters or diversity workshops. It demands a reckoning with how we organise work – and who benefits from the status quo. As AI, automation and algorithmic management reshape the workplace, we have a choice. We can double down on efficiency-at-all-costs models that exacerbate burnout or we can use this moment to build jobs that work for everyone. The data is clear – when job quality improves, burnout burns out and our workforce becomes more resilient. The lingering question is whether we’ll act on it. For the fourth year in a row, CEPS is once again proud to mark International Women’s Day on 8 March with another short series of Expert Commentaries to showcase the insights and expertise of some of our most talented female researchers.", "wordcount": 1092}, {"source": "commentary", "date": "2026-03-05T14:53:44", "title": "The race for simplification shouldn’t sideline gender equality from FP10", "authors": ["Marta Dell’Aquila", "Rukudzo Nyoka"], "topics": ["AI, Digitalisation & Innovation", "Diversity, Equity & Inclusion"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/the-race-for-simplification-shouldnt-sideline-gender-equality-from-fp10/", "page_url": "https://www.ceps.eu/the-race-for-simplification-shouldnt-sideline-gender-equality-from-fp10/", "excerpt": "In July 2025, the European Commission presented its proposal for the next Framework Programme for Research and Innovation, FP10. Once again, gender equality is legally framed as a core priority of the EU’s research agenda and reaffirmed as a broad guiding principle. Yet how this …", "full_text": "In July 2025, the European Commission presented its proposal for the next Framework Programme for Research and Innovation, FP10. Once again, gender equality is legally framed as a core priority of the EU’s research agenda and reaffirmed as a broad guiding principle. Yet how this commitment will be monitored and measured will depend not only on FP10 itself but also on the wider budgetary rules and tools shaping EU spending . These include the budget expenditure tracking and performance framework , which monitors horizontal priorities across the EU budget – including gender equality. As our recent paper highlights, significant progress has been made on gender equality under Horizon Europe, thanks in part to the introduction of mandatory Gender Equality Plans (GEPs). However, the proposed FP10 Regulation contains a striking omission – GEPs aren’t explicitly mentioned in the main document, despite being one of the EU’s most tangible instruments for driving structural change in research and innovation institutions. This doesn’t mean that GEPs won’t be mandatory again but their absence from the main legal text is politically concerning – because what’s left unmentioned becomes easier to weaken, overlook and harder to defend. Our research shows that the progress made under Horizon Europe needs to be not only preserved but strengthened, by reinforcing GEPs and upgrading gender expenditure tracking into a more robust tool. If this happens in the name of simplification , great, but it mustn’t come at the expense of gender equality, turning hard-won achievements into little more than box-ticking exercises. Going beyond box-ticking Under Horizon Europe, GEPs aren’t optional add-ons in research policy but have been mandatory for all public institutions since 2022. The Commission has made them a condition for participating, recognising them as concrete policy instruments designed to transform organisational cultures, structures and decision-making processes. Their purpose isn’t symbolic – they’re designed to confront entrenched gender imbalances, close persistent pay gaps, ensure women have a seat at decision-making tables, integrate the gender dimension into research content, and tackle gender-based violence within institutions. And there’s already some good, clear evidence of their positive impact. Horizon Europe is also subject to a structural gender mainstreaming mechanism that receives far less public attention, the gender budget tracking tool. At first glance it sounds technical, even overly bureaucratic. In practice, it’s an accountability instrument , using a four-point scale (0*, 0, 1 and 2) to assess how policies and funding contribute to gender equality, from initiatives whose main objective is gender equality to measures with no expected impact, or whose contribution cannot yet be determined. Crucially, the system is cautious and realistic. It recognises that gender’s meaningful integration cannot always be assessed at the proposal stage and that real impact often becomes visible only once a project begins to unfold. Under the proposed Multiannual Financial Framework (MFF), the EU would introduce a simplified mechanism , removing the 0* category entirely in the name of promoting stronger gender integration and refining budget assessments. While this may create the illusion of clearer and stronger gender mainstreaming, in practice it risks hiding uncertainty by forcing programmes into a simplistic yes-or-no classification, rather than acknowledging where the gender impact remains unclear or insufficiently assessed. In research programmes, where gender impacts are often indirect or emerge over time, this risks oversimplifying how gender equality is assessed in research funding. This could dilute the EU’s existing architecture due to the pursuit of administrative simplicity, while creating the impression that gender mainstreaming in research content is being strengthened. All this sends the wrong signal – that gender equality is negotiable rather than foundational. As it stands, the system merely tracks intervention. What it should do instead is evolve towards real gender budgeting , ‘an application of gender mainstreaming in the budgetary process’ which ‘involves conducting a gender-based assessment of budgets, incorporating a gender perspective at all levels of the budgetary process, and restructuring revenues and expenditures to promote gender equality’. Turning gender equality into a binding priority There’s still time to strengthen FP10 in a way that truly supports gender equality. But this cannot be achieved through vague principles alone, especially if binding commitments are left unnamed. The Commission’s proposed gender expenditure tracking tool is again a step in the right direction, but it risks becoming yet another layer of paperwork if it’s not backed by clear rules, shared guidelines and real accountability for gender equality. The proposal should move beyond mere gender tracking towards genuine gender budgeting, setting clear targets and metrics, and making the collection and reporting of gender-disaggregated data mandatory and standardised across programmes. Only then can gender equality meaningfully shape priorities, funding allocations and accountability from the outset. But tracking alone isn’t enough. Structural change also requires institutional commitments. And that’s why GEPs must be explicitly anchored in the FP10 Regulation, because they do far more than merely ticking a compliance box. They incorporate gender mainstreaming into the very fabric of organisational culture, far beyond the research sphere. That’s why the EU should go further and extend the GEP requirement to all participating legal entities in FP10, including those from non-associated third countries. Through Horizon Europe, the EU is wielding significant influence in shaping standards and inspiring national policies well beyond its borders. Broadening this requirement isn’t only about geography – it should also move beyond gender mainstreaming, with GEPs incorporating an explicit intersectional approach, thus recognising how gender inequalities intersect with other forms of discrimination. In this way, the EU can preserve progress and generate a positive ripple effect for gender equality globally. The strength of Horizon Europe’s approach lies precisely in these structural mechanisms. They embed gender equality systematically into research governance and funding, but they should be made stronger by making interventions and impacts more measurable, traceable, and accountable. In an era where gender issues are increasingly being sidelined or politicised , structural instruments that have been effective in promoting gender equality cannot afford to be diluted or omitted. Going into FP10, they need to be reinforced and strengthened. To read the full report that this commentary is based on, click here . For the fourth year in a row, CEPS is once again proud to mark International Women’s Day on 8 March with another short series of Expert Commentaries to showcase the insights and expertise of some of our most talented female researchers.", "wordcount": 1053}, {"source": "publication", "date": "2026-03-05T09:29:38+01:00", "title": "Building a European competitive edge in space", "authors": ["Carlo Des Dorides", "Andrea G. Rodríguez", "Jaime Martínez", "Christopher Schade"], "topics": [], "units": [], "types": ["Task Force Report"], "link": "https://cdn.ceps.eu/2026/03/TF-Report-Building-a-European-competitive-edge-in-space-formatted-V.pdf", "page_url": "https://www.ceps.eu/ceps-publications/building-a-european-competitive-edge-in-space/", "excerpt": "The global space economy is entering a decisive phase of structural transformation. Rapid reductions in launch costs and the proliferation of mega-constellation", "full_text": "", "wordcount": 201}, {"source": "commentary", "date": "2026-03-05T09:29:37", "title": "It’s time to get ready for Europe’s space moment", "authors": ["Andrea G. Rodríguez"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/its-time-to-get-ready-for-europes-space-moment/", "page_url": "https://www.ceps.eu/its-time-to-get-ready-for-europes-space-moment/", "excerpt": "For a long time, Europe has been a credible space power with major successes embodied in programmes such as Copernicus and Galileo. But the global space economy is changing quickly – incremental approaches are no longer enough to reclaim leadership. As a newly published CEPS Task…", "full_text": "For a long time, Europe has been a credible space power with major successes embodied in programmes such as Copernicus and Galileo. But the global space economy is changing quickly – incremental approaches are no longer enough to reclaim leadership. As a newly published CEPS Task Force report details, it’ll take bold moves that will impact the whole space governance structure, as well as a shared vision and better investment, to transform Europe into a true twenty-first century space power. That’s because space is no longer only about exploration or scientific prestige. It’s increasingly about competitiveness, security and technological capability. The global space economy could reach nearly USD 1.8 trillion by 2035 , expanding much faster than global GDP. At the same time, launch costs continue to fall thanks to reusable rockets, standardised components and new manufacturing techniques. Cheaper launches have enabled new ambitious projects, such as megaconstellations like Starlink and Project Kuiper , which are transforming connectivity, providing broadband services in remote areas and supporting a wide range of data-driven applications. The EU has strong scientific capabilities, a competitive aerospace industry and a long tradition of cooperating in space. Yet its relative position in the global space economy has weakened over time. Europe’s share of upstream space markets – R&I, manufacturing and launching hardware like rockets or satellites – has declined over the past decade, and its institutional spending remains much lower than the US and China. The issue isn’t a lack of talent or technology. Rather, it reflects structural constraints that make it harder for Europe to translate capability into scale. One of the main challenges is fragmentation. Europe’s space ecosystem is rich and diverse but it’s often difficult to coordinate. Responsibilities are spread across the European Commission, the EU Agency for the Space Programme (EUSPA), the European Space Agency (ESA) and multiple national space agencies. This architecture has delivered major achievements, such as Galileo, but it can also create overlapping mandates, slow procurement cycles and unclear accountability. In space, speed matters – and Europe’s institutional complexity is a clear disadvantage. Financial fragmentation also plays a role. Europe’s space sector still depends heavily on public demand, while private investment remains relatively limited compared with the US. Venture capital activity in European space companies is growing but many startups still struggle to secure the funding needed to scale. Consequently, promising innovations often stall before reaching the market in what has been called ‘ the Valley of Death ’. The sector’s industrial structure reflects a similar pattern. Europe has several large system integrators and a dynamic ecosystem of SMEs and startups. But the absence of a coherent industrial strategy can make it difficult for companies to scale globally. In contrast, geopolitical adversaries and market competitors, such as the US, benefit from strong venture capital ecosystems, mission-driven procurement and a large integrated market. These trends matter because space is strategic. Satellite infrastructure underpins navigation, communications, Earth observation and defence capabilities. Losing ground in this domain would have consequences well beyond the space sector. It would affect Europe’s ability to shape technological standards and maintain its ability to operate autonomously critical infrastructures. The problem isn’t the absence of initiatives but the lack of alignment across them. Europe already has strong programmes, capable institutions and an innovative industrial base. What it needs is a governance and investment framework that allows these assets to work together more effectively. A first step is to clarify the roles of Europe’s institutional actors. The ESA has unique technical expertise and is well placed to focus on long-term research, technological development and exploration. At the same time, the EU can play a stronger role in managing the operational phases of major programmes and in building a ‘single market for space services’ through harmonised rules and investment frameworks. Financing is equally important. Europe’s ambitions in space will require more stable and long-term investment. A European Space Fund, potentially anchored within the European Investment Bank, could help support startups, scaleups and strategic programmes while attracting private capital to the sector. Public procurement also deserves attention. Europe’s procurement cycles are often slower than those of its global competitors. More flexible and innovation-friendly procurement models could accelerate the development and deployment of space technologies while encouraging greater private investment. Finally, Europe needs a Space Industrial Strategy. Rather than trying to cover every segment of the value chain equally, policymakers could focus on key areas where European autonomy is particularly important, such as launch capabilities, secure connectivity and space-enabled services. In many ways, space has become a test of Europe’s ability to act collectively in critical technologies. What remains uncertain is whether it can align its institutions, investment and strategy around a shared vision. But the choice is clear – Europe can continue managing fragmentation and risk losing ground in a rapidly evolving sector. Or it can simplify governance and focus on scale. In the new space economy, hesitation comes at a cost. The real question is not whether Europe can afford to act… but whether it can afford not to. To read the full Task Force report that this commentary is based on, please click here .", "wordcount": 855}, {"source": "publication", "date": "2026-03-04T10:32:59+01:00", "title": "Beyond rupture: strategic choices for the EU in an era of global disorder", "authors": ["Steven Blockmans"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2026/03/Report_9.2_public_final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/beyond-rupture-strategic-choices-for-the-eu-in-an-era-of-global-disorder/", "excerpt": "With growing worldwide distrust in Trump’s America, the EU has both the opportunity and the responsibility to act decisively to safeguard and transform the inst", "full_text": "", "wordcount": 137}, {"source": "publication", "date": "2026-02-27T15:43:38+01:00", "title": "Payment sovereignty without walls: the case for Europe’s multi-rail ecosystem", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/Payment-sovereignty-formatted-final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/payment-sovereignty-without-walls-the-case-for-europes-multi-rail-ecosystem/", "excerpt": "The debate on European payment sovereignty has intensified amid geopolitical tensions and growing concerns about the dominance of non-EU card schemes. However,", "full_text": "", "wordcount": 161}, {"source": "publication", "date": "2026-02-27T10:56:07+01:00", "title": "CEPS Research Priorities 2026-27", "authors": [], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/CEPS-2026-27-Research-priorities-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/ceps-research-priorities-2026-27/", "excerpt": "2025 was a deeply troubled year but 2026 started out even worse. And Brussels has at times looked more irrelevant or vulnerable than ever on the world stage. Th", "full_text": "", "wordcount": 185}, {"source": "commentary", "date": "2026-02-26T15:37:32", "title": "AI reveals what’s broken about organisations today – but the power to act on it remains in too few hands", "authors": ["Laura Nurski"], "topics": ["AI, Digitalisation & Innovation", "Employment & Social Affairs"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/ai-reveals-whats-broken-about-organisations-today-but-the-power-to-act-on-it-remains-in-too-few-hands/", "page_url": "https://www.ceps.eu/ai-reveals-whats-broken-about-organisations-today-but-the-power-to-act-on-it-remains-in-too-few-hands/", "excerpt": "When social scientists engage in public debates on AI, they often do so because they’re concerned. Bias, degraded work quality and opaque systems – these risks are real, well documented and recognised by the EU institutions. But when critique becomes the only lens for discussing …", "full_text": "When social scientists engage in public debates on AI, they often do so because they’re concerned. Bias, degraded work quality and opaque systems – these risks are real, well documented and recognised by the EU institutions. But when critique becomes the only lens for discussing AI, something important is missed. As philosopher Lode Lauwaert recently argued, AI not only raises ethical problems but also ethical possibilities – and social scientists should take a more prominent role in highlighting them. These possibilities don’t lie in technological optimism or the belief that AI will somehow ‘fix’ society. They lie in the fact that AI makes long-standing problems in human systems visible, measurable and thus actionable. In that sense, AI functions more as a mirror for organisations. What it reflects can be uncomfortable but potentially transformative. As the EU advances on AI in the workplace and prepares its Quality Jobs Act , it should look beyond limiting AI’s risks and more into addressing the organisational dysfunctions AI reveals that undermine job quality in the first place. Bias – from moral concern to a measurable organisational problem AI systems can be biased – sometimes severely so – and they can act on a larger scale than individual managers. But bias didn’t enter organisations with algorithms; it was already there. Hiring decisions, performance evaluations and promotion pathways have always reflected social inequalities and subjective judgement. The difference is that when bias is at human discretion, it remains diffuse and contestable. When it’s embedded in data and models, it becomes explicit and – with proper accountability and governance mechanisms – actionable. AI operates at scale and leaves traces. Training data, decision rules and outcomes across groups can be analysed and compared. Discrimination becomes quantifiable. What once triggered debates about intentions – was this manager unfair? – becomes an analysis of patterns embedded in organisational processes. Bias stops being a vague moral accusation and becomes a technical and organisational challenge: which data are used, which fairness criteria are applied, what corrections are possible and what human oversight is required? None of this guarantees fairness. But it does create leverage. In practice, it’s often easier to mitigate bias in an AI system than in an organisation’s culture. Algorithms can be audited, adjusted and constrained in ways that social norms rarely can. The EU’s AI Act already classifies AI in employment as high-risk, requiring providers and deployers to ensure transparency, data governance documentation and human oversight. But for bias to become truly visible and contestable, workers and their representatives must have meaningful access to this information – and the capacity to act on it. Algorithmic management – a yardstick for human leadership A second contentious issue is algorithmic management. Systems that allocate tasks, monitor performance or optimise schedules are often – rightly – criticised for undermining autonomy, intensifying work and fragmenting jobs. Yet human management isn’t by definition better than algorithmic management. Poor leadership, arbitrary evaluations and toxic work cultures existed long before algorithms. As with bias, AI can expand managerial control to a larger scale, but it also increases its visibility. Algorithmic systems generate data on workload, targets, pacing and breaks. They also expose who makes decisions about allocating tasks and development opportunities, and how these decisions are taken. This creates an opportunity – organisations can finally analyse systematically how decisions about planning and task allocation relate to wellbeing, motivation and turnover. Algorithmic management forces clarity as objectives must be explicitly defined and encoded. The problem, therefore, isn’t that work is measured or optimised, but what is optimised – and who has a say in it. The Platform Work Directive strengthens transparency and human review rights in algorithmic management – but again, such safeguards won’t matter unless workers can influence how these systems are designed in the first place. Meanwhile, non-platform workers remain largely unprotected, even as algorithmic management spreads across traditional employment. Multi-agent systems – focus on structure, not culture A third, more recent concern relates to complex multi-agent systems, which are networks of AI agents that cooperate, negotiate or compete. Research shows that such systems can fail through miscoordination, conflict or even collusion. Think about pricing algorithms that start colluding on prices or one AI agent who doesn’t hand over a critical piece of information to another. These risks are serious, particularly as AI systems become more autonomous. Once again, a comparison with human organisations is revealing. Human collaboration constantly fails. When it does, explanations tend to focus on personalities, communication styles or organisational culture. In AI systems, failure is approached differently: we don’t blame intentions but aspects of the system design , such as ambiguous prompts, misaligned agents and inadequate verification of output. When AI agents don’t work together properly, engineers analyse their role definitions, information flows and control processes. In other words, it’s the structure of the system, not the culture itself. That contrast is telling. AI pushes us to treat collaboration as a design problem rather than a character flaw. This raises an uncomfortable question: what if the many failures of human collaboration are also structural, but we’ve been too quick to individualise them? By studying how AI systems succeed or fail collectively, organisations gain new tools to rethink decision-making, accountability and task allocation in human teams. A trigger for organisational redesign The common thread is clear. AI isn’t a moral outsider corrupting organisations. It’s an amplifier and a revealer. It makes existing problems – bias, poor management, failing collaboration – more legible and harder to deny. Organisations that treat AI merely as an efficiency tool miss its deeper value. Those that use it to rethink processes, structures and leadership may end up with better jobs and more resilient organisations. Not by replacing human responsibility with technology but by finally taking it seriously. Perhaps this is the optimism Lauwaert points to – not a belief that AI will deliver a better world by itself but recognising that it leaves fewer places to hide. What becomes visible and measurable can’t be dismissed as anecdotal or inevitable. And it’s precisely here that AI’s ethical potential lies. Now if AI reveals what’s broken, who holds the power to see and to fix it? Power and responsibility cannot rest solely with AI providers or deployers. If AI makes organisational dysfunction measurable, workers and their representatives must have a meaningful role in accessing that information and shaping how systems are designed and deployed. Strengthening workers’ voices in AI and algorithmic management thus isn’t a side issue of regulation – but a precondition for turning visibility into real leverage for promoting organisational change. This is an extended version of a piece that was originally published in De Tijd (Dutch only).", "wordcount": 1111}, {"source": "publication", "date": "2026-02-26T13:59:12+01:00", "title": "Driving innovation for global health security: how HERA can rally R&D forces across Europe and the world", "authors": ["Petra Varkonyi", "Hien Vu"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/HERA-international-RD-collaboration-report-formatted-FINAL-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/driving-innovation-for-global-health-security-how-hera-can-rally-rd-forces-across-europe-and-the-world/", "excerpt": "Global health research and development (R&D) is entering a period of acute vulnerability. The US is withdrawing from multilateral health commitments it once", "full_text": "", "wordcount": 217}, {"source": "commentary", "date": "2026-02-24T14:42:16", "title": "After four years of war in Ukraine and with the transatlantic relationship still on ice, Munich highlighted that the EU still has a lot of work to do", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/after-four-years-of-war-in-ukraine-and-with-the-transatlantic-relationship-still-on-ice-munich-highlighted-that-the-eu-still-has-a-lot-of-work-to-do/", "page_url": "https://www.ceps.eu/after-four-years-of-war-in-ukraine-and-with-the-transatlantic-relationship-still-on-ice-munich-highlighted-that-the-eu-still-has-a-lot-of-work-to-do/", "excerpt": "What was conceived in the Kremlin as a plan to decapitate the Ukrainian leadership and seize Kyiv within days has instead hardened into a seemingly endless war of attrition. Four years on, Russia has now fought Ukraine longer than the Soviet Union fought Nazi Germany during World…", "full_text": "What was conceived in the Kremlin as a plan to decapitate the Ukrainian leadership and seize Kyiv within days has instead hardened into a seemingly endless war of attrition. Four years on, Russia has now fought Ukraine longer than the Soviet Union fought Nazi Germany during World War II. It’s nothing but a sobering marker of strategic miscalculation from Vladimir Putin. Russian forces have failed to break Ukrainian defensive lines, let alone recreate the conditions for a renewed drive towards Kyiv. The battlefield has evolved into a grinding contest of endurance, exposing both the limits of Russia’s operational capacity (with Russian casualties reaching 1.2 million people, including 200,000 dead ) and the resilience of Ukraine’s army, state and society. US and EU support has been indispensable to Ukraine’s resilience. Yet the simple fact that Ukraine hasn’t yet triumphed shows that all this support – while critically important – has been insufficient to end the war. Ending the war requires more political, economic and military pressure on Putin from both sides of the Atlantic. Unfortunately, as we saw in Munich, we’re still very much living in a moment where transatlantic bonds are strained and the Trump administration has shown little interest or inclination to fundamentally reset them. Transatlantic dis-alliance – or what are we actually defending? With the theme ‘Under Destruction,’ this year’s Munich Security Conference laid bare a stark reality – the destruction of the international rules-based order (if it ever existed) and broken transatlantic bonds. The silver lining, if there is one, was that when European leaders spoke Europe sounded unapologetic, assertive and more aware of the need to stand on its own feet. Secretary of State Marco Rubio’s address was unexpectedly measured – markedly more conciliatory than JD Vance’s bombshell speech last year. The contrast between catastrophic expectations and Rubio’s tempered tone even triggered applause in the room . And while Rubio scored a diplomatic win on the substance but also by simply not attacking everyone in the room, nothing has really changed for Europe. The lingering question at the heart of the current transatlantic divide is the one Rubio himself raised – what exactly are we defending? For Europe, the obvious (and right) answer is to fight Russian aggression and defend European values and democracies. Yet Rubio’s speech clarified one thing when he completely omitted Ukraine – namely that ensuring Europe prevails in the largest war on its soil since 1945 doesn’t appear to be a defining priority for Washington. And without a shared line and a common strategy on how to win, the ice will remain frozen. Rubio clearly stated that the US wants a strong Europe, but alas his actions spoke differently. He skipped meetings on Ukraine and instead rushed to Hungary and Slovakia, offering political endorsement to the EU’s most Russia-leaning leaders. He even promised potential financial backing for Orbán, noting US-Hungarian relations are having a ‘ golden age’ , so long as Orbán is in power. And let’s not forget Trump’s recent threat to grab Greenland or his formal invitation to international criminals, including Vladimir Putin, to join his ‘ Board of Peace .’ Regardless of Rubio’s soothing words at Munich, if one NATO member openly contemplates coercion against another, Article 5’s credibility is no longer a given but an open question. And inviting the very architect of Europe’s largest war since 1945 to officiate over ‘peace’ collapses the distinction between aggressor and peace maker, blurs moral lines and cuts to the very the core of the transatlantic compact. If the US genuinely wants a strong Europe, as Rubio claimed, then it must act accordingly, which means reinforcing shared European interests instead of legitimising internal EU divisions or pushing Ukraine into making concessions to the aggressor. Europe’s post-Munich homework Munich was yet another reminder for the EU that relying on the US for its security belongs to a bygone era. However diplomatic Rubio’s speech may have been, it cannot put the alliance back to work. Admittedly, Washington’s ‘tough love’ has forced Europe into greater self-awareness, forcing it to more clearly recognise its own vulnerabilities and responsibilities. Europe must prove that it can stand on its own two feet by building up its own security and defence capabilities, strengthening coalitions among like-minded countries and working with international partners – including the US – to increase pressure on the Kremlin. Only sustained, coordinated political, military and economic pressure can constrain Putin’s resources and ability to continue fighting and end this war that, four years on, still poses a very real existential threat to Europe. While Ukraine joining NATO isn’t currently on the table, Ukraine remains firmly anchored to joining the EU. It shouldn’t come as a surprise that the EU’s mutual assistance clause (Article 42.7) has recently and repeatedly surfaced as a reminder that EU membership carries its own security commitments. But despite meeting the criteria for moving forward in the enlargement process, Ukraine remains a hostage to Hungary’s veto, underscoring how internal EU divisions – even just one Member State deviating from the rest – can stall historic decisions. Ultimately, it’s in the EU’s own strategic interest to bring Europe’s strongest and most battle-hardened army into the Union. Integrating Ukraine would not only reinforce the continent’s security architecture; it would also accelerate the EU’s long-delayed evolution from a predominantly economic project into a fully-fledged political and security union. As convener Wolfgang Ischinger drew the Munich Security Conference to a close, his words are as true today as they would have been four years ago if he had uttered them then – what we need now isn’t another round of speeches but a credible plan, followed by real action.", "wordcount": 944}, {"source": "publication", "date": "2026-02-12T11:41:57+01:00", "title": "The Savings and Investment Union has had a bad start – we need an ‘emergency brake’", "authors": ["Karel Lannoo"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/Lannoo-No-104-RIS.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-savings-and-investment-union-has-had-a-bad-start-we-need-an-emergency-brake/", "excerpt": "Making citizens invest in Europe’s capital markets is core to the Savings and Investment Union (SIU). However, EU-wide rules agreed in the ‘trilogue’ between th", "full_text": "", "wordcount": 221}, {"source": "commentary", "date": "2026-02-12T10:06:42", "title": "Six months of MFF negotiations – and there’s still no shared vision for a ‘policy-driven’ EU budget", "authors": ["Eulalia Rubio"], "topics": ["EU Budget & Public Investment"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/six-months-of-mff-negotiations-and-theres-still-no-shared-vision-for-a-policy-driven-eu-budget/", "page_url": "https://www.ceps.eu/six-months-of-mff-negotiations-and-theres-still-no-shared-vision-for-a-policy-driven-eu-budget/", "excerpt": "Negotiations over the EU’s long-term budget, the Multiannual Financial Framework (MFF), are often portrayed as a defining moment. In practice, they rarely produce major change. The European Commission usually proposes an updated version of the previous framework; the European Par…", "full_text": "Negotiations over the EU’s long-term budget, the Multiannual Financial Framework (MFF), are often portrayed as a defining moment. In practice, they rarely produce major change. The European Commission usually proposes an updated version of the previous framework; the European Parliament (EP) calls for higher spending, while frugal Member States argue for restraint; and net beneficiaries seek to protect cohesion and agricultural funding. There have only been a few exceptions to this pattern, due to either strong unity around a shared objective, like completing the single market, or in response to a major crisis, like in 2020 with the NGEU package . Alas, it’s looking more likely that the next MFF won’t be one of the exceptional ones. A budget that promises transformation, but… But an exceptional MFF was certainly the Commission’s ambition when it presented its post-2027 MFF proposal in July 2025. Whatever one’s assessment, the proposal undeniably envisages far-reaching changes, in the structure of the budget, the composition of EU spending and the way EU funds are planned and delivered. Yet negotiations have progressed slowly and amid widespread scepticism. In the Council, several net contributors reacted almost immediately by questioning the budget’s overall size, while major recipients warned against potential cuts to the Common Agricultural Policy (CAP) and cohesion funds. In the EP, the main political groups opposed the idea of merging all shared-management funds into centralised National and Regional Partnership Plans (also called ‘single plans’) and have already forced the Commission’s hand to amend parts of the proposal. Admittedly, several criticisms are justified. There’s room for improving the legal bases of some newly created programmes, as some appear to have been drafted very quickly. There are also conceptual weaknesses in parts of the proposal’s design. As cohesion policy experts have pointed out, the proposed ‘single plans’ regulation (which would merge cohesion and CAP funds into single national plans) doesn’t guarantee that Member States will get behind cohesion objectives. The role of sub-national authorities in implementing these new single national plans is also a source of concern as concentrating excessive power at the national level could be problematic – for efficiency and political reasons. The claim that merging funds will deliver genuine simplification remains debatable. The Commission´s impact assessment assumes a 40 % reduction of administrative costs from integrating existing programmes and adopting a single rulebook. However, the expected benefits may be overstated, partly to align with Member States’ current focus on deregulation. Shifting from a cost-based to a new performance-based delivery approach is also challenging. It will impose important adjustment costs for national and regional administrations and, as already seen with the Recovery and Resilience Facility, it won’t automatically translate into simplification if controls and audit requirements imposed on managing authorities remain unclear. Finally, more built-in flexibility in the EU budget is much welcomed. A significant share of EU resources will remain ‘unprogrammed’, available to provide crisis support or respond to new policy needs as they arise. EU funds are also expected to be better aligned with EU priorities and national spending decisions through a new ‘ political steering mechanism’ , which will inform the EU’s annual budgetary procedure. However, it’s still unclear how this steering mechanism will work and, in many programmes, budget flexibility results into too much discretion for the Commission, without the appropriate accountability and oversight. More priorities, less predictability Beyond these specific issues, the limited enthusiasm for the proposal reflects a deeper structural problem. The Commission intends to reduce funds pre-allocated to Member States for cohesion and agriculture — distributed through predictable eligibility rules — from 66 % to 46 %, while expanding the share of spending managed directly by the EU institutions and awarded mainly through competitive calls. In principle, this could make the budget more strategic, better aligned with EU-wide priorities such as competitiveness, reducing critical dependencies and Europe’s defence readiness, while also increasing flexibility to adjust spending as needs evolve. Unfortunately, the political economy isn’t favourable. Once NGEU debt repayments are excluded, the overall financial envelope increases only marginally – and when the EU budget and NGEU grants are factored in, the total available resources fall by around 5 % in constant prices. This means a substantial reduction in predictable national allocations for cohesion and CAP net beneficiaries. Understandably, this is difficult to accept. It might be politically manageable if there was stronger confidence in the EU’s ability to deliver on its strategic objectives through a major reorganisation of spending. But reallocating funds alone won’t secure Europe’s competitive position or technological sovereignty. Without additional EU resources, bold complementary reforms – such as completing the Savings and Investment Union – and much deeper coordination of national economic and budgetary policies, EU-level spending alone cannot deliver what’s expected of it. No shared vision, no strategic budget The lack of a shared EU-level vision on how to advance these strategic goals makes the situation even more difficult. As we’ve repeatedly seen, Member States remain divided on fundamental issues: how far to confront the Trump administration, how to respond to China’s unfair trade practices, how much priority to give to the EU’s Green Deal agenda or how best to support Ukraine. In short, it’s difficult to build consensus for a ´policy-driven´ budget when the policy objectives remain unclear. Some claim that there is a common vision, outlined in the Draghi and Letta reports. But looking closely, many key questions remain unanswered. Draghi doesn’t clarify how competitiveness and cohesion should be reconciled. How can the EU compete with the US and China without reproducing their highly unequal and geographically imbalanced growth, or without dramatically increasing public interference in the economy? How should cohesion policy be rethought in an era of strategic rivalry and trade tensions? These are all central issues for the future MFF but they remain largely unaddressed. Letta offers more concrete guidance, particularly by emphasising the ‘freedom to stay’ principle and by mitigating the geographic concentration effects of industrial policy – but even these suggestions haven’t yet crystallised into a shared political vision capable of fundamentally overhauling the EU budget. There’s no beating around the bush – building this common vision won’t be easy. But without this, the risk is that Member States settle on a smaller, politically convenient, yet largely inconsequential MFF, while having to rely on ad hoc , issue-specific intergovernmental arrangements to address urgent needs. This would reveal, more than anything else, the EU’s limited willingness to act together… during a deeply unsettled time when cohesion and shared investment capacity are most needed.", "wordcount": 1082}, {"source": "publication", "date": "2026-02-06T11:17:45+01:00", "title": "Assessing the impacts of the 2025 Returns and Safe Countries European Commission Proposals", "authors": ["Sergio Carrera", "Davide Colombi"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2026/02/migration_v4.pdf", "page_url": "https://www.ceps.eu/ceps-publications/assessing-the-impacts-of-the-2025-returns-and-safe-countries-european-commission-proposals/", "excerpt": "Adopted without prior Impact Assessments required under the EU Better Regulation framework, the European Commission's Returns and Safe Countries Proposals mark", "full_text": "", "wordcount": 114}, {"source": "commentary", "date": "2026-02-05T14:54:53", "title": "Reducing the costs of ‘non-Europe’ in taxation requires more – and better targeted – coordination across the EU", "authors": ["Agustina Korenblit", "Apostolos Thomadakis"], "topics": ["Finance & Banking", "Taxation"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/reducing-the-costs-of-non-europe-in-taxation-requires-more-and-better-targeted-coordination-across-the-eu/", "page_url": "https://www.ceps.eu/reducing-the-costs-of-non-europe-in-taxation-requires-more-and-better-targeted-coordination-across-the-eu/", "excerpt": "Tax policy in the EU is mostly decided by the Member States – 27 tax systems, each setting, collecting and administering taxes nationally. EU-level instruments do allow action in specific areas to safeguard the single market’s functioning, but today’s patchwork of rules and admin…", "full_text": "Tax policy in the EU is mostly decided by the Member States – 27 tax systems, each setting, collecting and administering taxes nationally. EU-level instruments do allow action in specific areas to safeguard the single market’s functioning, but today’s patchwork of rules and administrative practices still creates economic distortions and compliance frictions that directly impact taxpayers and firms. The priority isn’t ‘hard law’ harmonisation for its own sake. Rather, it’s about getting national tax systems to work together across borders. This is consistent with the broader call for systemic reforms (including in Enrico Letta ’s report ) to reduce cross-border frictions and strengthen the single market. Tackling fragmentation requires better cross-border coordination in strategic areas where inconsistent national approaches already warp how the market functions, notably wealth taxation, crypto-asset taxation, the digitalisation of tax administrations and the tax compliance burden. The current rules are falling short There’s no harmonised EU framework to tax wealth – i.e. the stock or transfer of assets owned by individuals or entities. Instead, countries rely on a mix of instruments (like net wealth taxes, real estate taxes, inheritance and gift taxes), with different bases, valuation methods, thresholds and rates. These divergences encourage highly mobile taxpayers to relocate their assets, creating legal uncertainty and eroding horizontal equity (these are similar economic circumstances, but they face different burdens depending on where you reside). They also cause administrative frictions for tax authorities, especially in cross-border cases. There are even more challenges for crypto-assets. Their cross-border nature, pseudonymity and difficult traceability have led Member States to adopt different approaches to taxing – or not taxing – crypto activities. This has led to similar transactions across the EU being treated inconsistently, which provides fertile ground for arbitrage, revenue leakage and uneven enforcement outcomes. Crucially, this isn’t just a legal coherence issue – it impacts the legitimacy of national tax systems. According to our estimates, capital gains on all crypto-assets in 2024 amounted to around EUR 16 billion and are projected to reach more than EUR 410 billion by 2035. At the current tax rates on crypto gains, this translates into revenues of around EU 4.7 billion in 2024 and more than EUR 120 billion by 2035. Digitalisation has improved… but EU convergence still lags Many national tax administrations have worked hard to modernise in recent years but the wider EU picture remains uneven. Many countries have expanded digital tools (such as e-filing, e-invoicing, pre-filled returns) and some are moving into more advanced capabilities (including data analytics, AI and machine learning). Others are facing structural constraints that weaken both compliance and enforcement capacity. At the same time, the experience of meeting tax obligations still differs across Member States in time, costs and administrative efforts. This disproportionately hits SMEs and cross-border operators, which often can’t absorb multiple reporting calendars, formats and interfaces. The results are easily predictable – uncertainty persists, voluntary compliance weakens and the single market’s efficiency suffers. Indeed, digitalisation can reduce compliance burdens but only when paired with genuine simplification, which can include single windows, once-only data, standard taxonomies and interoperable identifiers. Partial digital fixes that don’t reduce duplication tend to shift work rather than lower it. Addressing wealth taxation and crypto-assets The way forward is targeted coordination, mainly through simplification, clearer definitions and shared enforcement tools that reduce duplication and uncertainty but without requiring full tax-base harmonisation. In short, the EU doesn’t need a single EU-wide wealth tax. But a well-designed coordination framework could mitigate the cost of ‘non-Europe’ by setting common minimum valuation standards for specific high-value assets, by aligning reporting and definitions for cross-border wealth holdings and clarifying the rules for foreign-held assets to reduce double (or no) taxation in wealth, inheritance and when giving gifts. A more targeted option would be a coordinated approach to taxing high-end real estate (building on the fact that most Member States already tax real estate in some form). If there was a real estate wealth tax applied to wealth above EUR 1 billion, estimated EU-wide revenues under the status quo could reach about EUR 13 billion per year but with highly concentrated distribution (France alone would bring in close to EUR 8 billion per year if there was full compliance). Regarding crypto-assets, the Directive on Administrative Cooperation (DAC8) , which entered into force on 1 January 2026, is expected to materially improve transparency by introducing automatic information exchange on crypto holdings and transactions. But transparency isn’t by itself a complete solution. Member States still diverge on what constitutes a taxable event, how gains are classified and how valuation is performed – which keeps compliance and enforcement fragmented. Priority coordination levers include aligning the DAC8’s implementation with international standards (such as the OECD’s Crypto- A sset Reporting Framework (CARF) ) to reduce arbitrage and minimise distortions with non-EU jurisdictions. Developing shared guidance on taxable disposals (including crypto-to-crypto swaps and stablecoin conversions) and minimum valuation standards, as well as exploring an EU-wide minimum floor rate for crypto capital gains (while leaving national regime design flexible) should also be prioritised, which would be paired with credible enforcement capacity. Addressing digitalisation and compliance burdens The EU also needs to level the playing field for taxpayers by ensuring access to basic digital services, namely secure online filling and digital engagement with tax administrations, supported by interoperable systems. Convergence should focus on greater alignment in reporting practices (e-invoicing, pre-filled returns, standardised formats), reducing cross-border friction by aligning identifiers, forms and calendars where feasible, and operationalising a ‘once-only’ principle in tax reporting, especially for SMEs. The VAT in the Digital Age (ViDA) package should accelerate e-invoicing and digital reporting, and is projected to reduce administrative and compliance costs by more than EUR 4.1 billion per year for EU traders. But rollout gaps and some Member States not being ready yet mean mutual learning and support for practical implementation will remain decisive. Finally, to narrow the digitalisation gap, the EU could invest in shared infrastructure and targeted technical support, such as an EU-level digital platform that Member States can adopt on a voluntary basis to modernise core services. Complementing this, an EU framework to track and benchmark compliance costs, complexity and time-to-comply across Member States would make the burden both visible and actionable, and would be linked to existing coordination tools (including the European Semester ) to help push for further reform. This commentary is based on the ‘ The future of EU tax policy harmonisation: Cost of non-Europe report ’ study, carried out by Apostolos Thomadakis, Theresa Bührle, Agustina Korenblit, Fredrik Andersson, Iain Begg and Katerina Pantazatou for the European Parliamentary Research Service (EPRS).", "wordcount": 1097}, {"source": "publication", "date": "2026-02-05T12:10:13+01:00", "title": "ECRI Statistical Package 2025", "authors": ["Fredrik Andersson", "Gloria Paggiaro"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/key_findings_statpack_2025-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/ecri-statistical-package-2025/", "excerpt": "The ECRI Statistical Package provides a comprehensive overview of the trends and composition of the lending to non-financial corporations and households. It cov", "full_text": "", "wordcount": 338}, {"source": "commentary", "date": "2026-02-03T14:44:11", "title": "In the Middle East, the EU doesn’t need Trump’s ‘Board of Peace’ to be more effective", "authors": ["James Moran"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/in-the-middle-east-the-eu-doesnt-need-trumps-board-of-peace-to-be-more-effective/", "page_url": "https://www.ceps.eu/in-the-middle-east-the-eu-doesnt-need-trumps-board-of-peace-to-be-more-effective/", "excerpt": "Donald Trump’s problematic ‘Board of Peace’ is casting a long shadow over the Middle East. And as the situation in Gaza remains dire, this leaves the EU in a bit of a bind. The EU and many of its Member States have either declined to join the Board’s governing body or haven’t yet…", "full_text": "Donald Trump’s problematic ‘Board of Peace’ is casting a long shadow over the Middle East. And as the situation in Gaza remains dire, this leaves the EU in a bit of a bind. The EU and many of its Member States have either declined to join the Board’s governing body or haven’t yet taken a position. But there are other positive actions that the EU can take to improve the situation on the ground, as well as its damaged reputation in the region – and the wider world – as a force for peace. What’s happened since the October 2025 ‘ceasefire’? Since the ceasefire announcement under Donald Trump’s ‘comprehensive plan’ on 12 October last year, over 500 Palestinians have been killed or injured in Gaza, primarily due to continuing Israeli strikes, bringing the total death toll to 71 700, including many thousands of children. In the occupied West Bank, extremist settler violence against Palestinian communities has continued virtually unabated, with impunity. And Israel last year advanced plans for 47 000 Israeli housing ‘units’ (these are often in practice apartment blocks). This is in contempt of the July 2024 ICJ opinion which restated Israel’s obligation to stop all illegal settlement activities and evacuate settlers from Palestinian territory. While deliveries of humanitarian aid to Palestinians in Gaza have improved somewhat, draconian Israeli restrictions remain in place and the amounts involved still fall far short from catering to the population’s huge needs. The critical Rafah crossing has just been re-opened, albeit with severe limits imposed by Israel and there are signs that, citing the lack of progress on Hamas disarming, the Netanyahu government may yet keep most of the Rafah barriers in place. That said, there’s no evidence of any Israeli withdrawal from Gaza, which is part of the quid pro quo for disarmament under the Trump plan. If anything, the Israel Defence Force has extended its military occupation, conducting operations beyond the ‘yellow line’ that they’ve imposed, which effectively divides Gaza in two along a north-south axis. Thirty-seven international NGOs, which play a key role in delivering humanitarian aid to Gaza have been deregistered by the Israeli authorities, while UNRWA, traditionally the main aid, education and medical provider, has been banned and its headquarters in East Jerusalem have been reduced to rubble by Israeli bulldozers, in an operation supervised by Interior Minister Ben Gvir. On top of this, international media outlets are still banned from Gaza. Israel also continues to withhold Palestinian tax clearance revenues and block banking services between Israel and Palestine. This makes it difficult for the Palestinian Authority to function and impedes Palestinian businesses from getting access to much needed finance. Unemployment, with its accompanying frustrations, has surged in recent years. Enter the ‘Board of Peace’ Against this less than propitious background, Trump recently announced the start of the second phase of his plan with the formation of the ‘ Board of Peace ’. Twenty-seven countries have thus far been confirmed for its governing body, including Benyamin Netanyahu and other heads of state or government, as well as one EU Member State, Hungary. Others, including the EU and many of its Member States, have been invited to join. Notable by its absence is any invitation to the Palestinians or indeed any direct reference to Gaza in its founding charter . That charter must count as one of the most peculiar documents in the history of international relations. Among other things, while decisions are to be taken by majority vote, they will be ‘subject to the approval’ of the chairman – namely Trump himself. The chairman is to serve indefinitely and has the exclusive right to choose his successor. Where this leaves the EU All these developments pose several questions for the EU, some of which go beyond the current conflict. Several considerations apply here, many of which have been highlighted in the latest statement issued by a group of over 400 former EU Ambassadors and senior officials made on 2 February . First, given its founding principles, the EU and its Member States should not join the ‘Board of Peace’. It currently includes an ICC indicted war criminal (with a second one, Vladimir Putin, invited) and, as France has clearly stated in its refusal to participate, the Board’s Charter and governance threaten to undermine – if not supplant – the UN’s role in safeguarding international peace and security. Trump has said he believes the UN should continue to exist, but his threats and pronouncements strongly suggest that his administration has little intention of properly respecting the UN Charter, which explicitly forbids the violation of borders and stresses the need to uphold sovereignty. If the EU chooses to engage with specific bodies that are directly associated with the Board, notably the National Committee for the Administration of Gaza and the Gaza Executive Board, then it needs to carefully consider the division of authority between these and the governing Board. At the time of writing this isn’t clear at all, and there’s a danger that the EU’s room for maneuver and autonomy for action could be severely curtailed by Trump. Second, we should remember that High Representative Kaja Kallas has left potential measures designed to restrain Israeli excesses ‘on the table’. As mentioned above, those excesses are blatantly continuing, so the EU should immediately launch a meaningful dialogue with Israel on the EU-Israel Association Agreement and, without a constructive response to its concerns within a clear timetable, move to suspend the Agreement , either in whole or – if internal EU consensus is blocked – in part, using qualified majority voting. Either move would affect close to a third of all Israel’s trade, something which would definitely get Israel’s attention. Equally, if European military equipment is being used for repressing civilians in the Occupied Palestinian Territories, arms exports to Israel should be fully curtailed and, in any event, all trade with illegal settlements should also cease. Finally, the EU needs to energetically reach out to like-minded partners in the OECD, the Middle East, the ‘Global South’ and other G20 members to forge common positions on more constructive measures to promote peace and the two-state solution. If the EU fails to take these actions, it will only serve to sully its already damaged reputation in the wider world as an effective force for real and sustainable peace, at a time when such forces have never been needed more.", "wordcount": 1066}, {"source": "publication", "date": "2026-02-02T10:22:08+01:00", "title": "The economic costs of restricting global stablecoins – and how to mitigate the risks", "authors": ["Judith Arnal", "Matthew Osborne"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/02/Stablecoins-Policy-Brief-final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-economic-costs-of-restricting-global-stablecoins-and-how-to-mitigate-the-risks/", "excerpt": "While the EU has established a comprehensive framework for crypto-assets under the Markets in Crypto-Assets Regulation, growing institutional scepticism towards", "full_text": "", "wordcount": 107}, {"source": "publication", "date": "2026-01-30T16:39:40+01:00", "title": "A pivot or a saga? How Turkish foreign policy is torn between domestic pressures and economic needs", "authors": ["Basak Alpan"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/03/CEPS-Explainer-2026-01-Alpan-on-Turkish-foreign-policy.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-pivot-or-a-saga-how-turkish-foreign-policy-is-torn-between-domestic-pressures-and-economic-needs/", "excerpt": "The EU must take proactive steps to address longstanding issues and cultivate a more trust-based and cooperative relationship with Turkey. Bilateral relations c", "full_text": "", "wordcount": 231}, {"source": "commentary", "date": "2026-01-29T15:28:47", "title": "Brussels is edging towards pragmatism over nuclear energy – but industry also has homework to do", "authors": ["Irina Kustova"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/brussels-is-edging-towards-pragmatism-over-nuclear-energy-but-industry-also-has-homework-to-do/", "page_url": "https://www.ceps.eu/brussels-is-edging-towards-pragmatism-over-nuclear-energy-but-industry-also-has-homework-to-do/", "excerpt": "Massive end-use electrification and soaring power demand from the digital economy have pushed nuclear energy back onto the agenda . But talk of a ‘nuclear revival’ isn’t new. The mid-2000s ‘nuclear renaissance’ promised new reactor designs and rested on increasingly important emi…", "full_text": "Massive end-use electrification and soaring power demand from the digital economy have pushed nuclear energy back onto the agenda . But talk of a ‘nuclear revival’ isn’t new. The mid-2000s ‘nuclear renaissance’ promised new reactor designs and rested on increasingly important emissions reductions policies and then-high gas prices. In Europe, it largely faltered, with delays and cost overruns denting confidence, and then Fukushima killed political appetite. Yet unlike the mid-2000s, today’s case for nuclear rests on Europe’s competitiveness, which hinges on building a reliable, low-carbon system, while containing high energy prices, and the post-2022 drive for homegrown and secure energy. In the updated NECPs , more than 10 EU Member States are considering nuclear, either again or for the first time. Finally, some pragmatism Nuclear energy has long been deeply divisive in Europe. Once hailed as ‘too cheap to meter’ and as a hedge against the 1973-74 oil crisis, it later became entangled in the anti-nuclear movement in some countries and complex coalition politics in others. Article 194 TFEU leaves energy mix choices to Member States, a principle the CJEU has repeatedly reaffirmed . Yet EU-wide policies touching on nuclear remain contested, ultimately affecting investor confidence and nuclear’s overall business case. In the previous 2019-24 cycle, disputes spilled over into the multiple areas, from the Taxonomy and nuclear-based hydrogen, to the NZIA and the electricity-market reform. EU funding and other financing has also been highly selective. Recently, a more pragmatic tone seems to have taken hold. The 2024 Nuclear Energy Summit , the Franco-German nuclear rapprochement , more optimistic PINC projections and explicit references to nuclear as a baseload in President Ursula von der Leyen’s 2025 State of the Union address have all signalled a shift. Is there space for nuclear? It’s increasingly recognised that nuclear power will remain important as a dispatchable source of clean electricity. Even European Commission projections in 2020 and 2024 foresee stable capacity (though most already exist and aren’t new). A decarbonised system will rely heavily on variable renewables. Yet this also requires deliberations on the best ways to manage system-wide costs and to ensure adequacy. When considering system-level costs, including rising redispatch and balancing costs, as well as associated grid expansion costs, nuclear can appear more competitive than headline comparisons suggest . The challenges in deploying renewables and immature long-duration storage also reopen space for nuclear. As system transformation progresses, achieving a fully decarbonised, stable energy system isn’t as straightforward as was previously thought. This makes nuclear’s contributions – low-carbon firmness, inertia, stability – ever more relevant, explaining renewed interest among Member States. Integrating these contributions into the current market design remains a core policy challenge. For those countries which choose to advance nuclear power, there’s also the question of nuclear generation’s long-term revenue. Highly capital-intensive, nuclear is conventionally designed for continuous, i.e. baseload operation. Some countries, including Finland, Sweden and Romania, still maintain this due to a mixture of reactor design restrictions and regulatory frameworks. As renewables run for more hours, nuclear is increasingly pushed to load-follow . While often technically feasible, as in France and pre-phase-out Germany, this does, however, erode revenues. The 2022-24 electricity market reform introduced options for greater revenue predictability but left the fundamental problem of zero- or low-marginal-cost generation unresolved. Ongoing policy considerations about capacity and flexibility markets could offer some answers. Equally, cross-border cooperation that reflects – rather than suppresses – diversity, should be welcomed. European nuclear remains slow… and costly New nuclear projects remain expensive in Europe. Since the 1990s, only a few reactors have been built or are currently under construction – and almost all of them have suffered severe delays and cost overruns, with schedules often slipping by over a decade. There are several possible reasons for this. Difficulties with new-generation European Pressurised Reactors (EPR) are hard to ignore, suggesting that they may not yet have achieved Nth-of-a-kind costs, and after several decades of stagnation, supply chains have eroded and there’s now a severe lack of skilled labour. This further balloons engineering, procurement, and construction risks and lead times. Then regulatory complexity also adds costs and causes delays. Public and safety sensitivities justify being cautious but the boundary with overall paralysis is thin, as highlighted by the recent UK Nuclear Task Force report . Despite all their hurdles, all these projects were approved in the relatively benign economic conditions of the 2000s. Today, similar delays would be financially lethal for large, capital-intensive assets. Ultimately, the industry’s ability to reduce costs and delays will be one of the main conditions for defending nuclear with private investors. While France’s EDF is likely to build mostly domestically, choices for large-scale nuclear are arguably limited to US Westinghouse, Korea’s KHNP and Canadian CANDU designs, which raises question around strategic autonomy. But their ability to deliver projects on time and within budget is what’s most important. As KHNP recently won the Czech tender – having previously delivered projects in the UAE on time and on budget , all eyes are now on whether they can replicate that success in Europe. Financing remains the central bottleneck We also can’t overlook that nuclear energy has been historically developed with significant public involvement. While Small Modular Reactors may eventually alter this dynamic, strong public backing – including funding – remains indispensable. This doesn’t diminish the role of private investment. Strong political and policy support, including de-risking options such as state-backed guarantees, is essential for underpinning private investment and lowering financing costs. Private investors will only commit if Member States provide robust, transparent risk-sharing to kickstart deployment. EU funding and de-risking tools also matter, with the EIB’s cautious re-engagement being welcomed. Today, perhaps only Sweden ticks off these conditions. Its newly adopted scheme – government loans, political guarantees and two-way contracts for difference – as well as Poland’s state aid case are useful case studies. The Commission’s relatively quick review of Poland’s case may also signal a more constructive approach to state aid approval cycles. A future for nuclear yet Although nuclear energy remains a political choice for Member States, a substantial number of them are increasingly turning to its system-level benefits, contribution to decarbonisation efforts and role as a core component of the energy system transformation. At EU level, pragmatism appears to be gaining ground, even as existing frameworks still fall short of fully leveraging nuclear’s strengths. Ultimately, however, nuclear’s prospects hinge decisively on the industry’s ability to deliver projects on time and within budget, and – most crucially – on Member States’ willingness to provide sustained financial and political backing for such large investments. With a renewed policy debate around nuclear energy in the EU, CEPS is assessing the role of nuclear power in Europe’s energy and industrial strategies, resulting in a study that will be published in Q1-2 2026. CEPS is also convening a closed-door roundtable on the main policy issues surrounding nuclear energy on 17 February 2026.", "wordcount": 1148}, {"source": "publication", "date": "2026-01-28T13:04:43+01:00", "title": "The impact of reforms supported by the Recovery and Resilience Facility in the area of the labour market", "authors": ["Alexandre Ounnas", "Cinzia Alcidi", "Caterina Astarita", "Gabriele Freo"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2026/01/2025_RRF-Research-Study-on-Labour-Market.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-impac
