d international collaboration, a role it reaffirmed in 2022 and 2024 . The real test, however, will be whether the EU can build partnerships that aren’t only strategic but also truly equitable and mutually beneficial. Without this, its ambition to lead in global health could lose credibility in a rapidly changing world. Covid-19 highlighted the costs of fragmented action and vaccine inequity. Weak coordination among Member States and delays in securing and distributing countermeasures revealed systemic vulnerabilities . The EU was criticised for doing too little, too late, despite its rhetoric on guaranteeing access to vaccines as a global public good , and grievances continue to shadow its credibility in global forums. After Covid, the Health Preparedness and Emergency Response Authority (HERA) was created to fortify the EU’s response to health crises and ensure access to medical countermeasures. Working with the European Commission and Member States, HERA has also expanded its reach abroad, forging partnerships with Japan, Korea, Canada, the US, Africa and collaborative relationships with global players like WHO, the Coalition for Epidemic Preparedness and the Gates Foundation. In the mpox response, Team Europe provided the political and financial framework, while HERA operationalised it through procurement and coordination. Their joint work with Africa CDC was widely praised as coherent and effective. While overlapping mandates with other EU institutions and services remain a concern, stakeholders have noted that HERA, working closely with other Commission DGs, strengthens the EU’s collective voice in global health security. HERA’s true test, and for the EU more broadly, is whether Europe can move beyond rhetoric to build trust and genuine co-ownership. The Heitor, Niinistö and Draghi reports made it clear – Europe cannot secure its strategic autonomy by retreating from global cooperation. It must embrace cooperation on equal terms. Until it does, tensions between how the EU sees itself and how partners perceive it will linger, including over double standards, post-colonial attitudes and top-down approaches. Shifting from transactional to transformative partnerships To prepare for the future, the EU must deepen partnerships with both traditional allies and low and middle-income countries (LMICs). This is vital not only for global health security but also for Europe’s credibility as a fair and reliable partner. Effective pandemic preparedness starts well before a crisis, it’s built on planning, trust and cooperation. HERA’s partnerships must therefore be proactive , equitable and strategically aligned with EU and international frameworks, while avoiding duplication. Proactivity must start from within, and these partnerships must be developed in close synergy with policies from other parts of the Commission, the EEAS, EU agencies and Member States. True equity in partnerships goes beyond consultation. It requires shared priority-setting, joint design, and responsibility for outcomes. The EU-Africa Health Partnership is a positive model, with its joint steering committee shaping work plans around mutually agreed priorities and clear avenues for cooperation, capacity building and knowledge exchange. It shows how equity can be operationalised through shared governance, balanced responsibilities and benefits for both sides. With the EU aiming to strengthen its credibility as a global health leader , it must focus on partnerships that transcend short-term interests and foster long-term mutual benefit. In a fragmented landscape with growing funding gaps, the resilience of both European and global health security depends on this approach. HERA’s success will hinge on having the tools, flexibility and authority to act effectively on the international stage. A recent CEPS report highlighted that global partners generally value engaging with HERA, but some see its partnerships as prioritising HERA’s strategic needs over shared goals. This can skew dialogue towards financial transactions rather than true technical cooperation. Phrases used in the EU Global Health Strategy reinforce a top-down approach, signalling partnerships informed by EU-driven rather than the locally driven priorities needed to build local and resilient systems for facing future health threats. The EU’s limited flexibility in regulatory and funding frameworks is a persistent challenge, constraining equal collaboration with LMICs. Rigid rules often reinforce donor-recipient dynamics, limiting co-designed initiatives. While partnerships with Africa CDC , AMR-focused initiatives , and Canada’s HERC highlight progress, duplication or parallel efforts could still happen. T he lack of coordination between EU research and innovation programmes, such as Horizon Europe, and external investment instruments , like the Global Gateway, also risks undermining the EU’s credibility and effectiveness as a global development actor. Equitable collaboration is key The EU and HERA’s ability to strengthen international partnerships will be decisive for global health security, including in other regions of interest for the EU like Latin America and the Asia-Pacific. To be credible and effective, HERA must embrace a comprehensive global health approach that recognises LMIC priorities, facilitates technology transfer, promotes equitable access to medical countermeasures and supports local-level capacity building. There are several priorities for going forward. First , the EU should prioritise partnerships that embed shared responsibility and long-term mutual benefit. This requires designing collaborations on principles of co-ownership and shared values, moving away from donor-recipient dynamics. Partnerships shouldn’t be shaped primarily by donor priorities but instead reflect LMICs’ needs and ambitions and be oriented towards funding win-win solutions. Second , the EU must rethink its funding and regulatory frameworks. More flexibility is needed to enable true co-ownership of initiatives with non-EU partners. This should extend to supporting technology transfer, expanding access to medical countermeasures and investing in sustainable capacity building. Such flexibility will determine whether partnerships remain transactional or evolve into long-term vehicles for resilience. Third , successful partnerships depend on early dialogue, sustained engagement and structured feedback loops with international partners. Building trust and ensuring accountability requires mechanisms that allow all actors to shape objectives and outcomes and not simply acting to support European priorities. Fourth , there are already proven models of effective collaboration that should guide future efforts. Africa CDC’s co-designed initiatives with the EU and HERA showcase the value of operational integration, early engagement and shared governance. These lessons must be applied systematically when developing and maintaining partnerships. HERA’s capacity to expand and deepen genuine partnerships will determine how impactful it’ll be. The EU must equip itself with the tools and flexibility to help shape a new architecture of global preparedness, one that strengthens both European security and global resilience. But to credibly do this, the EU must position itself not only as a leader but also as a committed partner within a shared global agenda. To read the full report that this Expert Commentary is based on, please click here .", "wordcount": 1106}, {"source": "publication", "date": "2025-10-03T10:12:40+01:00", "title": "Unpacking policy coherence: a network analysis of the EU policy mix for the circular economy", "authors": ["Vasileios Rizos"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/10/Unpacking-policy-coherence-A-network-analysis-of-the-EU-policy-mix-for.pdf", "page_url": "https://www.ceps.eu/ceps-publications/unpacking-policy-coherence-a-network-analysis-of-the-eu-policy-mix-for-the-circular-economy/", "excerpt": "Policy coherence is a key characteristic of policy mixes, referring to promoti ng synergies and reducing contradictions between policies. Even though several EU", "full_text": "", "wordcount": 201}, {"source": "commentary", "date": "2025-10-02T10:11:53", "title": "When it comes to electric vehicles, the EU is still trying to find the right recipe", "authors": ["Christian Dietz"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/when-it-comes-to-electric-vehicles-the-eu-is-still-trying-to-find-the-right-recipe/", "page_url": "https://www.ceps.eu/when-it-comes-to-electric-vehicles-the-eu-is-still-trying-to-find-the-right-recipe/", "excerpt": "The EU’s efforts to become climate neutral by 2050 can feel abstract, measured in intangible emissions and wrapped up in technical jargon. Yet on Europe’s streets, the transition is already visible in a growing number of electric vehicles (EVs) and charging stations. But decarbon…", "full_text": "The EU’s efforts to become climate neutral by 2050 can feel abstract, measured in intangible emissions and wrapped up in technical jargon. Yet on Europe’s streets, the transition is already visible in a growing number of electric vehicles (EVs) and charging stations. But decarbonising the EU’s transport sector is about more than bringing EVs onto the streets to achieve climate targets. It’s become a question of European competitiveness, jobs, skills, affordability – and much more. As the EV transition arrives at a critical juncture, one central question is emerging: can the EU have its cake, eat it, but also bake it in Europe? Having the cake – or reaching climate goals For passenger cars and vans, battery electric vehicles (BEVs) are leading the shift towards low-carbon mobility. However, lower registration rates in 2024 compared to the previous year triggered some concerns about supposedly wobbling demand. While numbers have picked up again, the mountain to climb remains steep. Aligning with ‘Fit for 55’ policies requires a sharp rise in uptake, from around 1.5 million BEVs in 2024 to over 6 million in 2030, according to some scenarios. To stay on track, consumers would need to spend some EUR 66-95 billion more in 2025 compared to 2024. This is a big leap of faith for consumers still spooked by the recent inflation shock, even as real wages have begun to recover . And the challenges go even deeper. The EV transition isn’t just about adding an ‘E’ to number plates. It means shifting costs and revenues, redefining jobs, skills and entire supply chains, alongside new dynamics such as the rise of the software-defined vehicle – all of which will ultimately determine how much economic value (‘value added’) is created and retained in Europe. The transition also isn’t happening in a vacuum. As shown by the Global EV Outlook , European manufacturers’ share of the EV market decreased from over 80 % in 2015 to 60 % in 2023, while Chinese producers increased theirs to 15 % (from 5 % in 2015). The stakes could hardly be higher, especially following recent large-scale layoffs in the car industry, particularly in Germany. Eating the cake – or making EVs affordable Prices remain a major barrier. According to surveys, EU consumers are willing to pay around EUR 20 000 for a BEV. Yet our scenarios suggest that around EUR 45 000 is the minimum price for European compact-class BEVs to maintain current cost structures and gradually substitute declining revenues from combustion vehicles. Although the cost gap is expected to narrow, the timing remains uncertain and will depend on many factors, including supply chain dynamics, innovation and pricing structures along the value chain (Volkswagen’s plans for small, more affordable BEV models, coming in 2026 and 2027, show progress but broader cost reductions are still essential for bringing competitive EU models across segments to market). For now, some cheaper alternatives already exist but they’re not – at least not yet – rolling out of European factories, resulting in a gap that Europe must close if it’s to reap the benefits of the transition. Baking the cake in Europe – or preserving value added This points to yet another dimension of the EV transition: European value added. For combustion vehicles, Europe retains 85-90 % of the value of each vehicle produced and sold in the EU. For BEVs, the figure falls to 70-75 %. The main reason: batteries. The EU’s battery supply chain remains underdeveloped, even though batteries are likely to remain central to both costs and value added. In 2020, batteries accounted for around 40 % of the direct costs of a compact-class BEV, and while this share is expected to fall, some projections suggest they could still make up around 30 % in 2030. Alas, challenges for the EU battery industry persist. European battery prices remain roughly 20 % higher than China’s and meeting EU demand with domestic production could require up to EUR 380 billion in investment by 2030. On the ground, more than half of previously announced investments were at risk of delay or cancellation in 2024. Recognising this, the European Commission has unveiled a Battery Booster Package to scale up production, with local content requirements (i.e. rules mandating that a certain share of materials or components be sourced from within the EU) also being considered. Scaling up European battery production is clearly justified if the EU wants to preserve value added during the transition. But the cost implications and their potential impact on prices and uptake mean local content rules need to be introduced with care. Blanket requirements risk addressing EU value-added concerns but could trigger cost increases, driving up prices and slowing adoption. That’s why a nuanced approach could be worth exploring. One option could be to identify market segments that can better absorb higher costs without derailing the overall transition. So… what’s the way forward? One path is to prioritise affordability by relying on cheaper – currently likely foreign – BEVs. This route supports climate targets but risks leaving much of the value and jobs outside Europe. Another approach is to double down on local content requirements, which could support retaining value added and employment but also lead to higher costs, slower uptake and, ultimately, missed climate targets. It goes without saying that neither option is particularly attractive. The challenge for EU policymakers is to find a ‘third way’ that safeguards European competitiveness and jobs while making BEVs affordable enough to sustain the transition. Given that European BEVs remain more expensive than combustion cars, targeted demand support – such as social leasing or purchase subsidies – will likely be needed in the short term. At the same time, supply-side measures should support scaling-up battery production, strengthening innovation and securing access to critical raw materials. This is because the transition requires not only bridging demand gaps but also mobilising EU financing instruments to de-risk investments and accelerate industrial deployment and scale-up. Done right, Europe can indeed have its cake and eat it – climate ambition, competitive industries and good jobs to boot. Done wrong, it risks hollowing out its value chains or missing climate targets due to the cake being only half-baked… or baked somewhere else entirely. Click here to read the full report that this Expert Commentary is based on.", "wordcount": 1048}, {"source": "commentary", "date": "2025-10-01T13:28:32", "title": "In Moldova’s election, the line held and a mandate was won – but the hard work is only just beginning", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/in-moldovas-election-the-line-held-and-a-mandate-was-won-but-the-hard-work-is-only-just-beginning/", "page_url": "https://www.ceps.eu/in-moldovas-election-the-line-held-and-a-mandate-was-won-but-the-hard-work-is-only-just-beginning/", "excerpt": "Moldova’s parliamentary election, which took place on Sunday 28 September, was never just about domestic politics. It was a test of whether one of Europe’s fragile democracies could withstand relentless Russian interference – and whether the European project and its ideals could …", "full_text": "Moldova’s parliamentary election, which took place on Sunday 28 September, was never just about domestic politics. It was a test of whether one of Europe’s fragile democracies could withstand relentless Russian interference – and whether the European project and its ideals could still prevail on its frontiers. As President Maia Sandu warned herself before the vote, Moldova may have been the testing ground but Europe was the target. The results now show that Europe held the line. With the pro-European Party of Action and Solidarity (PAS) capturing 50.20 % of the vote and winning 55 out of 101 seats, Moldova has now secured a single-party majority aligned with its president and prime minister. This result dwarfs the pro-Russian Patriotic Electoral Bloc’s 24.20 % , which secured it 26 seats . The Russia-friendly Alternativa Bloc won eight seats , while the populist Our Party and the right-wing Democracy at Home party will enter the Moldovan Parliament with six seats each. Crucially, the PAS will be able to govern without needing to form a coalition with these ideologically and politically incompatible parties. Which means that the signal couldn’t be clearer – Moldova’s head, heart and now legislature are pointing towards Brussels and not Moscow. Russia is defeated… but it’s not going anywhere soon Moscow deployed the full toolkit at its disposal: illegal funding, cyberattacks, mass disinformation campaigns, widespread vote-buying practices and even bomb threats on election day – primarily targeting embassies and diaspora voting sites, where support for Moldova’s European future is strongest. The PAS’ victory is thus a big defeat for Russia and a humiliation for Vladimir Putin. But Moscow’s strategic objective is not merely to influence Moldova’s elections but to erode democracy in the country, undermine institutional trust and derail it from its European path. The former pro-Russian president, Igor Dodon, has already called for protests to annul the results. So far, turnout has been marginal: around 100 demonstrators, mostly elderly. While oligarch Vladimir Plahotniuc has now been extradited from Greece and is in custody in Chişinău, another tycoon , Ilan Shor, who has long orchestrating anti-government protests and vote-buying schemes, will remain active, alongside other pro-Russian politicians. Disinformation, corruption networks and illegal financing will continue, while Moldova’s energy vulnerabilities (particularly in Transnistria), disputed infrastructure ownership and unsettled contract liabilities remain potent levers for Russian influence. In short, Moldova’s democracy has survived this round – but the Kremlin will surely keep testing its resilience, looking for any and all cracks to exploit. Housekeeping in Chişinău and the hard work ahead The PAS’ first term was defined by crisis management rather than delivering on all the promised reforms . Russian interference, along with the war in Ukraine, resulted in direct spillover effects, namely Gazprom energy blockades, costly decoupling from Russian supplies, soaring inflation and increased poverty. Moldova, Europe’s poorest economy, has struggled to shield its citizens from skyrocketing living costs . Nevertheless, Moldova has built resilience with the EU’s support. The country is now an EU candidate, with its accession process moving forward at record speed. Financial support has scaled up accordingly. Up to now, the EU has provided more than EUR 250 million through its emergency support to offset Moldova’s energy crisis. Thanks to the EU’s support, Moldova has also integrated into the EU grid system – ENTSO-E. And the country also now benefits from the EUR 1.9 billion Reform and Growth Facility – the largest amount of EU financial support it has ever received. All this EU political and financial support must be deployed wisely. The PAS will need to translate its mandate into tangible outcomes, primarily much needed reforms, better governance and concrete improvements in living standards. Only then will Moldova’s European choice be both politically sustainable and socially credible. It’s now on the EU to make Moldova’s European choice a reality Moldova’s election is more than a domestic turning point — it’s a strategic victory for Europe over Russian interference. The signing of the EU-Moldova Security and Defence Partnership , the bilateral EU-Moldova Summit and high-level visits from EU heavyweights, such as French President Emmanuel Macron, German Chancellor Friedrich Merz and Polish Prime Minister Donald Tusk, ahead of the elections underscored how well the EU and its Member States understood the stakes. Now that Moldovans have made their firm choice for a European future, the EU must ensure a credible enlargement process , provided that the country delivers on the needed reforms. Brussels has demonstrated strong political and financial support for Chişinău but the credibility of its enlargement policy still hangs in the balance. Pairing Moldova with Ukraine for the accession talks also risks turning Budapest’s veto into a hostage situation for Chişinău. The lesson is clear – enlargement cannot remain paralysed by unanimity at every stage. While unanimity is justified for granting candidate status and full membership (i.e. the very beginning and the very end of the process), without moving the interim steps to qualified majority voting , Moldova’s fast-track accession risks becoming another case of the two-decades-long Western Balkans deadlock. While Ukraine fights a full-scale war with Russia and Georgia faces Kremlin-driven state capture, Moldova’s vote for Europe offers a spark of hope. But these elections were only the beginning. Chişinău must deliver reforms that tangibly improve people’s lives and Brussels must deliver on enlargement – helping to make Moldova’s firm European choice into an even firmer reality.", "wordcount": 893}, {"source": "commentary", "date": "2025-09-30T14:37:57", "title": "The EU’s on thin ice in Greenland. It really needs to get its key messages across", "authors": ["Renske Van Hoof"], "topics": ["Energy, Climate & Environment", "Foreign Policy & Security"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/the-eus-on-thin-ice-in-greenland-it-really-needs-to-get-its-key-messages-across/", "page_url": "https://www.ceps.eu/the-eus-on-thin-ice-in-greenland-it-really-needs-to-get-its-key-messages-across/", "excerpt": "Greenland, remote and mysterious, rarely made global headlines, mainly featuring in nature documentaries. Now, it’s a hotspot in the Arctic’s growing geopolitical rivalry, with top European and American officials routinely visiting Greenland, direct flights opened to New York and…", "full_text": "Greenland, remote and mysterious, rarely made global headlines, mainly featuring in nature documentaries. Now, it’s a hotspot in the Arctic’s growing geopolitical rivalry, with top European and American officials routinely visiting Greenland, direct flights opened to New York and US-Denmark tensions heating up. And of course, there’s Donald Trump’s outlandish desire to ‘buy’ Greenland (a proposal not so out of the blue – the US allegedly floated the idea some eighty years ago ). For the EU, carving out a role in the current frenzy over Greenland seemingly offers few working strategies. But engaging openly and honestly with Greenlanders now could massively pay off in the not-so-distant future. Greenland has CRMs. But it’s complicated Critical Raw Materials (CRMs) are arguably the main reason why the EU is doubling down on strengthening ties with Greenland. With the growing appetite for CRMs in the green transition and heavy dependence on China, the EU has been signing a series of strategic partnerships with third countries – including Greenland in 2023 . Hopes are high, as Greenland holds substantial estimated reserves . Thus far, one European company has been granted a license by the Greenlandic government. The EU is also leveraging its limited competences by supporting training for a Greenlandic mining workforce, making sure to align with local educational aspirations . Yet expectations risk being overinflated. CRMs are unlikely to become economically viable in Greenland, at least in the short- to medium term. Mining in extreme conditions requires massive investment, with no guaranteed pay off. There’s barely any existing infrastructure and the local workforce is almost non-existent. Sustainability issues add another layer of tension. Locally, the EU’s policies are often seen as bordering on hypocrisy. This echoes controversies in Serbia and Rwanda where CRM deals sparked opposition that Brussels essentially ignored. Concerns over indigenous rights, like those of the Sámi in northern Sweden, further fuel criticism, with some framing such EU deals in neocolonial terms . Environmental risks deepen the unease. Many resources in Greenland are tied to uranium, making extraction hazardous. The Kvanefjeld project, for instance, was shut down over such concerns. Subsequent arbitration claims against the Greenlandic and Danish governments effectively reinforced locals’ perception of the precarious nature of resource development on the island. Yes, some researchers do advocate further exploration and knowledge-building, arguing for technological advances. But for now, put bluntly, developing CRMs in Greenland remains meagre and is much more expensive than in other parts of the world. But that may change in the future. ‘Nothing about us without us’ – but Denmark is still in the driving seat Attempting to expand cooperation on CRMs, despite current difficulties, is one step the EU can take to move beyond its traditionally limited engagement with Greenland. Since leaving the then-EEC, Greenland’s relations with the EU have been managed as one of the Overseas Countries and Territories , offering only narrow areas for cooperation – mainly fisheries, education and training programmes. The EU’s limited competences are then layered onto the historically sensitive relations between Denmark and its semi-autonomous territory, which are currently going through a rough patch. Historic scandals like ‘the experiment’ to ‘re-educate’ Inuit children and the insertion of contraceptive coils into young girls without their consent – which the Danish Prime Minister only recently apologised for – continue to cast a shadow. As recently as this year, protests erupted after Denmark removed a newborn from her Greenlandic mother. None of this fosters goodwill and Greenland’s push for greater autonomy through a ‘nothing about us without us’ approach is understandable, allowing it to explore alternative sources and partners for economic development, despite still being heavily dependent on budget transfers from Denmark. Yet Greenland’s rising global visibility has given it leverage . When China offered to expand infrastructure investments in Greenland, Denmark quickly financed a new airport – under US pressure to meet Greenland’s needs and to keep China out . And just days ago, Denmark signed a new agreement with Greenland that includes ambitious infrastructure projects. But Greenland’s quest for more external autonomy goes beyond infrastructure, trade or diplomatic ties. It’s also about forging closer connections with fellow Inuit communities in North America. Thus, Greenland’s instinctive westward-looking inclination shouldn’t come as a surprise – and that’s why Brussels must clearly spell out the benefits of closer Greenlandic ties with the EU. Getting it right – local priorities and EU credibility Even as Greenland increasingly asserts its own voice on the world stage, big geopolitical games often feel like ‘much ado about nothing’ to the local population. Bread-and-butter issues garner much more attention. Still, the EU, even with its limited competences, could build on these areas to more meaningfully engage with Greenland. With a proposal to double financial support under the next EU budget , it’s definitely showing its willingness for increased involvement. But due to Greenland’s limited capacity to implement funding programmes, the EU must get its priorities straight and communicate the benefits clearly. And herein lies the problem. Education, the EU’s main area of cooperation with Greenland (90 % of the budget), has already delivered tangible results and has further potential, but Brussels struggles to convey these successes on the ground, reinforcing local indifference to its role. The same goes for its highly promoted sustainability agenda. For many Greenlanders, the EU’s lofty ambitions feel vague at best, unrealistic at worst. Brussels’ sustainability narratives are often perceived as uncompromised attempts to trade economic development (understandable, given the island’s poor infrastructure and shaky, subsidies-reliant budget) for an ambitious green agenda. For example, the EU’s objections at the International Whaling Commission in the mid-2000s to Greenland’s request to expand indigenous whaling quotas were not well received in a land defined by a whale hunting culture. Once the EU begins to see things from a more local, Greenlandic perspective, it’ll be better positioned to highlight the tangible benefits that the EU can bring, regardless of how its bilateral relationship with Denmark evolves. But additional funding can only be profitable with full Greenlandic support – and cooperation. The EU’s recently established office in Nuuk is a step in the right direction, for gaining a local perspective and increasing visibility. Now, it must further finetune its ‘sales pitch’ by incorporating Greenlandic views and emphasising the real advantages of a European future, such as the possibility for Greenlanders to take part in programmes like Erasmus+. If the EU puts in the effort, it could really pay off. Having Greenland firmly in the European camp, as an equal, valued partner, isn’t just logical. It’s essential.", "wordcount": 1086}, {"source": "publication", "date": "2025-09-26T13:21:57+01:00", "title": "Symbolic or real? Evaluating HERA’s stakeholder engagement", "authors": ["Alice Orlandini", "Mariia Orudzhova", "Timothy Yeung"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2025/09/Evaluating-Stakeholder-Engagement-in-HERA-Sept-2025-final-2-formatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/symbolic-or-real-evaluating-heras-stakeholder-engagement/", "excerpt": "The Health Emergency Preparedness and Response Authority (HERA), the European Commission’s newest Directorate-General, has distinguished itself through a compar", "full_text": "", "wordcount": 245}, {"source": "commentary", "date": "2025-09-25T11:57:27", "title": "To unlock real global solutions, FP10 needs to wield multistakeholder power", "authors": ["Cosima Lenz", "Diana Senczyszyn", "Esther Serger"], "topics": ["AI, Digitalisation & Innovation", "Diversity, Equity & Inclusion", "Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/to-unlock-real-global-solutions-fp10-needs-to-wield-multistakeholder-power/", "page_url": "https://www.ceps.eu/to-unlock-real-global-solutions-fp10-needs-to-wield-multistakeholder-power/", "excerpt": "In today’s world of overlapping crises, no single actor or nation can go it alone – even the EU, with all its collective strength. These complex challenges demand a new approach, one that’s cooperative, cross-sectoral and forward-looking. That’s why multistakeholder research and …", "full_text": "In today’s world of overlapping crises, no single actor or nation can go it alone – even the EU, with all its collective strength. These complex challenges demand a new approach, one that’s cooperative, cross-sectoral and forward-looking. That’s why multistakeholder research and innovation (R&I) partnerships aren’t a luxury – they’re a necessity. When governments, researchers, industry, civil society and philanthropies join forces, they tap into shared strengths and co-create knowledge that can deliver real-world solutions. Global progress now depends on this kind of bold collaboration. The EU’s partnerships evolution continues Horizon Europe was a turning point by consolidating partnerships, halving their overall number and broadening (although still rather timidly) the EU’s overall international engagement. Through the Global Gateway the EU has taken steps to foster inclusive and sustainable development, yet the level of multistakeholder cooperation is still limited. The Covid-19 pandemic also showed just how important well-designed and effectively implemented multistakeholder partnerships are when responding to global challenges. The upcoming 10 th Framework Programme (FP10) marks a once-in-a-generation opportunity to shift from surface-level, often ad hoc, collaborations towards more ambitious, strategic and inclusive partnerships grounded in equity, co-ownership and long-term impact. The Commission’s proposal positions FP10 as a vehicle to enhance international cooperation, to boost EU R&I competitiveness, attract global talent and address shared global challenges, including through synergies with the Global E urope programme . European partnerships will remain central but they will be radically simplified and further streamlined. Yet as already underscored in recent CEPS analyses ( January 2025 and July 2025 ), it’s important that the notion of partnership be significantly revised to align with international practice. In short, the EU must ensure that its partnerships are mission-oriented and engage diverse global stakeholders – including private and public entities. This also implies that partnerships for global challenges are kept separate from more inward-looking programmes and projects focused on EU competitiveness and security, as CEPS has also argued . Inclusive partnerships can deliver results – just look at health Health is perhaps the best example of why multisectoral and international partnerships matter – diseases don’t respect borders and effective responses require collaboration that cuts across sectors and geographies. Partnerships allow actors to pool expertise, resources and networks in ways no single institution could achieve on its own. The European and Developing Countries Clinical Trials Partnership ( Global Health EDCTP3 ) is a good example. By aligning with the EU Global Health Strategy and the AU-EU Innovation Agenda , it has mobilised diverse partners and delivered concrete results. This includes the R21 malaria vaccine, new treatments for paediatric HIV and cryptococcal meningitis, rapid mpox responses in the DRC, and training for over 362 African research fellows and 53 000 health workers. Similarly, the Innovative Health Initiative shows how inclusive, cross-sectoral collaboration can drive impact beyond medicines, expanding into diagnostics, digital health, biotechnology and medical technology. Over 90% of its 16 active projects bridge multiple technology sectors, while initiatives including EHDEN , EUPATI , INNO DIA and the Patient Pool ensure structural sustainability and genuine patient engagement. Crucially, health is also the only policy domain where synergies between Horizon Europe and its external action instrument ( NDICI-Global Europe ) have been successfully realised through EDCTP3 and the Team Europe Initiative on Manufacturing and Access to Vaccines . This makes health an excellent model for showcasing how co-financing and cross-instrument alignment can work. Not all partnerships are created equal Lessons from EU and global R&I partnerships highlight recurring factors of success, including multistakeholder governance, long term commitments, strong local ownership and clearly defined priorities. Gavi has successfully strengthened immunisation programmes in Low- and Middle-Income Countries (LMICs) and has been widely credited for its emphasis on local engagement, country ownership and close collaboration with industry. Yet persistent shortcomings undermine many partnership models. Administrative complexity, fragmented funding systems, weak internal coordination and the underrepresentation of LMIC partners affect coherence and impact. That’s why embedding robust multistakeholder governance from the outset is key to maximising the inclusivity and effectiveness of EU R&I investments. Rethinking the EU’s approach to R&I partnerships – seven steps to success As the EU charts its next R&I framework, it faces a critical test. Will it double down on familiar structures or recalibrate the EU’s role in the global R&I ecosystem? The foundations are clear – equity, agility, flexibility and deep partner engagement. Global challenges are growing more complex and Europe’s research partnerships must rise to meet them. First , stability matters. That means shifting from fragmented, short-term collaborations to long-term, institutionalised partnerships with real impact. FP10 should build on successful models, ensuring partnerships are financially sustainable, regularly evaluated and able to adapt to changing needs. Where private investment is limited, sustained public funding is essential. Second , collaboration should be broader and deeper. Tackling global challenges requires cross-sector, multistakeholder engagement, from governments to philanthropies. The EU should reduce barriers for international partners and create mechanisms that welcome co-funding from global donors – including philanthropic actors. Third , the EU must be flexible in how it participates. Sometimes leading, sometimes partnering, depending on the issue, region and expertise. Mobilising national and private R&I funding will be crucial, given Horizon Europe/FP10 only represents a fraction of Europe’s total public R&I spending. Fourth , EU research should be better aligned with external action instruments like Team Europe Initiatives under the Global Gateway. This can scale science and innovation to achieve broader development and geopolitical goals. Fifth , real inclusivity demands that LMIC partners have a voice in both designing and implementing R&I partnerships. Removing legal and administrative barriers preventing full participation is essential for fostering equity and local ownership. And finally , simplifying the EU’s procedural and financial rules is key. Administrative burdens remain too high. FP10 should make it easier – not harder – for global partners to work with Europe. FP10 must not simply replicate past partnership models. It should innovate, making global multistakeholder R&I collaboration central to Europe’s ambition to lead the world in the pursuit of finding tangible, workable solutions to the many global challenges we’re facing. To read the full report that this commentary is based on, click here . To read all publications in the ‘EU R&I and Health Policy’ series, please click here .", "wordcount": 1039}, {"source": "publication", "date": "2025-09-24T13:54:03+01:00", "title": "Preparedness in the labour market: a toolkit for anticipating the future of work", "authors": ["Laura Nurski", "Davide Monaco"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/09/2025-08-JS-Explainer_future_approaches_formatted-2.pdf", "page_url": "https://www.ceps.eu/ceps-publications/preparedness-in-the-labour-market-a-toolkit-for-anticipating-the-future-of-work/", "excerpt": "Recent shocks and disruptions – from pandemics to technological breakthroughs – have made clear that simply waiting until a crisis hits is no longer an option.", "full_text": "", "wordcount": 136}, {"source": "publication", "date": "2025-09-22T14:22:15+01:00", "title": "Saving for retirement is hard – but the EU can make it easier", "authors": ["Apostolos Thomadakis", "Marie Brière"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/09/Saving-for-retirement-is-hard-but-the-EU-can-make-it-easier-IDA-n-23.pdf", "page_url": "https://www.ceps.eu/ceps-publications/saving-for-retirement-is-hard-but-the-eu-can-make-it-easier/", "excerpt": "Europe’s retirement savings gap is widening. Tax incentives dominate policy but mainly benefit higher earners, leaving younger and lower-income savers behind. F", "full_text": "", "wordcount": 145}, {"source": "publication", "date": "2025-09-18T13:59:49+01:00", "title": "How to radically simplify and streamline the EU enlargement process", "authors": ["Michael Emerson", "Steven Blockmans"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/09/rnIkbyyY-Simplification-text-r.17.9.25-ME-SB225173_formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-to-radically-simplify-and-streamline-the-eu-enlargement-process/", "excerpt": "Over the last year the EU’s enlargement process has seen the implementation of a new ‘gradual integration’ concept, allowing for some modest elements of single", "full_text": "", "wordcount": 128}, {"source": "commentary", "date": "2025-09-18T11:00:49", "title": "The Paris Agreement turns 10 – it’s time to prepare for the teenage years", "authors": ["Irina Kustova", "Christian Dietz"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/the-paris-agreement-turns-10-its-time-to-prepare-for-the-teenage-years/", "page_url": "https://www.ceps.eu/the-paris-agreement-turns-10-its-time-to-prepare-for-the-teenage-years/", "excerpt": "At COP30, the Paris Agreement, which has led to the creation of a complex institutional framework, turns 10. But the framework isn’t delivery. Over the next few years, Paris will face its ultimate test – whether it can move beyond procedure to real-world transformation. In short,…", "full_text": "At COP30, the Paris Agreement, which has led to the creation of a complex institutional framework, turns 10. But the framework isn’t delivery. Over the next few years, Paris will face its ultimate test – whether it can move beyond procedure to real-world transformation. In short, it’s a mixed outlook, with the US withdrawal (spoiler alert, not as bad as it seems) and the global average temperature surpassing 1.5°C for the first time in 2024. But alongside gloomy news, there’s also some positives that should definitely be cheered. Being deliberately designed as a framework for incremental cooperation based on nationally formulated commitments, the Agreement’s premise was that robust procedural rules – anchored in transparency, inclusive participation and a bit of peer pressure – would propel deeper cooperation. Born from the post-Kyoto/Copenhagen deadlock, this design ensured resilience through flexibility. With most elements now operationalised, a massive multilateral setup is in place, and we’ll soon see if these detailed procedures can translate into fully delivering the Agreement’s goals. A glass half full – inward looking multilateralism really does seem to work On the positive side, Paris has delivered a strong structured framework – the Global Stocktake, the Nationally Determined Contributions (NDC) ambition cycle and the Enhanced Transparency Framework have all provided rules that stimulate cooperation through transparency and trust. This machinery is now switched on – the first Biennial Transparency Reports were submitted in 2025 and the first Global Stocktake in 2023 offered a glimpse of incremental ambition. COP30, in Belém, Brazil, will mark the third NDC ambition cycle. Peer pressure has also had some effect, as national pledges have shifted to below 3°C, according to the 2023 Stocktake. Not enough – but still, progress, nonetheless. Although there’s been resistance to converging developing and developed country contributions, some positive progress has also been made here – flexibility was maintained for developing countries, while overall uniformity improved in reporting standards under the Enhanced Transparency Framework and NDC guidelines. There were even some voluntary finance contributions from several developing countries. True, negotiations have also preserved the ‘party-driven process’, jealously guarded by certain developing countries, especially China. But despite entrenched positions and even occasional bickering, the UNFCCC remains the default climate governance forum for most Parties. That’s why the US’ second withdrawal should be put into perspective – yes, it’s financially weakening but it hasn’t triggered cascading exits (thus far). In fact, it may be less damaging to have the US outside the Agreement, rather than paralysing it from within. A glass half empty – will Paris ultimately deliver? The new ambition cycle looks lethargic. With less than three months before COP30, only around 30 countries have submitted NDCs. Core emitters, such as the EU, China and India have yet to do it. Despite repeated calls from the COP Presidency, there’s a risk of many last-minute submissions. We’ll have to wait to see if these NDC submissions result in sufficiently ambitious collective outcomes. Climate finance remains the most contentious fault line. While there have been success stories, they’re far from sufficient. Definitions over climate finance still need to be agreed and it’s being questioned as to whether the amounts provided are enough. The New Collective Quantified Goal , a financial target agreed at COP29 in Baku, left many dissatisfied, while prospects for scaling-up in Belém are bleak. EU contributions are tightening, US aid is gone and UN funds are struggling to match rising budget needs. Meanwhile, the mitigation agenda remains locked into lowest-common-denominator outcomes. Ambitious proposals, such as more strongly aligning national mitigation pathways or earlier emissions peaking, or a fossil fuels phaseout, have been watered down or blocked. The disagreements over the purpose of the Mitigation Work Programme – whether it should accelerate joint action or merely serve as a knowledge sharing platform – highlight persistent divides. When coupled with the climate finance deadlock, prospects for significant breakthroughs look dim… at least for now. Time to implement… but how? Every year, COP’s overloaded agendas, thousands of delegates and observers, and eye-watering costs (with accommodation prices in Belém hitting the roof ) feed perceptions of dysfunction. Whether and how the COP system needs an overhaul has become a recurring debate . This all reflects a deeper malaise – now that operational rules are in place, the gap between procedure and delivery risks being starker than ever. The elephant in the room is that the Agreement lacks institutions with real operational mandates . Its first decade focused inwardly on building nitty-gritty rules; now, implementation requires outward-facing structures and delivery mechanisms. The COP30 Presidency lists action points based on the 2023 Global Stocktake as a priority, but implementation ecosystems remain underdeveloped. Climate diplomacy seems to come in waves: UNFCCC (1992), Kyoto (1997), Copenhagen (2009) the Doha Amendment (2012), Paris (2015) … and now perhaps something new on the horizon? Brazil’s floated idea of a Global Climate Council is one example, though still vague . COP30 could brainstorm more ideas… whether it will is another question entirely. Moving from pledges to outcomes requires Paris to act as a ‘ central node ’ – linking national policies, financial systems and private actors, while bridging silos between trade, finance and environment policies. Building synergies with other environmental regimes, e.g. biodiversity, plastics, aviation and shipping, could also strengthen outcomes. In short, if the UNFCCC process fails to secure this central role, it risks becoming a ‘ zombie institution’ , a functioning bureaucracy that just won’t deliver. ‘Pragmatism’ is emerging as arguably a buzzword. For some, it means retaining flexibility for developing countries and strict adherence to Party-driven principles. For others, it signals a willingness to move beyond rigid consensus rules towards functioning decision-making. Pragmatism could also lead to ‘minilateralism’ – voluntary coalitions moving faster than global talks. These could deliver deals and exclude adversaries, an appealing option in today’s fragmented geopolitics. Such coalitions can also help mitigate claims of green protectionism linked to climate-trade policies by bringing those unhappy onboard. Some (developing) countries may also choose to double down on their own interpretations of climate rules vis-à-vis Western approaches. Alas, as Paris nears its turbulent teenage years, it’s easier for the negatives to outshine the positives. But whilst these concerns are legitimate, the UNFCCC remains the bottom line for climate governance. The Agreement is a compromise – not flawless but still the best framework we’ve managed to construct thus far. Whether it’s enough is a question that will be answered over the next few years. This CEPS commentary is based on a new CEPS study under the Horizon Europe ENSURED project. The study reviewed the Agreement’s first decade and explored potential future trajectories for the global climate regime.", "wordcount": 1107}, {"source": "commentary", "date": "2025-09-16T11:41:49", "title": "Why the EU-Ukraine DCFTA review matters", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security", "Trade"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/why-the-eu-ukraine-dcfta-review-matters/", "page_url": "https://www.ceps.eu/why-the-eu-ukraine-dcfta-review-matters/", "excerpt": "The EU and Ukraine have recently agreed to review the Deep and Comprehensive Free Trade Agreement (DCFTA), the core trade pillar of Ukraine’s Association Agreement with the EU. While the agreement stops short of full trade liberalisation, it offers more predictability and helps c…", "full_text": "The EU and Ukraine have recently agreed to review the Deep and Comprehensive Free Trade Agreement (DCFTA), the core trade pillar of Ukraine’s Association Agreement with the EU. While the agreement stops short of full trade liberalisation, it offers more predictability and helps contain political tensions contributing to Ukraine’s deeper integration with the EU. Before the war, the DCFTA helped double trade flows between Ukraine and the EU, with EU exports to Ukraine growing by 106 % and imports from Ukraine rising by 92 % in 2021 compared to 2015 levels . Following Russia’s full-scale invasion, the EU introduced Autonomous Trade Measures (ATMs), offering full trade liberalisation on a temporary basis. While these measures provided crucial short-term support, political tensions in the EU have prompted both sides to look for a more stable and long-term solution, resulting in the decision to review the DCFTA – which will ultimately benefit both sides. Full liberalisation… with strings attached ATMs have provided unprecedented support to Ukraine by suspending import duties, quotas and trade defence measures on all Ukrainian goods, renewed annually. Solidarity Lanes also offered vital logistical solutions for Ukraine’s agricultural exports. These measures deepened Ukraine’s integration into EU supply chains. Regarding exports, EU sales to Ukraine grew by 51 % compared to pre-war levels, driven by Ukraine’s demand for energy, machinery and manufacturing goods to support its wartime economy, quadrupling the EU’s trade surplus with Ukraine. The most significant increases were in energy exports, following Ukraine’s synchronisation with the European electricity grid. EU agri-exports also grew steadily, including processed agricultural products, dairy products, fresh fruit and vegetables, and meat products and preparations, reaching around EUR 300 million per category in 2024. Meanwhile, Ukraine’s exports to the EU grew modestly by 2 % from 2022-24. However, this overall growth masks a surge in agricultural exports, which more than doubled in 2024 (a 117 % increase compared to pre-war levels). Pre-war, Ukraine already accounted for a substantial share of EU agricultural imports: 88 % of sunflower oil, 51 % of maize, 40 % of rapeseed and 36 % of soybean oil. These all increased under ATMs, ranging from a 6 to a 17 %-point increase in Ukraine’s share in EU agri-imports. The EU is maintaining a positive trade balance with Ukraine across all products, except for agriculture, where Ukraine remains a net exporter and thanks to ATMS, managed to expand its surplus. This raised concerns in bordering EU countries, where Ukrainian exports were seen as displacing local production. This quickly became politicised, with Ukrainian grain becoming an issue in the Polish general election and causing tensions in Slovakia and Hungary. The EU eventually phased out ATMs on several sensitive agricultural products. Poland, Hungary and Slovakia also imposed unilateral import bans on selected Ukrainian agricultural products. What the review means Due to ATMs’ political sensitivities, Brussels and Kyiv are pursuing a more stable and systemic solution with the DCFTA review. In the interim , trade reverts to the original DCFTA terms – with the sole exception of iron and steel imports . Under the original DCFTA, matching the ATMs’ access levels would have required the EU to remove the remaining 5.3 % of tariffs on industrial goods and 16.6 % of agricultural tariff lines, including all tariff rate quotas (TRQs) – a major barrier for Ukraine’s agricultural exports. TRQs should be expanded through the review, with full liberalisation only applying to non-sensitive goods (like selected dairy products). Estimates suggest that by applying TRQs under the reviewed DCFTA, Ukraine’s exports could fall by approximately USD 1.2 billion, a 2.9 % decline in overall exports. This would translate into around USD 68 million in lost tax revenues. Unlike the ATMs, which were unilateral EU measures, the DCFTA review introduces reciprocal liberalisation. This means Ukraine would also need to open its market to EU exports. EU exporters will benefit from lower tariffs, full liberalisation on some goods and additional quota volumes at preferential tariffs for poultry, pork and sugar. And of course, reciprocal liberalisation will only increase EU exports. The revised DCFTA will also come with a built-in safeguard clause – if new trade concessions start to hurt domestic industries on either side, the EU or Ukraine can trigger protective measures, providing a framework for resolving disputes at EU level and to prevent unilateral bans by individual Member States. A boon for both sides Ukraine stands to gain more from the revised DCFTA than from the original but less than it did under the ATMs. Suspending the ATMs has hit agricultural exports the hardest. For Ukraine’s wartime economy, extending them would undoubtedly bring more short-term gains. But trade, especially in wartime, is never just about economics – it’s also about politics. Here, the DCFTA review strikes a more sustainable political balance: it eases Ukraine’s access to the Single Market within a framework that reassures Member States. Unlike the temporary and politically sensitive ATMs, the revised DCFTA offers predictability and helps contain political tensions, which in the medium-to-long-run will deliver greater economic benefits. Still, the DCFTA review falls short of the ATMs’ full trade liberalisation, meaning Ukraine must deepen regulatory alignment – particularly on sanitary and phytosanitary measures, technical barriers to trade, and by signing the Agreement on Conformity Assessment and Acceptance of Industrial Products (ACAA), expected by the end of 2025. This would expand market opportunities and accelerate Ukraine’s regulatory convergence with the EU, which is important for its membership aspirations. At the same time, the lack of full trade with the EU underscores the urgency of diversifying Ukraine’s export destinations. Accelerating reconstruction is essential for reducing bottlenecks and supporting Ukraine’s global competitiveness. From the EU’s perspective, the DCFTA review will benefit European producers by easing market access and boosting exports to Ukraine, in industrial and agricultural products, further reinforcing the EU’s positive trade balance. Finally, the review introduces a framework for monitoring how trade evolves under agreed conditions – a reality check that integrating into the EU single market is both measurable and mutually beneficial. In agriculture, Ukraine may remain a net exporter, yet its trade surplus is expected to shrink due to the ATMs’ suspension, once again tilting the balance in the EU’s favour. And we shouldn’t forget that Ukraine is the EU’s third-largest import partner after Brazil and the UK – which means Europe needs Ukrainian agri-food products. And that’s why the DCFTA shouldn’t be politicised – ultimately it will benefit both sides, especially as Ukraine continues its valiant struggle. Note: All figures, unless otherwise referenced, are the author’s calculations based on data provided by Eurostat .", "wordcount": 1092}, {"source": "publication", "date": "2025-09-16T09:18:28+01:00", "title": "2025 ECMI Statistical Package", "authors": ["Felipe Calvo de Freitas", "Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/09/promo_2025_ecmi_statistical_package.pdf", "page_url": "https://www.ceps.eu/ceps-publications/2025-ecmi-statistical-package/", "excerpt": "The ECMI Statistical Package presents a comprehensive collection of the most relevant data on various segments of European and global capital markets. It enable", "full_text": "", "wordcount": 295}, {"source": "publication", "date": "2025-09-15T14:24:06+01:00", "title": "From preparedness to action: HERA’s role in the EU’s public and global health security architecture", "authors": ["Cosima Lenz", "Marta Souto", "Louise Bengtsson"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2025/09/A4.2.2.-Policy-brief-HERAs-external-dimension-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/from-preparedness-to-action-heras-role-in-the-eus-public-and-global-health-security-architecture/", "excerpt": "The EU has reinforced its leadership in global health security by adopting a more proactive and cooperative approach to preparedness and response. Its health se", "full_text": "", "wordcount": 278}, {"source": "publication", "date": "2025-09-11T13:29:23+01:00", "title": "Multi-issuance stablecoins and MiCA’s first real credibility test", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/2025/09/ECRI-In-depth-analysis_Stablecoins-and-MiCA.pdf", "page_url": "https://www.ceps.eu/ceps-publications/multi-issuance-stablecoins-and-micas-first-real-credibility-test/", "excerpt": "The EU’s Markets in Crypto-Assets Regulation (MiCA) is now the world’s most comprehensive regulatory framework for digital assets. This ECRI In-Depth Analysis p", "full_text": "", "wordcount": 125}, {"source": "publication", "date": "2025-09-05T09:41:01+01:00", "title": "European and global cooperation in research and innovation: case studies and lessons learned", "authors": ["Cosima Lenz", "Diana Senczyszyn", "Esther Serger"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2025/09/reDXpDC6-A1.2.1_-Thematic-paper-on-case-studies-for-RI-cooperation_formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/european-and-global-cooperation-in-research-and-innovation-case-studies-and-lessons-learned/", "excerpt": "Today’s global challenges, such as climate change, health threats or biodiversity loss, are too complex for any single actor to solve alone. Multi-stakeholder p", "full_text": "", "wordcount": 240}, {"source": "commentary", "date": "2025-09-03T09:21:31", "title": "Defying gravity… or not? Here are seven weaknesses to look out for in the US economy", "authors": ["Cinzia Alcidi"], "topics": ["Economy & Monetary Affairs", "Trade"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/defying-gravity-or-not-here-are-seven-weaknesses-to-look-out-for-in-the-us-economy/", "page_url": "https://www.ceps.eu/defying-gravity-or-not-here-are-seven-weaknesses-to-look-out-for-in-the-us-economy/", "excerpt": "Much of the current commentary praises America’s remarkable economic resilience despite broad tariffs, erratic policies and even the current administration’s overt attacks on democratic institutions. Yet on closer inspection, the awesomely positive narrative of a triumphant Trump…", "full_text": "Much of the current commentary praises America’s remarkable economic resilience despite broad tariffs, erratic policies and even the current administration’s overt attacks on democratic institutions. Yet on closer inspection, the awesomely positive narrative of a triumphant Trump era is based more on slogans than solid ground. Beneath the surface, seven cracks are waiting to appear. No inflation – no problem (yet) The muted price impact of tariffs – with the Consumer Price Index (CPI) rising to just 2.7% in July – reflects pre-tariff stockpiling and broader temporary price dynamics. The anticipation of tariffs drove a huge surge in goods imports (in March, around USD 347 billion , from an already high monthly average of about USD 270 billion in 2024) and left firms stocked up with large inventories. This reduced the need to purchase tariffed goods over recent months, dampening immediate price pressures. Yet some underlying effects are visible. Detailed inflation data reveal that the rise in CPI was largely contained by a significant fall in the energy index, to -1.6% annually. This has offset the increase in core inflation (all items, minus energy and food, which are affected by tariffs) of 3.1%, above previous trends. As inventories are depleted and the dollar continues to weaken, that’s when the real inflationary impact of tariffs will become clearer. Markets are calm… until they aren’t The market’s lack of reaction to current policy uncertainty and changes is rather striking – and the prevailing euphoria even more so. Market muteness seems to be driven by a combination of fear of political backlash and a short-term mindset. Investors seem more eager to exploit near-term gains than to worry about longer-term risks. At the same time, the euphoria in the tech sector recalls earlier episodes of irrational exuberance, such as during the early 2000s dot-com bubble . This time, AI is the trigger. The hype around it is so large that it appears to be propping up the entire US economy, with optimism hinging largely on the soaring valuations of a few large tech firms . Even some in the AI community warn of overinvestment but the hype machine rolls on. History suggests this cannot last forever. Consumers are still spending – but only at the top While US consumer sentiment continues to swing, there’s no doubt that strong consumption is only driven by wealthier households, with high purchasing power, fuelled by asset gains in real estate and the stock market, rather than broad-based income growth. The top 10% is now responsible for nearly half of all spending, a record high . Meanwhile, the purchasing power of middle and lower-income households is being eroded. Such an imbalance makes the US economy unusually dependent on affluent consumers and vulnerable to downturns in asset markets, which raises concerns about its long-term stability. Tariff revenues won’t fix public debt Between April and June 2025, US tariffs generated roughly USD 65 billion, and the Urban-Brookings Tax Policy Center estimates a total of USD189 billion in 2025 and nearly USD 360 billion in 2026. Yet according to Congressional Budget Office estimates, the One Big Beautiful Bill Act will add around USD 590 billion per year of tax cuts and spending increases. So next year, tariff receipts – borne largely by US consumers and small businesses – would barely offset revenue lost from tax cuts that disproportionately benefit large corporations and high earners. Rather than closing the fiscal gap, this policy mix is likely to deepen the federal deficit and accelerate debt accumulation. US federal debt now stands at 123% of GDP, higher than France’s 113%, a level the markets already find troubling. Yields on 10-year US Treasuries are at 4.2%, higher than in any euro area country. This year, federal interest payments are expected to reach USD 1.2 trillion (even surpassing the US’ vast military expenditure). In short, the idea that tariffs shift the US tax burden onto foreign taxpayers, allowing domestic taxes to be cut while restoring fiscal stability, is a myth, as is the idea that tariffs can finance a modern state. Forced Fed rate cuts to reduce borrowing costs will backfire Political pressure on the Federal Reserve to slash interest rates has reached the point of attempting to fire Fed board members . Yet cutting policy rates is unlikely to reduce long-term Treasury yields because the problem is debt, not monetary policy. Markets appear complacent, cheered by the prospect of lower short-term rates, but such interference will undermine long-term confidence in the Fed’s independence and in the dollar itself – both pillars of global financial stability. Investors would demand a higher risk premium to hold US debt, which would push long-term rates even higher, an effect that a weak dollar would only magnify. Is the labour market strong or weak? We don’t know anymore July payroll data showed modest growth (73,000), pointing to a stable labour market. However, job data have become far less reliable. In August, the number of jobs added in May and June was revised sharply down (by about a quarter of a million), showing a much weaker labour market than expected. While this isn’t unprecedented and the reasons were statistical (mostly accounting for new data and seasonal effects), the head of the Bureau of Labor Statistics was immediately dismissed for ‘rigging’ the data to make the administration ‘look bad’. This has eroded the credibility of a traditionally independent source of key information. Trusted data is a vital economic asset; undermining it is lethal. But once again, the markets just shrugged it off. Free markets no more Recent US policies – spanning from tariffs, price floors , export taxes and selective (de)regulation – are increasingly encouraging politicised investment decisions. These measures, often driven by short-term gains or arbitrary priorities, have favoured sectors with strong political connections. The crypto industry, for example, has emerged as a major beneficiary of the GENIUS Act . In manufacturing, the most striking case is the partial nationalisation of Intel, where unpaid grants from the 2023 CHIPS Act were converted into equity worth USD 9 billion. This is likely to be the first of many . Whether such steps would genuinely enhance national security remains unclear but they’re hardly a textbook case of free-market capitalism. This growing departure from predictable, market-driven policy, combined with an increasingly assertive and interventionist administration, leaves companies wondering how far Washington intends to push this shift. Overall, it’s clear that the US economy isn’t defying gravity – rather it’s riding a mix of temporary cushions, policy distortions and market euphoria. Beneath the headline resilience lies an over-reliance on asset-driven consumption, politicised investment and rising fiscal risks. Gravity is unlikely to have been tamed; it may just be waiting in the wings for the right moment to reassert itself.", "wordcount": 1123}, {"source": "publication", "date": "2025-09-02T12:49:48+01:00", "title": "The Paris Agreement turns 10: is it (still) delivering on its promises?", "authors": ["Irina Kustova", "Christian Dietz", "Renske Van Hoof"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2025/09/68b596cfb73236cc8bc99984_ENSURED_4.2_public_final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-paris-agreement-turns-10-is-it-still-delivering-on-its-promises/", "excerpt": "The Paris Agreement was widely celebrated as a major success when it was agreed under the United Nations Framework Convention on Climate Change (UNFCCC) in 2015", "full_text": "", "wordcount": 321}, {"source": "commentary", "date": "2025-08-28T14:15:05", "title": "Caught between China and the US, the EU must play to its regulatory strengths", "authors": ["Ceren Ergenc"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/caught-between-china-and-the-us-the-eu-must-play-to-its-regulatory-strengths/", "page_url": "https://www.ceps.eu/caught-between-china-and-the-us-the-eu-must-play-to-its-regulatory-strengths/", "excerpt": "Mario Draghi, the former head of the ECB and author of the now infamous (at least in Brussels) Draghi report , declared during a recent speech that the EU shouldn’t just rely on being an economic regulator if it doesn’t want to be sidelined by the US and China, the world’s foremo…", "full_text": "Mario Draghi, the former head of the ECB and author of the now infamous (at least in Brussels) Draghi report , declared during a recent speech that the EU shouldn’t just rely on being an economic regulator if it doesn’t want to be sidelined by the US and China, the world’s foremost superpowers. Indeed, the EU’s summer of summits and new trade deals with China and the US yielded far less than expected. But the EU’s regulations aren’t to blame. Regulations follow markets but regulations also shape markets, and they impact who ultimately dominates said markets. And this is why the EU shouldn’t throw away its regulatory role, the so-called Brussels Effect – even today, it’s still one of the most powerful and influential tools in its arsenal. Yes, the EU should be more of an industrial power – and maintaining and preserving its regulatory heft, rather than jettisoning it, can actually help it to achieve that goal. To have and to retain real global leverage, the EU needs to reassert its power in what it’s already good at. The EU-China Summit – proof that regulatory power is still legit At the EU-China Summit on 24 July, little progress was made on major disputes, including European concerns over Chinese overcapacity and unfair competition in emerging technologies, which Beijing refused to recognise as market distortion. Ultimately, no joint statement was issued, reflecting entrenched divisions over trade imbalances, industrial overcapacity and China’s stance on Russia’s war in Ukraine. The only exception was a short, vague climate communiqué , carefully worded to avoid binding targets or new pledges. Whilst this underscored the EU’s reluctance to endorse rhetoric without concrete Chinese commitments, it nevertheless signalled that both sides still see value in presenting at least a minimal shared interest in global governance. Still, Commission President von der Leyen struck a deliberately constructive tone in the press conference, stressing that China’s industrial overcapacity stems largely from its domestic economic structure and investment-driven growth model, rather than an intentional strategy to undermine European industry. However, China’s industrial overcapacity and the consequent flooding of European markets are only the tip of the iceberg. The EU cannot outpace China quickly enough through protective tariffs or domestic re-industrialisation alone. Instead, it must focus on containing and slowing China’s advance in emerging markets by leveraging its regulatory power, since whoever sets the rules and standards for new technologies usually goes on to dominate those markets. That’s why an essential, yet silent, power struggle is being waged in the field of standard setting for emerging technologies, such as new green energy sources and critical raw materials mining and processing. Both the EU and China are trying to shape industrial production standards in a way that would protect and promote their own manufacturers. And this competition is why Draghi’s call for ditching the EU’s economic regulator role is premature. The EU’s tussle over standards with China, a key reason why the Summit can’t be celebrated as a shining success, is a prime example as to why EU leaders should be working to reinforce the ‘Brussels effect.’ Regulatory convergence – the EU’s still in the game This summer began with the (mostly) inconsequential EU-China Summit, stumbled through a lopsided EU-US trade deal , and culminated in the Alaska Summit , which outrageously shut Europe out. To add insult to injury, China, meanwhile, managed to successfully postpone US tariffs and orchestrate a potential easing of the chip war. As these tumultuous events demonstrated, Europe is nowhere near reindustrialising fast enough to be a sizable competitor in critical sectors and the US-China trade war puts the EU between a rock and a hard place. The challenge is derisking from both superpowers in the next Multiannual Financial Framework ( MFF ) period, when there’s no blanket formula for the EU due to sectoral and regional differences. However, even with a lack of industrial capacity, a long-standing commitment to regulatory frameworks is a huge advantage. The EU – unlike China – has deep experience in working with global governance institutions and wielding tools such as coalition building and norms diffusion. The Brussels effect is particularly evident with China, which has aligned with the EU’s GDPR and Deforestation Regulation. There’s also a track record of outsourcing ESG tracking to European firms in African countries rich in critical raw materials (CRMs), as European firms are globally recognised for their CRM-related services. For geostrategic tools such as the Global Gateway and new instruments like clean trade and investment partnerships ( CTIPs ), providing ESG compliance assessment for Chinese investments in partner countries is one way to mobilise the European private sector . However, such complementarities shouldn’t be taken as a given because not all EU regulations are welcome anymore in the ‘ battle of offers ’ era. CBAM and the CSDDD have been criticised for their non-inclusive and burdensome nature, even by the EU’s like-minded partners. The simplification process in this institutional cycle is a welcome response to these criticisms. More pressingly, China is expanding its role in standard-setting and compliance assessment. Thanks to initiatives such as ‘ China Standards 2035 ’, China has dominated the standard-setting processes in international organisations in many emerging fields, including telecoms and the Internet of Things (IoT). Regulate to compete The EU-China Summit and EU-US tariff deal tell us that the EU intends to keep hedging between the two superpowers – but crisis avoidance on its own isn’t a sustainable strategy. The EU must decide what role it will pursue in the China-US clash over critical technology markets. That’s because achieving strategic autonomy through complete industrial self-reliance simply isn’t possible. Nevertheless, the EU is internationally recognised for its capacity to shape rules and standards in emerging technologies, with its regulations (still) often emulated by international organisations, partner countries and even competitors like China. To remain competitive and independent from both superpowers, the EU must continue to play to its strengths and not hesitate to throw down its most powerful cards – this means leveraging its substantial regulatory expertise and institutional capacity to influence standards for newly emerging critical technologies. Using this to its advantage and baking it into how it approaches its relationship with China (and the US) would help to secure supply chains in sectors where it’s simply not competitive enough, quick enough or cost-effective enough to rebuild its industrial base. The ‘Brussels Effect’ is still a force to be reckoned with – it would be foolish for the EU to disregard it.", "wordcount": 1080}, {"source": "publication", "date": "2025-08-28T10:27:06+01:00", "title": "EU simplification will fail without better governance: three necessary reforms to make sure it doesn’t fail", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/09/Simplification-and-governance-policy-brief-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eu-simplification-will-fail-without-better-governance-three-necessary-reforms-to-make-sure-it-doesnt-fail/", "excerpt": "The EU has long been seen as a global regulatory power, exporting its standards across the world through what’s commonly known as the ‘Brussels Effect.’ However", "full_text": "", "wordcount": 252}, {"source": "commentary", "date": "2025-08-27T09:01:15", "title": "To build a successful European capital market, we need to follow the Swedish assembly instructions", "authors": ["Fredrik Andersson"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/to-build-a-successful-european-capital-market-we-need-to-follow-the-swedish-assembly-instructions/", "page_url": "https://www.ceps.eu/to-build-a-successful-european-capital-market-we-need-to-follow-the-swedish-assembly-instructions/", "excerpt": "Sweden has quietly achieved what the EU still struggles to build – booming capital markets, active retail investors, thriving SME IPOs and a pension system that channels household savings into the real economy. As Brussels deliberates, Stockholm has delivered. The current Europea…", "full_text": "Sweden has quietly achieved what the EU still struggles to build – booming capital markets, active retail investors, thriving SME IPOs and a pension system that channels household savings into the real economy. As Brussels deliberates, Stockholm has delivered. The current European Commission has launched a plan for a Savings and Investments Union , aiming to offer EU citizens better financial opportunities, higher returns and capital that innovative businesses can access more easily. It’s now time for action – and Sweden’s success offers a blueprint. A thriving IPO pipeline and engaged investors Swedish equity markets have grown steadily for decades, creating a mature risk capital ecosystem that bridges early-stage financing with scale-up pathways to main markets. What sets Sweden apart is its exceptionally high number of initial public offerings (IPO), 90% of them taking place on SME growth markets – three times more than any other EU Member State. Here, access to public markets isn’t an exception but a norm, especially for start-ups and smaller firms. This vibrant IPO pipeline is possible thanks to Sweden’s broad and engaged investor base – including retail investors, institutional investors and funds – operating in a regulatory framework designed to deliver low costs, streamline processes and facilitate participation. Sweden’s investment culture is also defined by resilience, entrepreneurship, innovation and digital readiness. This all builds on decades of investment in education and a tradition of producing highly skilled workers. But human capital alone isn’t enough – without a coherent and enabling regulatory
