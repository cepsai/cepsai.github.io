te firms to promote their registered technologies’ wide deployment and effective use. Through the prospect of enhanced profits, the EIF would also stimulate the development of additional green technologies designed to fit the EIF-Zone populations’ needs, cultures, circumstances and preferences. By thus stimulating diffusion and innovation in and for the EIF-Zone, the EIF would also expand local capacities to develop, manufacture, distribute, deploy, operate and maintain innovative green technologies, something that is sorely lacking today. Crucially, the EIF would not require unanimity. Its main funders (possibly via the Green Climate Fund or the Global Environment Facility ) could include willing European states plus China, which have greatly contributed to the global ecological crisis and have, over many decades, accumulated substantial wealth through highly polluting activities. Additional funds could come from international offset markets and eventually from a capital endowment built steadily over time from treaty-based state contributions, bequests, and donations by firms, foundations and philanthropists. The EIF shows how we can jointly build a beacon for justice and cooperation against the current dark trends that are asserting themselves throughout the international order. Fully achievable and worth achieving, the EIF sets a high standard for what multilateral cooperation can aspire to achieve. Indeed, converging around a common project like the EIF would increase our chances of success and help stem the tide of nationalist selfishness, distrust, hostility and conflict that threaten to define our age. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 779}, {"source": "commentary", "date": "2025-02-12T12:04:24", "title": "With EU renewable policy, it’s time to focus on industrial demand instead of aggressive support for supply", "authors": ["Christian Egenhofer", "Francesco Gazzoletti"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/with-eu-renewable-policy-its-time-to-focus-on-industrial-demand-instead-of-aggressive-support-for-supply/", "page_url": "https://www.ceps.eu/with-eu-renewable-policy-its-time-to-focus-on-industrial-demand-instead-of-aggressive-support-for-supply/", "excerpt": "The transition to a cost-effective net-zero economy by 2050 is essentially about electrification. Electricity is relatively easy to decarbonise – it can be produced domestically and is up to three times more efficient than combustion. As in other areas, China is leading the way ,…", "full_text": "The transition to a cost-effective net-zero economy by 2050 is essentially about electrification. Electricity is relatively easy to decarbonise – it can be produced domestically and is up to three times more efficient than combustion. As in other areas, China is leading the way , electrifying at a rate of one percentage point each year. In contrast, the EU’s electrification rate is stagnating at 23 %. The future competitiveness of EU industry sectors will critically depend on large volumes of affordable low-carbon electricity . Alas, investment in renewable energy is slowing while costs are only increasing. It’s the electricity system costs, stupid The Draghi report has identified several causes: insufficient network investment, price volatility due to a reliance on short-term markets, Member State taxes and levies and – once again – the lack of a single market. At the same time, Europe is less well endowed with solar, wind or geothermal resources than the US and China, which reverberates on cost levels, even if subsidies are left aside. This doesn’t however mean that nothing can be done. For decades, EU policy has focused on increasing renewable supply via targets and direct and indirect subsidies. EU renewable energy supply increased from around 6 % in 2006 to a remarkable 25 % in 2023. So, government-induced supply leads to oversupply. Then why are prices not coming down? Specific to the EU electricity market, with a high share of intermittent renewable energy sources such as wind and solar, is that this oversupply is not easily recognised. Numbers may suggest that on average, supply and demand are balanced. However, total systems costs tell us a different story. When electricity can’t be transported due to a lack of connectivity or other structural imbalances, it must be compensated financially. The Draghi report (page 15) states that payments associated with congestion have increased from EUR 55 million in 2021 to EUR 3.4 billion in 2022. Redispatch costs could reach EUR 50-100 billion by 2040. This would translate into up to 310 TWh of renewable generation by 2040 to be ‘curtailed’, i.e. installations that are temporarily shut down, which is roughly the equivalent of today’s total wind production. This would be more than 11 % of today’s total EU generation. Reasons why include grid constraints and the increasing occurrence of negative prices, which happens when all wind turbines and solar panels are generating at the same time. Breaking the vicious cycle – it’s time to turn the focus to demand The EU’s focus on subsidising supply and associated system costs means higher prices. To electrify, industry will require some form of additional subsidies. The situation is made worse by the fact that a combination of curtailing, negative prices, and low and increasingly uncertain industrial demand undermines the investment case for generators. Which means that investment is slowing. To break this vicious cycle, we propose to establish a link between supply and industrial demand. This will bring industry back onto the path to electrification. The scale is sizable. AGORA estimates that electrifying industry would create additional demand of between 1 600 and almost 4 000 TWh by 2035, easily accommodating new supply. How would it work? Subsidies would be temporarily required before costs come down through technology learning. Subsidies, however, will have to be targeted. Aid will be needed to bridge the gap between the cost of natural gas plus the carbon cost of the EU ETS on the one hand, and the cost of electricity, plus the cost of the investment needed to electrify heat production (a ‘hot swap’), on the other. In short, the higher the ETS price, the lower the subsidy. That’s why it would be useful to differentiate between industries and processes, i.e. different ‘types of heat’, which have different needs for subsidies, going down over time. Finally, projects and associated subsidies would be auctioned, guaranteeing that the most cost-effective solutions are chosen and existing supports systems (for example, from Member States) would be compatible and could be retained. For this to happen, it will require a system of carbon contracts for difference (CCfDs). They protect an installation, e.g. green steel or green chemicals from input price risk, e.g. electricity or hydrogen. Then the government guarantees an agreed price. If the market price is too high, the government then covers the difference. If the market price is lower, the company must pay the government. Ideally, CCfDs are applied EU-wide to avoid any further fragmentation of the single market. The obvious instrument is the EU Innovation Fund , which already applies this model. But additional funding will be required. This doesn’t necessarily have to come from EU sources – Member States could step in. The Innovation Fund has been purposely designed as a platform for Member States to use, with Germany already having used it. Alternatively, Member States could auction their own CCfDs, Germany again having done so. The disadvantage here though is that national auctions require state aid clearance. The bidder could bid based on the price EUR/tonne CO 2 avoided or in EUR/tonne as has also been suggested. Both have their strong points but the choice isn’t fundamental. Essential however is how the electricity is sourced. This can either be done through a long-term Power Purchasing Agreement (PPA) , a direct contract for example between an industrial installation and a wind park or the grid, provided the grid itself is already low-carbon. In both cases, the contracted price of electricity under the PPA would thus become an integral part of the bidding strategy. The long-term PPA ‘guaranteed’ by the CCfD provides certainty both to industry and the decarbonised power generator at project level. Both the generator and the industry will have an incentive to offer the lowest possible price to win the bid. Certainty all around – and politically possible The proposed shift to a focus on industrial demand will create certainty for both industry and the electricity generator, notably at project and therefore at investment level. Thus, it’s the best insurance against the risk of spiralling electricity systems cost and ultimately it will help to lower electricity prices for industry, businesses and consumers. It will also help to identify grid constrains and facilitate new investment. Of course, this shift must be part of a broader toolbox, including infrastructure development, EU competition rules, completing the internal energy market, de-risking and reinforcing EU coordination. Politically, it could work because it leaves flexibility to the EU and Member States when it comes to subsidies that both are politically desirable and affordable. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1135}, {"source": "commentary", "date": "2025-02-11T15:38:41", "title": "Pardon my ethics – why we need to rethink ethical oversight in the EU", "authors": ["Julia Pocze"], "topics": ["Human Rights & Justice"], "units": ["Justice & Home Affairs"], "types": [], "link": "https://www.ceps.eu/pardon-my-ethics-why-we-need-to-rethink-ethical-oversight-in-the-eu/", "page_url": "https://www.ceps.eu/pardon-my-ethics-why-we-need-to-rethink-ethical-oversight-in-the-eu/", "excerpt": "It’s a common misconception that institutional ‘ethics’ is a question of morality. Believing that ethical misconduct – such as conflicts of interest – is a ‘necessary’ trade-off inherent to a functioning political system is just as misguided. The reason why we need to urge a swee…", "full_text": "It’s a common misconception that institutional ‘ethics’ is a question of morality. Believing that ethical misconduct – such as conflicts of interest – is a ‘necessary’ trade-off inherent to a functioning political system is just as misguided. The reason why we need to urge a sweeping reform of ethical oversight isn’t because of some moral high ground but because the lack of accountability at the political level chips away at the democratic power that’s supposed to rest with the people. So, you think you live in a democracy Unlike inherently subjective morality, the democratic rule of law offers an objective basis for stricter ethical rules for EU decision-makers. A rule of law-based system presupposes that lawmakers, government officials and the entire public administration , which exercise decision-making authority on behalf of the people, are all public servants . Democracy is a fragile thing that can go awry easily, especially when those in the driver’s seat fail to represent the public’s interests and only pursue their own. Without accountability, political figures evade their responsibility of public service, disrupting the rule of law’s delicate equilibrium. Strict, enforceable ethical rules can deliver more accountability. They not only keep those with power in line but reinforces the fundamental principle that the people are a check on sovereign authority. Trust me, I’m a politician! Though there are accountability mechanisms in place for the EU’s institutional members – MEPs, Commissioners and the like – oversight is done by multiple, largely non-independent players. This creates an extremely complicated, inefficient ‘patchwork’ that lacks centralised and uniform enforcement. There’s quite a selection of recent scandals in the EU institutions to sample, all of them showcasing public servants as pursuing their own self-interests, blatantly disregarding ethical rules and dodging accountability. From the biggest foreign ‘cash-for-influence’ affair in recent memory, through illicit text messages about multi-billion euro vaccine deals, severe conflicts of interests and innovative lottery-based corruption , we’ve had it all. Responding to calls for better ethical oversight, the Commission unveiled a new inter-institutional ethics body – having the blessing of all institutions except the Council’s – which will be supported by experts and develop ‘recommended’ but not mandatory common standards. This solution, however, is not a winner , as non-binding recommendations simply won’t be enforced or uniformly implemented and it won’t have the power to sanction violations. With one more player on a crowded field, the issue of fragmentation will remain, alongside a lack of serious consequences for ethics violations. Bark AND bite – the case for a new watchdog Any new blueprint needs that one thing we don’t have much of – political will. But not pushing for change and accountability is worse because complacency means relinquishing popular democratic power. That’s why the EU leadership’s must see through the chaos and reorganise the oversight team around three players: the European Public Prosecutor’s Office (EPPO) , the Court of Justice (CJEU) and a shiny new addition to the line-up, namely a structurally independent ethics authority. Essentially, this ethics authority would integrate current players like the European Commission’s anti-fraud body (OLAF) , the different institutions’ various internal enforcement units and ethics committees, as well as the expert-led structure of the ethics body. As the authority would resemble a beefed-up version of the Ombudsman’s Office , it should be helmed by the Ombudsman . Such an arrangement would bring together all rulemaking, investigative, executive and sanctioning functions under one roof, allowing for streamlined, coherent cooperation while maintaining a clear division of labour. Beyond unifying entities, the authority should be given considerable power. It must be fully independent from the other EU institutions. It should have the competence to develop common, uniform and – most importantly – binding ethical rules, including mandatory guidelines for selecting high-ranking political appointees and advisors. In the same vein, the authority should also oversee lobbying activities, including maintenance of the Transparency Register and harmonising interest representation rules for the Commission, the Parliament and the Council – with the inclusion of Permanent Representatives in the latter. Bolstering integrity requires stringent disclosure rules: for all institutional members, the comprehensive reporting of financial interests, detailed meeting records and public declarations of conflicts of interest should be obligatory. At the same time, remunerated activities outside the institutions, alongside gifts or other monetary contributions from external actors, must be banned for all members. Through its investigative competences, the authority would follow up on allegations of ethical and financial misconduct. By centralising the currently fragmented enforcement mechanism, consistency in ethical oversight across all institutions would then become a real possibility. Violations – including fraud, maladministration or other breaches – would be proportionately sanctioned by the authority, with the possibility of being heard by the General Court. For cases where there’s suspicion of criminal misconduct would be referred to the EPPO and subsequently, the CJEU. The EPPO should maintain its authority to investigate EU budget abuses by the Member States. Fit for Article 2 The easiest way to shut down any proposal for change is by either claiming that there’s no legal basis in the Treaties or by referring to a chronic lack of political will. Concerning the first – while there isn’t an explicit Treaty provision outlining such an arrangement, neither is there one for the current lame duck ethics body. Yet the Commission has been very creative about finding the legal basis for a raft of draft legislation, provided there was significant political momentum . There’s always the possibility to conclude an agreement between the various institutions of Article 13(1) TEU to deliver on other Treaty obligations. Here, they have the biggest obligation of all to fall back on – Article 2 TEU. In the most fundamental ways, the EU is bound by the requirement to establish a system based on the democratic rule of law, pursue policies to advance it and, as the TEU declares, enhance the ‘democratic and efficient functioning of the institutions’. Thus, delivering democratic accountability wouldn’t just be a courtesy – it would be enforcing Article 2 and the most basic principles of EU integration. Some legal creativity, based on Article 2 and its manifestations across the Treaties, and the Charter of Fundamental Rights, plus some meaningful commitment, would equal a degree of institutional accountability that is beyond reproach . As for the second counterargument? It’s self-evident that people who benefit from a relaxed ethics regime without tangible consequences would not back a reform that would make their lives more difficult. But this is where democracy makes its entrance. If public servants shy away from being held accountable by the public, citizens can demand better administration , force their hand and ‘encourage’ a more open-minded approach to better ethics. Insisting on accountability is the only way to remind the political level that they must listen to the citizens they serve. And to demand political action from representatives, we, the people, also need to find the political will within us. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1201}, {"source": "commentary", "date": "2025-02-11T10:26:46", "title": "Europe needs a revolutionary digital platform to spearhead its Innovation Renaissance", "authors": ["Guus Keder"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/europe-needs-a-revolutionary-digital-platform-to-spearhead-its-innovation-renaissance/", "page_url": "https://www.ceps.eu/europe-needs-a-revolutionary-digital-platform-to-spearhead-its-innovation-renaissance/", "excerpt": "As Europe stands at a critical crossroads, the stakes couldn’t be higher. Our research paints a stark picture – without decisive action, Europe faces a staggering EUR 40 trillion wealth gap with the US by 2032. The recent Draghi and Letta reports underscore this urgency. The time…", "full_text": "As Europe stands at a critical crossroads, the stakes couldn’t be higher. Our research paints a stark picture – without decisive action, Europe faces a staggering EUR 40 trillion wealth gap with the US by 2032. The recent Draghi and Letta reports underscore this urgency. The time has truly come for Europe to reimagine its approach to innovation. At the core of this transformation lies what we call the ‘ Innovation Iceberg ’ While investors traditionally chase visible, mature technologies that can be easily and quickly commercialised, Europe’s true strategic opportunity lies beneath the surface, in early-stage breakthroughs developed through its vast academic and research efforts. Alas, these often remain hidden from view and struggle for support and attention. As Europe’s strategic sovereignty fully depends on unlocking this opportunity , it thus needs to be coordinated by a consortium consisting of decision makers at the highest levels of the European Commission and leading corporations in Europe. To harness this potential, we need a revolutionary digital platform that identifies all participants in the innovation ecosystem and that maps and coordinates both the visible and invisible parts of the iceberg. This will empower all these participants and democratise converting innovation into commercial ventures across the continent. ‘The Platform‘ will allow us to coordinate and empower all participants in the ecosystem – ventures, entrepreneurs, talent, experts (advisors and mentors), business angels, venture capitalists, government agencies, expert organisations and corporations. Using smart algorithms and AI, we can then match all participants in real-time, removing all time-slack from the ecosystem. By digitally collecting relevant data from all participants in the ecosystem, we can create a very large, validated and certified dataset which is a perfect foundation for using advanced AI, which will benefit all participants, starting from the policymaking level all the way down to ventures and the people that create and build these ventures. The Platform will provide policymakers with real-time data to steer, optimise and drive European industrial policy. With the methodologies we’ve developed for The Platform, we’ll be able to identify the most promising innovations and the best performing actors, with resources then being allocated in ways previously thought unimaginable. Think of it as a digital marketplace where ventures can instantly access resources, thus eliminating the bureaucratic delays that often strangle innovation. By establishing a secure, unified environment with validated data, it would also strengthen Europe’s digital sovereignty. But technology alone isn’t enough. Europe faces a EUR 100 billion annual investment gap with the US, largely due to structural differences in our pension systems . Our research has shown that there is a strong correlation between the total amount of pension fund assets and venture capital investments in a region. Since Europe’s pension systems are mostly based on cash-in cash-out and forego having pension funds in between, Europe has around seven times fewer funds available to be invested in venture capital than the US. Pension system reform will take decades at best, so the solution for Europe is not to match American venture capital investments – it‘s to invest smarter. This calls for a European Resource Investment Pool, a revolutionary approach to deploying capital and strategic resources across the continent using advanced smart decision-making methodologies. This wouldn’t be just another investment fund. Rather, it would serve as Europe’s first true sovereign wealth facility, using data-driven decision-making to ensure optimal allocation of resources. Most crucially, it would support early-stage innovations before they become visible to traditional investors, filling a critical gap in our innovation ecosystem. European industry leaders understand these challenges intimately. They witness daily how fragmented approaches and bureaucratic hurdles impede innovation, while their global competitors surge ahead. Their practical experience in navigating complex international markets makes them uniquely qualified to guide this transformation. We need their active involvement, not just in implementation but also to champion these necessary changes at the highest political levels. The framework’s governance structure would be designed to guarantee long-term viability while preserving European values and sovereignty. Independent oversight would ensure impartial resource allocation, while balanced representation from public and private stakeholders would maintain accountability. Clear metrics would measure innovation impact and success, ensuring that the wealth created from innovation is fairly distributed across society. This approach would be particularly powerful for complex industries like defence and security, where multidisciplinary collaboration is essential. By breaking down silos and building new alliances, we can reduce bureaucratic barriers while maintaining the highest standards of security and governance. Implementing this framework would mark the beginning of a true European Renaissance in Innovation. By democratising access to innovation acceleration and managing resources more intelligently, we can secure Europe’s position as a global leader in technological advancement while ensuring the benefits are broadly shared across our society. Europe’s industrial leaders have a crucial role to play in catalysing this transformation. Their collective voice, representing millions of employees and billions in investment, can help build the necessary political momentum. Their practical experience in driving innovation can inform policy decisions and ensure that frameworks are ambitious but also implementable. The wealth gap projections tell us we’re running out of time. Europe must act now to unleash its innovation potential or risk being left behind in the global race for technological supremacy. This isn’t just about economic competition – it’s about securing Europe’s place in shaping the future of human progress. Our proposals for an innovative digital platform and a European Resource Investment Pool offer a concrete path forward, turning future disruption into transformative processes that have a positive societal impact. Through coordinated investment in strategic technologies and sectors, we can build a more resilient and prosperous Europe. The foundation is laid. The framework is clear. What we need now is a coalition of industrial leaders to join forces with policymakers to make this vision a reality. The time for incremental changes has passed. Europe needs bold, decisive action to spark its innovation renaissance. Our future prosperity – and our children‘s prosperity – depends on the choices we make today. Let’s seize this moment to reshape Europe’s destiny – with European industry leading the way. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1060}, {"source": "commentary", "date": "2025-02-10T16:30:39", "title": "Europe’s hidden AI champions are vital in its quest to becoming a global tech leader", "authors": ["Robert Praas", "Pierre-Alexandre Balland"], "topics": ["AI, Digitalisation & Innovation", "Data Science"], "units": ["Data Science"], "types": [], "link": "https://www.ceps.eu/europes-hidden-ai-champions-are-vital-in-its-quest-to-becoming-a-global-tech-leader/", "page_url": "https://www.ceps.eu/europes-hidden-ai-champions-are-vital-in-its-quest-to-becoming-a-global-tech-leader/", "excerpt": "Zooming out from the buzz around DeepSeek , it’s clear the AI game is rapidly changing. The usual big tech players no longer have the playing field to themselves. During the last few weeks, a wave of impressive, mostly open-source AI models have hit the scene, many created by sma…", "full_text": "Zooming out from the buzz around DeepSeek , it’s clear the AI game is rapidly changing. The usual big tech players no longer have the playing field to themselves. During the last few weeks, a wave of impressive, mostly open-source AI models have hit the scene, many created by smaller, scrappier companies outside the traditional Silicon Valley giants. In short, the AI landscape is no longer just about who has the most money or the biggest data centres – it’s about who can innovate smarter, faster and achieve more with less. This week, Paris will host key players in AI governance for the AI Action Summit – a high-profile event to drive sustainable, collective progress . And Europe may have stronger cards to play than it realises. This summit isn’t just about setting rules – it’s an opportunity for Europe to show it can lead in innovation and not just regulation. Take Mistral AI , by many regarded as the European champion in large language models . It quietly released a new open model last week – and almost no one noticed, not even in Europe. That’s surprising, given that they’ve carved out a smart niche, namely a model that’s both affordable and impressively fast. But this isn’t the first time Mistral has been overlooked. Last year, they launched cutting-edge open weights , ready for others to build on, yet the spotlight stayed fixed on the big proprietary players or the open-source Chinese mavericks. It’s a familiar story: Europe can and does produce innovative tech but the world keeps looking elsewhere. Mistral’s latest model, Mistral Small 3, is built for speed, privacy and reliability. Instead of chasing massive datasets, they kept the training process simple, focusing on smaller but higher-quality data to reduce unwanted biases. For anyone looking for AI that’s genuinely useful and trustworthy, this is a big deal. The old playbook of throwing more data and computation at the problem is becoming old-fashioned. The real challenge now is making algorithms do what humans actually want them to do – which is a whole new ballgame. Before the Action Summit, Europe’s AI players may not have been grabbing headlines, but it is tackling the problems that really matter. Yes, it’s true – where DeepSeek went viral by offering an instant, on-the-go chat experience, Mistral didn’t even have an app until last week . And yes, that has been a major limitation. But while others race to slash prices and flood the market with chatbots, European developers are taking a different path, focusing on solving deeper, more specialised problems beyond casual chatting. The irony? Even Europeans themselves often fail to recognise this shift, instead calling for more competitiveness , as if its growing specialisation in AI isn’t a strength in its own right. And this has major implications for EU AI development policy. A new narrative has emerged with DeepSeek’s claim of using fewer resources to train powerful AI, sparking hope that the EU could finally catch up in the global AI race. But it’s not that straightforward. While DeepSeek is a resourceful player, so is Mistral AI, showing that significant efforts are still required – but also that success is within reach. France is now doubling down on this with EUR 109 billion worth of private investment in the French AI sector. If anything, this highlights the potential of building ecosystems like the one now taking shape in Paris, where collaboration and focus can drive truly meaningful innovation . There’s no shortage of success stories in European AI, even if they often fly under the radar. Take Germany’s Black Forest Labs , which produces some of the best image generators in the world – though many EU AI experts have never heard of them. Or DeepL , which consistently outperforms competitors in AI translation. These are world-class achievements! Are they being celebrated? Not really, for sure not enough. The problem isn’t just that Europe focuses on specialised applications; it’s that even when it excels, it’s dismissed as ‘not good enough.’ It’s a classic case of missing the forest for the trees – though, in this case, it’s hard to see the forest if you don’t even know where to look for the trees. Europe’s AI ecosystem is growing but it’s still waiting for its moment in the sun. The EU bottle lid meme , or the saying ‘The US innovates, China replicates, Europe regulates’ could soon be a part of history, yet European leaders do little to make this happen. What’s needed is thus a mindset shift. Champion our champions, just like the US and China do. We are so dying to be competitive that we forget we already are in many domains. With more compute, skills, investment in an open source EuroStack and favourable policies aimed at nurturing an ecosystem of excellence throughout the continent (and certainly including the UK), Europe can take the leap. Our research is increasingly showing that this is possible and the debate on the upcoming MFF cannot ignore the need for a large-scale initiative on AI. These initiatives can’t immediately close the significant funding gap with US startups. They are, however, much more productive than the false dichotomy that regulating the technology with the AI Act means sacrificing innovation. Case in point: in October last year, the European Parliament awarded a major contract to an American generative AI company ( Anthropic ) to improve access to archive information – a job a European company could have done just as well. Can you imagine the US or China outsourcing such a delicate contract like that? The recently evoked European preference in the procurement of strategic sectors and technologies, mentioned in the recently-announced Competitiveness Compass , is thus a step in the right direction. However, much more will be needed for Europe to develop a leading role in AI development. We have the innovative companies to support and showcase – we just need to do it.", "wordcount": 991}, {"source": "commentary", "date": "2025-02-10T11:14:15", "title": "It’s finally time to leverage pension funds to foster EU productivity and benefit pensioners", "authors": ["J. Scott Marcus"], "topics": ["Internal Market Industry Entrepreneurship And Smes"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/its-finally-time-to-leverage-pension-funds-to-foster-eu-productivity-and-benefit-pensioners/", "page_url": "https://www.ceps.eu/its-finally-time-to-leverage-pension-funds-to-foster-eu-productivity-and-benefit-pensioners/", "excerpt": "Why does the EU fail to produce its own Google, Amazon or Facebook? Is Europe lacking entrepreneurship, technical savvy or simply imagination? Contrary to what many think, in every year for the past five years, the EU has created more high-tech start-ups than the US; however, man…", "full_text": "Why does the EU fail to produce its own Google, Amazon or Facebook? Is Europe lacking entrepreneurship, technical savvy or simply imagination? Contrary to what many think, in every year for the past five years, the EU has created more high-tech start-ups than the US; however, many European start-up firms whither on the vine due to a lack of finance. Yet a simple solution has been lying in plain sight for decades – we simply need to grasp it. The answer, as with a great many questions, is money . Europe’s timidness on display A root cause is that Europeans are timid investors and many of us lack the financial sophistication to invest sensibly. In the EU, 31 % of household savings remain in currency or deposits , versus 12 % in the US, leaving less scope for households to invest in stocks and bonds. Largely as a result, and relative to GDP, the EU has twice as much money in its banks as the US and only half as much in capital markets for stocks. The same goes for bonds. This is problematic for innovation. EU firms get some 80 % of their finance from bank loans – clearly, not the way to finance risky start-ups that typically have no established track record of earnings and whose assets are largely intangible and thus unsuitable to serve as collateral. When we look at finance for start-up firms, the situation is even worse. The US has 20 times as much venture capital as the EU – EUR 1.3 trillion, compared to a paltry EUR 72 billion. Firms seeking pre-IPO funding obtain on average only a fifth as much venture capital or only a twentieth as much private equity funding as their US counterparts. The European institutions have been wringing their hands for years and will occasionally find a way to pump one or two billion euros into funding start-ups. This is all well and good but it’s totally out of scale for the magnitude of the problem. How did the US do it? Overlooked in all of this is an understanding of how the US achieved its Silicon Valley. Brilliant, entrepreneurial technologists surely played a role, as did US government funding for research, but a key development was a little-noticed change in the US regulation of pension funds. Until ERISA was enacted in 1974, pension funds were generally restricted to relatively safe investments. ERISA changed this by recognising that a ‘prudent person’ would typically want a portfolio reflecting a mix that included some riskier instruments. This unleashed a growing flood of pension fund money into venture capital funds. Without this, Silicon Valley as we know it now would have been unthinkable. The EU today is in much the same position as the pre-ERISA US – and this is a key reason why a ‘European Silicon Valley’ isn’t going to happen anytime soon. But it needn’t be this way. EU pension funds hold assets of some EUR 4 trillion, while insurance (where some of the plans are pension-like) has assets of about EUR 9 trillion. Pension funds invest billions into venture capital each year but this seemingly large investment is peanuts – what they invest per year is less than one one-hundredth of 1 % of their assets. There’s no shortage of promising EU firms to invest in – the EU indeed generates more start-ups than the US per year and the return on venture capital investments is running about 6 % higher in the EU. Venture capital offers high returns, some 29 % on average, with surprisingly low volatility. Clear and straightforward measures needed It would be natural to react by saying that pension funds shouldn’t put future pensioners at risk but this misses the point. Any investment advisor would tell any firm or any family that a portfolio should be diversified with a mix of risk-return profiles that align with one’s investment goals. The pension funds understand this, and most would like to be freed from overly restrictive Member State investment rules. And a twenty-fold increase in pension funds’ current investments would roughly triple the total annual contribution to venture capital in the EU but would still represent less than two-tenths of a percentage point of pension funds’ assets. The risk would thus be negligible, but this would be a big enough cash infusion to have a real impact! The same logic holds for future pensioners – a balanced portfolio with a mix of instruments would tend to benefit them, especially those further away from retirement. One might perhaps worry about those closest to retirement age, but simple rules or guidelines might discourage or prevent them from investing unwisely in high-risk instruments. The ongoing shift in Europe from defined benefits pension schemes to defined contribution ones (where the amount paid out reflects the performance of investments), coupled with a shift away from so-called Pay as You Go (PAYG) schemes, lends itself to plans where future pensioners could steer their investments to reflect their individual risk sensitivities and investment needs. In sum, the benefits that these changes could lead to for pension funds and insurance, for future pensioners, and for EU tech start-ups are clear, and this has been recognised in both the Draghi report and in the Commission’s just-released Competitiveness Compass . The measures that would be needed to put all this in place are likewise clear. To enable insurance funds that want to invest a prudent portion of their assets into venture capital or private equity, changes to SOLVENCY II to offer greater flexibility and to revise overly conservative reserve requirements for these relatively modest investments would need to happen. For occupational funds, the IORPS Directive puts few constraints on pension fund investments – changes would likely be needed in Member State law but only in the Member States where pension funds have assets available for investment (thus not in those with pay-as-you-go (PAYG) pension funds). Changes would probably not be needed in the handful of Member States whose laws already provide occupational pension funds with investment flexibility. Additional measures could facilitate the pooling of these investments across multiple funds to reduce investment overhead. Once effective laws are in place that permit greater flexibility, the normal economic incentives of the funds would motivate them to gradual shift funds where they can do the most good – no additional measures should be necessary. Of course, the biggest barriers to enacting this kind of change have historically been European conservatism, a lack of political will and a lack of audacity. With the new EU’s new focus on enhancing productivity, the time is now finally right to make these changes. This CEPS Expert Commentary is part of a special series being published prior to the CEPS Ideas Lab on 3-4 March 2025 to showcase some of the most innovative ideas we’ll be rigorously debating with our participants. More info can be found on the official Ideas Lab 2025 website .", "wordcount": 1158}, {"source": "publication", "date": "2025-02-06T11:50:08+01:00", "title": "Scoping paper on HERA’s engagement with low- and middle-income countries", "authors": ["Hien Vu", "Marta Dell’Aquila"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/02/DM_Edit_A4.1.1.-HERAs-engagement-with-LMICs-FORMATTED.pdf", "page_url": "https://www.ceps.eu/ceps-publications/scoping-paper-on-heras-engagement-with-low-and-middle-income-countries/", "excerpt": "The Health Emergency Preparedness and Response Authority (HERA), established in 2021, aims to strengthen the EU’s response to Covid-19 and potential future heal", "full_text": "", "wordcount": 229}, {"source": "publication", "date": "2025-02-03T14:05:14+01:00", "title": "ECMI Statistical Package 2024", "authors": ["Apostolos Thomadakis", "Leonardo Trevisan"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/02/ECMI-Stat-Pack-2024-Key-findings.pdf", "page_url": "https://www.ceps.eu/ceps-publications/ecmi-statistical-package-2024/", "excerpt": "The ECMI Statistical Package presents a comprehensive collection of the most relevant data on various segments of European and global capital markets. It enable", "full_text": "", "wordcount": 563}, {"source": "commentary", "date": "2025-01-31T12:47:34", "title": "Europe is taking a pragmatic approach to Syria. Its origins lie in Kabul", "authors": ["Loqman Radpey"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/europe-is-taking-a-pragmatic-approach-to-syria-its-origins-lie-in-kabul/", "page_url": "https://www.ceps.eu/europe-is-taking-a-pragmatic-approach-to-syria-its-origins-lie-in-kabul/", "excerpt": "Europe’s engagement with the new Syrian leadership has been notably swift, yet it still refuses to recognise the Taliban. On 19 December 2024, the European Council issued guidelines for recognising Syria’s transitional government, tying it to respect for ‘human rights, including …", "full_text": "Europe’s engagement with the new Syrian leadership has been notably swift, yet it still refuses to recognise the Taliban. On 19 December 2024, the European Council issued guidelines for recognising Syria’s transitional government, tying it to respect for ‘human rights, including women’s rights, non-sectarian governance, and the protection of members of religious and ethnic minorities.’ On 4 January 2025, the German and French foreign ministers visited Damascus, less than a month after Bashar Assad’s fall . Europe’s differing approaches to Syria’s new governing authority and the Taliban clearly shows the complexity of modern diplomacy and the intricate geopolitical and ideological factors driving Europe’s Middle East foreign policy decisions. Of course, Europe currently hosts millions of Syrian refugees , many of them having fled the violence and extremism that flourished during the civil war. With continuing pressures on European governments – ranging from housing to social integration – the prospect that these refugees might soon return to a stable Syria is an alluring incentive for Europe to positively engage with Damascus and support its transition. But by proactively helping Syria (and doing its best to avoid the mistakes it made with Afghanistan), Europe would also be doing itself a huge favour, by alleviating social strains in hosting EU countries, taking away some of Russia’s influence in the region and contributing to long-term security in the Middle East. A tale of two regimes The Taliban’s 2021 return to power in Afghanistan unfolded amid a chaotic US withdrawal , a debacle that fully exposed the West’s strategic missteps. Despite initially promising to be moderate, the Taliban quickly reversed course, severely restricting women’s rights and education. This solidified their pariah status in the West’s eyes. In stark contrast, Syria’s interim government has meticulously cultivated an image of pragmatism and reform. By disavowing extremist ties, embracing inclusive rhetoric and committing to women’s education, they have sought to distance themselves from the failures and radicalism associated with Assad and from competing Islamist movements. The recently installed regime consists of Hay’at Tahrir al-Sham (HTS) and the Syrian National Army (SNA), both backed by Turkey . HTS, a rebranded faction with roots in al-Qaeda and ISIS, has been framed as a pragmatic option due to the absence of ‘viable’ alternatives. However, extremist alliances rarely lead to democratic outcomes and the EU, the UK, the UN and other influential states still designate HTS a terrorist group. The transitional leadership has demonstrated that it’s particularly PR-savvy, strategically positioning itself as a partner for stability. The de facto leader, Mohammad al-Shaara – better known as the jihadist Abu Mohammed al-Julani, who doesn’t have a US bounty on his head anymore – tidied up his physical appearance up for the role, is quite photogenic and has made himself easily accessible to journalists. Unlike the Taliban’s austere and isolationist image, the Syrian authorities have embraced media accessibility and modern optics. Their polished appearance and promises of inclusivity offer a stark contrast to the Taliban. In a region where public perception often dictates policy decisions, this tactic has paid off handsomely. The geopolitical landscape also goes a long way to explaining Europe’s differential treatment. Assad’s rule – a long-time Russian ally – became an extension of Moscow’s influence in the Middle East. With Assad gone, Europe has seen an opportunity to weaken Russia’s foothold there. Similarly, Iran’s diminished influence in post-Assad Syria aligns with the European and American strategic goal of countering Tehran’s regional ambitions. By engaging with Syria’s new government, Europe is signalling a shift in how it’s fostering alliances to curb authoritarian and anti-Western forces. Enter the Kurds… The Kurds, as victims of the Assad regime’s policies of Arabisation and suppression, have demonstrated their true character. Since 2012, the Kurdish-led administration known as Rojava Kurdistan has established a model of pluralistic democracy, offering refuge to many ethnic and religious groups. The Kurds’ contributions against terrorism, marked by over 12 000 fatalities and 15 000 injuries, have earned them recognition as a reliable Western ally. Yet the SNA has been actively fighting Kurdish-led Syrian Democratic Forces – comprising the YPG and YPJ – since last December, with the aim to erode Kurdish control of over a third of Syria’s territory. Despite this, European diplomats have emphasised their commitment to safeguarding their Kurdish partners’ autonomy, framing it as a bulwark against terrorism. And with their democratic credentials, the Kurds don’t require any assessment or testing, unlike the interim regime in Damascus. Europe’s experience with the southern Kurdistan Regional Government in Iraq is a great example of successful collaboration, showcasing the potential for productive partnerships with the Kurds. … and the Islamist element Europe’s engagement is also being driven by pragmatic concerns over Islamism . Curbing the spread of radical Islamism is an increasingly urgent concern for both Europe and the broader region. A Syria that embraces moderate political reforms, inclusive governance and a clear commitment to combatting terrorism offers an opportunity not only to alleviate Europe’s refugee burden but also to reduce the risk of Islamist movements gaining further traction within Syria or spilling over into neighbouring countries – and then possibly Europe. Syria’s interim authority emphasising religious and ethnic coexistence is also appealing for European policymakers. Of course, this isn’t the case with the Taliban’s Sunni-dominated government, its repression of Afghanistan’s women, their right to education and its mistreatment of minorities. Syria’s new leadership, however, has positioned itself as a guardian of diversity , advocating for tolerance in a region often defined by sectarian strife. Yet there are still reports of minorities like Christians and Alawites being suppressed and their houses looted by HTS factions and the SNA. A nuanced strategy Europe’s Syria stance reflects a calculated effort to balance moral imperatives with geopolitical realities. Unlike how it dealt with the Taliban, Europe is extending an olive branch to Damascus. This nuanced strategy underscores the interplay between values, geopolitics and the imperatives of realpolitik in shaping foreign policy. European policymakers aim to guide Syria’s transitional government as they pursue recognition by promoting ‘a peaceful and urgent transition in the service of Syrians and for regional stability,’ as French foreign minister Jean-Noël Barrot stated , while warning them that Europe ‘will not fund new Islamist structures,’ as declared by his German equivalent, Annalena Baerbock. By extending cautious support to Damascus, Europe hopes, ‘ without naivety ’, to leverage the lessons learned and pre-empt the mistakes made in handling the Taliban’s return. We’ll no doubt discover over the coming months whether it’s truly ‘second time lucky’ for Europe. Dr Loqman Radpey is a Middle East Forum fellow , and is the author of ‘ Towards an Independent Kurdistan: Self-Determination in International Law ’ (published by Routledge in 2023), which offers a Middle Eastern perspective on the right of self-determination.", "wordcount": 1124}, {"source": "commentary", "date": "2025-01-30T14:14:47", "title": "Get over the DeepSeek Panic – it might actually be a good thing", "authors": ["Robert Praas", "Pierre-Alexandre Balland"], "topics": ["AI, Digitalisation & Innovation", "Data Science"], "units": ["Data Science"], "types": [], "link": "https://www.ceps.eu/get-over-the-deepseek-panic-it-might-actually-be-a-good-thing/", "page_url": "https://www.ceps.eu/get-over-the-deepseek-panic-it-might-actually-be-a-good-thing/", "excerpt": "The release of the freely available and surprisingly capable language model DeepSeek R-1 shocked the world, made it question the growing demand for computer chips and led the mighty NASDAQ to dive on Monday. Here’s a Chinese open-source project matching OpenAI’s capabilities – so…", "full_text": "The release of the freely available and surprisingly capable language model DeepSeek R-1 shocked the world, made it question the growing demand for computer chips and led the mighty NASDAQ to dive on Monday. Here’s a Chinese open-source project matching OpenAI’s capabilities – something we were told wouldn’t happen for years – and at a fraction of the cost. The panic revealed more about our assumptions about AI than about the model itself. Let’s be clear about what’s actually happening. For years, we assumed that making an AI breakthrough required three things – massive data centres, billions in funding and Silicon Valley zip codes. DeepSeek just flagrantly challenged that narrative, championing efficiency by using seemingly less money and less computing power, whilst staying competitive regardless of existing chip import restrictions . The timing is particularly interesting. President Trump just announced the USD 500 billion Stargate project to dominate AI infrastructure and then – all of a sudden – this open-source model gains incredible momentum and essentially says ‘ hey, we can play this game too – and we’re going to’ . The new US administration now realises that their ‘China problem’ is much bigger than TikTok. To make matters worse, both Bytedance and Alibaba have also released competing models to DeepSeek over the past few days. The irony wouldn’t be lost on those in Team Europe looking up and believing that the AI race was lost long ago. But let’s not get carried away with the ‘China is winning’ narrative. The reality is more nuanced and, frankly, more interesting. What we’re seeing isn’t so much a shifting of power as a democratisation of AI capabilities . China has developed impressive AI talent pools, with researchers as well-trained as their American counterparts. And R-1 uses 700B parameters and significant computing power – this isn’t exactly AI on a shoestring budget. But it does demonstrate that the barriers to entry are lower than we previously thought. R-1 is an example of so-called reasoning language models. These are trained to spend more time processing information, which has already led to successful results in maths and coding. As this progress is predicted to generalise to other problem areas, it’s another milestone towards more productivity across the board. The real story here isn’t about national competition – it’s demonstrating that open-source AI has filled the gap with proprietary models . Just as Linux eventually became the internet’s backbone, open-source AI models are becoming the foundation of our AI future. Not necessarily because they perform better but because they are more accessible and anyone can improve them. An excellent example of this is the foundation created by Meta’s LLaMa-2 model, which inspired French AI company Mistral to pioneer the algorithmic structure called Mixture-of-Experts , which is exactly the approach DeepSeek just improved. Bear in mind, reactions would have been very different if the same innovation had come from a European company and not a Chinese company. Even though open-source AI is accessible, that doesn’t mean it gets a free pass on scrutiny. The north stars for practitioners – access to fully-disclosed input data and achieving the most energy-efficient inference – are within reach, though not yet realised. Despite all the admiration piled onto it, DeepSeek hasn’t disclosed the input data for its R-1 model and security researchers have already found sensitive data leaking from it. Although OpenAI also doesn’t usually disclose its input data, they are suspicious that there may have been a breach of their intellectual property. Also, the jury is still out on the security aspect. Could the open-source nature of these systems transform them into powerful dual use artifacts? And is there a real way for their collective developers to track and – if anything – stop downstream deployment? Again, the timing is right – now it’s up to the EU’s Codes of Practice to ensure that it reflects the peculiarities of open-source AI. The larger lesson for Europe is one we already knew very well, namely that lacking a stake in the game is caused by lacking skin in the game. After all, if China did it, maybe Europe can do it too. While there are tentative discussions over a collaborative AI Research Council , it becomes clearer every day that it’s time to start building. Initiatives like EuroLLM have the data and Mistral proved that European companies can scale AI models. The puzzle pieces are there, they just haven’t been put together yet. The DeepSeek furore demonstrates that having a track record of developing prior AI models positions the team to swiftly capitalise on new developments. Although the company started publishing models on Hugging Face only in late 2023, it had already built a range of different AI tools before jumping onto the newest innovation that’s focused on spending more time and effort on fine-tuning models. So, what does the future hold? Probably more panic, more breathless headlines about AI supremacy, and more and louder calls for protectionist policies. Stargate’s strategy for supremacy directly conflicts with openly sharing innovations with global competitors, leaving the geopolitical balance in limbo. But the genie is well and truly out of the bottle. The future of AI development is becoming more and more like a global collaborative effort ( even Trump has admitted this ) – united in diversity , whether the superpowers like it or not. And that might just be the best news we’ve had in AI development for a long time.", "wordcount": 909}, {"source": "publication", "date": "2025-01-30T12:56:30+01:00", "title": "A Redynamised EU Enlargement Process, but hovering Between Accession and the Alternatives", "authors": ["Michael Emerson", "Steven Blockmans"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/a_redynamised_eu_enlargement_process_sceeus_2025.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-redynamised-eu-enlargement-process-but-hovering-between-accession-and-the-alternatives/", "excerpt": "As reported in the European Commission’s latest annual ‘Enlargement Package’, the last year saw an important new dynamic. But ambiguities and contradictions ope", "full_text": "", "wordcount": 282}, {"source": "publication", "date": "2025-01-29T17:27:25+01:00", "title": "Annual Report 2024", "authors": ["Julien Libert", "Daniel Cassidy-Deketelaere"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/Annual-Report-2024.pdf", "page_url": "https://www.ceps.eu/ceps-publications/annual-report-2024/", "excerpt": "We are very happy to publish our Annual Report 2024 . It showcases CEPS activities and achievements throughout the year, including on CEPS' research priorities,", "full_text": "", "wordcount": 48}, {"source": "publication", "date": "2025-01-29T16:29:08+01:00", "title": "Towards an ambitious FP10", "authors": ["Marta Dell’Aquila", "Leonie Kunze", "Andrea Renda", "Nicole Reynolds", "Hien Vu", "Timothy Yeung"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/6g05pHvX-Towards-an-ambitious-FP10-with-cover.pdf", "page_url": "https://www.ceps.eu/ceps-publications/towards-an-ambitious-fp10/", "excerpt": "In a world increasingly subject to uncertainty and crisis, Europe has a responsibility to lead the way in tackling global challenges, using science and technolo", "full_text": "", "wordcount": 225}, {"source": "commentary", "date": "2025-01-29T11:43:36", "title": "The EU must stay on course and be much more assertive, both at home and abroad", "authors": ["Karel Lannoo"], "topics": ["Economy & Monetary Affairs", "EU Institutions & Policy-making", "Foreign Policy & Security", "Internal Market Industry Entrepreneurship And Smes"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/the-eu-must-stay-on-course-and-be-much-more-assertive-both-at-home-and-abroad/", "page_url": "https://www.ceps.eu/the-eu-must-stay-on-course-and-be-much-more-assertive-both-at-home-and-abroad/", "excerpt": "The EU should stick to its course, pursue the Green Deal and complete the single market. It needs to demonstrate its resolve and act united as a new – potentially hostile – US administration rolls in and shakes up the foundations of transatlantic cooperation and the world order. …", "full_text": "The EU should stick to its course, pursue the Green Deal and complete the single market. It needs to demonstrate its resolve and act united as a new – potentially hostile – US administration rolls in and shakes up the foundations of transatlantic cooperation and the world order. But it must also stand firm if China makes its own attempts to split an EU united front. To do so, the EU should act decisively with the powers it has according to the Treaty, while being much more vocal against any efforts to politically undermine Europe and divide it. We’ll see over the next few weeks how up to this task the newish von der Leyen II Commission is and how determined it is to counter pressures from both Member States and from abroad. It should clearly indicate whether it believes Europe is still able to credibly anchor itself in between the US and China – but if the past few weeks are any indication, things are not looking promising. Europe, and the EU, have been pushed into a defensive position against full-on attacks from many fronts, including the new US President, but also industry and opinion leaders and the EU’s own extremist parties. A political Commission cannot simply stand to one side. It must react to unfounded statements from leaders that directly attack its position, authority and reputation. The EU should effectively respond, in line with its Treaty values, to any risks and threats to the rule of law, as this is the essential precondition for trust-based cooperation in all other EU policy areas. While authorities need to be careful, they cannot be absent from the public realm, as non-reaction may be viewed as tacit acceptance (bad) or weakness (even worse). What’s transpired over the past few weeks recalls the months just before the Brexit referendum, when then-Commission President Juncker forbade any member of the College to react in defence of EU policies, allowing the most blatant lies about the EU to run rampant in the UK. The EU being proactive is particularly important in the case of the Digital Services Act (DSA). It was adopted in mid-2023 but the Commission has barely done anything to enforce it or effectively communicate about it. And yet content and account manipulation on social media is now very much the norm and large platforms are being used to push political and commercial interests – and spread lies. Content moderation is attacked and undermined with the ‘censure’ argument, whereas it’s the social media algorithms that secretly but steadfastly manipulate information. It goes without saying that this all goes against the DSA’s core objectives. The groundwork for the new Commission was laid by the Letta and Draghi reports, which focus on completing the single market but also better enforcement of what we already have. Far too often, the single market and overall European competitiveness have been sacrificed for the sake of Member States’ local interests. This is why the single market has receded and price competition has declined, such as in financial services. Member States actively allow firms to maintain uncompetitive practices, which in the end benefits no one. That’s why the Commission should react much more forcefully to this during trilogues and if these bad habits cannot be overcome, then the proposal should either be withdrawn entirely or the Commission must be much more rigorous in terms of enforcement. It should not be afraid to drag violating Member States in front of the Court of Justice. But firms also need to be consistent and encouraged by EU authorities to make use of the freedoms accorded to them by the single market. For a variety of reasons, many firms simply don’t use the facilities available through the single licence (namely that if a firm is authorised to operate in one Member State, then it can automatically operate across the entire single market). For example, Euronext , the pan-European stock exchange, hasn’t used the single licence to develop a truly single EU-wide trading platform, but instead has seven different licences in the seven countries where they own a regulated market, with seven different reporting structures and (at least) seven different supervisors – so much for a ‘capital markets union.’ The current obsession to reduce the regulatory burden within EU rules by 25 % shouldn’t create false expectations. Seasoned Brussels watchers will remember many similar plans, from the SLIM exercises starting in 1996, to the regulatory ‘pauses’ under Commissioner McGreevy in 2005-06 or the better regulation ambitions of Vice-President Timmermans under the Juncker Commission. While all these plans are/were commendable, it would be better to attack the causes of regulatory complexity – the decision-making process – rather than merely treating the symptoms. Specifically, regarding some aspects of the Omnibus Simplification Package (due to be published in February), the impression emerges that the Commission isn’t entirely sure about its green ambitions. It may water down standards at the precise moment when they need to be enforced and instead relinquish the ambition to become the leading global sustainable standards setter. This is certainly the case for the CSRD and the CSDDD , as some industry groups have already commented (see for example France’s C3D ). Exaggerated stories are circulating on the CSDDD’s scope and reach, as its obligations will initially only apply to a small number of corporate groups . All the above examples may seem disjointed and separate upon first glance – but they all tell the same story, that of an EU that appears meek and unable/unwilling to stand up for itself and its tasks. That’s why the Commission should have clear ambitions for the next five years and stick rigorously to the acquis and Treaty obligations. Giving in to unsubstantiated pressures – both internal and external – will create uncertainty and make the EU appear weak. The Commission must deliver on what’s been agreed and lead by example, demonstrating its strength and resolve.", "wordcount": 987}, {"source": "publication", "date": "2025-01-28T15:53:25+01:00", "title": "Why the EU doesn’t need a single supervisor for its financial markets – yet", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/No-94-Why-the-EU-doesnt-need-a-single-supervisor-for-its-financial-markets-–-yet.pdf", "page_url": "https://www.ceps.eu/ceps-publications/why-the-eu-doesnt-need-a-single-supervisor-for-its-financial-markets-yet/", "excerpt": "The debate on the future of capital market supervision in Europe has gained renewed momentum, particularly following remarks made in November 2023 by European C", "full_text": "", "wordcount": 129}, {"source": "commentary", "date": "2025-01-27T15:39:09", "title": "Stargate and the fight for AI supremacy – this is Europe’s wake-up call", "authors": ["Andrea Renda", "Pierre-Alexandre Balland"], "topics": ["AI, Digitalisation & Innovation"], "units": ["Data Science", "GRID"], "types": [], "link": "https://www.ceps.eu/stargate-and-the-fight-for-ai-supremacy-this-is-europes-wake-up-call/", "page_url": "https://www.ceps.eu/stargate-and-the-fight-for-ai-supremacy-this-is-europes-wake-up-call/", "excerpt": "The announcement of the USD 500 billion US Stargate Project marks a bold leap into the future for AI. Announced with great fanfare at the White House by President Trump, flanked by the CEOs of OpenAI, SoftBank and Oracle, the initiative aims to build the most advanced AI infrastr…", "full_text": "The announcement of the USD 500 billion US Stargate Project marks a bold leap into the future for AI. Announced with great fanfare at the White House by President Trump, flanked by the CEOs of OpenAI, SoftBank and Oracle, the initiative aims to build the most advanced AI infrastructure the world has ever seen. This matters because AI drives innovation, creates industries, and fuels economic power – and those who lead in AI will shape the global power balance. And the scale is staggering. An initial USD 100 billion investment, ramping up to half a trillion dollars over four years, to fund state-of-the-art data centres, cutting-edge hardware and sustainable energy systems. Although the funding is currently private and tech leaders have skirmished over the availability of the committed funds, being announced right at the start of Trump’s presidency signals strong political backing and an explicit alliance with the Big Techs. This could lead to smoother AI regulatory processes, tax incentives and alignment with additional public spending initiatives, such as a future iteration of the Inflation Reduction Act or the CHIPS Act. The picture becomes even clearer if we consider that Stargate was announced immediately after Trump had scrapped the Biden administration’s Executive Order on AI, erasing and rewinding US AI policy and paving the way for an era of laissez faire AI. For Europe, it’s go big or go home AI is not just another technological frontier. It’s the foundation of future economic and geopolitical power. Stargate is a bold declaration that the US intends to dominate this space, leveraging its resources, innovation ecosystem and political alignment. It will do so against China, and maybe even against the EU, which in Trump’s rhetoric (for example, in Davos ) increasingly appears to be a competitor to the US, rather than an indispensable ally. For Europe, this is a wake-up call. The US isn’t just competing to lead in AI. It’s redefining the rules of a winners-take-all game and casting dark shadows over Europe’s chances to thrive in the future landscape of great power competition. The message for Europe is clear and echoes Mario Draghi’s warning in his report – essentially, it’s go big or go home. What’s worse, if the US takes a diverging path from the EU, efforts to achieve technological sovereignty in key layers of the technology stack will have to be immediately sped up and scaled up. Europe’s current AI investment levels are massively inadequate and any EU-wide AI initiative (think about the EUR 2.1 billion for AI factories) is going to be dwarfed by Stargate. EU institutions, Member States and private actors have made some progress and plan to increase funding for deep-tech startups. But let’s be honest – these efforts are a drop in the ocean compared to what’s needed. Europe must think bigger – much, much bigger. This includes reforming pension systems to channel money from savings into the economy, as well as modernising pension funds regulations , removing barriers to capital movement and spending public money on big tech bets rather than making small irrelevant pushes in all directions. So, what can Europe do? We argue that President Von der Leyen should prioritise an ambitious, coordinated moonshot on AI and its related technologies, to build a technologically sovereign stack. This needs to be done now, through mobilising public (EU and national) resources, private capital and leading philanthropies, and with the help of leading professionals able to guide a mission-oriented large-scale initiative. This will take investment, priority-setting and suitable governance arrangements. We believe it’s feasible but it will take a good degree of political courage. A bold initiative for the EU’s technological sovereignty In recent publications, we have shown how fragmented the European AI landscape is and how dependent it is on just a few hubs (led by London and Paris), which hardly cooperate with each other. We then discovered pockets of European excellence inside the EU (e.g. the Leuven-Eindhoven-Aachen triangle) and outside (including Kyiv but also Switzerland and Norway). We also laid the foundations for a large-scale initiative on AI in Europe, aiming to create trustworthy AI solutions for science, robotics and public services, and based on proposals that unite the whole European scientific community. We’ve also shown that Europe is insufficiently focusing on the technologies that will drive the next industrial revolution and is spreading resources too thinly across different fields and geographies. In the coming two weeks, we will release a very ambitious proposal for the next Framework Programme for Research and Innovation (FP10) and a proposal (with several co-authors) to invest in a fully-fledged EuroStack . This means massive direct investments in AI and related technologies and infrastructure, such as next-generation semiconductors, advanced computing systems, resilient telecommunications networks and a world-class digital public infrastructure . All these initiatives should be combined into one coordinated action plan that brings together public and private resources, includes European countries beyond the EU and sets clear targets for Europe’s competitiveness and technological sovereignty, and solutions in key areas of the EU economy and society. Importantly, this isn’t just about Europe. The world is in dire need of open and trustworthy AI solutions, and the lack of competition and regulatory constraints that seem to be prevailing in the US are unlikely to lead in this direction. That’s why an ambitious and effective European investment plan on AI would also restore Europe’s leadership in responsible and sustainable uses of technology around the globe. The clock is ticking Stargate is both a wake-up call and a five-alarm fire. Europe is already massive in terms of population and GDP, and we believe that Europe has the talent, the institutions and the potential to lead in AI and other critical technologies. What Europe lacks is the unity, urgency and ambition to match the scale of the challenge. The time for half-measures is over. Europe must act boldly, decisively and immediately to secure its place in the global tech race. Anything less would be a historic failure. The question is not whether Europe can afford to invest more in AI – it’s whether it can afford not to.", "wordcount": 1017}, {"source": "commentary", "date": "2025-01-24T16:06:38", "title": "These are the necessary conditions to get European boots on the ground in Ukraine", "authors": ["Steven Blockmans"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/these-are-the-necessary-conditions-to-get-european-boots-on-the-ground-in-ukraine/", "page_url": "https://www.ceps.eu/these-are-the-necessary-conditions-to-get-european-boots-on-the-ground-in-ukraine/", "excerpt": "Since the US Presidential election there’s been a debate in Europe over a possible ceasefire agreement and the security guarantees Ukraine needs to deter Russia from resuming hostilities. A European ground operation in Ukraine is a welcome idea but only if it can be backed up by …", "full_text": "Since the US Presidential election there’s been a debate in Europe over a possible ceasefire agreement and the security guarantees Ukraine needs to deter Russia from resuming hostilities. A European ground operation in Ukraine is a welcome idea but only if it can be backed up by the US. This means convincing Donald Trump that European leaders are fully serious about guaranteeing European security. Force majeure President Macron first suggested sending European ground troops to Ukraine in February 2024. And while it was met with rejection and ridicule by the likes of German Chancellor Scholz, various other European leaders – including President Zelensky and NATO’s newly appointed Secretary-General Mark Rutte – have since returned to the idea with a renewed sense of urgency. This is due to the crumbling frontline in Ukraine, the gradual acceptance that some parts of Ukraine will remain occupied and, of course, Donald Trump’s return to the White House. The latter has stoked fears that his quest for a quick and possibly dirty ceasefire agreement – to honour a campaign promise to ‘get out’ of Ukraine and refocus on China – risks producing an unsustainable peace that would be detrimental to both Ukrainian and wider European security interests. European decision-makers have had to accept that other forms of security guarantees for Ukraine are currently unattainable or undesirable. There’s no consensus to support Ukraine’s NATO membership and Trump won’t be stationing US troops in the country. Arming Free Ukraine to the teeth so it can defend itself is vulnerable to budget discussions on both sides of the Atlantic and would probably produce a fragile peace. That’s why security guarantees would have to be backed up by European boots on Ukrainian soil. For this to happen, many hard questions need to be answered about the aims, nature, size, duration, and command and control arrangements of the operation, to name just a few. If there is a ceasefire, a European ground operation would make a lot of sense. It would send a powerful message to Ukraine that Europe stands by its side; it would signal to Russia that a European presence would be triggered to defend Ukraine if it were to breach the ceasefire; and it would strongly show Washington that Europeans have skin in the game. To be clear, the idea would not be to replace the Ukrainian army or join it in attacking Russia; nor would it be deployed to simply keep the peace like neutral UN blue helmets or as OSCE observers counting the number of shells fired by either side. European troops would only support the Ukrainian army in holding and defending the contact line, thus serving as a deterrent force. A major force? Tens of thousands of European troops would be needed. Given political blockages in the US, NATO and the EU, only an ad hoc ‘coalition of the willing’ is feasible. Poland, with the largest European land army, has excluded itself for now, arguing that it needs to prepare for a possible direct attack from Russia. Counterintuitively, it’s France that continues to lead the conversation, despite Macron’s ongoing political problems. France and the UK’s involvement would be key as the only European nuclear weapon states with sizeable armies. The Baltic states and the Netherlands, possibly Germany under new leadership, and other nations would also be needed. A European ground force would also have to use NATO’s superior command and control arrangements and rely on a US commitment for backup (notably for logistics and intelligence) and for help of last resort. This requires consensus in NATO. On both counts, the European coalition would have to convince the Trump White House that they will actually do what it takes to defend the European security order. Measurable commitments and concrete actions aside, NATO Secretary-General Rutte, when he visited Mar-o-Lago at the end of November, may have facilitated the decision-shaping process. Reportedly, he held Trump’s ear by describing a scenario where a hasty American retreat would make him look as weak as his predecessor when (not if) Putin shatters a less-than-solid ceasefire agreement. And if Trump were to offer American back-up for a European coalition, then other allies currently critical of the plan could drop their opposition. No grey zones By deploying troops under NATO command to police the ceasefire agreement, the West would finally end its fruitless pandering to the Kremlin’s neo-imperialist agenda and its denial of Ukraine’s right to self-determination. Yesteryear’s half-hearted security arrangements, embodied in the 1994 Budapest Memorandum , NATO’s empty membership promise made at its 2008 Bucharest Summit, and the Minsk 1 and 2 agreements to end the war in Donbas, have miserably failed and belong in the dustbin of history. A ceasefi
