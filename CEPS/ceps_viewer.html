rallel EU reforms for bolstering absorption capacity and guarding against democratic backsliding after accession. Until Brussels proves it’s up to the task, the credibility of enlargement – and Europe’s ability to turn strategy into security – will remain at risk.", "wordcount": 1050}, {"source": "publication", "date": "2025-11-18T10:43:20+01:00", "title": "Making the green premium work", "authors": ["Edoardo Righetti", "Vasileios Rizos", "Deniz Tekin"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/4KXfXvql-2025-14_ERCC-CRM.pdf", "page_url": "https://www.ceps.eu/ceps-publications/making-the-green-premium-work/", "excerpt": "Meeting the EU’s climate and industrial objectives requires scaling the supply of critical raw materials (CRMs) while ensuring production complies with environm", "full_text": "", "wordcount": 324}, {"source": "commentary", "date": "2025-11-13T14:37:13", "title": "How to make HERA’s stakeholder engagement count", "authors": ["Alice Orlandini", "Timothy Yeung"], "topics": ["Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/how-to-make-heras-stakeholder-engagement-count/", "page_url": "https://www.ceps.eu/how-to-make-heras-stakeholder-engagement-count/", "excerpt": "Created amid the Covid-19 pandemic, the Health Emergency Preparedness and Response Authority (HERA) is designed to strengthen Europe’s preparedness by ensuring the provision of medical countermeasures in the event of major cross-border health threats. HERA can’t operate alone to …", "full_text": "Created amid the Covid-19 pandemic, the Health Emergency Preparedness and Response Authority (HERA) is designed to strengthen Europe’s preparedness by ensuring the provision of medical countermeasures in the event of major cross-border health threats. HERA can’t operate alone to achieve this – it must secure all its stakeholders’ contributions to fulfil its mission. HERA needs competent authorities in Member States as well as industries for the development, manufacturing, procurement, and distribution of key medical countermeasures. It needs civil society to understand the perspective of patients and healthcare professionals. And it needs the research community to better identify and understand outstanding risks, and shed light on effective response patterns. An innovative stakeholder engagement structure HERA has embraced a broader and more innovative approach to stakeholder engagement than other Directorates-General within the European Commission. Designed as a separate internal service, HERA has gained flexibility to move beyond existing approaches and develop its own stakeholder engagement strategy. HERA’s governance structure reflects this ambition. The HERA Board, made up of representatives from Member States and relevant agencies, contributes to strategic planning, while the Advisory Forum, supported by the Civil Society Forum and the Joint Industrial Cooperation Forum, ensures input from a diverse group of stakeholders. Coordinating such a multi-layered, participatory structure is complex. It might be easier to rely on top-down decision-making or closed-door bilateral consultations, which require less preparation, organisational effort, or accountability – and are better suited to reconciling divergent views. HERA’s choice to involve a broad spectrum of stakeholders demands more transparency, coordination, and consideration of diverse inputs. Its advisory structure highlights both the ambition and the effort of making governance truly participatory. Stakeholders appreciate this more inclusive engagement strategy. Roughly half of those who responded to a recent survey perceive that HERA coordinates well with relevant actors. This figure rises slightly to 53 % when it comes to HERA’s engagement with industry, the research community, and civil society. While these numbers suggest HERA is on the right track, they also highlight that there is room for improvement. One central question remains: does broad stakeholder engagement meaningfully inform and improve HERA’s activities, or is it primarily a symbolic exercise to gain democratic legitimacy? Good intentions, weak execution A well-constructed plan isn’t enough. HERA’s governance and advisory structures, while built on good premises, might still fall short in practice. The HERA Board was envisaged as a platform for strategic planning, while the advisory forums were meant to foster co-creation. Stakeholders participate in the process with high expectations in mind, but the execution has not fully matched the initial ambition. The HERA Board is in practice more of a channel for information exchange than strategic guidance, and the advisory forums are packed with one-sided briefings rather than bilateral exchanges. The lack of communication between meetings risks stalling momentum and undermining the continuity – and consequently the impact – of stakeholders’ contributions. Based on our findings , stakeholders face difficulty in receiving or gathering relevant information from HERA. This limits their ability to engage and respond effectively or, in some cases, to engage at all. For example, visibility of funding opportunities and information on scope, budget, and requirements are perceived to be low, making participation burdensome and discouraging potential applicants. As a result, only a small circle of ‘insiders’ is able to comprehend the inaccessible EU jargon and navigate the bureaucracy successfully. Late and unclear calls for tenders and consultation processes that are often compressed into short timeframes are additional barriers. Stakeholders remain uncertain about the impact of their contributions. They’re often asked to provide inputs through the advisory mechanism, as well as consultations and workshops, but interviewed stakeholders expressed frustrations that their feedback has rarely been translated into tangible outcomes. They’re not sure how their input is taken into account, leaving them with a ‘so what?’ sentiment. The lack of structured follow-up and a broken feedback loop undermine confidence in the process and the value of their involvement, creating a risk of disengagement over time. And indeed, a recent EESC report has identified it as a common problem among the EU institutions. Our research shows that a recurring theme across stakeholders is the lack of clarity around HERA’s mandate and its division of responsibilities with other EU bodies. Overlapping initiatives and tensions with other Commission services create confusion and administrative burdens. In addition, what should be handled at national level (like stockpiling or medical countermeasures) and at EU level remains ambiguous. Simple fixes, big gains Despite these shortcomings, HERA’s stakeholder engagement approach is innovative and ambitious, and that should be recognised given the budget and autonomy constraints HERA is facing. By strengthening its impact orientation and reaffirming its commitment to its mission, HERA can turn stakeholder engagement from a box-ticking exercise into a highly effective tool. In the future, HERA should clearly define and communicate roles and labour division, and adhere to them in practice. It should improve communication and accessibility of information and demonstrate concretely how stakeholder inputs are taken into account in the decision-making process, even when they don’t determine the outcome. Doing so would build trust, strengthen collaboration, and make its governance and advisory structures work as intended. These measures would not only reduce inefficiencies and duplication, but also encourage sustained, meaningful participation from stakeholders, ultimately increasing the effectiveness of HERA’s operations, and consequently Europe’s preparedness and ability to respond to future health threats. In an era of fragile trust in institutions, a participatory, bottom-up model involving industry, civil society, and research institutions is more important than ever. Engagement with Member States is equally vital, as the health threats addressed by HERA are cross-border in nature, and the EU’s role is primarily one of coordination and support. Setting up HERA within the Commission while allowing meaningful participation has been purposefully beneficial so far. HERA’s stakeholder engagement strategy could become a model for other Commission services. Its layered-structure, openness and availability are well appreciated and have become real assets for preparing and responding to future health crises. Yet it remains to be seen how HERA could successfully navigate potentially conflicting stakeholder perspectives while aligning with the European Commission’s agenda and priorities, without disappointing stakeholders who have actively contributed. To read the full report that this Expert Commentary is based on, please click here .", "wordcount": 1043}, {"source": "publication", "date": "2025-11-13T10:22:20+01:00", "title": "For more effective corporate reporting, the EU needs effective governance, not just templates", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/2025/11/No-101-EU-corporate-reporting.pdf", "page_url": "https://www.ceps.eu/ceps-publications/for-more-effective-corporate-reporting-the-eu-needs-effective-governance-not-just-templates/", "excerpt": "Trust in EU corporate reporting won’t be restored by longer templates. It will come from governance that works: boards that own the reporting process, audit com", "full_text": "", "wordcount": 132}, {"source": "publication", "date": "2025-11-12T09:48:39+01:00", "title": "Risks and opportunities in evolving EU–US financial and economic relations", "authors": ["Cinzia Alcidi"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/risks-and-opportunities-in-evolving-eu-us-financial-and-economic-relations/", "page_url": "https://www.ceps.eu/ceps-publications/risks-and-opportunities-in-evolving-eu-us-financial-and-economic-relations/", "excerpt": "The EU–US economic relationship has long been broadly balanced, reflecting deep mutual interdependence. However, in the domains of security and technology, the", "full_text": "", "wordcount": 207}, {"source": "publication", "date": "2025-11-06T16:11:12+01:00", "title": "Building a European AI Ecosystem of Excellence", "authors": ["Susana Aires", "Harry Crichton-Miller", "Nicoleta Kyosovska", "Berta Mizsei", "Davide Monaco", "Laura Nurski", "Federico Plantera", "Robert Praas"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/2025-13_GRID-Google-project-Foresight-report.pdf", "page_url": "https://www.ceps.eu/ceps-publications/building-a-european-ai-ecosystem-of-excellence/", "excerpt": "We conducted a foresight exercise to explore how AI could reshape Europe’s innovation systems and labour markets by 2045, for the CEPS project on a European Eco", "full_text": "", "wordcount": 141}, {"source": "publication", "date": "2025-11-05T15:25:16+01:00", "title": "Establishing the 28th regime in Europe", "authors": ["Apostolos Thomadakis", "Judith Arnal", "J. Scott Marcus"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/11/qe-01-25-038-en-n.pdf", "page_url": "https://www.ceps.eu/ceps-publications/establishing-the-28th-regime-in-europe/", "excerpt": "The European Union’s internal market remains one of its most powerful economic assets, yet fragmentation across legal, administrative and regulatory frameworks", "full_text": "", "wordcount": 238}, {"source": "publication", "date": "2025-11-05T09:33:13+01:00", "title": "Keeping Turkey in the fold", "authors": ["Jeffrey Mankoff", "Mühdan Sağlam"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/ikLMkbRZ-2025-06-FP-CATS-Turkey-West-relations.pdf", "page_url": "https://www.ceps.eu/ceps-publications/keeping-turkey-in-the-fold/", "excerpt": "Turkey has become one of the most active middle powers navigating the erosion of the post-Cold War order. Positioned between a divided West and increasingly ass", "full_text": "", "wordcount": 165}, {"source": "publication", "date": "2025-11-04T10:09:04+01:00", "title": "Designing Horizon Europe for the post-2028 world", "authors": ["Andrea Renda"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/251030-Operationalising-the-governance-of-Horizon-Europe-formatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/designing-horizon-europe-for-the-post-2028-world/", "excerpt": "The European Commission recently tabled a bold proposal for the next Framework Programme for Research and Innovation (R&I), Horizon Europe, which will run f", "full_text": "", "wordcount": 230}, {"source": "publication", "date": "2025-11-03T11:58:57+01:00", "title": "EU plans for AI (giga)factories: sanctuaries of innovation, or cathedrals in the desert?", "authors": ["Andrea Renda", "Nicoleta Kyosovska"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/251027-Sanctuaries-or-Cathedrals.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eu-plans-for-ai-gigafactories-sanctuaries-of-innovation-or-cathedrals-in-the-desert/", "excerpt": "To address Europe's competitiveness delay in the domain of artificial intelligence (AI), the European Commission is investing heavily in building AI factories a", "full_text": "", "wordcount": 231}, {"source": "publication", "date": "2025-10-30T10:11:48+01:00", "title": "Embedding financial competitiveness as a regulatory objective to boost Europe’s productivity", "authors": ["Judith Arnal", "Pablo Zalba", "César Gurrea"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/11/2025-11_CEPS-ECRI-Deloitte_Financial-sector-competitiveness-final-version-4.pdf", "page_url": "https://www.ceps.eu/ceps-publications/embedding-financial-competitiveness-as-a-regulatory-objective-to-boost-europes-productivity/", "excerpt": "Competitiveness has become the defining challenge for the European economy, but the EU’s financial system is still constrained by a regulatory framework focusin", "full_text": "", "wordcount": 165}, {"source": "commentary", "date": "2025-10-29T15:00:39", "title": "The EU’s agri-food sector is a global success story – and that’s why we need a new narrative for the CAP", "authors": ["Karel Lannoo"], "topics": ["Agriculture & Rural Development", "Trade"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/the-eus-agri-food-sector-is-a-global-success-story-and-thats-why-we-need-a-new-narrative-for-the-cap/", "page_url": "https://www.ceps.eu/the-eus-agri-food-sector-is-a-global-success-story-and-thats-why-we-need-a-new-narrative-for-the-cap/", "excerpt": "Taboos and negativity have long surrounded Europe’s Common Agricultural Policy (CAP), meaning it’s often seen as a policy failure. This is reflected in the fact that the European Commission has proposed a significant cut in CAP funds in the new Multiannual Financial Framework (MF…", "full_text": "Taboos and negativity have long surrounded Europe’s Common Agricultural Policy (CAP), meaning it’s often seen as a policy failure. This is reflected in the fact that the European Commission has proposed a significant cut in CAP funds in the new Multiannual Financial Framework (MFF). Yet take a closer look at the EU’s agri-food industry and what you’ll uncover is actually a well-performing sector, which contributes to an annual trade surplus for the EU of around EUR 60 billion – about the same as the CAP’s annual budget. The single most exported item is meat, whereas there are hardly any relevant EU meat imports. In the context of the wider ‘simplification’ debate, it’s also the most regulated sector, covering some 40 % of total EU legislation. However, lowering agricultural standards is very much not on the agenda. EUR 60 billion for the CAP may be about 30 % of the total EU budget but most of that is spent on direct income support for EU farmers. It’s a limited amount compared to, for example, the EUR 70 billion that Germany spent on state aid in 2023. Or it’s a relative amount considering the prices for basic food products in the EU and that most high-income countries around the world actively support their farmers. At home, many challenges to overcome Nevertheless, the sector is facing a lot of challenges – many farmers are getting older, there’s a clear lack of enthusiasm from young people to replace them, there are huge differences in the average amount of farmland per farm in the EU, there’s overproduction and declining wine consumption, and let’s not forget environmental pressure and pesticides… just to name a few. The prospect of further EU enlargement is another headache. If and when it becomes a member, Ukraine would bring with it an entirely different (and massive) farm sector, with the average size of farms in Ukraine being multiple times larger than those in neighbouring countries. The other candidates, Moldova and the countries of the Western Balkans, are at the other end of the scale, having very unproductive agricultural sectors, dominated by very small firms, all needing substantial investment and a lot of assistance to get them up to EU standards. A new political narrative is also needed given the very real regional development trap and the increasing ‘ geography of discontent ’ phenomenon in the EU. Although it’s not the same situation across the board, regions that have a higher chance of falling into the development trap (‘ entrapment risk ’) are seeing rising support for Eurosceptic political opinions and options. This includes whole regions of Italy, France, Greece and Romania, which have high levels of entrapment due to their lower levels of economic development than the EU average. The political divide between cities and regions was also clear during the recent Czech elections, with only the Prague and Brno regions supporting the outgoing government, whereas the remaining regions swung massively to Andrej Babis’ right-wing populist political party. In this sense, the Commission’s proposal to cut roughly 10 % in real terms of direct support to farmers – regardless of the accompanying proposal to better target support for farmers that are truly in need – is arguably shortsighted and should be rethought. But on the world stage, a success story Agri-food products have the highest tariffs, with the average global MFN (Most-Favoured-Nation) tariff for agriculture, according to the WTO , being about 14.8 % on average – and this is on top of important non-tariff barriers. Yet this hasn’t stopped the EU from being a massive exporter of agricultural products. The EU is the world’s biggest exporter of pork and its second biggest producer after China. Pork is a sensitive issue in international trade, as proven by the word being mentioned twice in the four-page EU-US statement on fairer trade from 18 August 2025. Following this, the EU will face a 15 % tariff on exports to the US, its biggest market for pork products, all while EU tariffs shouldn’t be applied at all to (non-existent) imports from the US. China is the EU’s third most important export market, where it has benefitted from local sanitary problems – but this didn’t stop China from introducing high tariffs, as it did on 10 September, ranging from 15.6 % to 62.4 %, following an anti-dumping investigation , which found EU pork imports being sold at dumped prices, thus harming China’s domestic industry. Alas, this was merely China retaliating against the EU’s EV tariffs. Opponents of the proposed EU-Mercosur trade agreement have argued that Europe would be overwhelmed by Brazilian meat. However, a closer look at the proposed agreement reveals that a quota allows imports up to 99 000 tons, with a tariff rate of 7.5 %, to be phased in gradually over four years. This corresponds to 1.5 % of total EU beef production. A much lower quota of 25 000 ton applies for pork. Additionally, EU sanitary and phytosanitary (SPS) standards and controls will apply to imports from Mercosur countries. There were similar concerns over the CETA agreement in 2017-18 but the EU’s agri-food exports to Canada have increased since the agreement entered into force. The same also happened with the EU’s agreement with Japan (the EPA), where exports have grown significantly due to substantial tariff reductions, particularly for pork, wine and beef. Thus, the often-critical view of the CAP obscures a well-performing and well-regulated European agri-food sector, a top global exporter, which contributes to rural development and political stability. With strategic autonomy in mind, EU policies have been successful, although related environmental matters are a bit more problematic. And that’s why any substantial changes to the CAP or funding cuts through the new MFF must be considered extremely carefully, taking fully into account EU farming’s (mostly positive) multi-sectoral and societal impact.", "wordcount": 970}, {"source": "publication", "date": "2025-10-27T15:13:52+01:00", "title": "Payment practices reporting under CSRD", "authors": ["Beatriz Pozo", "Agustina Korenblit", "Gabriele Freo"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/10/PeKgF4TY-CSRD-Thematic-Report_Final_C.pdf", "page_url": "https://www.ceps.eu/ceps-publications/payment-practices-reporting-under-csrd/", "excerpt": "Companies’ payment practices are often opaque, with little data available on the payment behaviour of EU businesses. The inclusion of payment practices in the C", "full_text": "", "wordcount": 308}, {"source": "commentary", "date": "2025-10-27T12:10:50", "title": "A new vision for EU R&I policy shouldn’t just address brain drain but other pressing global challenges as well", "authors": ["Timothy Yeung", "Nicole Reynolds"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/a-new-vision-for-eu-ri-policy-shouldnt-just-address-brain-drain-but-other-pressing-global-challenges-as-well/", "page_url": "https://www.ceps.eu/a-new-vision-for-eu-ri-policy-shouldnt-just-address-brain-drain-but-other-pressing-global-challenges-as-well/", "excerpt": "With significant skills shortages in many advanced sectors of the economy, the competition to attract top talent has reached unprecedented levels. And governments know that attracting top research talent has significant implications for their countries’ economic and industrial co…", "full_text": "With significant skills shortages in many advanced sectors of the economy, the competition to attract top talent has reached unprecedented levels. And governments know that attracting top research talent has significant implications for their countries’ economic and industrial competitiveness. To boost its competitiveness, especially in tech, the EU recently launched its Choose Europe initiative to attract the brightest minds from all over the world – including the US as the Trump administration cuts support to research and science. Some Member States, starting with France, have taken similar measures, hoping to tap into a possible academic diaspora. The long-standing debate between ‘brain drain’ and ‘brain gain’ argues that when one country wins, another automatically loses. For the EU, recruiting foreign researchers can boost R&I quality, enabling breakthroughs and scientific diversity. Yet in countries of origin, the outflow of highly trained scientists undermines local research and constrains national development. This is particularly detrimental to fields critical to addressing global challenges in health, climate resilience and food security, where low and middle-income countries (LMICs) are a key stakeholder. A more inclusive approach to researcher mobility, also oriented towards creating value for partner countries outside the EU, could result in many mutual benefits and become a lever for co-development… rather than extraction. In other words, researcher mobility policy shouldn’t be seen as a zero-sum game but rather as a win-win for all involved. The African Research Initiative for Scientific Excellence (ARISE) is a programme that has already shown promising results. Co-funded by the EU and implemented by the African Academy of Sciences , ARISE supports early and mid-career researchers to remain in their home institutions while engaging in high-level, globally connected research programmes. Modelled on the European Research Council’s principles of excellence and independence, the programme simultaneously addresses the demand for world-class research and the need for strong domestic institutions in LMICs. ARISE’s design is innovative in several ways. First, it empowers African institutions to manage funding streams within their own institution, provided they can meet international good governance standards. This strengthens institutional accountability and transparency, which are often barriers preventing LMICs from accessing funding. Second, ARISE funds researchers to remain in their home countries, while maintaining links to European research institutions. This allows African countries to build their scientific capacity in a way that doesn’t result in a net loss to their countries. The programme’s current pilot phase supports nearly 600 researchers across 38 African countries , who have produced over 90 academic publications. ARISE’s early success challenges the notion that research excellence and its impact on development are mutually exclusive. The two objectives can – and should – reinforce each other. Further momentum will require more than isolated pilots and a deeper shift within the EU’s institutional architecture. Currently, EU research cooperation with LMICs gets lost in a chasm between DG RTD and DG INTPA, and this limits the EU’s ability to implement R&I policies that align science diplomacy with development goals. To bridge this chasm, the European Commission should develop a coordinated R&I strategy that explicitly aligns the goals of its framework programmes (such as Horizon Europe) with those of the Global Gateway . ARISE’s core design could be replicated in other regions including Latin America, South Asia and the Eastern Neighbourhood. This should include more flexible collaboration models connecting EU and LMIC research institutions, as well as scaling up LMIC research institutions’ grant management capacities so they can absorb larger volumes of research funding. For a truly reciprocal partnership, European researchers should have opportunities to pursue joint research projects in-country with LMIC institutions, which would encourage more equitable knowledge exchange, as well as the development of long-term institutional links. Such a strategy would not only contribute to addressing global challenges and improving local research capacity in partner countries but it would also serve Europe’s broader strategic interests. More sustainable and inclusive development in LMICs expands markets for European innovation, reduces migration pressures and builds resilience to shared challenges such as pandemics and climate change. It also strengthens the EU’s soft power by building bridges and enabling mutually beneficial cooperation, at the same time giving new strength to the EU’s core values and principles through R&I policy and external action. Of course, none of this is possible unless the EU reframes the narrative around research mobility. Rather than presenting Europe as a destination for talent, the EU should instead champion a networked model of excellence that positions Europe as a hub within a globally inclusive system. This requires a mindset shift from ‘brain gain’/’brain drain’ to ‘brain circulation’, and thus from competition to cooperation. Finally, during a time where digital connectivity transcends geography, it can be argued that the tendency of talented minds to cluster in only a few major research cities doesn’t make sense anymore By adopting a coordinated R&I strategy, the EU could influence this trend by addressing disparities in remuneration and career prospects, thus levelling up research quality and spreading the demand for research positions more evenly across institutions – and continents. In a world increasingly defined by geopolitical uncertainty and technological rivalry, science diplomacy offers a way for the EU to assert global leadership while promoting its core values. But this will only be possible if its policies on research and development cooperation are aligned. The future of science isn’t zero-sum – it’s shared. The EU not only has the opportunity but also the responsibility to make that vision a reality.", "wordcount": 904}, {"source": "commentary", "date": "2025-10-24T09:40:50", "title": "The EU should transform its buildings from carbon sources into carbon sinks", "authors": ["Luca Nipius"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/the-eu-should-transform-its-buildings-from-carbon-sources-into-carbon-sinks/", "page_url": "https://www.ceps.eu/the-eu-should-transform-its-buildings-from-carbon-sources-into-carbon-sinks/", "excerpt": "Buildings are responsible for about 40 % of the EU’s total greenhouse gas emissions and about a third of its waste generation. In Europe, where we have legally binding targets to reach net-zero by 2050, the building sector cannot be left behind. Yet most of the policies and progr…", "full_text": "Buildings are responsible for about 40 % of the EU’s total greenhouse gas emissions and about a third of its waste generation. In Europe, where we have legally binding targets to reach net-zero by 2050, the building sector cannot be left behind. Yet most of the policies and progress thus far have been focused on operational emissions – improving insulation, electrifying heating, rolling out renewables. This focus has paid off, with building energy efficiency standards tightening and operational emissions declining . But operational emissions are only part of the picture. Embodied emissions, those created during the production, transport and disposal of building materials, are increasingly dominant over a building’s life cycle, as operational emissions decrease. And that’s why now it’s time to really tackle embodied emissions coming out of the construction sector. Shifting from energy to materials The revised Energy Performance of Buildings Directive , which aims to fully decarbonise the built environment by 2050, takes an important step by recognising this and requiring a whole-life carbon approach , where Member States should also introduce limit values for certain new buildings (limit values being the maximum allowable levels of emissions that a building may produce over its life cycle). A whole-life carbon approach encompasses greenhouse gas emissions across all building components and stages. These emissions are mostly carbon emissions and come largely from the combustion of fossil fuels for energy use in buildings and from emissions generated during the manufacturing of building materials. Given that buildings typically last 50 years or more, the choices made today lock in emissions for decades. This makes it crucial to tackle embodied carbon now – and not in 20 years’ time. Setting limit values is a useful mechanism to drive change as they set a maximum amount of carbon a building can ‘cost’ over its life, driving reductions in emissions. Several Member States, such as Denmark and Sweden , are leading the way with national carbon limits already in place or under development. These experiences will be crucial as all Member States must, by 2027, publish roadmaps detailing how they will set and implement such values. Coordination and shared learning will be essential for ensuring harmonised and effective implementation across the entire EU. Material choice matters With this shift, what buildings are made from becomes as important as how they are heated. Cement, concrete and steel remain indispensable but are the most carbon-intensive materials used for buildings. To decarbonise them, we need both fewer materials (through sufficiency, efficiency and circular design) and better materials (that store rather than emit carbon). The expansion of the EU’s Emissions Trading System to buildings will encourage building renovations and energy efficiency improvements, but this momentum must also extend to building materials. From carbon source to carbon sink The materials that our buildings are made of can fulfil an important role in reversing our net emissions output. Bio-based materials such as timber, hemp, straw and bamboo can store atmospheric carbon for decades or even centuries, while providing the same benefits as conventional materials. At the same time, these materials have lower embodied emissions compared to their conventional counterparts. Other innovations are emerging, such as adding biochar to concrete, which locks carbon in and can offset the embodied emissions, or improving cement carbonation to allow concrete to reabsorb more CO₂ over time. Sufficiency, efficiency and circular design principles, such as durability, modularity and reusability, can significantly reduce buildings’ embodied emissions. But achieving net zero in the construction sector will require going further – namely not just cutting emissions but actively removing and storing carbon. If designed right, Europe’s future buildings could act as long-term carbon sinks (i.e. removing and storing more carbon from the atmosphere than they emit into it) rather than sources. Given that buildings remain among the EU’s largest sources of greenhouse gas emissions, action isn’t just necessary – it’s urgent. What the EU needs to do And with this in mind, the EU now has a policy window to act. The new frameworks on building emissions and carbon storage provide the foundation – it’s now time to build on it. To translate these frameworks into action and to guide Member States, before their 2027 national roadmap deadline, there are three key steps that must be prioritised. First , we need to ensure policy and methodological alignment. EU and national policies, including the Construction Product Regulation and the EU Taxonomy’s Delegated Acts, and national building codes should be aligned with the Energy Performance of Buildings Directive’s whole-life carbon approach. Consistently defined metrics and benchmarks across the EU will make it easier to compare progress and prevent fragmented implementation. Second, credibility should be guaranteed through monitoring and traceability systems. Robust monitoring helps demonstrate the permanence of stored carbon, while traceability ensures that materials can be tracked throughout their lifecycle and beyond, which supports the implementation of circularity principles. Together, they build trust in carbon claims and the integrity of carbon storage in buildings. Finally , we need to create lead markets for low- and negative-carbon materials. Like the Clean Industrial Deal, targeting demand-side policies can accelerate the commercialisation of bio-based and CO2-binding materials, reducing costs and stimulating innovation. The focus of Europe’s building transition will inevitably shift towards embodied emissions. With such a large share of the continent’s emissions at stake, this shift must be both thorough and credible. By combining circularity, efficiency and sufficiency with carbon-storing materials, Europe won’t just decarbonise one of its highest emitting sectors but will also turn it into a long-lasting carbon sink.", "wordcount": 919}, {"source": "commentary", "date": "2025-10-22T11:56:10", "title": "Carbon credits could help turn coal’s phase-out into a global climate partnership opportunity", "authors": ["Christian Egenhofer", "Christian Dietz"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/carbon-credits-could-help-turn-coals-phase-out-into-a-global-climate-partnership-opportunity/", "page_url": "https://www.ceps.eu/carbon-credits-could-help-turn-coals-phase-out-into-a-global-climate-partnership-opportunity/", "excerpt": "The Paris Agreement builds on the assumption that countries can move at different speeds along different paths yet ultimately arrive at the shared goal of staying ‘well below 2°C’. Ten years later, the hope that these pathways would naturally converge now seems overly optimistic.…", "full_text": "The Paris Agreement builds on the assumption that countries can move at different speeds along different paths yet ultimately arrive at the shared goal of staying ‘well below 2°C’. Ten years later, the hope that these pathways would naturally converge now seems overly optimistic. But the EU can – and should – play a pivotal role in bringing countries back together. Substantial support for the EU’s partner countries to pursue a clean and just transition will be needed for this. Yet the likelihood of mobilising more climate finance without new solutions remains limited, both internationally and within the EU. The EU’s renewed (but still cautious) openness to international carbon credits – possibly including transition credits – could be one solution, contributing not only to its own targets but also helping to deepen its international partnerships. Coal’s shadow over the global clean transition path The transition away from fossil-based energy is the foundation of any credible decarbonisation strategy. However, it’s also the crossroads where countries seem to part ways. In advanced economies, reducing energy-related emissions is essentially about electrification, including the scaling up of low-carbon power such as renewables and nuclear, while closing coal plants – sometimes with gas serving as a transitional fuel. For developing and emerging economies, the central challenge is to phase out coal while meeting fast-growing domestic energy demand through low-carbon alternatives. It’s here where the EU can make a difference. This challenge is particularly visible in fast-growing economies. India is expanding renewable energy more rapidly than any other major economy this decade, yet its coal demand grew by 10 % in 2023 and more than 5 % in 2024 . China leads global renewable deployment and is expected to deliver nearly 60 % of new capacity by 2030 – but its coal consumption has also reached record highs. South Africa still relies heavily on coal, which supplied 82 % of its electricity in 2023, even as it leads renewable deployment in Sub-Saharan Africa. It’s a similar picture in Indonesia, although with slower growth in renewables. Phasing out coal also requires building alternative energy infrastructure. This takes both time and money, money that many developing countries lack, and time that our climate is running out of. Without support, the energy transition risks being perceived as a choice between keeping the lights on with fossil fuels or failing to meet rising demand. The Paris Agreement rests on the expectation that developed countries will mobilise significant financial support for the developing world. Alas, discussions remain stuck on how much, for what, from where and – perhaps most controversially – from whom. Substantially scaling up public finance looks increasingly uncertain. At the same time, global climate ambition is waning. Strong leadership is urgently needed to restore a sense of collective direction. A European moment at last? If the EU wants to remain a climate leader, it must help to break this stalemate. The opportunity is real. While the US retreats, China is moving forward, leveraging the clean energy transition as a tool for competitiveness and influence. For the EU to stay credible and competitive, it must forge strong partnerships – not least for its own transition by creating markets and a level playing field for EU clean tech and low-carbon products, but also for securing access to clean energy supply chains, from critical raw materials to green hydrogen. This is where the Clean Industrial Deal ’s newly proposed Clean Trade and Investment Partnerships (CTIPs), come in. However, any EU effort to bring partners along for the clean transition ride must address the coal dilemma and the need for a just transition. There’s already been some progress through the Just Energy Transition Partnerships (JETPs) . These provide support from advanced countries to accelerate decarbonisation in some emerging economies, by mobilising public and private finance , including through concessional loans, equity investments and – to a lesser extent – grants. The first JETP was announced at COP26 in 2021 between South Africa and the International Partners Group (IPG), comprising the UK, US, EU, France and Germany. This has since been expanded to Indonesia, Vietnam and Senegal, with varying coalitions of partners . However, Washington’s recent withdrawal has strained resources, with countries like Germany now trying to fill the gap. The CTIPs, designed with today’s geopolitics in mind, can take this further by building more binding, tailor-made frameworks based on shared priorities that make phasing out coal and scaling up renewables part of a broader, more compelling package for partner countries. It’s time to turn the page on international credits Phasing out coal is a global objective. It’s promoted not only by the International Energy Agency but also through initiatives such as Singapore’s transition credits which monetise emissions reduction through closing coal-fired power plants ahead of schedule and replacing them with renewables, as now piloted in the Philippines . The difficult question is finance. With EU budgets under pressure from defence, competitiveness and security priorities, the political appetite from the EU and Member States for fresh international commitments for a clean and just transition is likely to remain limited. That’s why international credits could play a role in mobilising the required finance. Indeed, the EU has long been sceptical of international credits – and not without reason. The flood of cheap credits of questionable quality under the Kyoto Protocol’s Clean Development Mechanism into the EU ETS resulted in deep mistrust. But circumstances have changed. The EU debate on international credits is gaining momentum, particularly around the 2040 target and the 2035 NDC plan to the UN. A limited use of international credits to achieve the 2040 target is being considered, including their potential role in supporting strategic EU partnerships, as mentioned in the Danish presidency’s recent progress report . Looking ahead, it’s almost imperceivable that international credits won’t be brought up with the EU’s international partners when discussing and negotiating CTIPs. Questions raised by policymakers, experts and civil society around their role in EU climate targets about their quantity, type, timeline and scope (inside or outside the ETS) are valid, but they’re questions of design – not of principle. Engaging in this debate offers many benefits and few risks. By linking credits to coal phase-out within CTIPs, the EU would retain full control over which credits it accepts. This would allow it to shape the global discussion. Ultimately, even linking to the EU ETS, along the lines of CEPS’ proposal for the Western Balkans, could work for developing countries. But there’s no need to settle that debate right now. As Ursula von der Leyen put it in her State of the Union address , ‘to be open to the world and choose partnerships with allies – old and new’ will require fresh answers to old questions.", "wordcount": 1123}, {"source": "commentary", "date": "2025-10-21T14:27:25", "title": "Why it’s important to advance coherence in the EU’s circular economy policy mix", "authors": ["Vasileios Rizos"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/why-its-important-to-advance-coherence-in-the-eus-circular-economy-policy-mix/", "page_url": "https://www.ceps.eu/why-its-important-to-advance-coherence-in-the-eus-circular-economy-policy-mix/", "excerpt": "Achieving a coherent policy mix – meaning a set of different policies that are synergetic and don’t conflict with each other while pursuing a specific goal – has long been an objective in EU policymaking. As early as 2001, the EU Strategy for Sustainable Development argued for im…", "full_text": "Achieving a coherent policy mix – meaning a set of different policies that are synergetic and don’t conflict with each other while pursuing a specific goal – has long been an objective in EU policymaking. As early as 2001, the EU Strategy for Sustainable Development argued for improved policy coherence and reduced policy spillovers to achieve ‘economically, socially and ecologically sustainable development’. In the 2019-24 political cycle, the European Commission’s Circular Economy Action Plan emphasised that a coherent mix of policies across all stages of a product’s lifecycle can help scale up green business models and sustainable resource consumption. Similarly, the Green Deal Industrial Plan identified a coherent policy environment as a key pillar in its strategy for rolling out green technologies. Policy coherence is gaining more prominence as the Commission advances its Omnibus work to simplify the regulatory framework and reduce administrative burdens for EU businesses. In theory, a well-aligned policy mix with minimal conflicts can help ease these burdens and support the EU’s sustainability and competitiveness goals. But where do things stand today? In short, there’s been some positive developments, but more can (and should) be done – and next year’s expected Circular Economy Act would be a good starting point. Coherence in the present policy mix – it’s a mixed picture While coherence with existing EU and international policies is one of the criteria in impact assessments, in line with the Commission’s better regulation guidelines , there are very few empirical assessments of the level of coherence in the overall policy mix – and none specifically for the circular economy. A new paper (full disclaimer, co-written by this author with Valeria Zambianchi) seeks to address this gap by focusing on the EU’s circular economy policy mix as it was shaped during the 2019-24 political cycle. The analysis focuses on four sectors – electronics and ICT, batteries, automotive and critical raw materials – and drew on the experiences of business actors working within these sectors. The assessment paints a mixed picture. On average, the policies in the mix have a medium-to-high degree of coherence with each other. Importantly, at the strategic level, the European Green Deal stood out as the most coherent policy. Put simply, its long-term framework and strategic direction were seen by businesses as largely in line with the other individual policies in the mix, suggesting a strong and consistent signal to EU businesses. However, issues start to emerge one level down. Two follow-up strategies – the Chemicals Strategy for Sustainability and the EU Industrial Strategy – ranked the lowest in terms of experienced policy coherence. Moreover, four major strategies, namely the Circular Economy Action Plan, the EU Industrial Strategy, the Chemicals Strategy for Sustainability and the Green Deal Industrial Plan, all show medium-to-low levels of policy coherence with each other, which suggests their goals are not well-aligned. Issues of incoherence become more apparent when looking into how different directives and regulations in the mix interact with each other. Chemicals policies, namely the Reach Regulation and the RoHS Directive , show low-to-medium levels of coherence with several other policies, including the recently adopted Batteries Regulation , Right to Repair Directive and Ecodesign for Sustainable Products Regulation . What these tensions highlight is that the longstanding disconnect between circularity and chemicals policies persists, despite recent legislative developments. Even more eye-opening is the low-to-medium coherence between the EU Taxonomy Regulation and most of the other assessed policies in the mix, including the Critical Raw Materials Act , the EU Industrial Strategy and the Green Deal Industrial Plan. Introduced in 2020 to provide a transparent framework for defining sustainable investments, the Taxonomy Regulation has caused businesses to doubt about whether the criteria and selection of sectors are consistent with the priorities of the other policies in the mix. The Waste Shipment Regulation is another example of a policy demonstrating low-to-medium coherence, reflecting its limited alignment with various other policies. Businesses highlighted the persistent mismatch between waste transport rules and circularity objectives. They pointed to the lack of synergies between the Regulation and the EU’s industrial policy goals, particularly those that aim to boost the use of secondary raw materials stemming from the Critical Raw Materials Act. Finally, another notable finding is that many businesses perceive limited synergies between the circular economy’s objectives and those of the trade and climate policy domains. Taking steps towards a more coherent policy mix Amid ongoing discussions over the need to reduce the burden on businesses, the above findings highlight areas where sectoral and horizontal policies within the expanded circular economy policy mix have intersected and resulted in incoherence. Going forward, efforts to improve coherence should begin with the Circular Economy Act proposal – expected sometime in 2026 – that will aim to develop an EU single market for circular products and services. The Act’s upcoming impact assessment is a good opportunity to include an explicit analysis of how synergies between the various policies can be improved and conflicts avoided. This can then provide the groundwork for concrete actions to strengthen the single market for circular products and services, which would be supported by a thorough trade-off analysis. One such action could be in the domain of public procurement criteria for circular goods and services. These would need to balance climate and circularity objectives and thoroughly consider impacts across the different lifecycle stages of products. A comprehensive fitness check, like the one conducted in 2014 for the waste acquis, could also be conducted to reflect policy developments over the past decade. On top of this, an oversight cross-DG team within the Commission could be tasked with screening different legislation and promoting compatibility between different policies. Given that policy goals increasingly integrate objectives from industrial policy, competitiveness, the circular economy, and climate policy, it will also be important to send consistent signals to EU businesses. To do this, future strategies in these domains should be accompanied by a dedicated roadmap outlining how different actions impact cross-cutting areas, as well as a dedicated monitoring framework to easily track progress. This Expert Commentary is based on the journal article ‘ Unpacking policy coherence: a network analysis of the EU policy mix for the circular economy’", "wordcount": 1028}, {"source": "publication", "date": "2025-10-21T09:25:43+01:00", "title": "Implications for the global HIV response", "authors": ["Cosima Lenz", "Petra Varkonyi", "Louise Bengtsson", "Andrea Renda", "Marta Souto"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/10/MTG-Domain-HIV-3-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/implications-for-the-global-hiv-response/", "excerpt": "In 2024, an estimated 40 million people were living with HIV. While 77 % were being treated, nine million were not. Despite progress, the HIV response faces gro", "full_text": "", "wordcount": 235}, {"source": "publication", "date": "2025-10-17T14:07:50+01:00", "title": "A paradigm shift in global health and multilateral funding", "authors": ["Cosima Lenz", "Petra Varkonyi", "Louise Bengtsson", "Andrea Renda"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/10/JVw27ojn-MInd-The-Gap-–-ODA-and-Financing-2-oct.15.2025-3-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-paradigm-shift-in-global-health-and-multilateral-funding/", "excerpt": "Global development assistance has traditionally focused on reducing poverty and boosting economic growth with health as a core area of investment. Over the past", "full_text": "", "wordcount": 282}, {"source": "publication", "date": "2025-10-16T15:35:04+01:00", "title": "Study on the effectiveness of the framework for corporate governance underpinning the quality of corporate reporting", "authors": ["Apostolos Thomadakis", "Agustina Korenblit", "Jelmer Nagtegaal"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/10/study-on-the-effectiveness-of-the-framework-for-corporate-EV0125007ENN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/study-on-the-effectiveness-of-the-framework-for-corporate-governance-underpinning-the-quality-of-corporate-reporting/", "excerpt": "Corporate governance refers to the relationships and structures through which company objectives are established, monitored, and achieved. It serves as a key fo", "full_text": "", "wordcount": 202}, {"source": "publication", "date": "2025-10-14T15:17:10+01:00", "title": "EU Capital Flows: latest Developments from a Global Perspective (2024)", "authors": ["Cinzia Alcidi", "Farzaneh Shamsfakhr", "Judith Arnal", "Damir Gojsic"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/10/CEPS-K_flows-2024_Final_final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eu-capital-flows-latest-developments-from-a-global-perspective-2024/", "excerpt": "The EU's economic resilience continues to be tested by a volatile global environment. While inflationary pressures have eased and monetary policies have stabili", "full_text": "", "wordcount": 202}, {"source": "commentary", "date": "2025-10-14T09:25:06", "title": "Finance Europe is a well-intentioned label but it misses the structural point", "authors": ["Judith Arnal"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/finance-europe-is-a-well-intentioned-label-but-it-misses-the-structural-point/", "page_url": "https://www.ceps.eu/finance-europe-is-a-well-intentioned-label-but-it-misses-the-structural-point/", "excerpt": "In June 2025, seven EU Member States (namely France, Spain, Luxembourg, the Netherlands, Estonia, Germany and Portugal) launched Finance Europe , a voluntary label for retail financial products that invest at least 70 % of their portfolio in assets of the European Economic Area, …", "full_text": "In June 2025, seven EU Member States (namely France, Spain, Luxembourg, the Netherlands, Estonia, Germany and Portugal) launched Finance Europe , a voluntary label for retail financial products that invest at least 70 % of their portfolio in assets of the European Economic Area, which includes the EU, plus Iceland, Liechtenstein and Norway. The initiative seeks to address a widely cited figure from last year’s Letta report – that EUR 300 billion of European household savings are channelled abroad each year, largely to the US. The underlying assumption is that capital is fleeing the EU because of fragmented capital markets and that a common label would help to retain savings within Europe. This initiative is politically appealing but economically flawed. Both the diagnosis and the proposed remedy rest on fragile foundations. Labelling savings products will not reverse macroeconomic realities, nor will it address the core problems affecting EU capital markets. Worse still, it risks institutionalising suboptimal investment behaviour, undermining investor welfare in the process. The EUR 300 billion figure doesn’t result from market dysfunction or financial misbehaviour. Rather, it reflects structural macroeconomic balances. The EU has consistently maintained a current account surplus, except in 2022, when the EU registered a current account deficit due to the energy crisis. Since the EU also runs a structural public deficit, this implies that the private sector saves more than it invests domestically. Logically, that means that the excess savings must be invested abroad. Retaining these funds within the EU would require either reducing the public deficit or giving up the current account surplus. This is the essence of the macroeconomic trilemma: the EU cannot have all three –a public deficit, a current account surplus, and fully retaining private savings. Moreover, the narrative that fragmentation is the primary obstacle to capital market development in the EU is misleading. The true challenge is underdevelopment , not disintegration. Countries such as Sweden, Denmark and the Netherlands have developed vibrant capital markets despite operating within the same European framework. Meanwhile, other Member States continue to suffer from shallow capital markets and haven’t developed the institutional infrastructure to foster equity-based financing or retail investment. Encouraging investments in European assets The Finance Europe label aims to increase retail investors’ participation in capital markets while also encouraging them to mostly invest in European assets. These goals aren’t mutually exclusive, but they’re far from being complementary. In fact, they pull in opposite directions. Effective retail participation requires simplicity, flexibility and – most importantly – attractive risk-adjusted returns. Mandating that 70 % of investments should be allocated to European assets doesn’t support these goals. Quite the opposite, as it reduces diversification, increases portfolio volatility, undermines returns and could even lead to financial instability. Evidence from simulated investment strategies over the period 2005-25 clearly illustrates the trade-off. A European-biased portfolio, equally weighted across major EU indices, delivers an annualised return of 3.73 % with a volatility of 20.91 %. In contrast, a more diversified portfolio, equally weighted between the EU (50 %) and the US and Asia (50 %), yields a 5.61 % return with only 16.49 % volatility. Thus, promoting a European home bias not only contradicts established principles of modern portfolio theory but also imposes tangible costs on investors. This isn’t merely a theoretical concern. Home bias is a well-documented behavioural phenomenon across European households and even among institutional investors. Promoting it through policy undermines decades of investor education efforts. If anything, policy should be correcting this bias – not reinforcing it. Real-world examples reinforce this argument. The French Plan d’Épargne en Actions (PEA) and Italian Piani Individuali di Risparmio (PIR) schemes, which also impose geographical restrictions, have failed to attract significant participation. The PEA accounts for around 3.5 % of French GDP; the PIR for just 0.8 % of Italy’s. By contrast, Sweden’s ISK account, which has no geographic limits, accounts for 27 % of Swedish GDP. Half of all Swedish adults hold an ISK. Its success stems from its simplicity, flexibility and neutrality – not from any patriotic appeal to invest locally. Too many objectives, not enough tools The Finance Europe label also suffers from design and governance shortcomings. The eligibility criteria are vague, the legal basis is weak, and no agreement has been reached on tax incentives. It’s telling that even this limited coalition of countries failed to align their fiscal frameworks. There’s also a broader concern. Initiatives like Finance Europe are being deployed to achieve far too many objectives at once – mobilising savings, supporting EU strategic autonomy, fostering capital markets, and preserving political cohesion. A modest tool like a savings label cannot credibly deliver on all these fronts. Overburdening it with too many goals will only set it up for inevitable failure. If the EU genuinely wants to retain more private savings within its borders, the solution lies elsewhere. First , it must confront the macroeconomic trilemma head-on and decide which objective to get rid of. Second , it must enact structural reforms that enhance the competitiveness and attractiveness of European firms and markets. Only then will European assets be able to compete on their own merit. And third , it must learn from successful national models that offer neutral, simple fiscal incentives and avoid geographic constraints. The European Commission’s Recommendation on Savings and Investment Accounts, published on30 September 2025, adds an important layer to this discussion. It seeks to create a neutral and transparent framework for channelling household savings into productive investment, built on simplicity, portability and fiscal efficiency, and explicitly avoids any form of geographic allocation bias. In contrast, the Finance Europe label introduces precisely such a bias. More importantly, it was launched only a few months before the Commission’s initiative, under a new and still loosely defined governance setting — the so-called Competitiveness Lab. It therefore remains unclear whether this initiative genuinely complements the Commission’s efforts to build a coherent Savings and Investment Union, or whether it risks blurring objectives and fragmenting Europe’s emerging policy framework in this area. Policy should focus on enabling European households to invest more, and better, not merely to invest more in the EU. Until this distinction is properly understood, initiatives like Finance Europe will remain symbolic gestures rather than transformative solutions. This Expert Commentary is based on a full analysis in Spanish for Fedea (Fundación de Estudios de Economía Aplicada), which can be found by clicking this link .", "wordcount": 1062}, {"source": "commentary", "date": "2025-10-13T14:35:37", "title": "The EU is walking a fine line between simplification and deregulation", "authors": ["Apostolos Thomadakis"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/the-eu-is-walking-the-fine-line-between-simplification-and-deregulation/", "page_url": "https://www.ceps.eu/the-eu-is-walking-the-fine-line-between-simplification-and-deregulation/", "excerpt": "The EU has entered its simplification moment. After a decade of head-spinning rulemaking, the European Commission is now applying simplification more directly to financial regulation, all in the name of competitiveness. However, the real question isn’t whether simplification is n…", "full_text": "The EU has entered its simplification moment. After a decade of head-spinning rulemaking, the European Commission is now applying simplification more directly to financial regulation, all in the name of competitiveness. However, the real question isn’t whether simplification is needed – it is. The real question is whether what’s being flown under that banner is actually deregulation by stealth. For months the Commission insisted the Omnibus packages would not chip away at core policy goals. President Ursula von der Leyen put it bluntly on 1 October in Copenhagen: we need simplification and deregulation and the Omnibuses should set the example. Her candour is welcome. But it’s also risky. In short, a semantic hedge just became a political choice. Smart simplification makes rules workable, reduces compliance costs and speeds up investment. Bad deregulation does the opposite. It blunts the EU’s ability to meet its aims by salami-slicing scope, allowing deadlines to slip or weakening enforcement. Much of the fight over Omnibus sits right on that edge. What’s in the Omnibus – and why the wording matters The Commission’s Simplification Package promises burden cuts – 25 % overall and 35 % for SMEs – by scrubbing duplications, aligning reporting calendars and harmonising definitions across the CSRD, CSDDD, the EU Taxonomy, CBAM and investment rules. That’s good, legitimate housekeeping. Yet several ideas go beyond housekeeping. Stop-the-clock delays, narrower scopes and lighter obligations risk hollowing the architecture rather than streamlining it. If the same objective cannot be met on time or at the intended scale, then the line has been crossed. That’s not simplification but deregulation. Language gives the game away. Simplification answers how we achieve agreed goals. Deregulation reopens whether we still intend to meet them with binding discipline. To be fair, not all redesign equals rollback – rules sometimes need to be recast or recalibrated as priorities, technology or consumer behaviour change, and those cases often blend simplification with re-regulation. This commentary focuses on intent and effect: the first trims friction and the second trims ambition. The wider context – voluntary virtue is running out of road The Net-Zero Banking Alliance’s (NZBA) recent collapse underscores a broader shift . Voluntary coalitions cheered in 2020-22 as proof that markets could self-coordinate to deliver public goods, are straining under political pushback and legal risk. As global banks stepped away, commitments softened and then faded. When voluntary discipline loses credibility, the temptation is to relax rules, not harden them, especially when competitiveness anxiety bites. To be clear, market self-regulation can help – provided it’s anchored in clear public standards, transparent metrics and independent monitoring. Otherwise, it too often devolves into a race to the bottom. That’s why the Commission should choose between two paths: rebuild credible, workable rules that achieve objectives at a lower cost; or slide into deregulation that lightens paperwork while hollowing out substance. The former is difficult but salvageable. The latter is easy but expensive in the long run. A practical test – four questions to separate simplification from deregulation Policymakers need a bright-line test they can apply measure by measure. Start with objective integrity: after the change, can the original objective still be met on the same path – or on a transparently recalibrated one? If not, it’s deregulation. Then ask whether the change removes process friction (e.g. duplicate reports, misaligned timelines, inconsistent definitions) or lowers the standard through narrower scope, weaker thresholds or fewer obligations; the first is simplification, the second deregulation. Next, weigh net benefits: do quantified burden cuts exceed transition costs without dumping costs on citizens or externalising risks such as climate, safety or financial stability? That requires an evidence-based impact assessment with clear dates and baselines; if the gain depends on diluted enforcement or open-ended delay, it’s deregulation. Finally, test enforcement credibility: can supervisors still monitor and enforce effectively under the revised rules? If enforcement becomes impractical or toothless, you’ve deregulated by stealth. Applied to the Omnibus, some elements clearly pass – harmonised data fields, fewer duplications, aligned calendars. Others don’t – broad delays, carve-outs that shrink coverage, provisions that turn binding duties into best-efforts guidance. The Commission frames the agenda as reducing burden for competitiveness. Fine – that’s the aim of simplification. But it’s not a license for deregulation. Five guardrails for pro-competitiveness, pro-standards simplification If the EU wants to set a good example, it should lock in guardrails that stop simplification from becoming rollback . First, do-no-harm clauses . Each change should state explicitly that it won’t reduce the probability of meeting treaty-level or legislated goals (from the 2030/2050 climate goals to prudential soundness and consumer protection). If it would reduce the probability, then recalibrate the objective out in the open – don’t smuggle it through technical fixes. Second, time-bounded relief with sunsets . Where delays are justified by capacity constraints or tooling, set automatic sunsets and pre-announced re-entry dates. No rolling extensions that sap credibility. Third, single-window reporting with common data layers and end-to-end digitalisation of compliance and enforcement . Replace duplicative templates with one collection point and common taxonomies across laws . Cut cost without cutting standards. Together, these steps are the fastest route to the promised 25-35% burden reductions, better data quality and quicker, more effective enforcement. Fourth, adopt only legislation that can be (cost-)effectively enforced . Require co-signatures from the supervisors who must implement the change, plus an operational note on inspection modes, data neds, thresholds and resourcing. If enforcement cannot scale, it’s not simplification. Finally, create a Simplification Scorecard run by an inter-institutional panel with external reviewers such as ESMA, EBA and EIOPA. Rate each change against the four-question test. Publish ex-ante and ex-post evaluations. Track whether burden cuts are achieved without weaker outcomes. Competitiveness needs better rules, not thinner ambition Europe’s competitiveness gap is real. The answer isn’t to trade away standards that anchor long-term investment. Capital – especially institutional capital – prefers stable, enforceable rules to oscillating political signals. The fastest route to private investment is not the lightest rulebook. It’s the clearest and most predictable one. That’s why words matter. If regulatory reform means pruning duplication, aligning calendars and clarifying scope, then call it simplification. If it signals looser commitments, then the EU risks backsliding to pre-crisis reflexes that bred fragility instead of dynamism. The collapse of voluntary climate coordination should stiffen our resolve to make binding frameworks work better, not to unspool them. The Omnibus can still be the right kind of reform – surgical, technical and objective-preserving. That requires discipline that slogans cannot replace. Clear evidence, public scorecards and the honesty to admit when simplification crosses the line. The EU doesn’t need fewer goals. It needs fewer hoops to reach them – and more trust that the hoops that remain still actually mean something.", "wordcount": 1119}, {"source": "commentary", "date": "2025-10-08T14:49:43", "title": "Undermining trust, not toppling the Commission – the European Parliament’s fringes have rediscovered the censure motion", "authors": ["Sophia Russack"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/undermining-trust-not-toppling-the-commission-the-european-parliaments-fringes-have-rediscovered-the-censure-motion/", "page_url": "https://www.ceps.eu/undermining-trust-not-toppling-the-commission-the-european-parliaments-fringes-have-rediscovered-the-censure-motion/", "excerpt": "On 10 July, the European Parliament (EP) rejected a censure motion against the European Commission. Only three months later, on Thursday 9 October, another two motions are set to be voted on – one from the far-right PfE group and one from The Left group. Both target the Commissio…", "full_text": "On 10 July, the European Parliament (EP) rejected a censure motion against the European Commission. Only three months later, on Thursday 9 October, another two motions are set to be voted on – one from the far-right PfE group and one from The Left group. Both target the Commission’s recent trade actions, while The Left is also criticising the Commission’s lack of action over Gaza. While Ursula von der Leyen will easily survive the EP’s upcoming censure motion, the increasing pressure from the fringes might still diminish her credibility in the long run. What’s similar to last time? The underlying issues haven’t changed. Overall, this remains a proxy battle , where the goal is to throw a spanner in the works. What the PfE wants is not what’s in the text. Just as it wasn’t really about vaccine procurement last time, it’s not about the US trade deal this time either. Their aim is once again to undermine trust in the Commission and – more broadly – the EU. They want to destabilise the system and expose its deficiencies, strategies straight out of the populist playbook. Like last time, the centre-left wants to pull the EPP away from the far right. However, while von der Leyen’s recent speeches seemed to appease the centre-left, EPP President Manfred Weber’s intervention right after the State of the Union criticising the S&D did raise some eyebrows. Even though he took a different course in his intervention on Monday , it made clear that, even if one were to take her words at face value, she remains dependent on Weber to implement them, and he’s quite determined to push through the conservative agenda with whatever majorities he can cobble together. What’s different to last time? What’s changed is that the centre-left isn’t applying the same pressure as last time to extract concessions from the Commission. They want to give von der Leyen some room to deliver on her promises in the upcoming Work Programme negotiations — though scepticism is growing that she’ll be able to do so, for the reasons mentioned above. What’s also different is that there are two motions this time and one comes from the opposite end of the spectrum. While The Left motion appears more genuinely motivated by substance (on Gaza, trade and the failure to tackle the social and climate crises), it too remains largely an anti-establishment gesture rather than a strategic attempt to achieve a certain outcome. Also, these motions are being tabled by political groups this time, unlike the previous one , which was submitted by an individual ECR member who had to canvass support across the far-right spectrum and among non-attached MEPs to reach the required 72 signatures. This gives the current motions more weight, as they can draw on their groups’ resources. What’s also remarkable is the timing – only three months separate the two latest attempts from the first. For comparison, since the first motion in 1972, there have been 15 in total, with three now being within just three months of each other. So, why now? For the far right, simply because they can – waiting more than two months allows them to avoid the stricter signature requirement (for under two months, they would need a fifth of all MEPs to sign). For The Left, they seem driven by the far right’s activism and French domestic politics. Will it be successful? No, it won’t – at least not in toppling the Commission. The censure motion isn’t designed to send the Commission home for political reasons, as the high vote threshold of two-thirds of all MEPs demonstrates. It would require a double majority (i.e. two-thirds of votes, representing at least half of the total 720 MEPs) votes against her, which is highly unrealistic. Last time, the motion received 175 votes and while it’s likely The Left has persuaded a few individual centrist MEPs, this number won’t be reached. Nonetheless, there will be after-effects. First, MEPs’ support may be slipping. It’ll be important to observe how the vote goes. When von der Leyen was elected by the EP in July 2024, she received 401 votes; when her College was confirmed in November 2024, the number dropped to 370; and in July 2025, only 360 MEPs voted in her favour. It’ll be that figure, not the number of votes for the motion, that will be the one to watch on Thursday. What will also be interesting is whether MEPs from the PfE will support The Left’s motion – and vice versa. A classic way to express dissatisfaction, without actively opposing von der Leyen, is to abstain, which we also saw last time. While the number of formal abstentions was as low as 18, many MEPs simply stayed away from the plenary or refrained from pressing any button at all. The second after-effect could be on public opinion. With each motion, the impression that ‘something must be wrong’ may start to take hold among – at least some – citizens. And there’ll probably be even more motions in the years to come. A new generation of censure motions The censure motion has, since the 1990s, been a tool mostly used by the far right, so their current involvement is nothing new. What does seem different with this ‘new generation’ of 2025 motions, however, is their strategy. Previously, such as in 2005 and 2014 when Nigel Farage and the EFDD group triggered the last two pre-2025 motions, they mainly showed discontent and highlighted their activism to their national constituencies. Today, the far right appears to be aiming for broader impact — not only engaging with their national audiences but also seeking to undermine trust in the Commission and challenge the EU institutions’ legitimacy. They’ve also quite cleverly adjusted their comms strategy and are now presenting themselves as ‘defenders’ of not only citizens but even the EU’s interests. The PfE now portrays the EU as not doing enough to protect citizens – against Trump, against tariffs and against free trade deals. Their previous rhetoric focused primarily on national sovereignty and opposing the EU itself. So, it’s unprecedented to hear them accuse the Commission of undermining citizens’ trust in the EU itself and endangering its interests. And this is why this week’s censure motions mark a significant shift – from previously challenging the EU’s existence in an expression of futile protest to now actively contesting who should be running it.", "wordcount": 1069}, {"source": "publication", "date": "2025-10-08T10:56:24+01:00", "title": "Assessing regulatory approaches to gatekeeper participation in EU open finance", "authors": ["Judith Arnal", "Fredrik Andersson"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/10/FIDA-and-digital-gatekeepers-ECRI-In-Depth-Analysis.pdf", "page_url": "https://www.ceps.eu/ceps-publications/assessing-regulatory-approaches-to-gatekeeper-participation-in-eu-open-finance/", "excerpt": "The Financial Data Access Regulation (FIDA) is entering a decisive phase in negotiations. FIDA is the EU’s attempt to expand data portability in financial servi", "full_text": "", "wordcount": 195}, {"source": "commentary", "date": "2025-10-07T15:57:15", "title": "Equitable partnerships are key to ensuring global health security – and here’s why", "authors": ["Cosima Lenz", "Louise Bengtsson", "Marta Souto"], "topics": ["Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/equitable-partnerships-are-key-to-ensuring-global-health-security-and-heres-why/", "page_url": "https://www.ceps.eu/equitable-partnerships-are-key-to-ensuring-global-health-security-and-heres-why/", "excerpt": "Global health security, including pandemic preparedness, is a global public good and that’s why it requires collective action. No one can go at it alone. The EU is uniquely positioned to drive stronger domestic and international collaboration, a role it reaffirmed in 2022 and 202…", "full_text": "Global health security, including pandemic preparedness, is a global public good and that’s why it requires collective action. No one can go at it alone. The EU is uniquely positioned to drive stronger domestic an
