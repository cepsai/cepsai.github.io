 Most US online platforms (Microsoft, Yahoo, Google, Facebook, PalTalk, YouTube, Skype, AOL and even Apple) were already providing extensive data to the NSA’s PRISM programme by 2012, as the Snowden data made clear. It would also be naïve to suppose that US law prevents personal data collected by US firms to be turned over to US national security services. US law enforcement can for the most part be relied on to comply with US law – they may eventually need to use their surveillance results in court, and they would then have to convince a judge that the data was collected lawfully. US national surveillance authorities are under no equivalent constraint. In the past, it’s fairly certain that US national surveillance did not comply with then-current US law (FISA). As in most developed countries, US law generally permits data collection from US citizens and others inside the country but only where there is a credible basis for suspicion. Lawsuits (in which this author was involved) make clear that US intelligence services were already capturing data in 2002-03 from tens of millions of American internet users, presumably without adequate legal justification and thus flagrantly violating then-current US law. The US responded to the lawsuits not by producing evidence to show that the surveillance was legal (presumably because this wasn’t the case) but rather by enacting a law (the 2008 FISA Amendments Act) that granted retroactive immunity to firms that might have been improperly gathering the data under colour of law. Since 2018, American law (specifically the CLOUD Act ) has also empowered the US government to force private firms to provide personal data irrespective of whether it’s stored in the US or abroad, providing firms with only limited means to challenge the government’s demands. Finally, how far current US law protects Europeans against abuse by US surveillance authorities isn’t entirely clear. The Obama and Biden administrations signed Executive Orders to try to address EU concerns over the use of Europeans’ personal data, as expressed in the Court of Justice’s Schrems I and Schrems II decisions, but how much confidence one should have in those Executive Orders should be neither less nor greater than one’s confidence in the current President. An Executive Order issued by one president can be amended or rescinded by the next. And Executive Orders, especially those relating to national security, are not always made public – we wouldn’t necessarily know if US law changed in ways that were harmful to EU security interests. Under Trump, we simply cannot rely on the US adhering to previous Executive Orders. Mitigating this exposure as individuals, firms and governments Such exposure might be more relevant for some more than others but most of us can’t assess accurately how our data might be used by an adversary to the EU. We might not even pay attention to which data is backed up and might not notice if more than we requested were being taken. Furthermore, modern AI tools are getting progressively better at combining data from multiple sources. That’s why it would be ideal for all of us in the EU to either use cloud backup services that store backup data only within the EU, without foreign ownership or control that could imply risk – or alternatively to backup to offline storage that’s fully under our control. However, changing might not be easy… or cheap. Cloud backup is popular because it does have some real advantages. Large volumes of storage are available, the services are professionally managed, they benefit from huge economies of scale and scope, and the storage is off-site. But it may still be necessary to forego these advantages, at least for some of us. Beyond individual choice, EU policymakers need to step in. First, security/cybersecurity experts need to undertake a new hard-headed threat assessment reflecting the new practical and geopolitical realities. Second, for those who need to change how they do backups based on that threat assessment – and for those who choose to change – a new certification scheme at EU level is needed that identifies safe and reliable providers and methods.", "wordcount": 1078}, {"source": "publication", "date": "2025-04-02T10:48:16+01:00", "title": "Towards a European digital services tax: renewing the momentum for a fair contribution", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/2025_04_FMI-Toward-a-European-digital-tax-1-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/towards-a-european-digital-services-tax-renewing-the-momentum-for-a-fair-contribution/", "excerpt": "The rapid growth of the digital economy has disrupted traditional tax frameworks, which rely on physical presence. Many digital firms generate substantial reven", "full_text": "", "wordcount": 322}, {"source": "publication", "date": "2025-04-02T09:47:03+01:00", "title": "Unpacking the fediverse", "authors": ["Paula Gürtler"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/2025-02_DSA_Fediverse-Explainer_FINAL-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/unpacking-the-fediverse/", "excerpt": "With the growing number of users on alternative social media platforms, such as Threads, Mastodon and Bluesky, the notion of ‘federated’ platforms and how legal", "full_text": "", "wordcount": 351}, {"source": "commentary", "date": "2025-03-26T16:02:43", "title": "The EU’s competitiveness drive could turn quality jobs into a mirage", "authors": ["Davide Monaco"], "topics": ["Employment & Social Affairs", "Internal Market Industry Entrepreneurship And Smes"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/the-eus-competitiveness-drive-could-turn-quality-jobs-into-a-mirage/", "page_url": "https://www.ceps.eu/the-eus-competitiveness-drive-could-turn-quality-jobs-into-a-mirage/", "excerpt": "In the wake of the Draghi report and the EU Competitiveness Compass, ‘competitiveness’ is again dominating debates about the present and future of EU economies and societies, despite being long criticised as an elusive concept or a dangerous (and wrong ) obsession. This is hardly…", "full_text": "In the wake of the Draghi report and the EU Competitiveness Compass, ‘competitiveness’ is again dominating debates about the present and future of EU economies and societies, despite being long criticised as an elusive concept or a dangerous (and wrong ) obsession. This is hardly new. The search for competitiveness has shaped EU integration and policy discussions for at least three decades . It was already at the heart of the 1993 White Paper on ‘Growth, Competitiveness and Employment’ and the 2000 Lisbon Strategy . A decade later, the drive for competitiveness underpinned how the eurozone debt crisis was managed , legitimising austerity, wage restraint and the rise of precarious work in many countries. This time, we’re being assured that competitiveness will bring about ‘good jobs’ and won’t come at the expense of wages and workers’ wellbeing. But will this really be the case? If recent developments are any guide, we have some very good reasons to be skeptical. Skills and quality jobs – lost in the Compass In the Competitiveness Compass, despite the initial claim that ‘[i]ncreasing competitiveness and productivity will go hand in hand with empowering people’, skills and quality jobs only make their first appearance on page 22 (of 26). Being included almost as an afterthought in the EU’s flagship economic strategy, combined with the lack of any legislative commitments, already suggests that they’re far from being a real priority. What’s more, the Compass doesn’t list skills and quality jobs among its key ‘imperatives’ but simply as among the ‘enablers’ of competitiveness. This shift is also evident in the recently announced Union of Skills . Although the initiative includes some positive (if still vague) measures, it falls short of proposing a right to training during work time and tends to narrowly frame reskilling as necessary for businesses’ productivity and competitiveness. Which means the message is crystal clear – businesses, and not people and workers, are seen as the agents of Europe’s prosperity. This raises a fundamental question, namely what would happen if labour protections and decent wages were found to stand in the way of competitiveness? The Commission’s recent proposal for an Omnibus Simplification Package offers an early glimpse of the answer. Regulatory ‘simplification’ and job quality – pulling in different directions The commitment to quality jobs stands in direct contrast with the Commission’s broader push for regulatory ‘simplification’. Nowhere is this tension clearer than in the Omnibus Package, which seeks to reduce companies’ reporting obligations set by the Corporate Sustainability Reporting Directive (CSRD), the EU Taxonomy Regulation, and – most relevant in this context – the Corporate Sustainability Due Diligence Directive (CSDDD). The CSDDD – which applies only to 3,400 large corporate groups in the EU (less than 0.1% of all companies) – requires firms to identify, prevent, and remedy human (including labour) rights violations and environmental impacts in their supply chains. Yet barely seven months after coming into force, the Commission is now proposing to delay its implementation by a year, reduce how often companies have to undertake regular assessments from every year to every five years, ditch civil liability for non-compliance, and limit due diligence only to direct suppliers. This rollback follows consultations with two dozen business representatives and 31 ‘practitioners’ from big EU corporations (compared to two trade union representatives and ten NGOs). The result is a package that risks significantly diluting corporate accountability at a time when stronger – not weaker – rules are needed to raise social and environmental standards. The backtracking on the CSDDD, alongside the CSRD’s reduced scope (now limited to very large companies), threatens to undermine working conditions at the lower end of supply chains, where labour standards are already under pressure. Risks concern not only workers hundreds of thousands of kilometres away but also those in our cities, peripheries and regions (including migrants ) – think of the exploitative conditions in the fashion industry’s supply chains or the construction sector . In short, while the Commission claims to prioritise quality jobs, its proposed simplification drive could potentially erode labour rights in the EU and beyond. Once again, the cost of EU competitiveness risks being borne by workers – especially those finding themselves in more precarious conditions – both in the ‘Global South’ and in Europe. Competitiveness – a means to an end or an end in itself? Thankfully, not everything is bleak. The announced Quality Jobs Roadmap and legislation on AI in the workplace could be a step in the right direction, as is the recently agreed Pact for European Social Dialogue . However, their place within the wider EU economic strategy seems ancillary at best. By presenting skills and quality jobs as ‘enablers’ of competitiveness, the Compass redefines what should be an overarching social goal – fostering workers’ personal and professional development and wellbeing – as a tool for economic performance. The underlying assumption is that productivity gains will then drive better wages and working conditions, aligning competitiveness with job quality. Even so, this is far from guaranteed. Much depends on social and power dynamics, as well as on policy choices that are largely absent from the Compass and the wider debate. Formulating skills and quality jobs as competitiveness ‘enablers’ occurs within a broader shift within the Compass. At the outset, competitiveness has been framed as the silver bullet for solving all of Europe’s economic and social woes – which would then in theory lead to higher incomes and stronger social protection. However, competitiveness gradually morphs throughout the document into the ultimate goal of policy action. This reaches a climax in the last section, which solemnly declares that ‘[t]he next years’ North Star must be the renewal of Europe’s competitive strength’. In this context, every other objective – be it environmental sustainability, social welfare and inclusion, and respect for human and labour rights – is implicitly subordinated to the overarching objective of boosting competitiveness. The risk is that job quality is only prioritised to the extent that it enhances competitiveness , potentially limiting policy commitments to labour rights and protections that don’t align with this logic – as with the Omnibus Simplification Package. This framing matters. As discourse experts remind us , language and narratives can become naturalised, shape our worldviews and – most importantly – narrow public debate, shuttering any space for alternatives. With competitiveness becoming the be-all and end-all of EU policymaking, social progress and workers and citizens’ welfare should instead be Europe’s North Star. That’s why it’s time to reopen the debate on how we can achieve this broader social goal.", "wordcount": 1088}, {"source": "commentary", "date": "2025-03-25T08:55:28", "title": "Europe’s retail payments are a success story – we need to keep it that way", "authors": ["Judith Arnal", "Fredrik Andersson", "Beatriz Pozo"], "topics": ["Economy & Monetary Affairs", "Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/europes-retail-payments-are-a-success-story-we-need-to-keep-it-that-way/", "page_url": "https://www.ceps.eu/europes-retail-payments-are-a-success-story-we-need-to-keep-it-that-way/", "excerpt": "We’re undergoing a global transformation marked by competition for resources, value chain shifts, geopolitical tensions, humanitarian crises, climate change and demographic challenges. This shifting landscape is forcing EU leaders and businesses to rethink their strategies. The L…", "full_text": "We’re undergoing a global transformation marked by competition for resources, value chain shifts, geopolitical tensions, humanitarian crises, climate change and demographic challenges. This shifting landscape is forcing EU leaders and businesses to rethink their strategies. The Letta and Draghi reports in particular urged the EU and its Member States to act – rethink governance, remove barriers to innovation, address productivity gaps, simplify legislation and ease compliance burdens. But if the EU wants to face to these new challenges and emerge stronger, its financial sector needs to be resilient and competitive – and the retail payments system is a crucial part of the financial sector. It underpins economic activity, facilitates cross-border transactions and supports financial stability. In short, it’s one of the foundations of Europe’s digital and economic sovereignty. Recently, the payments sector has experienced significant transformation driven by digitalisation, rapid technological changes and evolving consumer expectations. That’s why it’s essential to take a forward-looking approach and fully take advantage of the ‘payments revolution’. The good news is that Europe’s payments landscape is dynamic well-functioning, and increasingly innovative and competitive. Yet it has started to lose ground in terms of reach and scalability, as some key players only operate within their national borders rather than EU-wide. This means that Europe could remain fragmented in a world where scale, speed and technological leadership define success. Regulation’s important role Although changes have mainly been driven by market dynamics and private initiatives, they’ve also been significantly supported by public policy and legislative developments. In 2008, European authorities asked the payments industry to collaborate on developing the Single Euro Payments Area (SEPA). The following year, the Payment Services Directive (PSD) was implemented, introducing a legal foundation for payments within the single market. Following the PSD’s success, the European Commission sought to take payment services to the next level by introducing a revised Payment Services Directive (PSD2), driving innovation to create a customer-centric payment ecosystem. In 2018, the Eurosystem launched the TARGET Instant Payment Settlement (TIPS initiative) that allows for ‘real time’ payments throughout the euro area. Instant payments have also been promoted by the European Commission through the new Instant Payment Regulation , adopted in March 2024. Given regulation’s critical role in ensuring a resilient, competitive, innovative and fair European payments landscape, it’s now essential that EU leaders and co-legislators establish a new and visionary European payments policy. Legislatively, this requires clear Level 1 texts (i.e. primary legislation) and avoiding Level 2 measures (i.e. secondary legislation) if political agreement can’t be reached. It’s also crucial to uphold the 2016 principle of assessing the impact of substantial legislative amendments, particularly if they risk increased costs, unintended consequences or undermine simplification efforts. Harmonisation should be a priority, removing national opt-outs and discretion from draft legislation while ensuring a consistent approach among national competent authorities. Beyond legislation, governance requires a more strategic and collaborative vision between the public and private sectors. This could be achieved through a high-level forum where European and national public institutions engage directly with the private sector. Regardless of how it’s done, fostering dialogue would be key to aligning regulatory objectives with market dynamics. Don’t forget strategic autonomy… Then there’s strategic autonomy. Non-European card schemes dominate card payments and are the only payment solutions besides cash that can be used across Europe. But fostering strategic autonomy is not about restricting international providers but rather ensuring that Europe’s payments landscape is both diverse and resilient. That’s why one of the European Commission’s objectives in the 2020 Retail Payment Strategy is that ‘competitive home-grown and pan-European payment solutions are available at POS’ . Since then, new options have been brought to the table, namely the digital euro project and industry-led initiatives, including the European Payments Alliance (EuroPA) and the European Retail Payments Framework. To guarantee effective implementation and to avoid duplicating resources and investment, it’s crucial that the digital euro uses already-existing European technical, operational and financial infrastructure. It should also use public and private standards where they already exist and develop new open standards to enable interoperability with other payment schemes and solutions. Industry-led initiatives, meanwhile, should be encouraged by promoting interoperability and standardisation. This requires investing in harmonised standards and infrastructure to ensure seamless integration between payment systems, which requires collaboration between public and private stakeholders. While access to technologies like Near-Field Communication and Secure Elements has improved, it should be assessed whether additional measures under PSR/PSD3 could further enhance fair access. Fighting fraud and stimulating consumer trust For retail payments to remain reliable, strengthening fraud prevention and consumer protection is also a must. Changes in the payments landscape and evolving consumer habits have led to new forms of fraud, with social engineering and phishing attempts becoming increasingly prevalent. While PSD2 continues to offer consumer protection, it’s gradually becoming outdated and unable to tackle modern fraud tactics that have increasingly developed sophisticated ways to circumvent existing rules. To combat fraud, we need stronger collaboration among all stakeholders. Fraud-sharing mechanisms – such as EU-wide anti-fraud task forces and the ERPB’s working group on fraud prevention – should be expanded to facilitate intelligence sharing between payment service providers, electronic and digital service providers, and law enforcement, while making sure privacy standards are upheld. Liability should also be distributed proportionately across the entire value chain. However, regulation should go beyond liability allocation and place greater emphasis on preventive measures. Finally, increasing consumer and merchant awareness, knowledge and confidence is essential. Developing tools such as recognisable trust marks, badges or IDs for verified PSPs can play a crucial role here. It’s particularly important to build trust because no payment solution can ever be successful without widescale consumer uptake. Consumers are also often unaware of the costs associated with different payment methods. Transparent, comparable and equitable cost structures would help drive the adoption of modern payment solutions. Enhancing cost transparency will improve financial literacy and enable both merchants and consumers to make more informed decisions. With all the above in mind, it’s very clear that a resilient and competitive payments system is essential for Europe’s economic strength and its strategic autonomy. But it’s not guaranteed that Europe will remain a payments leader – this must be sustained through innovation, collaboration and smart regulation. In such a rapidly evolving sector, the question is no longer whether Europe should act, but how fast it can do so. This commentary was written based on a CEPS/ECRI Task Force report on the future of EU retail payments. It gathered multiple stakeholders working within the payment sphere who participated in several extensive discussions.", "wordcount": 1089}, {"source": "publication", "date": "2025-03-25T08:50:23+01:00", "title": "The EU retail payment compass – let’s lead the way", "authors": ["Judith Arnal", "Fredrik Andersson", "Beatriz Pozo"], "topics": [], "units": [], "types": ["Task Force Report"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/20250320_Task-Force-report-on-retail-payments_formatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-eu-retail-payment-compass-lets-lead-the-way/", "excerpt": "The EU payments sector has changed significantly over the past decades. Payments have progressively become more digital to keep pace with consumer demand. The u", "full_text": "", "wordcount": 350}, {"source": "publication", "date": "2025-03-20T12:47:56+01:00", "title": "Unpredictable tariffs by the US: implications for the euro area and its monetary policy", "authors": ["Cinzia Alcidi", "Ignazio Angeloni", "Cédric Tille"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/GEM_tariffs.pdf", "page_url": "https://www.ceps.eu/ceps-publications/unpredictable-tariffs-by-the-us-implications-for-the-euro-area-and-its-monetary-policy/", "excerpt": "What are the likely consequences of  uncertain US tariffs on the euro area economy and its monetary policy? The economic literature highlights three main conclu", "full_text": "", "wordcount": 328}, {"source": "commentary", "date": "2025-03-13T16:27:23", "title": "In the plutocratic age of ‘broligarchy’, democracy is in deep trouble – but there’s still hope", "authors": ["Julia Pocze"], "topics": ["Diversity, Equity & Inclusion", "Human Rights & Justice"], "units": ["Justice & Home Affairs"], "types": [], "link": "https://www.ceps.eu/in-the-plutocratic-age-of-broligarchy-democracy-is-in-deep-trouble-but-theres-still-hope/", "page_url": "https://www.ceps.eu/in-the-plutocratic-age-of-broligarchy-democracy-is-in-deep-trouble-but-theres-still-hope/", "excerpt": "The democratic rule of law is badly deteriorating in many parts of the world and those responsible are hiding in plain sight. In fact, they’re not hiding at all, but they do pretend that their conduct supposedly benefits the public good instead of seriously harming it. A play on …", "full_text": "The democratic rule of law is badly deteriorating in many parts of the world and those responsible are hiding in plain sight. In fact, they’re not hiding at all, but they do pretend that their conduct supposedly benefits the public good instead of seriously harming it. A play on ‘oligarchy’, ‘broligarchy’ is being increasingly used to describe the influence and power of US tech billionaires not only on certain policies and legislation, but on the entire system of checks and balances that underpins the rule of law. While it’s true that a small group of billionaires and the political right have developed a symbiotic relationship across the US and also in Europe , there’s more to this story than merely condemning a few select incredibly wealthy individuals. In Europe – like everywhere else – corporate influence on policymaking has long been an issue, as lobbyists working for big companies tend to have ‘privileged access’ to decision-makers and, thanks to the millions they spend , have a more extensive impact on political outcomes. This creates a ‘two-tier’ version of democracy, where immense wealth can easily be translated into political power, reinforcing and exploiting existing inequalities across society. Meanwhile, another International Women’s Day has come and gone, with many political leaders emphasising equal rights and social justice. Their words, however, are hollow so long as moderates continue flirting with the ever-stronger extreme right and most political groups continue to accommodate corporate interests that might be diametrically opposed to justice and equality. To deliver on the grand ideals of justice, democracy and even equality – as promised in the EU Treaties, in the Charter, in national constitutions and countless political manifestos – the EU must meet the challengers to its core values head on. Instead of falling in line with the backlash against diversity, equity and inclusion (DEI), it must double-down on its supposed commitment to these principles. Bad bromance A system of government disproportionately serving the wealthiest members of society is not a democracy but a plutocracy . Such a system allows a very small minority – and the corporate giants – to push for their own interests, which tend to focus on a single thing: profit. In the meantime, the situation of those living in poverty has barely changed over the past few decades, with over 3.5 billion people worldwide living under the poverty line , while more individuals are achieving billionaire status and capitalising on the power this wealth affords. At the same time, discontent is growing in the EU, thrusting many into the waiting arms of the Eurosceptic far right. There are many reasons for this discontent but persisting inequality, poverty and the feeling of a lack of political agency are major contributors. Paradoxically, the far right, while attracting more and more voters, is also enjoying increasing support from the wealthy and influential , leading them to brandish agendas that are exclusionary to the most marginalised communities while promoting deregulation , tax cuts for the rich and defunding sectors such as R&D. The result of this political ‘marriage’ inevitably leads to a plutocratic system governed by the self-interests of those in power – which requires a systemic dismantling of the rule of law. This means quashing dissenting voices, targeting watchdogs, buying up media outlets and turning them into propaganda megaphones, spending copious amounts of money to sway election results and, of course, eliminating checks and balances . But to draw attention away from the fact their programmes remain self-serving to the core, the far right opts to use ‘weapons of mass distraction’ , giving impressionable voters red herrings to hate on instead. This includes not only women but also immigrants, transgendered folk and other marginalised communities, who are instrumentalised as a common enemy for disillusioned populations to unite against. These policies not only fail to bring about the change that led to the discontent in the first place, but they merely reinforce a political system that leaves much of the population behind. Instead, the real threat to the survival of the democratic rule of law and equal rights for all is not DEI , affirmative action or the ‘welfare state’. It’s the economic-political system that increasingly values profit over people. If only corporate interests shape our world, then there won’t be democracy and there surely won’t be any social justice. Yet water is the lord For now, the EU is hanging on – albeit the possible descent into a full-blown plutocracy hangs over our heads like the Sword of Damocles. There’s a lot that the EU can do though. The uncompromising enforcement of key laws, such as the GDPR and the DSA would help check big tech. Additionally, the Commission should start cracking down on governments that constantly violate the rule of law and other Article 2 principles by triggering Article 7(2) TEU and suspending their voting rights. The EU must also shift gears on ‘equality’. Instead of withdrawing legislative proposals like the long-stalled Equal Treatment Directive and seemingly treating the equality portfolio as an afterthought , the Commission must reverse course while it still can. This means adopting stronger measures and strategies in the realm of gender equality, anti-racism and LGBTIQ+ inclusion as a matter of protecting EU values , while re-committing to support civil society and citizens’ participation . Yet the EU cannot fully eradicate the plutocratic nightmare and it’s not even certain whether it really wants to. Parts of the centre and the right-wing moderates have consistently been sliding further to the right . There are also multiple Member States with the far right in the driver’s seat or part of a coalition, while corporate-driven corruption scandals within the EU institutions keep popping up like mushrooms. So, what’s left once the far right isn’t on the fringes anymore but centre stage? When the EU institutions become dominated by those who want to abolish the rule of law rather than uphold it? When there’s no more cordon sanitaire ? In the 1840s, a firebrand Hungarian poet, Sándor Petőfi , published a poem meant to remind the ‘common folk’ of their power to demand change, likening them to a great ocean, visualising the oppressors as a boat riding its waves. As the poem aptly paints it, no matter how big the boat – and how rich its owners – it’s still the water that rules. This is where the light comes in – in our power as citizens, as voters, as advocates for justice. The mighty sea can topple any ship – and while the influence of wealth and corporate interests may seem irreversible, there’s unprecedented strength in numbers. Even during deeply uncertain times, if we’re all willing to fight for our fundamental values, there’s always hope. For the third year in a row, CEPS is marking International Women’s Day on 8 March with a special short series of Expert Commentaries to highlight the insights and expertise of some of our most talented female researchers.", "wordcount": 1157}, {"source": "commentary", "date": "2025-03-13T11:20:08", "title": "With the US leaving the WHO, Europe must urgently increase its global leadership in health preparedness – not weaken it", "authors": ["Alice Orlandini"], "topics": ["Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/with-the-us-leaving-the-who-europe-must-urgently-increase-its-global-leadership-in-health-preparedness-not-weaken-it/", "page_url": "https://www.ceps.eu/with-the-us-leaving-the-who-europe-must-urgently-increase-its-global-leadership-in-health-preparedness-not-weaken-it/", "excerpt": "Five years on, Covid-19 taught us the hard way, that health crises can turn our lives upside down overnight – forcing lockdowns, halting even the world’s strongest economies but, most importantly, killing millions . The pandemic exposed the weaknesses of the most advanced healthc…", "full_text": "Five years on, Covid-19 taught us the hard way, that health crises can turn our lives upside down overnight – forcing lockdowns, halting even the world’s strongest economies but, most importantly, killing millions . The pandemic exposed the weaknesses of the most advanced healthcare systems – including the EU’s – and demonstrated that unilateral actions are a losing strategy when it comes to tackling cross-border health threats. It became clear that preparedness and prompt, coordinated responses are the crucial ingredients in a successful approach. This is even truer since Covid-19 is unlikely to be an isolated event. Future pandemics are inevitable due to climate change, deforestation and the loss of biodiversity. With governments around the world scaling back their commitment to both environmental policies and health preparedness, we’re already starting off on the wrong foot in terms of prevention – when actually this could be a great opportunity for the EU to take the initiative and show some global leadership. The importance of having HERA Recognising the need for a specialised body to be better prepared for future health crises, in 2021 the EU established the Health Emergency Preparedness and Response Authority (HERA). HERA was created as one of the European Commission’s internal services and it’s responsible for prevention, preparedness, surveillance, risk assessment, early warning and emergency response in the context of health crises. In ‘peacetime’, HERA monitors potential health threats, funds research and ensures the stockpiling of relevant medical equipment, devices and drugs (known as ‘medical countermeasures’). During times of crisis, HERA would shift into its emergency mode – coordinating the response, securing and distributing medical supplies, and mobilising funding for emergency response mechanisms. Beyond the EU’s borders, HERA also plays a key role in strengthening global health security through international cooperation, including partnerships with the WHO. Yet just a few years after struggling to respond to a global pandemic, the EU risks weakening its own health preparedness and response system. Three years after HERA’s creation, the new Commission mandate transferred its oversight from the Health Commissioner to the Commissioner for Equality, Preparedness, and Crisis Management. This change was then followed by the EU’s proposal to merge HERA with the Directorate-General for European Civil Protection and Humanitarian Aid Operations (DG ECHO), which risks diluting its specialised focus on health emergencies. Several EU countries have raised concerns about the proposed merger, and rightly so. Downgrading HERA could (and probably would) lower the EU’s ability to be prepared for – and efficiently respond to – health crises. At a time when the US is withdrawing from the WHO, the last thing the EU should be doing is reinforcing the idea that deprioritising health security is acceptable. Now more than ever this would be the wrong move at the wrong time, and would totally send the wrong signal, to its own citizens and the world. An opportunity to seize As it strengthens its defence framework , the EU should also prioritise health preparedness, which is just another element in the broader objective of strengthening the EU’s overall security, despite being less traditionally linked to it. Don’t forget, health crises have profound impacts on other crucial areas, such as economic stability, social cohesion and citizens’ overall wellbeing – just as other security threats do. That’s why the EU should also seize this moment to reaffirm its leadership in this domain, both within its borders and globally. Weakening HERA could erase years of progress and leave Europe more vulnerable when (not if) the next crisis hits. This means, first, maintaining HERA as a distinct, well-resourced entity with a clear mandate. This would allow for critical activities to continue, such as early warning and detection, and advancing research and innovation. Beyond safeguarding the health security of its citizens, strengthening HERA would also align with the EU’s ambitions of achieving strategic autonomy in health – one of the key policy areas identified in its broader plan to strengthen its capacity to act autonomously. The pandemic exposed the EU’s reliance on external supply chains for critical goods, including medical countermeasures. Boosting the EU’s strategic autonomy in the production of countermeasures is one of HERA’s objectives, as outlined in its latest available Work Plan . Downgrading HERA could set back the EU’s ongoing drive of achieving resilience and independence. Of course, one of HERA’s core objective is to achieve global health security, which it pursues by strengthening the EU’s global health leadership, with its international focus expanding and its enhanced commitment to forging global partnerships. While HERA has taken proactive steps in global preparedness, it should also take on a greater role in global governance. However, to sustain and expand these efforts, HERA must retain both its autonomy and be granted sufficient financial resources. Thus, keeping it as a fully separate entity is essential to maintaining its independence and the focus needed to effectively drive these global initiatives. Stepping up its leadership It’s crucial that the EU engages in international, multi-stakeholder partnerships, as Covid highlighted how vital it is to coordinate international efforts during global health emergencies. Expanding these partnerships – and Global Gateway could also be a good way to do this – would allow the EU to shape global health policies, drive innovation and ensure equitable access to medical countermeasures worldwide. As the WHO’s largest contributor has decided to walk away, this could be a golden opportunity for the EU – that’s why it should focus on building its own capacity and strengthening HERA, rather than merging it with DG ECHO. Doing so would not only enhance its preparedness for future crises but it would also increase its credibility as a serious geopolitical actor in this domain, during a deeply uncertain time when it should be cultivating as much credibility as it possibly can. By stepping up its leadership in global health governance as the US retreats, the EU could fill the gap, rather than leaving it open (and possibly making it wider). Both a weaker WHO and EU health preparedness and response system would not only leave Europe and the world more vulnerable but also leave space for other global actors to fill the void, potentially shaping policies in ways that wouldn’t align with European values. That’s why strengthening HERA isn’t just an investment in Europe’s preparedness for the next health crisis – in an increasingly unstable world, it’s a clear statement from the EU to take on more leadership and responsibility. For the third year in a row, CEPS is marking International Women’s Day on 8 March with a special short series of Expert Commentaries to highlight the insights and expertise of some of our most talented female researchers.", "wordcount": 1105}, {"source": "commentary", "date": "2025-03-12T14:14:35", "title": "Minding the gender gap – a critical omission in the EU’s AMR response", "authors": ["Cosima Lenz"], "topics": ["Diversity, Equity & Inclusion", "Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/minding-the-gender-gap-a-critical-omission-in-the-eus-amr-response/", "page_url": "https://www.ceps.eu/minding-the-gender-gap-a-critical-omission-in-the-eus-amr-response/", "excerpt": "Gender is largely absent from the EU’s antimicrobial resistance (AMR) policies and strategies. Yet AMR is a major global health threat. It happens when microbes (bacteria, viruses, fungi and parasites) stop responding to medication, making infections harder to treat, and increasi…", "full_text": "Gender is largely absent from the EU’s antimicrobial resistance (AMR) policies and strategies. Yet AMR is a major global health threat. It happens when microbes (bacteria, viruses, fungi and parasites) stop responding to medication, making infections harder to treat, and increasing the risk of severe illness and death. Misuse and the overuse of antibiotics accelerate resistance, turning once-treatable infections into serious health risks. AMR is a global crisis, causing around 4.7 million deaths in 2021 , including 35 000 in the EU and EEA. Recognising the urgency of this threat, the EU named AMR among its top priorities in its Global Health Strategy . The EU is playing a key role in shaping global and regional AMR policies and research through its funding commitments – which account for one-third of global AMR development assistance in 2020 – and collaborations, such as the Joint Programming Initiative on AMR , the Global AMR R&D hubs and other Horizon Europe initiatives. Despite growing awareness of the need to recognise gender in AMR research , EU efforts have failed to incorporate gender or gender considerations. This is a significant oversight and needs to be immediately rectified as gender influences AMR risk, management and the effectiveness of health policies and interventions. Global research shows that women are more likely than men to use antibiotics in their lifetime. This trend is reflected in EU data , where women report slightly higher antibiotics use over the past year compared to men. A missing piece in the AMR response Gender plays a key role in health, shaping how people access and experience healthcare. Gender refers to the expectations that society assigns based on being a woman, man or another preferred gender identity. This can influence health behaviours and how the healthcare system responds, leading to access and outcome differences for women, men and gender-diverse individuals. Gender, however, is consistently overlooked in AMR research and policymaking, both in the EU and globally. A recent analysis of EU AMR policy priorities, as well as a proposed monitoring framework for the EU’s One Health Action Plan on AMR, make absolutely no mention of gender. None of the proposed indicators reference sex or gender differences and there’s no guidance on collecting gender-disaggregated data. Gender’s absence highlights a persistent blind spot in AMR policymaking. Globally, the situation is similar. Countries typically develop multi-year National Action Plans (NAPs) to outline strategies, funding and collaborative efforts to ensure alignment with global guidance. A review of 145 NAPs found that 86% didn’t include gender and about 70% failed to acknowledge gender inequalities. This is partly due to the historical lack of gender integration in health policies and the lack of global guidance on gender and AMR. The WHO only released its preliminary guidance to address gender in AMR in September 2024. Additionally, limited research on the gendered dimensions of AMR makes it difficult for policymakers to make evidence-informed decisions. Why gender matters Ignoring gender in AMR policies and strategies means missing key insights into how antimicrobial use and resistance develop. Gender differences shape infection risk, health seeking behaviour and access to treatment. In the EU, women are more likely to be prescribed antibiotics for conditions such as urinary tract infections , while men over 35 are more prone to infections that require antibiotics. Recognising when and how to address gender differences is critical to developing AMR policies that are both effective and equitable. AMR policies that overlook gender may inadvertently exacerbate existing gender inequities . There’s also limited research on effective strategies to address harmful gender norms and practices that contribute to AMR risk. Gender mainstreaming – which considers women, men and other gender perspectives in decision-making – is already utilised in EU policymaking. Horizon Europe, for instance, requires research proposals – including research on AMR – to include gender considerations. But consideration alone isn’t enough. Neglecting gender risks limiting the effectiveness of AMR policies in disregarding women’s role in how to appropriately use , exacerbating gendered barriers to treatment, and can contribute to women’s economic burdens. Of course, gender alone is also not sufficient – solely using a gender lens disregards broader health inequalities (social, economic, political) that also impacts AMR. What should happen next Now’s the time for EU leadership to advance gender integration into AMR efforts. Recent setbacks in gender-focused research internationally make this all the more important. There are a few preliminary actions the EU can take in moving the needle on gender inclusion in AMR actions. First, we need more specific data about gender in connection to AMR. This includes systematically collecting and reporting sex- and gender-specific data in AMR research and policy evaluations, ensuring privacy and ethical considerations are prioritised. For example, integrating gender indicators and recommendations on stratifying indicators by sex and gender in the proposed monitoring framework for the One Health Action Plan can help standardise the EU’s approach for tracking EU-wide and Member State-level efforts. Second, it’s important to engage diverse stakeholders in the AMR response. A broader range of voices – including women, men, gender-diverse individuals and other vulnerable groups – should be proactively engaged in decision-making processes to ensure AMR policies and strategies address real-world challenges and inequalities. Third, gender should be embedded into EU AMR policies, strategies and Member State NAPs. The EU should explicitly include gender as a priority in its future AMR strategies, ensuring that gender-sensitive and specific policies are developed at both the EU and national levels. Given the demonstrated value of gender-inclusive approaches in other health areas, applying similar frameworks to AMR will improve outcomes and enhance policy effectiveness. Including gender experts in technical working groups such as the Transatlantic Task Force on Antimicrobial Resistance , AMR One-Health Network or the EuroTech AMR Task Force can create avenues to integrate expertise on gender and identify opportunities in ongoing and future work. Sessions focused on gender outcomes and AMR data can also be included as part of EU-wide knowledge exchange platforms, including the One Health Conference or One Health Seminars. As EU Member States update their NAPs – as many expire in 2025 – the European Commission, which typically conducts a technical review, should actively promote the inclusion of gender analyses, including disaggregated AMR data and indicators in the next set of NAPs. The EU must act now As AMR continues to threaten global health, failing to integrate gender into AMR policies and strategies is a missed opportunity. The EU has the resources, influence, and mechanisms to provide critical leadership — but needs to act now. Integrating gender into AMR efforts will not only create more effective policies but it will also strengthen the EU’s ability to combat one of the world’s most pressing health challenges. For the third year in a row, CEPS is marking International Women’s Day on 8 March with a special short series of Expert Commentaries to highlight the insights and expertise of some of our most talented female researchers.", "wordcount": 1153}, {"source": "commentary", "date": "2025-03-11T14:33:18", "title": "The fight for Georgia is still a fight for Europe", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/the-fight-for-georgia-is-still-a-fight-for-europe/", "page_url": "https://www.ceps.eu/the-fight-for-georgia-is-still-a-fight-for-europe/", "excerpt": "Georgia is no stranger to political turmoil but the country now finds itself at a perilous tipping point. Georgians are known for taking to the streets, waving EU flags with unmatched passion and fighting for their European future. But this time, with mounting geopolitical tensio…", "full_text": "Georgia is no stranger to political turmoil but the country now finds itself at a perilous tipping point. Georgians are known for taking to the streets, waving EU flags with unmatched passion and fighting for their European future. But this time, with mounting geopolitical tensions and a ruling party desperate to cling to power while appeasing the Kremlin, the stakes are higher than ever. Despite months of protests, Georgian Dream (GD), the ruling party controlled by oligarch Bidzina Ivanishvili, who amassed his fortune in Russia, has only tightened its grip, escalating repression, detaining and assaulting demonstrators, and fast-tracking Georgia’s descent into authoritarianism. In 2024, the ‘foreign agents’ law was reintroduced despite overwhelming public protests, elections were manipulated and rigged , and then came the final blow – the prime minister’s announcement that Georgia would halt EU accession negotiations until 2028. This was the last straw. Protesters flooded the streets in November and have remained there ever since. In response, GD has passed laws that tighten restrictions on demonstrations, increase penalties for disobeying or insulting police officers, and makes it easier to fire civil servants. Additionally, new legislation is underway to ban foreign funding for media outlets and to replace the ‘foreign agents’ law with even stricter legislation to target civil society. Many civil servants have already been fired for joining public protests and several hundred demonstrators have been detained, including journalists , politicians and activists . More than 300 of them have reported beatings, torture and other ill-treatment. The EU’s response? Underwhelming at best. A symbolic visa suspension for holders of diplomatic passports and officials, allowing EU Member States to impose visa requirements, though with the discretion to grant exemptions. Even without exemptions, the impact is limited – the diplomats and officials were not particularly eager to travel to the EU for work anyway and they can still obtain visas for personal travel. At best, it introduces procedural hurdles rather than any real consequences. Throughout 2024, the EU has frozen EUR 30 million earmarked for Georgia’s defence sector (in July) and has suspended EUR 121 million in bilateral support (in October), followed by the European Council deciding to halt Georgia’s accession. In short, the EU wielded the stick but not with enough force to shift GD’s course. Worse still, there’s no clear strategy for what comes next. EU action is long overdue Georgia’s democratic backsliding has been on the European Council’s agenda for a year but it has failed to agree on measures that could actually make a real difference – namely imposing targeted sanctions against GD officials and Ivanishvili, including EU travel bans for them and their families, asset freezes, and barring Ivanishvili from conducting any business in the EU. The European Parliament’s (EP) latest resolution is now calling for such sanctions – a timely and necessary step. It’s true that Ivanishvili has already laid the groundwork to dodge international sanctions, thanks to GD’s ‘ offshore law .’ This law allowed Ivanishvili to smoothly transfer his companies tax-free to Georgia after the US imposed financial sanctions on him. But this is how much he fears losing his wealth – his family’s accounts were frozen by Swiss bank Julius Baer following the US sanctions. If Hungary and Slovakia block collective action, then individual Member States must enact their own bilateral measures, like what the Baltic countries have done. France is particularly responsible here – Ivanishvili is not only a French citizen but also, ironically, a recipient of France’s highest honour. Revoking the Légion d’Honneur he was awarded in 2021 – as suggested in the EP’s latest resolution – would be a timely move. Lifting sanctions should be conditional on releasing prisoners, including journalists detained during the demonstrations, and free and fair elections. New elections should be supervised by international observers, including the EU. GD has captured all institutions that oversee elections and with the introduction of electronic voting, rigging the elections again will now be even easier. The EU should redirect financial support initially intended for the government towards civil society and independent media, providing core and flexible funding to these primary targets of the ‘foreign agents’ law and its upcoming even stricter version. With Trump slashing USAID , and likely uninterested in bolstering Georgian democracy, EU support will be needed more than ever. To send a strong message to Georgians who are putting themselves in danger by continuing to demonstrate, high-level EU officials – namely Commissioner Marta Kos and High Representative Kaja Kallas – must visit Georgia. They need to stand with the people, showing that the EU isn’t just an abstract ideal but a real ally in their fight for democracy. And while Salome Zourabichvili’s term as President has now ended, she remains Georgia’s only legitimate representative. EU officials should continue engaging with her and the opposition parties through She was the key figure in uniting the opposition under a Georgian Charter , with a roadmap for resolving the political crisis and advancing EU integration ahead of the elections. Beyond that, her international visibility and strong ties with leaders across Europe and beyond make her an invaluable player. Even President Trump has recognised her significance – she was the only Georgian leader invited to his inauguration. This is far bigger than Georgia Georgia is one of three eastern candidate countries fighting Russian interference. Ukraine is at war. Moldova’s pro-European government is facing due to energy blockades, disinformation and election manipulation. And Georgia is controlled by GD, a party created by an oligarch, and is effectively a Russian proxy. No military intervention is needed – As Russia ramps up its interference across all three countries and with Trump’s comeback only strengthening Putin’s hand in Ukraine and the wider region, the EU cannot afford to look the other way. If Russian influence succeeds in Georgia, it won’t just bolster its influence in Moldova – it’ll solidify its regional power and increase its leverage during potential negotiations with Ukraine. Calling for greater EU engagement in Georgia from a geopolitical standpoint is obvious. But some may argue that Georgia’s accession offers little economic incentive for the EU. Yet Georgia’s case was never about economic benefits and the EU is no longer merely an economic Union. The EU is now evolving into a political and security Union, meaning it’s in its best interests to have strong democratic neighbours, rather than being surrounded by Russian-orchestrated autocracies. That’s why the EU’s response to Georgia will not only shape the country’s future but also test its own credibility – as a Union that upholds its values, honours its commitments and remains worth aspiring to join. For the third year in a row, CEPS is marking International Women’s Day on 8 March with a special short series of Expert Commentaries to highlight the insights and expertise of some of our most talented female researchers.", "wordcount": 1137}, {"source": "publication", "date": "2025-03-10T16:17:09+01:00", "title": "Generative AI and foundation models  in the EU", "authors": ["Pierre-Alexandre Balland", "Olesya Grabova", "J. Scott Marcus", "Robert Praas", "Andrea Renda"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/EESC_report_Generative-AI-and-founding-models-in-the-EU.pdf", "page_url": "https://www.ceps.eu/ceps-publications/generative-ai-and-foundation-models-in-the-eu/", "excerpt": "Completed for the European Economic and Social Committee (EESC), this report examines the burgeoning generative artificial intelligence (GenAI) and foundation m", "full_text": "", "wordcount": 127}, {"source": "commentary", "date": "2025-03-10T14:06:39", "title": "Skills aren’t your plug-and-play solution for inclusive competitiveness", "authors": ["Laura Nurski"], "topics": ["Employment & Social Affairs"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/skills-arent-your-plug-and-play-solution-for-inclusive-competitiveness/", "page_url": "https://www.ceps.eu/skills-arent-your-plug-and-play-solution-for-inclusive-competitiveness/", "excerpt": "Skills have become a central pillar in policy discussions on the future of work. Since the 2000 Lisbon Strategy , the EU has gradually shifted from focusing on formal education and qualifications – as indicators of skill bundles – to a greater emphasis on skills as individual uni…", "full_text": "Skills have become a central pillar in policy discussions on the future of work. Since the 2000 Lisbon Strategy , the EU has gradually shifted from focusing on formal education and qualifications – as indicators of skill bundles – to a greater emphasis on skills as individual units that can be independently acquired and traded. The Recommendation on Microcredentials – first adopted in 2022 and now featured prominently in the Union of Skills – represents the clearest indication of this shift. Since then, policymakers frequently turn to skilling as a silver bullet – something to reduce labour shortages and help the workforce adapt to technological change, ultimately providing social mobility and even supporting the inclusion of vulnerable groups in both the labour market and society at large. In the recent Competitiveness Compass skills are seen as ‘horizontal enablers’ of competitiveness that also ensure social fairness. But it doesn’t explain how exactly this mechanism would work. This isn’t surprising, as the debate on skills is riddled with misconceptions that oversimplify skills’ role in the labour market and in society. In short, if we don’t move beyond this simplified view, inclusive competitiveness will remain out of reach. First, skilling alone won’t solve inequality The first misconception is that skilling can make a big dent in economic inequality. A common argument in the policy debate is that skills can be used to reconcile inclusion and competitiveness – a win-win where upskilling both enhances productivity and raises wages. The idea is appealing because if we equip individuals with better skills, they can then access higher-paying jobs, reducing income inequality in the process. But while reducing structural barriers for disadvantaged groups is crucial, the belief that skilling alone will lead to a fairer distribution of prosperity is naïve, for two reasons. First, wage income is only a part of a household’s income, which in turn is less concentrated than wealth. Second, while individual skill acquisition may indeed improve personal economic mobility, inequality of opportunity is not just a function of skills – it’s embedded in the labour market’s structure and in the broader economic system. If reducing inequality is the goal, more direct and effective levers exist in the fiscal system, such as progressive taxation and redistribution. Skilling may help individuals, but it’s not a substitute for policies that actively address structural inequities. Second, innovation isn’t just ‘enabled’ by skills but driven by it The second misconception is the disconnect between the skills debate and the one on innovation. The Competitiveness Compass dedicates pages to ‘closing the innovation gap’ – with strategies focused on supporting start-ups, increasing R&D spending, and investing in digital infrastructure. But skills and quality jobs are an afterthought, tucked away under the category of ‘horizontal enablers.’ This suggests that innovation is primarily driven by capital, investment and technology, with skills playing only a supporting role. But this is fundamentally wrong. Innovation is an inherently human process. It’s people, not capital, who generate new ideas and combine them to develop new technologies. It’s people, not capital, who apply those technologies to create new products, services and processes. It’s people, not capital, who translate this innovation into new business models and organisational change. Humans are by nature instinctively curious. Anyone who has watched a child unwrap a present knows this – they’re often more fascinated with the wrapping paper than the toy inside because it allows for more open-ended play and experimentation. But this innate curiosity can be eroded by rigid education systems, bureaucratic workplaces and repetitive procedural tasks that don’t challenge workers to think critically or creatively. Even Adam Smith recognised this in 1776, observing that workers who engage in monotonous tasks lose the ability to think innovatively: ‘The man whose whole life is spent in performing a few simple operations, […] has no occasion to exert his understanding […]. He naturally loses […] the habit of such exertion, and […] becomes as stupid and ignorant as it is possible for a human creature to become’. A recent study on German firms found that businesses adopting frontier technologies like AI contribute to the de-routinisation of work but not just for the reasons we usually assume (i.e. by automating away routine tasks ). Instead, firms that already employ more non-routine cognitive workers – those in roles requiring judgement, problem-solving and creativity – experience faster growth when adopting new technologies. In other words, creative, critical and curious workers fuel the innovation process. Firms that rely on human ingenuity, rather than just procedural execution, are better positioned to benefit from technological change. Third, skills aren’t only an input to work but also an output of work The third misconception is the idea that skills exist independently from the workplace, as if individuals acquire skills elsewhere and simply bring them to their jobs. This assumption underpins policies that focus on formal learning as the primary avenues for skill development. But skills aren’t just something you possess – they’re something you practice. A skill, by definition, is the ability to perform a task well. And the most effective way to build skills is by doing actual tasks, not by simulating them in a classroom. Yes, training has its place. But most adults learn by doing. And considering that we spend at least three times longer in work than in education, the workplace should be seen as the primary place for acquiring skills. Again, Adam Smith recognised this centuries ago, noting that what distinguishes professionals from regular workers is not inherent talent but the division of labour itself: ‘The difference of natural talents in different men is […] not upon many occasions so much the cause, as the effect of the division of labour.’ In other words, while our initial skills may get us our first job, it’s the work environments, organisational cultures and tasks we perform that shape our long-term skill development. Especially those skills that are so crucial for innovation, such as creativity and problem-solving, are honed more by work experience than by formal education or training. Skilling is a systemic undertaking, not just an individual one Policymakers must move beyond the over-simplified view of skills as a plug-and-play solution for social and economic challenges. If we want to reduce inequality, we need structural solutions to systemic barriers, not just the upskilling of individuals. If we want to drive innovation, we need to recognise that it is people and organisations, not just capital, that drive progress. If we want effective skilling strategies, we need to embrace the workplace as the primary space where skills are shaped and refined. Without this shift in perspective, skills policies will continue to miss their mark – failing both workers and the broader economy, with the competitiveness that the EU so badly wants remaining firmly out of reach. For the third year in a row, CEPS is marking International Women’s Day on 8 March with a special short series of Expert Commentaries to highlight the insights and expertise of some of our most talented female researchers.", "wordcount": 1165}, {"source": "publication", "date": "2025-03-07T16:45:26+01:00", "title": "Discourses about irregularised migrants at the EU level", "authors": ["Davide Colombi"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/I-CLAIM-WP4-EU-long_MODIF.pdf", "page_url": "https://www.ceps.eu/ceps-publications/discourses-about-irregularised-migrants-at-the-eu-level/", "excerpt": "How is irregularised migration framed at the EU level by the European Commission, the European Parliament, and EU civil society? Through a comparative analysis,", "full_text": "", "wordcount": 144}, {"source": "publication", "date": "2025-03-06T15:36:19+01:00", "title": "Generative AI and the future of  work global dialogue: perceptions and prospects", "authors": ["Davide Monaco", "Laura Nurski"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/20250128_GPAI_GenAI_FoW_report_final_VOECD.pdf", "page_url": "https://www.ceps.eu/ceps-publications/generative-ai-and-the-future-of-work-global-dialogue-perceptions-and-prospects/", "excerpt": "AI is likely to bring profound changes to most aspects of society. The impact of Generative AI (GenAI) is specifically one of the 'big unknowns' in current deba", "full_text": "", "wordcount": 214}, {"source": "publication", "date": "2025-03-05T11:15:32+01:00", "title": "Building the European Digital Public Infrastructure: rationale, options, and roadmap", "authors": ["Camille Ford", "Marta Dell’Aquila", "Olesya Grabova", "Iris Muñoz", "Andrea Renda"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/IDA-2025-03_GRID_DPI-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/building-the-european-digital-public-infrastructure-rationale-options-and-roadmap/", "excerpt": "The digital transformation of all aspects of society calls for governments to invest in new regulatory digital frameworks. This CEPS In-Depth Analysis report il", "full_text": "", "wordcount": 188}, {"source": "publication", "date": "2025-03-03T13:00:19+01:00", "title": "What Europe and the EU need to stand for", "authors": ["Elzbieta Bienkowska", "Karel Lannoo"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/03/CEPS-PUBS-1-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/what-europe-and-the-eu-need-to-stand-for/", "excerpt": "As we begin our 12th edition of the CEPS Ideas Lab, please click here for a joint statement from CEPS' board on what Europe and the EU need to stand for during", "full_text": "", "wordcount": 139}, {"source": "commentary", "date": "2025-02-27T14:04:19", "title": "The EU’s sustainability rollback is a retreat disguised as simplification", "authors": ["Apostolos Thomadakis"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/the-eus-sustainability-rollback-is-a-retreat-disguised-as-simplification/", "page_url": "https://www.ceps.eu/the-eus-sustainability-rollback-is-a-retreat-disguised-as-simplification/", "excerpt": "The European Commission’s ‘ Simplification Omnibus ’ proposal, unveiled on 26 February, was presented as a necessary step to reduce the regulatory burden on businesses and enhance European competitiveness. By amending key sustainability directives – including the Corporate Sustai…", "full_text": "The European Commission’s ‘ Simplification Omnibus ’ proposal, unveiled on 26 February, was presented as a necessary step to reduce the regulatory burden on businesses and enhance European competitiveness. By amending key sustainability directives – including the Corporate Sustainability Reporting Directive (CSRD), the Corporate Sustainability Due Diligence Directive (CSDDD) and the EU Taxonomy Regulation – the Commission claims to be streamlining compliance processes for companies. However, beneath the rhetoric of simplification lies a profound retreat from the EU’s sustainability commitments. The proposal significantly weakens corporate transparency, accountability and long-term economic credibility, undermining years of progress in environmental, social and governance (ESG) regulation. CSRD – gutting corporate transparency One of the most alarming aspects of the proposal is the drastic narrowing of the CSRD. By raising the reporting threshold to 1 000 employees, the Commission is effectively exempting thousands of companies from disclosing their environmental and social impacts. This means that a vast segment of the European economy will no longer be held to the same sustainability standards, creating a two-tier system where only the very largest corporations are accountable, while mid-sized and even some large firms – many of which do have significant environmental footprints – escape scrutiny. Moreover, the provision allowing SMEs to refuse data requests from larger companies dismantles the very essence of value-chain transparency. The EU had positioned itself as a leader in ESG reporting but this rollback directly undermines the ability of investors, regulators and consumers to make informed decisions. Instead of simplifying compliance, this measure incentivises opacity and weakens due diligence efforts across entire supply chains. CSDDD – watered-down corporate due diligence The CSDDD – already weakened during the normal legislative process – suffers even more in this proposal. Postponing its implementation to 2028 signals a clear de-prioritisation of responsible business conduct. Even more troubling is the shift in due diligence obligations to focus only on direct suppliers, abandoning a broader risk-based approach. This is not just a weakening of corporate responsibility rules – it’s a rollback before the CSDDD has even been transposed or applied. Companies that have been preparing for compliance now face regulatory uncertainty, undermining trust in the EU’s policymaking process. This fundamentally guts the directive’s purpose, as most environmental and human rights risks lie deeper within complex global supply chains. In short, by reducing assessments to once every five years instead of annually, the Commission is giving companies a free pass to ignore abuses for extended periods. This change is particularly striking given the EU’s own rhetoric on corporate responsibility. At a time when forced labour, deforestation and environmental degradation are high on the international agenda, the decision to dilute mandatory due diligence reflects a regulatory retreat that’s both morally and economically shortsighted. The EU Taxonomy – a hollowed-out framework The EU Taxonomy Regulation, meant to be the gold standard for sustainable finance, remains largely intact – but with an enormous loophole. Companies below EUR 450 million in annual revenue are no longer required to report on their sustainability efforts. Given that these firms account for over 80 % of previously obligated businesses, this is effectively dismantling the Taxonomy’s applicability. The practical consequence? A massive information gap for investors and financial institutions. Sustainable finance relies on comprehensive, comparable data, and by shrinking the reporting pool, the EU is undermining the very credibility of its green investment agenda. At a time when global markets are demanding greater transparency and regulatory certainty, this move will likely make European companies less attractive. A broader retreat under the guise of ‘competitiveness’ The proposal’s overarching narrative – reducing red tape to boost competitiveness – is fundamentally misleading. Sustainability reporting and due diligence aren’t mere bureaucratic burdens; they’re essential tools for risk management, financial stability and corporate accountability. By prioritising short-term deregulatory wins, the Commission is ignoring the long-term economic and reputational damage of weakening ESG frameworks. The proposal risks eroding the EU’s global leadership in sustainable finance and corporate governance. It sends a dangerous signal that Europe is willing to sacrifice transparency for short-term business convenience, undermining its credibility in international negotiations on climate and corporate responsibility. If the goal is to enhance European competitiveness, this is a fundamentally flawed approach – companies that operate in a regulatory vacuum today will face greater legal, reputational and financial risks tomorrow. A missed opportunity for smarter reform By diluting key sustainability directives, the Commission has not only weakened corporate accountability but also introduced greater regulatory uncertainty for businesses and investors. Exempting thousands of mid-sized firms from CSRD reporting doesn’t simplify compliance – it removes crucial transparency mechanisms, making it harder for markets to assess risks and opportunities. Abruptly eliminating reporting obligations, rather than phasing them in with proportional requirements, forces companies to navigate an unpredictable policy landscape. Similarly, the weakening of the CSDDD’s risk-based due diligence approach doesn’t ease business operations – it exposes companies to greater long-term liabilities. Without a structured framework to assess supply chain risks, firms are left without clear guidelines, increasing their exposure to reputational and legal consequences. Instead of abandoning comprehensive due diligence, the Commission could have provided sector-specific guidance and support mechanisms to help businesses comply effectively. The decision to carve out over 80 % of firms from EU Taxonomy reporting does not enhance competitiveness – it creates an information vacuum. Investors and financial institutions depend on reliable, comparable data to make informed decisions and a drastically reduced reporting pool undermines the credibility of sustainable finance. A more effective approach would have introduced simplified disclosures for smaller businesses rather than removing reporting obligations altogether. Regulatory simplification should not mean regulatory backtracking. By prioritising short-term deregulatory gains, the EU has weakened its leadership in sustainable finance and corporate governance. A more balanced approach – focused on advisory services, capacity-building and digital compliance tools – would have supported businesses while maintaining high ESG standards. Instead of retreating, the Commission really should have refined and strengthened its sustainability framework, ensuring Europe remains a leader in responsible corporate governance at a time when global markets are demanding greater transparency and accountability. This commentary was originally published by the European Capital Markets Institute (ECMI), and the original version can be found here .", "wordcount": 1026}, {"source": "publication", "date": "2025-02-26T15:39:49+01:00", "title": "Exploring pathways for a green transition to a bioeconomy", "authors": ["John Zysman", "David Zilberman", "Dan Breznitz"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/02/Bioeconomy-Explainer-for-IL_FINAL.pdf", "page_url": "https://www.ceps.eu/ceps-publications/exploring-pathways-for-a-green-transition-to-a-bioeconomy/", "excerpt": "The bioeconomy will utilise renewable natural resources with advanced technologies, life science, digitisation, AI and prevision systems to produce food and fib", "full_text": "", "wordcount": 228}, {"source": "commentary", "date": "2025-02-26T11:22:57", "title": "With a new German government incoming, the implications for Europe are substantial", "authors": ["Sophie Pornschlegel", "Sophia Russack"], "topics": ["EU Institutions & Policy-making", "Foreign Policy & Security"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/with-a-new-german-government-incoming-the-implications-for-europe-are-substantial/", "page_url": "https://www.ceps.eu/with-a-new-german-government-incoming-the-implications-for-europe-are-substantial/", "excerpt": "Germany went to the polls last Sunday and the conservative CDU came first, followed by the far-right AfD. Upcoming coalition negotiations will ultimately determine the next government’s composition, but CDU leader Friedrich Merz will likely become the next Chancellor, with the So…", "full_text": "Germany went to the polls last Sunday and the conservative CDU came first, followed by the far-right AfD. Upcoming coalition negotiations will ultimately determine the next government’s composition, but CDU leader Friedrich Merz will likely become the next Chancellor, with the Social Democrats (SDP) as the probable junior coalition partner. The past 3.5 years were sobering – the ‘traffic-light’ coalition of the SDP, Greens and liberal FDP fell short of playing a constructive role in EU policymaking, despite having set itself an ambitious EU programme. Finding compromise in a tripartite coalition proved challenging and relations between France and Germany – already not in the best shape – further eroded. With the current geopolitical situation, the new government will have to show much more EU leadership than before. But whether they can deliver is another matter entirely. A new government better able to act? Germany must abstain in the Council of the EU if there’s disagreement among the coalition parties, dubbed the ‘German vote’. While this already happened under Angela Merkel, it significantly increased under the traffic-light coalition. Effectively, this means that Germany often blocks EU legislation, as under qualified majority voting (QMV), abstentions are counted as votes against. In cases like the Due Diligence Directive (CSDDD), the Packaging Regulation (PPWR) or the European AI Act, Germany not only abstained but at times even reversed previously agreed decisions. This has two ramifications: it makes it more challenging for other Member States to find stable majorities and it undermines the EU’s decision-making culture by encouraging other Member States to behave in the same way. Many in the EU institutions and in Member States hope that the new government will be a more reliable partner. Merz has pledged to make Germany speak with one voice again. His government will likely be composed of only two parties, making finding common ground possibly easier. It also looks like he plans to make EU affairs ‘ Chefsache ’, by giving the Chancellery a bigger say. This could be a positive development, as a united German voice is absolutely necessary for a united European voice. The relationship between Merz and Commission President Ursula von der Leyen will also be essential to determining how constructive Germany will be in Europe. If the two leaders develop a good ‘ terrain d’entente’ , the next Chancellor could ensure that Germany is back in the European driving seat. Merz’s plans to visit Paris and Warsaw on his first day in office, as well wanting to positively engage with British Prime Minister Keir Starmer, will hopefull
