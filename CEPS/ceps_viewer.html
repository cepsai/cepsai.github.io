ed on, please click here .", "wordcount": 1074}, {"source": "publication", "date": "2025-06-30T14:34:01+01:00", "title": "It’s the last chance for an EU finance union", "authors": ["Karel Lannoo"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/No-97-Last-chance-for-a-finance-union.pdf", "page_url": "https://www.ceps.eu/ceps-publications/its-the-last-chance-for-an-eu-finance-union/", "excerpt": "Deeds, not words. Despite the numerous reports (such as Draghi and Letta) and the clear momentum towards ‘more union’ for EU financial markets among policymaker", "full_text": "", "wordcount": 103}, {"source": "commentary", "date": "2025-06-27T10:14:58", "title": "We have a case of sustainability reporting overload. The EU needs a smarter fix", "authors": ["Apostolos Thomadakis", "J. Scott Marcus"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions", "GRID"], "types": [], "link": "https://www.ceps.eu/we-have-a-case-of-sustainability-reporting-overload-the-eu-needs-a-smarter-fix/", "page_url": "https://www.ceps.eu/we-have-a-case-of-sustainability-reporting-overload-the-eu-needs-a-smarter-fix/", "excerpt": "The EU’s sustainability reporting rules urgently need to be recalibrated. What began as a bold legislative push to steer markets towards environmental and social goals is now showing signs of regulatory overreach. Companies, especially SMEs, are struggling to navigate three major…", "full_text": "The EU’s sustainability reporting rules urgently need to be recalibrated. What began as a bold legislative push to steer markets towards environmental and social goals is now showing signs of regulatory overreach. Companies, especially SMEs, are struggling to navigate three major frameworks: the Corporate Sustainability Reporting Directive (CSRD), the Corporate Sustainability Due Diligence Directive (CSDDD) and the EU Taxonomy Regulation. The European Commission’s proposed Omnibus Directive is meant to ease this burden. But a CEPS independent analysis , conducted for the European Parliament (EP), finds that the proposal falls short. It focuses too narrowly on reducing the number of companies in scope or the frequency of reporting, while overlooking the deeper challenge – namely the cumulative and interdependent nature of the obligations these frameworks impose in practice. The real issue isn’t legal duplication but operational convergence. Unless this is addressed through more integrated guidance, coherent standards and clear reporting pathways, Europe risks undermining both its sustainability ambitions and its global competitiveness. The problem is real The proposed Omnibus Directive aims to reduce compliance burdens arising from the CSRD, CSDDD, and the EU Taxonomy Regulation. It reflects rising concern among firms, policymakers and financial institutions that fragmented requirements are stifling sustainability investment and stretching corporate reporting systems to the limit. These concerns are well-founded. A recent ECB study shows that environmental and sustainability reporting obligations are impeding firms’ ability to secure financing for the climate transition. In short, the policy response is timely. But the Commission’s proposal does too little and in the wrong ways. Products of a different era The three pieces of legislation reflect political and economic priorities of an earlier moment. In the years following the pandemic and Russia’s invasion of Ukraine, the EU was right to prioritise energy independence, climate leadership and sustainable investment. Yet in pursuing this agenda, the Commission often underestimated the cumulative regulatory burden on companies, particularly SMEs. This is becoming harder to justify in today’s geopolitical context, where competitiveness, attracting capital and regulatory coherence are moving higher up the agenda . Calls for rebalancing are growing louder, with the Draghi and Letta reports both pointing to smarter regulation as a pillar of Europe’s economic renewal. The sustainability agenda remains vital, but it must now be pursued with greater efficiency, proportionality and strategic coherence. Haste makes waste Unfortunately, the legislative process that led to the Omnibus undermines its legitimacy and effectiveness. The Commission failed to publish a summary of the responses to its 2023 call for evidence, as required under Better Regulation guidelines. Nor did it provide an Impact Assessment to support the proposal. This isn’t just a technical shortcoming – it makes it impossible to understand how the Commission weighed the costs and benefits of the proposed changes… or whether it did so at all. In many cases, the proposal reverses positions previously defended by the Commission in earlier impact assessments, with no explanation for this shift. For instance, the 2021 CSRD Impact Assessment clearly justified the inclusion of non-listed SMEs within the scope, yet the Omnibus proposal now exempts many of them without discussing the benefits foregone. Reporting overlaps or operational convergence? At first glance, Omnibus seems driven by a desire to eliminate overlapping reporting requirements among the CSRD, CSDDD and the Taxonomy. But our detailed legal and technical assessment for the EP finds no explicit reporting overlap between these instruments. Each serves a distinct purpose: the CSRD mandates disclosure, the CSDDD imposes behavioural obligations and the Taxonomy sets classification criteria. Once this is properly understood, the core problem isn’t duplicating legal obligations but a convergence in operational demands. Firms often rely on the same data systems, internal processes and risk assessments to meet multiple requirements. For example, due diligence conducted under the CSDDD informs disclosures under the CSRD and helps satisfy the Taxonomy’s minimum safeguards. While there’s no legal duplication, there’s clearly a functional burden, especially for companies managing these frameworks simultaneously across multiple jurisdictions and supply chains. Yet Omnibus addresses this indirectly and inadequately. It reduces the number of firms subject to obligations and the frequency of reporting but fails to tackle the underlying issue – the need for better integration, sequencing and guidance across these frameworks. Unclear trade-offs, untested solutions Reducing the scope or frequency of reporting may provide short-term relief but it carries opportunity costs. Companies further along in CSRD implementation have begun to realise the strategic benefits from reporting: improved stakeholder engagement, better risk management and stronger internal governance. A recent PwC survey confirms that many companies view CSRD as a catalyst for business transformation, not merely a compliance burden. Removing obligations from large numbers of firms risks forgoing these gains. Yet the Commission’s proposal contains no serious discussion of these trade-offs. Some of the changes appear arbitrary or insufficiently justified – such as extending the review period for due diligence under CSDDD to five years or abandoning the development of sector-specific sustainability standards without clear criteria. What should be done? The Commission should urgently revisit the Omnibus proposal. It must publish the missing summary of stakeholder input, provide a dedicated Impact Assessment and clarify the rationale behind its policy reversals. More fundamentally, it should shift the focus from cutting who falls under scope to improving integration. Better guidance and coordination across the CSRD, CSDDD and the Taxonomy is essential. Companies should be able to use a single due diligence system to satisfy all three frameworks. ESRS standards should be updated to reflect how behavioural obligations under CSDDD and safeguards under the Taxonomy can be disclosed once and consistently. Greater alignment in governance disclosures and risk assessments would also reduce compliance costs. Finally, the EU needs to develop a longer-term simplification agenda. This includes issuing interpretive guidance, consolidating overlapping requirements where feasible and ensuring that updates to the ESRS and Taxonomy delegated acts are supported by proper impact analysis and business testing. A unified sustainability framework, built on coherence and clarity, will serve both the green transition and the competitiveness agenda. Omnibus attempts to address real concerns but in its current form, it risks going in the wrong direction. Without greater rigour, transparency and policy coherence, it may ultimately weaken – rather than strengthen – the EU’s sustainability and competitiveness agenda. This CEPS Expert Commentary is a longer version of an article that was originally published on EurActiv, which you can access here . To read the original report that these articles were based on, please click here .", "wordcount": 1072}, {"source": "publication", "date": "2025-06-19T10:37:11+01:00", "title": "Roadmap towards a common defence for Europe", "authors": ["Steven Blockmans"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/ROADMAP-TOWARDS-A-COMMON-DEFENCE-FOR-EUROPE_V4.3.pdf", "page_url": "https://www.ceps.eu/ceps-publications/roadmap-towards-a-common-defence-for-europe/", "excerpt": "As Russia’s war continues to rage in Ukraine and NATO’s philosophy of deterrence has been eroded by the caprice of the Trump administration, Europe is ramping u", "full_text": "", "wordcount": 203}, {"source": "commentary", "date": "2025-06-18T15:45:43", "title": "EU integration policies are broken – the case of Afghanistani immigrants (especially women) proves this", "authors": ["Shagofah Ghafori"], "topics": ["Diversity, Equity & Inclusion", "Migration, Asylum & Borders"], "units": ["Project Management"], "types": [], "link": "https://www.ceps.eu/eu-integration-policies-are-broken-the-case-of-afghanistani-immigrants-especially-women-proves-this/", "page_url": "https://www.ceps.eu/eu-integration-policies-are-broken-the-case-of-afghanistani-immigrants-especially-women-proves-this/", "excerpt": "Kabul’s fall in August 2021 was a slow-motion tragedy. EU Member States opened their doors , then bureaucracy slammed them shut. Across the EU, highly-skilled Afghanistanis – especially many Afghanistani women – are unable to work or practice their professions: a former minister …", "full_text": "Kabul’s fall in August 2021 was a slow-motion tragedy. EU Member States opened their doors , then bureaucracy slammed them shut. Across the EU, highly-skilled Afghanistanis – especially many Afghanistani women – are unable to work or practice their professions: a former minister becomes a pizza delivery man , a former army officer is found squatting next to official EU buildings. These aren’t just individual tragedies. They’re symptoms of a systemic failure that’s quietly sabotaging people’s lives – and Europe’s future. New proposals, reflecting the latest revisions to the ‘ safe third country ’ provisions under the Asylum Procedure Regulation (APR) , make it easier to dismiss asylum claims. Countries like Germany and Austria claim Afghanistan is now ‘secure enough’ to deport people to. Instability in Afghanistan has driven one of the world’s largest refugee crisis, displacing over six million people . Despite the ongoing chaos in Kabul , EU Member States have continued to issue thousands of deportation orders to Afghanistani nationals, including 23 515 in 2023 alone. The bitter irony is that while the European Commission champions legal pathways and seeks to attract skilled workers from third countries , those already here are stuck . Rather than allowing Afghanistanis to contribute their skills, the bureaucratic merry-go-round consigns them to a state of Kafkaesque limbo. In short, blanket restrictions and drawn‐out procedures strand them in perpetual uncertainty: children remain shut out of school, families scramble for stable housing and would-be workers are barred from the labour market. Many end up languishing for years in overcrowded reception centres and pushed into a life with limited dignity or rights . Untapped potential European governments often treat Afghanistani refugees as a burden. Integration has been haphazard and under-prioritised. Across the EU, safe reception and transition services are woefully inadequate. Belgium’s reception crisis forced ‘ thousands of asylum seekers and recognised refugees ’ to sleep on the streets because no housing was available. The Netherlands initially housed evacuated Afghanistanis in large, prison-like camps with poor facilities and no financial support. In Greece even recognised Afghanistanis ‘ continue to be isolated from the Greek society in which they seek to rebuild their lives ‘. Such ad hoc , containment-focused reception forces refugees to rely on survival networks or NGOs for their basic needs. While bringing diverse skills and education to the table, Afghanistani refugees – many being engineers, teachers and entrepreneurs – find themselves structurally barred from being able to participate. This paradoxically increases welfare costs and worsens labour shortages. Integration should be a strategic imperative, not a humanitarian afterthought. The EU has a 2021-27 Integration Action Plan , which calls for ‘ support for early integration ’ and community-based housing from day one. But implementation and enforcement has lagged, even though Member States must fulfil these commitments – allow asylum seekers to work or train as soon as possible; fast-track the recognition of Afghanistani qualifications (maybe via an EU skills passport); and provide intensive language and vocational courses tied to local labour markets. Critically, the EU and national governments should expand and streamline family reunification , and humanitarian corridors should be extended . Community sponsorship and public-private partnerships could also make a big difference for refugee families. One example is the story of Mahjabin Sultani. She was a teacher and women’s rights advocate (and, full disclaimer, this author’s mother) in Herat, a profession that, post-2021, all but guaranteed her a one-way ticket out. Once in Europe, she did what integration strategies asked of her – she mastered local transit routes, tackled Dutch irregular verbs, signed up for volunteer work and began the long, drawn-out dance with bureaucracy. Years later, she’s still studying Dutch, wondering if her language skills will ever meet the unspoken threshold of ‘employable.’ She’s still caught in a paradox – expected to become self-reliant yet not allowed to demonstrate and contribute her skills. Closing the policy blind spot – gender On top of all this, Brussels rarely walks the gendered walk. The Commission’s recent Action Plan trumpets an overarching principle of ‘inclusion for all’ and even declares that it ‘pays special attention to the integration of migrant women and girls.’ While prioritising effective removals, the New Pact on Migration and Asylum also urges integration for ‘more inclusive societies.’ In practice, however, these grand frameworks are unapologetically gender neutral as an EU audit found only four Member States had any integration policies specifically for women. No surprise then that a majority of national policies on migrant integration are one-size-fits-all, failing to recognise women and girls as distinct target groups and prompting activists to ask ‘ where are the women and girls ? ’. The net effect is that Afghanistani women, who would face Taliban persecution at home, are largely invisible in EU programmes. In practice, the gender-neutral approach creates obstacles. In Germany, two-thirds of refugee women are mothers . Childcare duties and cultural constraints mean many cannot attend mandatory language or employment classes. Research finds Afghanistanis and other migrant women are ‘ less able to consistently attend German language courses ’ due to family obligations. This compounds other disadvantages: refugee women typically arrive with lower levels of formal education, limited German and few local work skills, yet generic integration courses make no allowance for these gaps. It’s a similar situation in Belgium. It now explicitly treats Afghanistani women as victims of persecution but post-arrival services remain genderblind. Most language classes and vocational programmes are scheduled without considering childcare or cultural accommodation, leaving many mothers reliant on informal networks. Towards gender-savvy integration By now, what needs to be done is painfully obvious. European funds should be tied to gender outcomes: onsite childcare and women’s outreach for every language or employment class, and Member States should partner with women-led NGOs. Local authorities can create safe, female-only reception spaces and counselling services and they should hire Persian-Dari/Pashto-speaking therapists and legal advisers. Brussels already calls for ‘monitoring progress’ under the Action Plan. It could insist on gender-disaggregated data so that if Afghanistani women trail men in jobs or schooling, no one can look away. In practice this means requiring, say, that every integration EU dashboard should publish female-specific indicators. If Afghanistani women in a given Member State continue to lag, the European Commission should clip a slice of its funding until a proper fix is in place. Ultimately, the greatest fix is political will – to stop treating integration as a gender-neutral box-ticking exercise. Tailored services for women are not a charity but a fundamental obligation. Only then can committed, aspirational immigrants – again, like this author’s mother – give back to their communities. They want to give back. The EU needs to let them.", "wordcount": 1110}, {"source": "publication", "date": "2025-06-18T14:15:06+01:00", "title": "How to ensure a safer future for retail payments: aligning fraud prevention and accountability in the EU", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/Fraud-prevention-Policy-Brief-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-to-ensure-a-safer-future-for-retail-payments-aligning-fraud-prevention-and-accountability-in-the-eu/", "excerpt": "Retail payment fraud is a structural challenge that no longer falls solely within the remit of payment service providers (PSPs). As transactions flow through in", "full_text": "", "wordcount": 166}, {"source": "publication", "date": "2025-06-18T13:20:08+01:00", "title": "Learning from Sweden: a blueprint for building resilient European capital markets", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/2025-07-CEPS-Swedish-capital-markets.pdf", "page_url": "https://www.ceps.eu/ceps-publications/learning-from-sweden-a-blueprint-for-building-resilient-european-capital-markets/", "excerpt": "Sweden’s capital market stands out in the EU for its depth, inclusiveness and long-term orientation, shaped by decades of pragmatic reforms. Key drivers of its", "full_text": "", "wordcount": 201}, {"source": "publication", "date": "2025-06-16T13:28:52+01:00", "title": "Turkey, Europe, and the quest for security", "authors": ["Ilke Toygür", "Steven Blockmans", "Max Bergmann"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/2025_03_FP-CATS-1-2.pdf", "page_url": "https://www.ceps.eu/ceps-publications/turkey-europe-and-the-quest-for-security/", "excerpt": "The European security architecture is being reorganised due to the Russian invasion of Ukraine and US President Donald Trump’s antagonistic attitude towards Eur", "full_text": "", "wordcount": 167}, {"source": "publication", "date": "2025-06-16T08:50:02+01:00", "title": "Reporting obligations", "authors": ["J. Scott Marcus", "Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/IUST_STU2025773027_EN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/reporting-obligations/", "excerpt": "The European Parliament’s Committee on Legal Affairs has requested a timely review of the European Commission’s legislative proposal for an Omnibus Directive, w", "full_text": "", "wordcount": 129}, {"source": "commentary", "date": "2025-06-10T13:13:57", "title": "The EU’s new International Digital Strategy offers a promising start – but how it’s implemented will determine its ultimate success", "authors": ["Raquel Jorge Ricart", "Diana Senczyszyn"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/the-eus-new-international-digital-strategy-offers-a-promising-start-but-how-its-implemented-will-determine-its-ultimate-success/", "page_url": "https://www.ceps.eu/the-eus-new-international-digital-strategy-offers-a-promising-start-but-how-its-implemented-will-determine-its-ultimate-success/", "excerpt": "On 5 June, the European Commission and the EEAS published a Joint Communication that officially launched the EU’s new International Digital Strategy . This clearly shows how important digital diplomacy has become over the past few years and it’s a long-awaited step in the EU’s am…", "full_text": "On 5 June, the European Commission and the EEAS published a Joint Communication that officially launched the EU’s new International Digital Strategy . This clearly shows how important digital diplomacy has become over the past few years and it’s a long-awaited step in the EU’s ambition to become a stronger and more effective player in global digital governance. Compared to previous efforts, the new strategy is significantly improved in terms of coherence, breadth and ambition. Because of this, it adequately responds to repeated calls for stronger EU leadership in global digital affairs that featured in several earlier strategies ( Cybersecurity , Digital Decade , Economic Security Strategy , Competitiveness Compass ) and high-level reports (such as Draghi , Letta , and Heitor ). But, as is always the case, how the strategy is implemented going forward will be key to its success. Strong foundations to build on The new strategy relies on several previous initiatives, confirming the direction set by European Council Conclusions in 2022 and 2023 . Over the past few years, the EU has strengthened its position in multilateral and multistakeholder forums, promoting coalitions with like-minded countries in the UN, G7 and G20, among others. This was coupled with a series of bilateral and regional ‘partnership frameworks’, the launch of Trade and Technology Councils with the US and India, Digital Partnerships with Japan, South Korea, Singapore and Canada, Digital Alliances/Packages with Latin America and the Caribbean , plus Digital Economy Packages under the Global Gateway and broad Digital and Cyber Dialogues. In parallel, efforts to build up institutional capacity have led to the Digital Diplomacy Network, an informal network of digital/tech ambassadors and equivalents from Member States’ Foreign Ministries and enhanced coordination with overseas EU Delegations on technology-related issues. Finally, a new office in San Francisco marked a renewed effort to engage with Silicon Valley. In all this, the EU’s international engagement on digital has so far lacked a coordinated vision. The new strategy paves the way for a fundamentally different approach – a shift from experimentation to execution, from dispersed actions to strategic coherence. It also broadens its scope from regulatory cooperation with third countries and some concrete ad hoc projects on capacity building, to a broader approach encompassing institutional positioning, more critical technologies, and a dedicated framework that will emphasise economic resources, human capital and specific calendars and deliverables over the coming years. The ‘EU Tech Business Offer’ contained in the new Communication is emblematic of this shift – the end goal is for the EU, Member States and European businesses to interact much more closely on large-scale projects, with two examples being trusted connectivity offers by European companies in African or Latin American countries and connecting European quantum laboratories with those in like-minded Asian partners. A modular approach, aimed at balancing the EU’s interests and those of its partners, has the potential to trigger mutual benefits in key domains such as digital public infrastructures, AI and emerging technologies, cybersecurity and secure connectivity. That’s why the establishment of a Digital Partnership Network is a very promising idea. Economic security requires a stronger international presence The new strategy is particularly relevant due to the growing emphasis on economic security and will have to be tightly coordinated with EU actions that aim to strengthen the EU’s sovereignty and strategic autonomy in the tech domain. Already in June 2023, a proposed Economic Security Strategy identified four types of risks (including technological leakage) and listed 10 critical technologies to be promoted, protected and developed in trusted partnerships (including quantum, AI, biotechnologies and semiconductors). The International Digital Strategy positions economic security as a core objective of the EU’s digital partnerships and international engagement, to be achieved through resilient supply chains, strategic tech partnerships (e.g. semiconductors), global talent attraction, and multilateral coordination to promote shared standards based on transparency, security and trust – all reinforcing both the EU’s digital sovereignty and global influence. A practical example of how the EU can promote its security is the US Department of Commerce’s January 2025 ‘AI Diffusion Rule’, announced under the Biden Administration, to control the export of AI technology and semiconductors. The Rule divides countries into ‘tiers’, effectively splitting the EU into a patchwork of 27 regimes that receive different levels of treatment. And while it was later revoked , it highlighted how important a coordinated framework is at the EU level. Finally, as over 80% of Europe’s digital infrastructure and technologies are currently imported, the EU’s efforts to build up its digital sovereignty and global leadership could only benefit from the emerging ‘ EuroStack ’, a comprehensive European technology stack to foster innovation, strengthen autonomy and competitiveness, and build a resilient and forward-looking digital ecosystem. There’s no strategy without the adequate resources If Europe is truly serious about its digital future, the new strategy must be backed by a concrete action plan and matched with the necessary resources and institutional strengthening in terms of inter-service coordination, capacities, human resources and staff training. This means better instruction for diplomats in both the EU institutions and delegations around the world, as well as more political buy-in from Member States and enhanced coordination with the private sector. In a nutshell, it means joining forces and connecting the dots. Stronger coordination among the EU and Member States, and an effective mechanism to deploy public and private resources on the ground can help to ensure we avoid fragmented diplomatic actions whilst supporting smart digital partnerships with third countries with mutually beneficial results. Doing all this will yield real benefits for the EU’s competitiveness, security and long-term leadership in global digital affairs. But this must be done swiftly as the world isn’t sitting around waiting for Europe to get its act together. China is doubling down on its digital infrastructure diplomacy. The US is recalibrating its export control policies and AI strategy. Multilateral forums are becoming more fragmented due to the escalation of big power rivalry and US withdrawal under Trump. That’s why the EU’s International Digital Strategy is not only timely – but essential. The big challenge now is to fully implement it. Note: With the upcoming launch of the new Tech Diplomacy Initiative (TDI), CEPS aims to facilitate cross-sectoral dialogue among policymakers, experts, private sector, academia and civil society, building bridges between EU digital and foreign policy actors through roundtables, workshops, and research. The initiative seeks to support a more strategic, informed and coordinated EU tech diplomacy framework to navigate emerging technological and geopolitical challenges, as we believe that the only way forward is to be agile, coordinated, tailor-made and multistakeholder.", "wordcount": 1094}, {"source": "commentary", "date": "2025-06-06T15:44:38", "title": "Could the EU and South Korea be any closer? Time to raise the bar in bilateral ties", "authors": ["Fanny Sauvignon"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/could-the-eu-and-south-korea-be-any-closer-time-to-raise-the-bar-in-bilateral-ties/", "page_url": "https://www.ceps.eu/could-the-eu-and-south-korea-be-any-closer-time-to-raise-the-bar-in-bilateral-ties/", "excerpt": "South Korea began 2025 in deep political turmoil following the martial law crisis . Despite its gravity, the episode affirmed the country’s democratic resilience . In the early hours of 4 December 2024, the South Korean National Assembly had voted to lift the martial law that Pre…", "full_text": "South Korea began 2025 in deep political turmoil following the martial law crisis . Despite its gravity, the episode affirmed the country’s democratic resilience . In the early hours of 4 December 2024, the South Korean National Assembly had voted to lift the martial law that President Yoon Suk-yeol had announced the night before. In April 2025, the Constitutional Court formally removed Yoon from office, triggering snap elections. For the past six months, South Korea has been deeply divided and lacking in strong leadership. On 3 June, the leadership vacuum was filled by the landslide victory of Lee Jae-myung, who took office the next day and pledged to ‘ unite the people’ . At first glance, this result could mean continuity for EU-Korea relations. South Korea is expected to remain a key partner in promoting a rules-based international order, from global trade to the Indo-Pacific and beyond . The two strategic partners also have an impressive line-up of bilateral commitments. But before framing EU-Korea relations in routine terms, it’s worth taking a closer look at today’s South Korea, its new priorities and their practical implications for Brussels and Seoul. Lee’s vision for South Korea The country has a multi-party system largely centred around two polarised, mainstream parties: Lee’s liberal, centre-left Democrats (DPK), and the conservative, right-wing People Power Party (PPP). His victory chiefly stems from the alternative he offered to Yoon’s conservatives, who were tainted by the martial law crisis and ensuing chaos. Lee consistently topped opinion polls leading up to the election. Yet he left nothing to chance, presenting himself as a pragmatist and adopting positions on economic policy that mirrored those of the rival PPP. Once an advocate for government-led economic growth, he focused on deregulation and innovation. His campaign promises included stimulus for local businesses and a public investment plan for AI . Tax credits would be given to domestically-produced semiconductors and corporate governance reformed to improve investor confidence . Lee also quietly redefined the DPK agenda on two symbolic issues. Pragmatic cooperation with Japan has replaced an earlier stance of lukewarm, cautious ties, in a relationship fraught with historical disputes . Lee also plans to keep nuclear energy in the mix, shifting from previous support for a nuclear phase-out . An unhoped-for window of opportunity Wherever election cycles determine the political direction of a government for years to come, its leaders know how little time they have to effect policy change. This is especially true in South Korea, where presidents serve a single five-year term. A precautionary provision in the 1987 revised constitution seeks to prevent the return of military dictatorship. Yet there are some downsides. Rather than building a long-term legacy, South Korean presidents often want to leave a mark at any cost. Meanwhile, the government is continually constrained by a two-level game of domestic politics and international negotiations. It relies on US security guarantees and must maintain relations with its most powerful neighbours – not to mention North Korea. Enter the EU, a strategic and like-minded partner that, while also subject to political change and a fragile consensus among Member States, stands out as an island of stability. During the recent unrest in South Korea, the EU’s reliability and consistency have not gone unnoticed. For all of the country’s polarisation, there is cross-party support for closer cooperation with the EU, whose economic and industrial policies reflect shared values. Europe may not have been cited in Lee’s inaugural address – but there’s no need to take it personally. Now, the political cycles of the EU and South Korea are unexpectedly in sync: Lee’s five-year term should largely overlap with the present European Commission. Barring any new impeachment scandal, Lee should remain in power until 2030. His party’s majority in the National Assembly should last until the next legislative elections in spring 2028. This gives Lee at least two and a half years to implement his agenda, largely unimpeded. The opposition will need time to reorganise and cleanse its image of the stain of martial law. The EU should seize this window of opportunity. A president who is pro-investment, pro-market and liberal (though he might distance himself from this label) is a rare gem among democracies in East Asia. South Korea has the capacity and resources to align with the EU on economic security concerns. The country is often underestimated because of its middle power status, but it is a ‘ net overachiever in Asia ’ with growing diplomatic influence. EU-Korea relations cannot replace transatlantic relations. Nor will they have more than limited impact on the US-Korea alliance. The point is that we may not have a Democrat in Washington, but we do have one now in Seoul, so the EU should take advantage of it. A new era in EU-Korea relations? It’s difficult to overstate how close the EU and South Korea are on paper. They have a wildly successful free-trade agreement , in force since 2011. They have a political framework agreement too, as well as green and digital partnerships with virtually unlimited scope. Recent milestones are the EU-Korea Security and Defence partnership and the inclusion of Korea in Horizon Europe. It could be cynically observed that misery loves company. The EU and South Korea share similar woes, ranging from Washington to domestic affairs. Korea is struggling with a brewing crisis in its security alliance and trade relations with the US, sluggish growth and worries about economic security. Sound familiar? In the uncertain geopolitical environment, these challenges have spurred a global race to compete and innovate. Socioeconomic concerns are being sidelined, amid a fraying social contract and demographic troubles . At the intersection of these shared problems is the clean industrial transition, which is crucial to the race in tech leadership. That’s why now is the time to double down on EU-Korea clean industrial cooperation . This can be done by raising climate ambitions ahead of November’s COP30. Horizon Europe can be used to propel R&D&I cooperation. It should prioritise joint efforts to promote clean technologies, improve regulatory interoperability and resolve issues over the Carbon Border Adjustment Mechanism – a rare thorn in the partnership. The EU-Korea partnership is a strategic and like-minded one. With the unexpected gift of aligned political cycles, it’s time to push towards the last mile in EU-Korea relations. This CEPS Expert Commentary draws insights from the CEPS In-Depth Analysis ‘From partnership to leadership: energising EU-Korea cooperation on the road to net zero’ published on 15 May 2025 and of which the author of this commentary is a co-author.", "wordcount": 1089}, {"source": "publication", "date": "2025-06-05T13:21:53+01:00", "title": "A supervisory efficiency test for EU financial markets: taking an operational approach to integration and oversight", "authors": ["Fabrice Demarigny", "Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/EU-supervisory-efficiency-Policy-Brief-n-44.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-supervisory-efficiency-test-for-eu-financial-markets-taking-an-operational-approach-to-integration-and-oversight/", "excerpt": "The EU’s supervision of financial markets remains fragmented and misaligned with the depth of market integration achieved through initiatives such as the Capita", "full_text": "", "wordcount": 176}, {"source": "commentary", "date": "2025-06-04T13:55:50", "title": "Stop ‘techwashing’ layoffs – and start co-designing the future of work", "authors": ["Laura Nurski"], "topics": ["AI, Digitalisation & Innovation", "Employment & Social Affairs"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/stop-techwashing-layoffs-and-start-co-designing-the-future-of-work/", "page_url": "https://www.ceps.eu/stop-techwashing-layoffs-and-start-co-designing-the-future-of-work/", "excerpt": "In recent weeks, headlines have taken a sharp turn, with Anthropic’s CEO warning that AI could eliminate half of all entry-level white-collar jobs within five years. Business media echo the same worry: is AI replacing – or going to replace – new graduates? These statements tap in…", "full_text": "In recent weeks, headlines have taken a sharp turn, with Anthropic’s CEO warning that AI could eliminate half of all entry-level white-collar jobs within five years. Business media echo the same worry: is AI replacing – or going to replace – new graduates? These statements tap into a growing sense that generative AI isn’t just augmenting work – it’s destroying it. This comes amid mass layoffs in tech and consulting. In 2024 alone, more than 95 000 US tech workers lost their jobs . Dismissals at McKinsey , Microsoft , Duolingo and Salesforce are framed as the result of AI efficiency gains. The narrative is clear: AI is coming for entry-level jobs – and there’s nothing we can do about it. But this deterministic view ignores a simple truth: machines don’t make history. People do. From levelling up to hollowing out Just a year ago, the mood was strikingly different. Early studies suggested that generative AI could level the playing field. In controlled experiments, junior professionals using AI tools began to match the performance of their senior colleagues. Customer support agents resolved more complaints. Consultants produced better recommendations. Programmers coded faster and writers wrote better . And each time, juniors and novices gained more from AI support than seniors and experts. These studies fuelled a wave of optimism. If AI narrowed skill gaps, it could open up new opportunities for middle-skilled workers. AI was envisioned to democratise expertise , enabling middle-skilled workers to take on more complex tasks and allowing organisations to shift complex tasks downward. At its most hopeful, this vision imagined AI as a scaffold – helping juniors, novices and less formally qualified workers climb the ladder faster, learn more and contribute sooner. But that promise is starting to crack. New evidence suggests that generative AI excels at simple tasks , those most often assigned to junior staff. Drafting emails, checking spreadsheets, summarising meeting notes – these are precisely the tasks AI models perform reliably today. In contrast, high-stakes, ambiguous or relational work typically handled by seniors remains much harder to automate. In freelance markets – with their short-term, remote and piece-wise work – the effects are already visible: simpler, short-term gigs are disappearing , while the remaining projects demand more skills and offer higher pay. This reversal has deep implications for how organisations structure work. If AI makes it easier to eliminate the easy tasks, it also makes it easier to eliminate the people who used to do them. Rather than shifting expertise downward, firms can use AI to eliminate the ‘first rung’ of the career ladder entirely. What this means is not just fewer entry-level jobs, but a growing risk of organisational hollowing. Without these stepping stone jobs, career ladders break . And the vision of AI as an equaliser begins to fade. Technology doesn’t decide – management does It’s tempting to see these developments as inevitable: AI improves, junior jobs vanish. But that narrative confuses technological capacity with organisational choice. There’s nothing automatic about how technology reshapes work. As economic historian Robert Heilbroner argued decades ago, machines don’t make history . They present new possibilities but it’s people, organisations and institutions who decide what to do with them. The same holds true today. The decision to cut junior roles is not a technical necessity. It’s a strategic choice, shaped by ideas about productivity, cost and talent. Treating AI-driven layoffs as inevitable hides these decisions behind a veneer of technological determinism. It narrows our collective imagination about what a future of work with AI could actually look like. Imagining the future of work should not be left to Silicon Valley alone. History shows that workers can push back when employers cut corners – and such moments can prompt new social contracts. During early mechanisation waves, skilled male artisans faced the threat of being replaced by unskilled women and children whose labour was cheaper and more easily controlled. The backlash was fierce. Their strikes and protests gave rise to early labour protections, including limits on child labour and rights to organise. We should be treating the rumoured ‘AI jobs apocalypse’ as a similar inflection point. It could be the catalyst for rethinking what we expect from work and how employers should be accountable to those who are just starting out. Redesign, don’t erase Cutting junior roles may seem efficient at first. Tasks still get done, headcounts shrink and costs fall. But in the long term, removing entry-level positions erodes an organisation’s capacity to grow, adapt and retain talent. If employers stop ‘producing seniors’, then their talent pipelines will inevitably dry up. Entry-level positions are not just operational placeholders. They are where workers absorb organisational context, gain judgement and learn the social skills that no AI can replicate. They’re the foundation for future leadership, organisational continuity and institutional knowledge. Without these roles, companies risk creating brittle structures – top-heavy configurations where seniors are stretched thin and no one is ready to replace them upon retirement. In short, what seems efficient today may turn out to be costly tomorrow. Using AI to eliminate junior positions without rethinking organisational structures is not transformation. It’s erosion. AI’s true potential lies not in replacement but in reallocation. It opens the possibility to redesign jobs , restructure workflows and reconsider who does what. It allows us to rethink what junior roles in an AI-first future should consist of to sustain the seniors of tomorrow. But that requires foresight and commitment beyond the next quarterly earnings call. The time to act is now AI’s coming of age is an invitation to reimagine the division and allocation of labour in society. Not to erase the bottom of the ladder but to build new and modern steps on it. Not to fearmonger about the end of work but to reimagine what role work should play in our lives. If we don’t do this, we’ll miss the more important question: who gets to decide what work looks like in the first place? The future of jobs won’t be written by machines but by people. We should all have a say in it.", "wordcount": 1015}, {"source": "publication", "date": "2025-06-02T14:47:13+01:00", "title": "Much more than minerals: the US-Ukraine minerals agreement and its geopolitical implications", "authors": ["Tinatin Akhvlediani"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/06/2025-06-FP-Mineral-deal-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/much-more-than-minerals-the-us-ukraine-minerals-agreement-and-its-geopolitical-implications/", "excerpt": "After months of tense negotiations, the US and Ukraine signed a minerals agreement in Washington D.C. on 30 April 2025. While centred on natural resources, it’s", "full_text": "", "wordcount": 137}, {"source": "publication", "date": "2025-05-30T08:49:15+01:00", "title": "GHG emissions in the Western Balkans: where do we stand?", "authors": ["Damir Dizdarević", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/05/2025-05_ERCC_GHG-Balkans.pdf", "page_url": "https://www.ceps.eu/ceps-publications/ghg-emissions-in-the-western-balkans-where-do-we-stand/", "excerpt": "Western Balkan countries have made visible progress in establishing Monitoring, Reporting, Verification, and Accreditation (MRVA) systems for greenhouse gas emi", "full_text": "", "wordcount": 235}, {"source": "commentary", "date": "2025-05-28T14:19:07", "title": "To unlock EU-Western Balkans energy investment, we first need accurate emissions data", "authors": ["Christian Egenhofer", "Damir Dizdarević"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/to-unlock-eu-western-balkans-energy-investment-we-first-need-accurate-emissions-data/", "page_url": "https://www.ceps.eu/to-unlock-eu-western-balkans-energy-investment-we-first-need-accurate-emissions-data/", "excerpt": "The EU is strongly committed to integrating the Western Balkans into its energy and climate frameworks as part of the enlargement process. It also provides financial support for the region’s transition to sustainable energy systems. The Instrument for Pre-Accession III , the Refo…", "full_text": "The EU is strongly committed to integrating the Western Balkans into its energy and climate frameworks as part of the enlargement process. It also provides financial support for the region’s transition to sustainable energy systems. The Instrument for Pre-Accession III , the Reform and Growth Facility and the EU Energy Support Package together provide more than EUR 20 billion in grants and loans for all sectors. In the energy sector, new funding under the EU Growth Plan for the Western Balkans is supposed to speed up action on the commitments made under the Energy Community Treaty , which links the EU neighbourhood to the EU energy market. This should boost the region’s ongoing EU accession negotiations. However, meeting these commitments is about more than just the Western Balkans complying with the Energy Community Treaty. It’s equally a precondition for reforming the electricity sector and, consequently, unlocking new private investment for a sector that’s currently in distress . The electricity and heat sector alone will require investment of some EUR 31-36 billon, according to the Energy Community Secretariat. National Energy and Climate Plans – a solid springboard An immediate starting point is to implement the National Energy and Climate Plans (NECPs) and establish an effective framework for monitoring emissions. The NECPs provide a roadmap for aligning with EU energy and climate policies. The legal and political foundations already exist – specifically in the Energy Community Treaty, the 2020 Green Agenda for the Western Balkans and the EU regulation that governs the Energy Union. In 2021, the Energy Community adopted a recommendation for developing and implementing the NECPs. This mirrors the EU governance regulation for the Energy Community and sets out a non-binding yet structured process for submitting plans, covering content, timelines, and reporting. The Green Agenda for the Western Balkans was also endorsed at the 2020 Sofia Summit . It commits the region to preparing NECPs in line with the EU’s Green Deal and climate neutrality objectives. In 2022, the Energy Community adopted a Monitoring, Reporting, Verification and Accreditation (MRVA) package. This extends the central provisions of the EU Emissions Trading System to the Western Balkans, as well as obligations under the Monitoring and Reporting and Accreditation and Verification Regulations. Slow progress… Each Western Balkan country was legally obliged to enact the necessary laws by 31 December 2023 and start enacting them no later than 2024. The aim is full operationalisation by 1 January 2026. Encouragingly, all Western Balkan countries have submitted draft NECPs to the Energy Community Secretariat. On top of many other things, they specify emission reduction targets for 2030 and outline policies on how to achieve them. But when it comes to monitoring, reporting and verification – which are critical for tracking progress – there’s unfortunately a lag between high-level planning and on-the-ground capability. According to the 2024 Energy Community report , progress has been mixed. Most countries have not yet set up their national emissions inventory systems, let alone met the obligations under the 2022 MRVA package. This slow progress partly stems from a lack of political will but that’s not the only reason. Western Balkan countries face many common challenges when translating EU frameworks into fully functional systems. These challenges reflect broader structural weaknesses in institutional capacity, financing, coordination and digital infrastructure. To improve the availability and quality of data, institutional capacity must be strengthened. National authorities – mainly environment or energy ministries – tend to be understaffed or short of expertise (or both). The World Bank concludes that most climate institutions in the Western Balkans are only at the ‘nascent’ or ‘emerging’ stages of maturity. Another upcoming obstacle is the scarcity of independent, accredited verifiers. Under the MRVA package, they’re responsible for verifying company emission reports. Most Western Balkan countries have national accreditation agencies, such as for standards and lab certifications. What’s really needed now is for these agencies to provide GHG verification services. Yet financial constraints are a major problem. Relevant ministries and agencies in the region often lack continuous funding for MRVA-related activities such as inventory updates, data systems or training. Donor-funded projects tend to fill the gap. That’s why dedicated EU funding could really help here. A longer-term issue is the need for digitalisation, notably within the ministries and their agencies. According to the UN E-Government Development Index , Western Balkan countries are ranked low in terms of digital capacity. The MRVA system depends on electronic platforms where companies can submit monitoring plans, annual emissions reports and verification statements – and where authorities can review and store this data. Igniting political momentum Some Western Balkan countries have begun developing MRVA systems. To accelerate progress, the technical and institutional hindrances need addressing, which could be facilitated by the Energy Community Secretariat in cooperation with the European Commission. Still, the situation calls for more political will from the Western Balkans. This could be helped by incentives that go beyond ‘technical assistance for membership prospects’. Is the EU open to supporting the credible linking – if not integration – of the region into the EU’s carbon market, and exploring carbon pricing options as discussed in a recent report ? Or can the coupling of electricity markets be accelerated? If any of these options were to become realistic, it could provide a much-needed boost for action. It could not only increase the candidate countries’ EU membership chances but also pave the way for vital investment in the region’s power sector. If pursued, these options really could be an important step forward to locking the Western Balkans into the EU framework in line with a more gradual integration model to stimulate real reform in the region. Damir Dizdarević is Programme Coordinator at the Foundation BFPE for a Responsible Society . This commentary is based on a longer CEPS Explainer on GHG emissions in the Western Balkans which can be accessed here .", "wordcount": 975}, {"source": "publication", "date": "2025-05-28T11:19:17+01:00", "title": "Unfit for purpose? The legal maze of credit scoring under EU law", "authors": ["Judith Arnal"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/05/Unfit-for-purpose-ECRI-In-Depth-Analysis.pdf", "page_url": "https://www.ceps.eu/ceps-publications/unfit-for-purpose-the-legal-maze-of-credit-scoring-under-eu-law/", "excerpt": "The rules on automated credit scoring in the EU are entering a phase of profound transformation. The European Court of Justice’s so-called  SCHU ": "https://www.ceps.eu/ceps-publications/performance-based-instruments-how-could-their-design-be-improved/", "excerpt": "Performance budgeting (PB) and the increasing adoption of performance-based instruments are key trends in the EU budget and the EU’s broader financial framework", "full_text": "", "wordcount": 246}, {"source": "publication", "date": "2025-05-07T08:10:11+01:00", "title": "Climate negotiations under scrutiny", "authors": ["Renske Van Hoof", "Francesca Chapman", "Christian Dietz", "Irina Kustova"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/05/681875841e9610cb0f9faa02_ENSURED_Report_D4.1_Public_final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/climate-negotiations-under-scrutiny/", "excerpt": "The 1992 United Nations Framework Convention on Climate Change (UNFCCC) plays a crucial role in global efforts to tackle the climate crisis. During annual Confe", "full_text": "", "wordcount": 196}, {"source": "publication", "date": "2025-05-07T08:00:26+01:00", "title": "A dataset of international legal and policy instruments for the digital world", "authors": ["Kai Zenner", "J. Scott Marcus", "Kamil Sekut"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/08/CEPS-Zenner-Dataset-070525.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-dataset-of-international-legal-and-policy-instruments-for-the-digital-world/", "excerpt": "At multiple levels, there has been an absolute explosion of policy documents, declarations, strategies, laws and regulations, and court cases that are relevant", "full_text": "", "wordcount": 218}, {"source": "publication", "date": "2025-05-02T11:42:30+01:00", "title": "Why 2025’s Q1 shocks could be the last opportunity to forge an EU master plan", "authors": ["Karel Lannoo"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/05/2025-04_Lannoo-2025-shocks-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/why-2025s-q1-shocks-could-be-the-last-opportunity-to-forge-an-eu-master-plan/", "excerpt": "Europe has been profoundly shaken by the first three months of Donald Trump’s second administration. And because of this, the EU must urgently embrace a much wi", "full_text": "", "wordcount": 134}, {"source": "publication", "date": "2025-04-30T14:15:32+01:00", "title": "EU economic security: confronting the dual challenge of China and the US", "authors": ["Cinzia Alcidi"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/2025-05_ECON-tariffs-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/eu-economic-security-confronting-the-dual-challenge-of-china-and-the-us/", "excerpt": "Donald Trump’s return to the White House has hit the EU like a tornado. Until the end of 2024, concerns about trade dependencies remained primarily focused on i", "full_text": "", "wordcount": 282}, {"source": "publication", "date": "2025-04-29T09:27:53+01:00", "title": "Cancer: repository of regional prevention and detection policies", "authors": ["Cosima Lenz", "Hien Vu", "Timothy Yeung"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/cancer-QG0125003ENN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/cancer-repository-of-regional-prevention-and-detection-policies/", "excerpt": "Cancer – a disease no one wants to face, yet it continues to impact lives unexpectedly. Can we ever truly overcome cancer? While effective treatments are vital,", "full_text": "", "wordcount": 155}, {"source": "publication", "date": "2025-04-16T15:34:51+01:00", "title": "Advancing Ukraine’s reconstruction through G7 leadership", "authors": ["Tinatin Akhvlediani"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/TF4_Akhvlediani_9bTpUOi.pdf", "page_url": "https://www.ceps.eu/ceps-publications/advancing-ukraines-reconstruction-through-g7-leadership/", "excerpt": "Ukraine’s reconstruction is a defining challenge for global governance, stability, and the resilience of democratic institutions. A well-structured approach to", "full_text": "", "wordcount": 319}, {"source": "commentary", "date": "2025-04-16T14:11:49", "title": "A new EuroMed Pact could reinvigorate EU-MENA relations", "authors": ["James Moran"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/a-new-euromed-pact-could-reinvigorate-eu-mena-relations/", "page_url": "https://www.ceps.eu/a-new-euromed-pact-could-reinvigorate-eu-mena-relations/", "excerpt": "The recent history of the EU’s relations in its ‘southern neighbourhood’ can hardly be called its finest hour. It has been preoccupied with defensive policies, notably the focus on controlling illegal migration , spurred by the far right’s growing support. Then there’s the rise o…", "full_text": "The recent history of the EU’s relations in its ‘southern neighbourhood’ can hardly be called its finest hour. It has been preoccupied with defensive policies, notably the focus on controlling illegal migration , spurred by the far right’s growing support. Then there’s the rise of other world powers in the MENA region such as China, Russia and Turkey, which are often less demanding on fundamental values and economic reform. This has holed the European Neighbourhood Policy (ENP) in the South below the water line (the ENP in the East is effectively obsolete) and if not yet irretrievably sunk, it’s listing badly and in need of more than a salvage operation. The US’ disengagement from the region (other than Israel) hasn’t helped either. Above all, the failure to effectively call out Israel’s disproportionate military campaign and disregard of international law in Gaza, as well as its aggression in Lebanon and Syria, has plagued the EU with accusations of double standards vis-à-vis its positioning on Ukraine. This has badly damaged the EU’s reputation as a global force for peace. That said, the EU still matters in the region. For most MENA countries, it’s still the largest trader, investor and source of aid , as well as a growing security provider. People-to-people links are also second to none, whether through the EU’s large immigrant communities, the millions who have studied in Europe, or through the still substantial support the EU provides to MENA civil society. Notwithstanding Israel/Palestine, the EU is also seen as a relatively reliable partner that respects its agreements. Today, as countries like Jordan and Morocco could be subjected to unjustified US tariffs at any moment (despite having FTAs with Washington), reliability is more than ever a prized commodity. And the region also matters to the EU. Some 250 million relatively young and increasingly well-educated citizens live just a few hundred kilometres across the mare nostrum in countries with major energy resources, whether they be sun, wind, green hydrogen or gas. It’s also an important market for EU exports and a potentially competitive source of products and labour for a rapidly ageing Europe – provided that the right balance can be found in the EuroMed partnership. What should be in a new EuroMed Pact? The EU has decided to revamp its relations with its southern neighbours and consultations on a new Pact for the Mediterranean have begun. But the EU needs to listen more attentively to the region’s asks, with a detailed proposal expected in the autumn. The first item should be to modernise the Association Agreements which govern relations between the two sides. Most are now over 20 years old and no longer fit for purpose. Overambitious efforts tried under the ENP, such as the failed attempt to negotiate Deep and Comprehensive Free Trade Agreements, should be avoided. Better to focus on sectoral approaches, such as conformity assessment and sustainable investment accords, paying attention to areas where comparative advantages exist, such as in agriculture. Greater efforts are also needed to nurture business constituencies, building on the foundations of previous private sector programmes. Setting up European Chambers of Commerce in southern countries can help bring the national Chambers to the table when dealing with trade and investment policy. Given the southern neighbourhood’s privileged position under the Lisbon Treaty, the European Commission and the European Investment Bank should prioritise infrastructure and related investments under the EU’s Global Gateway . This would include working in conjunction with Gulf funds, insofar as interests align. All this should be made easier by the Commission’s new DG MENA , which is responsible for relations with both the southern neighbourhood and the Arabian Peninsula. Elsewhere, migration needs to be managed better. The EU’s focus on controlling illegal migration won’t likely change but it needs to be tempered by more energy and investment being put into legal migration opportunities, such as those offered under talent partnership programmes. On security, the Pact should concentrate on areas where the EU can actually deliver, such as deradicalisation – possibly more needed than ever due to the war in Gaza – as well as efforts to stymie terrorist financing and increase maritime security, including in the contested Eastern Mediterranean. Europe provides much of the international oxygen for civil society in the south and with Trump’s defenestration of USAID , demands for EU support will only grow. NGOs play an important role in promoting values and delivering development programmes – EU programmes should be protected and, where possible, expanded. While bilateral relations will continue to dominate, regional cooperation needs to be revamped, not least because the region’s development is hobbled by being the least economically integrated in the world. Reforming the Union for the Mediterranean (UfM) should also be prioritised, including extending some form of membership to GCC countries and other European partners, such as Norway and the UK. Finally, holding a new Euro-Arab summit (the first was held in Cairo six years ago), with the UfM contributing, and this time with a follow-up mechanism, would give an important signal that the two sides really do value their relationship. So, what next? As consultations on the Pact continue, the EU must do more to restore its regional reputation, especially in the Israel/Palestine conflict, which is still the lodestone for mutual trust and successful cooperation. Witness the lack of progress on the US-driven Abraham Accords since they were signed years ago with much fanfare, including in Europe. While EU Member States are still divided, there are a couple of green shoots that could improve the EU’s position – one is the European Council’s support for the Arab plan to reconstruct Gaza, despite being dismissed by the US and Israel; another is France’s announcement that it intends to recognise the State of Palestine. That might not change things on the ground, but it’s an important sign from a major EU country that Europe is prepared to walk the walk on a ‘political horizon’ for the Palestinians and an eventual balanced solution, and it may well spur other Member States who haven’t already done so to follow suit. Finally, the EU needs to get Syria right. And soon. This certainly involves some political risk but committing early to more sanctions relief and reconstruction will show that Europe cares about stability there. It also needs to find common cause on Libya, where splits among Member States have for too long dogged efforts to put that country back together again. Above all, if it avoids the pitfalls of its predecessors, the new Pact could provide a real opportunity for both sides to forge a truly forward-looking EuroMed partnership.", "wordcount": 1100}, {"source": "publication", "date": "2025-04-15T13:23:29+01:00", "title": "From free-riders to front-loaders", "authors": ["Judith Arnal", "Steven Blockmans"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/2025-01_FP_Defence-procurement.pdf", "page_url": "https://www.ceps.eu/ceps-publications/from-free-riders-to-front-loaders/", "excerpt": "The ‘White Paper on European Defence Readiness 2030’ charts a geostrategic course for rearming Europe and, at the same time, offers realistic suggestions on how", "full_text": "", "wordcount": 276}, {"source": "publication", "date": "2025-04-14T09:58:11+01:00", "title": "A decade of EU audit reform – successes, setbacks and what should be done next", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/A-decade-of-EU-audit-reform-Policy-Brief-n-42-ECMI.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-decade-of-eu-audit-reform-successes-setbacks-and-what-should-be-done-next/", "excerpt": "The audit profession plays a vital role in ensuring the integrity of financial reporting, thus safeguarding the interests of investors, lenders and other stakeh", "full_text": "", "wordcount": 197}, {"source": "publication", "date": "2025-04-11T08:21:40+01:00", "title": "2025 Ideas Lab report", "authors": ["Tiril Brekke", "Keziah Edgoose", "Julien Libert"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/IL-report-2025-4.pdf", "page_url": "https://www.ceps.eu/ceps-publications/2025-ideas-lab-report/", "excerpt": "After a 2024 dominated by elections, rising geopolitical tensions and several serious challenges that cannot be avoided, 2025 is already shaping up to be yet an", "full_text": "", "wordcount": 223}, {"source": "commentary", "date": "2025-04-08T18:12:02", "title": "To retaliate or not to retaliate? Or three reasons why the EU shouldn’t react to US tariffs (at least for now)", "authors": ["Cinzia Alcidi"], "topics": ["Economy & Monetary Affairs", "Trade"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/to-retaliate-or-not-to-retaliate-or-three-reasons-why-the-eu-shouldnt-react-to-us-tariffs-at-least-for-now/", "page_url": "https://www.ceps.eu/to-retaliate-or-not-to-retaliate-or-three-reasons-why-the-eu-shouldnt-react-to-us-tariffs-at-least-for-now/", "excerpt": "Donald Trump’s ‘Liberation Day’ has delivered the highest tariff hike in nearly a century. If they’re implemented, the average US tariff rate will rise to 22.5%, around 11 percentage points higher compared to March. Trump has given the world just one week to absorb the news and p…", "full_text": "Donald Trump’s ‘Liberation Day’ has delivered the highest tariff hike in nearly a century. If they’re implemented, the average US tariff rate will rise to 22.5%, around 11 percentage points higher compared to March. Trump has given the world just one week to absorb the news and potentially begin negotiations. European Commission President Ursula von der Leyen was quick to promise a proportionate response while maintaining an openness to dialogue. But the reality is that any retaliation would be far from ideal. It would be driven by the political pressure to show that such aggression won’t be tolerated and not by cold-hard strategy (as it should be). There are at least three reasons why it would be wise for the EU not to react – at least for now – especially if reacting involves duties or taxes targeting US goods or services. Reason one – tariffs are Trump’s signature move Since 2 April, the space for negotiating US tariffs is far narrower than initially assumed. Trump is often characterised as a ‘transactional’ leader, willing to provoke and disrupt but ultimately open to a deal. However, the tone and framing in his ‘Liberation Day’ speech suggest a hardened stance and a limited, if any, appetite for compromise on tariffs. It’s extremely unlikely that talks with the trade partners threatening retaliation will change Trump’s course. What Trump calls ‘reciprocal tariffs’ have little to do with actual reciprocity. All his targets are countries with trade surpluses vis-à-vis the US. In Trump’s narrative, long-standing bilateral trade deficits are evidence of wrongdoing against America, and they’ve become a national security threat. In this logic, despite being wrong, EU counter-tariffs or an EU tax on US services that could lead to higher US trade deficits will simply challenge the tariffs’ key objective and certainly trigger escalation – as is already happening in response to China . This approach aligns with Trump’s own new vision for America, where he openly pitches tariffs as a cornerstone of a new US economic policy. This is a throwback to the 19th century, when tariffs funded the federal budget and protected American industry. Now he wants that model back. No income tax, lower corporate tax and high tariffs. ‘Tariffs make America rich,’ he said. And if that’s the ideological foundation, there’s zero appetite for removing tariffs. Three more elements confirm this reading. The first is that Trump often brags that his tariff rates are ‘very kind.’ His formula to determine the tariff rate takes the US bilateral trade deficit, divides it by imports, and then halves it. But this ‘kindness’ gives him rhetorical space to double rates at any time, possibly to teach someone a lesson or to punish retaliation – not to remove them. Second, Trump has never spelled out what he wants in return that might prompt a rollback, whether these are lower tariffs, non-tariff barriers or regulatory alignment. The crude way tariffs were calculated suggests no real interest in any meaningful give-and-take. Third, the EU cannot ignore what happened with USMCA . Negotiated during his first term to replace NAFTA, it’s now dismissed as a ‘terrible deal’ that he’s already broken. So, even if there is a deal, its value is unclear. Then there’s a practical hurdle: the Office of the US Trade Representative cannot negotiate simultaneously with the 50+ countries now asking for talks. And that suits Trump just fine. Put together, all of this leads to one sad conclusion – expending diplomatic energy trying to negotiate will likely be for nothing, traded in for minor, cosmetic concessions at best. Reason two – US domestic politics are the only tariffs deterrent There’s a chance the tide may (hopefully) turn. Unlike previous cases, such as the US tariffs against Japan in 1987 under the Reagan administration, which were driven by strong business constituencies in Congress , this time feels fundamentally different. US tariffs today are a one-man show. Trump, a self-proclaimed believer in protectionism, has engineered the ’reciprocal tariffs’ almost entirely on his own. While there’s some discomfort in Congress, very few Republican lawmakers have publicly distanced themselves. That may not last. The US stock exchange has plummeted , protests have already erupted across the US, and discontent is likely to rise as the real effects of tariffs begin to hit. Consumer confidence is at a four-year low and likely to continue falling as tariffs, which are fundamentally a tax on domestic consumers, will lead to higher prices. Businesses, especially those reliant on imported components, will also struggle. Today’s global supply chains are simply nothing like those of the 19th century and the US’ capacity to substitute imports with domestic production will take time. According to BudgetLab estimates, if all tariffs announced on 2 April happen, US inflation could rise by 2.3 percentage points. The average monthly loss in household purchasing power would be around USD 300. Higher inflation could force the Federal Reserve to adopt a tighter monetary policy. Unsurprisingly, Trump has already started pressuring the Fed Chair Jerome Powell to hold off on any rate hikes. If inflation climbs and public dissatisfaction grows, Trump’s approval ratings may dip, and unease within Congress may grow louder. Internal pressure may be the only factor that could force a reassessment – or at least a softening – of the tariff policy. Ironically, abstaining from retaliation could strengthen this mechanism, by denying Trump the opportunity to claim further victimhood or justify escalation in response to foreign countermeasures. More importantly, it would avoid compounding already high levels of market volatility and global uncertainty. Reason three – EU retaliation means self-inflicted pain There’s no doubt that the US tariffs have triggered frustration and urgency among EU policymakers and businesses. The instinct to retaliate is strong. But tariffs or taxes targeting US goods or services would almost certainly backfire, translating into higher prices for EU consumers without being able to remove US tariffs meaningfully. And this comes at a particularly delicate moment. The EU is already navigating major geopolitical challenges and the economy is exposed to the potentially depressionary effects of US trade measures. Adding inflation to the mix – through retaliatory tariffs – could push the EU towards a dangerous cocktail of slowing growth and rising prices. This would then leave the ECB in a bind. On the one hand, the economic slowdown calls for supportive monetary policy; on the other, rising prices would make further rate cuts or easing politically and economically contentious. Retaliation risks forcing the EU into a stagflation trap at the worst possible time. That’s why the EU’s best course of action may be to not play by Trump’s rules and focus instead on minimising the damage and exploring other areas of negotiations rather than countermeasures. Reacting with tariffs might offer momentary emotional satisfaction, but it would yield little in terms of economic or political benefit and could risk fuelling further escalation. Restraint could buy time for domestic dynamics in the US to shift and for alternative partnerships, or even alliances, to strengthen. Not reacting isn’t being passive. It’s being strategic and rational.", "wordcount": 1175}, {"source": "publication", "date": "2025-04-03T15:53:12+01:00", "title": "The European Council: truly the law-maker-in-chief?", "authors": ["Edoardo Bressanelli", "Christel Koop", "Francesca Minetto", "Christine Reh"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/04/2025-03_INST-EU-Council.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-european-council-truly-the-law-maker-in-chief/", "excerpt": "We know that the European Council is a powerful and visible strategic agenda-setter, crisis manager, and impasse-breaker. Yet we are less familiar with the role", "full_text": "", "wordcount": 176}, {"source": "commentary", "date": "2025-04-03T09:03:25", "title": "Disk backup to the cloud is a gaping vulnerability in the EU’s security", "authors": ["J. Scott Marcus"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/disk-backup-to-the-cloud-is-a-gaping-vulnerability-in-the-eus-security/", "page_url": "https://www.ceps.eu/disk-backup-to-the-cloud-is-a-gaping-vulnerability-in-the-eus-security/", "excerpt": "Suppose vast quantities of Europeans’ digital data were being sent every few days to a foreign power that has threatened military action against an EU Member State. How should the EU react? Oh, and that foreign power isn’t Russia or China – it’s the United States. We’re not talki…", "full_text": "Suppose vast quantities of Europeans’ digital data were being sent every few days to a foreign power that has threatened military action against an EU Member State. How should the EU react? Oh, and that foreign power isn’t Russia or China – it’s the United States. We’re not talking about the data provided to online service providers such as Google and Facebook – rather the disk backups that are running on everyone’s personal computer, typically every few days. This potentially enormous security exposure is just sitting in plain sight but hasn’t yet visibly bubbled up into the consciousness of European policymakers. That needs to change – the EU needs to conduct a detailed threat assessment reflecting the new realities, identifying who needs to make changes… and how. Why this is suddenly a policy issue Two changes make this a much more serious issue today than it would have been in the past – first, technical and economic changes and second, changes in the geopolitical environment. First, previously, consumers and businesses often did their disk backups to hard drives that they themselves controlled. Today, it’s increasingly common for backups to be done to the cloud – disk backups to offline storage are no longer in vogue. Indeed, this author’s own backup software provider (Symantec) just stopped offering offline backup. Prominent providers of cloud backup services are Amazon Web Services (AWS), Dropbox, IBM, Microsoft, Google and Dell, all of which are US‑based. As much as 70% of all cloud services in the EU are provided by four US‑based firms – AWS, Microsoft Azure, Google Cloud and IBM Cloud. The second reason is geopolitics. As recently as a few months ago, the US was a reliable and predictable ally. Today, US foreign policy has become unpredictable and the country has threatened military action against Denmark to annex or gain control over Greenland. The US might also very well support Russia in its aggression against Ukraine, thus becoming an EU adversary. US intelligence services can get hold of our data It would be naïve to think that US-based firms would refuse to provide data to US intelligence services and doubly naïve to think that US law prevents the inappropriate collection of Europeans’ data. The US has many legal (and extra-legal) ways to force American firms to provide data for national intelligence purposes – whether they want to or not.
