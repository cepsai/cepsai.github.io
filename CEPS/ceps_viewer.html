<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CEPS Publications & Commentaries</title>
<style>
  :root {
    --ceps-dark: #202425;
    --ceps-teal: #207164;
    --ceps-teal-soft: #e6f1ee;
    --ceps-orange: #ff6900;
    --ceps-orange-soft: #ffe9d6;
    --ceps-blue: #0693e3;
    --ceps-grey-50: #fafafa;
    --ceps-grey-100: #f3f3f1;
    --ceps-grey-200: #e6e6e2;
    --ceps-grey-400: #9a9a92;
    --ceps-grey-600: #555;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--ceps-grey-50);
    color: var(--ceps-dark);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.45;
    font-size: 15px;
  }
  a { color: var(--ceps-teal); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header.site {
    background: var(--ceps-dark);
    color: #fff;
    padding: 28px 32px 22px;
    border-bottom: 4px solid var(--ceps-orange);
  }
  header.site h1 {
    margin: 0 0 6px;
    font-size: 22px;
    letter-spacing: 0.5px;
    font-weight: 700;
    text-transform: uppercase;
  }
  header.site p { margin: 0; color: #cfcfcb; font-size: 13px; }

  main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  section.themes {
    background: #fff;
    border: 1px solid var(--ceps-grey-200);
    border-radius: 4px;
    padding: 22px 24px 18px;
    margin-bottom: 24px;
  }
  section.themes h2 {
    margin: 0 0 14px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ceps-teal);
    border-bottom: 1px solid var(--ceps-grey-200);
    padding-bottom: 6px;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }
  .theme-col h3 {
    font-size: 12px;
    margin: 0 0 8px;
    color: var(--ceps-grey-600);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 1fr 36px;
    align-items: center;
    gap: 6px;
    margin: 3px 0;
    font-size: 13px;
  }
  .bar-row .name {
    position: relative;
    background: linear-gradient(to right, var(--ceps-teal-soft) var(--pct,0%), transparent var(--pct,0%));
    padding: 4px 8px;
    border-left: 3px solid var(--ceps-teal);
    border-radius: 2px;
    color: var(--ceps-dark);
    cursor: pointer;
    transition: background 0.1s;
  }
  .bar-row .name:hover { filter: brightness(0.96); }
  .bar-row.types .name { border-left-color: var(--ceps-orange); background: linear-gradient(to right, var(--ceps-orange-soft) var(--pct,0%), transparent var(--pct,0%)); }
  .bar-row.units .name { border-left-color: var(--ceps-blue); background: linear-gradient(to right, rgba(6,147,227,0.12) var(--pct,0%), transparent var(--pct,0%)); }
  .bar-row .count { text-align: right; font-variant-numeric: tabular-nums; color: var(--ceps-grey-600); font-weight: 600; }

  .summary-line {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--ceps-grey-200);
    color: var(--ceps-grey-600);
    font-size: 13px;
  }

  section.controls {
    background: #fff;
    border: 1px solid var(--ceps-grey-200);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }
  .toggle-group { display: flex; gap: 2px; }
  .toggle-group button {
    background: var(--ceps-grey-100);
    border: 1px solid var(--ceps-grey-200);
    color: var(--ceps-dark);
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .toggle-group button:first-child { border-radius: 3px 0 0 3px; }
  .toggle-group button:last-child { border-radius: 0 3px 3px 0; }
  .toggle-group button.active {
    background: var(--ceps-dark);
    color: #fff;
    border-color: var(--ceps-dark);
  }
  input[type=search], select {
    border: 1px solid var(--ceps-grey-200);
    padding: 7px 10px;
    font-size: 14px;
    border-radius: 3px;
    background: #fff;
    font-family: inherit;
    color: var(--ceps-dark);
  }
  input[type=search] { min-width: 240px; flex: 1; }
  .active-filter {
    background: var(--ceps-teal);
    color: #fff;
    padding: 4px 10px 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .active-filter::after { content: "×"; font-size: 16px; line-height: 1; }
  .result-count { color: var(--ceps-grey-600); font-size: 13px; margin-left: auto; font-variant-numeric: tabular-nums; }

  .card-list { display: grid; gap: 12px; }
  .card {
    background: #fff;
    border: 1px solid var(--ceps-grey-200);
    border-left: 4px solid var(--ceps-teal);
    border-radius: 3px;
    padding: 16px 20px;
    cursor: pointer;
    transition: box-shadow 0.12s ease;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card.publication { border-left-color: var(--ceps-orange); }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 6px; }
  .card-meta {
    font-size: 12px;
    color: var(--ceps-grey-600);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }
  .card-source { color: var(--ceps-teal); }
  .card.publication .card-source { color: var(--ceps-orange); }
  .card-title { font-size: 17px; font-weight: 600; line-height: 1.3; color: var(--ceps-dark); margin: 4px 0 8px; }
  .card-authors { font-size: 13px; color: var(--ceps-grey-600); margin-bottom: 8px; font-style: italic; }
  .card-excerpt { font-size: 13.5px; color: #3a3a36; margin-bottom: 10px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: inline-block;
    padding: 2px 9px;
    font-size: 11.5px;
    border-radius: 100px;
    background: var(--ceps-grey-100);
    color: var(--ceps-dark);
    border: 1px solid var(--ceps-grey-200);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }
  .tag.topic { background: var(--ceps-teal-soft); color: var(--ceps-teal); border-color: var(--ceps-teal-soft); }
  .tag.unit  { background: rgba(6,147,227,0.10); color: var(--ceps-blue); border-color: rgba(6,147,227,0.18); }
  .tag.type  { background: var(--ceps-orange-soft); color: var(--ceps-orange); border-color: var(--ceps-orange-soft); }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(20,22,24,0.55); z-index: 100; align-items: flex-start; justify-content: center; padding: 4vh 4vw; overflow-y: auto; }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-top: 4px solid var(--ceps-teal);
    border-radius: 4px;
    width: 100%;
    max-width: 820px;
    padding: 28px 32px 32px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.25);
  }
  .modal.publication { border-top-color: var(--ceps-orange); }
  .modal-meta { font-size: 12px; color: var(--ceps-grey-600); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .modal h2 { font-size: 22px; margin: 0 0 10px; line-height: 1.25; }
  .modal .authors { font-style: italic; color: var(--ceps-grey-600); margin-bottom: 12px; }
  .modal .tags { margin: 6px 0 18px; display: flex; flex-wrap: wrap; gap: 6px; }
  .modal .body {
    font-size: 15px; line-height: 1.65; color: #2a2c2e;
    max-height: 60vh; overflow-y: auto; padding-right: 6px;
  }
  .modal .body p { margin: 0 0 12px; }
  .modal .actions { display: flex; gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--ceps-grey-200); }
  .btn {
    border: 1px solid var(--ceps-grey-200);
    background: #fff;
    color: var(--ceps-dark);
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn.primary { background: var(--ceps-teal); color: #fff; border-color: var(--ceps-teal); }
  .btn.primary:hover { background: #185a4f; text-decoration: none; }
  .btn.publication { background: var(--ceps-orange); color: #fff; border-color: var(--ceps-orange); }
  .btn.publication:hover { background: #d95900; text-decoration: none; }

  /* Keyword analysis */
  .kw-controls { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .kw-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; }
  .kw-col h3 { font-size: 12px; margin: 0 0 8px; color: var(--ceps-grey-600); text-transform: uppercase; letter-spacing: 0.8px; }
  .kw-cloud { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .kw {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    background: var(--ceps-teal-soft);
    color: var(--ceps-teal);
    border: 1px solid #c7e0d8;
    padding: 3px 10px;
    border-radius: 100px;
    cursor: pointer;
    line-height: 1.3;
    transition: transform 0.08s;
  }
  .kw:hover { transform: translateY(-1px); background: #cfeae2; }
  .kw .freq { font-size: 10.5px; color: var(--ceps-grey-600); font-variant-numeric: tabular-nums; }

  @media (max-width: 800px) {
    .theme-grid, .kw-grid { grid-template-columns: 1fr; }
    .card-head { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header class="site">
  <h1>CEPS Publications &amp; Expert Commentaries</h1>
  <p id="hero-summary">Loading…</p>
</header>

<main>
  <section class="themes">
    <h2>Theme overview</h2>
    <div class="theme-grid">
      <div class="theme-col" id="topics-col">
        <h3>Topics (commentaries)</h3>
        <div class="bars" id="topics-bars"></div>
      </div>
      <div class="theme-col" id="units-col">
        <h3>CEPS units (commentaries)</h3>
        <div class="bars" id="units-bars"></div>
      </div>
      <div class="theme-col" id="types-col">
        <h3>Publication formats</h3>
        <div class="bars" id="types-bars"></div>
      </div>
    </div>
    <div class="summary-line" id="summary-line"></div>
  </section>

  <section class="themes" id="keywords-section">
    <h2>Keyword analysis</h2>
    <div class="kw-controls">
      <div class="toggle-group" id="kw-source-toggle">
        <button data-kw-source="all" class="active">All text</button>
        <button data-kw-source="commentaries">Commentaries only</button>
        <button data-kw-source="publications">Publications only</button>
      </div>
      <span style="color:var(--ceps-grey-600); font-size:12px;">Click a keyword to search the corpus. Ranked by document frequency, stopwords filtered.</span>
    </div>
    <div class="kw-grid">
      <div class="kw-col">
        <h3>Top terms</h3>
        <div class="kw-cloud" id="kw-uni"></div>
      </div>
      <div class="kw-col">
        <h3>Top bigrams</h3>
        <div class="kw-cloud" id="kw-bi"></div>
      </div>
      <div class="kw-col">
        <h3>Top trigrams</h3>
        <div class="kw-cloud" id="kw-tri"></div>
      </div>
    </div>
  </section>

  <section class="controls">
    <div class="toggle-group" id="source-toggle">
      <button data-source="all" class="active">All</button>
      <button data-source="commentary">Commentaries</button>
      <button data-source="publication">Publications</button>
    </div>
    <select id="year-select"><option value="">All years</option></select>
    <input type="search" id="q" placeholder="Search title, author, body…">
    <span id="active-filter-slot"></span>
    <span class="result-count" id="result-count"></span>
  </section>

  <div class="card-list" id="cards"></div>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>

secure its own defence or face growing vulnerability in a rapidly deteriorating security landscape. Europe’s policy response so far has consisted primarily of committing more money for defence at the national level and developing instruments to boost joint production and procurement, mostly at the EU level. Yet concerns remain about the uneven nature of defence spending, countries’ ability to follow through on the needed capability ramp-ups, and the limited ability of existing measures to drive the needed defragmentation of Europe’s defence industry. Meanwhile, concerns about the possibility of a Russian kinetic or hybrid attack against one or more European allies, uncertainties about citizens’ willingness to take up arms, and doubts about the timing and nature of support that the US would be willing or able to provide in an Article 5 situation have grown. Despite the return of full-scale war on the European continent with Russia’s renewed invasion of Ukraine, Europe still appears to be treating this existential security crisis like a regular bureaucratic undertaking that it can address at its leisure. It’s at this critical juncture that CEPS, RUSI , Clingendael and IEP/Bocconi convened a task force with relevant stakeholders to substantiate what politicians often casually refer to as a ‘European pillar of NATO’ – but few can say what this means in practice and whether it would offer a credible deterrent. The task force report outlines three possible pathways to shore up Europe’s defences: a more European NATO; a new European multilateralism; or EU-led defence cooperation. Three pathways The task force argues that European policymakers are currently in no position to discard any of these pathways. But given the lack of viable alternatives to NATO as well as existing dependencies on American arms manufacturers, software and strategic enablers until at least the end of the decade, the report recommends that Europeans continue with the ‘Europeanisation of NATO’ as a matter of priority (Pathway 1), thus rebalancing the transatlantic contribution to the Alliance and taking it over if the US were to leave. This effort shouldn’t just consist of Europeans gradually taking over leadership positions from US generals and replacing American officers at lower levels. It should also entail the reconstitution of the ‘Eurogroup’ for political coordination within the Alliance and explore a geographical redistribution of joint command centres to enable them to be led and operated by European allies should the US decide to be less or no longer involved. The second pathway – a new European multilateralism – provides additional means for preparation and action by subsets of allies should the US (or any other ally) render NATO dysfunctional from within, for example by slow rolling or blocking political decision-making or frustrating operational command in an Article 5 situation. Europeans should already now take steps to strengthen, connect, and consolidate existing ‘minilateral’ security arrangements, considering how they could be knit together into a more coherent whole. Enhanced minilateralism would include a political consultation and decision-making mechanism akin to NATO’s North Atlantic Council such as a European Security Council* (ESC) to enable a coalition of the willing to act. Such an ESC should include NATO’s Secretary General and the Presidents of the European Council and Commission, each acting within their own prerogatives. This ESC would have to be supported by the appropriate command structures, operational capacities and dedicated budget. Placing such a pillar of European security on the footing of an intergovernmental agreement would anchor decision-making procedures on a national democratic backstop that works for a membership of both military powerful and less powerful European states. Pathway 3 concerns EU-led defence cooperation. In terms of capability development, the EU has a comparative advantage in supporting not just those 23 Member States which are allied to NATO, but also its associated, candidate and like-minded countries (e.g. Norway, Ukraine, and the UK) to translate defence spending targets into concrete investments and deployable military assets. Obstacles that prevent NATO and the EU from creating maximum synergies in capability development should be removed. NATO should share the necessary information with the corresponding EU structures. For its part, the EU should rebalance defence industrial relationships with the UK and other non-EU members of NATO to serve mutual strategic interests. This entails, among others, the opening of the SAFE (Security for Action in Europe) loan instrument to a wider group of like-minded countries, such as the UK, to finance priority capabilities; accelerating the integration of Ukraine’s defence industry into the single market; and instilling more reciprocity in the transatlantic industrial alliance. EU treaty reform isn’t on the cards anytime soon. That’s why progress towards a genuine European Defence Union will therefore be incremental and partial. The operationalisation of the EU’s mutual defence clause should nevertheless be prioritised within the current institutional configuration. Existing command structures and EU force packages should be readied accordingly to supplement tasks performed by national armies. New realities, new posture Since the end of the Cold War, Europe’s security architecture has been designed primarily around crisis response. This approach assumes a stable baseline of normality, punctuated by episodic disruptions that require temporary intervention before a return to normal. This assumption no longer reflects today’s strategic environment. Europe is now operating in a context where major powers are actively reshaping the underlying rules of the international system. A more proactive posture is needed. Both the mitigation of risks and the ability to capitalise on emerging opportunities require earlier, anticipatory decision-making. Sustained engagement with regional partners and support for counter-drone and air defence resilience must be pursued as a matter of urgency. The central lesson for Europe is clear: our defence, security and governance frameworks must evolve to enable timely, forward-looking decisions in an increasingly contested and unpredictable strategic landscape. [*] Discussion of the idea of creating a European Security Council among Task Force members revealed differences of opinion. The proposal was supported by CEPS, Clingendael and IEP/Bocconi but not by RUSI. Sauli Niinistö is a former President of Finland and the Chair of the Task Force. To read the full report that this commentary is based on, please click here .", "wordcount": 1081}, {"source": "publication", "date": "2026-05-15T09:03:54+01:00", "title": "More Europe in defence – three pathways", "authors": ["Sauli Niinistö", "Steven Blockmans", "Edward Arnold", "Bob Deen", "Daniel Gros"], "topics": [], "units": [], "types": ["Task Force Report"], "link": "https://cdn.ceps.eu/2026/05/TF-Report-More-Europe-in-defence-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/more-europe-in-defence-three-pathways/", "excerpt": "Russia’s war of aggression against Ukraine and destabilising actions by the second Trump administration have sent geopolitics into a tailspin. As turmoil in the", "full_text": "", "wordcount": 232}, {"source": "commentary", "date": "2026-05-13T15:38:51", "title": "The EU must do everything in its power to support Armenia’s turn towards Europe", "authors": ["Karel Lannoo"], "topics": ["Foreign Policy & Security"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/the-eu-must-do-everything-in-its-power-to-support-armenias-turn-towards-europe/", "page_url": "https://www.ceps.eu/the-eu-must-do-everything-in-its-power-to-support-armenias-turn-towards-europe/", "excerpt": "A small but remarkable new piece in the fragmenting and evolving world order is emerging. The European Political Community (EPC) met on 4 May in Yerevan, Armenia, to solidify Europe’s geographical ambitions. Forty-four European leaders were there, including President Macron, who …", "full_text": "A small but remarkable new piece in the fragmenting and evolving world order is emerging. The European Political Community (EPC) met on 4 May in Yerevan, Armenia, to solidify Europe’s geographical ambitions. Forty-four European leaders were there, including President Macron, who made an official state visit to the country, President Zelenskyy, Prime Minister Starmer, but also the Canadian Prime Minister Mark Carney. The very next day, European Commission President Ursula von der Leyen and European Council President Antonio Costa held the first ever EU-Armenia summit, resulting in the adoption of a joint declaration . Armenia’s journey to the EU With their lengthy and detailed joint declaration, the parties have pledged to begin Armenia’s long-term geopolitical realignment toward Europe. The EU is offering institutional integration, security cooperation, economic modernisation, connectivity investment and political backing, while Armenia has committed to becoming progressively more ‘EU-compatible’. Russia’s post-Soviet ‘security guarantee architecture’ in Armenia has collapsed. During the painful conflict with Azerbaijan, Russia was unwilling to stop Azerbaijani advances despite its security obligations to Armenia under the Russian-led Collective Security Treaty . In the post-Karabakh settlement Armenia also saw the depopulation of the ethnic Armenian population form Karabakh under the watchful eye and utter inaction of Russian ‘peacekeepers. Faced with the Armenian population’s growing disillusionment with Russia and Russia’s broken security promises, Armenia’s leadership has chosen a radical re-orientation towards Europe and the West. Hardly noticed in the EU but Armenia’s Parliament already decided to start to path towards EU membership in March 2025, with its ‘ Law on Launching Armenia’s EU A ccession P roces s’. The law’s major message is that Armenia considers European integration to be its true direction for strategic development and is politically declaring its readiness to move towards EU membership whenever the EU is prepared to move forward with the process. This provides an opportunity for the EU to strengthen its influence in the region, especially after the government in neighbouring Georgia turned its back on Europe. A golden opportunity The Caucasus region is key for interconnectivity, as a trade corridor between Central Asia and Europe. Today, Armenia is landlocked between four countries and heavily dependent on Russia for its trade. While most overland trade from east to west needs to pass through Georgia, the opening of Armenia’s borders would create an alternative corridor and hub. This could radically reorient Armenia’s trade flows. The Armenian government is strongly committed to completing these corridors with roads and rail links between Azerbaijan, Turkey and Georgia. President Khachaturyan outlined this at length during the Yerevan Dialogue , the annual event organised by the Ministry of Foreign Affairs on 5 May (the day before the EPC gathering). Both the US and Europe see this opportunity. President Trump concluded the TRIPP peace agreement between the Presidents of Armenia and Azerbaijan, which is being closely followed up by both countries. Meanwhile, Europe organised its EPC meeting in Yerevan and the EU and Armenia have set out a broad cooperation programme. The EU has unblocked a EUR 270 million Resilience and Growth Plan and established an EU-Armenia Connectivity Partnership to facilitate EU investments expected to reach EUR 2.5 billion under the Global Gateway. The programme ‘ deepen s and strengthen s cooperation and dialogue across the whole range of security and defence topics ’, including non-lethal assistance under the European Defence Fund, cooperation with the European Security and Defence College (ESDC ) and participation in the EU’s crisis management operations through the CFSP. Armenia also plans to cooperate in EU high tech initiatives such as the Chips Joint Undertaking , the High-Performance Computing Joint Undertaking (EuroHPC JU) and the EU’s various AI initiatives. Finally, it also enhances cooperation in justice and home affairs. The EU mustn’t flinch As the agreement comes a month ahead of crucial parliamentary elections in the country, it’s been argued that it’s playing directly into the interests of the governing party. Alas, the alternative on offer would be three Russia-backed billionaire oligarchs with extensive business interests in Russia – hence why the EPC meeting and the joint declaration are of extremely strategically significant and deserved far more coverage in the EU media. The potential benefits aren’t only political but also crucial for the region’s overall economic development. The EU has also deployed a hybrid rapid response team to Armenia ahead of the upcoming elections. There are fears that Armenia is already the target of growing, coordinated and manipulative activities seeking to undermine political processes, social cohesion and democratic institutions through disinformation, misinformation, cyber operations, covert influence networks, targeted hack and leak operations and information warfare. Influence campaigns, manipulative social media ecosystems and recurring anti-EU narratives designed to deepen polarisation and weaken public trust in democratic institutions are growing. Alongside all this, Russia and Kremlin-linked proxies are threatening retaliation and economic sanctions against Armenia. What this means is that Armenia’s democratic resilience is increasingly dependent on the EU’s resolve to support the country. Armenia has made its civilisational and strategic choice. The EU’s response through the joint declaration, explicitly referencing Armenia’s legal efforts to eventually accede to the Union is highly positive and should be celebrated. Now the EU must ensure that it doesn’t abandon its new best friend in a volatile yet geopolitically vital region. This commentary expands on a previous CEPS Substack piece .", "wordcount": 883}, {"source": "publication", "date": "2026-05-13T10:44:51+01:00", "title": "Whose ‘civilisational erasure’ – Europe or Trump’s United States?", "authors": ["Michael Emerson"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/05/2026-05-FP-Michael-Emerson-1-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/whose-civilisational-erasure-europe-or-trumps-united-states/", "excerpt": "The US National Security Strategy, published in late 2025, suggested that Europe was facing ‘civilisational erasure’ or, in layman’s terms, was becoming ‘uncivi", "full_text": "", "wordcount": 129}, {"source": "publication", "date": "2026-05-13T10:43:16+01:00", "title": "A ‘middle power coalition’ and why this has become a global necessity", "authors": ["Michael Emerson"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/05/2023-03-FP-Emerson-2.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-middle-power-coalition-and-why-this-has-become-a-global-necessity/", "excerpt": "At Davos in January 2026, Canadian Prime Minister Mark Carney gave a widely applauded speech, arguing that the world’s democratic ‘middle powers’ could work tog", "full_text": "", "wordcount": 166}, {"source": "commentary", "date": "2026-05-11T10:49:50", "title": "Who’s afraid of picket lines? The backsliding of collective labour rights is quietly reshaping European democracy", "authors": ["Davide Monaco"], "topics": ["Diversity, Equity & Inclusion", "Employment & Social Affairs"], "units": ["Jobs & Skills"], "types": [], "link": "https://www.ceps.eu/whos-afraid-of-picket-lines-the-backsliding-of-collective-labour-rights-is-quietly-reshaping-european-democracy/", "page_url": "https://www.ceps.eu/whos-afraid-of-picket-lines-the-backsliding-of-collective-labour-rights-is-quietly-reshaping-european-democracy/", "excerpt": "In spring 1893, mines and factories in Belgium fell silent as the streets filled: thousands of workers joined one of the first general strikes in history, winning a significant extension of suffrage and parliamentary representation. Half a century later, in March 1943, walkouts a…", "full_text": "In spring 1893, mines and factories in Belgium fell silent as the streets filled: thousands of workers joined one of the first general strikes in history, winning a significant extension of suffrage and parliamentary representation. Half a century later, in March 1943, walkouts at the FIAT Mirafiori plant in Turin spread rapidly across northern Italy, as workers demanded bread, peace and freedom – the first act of mass resistance against fascism and the first nail in the coffin of Mussolini’s regime. In the summer of 1980, workers of the Lenin Shipyard in Gdańsk downed their tools, occupied their workplace, and founded Solidarność (Solidarity), helping to set in motion the collapse of Soviet-backed rule in Poland. Three different countries, three different periods, one common thread: workers’ collective action was fundamental to the expansion of democratic rights, exposing the limits of authoritarian and elitist systems. Yet, when we discuss democratic backsliding – the slow deterioration of democratic values and institutions – attention turns to rule of law, corruption, media freedom and judicial independence, while collective labour rights rarely feature in the conversation. They should . Across Europe, the right to strike, protest and organise is under growing pressure. Labour rights backsliding might not make headlines but it’s quietly reshaping our democracies. The 2025 edition of the Global Rights Index by the International Trade Union Confederation, while still ranking Europe as the ‘least repressive’ region for workers, recorded our continent’s worst score since 2014. This only partly reflects the inclusion of countries such as Russia and Belarus, as worrying trends are also visible within the EU – driven in no small part by the rise of far-right parties. Different routes, same destination The backsliding doesn’t follow a single playbook. In Italy, transport minister Matteo Salvini has repeatedly used administrative injunctions ( precettazione ) to curb strikes, turning what once was an exceptional measure into a routine constraint on workers’ dissent. The 2025 and 2026 Security Decrees target protest more broadly, criminalising acts of non-violent civil disobedience such as blocking roads or railways (a tactic long used by striking workers), and introducing preventive detention and bans on participating in public assemblies. In Finland, a 2024 reform caps political strikes at 24 hours, restricts solidarity strikes, increases penalties for ‘unlawful’ walkouts, and introduces fines for individual workers. In Hungary, amid teachers’ protests, the Orbán government misused emergency powers to restrict their right to strike , enabled dismissals for civil disobedience, and adopted a ‘ revenge bill ’ stripping them of public employee status. In France, Macron’s 2023 pension reform was passed without parliamentary vote, following months of strikes and protests that were met with systematic preventive arrests and the ‘ excessive use of force ’. In January 2026, a bill limiting rail strikes during peak hours and for up to 30 days per year was approved by a parliamentary committee and now awaits plenary debate. In Belgium, after backlash forced the withdrawal of a bill endangering the right to protest in 2024, similar proposals have resurfaced under the current federal government, alongside draft laws to impose legal personality on trade unions – potentially undermining their autonomy and fundamental rights . Not a seismic shift, but a molecular transformation None of these actions amount, on their own, to the suppression of the right to strike or protest. If you have recently had a flight or train delayed or cancelled, you will know that strikes are still very much with us. But across countries and over time, they add up to a creeping, molecular transformation : a layering of measures, proposals, practices and discourses that cumulatively reshapes the ground on which workers stand. While formal rights remain enshrined in constitutions and laws, what shrinks is the effective ability to exercise them. This is framed in language emphasising security, public order, and economic harm and unduly expanding the notion of ‘essential’ services. Critics argue that restrictions are needed because strikes cause too much disruption. But strikes or mass protests work precisely because they disrupt. They make visible what is taken for granted: that it’s workers’ labour that keeps the economy running. Would the 1893, 1943 and 1980 strikes have been so consequential without causing disruption? This happens while pressure is also building from inside the workplace. Recent trends in algorithmic management risk deepening workers’ disciplining and exclusion if their voice isn’t embedded in how these systems are designed and used – turning workplaces into laboratories for the authoritarian fantasies of some Big Tech CEOs . One can legitimately ask what would happen to our societies if workers spent most of their waking hours in authoritarian workplaces, only to find their right to strike curtailed. Collective labour rights – and democracy – are being squeezed in a pincer movement, in the workplace and the public space. A threat to diversity and inclusion This May, as the EU marks Diversity Month under the banner ‘inclusive labour markets for all’, collective labour rights should be central to the debate. When they’re eroded, the consequences fall heaviest on those with the least individual bargaining power : women in low-paid sectors, migrants, ethnic minorities, disabled workers and the precariously employed. Without a collective voice, discrimination is harder to expose and individual grievances remain invisible. Restrictions on striking or organising further undermine the inclusivity of workers’ organisations themselves. For the temp worker afraid to lose their job or the migrant worried about their permit, the calculation tips more decisively against organising once fines or criminal sanctions enter the picture. For democracy and inclusion to be effectively upheld, collective agency must be taken seriously. Although the Treaties explicitly exclude the right to strike from being a supranational competence, a narrow path remains: EU institutions can monitor whether collective rights are effectively exercised and issue recommendations where they are undercut. Beyond ‘soft’ measures, recent initiatives also show that the EU can go further than often assumed, as with the Adequate Minimum Wages Directive and the Platform Work Directive. The EU’s commitment to the Sustainable Development Goals, reiterated in Commissioners’ mission letters , reinforces the point – SDG8 calls explicitly for labour rights protection for all workers. What remains largely absent, however, is a sustained public debate — among citizens, experts, social partners and policymakers — that acknowledges the scale of the backsliding and recognises collective labour rights for what they are: the most basic form of democratic participation available to people whose only leverage is to withdraw their labour, and who have no voice but a collective one. This commentary is part of a short series of commentaries to mark European Diversity Month , which will be published over the course of May.", "wordcount": 1107}, {"source": "publication", "date": "2026-05-08T13:13:45+01:00", "title": "EU support for natural disasters", "authors": ["Iain Begg", "Eulalia Rubio", "Cinzia Alcidi"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/eu-support-for-natural-disasters/", "page_url": "https://www.ceps.eu/ceps-publications/eu-support-for-natural-disasters/", "excerpt": "Increasing damage from natural disasters has prompted a better integrated approach to disaster risk management in Europe. Although the current EU budget support", "full_text": "", "wordcount": 135}, {"source": "commentary", "date": "2026-05-08T10:00:45", "title": "The Turkey-EU relationship reveals the limits of transactionalism", "authors": ["Sergen Kizilhan", "Demir Murat Seyrek"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/the-turkey-eu-relationship-reveals-the-limits-of-transactionalism/", "page_url": "https://www.ceps.eu/the-turkey-eu-relationship-reveals-the-limits-of-transactionalism/", "excerpt": "Turkey-EU relations are complex. Although EU leaders increasingly refer to Turkey as a ‘partner’, it remains a formal candidate country fundamentally tied to Europe through its customs union, NATO membership, Horizon Europe association and regulatory convergence with EU standards…", "full_text": "Turkey-EU relations are complex. Although EU leaders increasingly refer to Turkey as a ‘partner’, it remains a formal candidate country fundamentally tied to Europe through its customs union, NATO membership, Horizon Europe association and regulatory convergence with EU standards. Turkey’s EU accession negotiations are frozen due to the country’s democratic backsliding and concerns over the rule of law and freedoms. This causes a dilemma for the EU: how to deepen cooperation with Turkey in critical strategic domains while its accession prospects remain stalled. Turkey is too important for regional security, managing migration and energy corridors for the EU to ignore it. Yet it lacks a long-term policy for its relations with Ankara. While it often turns to Turkey in moments of crisis, the relationship’s transactional nature makes developing a comprehensive framework more difficult. The 2015 migration crisis created significant political pressure within the EU, with the consequences still visible today through the rise of many far-right parties across Europe. It also served as a wake-up call that regardless of the accession process, Turkey remains indispensable. The EU’s ‘transactionalism’ was supposed to be temporary, but it’s been repeatedly used over the past decade despite its limits and the longer-term strain on the EU’s relevance in Turkey. It also sidelines the very values which the EU is founded on. Transactional engagement has also been extended to energy security, foreign and security policy, trade and counter-terrorism. Today, amid the Russian threat and increasingly uncertain transatlantic relations, Turkey is once again being seen as a key country in the highly strategic domains of defence and energy connectivity. This recurring pattern highlights a core problem: Turkey is repeatedly called upon to manage Europe’s most consequential crises. Yet the framework governing Turkey-EU cooperation remains one of short-term crisis management rather than long-term strategic planning. There are also diverging views among leaders as European Commission President Ursula von der Leyen’s stance clearly positions Turkey differently from Germany’s Chancellor Merz . The transactional trap: an unstable model for both sides Global geopolitical volatility makes the transactional model increasingly unstable. As the rules-based international order comes increasingly under pressure (from Russia, America’s multilateral retreat, China’s assertiveness, and the proliferation of regional conflicts and proxy wars which cause migration, instability and energy and supply chain disruptions), the EU’s pursuit of strategic autonomy requires reliable and institutionalised relationships. The current state of Turkey-EU relations falls short of this. Transactionalism allows both sides to manage crises, but it hasn’t generated the trust, predictability or strategic alignment needed for meaningful cooperation. Without addressing broader political issues, even the most promising initiatives will struggle to reach their full potential. Two factors largely explain this gap: the EU’s lack of clarity about Turkey’s role in Europe’s future and ongoing democratic backsliding in Turkey. But the EU can’t afford to maintain such ambiguity towards a country of such strategic importance. As a new European Parliament report suggests , the EU can be vocal about democracy and the rule of law in Turkey, while still advancing relations with a strategic vision. Doing this would also help restore the EU’s relevance. Turkey cannot simply be reduced to its current government, and the EU’s engagement can’t be held hostage by assuming that the political status quo is permanent. While the path to democratic change isn’t an easy one and the Turkish government’s increasing pressure on the opposition continues to raise concerns in Brussels, there are also some positive signs. The main opposition party’s strong stance on democracy, the continued popularity of the opposition’s presidential candidate, Ekrem İmamoğlu (despite his imprisonment) and sustained civic mobilisation regardless of mounting constraints all point towards possible democratic change. The main opposition party (the Republican People’s Party – CHP) has built a programme centred on restoring judicial independence, reinstating checks and balances, rebuilding civil space and freedoms, and re-energising the EU accession process. This isn’t a marginal position. Rather, it’s the programme of a party that won more votes than the governing alliance in the 2024 local elections. All this is why the EU shouldn’t remain silent. It should actively call for an end to politically motivated cases against the opposition, maintain close dialogue with opposition figures, and support civil society and independent media. A new vision for Turkey-EU relations The Turkey-EU transactional model has reached its limits and that’s why the EU needs to develop a new vision for its relationship with Turkey. While accession prospects should be preserved and reaffirmed, the relationship should evolve into a transparent framework outlining possible pathways, supported by clear benchmarks and a realistic appraisal of future potential. The ongoing enlargement debates, particularly regarding Ukraine, could also offer useful reference points. The priorities are now less about revisiting the technical details of accession and more about resetting a strategic direction. This means reaffirming Turkey’s status, even if negotiations remain frozen, emphasising a long-term perspective, and re-energising high-level political dialogues based on mutual interests and shared values rather than narrow transactional exchanges. It also requires setting well-defined and credible benchmarks for progress. While major reforms and returning to the accession process may not be feasible for now, such a framework could still spur progress and restore the EU’s relevance in Turkey. This includes updating the customs union in its scope and rules in line with current realities and the principle of fairness. There could be more structured Turkish participation in the European security architecture and more sustainable, values-based cooperation in areas such as migration, connectivity, energy security and critical raw materials. Moving beyond the increasingly unconvincing ‘partner’ discourse, such a vision would also send a clear signal to millions in Turkey who support a democratic and European future. By offering a credible prospect, it could help prepare the ground for normalising relations when Turkey does return to a path of democracy. This approach is consistent with the phased, proportionate and reversible framework endorsed by the European Council in June 2021 . However, rather than remaining an ambiguous formula, it should be translated into a coherent strategy with well-defined stages. If the EU’s truly serious about Turkey’s potential role in advancing its strategic autonomy – including in the field of European defence – such a structured and forward-looking approach is no longer optional… but necessary.", "wordcount": 1035}, {"source": "publication", "date": "2026-05-08T08:28:31+01:00", "title": "Flanders’ competitiveness and investment priorities in key strategic technologies", "authors": ["Pierre-Alexandre Balland"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/flanders-competitiveness-and-investment-priorities-in-key-strategic-technologies/", "page_url": "https://www.ceps.eu/ceps-publications/flanders-competitiveness-and-investment-priorities-in-key-strategic-technologies/", "excerpt": "As the global race for technological leadership accelerates, the central challenge for Flanders is to identify where to invest to maximize long-term competitive", "full_text": "", "wordcount": 183}, {"source": "publication", "date": "2026-05-06T09:22:38+01:00", "title": "Private credit’s problem isn’t illiquidity – it’s the illusion of liquidity", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/05/No-109-Private-credit-illusion-liquidity.pdf", "page_url": "https://www.ceps.eu/ceps-publications/private-credits-problem-isnt-illiquidity-its-the-illusion-of-liquidity/", "excerpt": "Recent redemption pressure in private credit has been treated as a warning that something in the system is breaking. BlackRock restricted withdrawals from one p", "full_text": "", "wordcount": 139}, {"source": "publication", "date": "2026-05-05T13:20:33+01:00", "title": "Overcoming challenges for second-life applications for battery packs", "authors": ["Marika Moreschi", "Vasileios Rizos"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/05/2026-05-ERCC-second-life-batteries-applications.pdf", "page_url": "https://www.ceps.eu/ceps-publications/overcoming-challenges-for-second-life-applications-for-battery-packs/", "excerpt": "In the battery ecosystem emerging from the growing diffusion of battery-powered electric vehicles, second-life applications for batteries can contribute to more", "full_text": "", "wordcount": 238}, {"source": "commentary", "date": "2026-04-29T11:54:05", "title": "AI agents cannot be governed without their own digital identity", "authors": ["Eduardo Brito"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/ai-agents-cannot-be-governed-without-their-own-digital-identity/", "page_url": "https://www.ceps.eu/ai-agents-cannot-be-governed-without-their-own-digital-identity/", "excerpt": "Across the EU, efforts to govern AI are rapidly advancing, yet a more fundamental issue hasn’t yet been fully addressed. Digital identity is one of the foundational ordering principles of modern digital societies, determining who can act, under what authority, and how accountable…", "full_text": "Across the EU, efforts to govern AI are rapidly advancing, yet a more fundamental issue hasn’t yet been fully addressed. Digital identity is one of the foundational ordering principles of modern digital societies, determining who can act, under what authority, and how accountable they are within digital systems. For decades, this architecture has been built around a simple premise: only humans and legally constituted organisations can participate in the digital environment. However, this premise has become increasingly strained in a digital environment that’s no longer solely composed of human actors – and that’s why the EU must begin working on a dedicated digital identity infrastructure for AI agents. An increasingly old-fashioned foundation European digital governance frameworks have developed within this human-centred model, where each law addresses a specific layer of the ecosystem. The updated eIDAS framework (2.0) has established what constitutes a ‘trusted’ digital identity, allowing for secure authentication and legally recognised digital transactions. Building on this, several other legislative pieces assume that every individual will have a trusted digital identity and that they’ll be easily identifiable and authenticated when engaging in digital interactions. One example is that the Digital Services Act should be interoperable with the European Digital Identity Wallet for user authentication. And the AI Act introduces transparency obligations requiring certain AI-generated outputs to be disclosed or clearly identifiable, helping people to recognise such content. Taken together, these frameworks regulate identities, platforms and AI tools; yet they remain centred on human participation and human interactions with systems and content. But this isn’t the case anymore. AI agents are already acting on humans’ behalf, exchanging data with humans (and with each other), negotiating services, producing information and increasingly interacting with physical infrastructure. These developments are now challenging the legacy human-centred approach to digital identity. When an autonomous AI agent performs an action in the digital – or even the physical – world, how can it be reliably attributed or verified? And who is ultimately accountable? Without reliable mechanisms to record and verify agent activity, societies lack the necessary evidence to understand and govern the behaviour of autonomous systems. Policymakers can’t meaningfully assess risks, assign responsibility or design safeguards if autonomous agents’ actions remain opaque. Infrastructure is needed for effective governance. While regulation defines permitted conduct, infrastructure determines whether actions can be attributed, interactions authenticated and decisions contested. Without an underlying layer that makes autonomous agents identifiable and traceable, any rules governing their behaviour aren’t reliable. Current frameworks simply don’t address how agents should appear as accountable actors within digital interactions – and such an omission needs to be addressed. We need a new framework The challenge becomes even more visible when looking at the European Commission’s new Apply AI Strategy , which aims to accelerate AI’s deployment and adoption across Europe’s economy and public sector. As various initiatives encourage the development of increasingly autonomous systems, the number of interactions between software agents, services and physical infrastructure will only grow. Ensuring these interactions remain attributable and verifiable becomes essential for maintaining trust in increasingly automated environments. On the longer horizon, the inability to reliably attribute and verify autonomous agents’ actions in digital environments will also directly impact democratic cohesion and content moderation. Without ways to identify origin and authority, coordinated manipulation and even interference becomes difficult to detect and contest, and individuals may not be able to verify information presented to them or challenge automated decisions. That’s why we need new layers of digital trust infrastructure capable of binding actions to identifiable actors and linking events to verifiable context . This means cryptographically anchored identities for AI agents, secure protocols governing interactions between humans and agents, and mechanisms capable of certifying real-world context. Without these mechanisms, the agentic internet (an emerging part of the internet where AI agents act on users’ behalf) could evolve into an environment where impersonation, unverifiable automation and synthetic evidence become structurally indistinguishable from legitimate actions. Europe must design and deploy a digital identity infrastructure for AI agents, where they can appear and operate within digital interactions as both identifiable and verifiable actors. This is an absolute must for ensuring accountability, contestability and information integrity. If Europe succeeds, it won’t only govern AI systems, but it’ll also help shape the trust in infrastructure which future autonomous digital societies will depend on.", "wordcount": 715}, {"source": "commentary", "date": "2026-04-28T15:58:49", "title": "The provisional application of the EU-Mercosur agreement matters… despite the legal uncertainty", "authors": ["Cinzia Alcidi"], "topics": ["Trade"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/the-provisional-application-of-the-eu-mercosur-agreement-matters-despite-the-legal-uncertainty/", "page_url": "https://www.ceps.eu/the-provisional-application-of-the-eu-mercosur-agreement-matters-despite-the-legal-uncertainty/", "excerpt": "On 1 May 2026, the EU-Mercosur Interim Trade Agreement (iTA) will provisionally come into force, marking a decisive – even if legally incomplete – step in one of the longest-running trade negotiations in modern economic diplomacy. After more than 25 years of intermittent talks, p…", "full_text": "On 1 May 2026, the EU-Mercosur Interim Trade Agreement (iTA) will provisionally come into force, marking a decisive – even if legally incomplete – step in one of the longest-running trade negotiations in modern economic diplomacy. After more than 25 years of intermittent talks, political setbacks and regulatory recalibration, it’s entering into force in a somewhat paradoxical manner. It follows an agreement between the European Commission and Council on both a full partnership agreement (EMPA) on trade and investment and a temporary trade agreement (iTA), opposition from the European Parliament (EP), its referral to the European Court of Justice (ECJ), and the agreement’s rapid ratification by the Mercosur countries. While the latter isn’t sufficient for the EMPA to enter fully into force (it must be ratified by all EU Member States), based on the Council’s decision , it does allow the trade component – the iTA – to be provisionally applied. Consequently, the agreement is now under judicial scrutiny, yet it’s no longer an abstract political commitment: it’s become operational, shaping real economic exchanges. That in itself marks a significant shift. Mercosur (made up of Argentina, Brazil, Paraguay and Uruguay) represents one of Latin America’s most significant economic blocs and has long been one of the EU’s most important yet under-integrated partners. Trade and investment ties are already deep – the EU is the region’s leading foreign investor and bilateral trade in goods and services was around EUR 150 billion in 2024. These flows have developed despite substantial tariff and regulatory barriers, particularly on industrial goods and agri-food products. Economic and strategic benefits By liberalising more than 90 % of trade, the agreement will create immediate opportunities for EU exporters, especially in sectors such as machinery, automotive, pharmaceuticals and chemicals. These sectors will have improved access to markets that have been traditionally protected by tariffs of up to 35 %, resulting in enhanced competitiveness, expanded market share and new business opportunities. Equally important is the agreement’s role in strengthening supply chain resilience. The EU has become acutely aware of the risks associated with excessive dependence on a limited number of suppliers, particularly for critical raw materials. Mercosur offers a credible alternative: a resource-rich region where Europe already has strong institutional, economic and cultural ties. Facilitating trade isn’t just an economic objective but a strategic necessity, with the iTA contributing directly to the EU’s broader agenda of ‘de-risking’ globalisation rather than retreating from it. The strategic dimension extends beyond economics. The agreement sends a clear signal about the EU’s role in the global trading system. At a time when multilateralism is under strain and protectionist tendencies are re-emerging, the EU is demonstrating its capacity to conclude and implement large-scale, rules-based trade agreements. In short, alongside ongoing negotiations with partners such as India, Indonesia and Australia, Mercosur is reinforcing the EU’s position as a central actor in shaping global trade governance. It also carries geopolitical weight. Latin America has become an increasingly competitive arena, with China expanding its economic presence and the US reasserting its influence in the region. Maintaining the EU’s role of primary economic partner requires more than just recognising historical ties; it requires active and visible engagement. The iTA’s application signals exactly this, a move from intent to real, tangible action. Importantly, the agreement reflects the evolution of EU trade policy towards a more pragmatic approach. The EU hasn’t abandoned its ambitions to promote high standards on issues such as deforestation, carbon emissions and human rights. But these requirements – often perceived as penalising, particularly by developing and emerging partners – are now being pursued through a more pragmatic balance. Greater flexibility in how and when some conditions are embedded or enforced helps to ensure that regulatory ambition doesn’t prevent the establishment of strategic partnerships. In this sense, Mercosur may serve as an example of how trade integration can advance regardless of geopolitical tensions and without abandoning the EU’s normative objectives. Farmers’ protests and politics Despite these positive elements, the agreement has triggered strong protests from parts of the agricultural sector. Concerns among European farmers have shaped political debates in several Member States and in Brussels. Ahead of the EP vote, Commission President Ursula von der Leyen proposed mobilising EUR 45 billion from the EU budget to support farmers and secure backing for the deal – but this proved insufficient. The EP instead supported referring the agreement to the ECJ, effectively putting the broader ratification process on hold. These concerns shouldn’t be dismissed and the democratic process is of course important. Trade agreements inevitably cause various impacts and some of the adjustment pressures in sensitive agricultural sectors are very much real. Yet the likely impact of competition from Mercosur is often overstated. The agreement includes multiple safeguards for EU farmers, arguably more protective than those granted to Mercosur producers. The liberalisation of sensitive agricultural products is partial and gradual, managed through tariff-rate quotas and accompanied by robust safeguard mechanisms, including the possibility to temporarily suspend preferential treatment if there’s market disruption. Strict sanitary and environmental standards remain in place, ensuring that increased competition doesn’t come at the expense of regulatory integrity. An often-overlooked point is that trade agreements can actually benefit agriculture. Both the EU-Japan agreement and the provisional application of the Canada-EU (CETA) agreement have seen increased EU agricultural exports . Some of the fears surrounding import surges haven’t materialised. In CETA’s case of, Canada hasn’t flooded the EU market with beef ; in fact, it never fully utilised its export quota. This reminds us that how potential risks are politically perceived doesn’t always correspond to actual trade outcomes. Legal uncertainty – but momentum nonetheless The legal questions currently before the ECJ should be seen in this broader context. Compatibility with the EU Treaties is a significant issue that should be clarified, but it’s no secret that the process reflects political opposition to EU trade agreements more broadly, often driven by national politics as much as legal concerns. In this sense, provisional application serves not only an economic function but also a political one: it provides evidence. As benefits become visible – and adjustment costs prove manageable – the debate may gradually shift. Experience often proves far more persuasive than projection. That’s why even though implementation without full legal certainty isn’t ideal, it may yet prove useful in building the broader democratic support the agreement ultimately needs to succeed. In this sense, 1 May 2026 isn’t overshadowed by uncertainty – it’s being defined by momentum.", "wordcount": 1077}, {"source": "commentary", "date": "2026-04-24T09:25:45", "title": "Orban’s defeat opens the door to EU funds and to smarter rule of law conditionality", "authors": ["Cinzia Alcidi", "Eulalia Rubio"], "topics": ["Economy & Monetary Affairs"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/orbans-defeat-opens-the-door-to-eu-funds-and-to-smarter-rule-of-law-conditionality/", "page_url": "https://www.ceps.eu/orbans-defeat-opens-the-door-to-eu-funds-and-to-smarter-rule-of-law-conditionality/", "excerpt": "Viktor Orbán’s defeat has revived a familiar question in Brussels: how and when to release the billions in EU funds frozen due to rule of law concerns. Hungary’s prime minister-designate, Péter Magyar, has already signalled his intention to meet the Commission’s conditions to unl…", "full_text": "Viktor Orbán’s defeat has revived a familiar question in Brussels: how and when to release the billions in EU funds frozen due to rule of law concerns. Hungary’s prime minister-designate, Péter Magyar, has already signalled his intention to meet the Commission’s conditions to unlock the roughly EUR 18 billion withheld since 2022. The sums at stake are substantial and time sensitive. They include EUR 10.4 billion from the Recovery and Resilience Facility, with the deadline for accessing the money expiring at the end of August, and EUR 7.4 billion in cohesion funds. Time is short, and the reform agenda is demanding, ranging from strengthening judicial independence and anti-corruption safeguards to restoring academic freedom and media pluralism. Beyond the question of releasing the frozen funds, Hungary’s experience should encourage a broader reflection on how the EU should design rule of law conditionality to make it more effective and fairer. The current EU rule of law conditionality toolbox can put pressure on governments, but it also causes significant unintended effects. As argued by Budapest’s mayor, Gergely Karácsony, freezing funds imposes real costs not only on central governments but also on municipalities and civil society actors that depend on EU support. In countries where rule of law breaches are systemic, these actors are often the very ones the EU seeks to protect – yet they’re among the first to suffer when funds are suspended. Why the current system falls short – Hungary’s case The 2020 EU Rule of Law Conditionality Regulation requires governments to continue honouring payments to final beneficiaries even when EU cohesion programmes are suspended. In practice, however, this has proven largely ineffective. In Hungary’s case, the suspension of 55 % of budgetary commitments from three cohesion policy programmes for the 2021-27 period occurred before the programmes had even started. Since no legal entitlement existed for beneficiaries, there was nothing to ‘honour’. At the same time, the government retained full discretion to manage the remaining funds, despite the suspension being triggered by systemic deficiencies such as irregular public procurement. Evidence suggests that this discretion was used by the central government to discriminate against politically non-aligned beneficiaries, notably Budapest. Lastly, the EU ban on politically controlled universities from participating in Horizon and Erasmus+ programmes, while justified, was poorly communicated. It had negative repercussions on students and researchers, ultimately weakening public support for the EU’s measure. ‘Smart conditionality’ – appealing but difficult to implement This tension has revived interest in ‘smart conditionality’, the idea of redirecting suspended EU funds away from central governments and towards local or pro-democratic actors. While appealing, implementing it would be administratively and politically challenging. The point of suspending EU payments is to incentivise central governments to enact reforms. But for this to work, suspensions must create some costs. If final beneficiaries are fully shielded, they won’t exert any pressure on their government, weakening the intended leverage. Additionally, in countries where the central government systematically infringes rule of law principles, it’s difficult to distinguish between ‘innocent’ recipients and those complicit in such violations. Local authorities, businesses and universities must often maintain a certain level of connivance with the central government to operate within the system. In Hungary, one may wonder if universities could have resisted the changes imposed by the central government (which made them ineligible for EU funds), given their financial dependence on the state. A more promising approach Rather than attempting to protect specific beneficiaries upfront, the Commission’s 2028-34 Multiannual Financial Framework (MFF) offers a more indirect form of ‘smart conditionality’ that could be more effective. The draft National and Regional Partnership Plans (NRPP) Regulation links payments to respect for the EU Charter of Fundamental Rights and rule of law principles, allowing suspensions for non-compliance. After a year, the amounts suspended are definitively lost and can be reallocated to other EU programmes (and Member States), particularly those supporting democracy, civil society and anti-corruption efforts. These provisions establish a legal and operational framework which would overcome the two main challenges for implementing smart conditionality. Reallocation happens shortly after the government loses the funds, meaning the government bears the financial and political cost. Additionally, the reallocated funds aren’t redirected to specific ‘deserving’ beneficiaries, which are difficult to identify, but are used to finance EU efforts to promote democracy and the rule of law more broadly. However appealing, the proposal can be improved . First , the rigid one-year deadline to redress rule of law violations risks backfiring. If compliance cannot realistically be achieved within that timeframe, the Commission may hesitate to trigger the mechanism. A more flexible system – allowing extensions to two to three years if properly justified – would make enforcement more credible. Second , decisions on reallocating funds shouldn’t rest solely with the Commission. Involving the Council and the European Parliament would increase legitimacy and reduce the risk that reallocated funds are used for unrelated budgetary priorities. This could be done by taking these decisions through the annual steering mechanism that must precede the negotiations over the EU’s annual budget. Third , to qualify as genuine ‘smart conditionality’, reallocated funds should be earmarked for the Member State concerned. The Commission should publish a sound and rigorous assessment of the economic and social impact of rule of law violations and related fund suspensions in the affected country and build on this to re-allocate the funds. Supporting civil society, municipalities or independent institutions within that country would ensure that ‘smart conditionality’ mitigates harm. A narrow political window Orbán’s defeat creates an opportunity to reset EU relations with Hungary and unlock the suspended funding. But it should also be a catalyst for reforming the governance of the next MFF. ‘Smart conditionality’ alone won’t deliver a more effective post-2027 rule of law regime. One of the system’s main weaknesses has been uneven and politically cautious enforcement. All too often, the Commission has applied (or avoided applying) suspension procedures in an opaque and hesitant manner. That’s why a more systematic and transparent use of the existing toolbox is essential. This requires clear and robust indicators to monitor compliance with rule of law standards, as well as triggering decisions grounded in independent assessments , to minimise politicisation and guarantee equal treatment among Member States. Introducing automatic de-commitment and the mandatory reallocation of suspended amounts would provide a necessary complement. It would make suspensions easier to trigger but also more politically sustainable by ensuring that funds aren’t simply frozen but rather redirected to support those who truly do uphold EU values.", "wordcount": 1078}, {"source": "publication", "date": "2026-04-24T08:19:28+01:00", "title": "Why competitiveness shouldn’t be a secondary mandate for supervisors", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/No-108-Competitiveness-secondary-mandate.pdf", "page_url": "https://www.ceps.eu/ceps-publications/why-competitiveness-shouldnt-be-a-secondary-mandate-for-supervisors/", "excerpt": "Europe needs a more competitive financial system. Yet assigning supervisors a secondary competitiveness objective is the wrong path for getting there. Competiti", "full_text": "", "wordcount": 75}, {"source": "publication", "date": "2026-04-23T13:12:50+01:00", "title": "Globalising FP10: better engagement with associated and low- and middle-income countries", "authors": ["Andrea Renda", "Timothy Yeung", "Diana Senczyszyn", "Katja van der Meer", "Linnea Paludan"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/CEPS-report-FP10-association_updated-Formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/globalising-fp10-better-engagement-with-associated-and-low-and-middle-income-countries/", "excerpt": "The EU is currently designing its tenth Framework Programme for Research and Innovation (FP10), the successor to Horizon Europe, against a backdrop of heightene", "full_text": "", "wordcount": 193}, {"source": "publication", "date": "2026-04-21T08:54:29+01:00", "title": "Policy options to create lead markets for clean, sustainable and circular feedstocks in the chemical industry", "authors": ["Christian Dietz", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-04-ERCC-chemical-industry-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/policy-options-to-create-lead-markets-for-clean-sustainable-and-circular-feedstocks-in-the-chemical-industry/", "excerpt": "Reaching the EU’s climate targets requires cutting emissions across its entire economy. While low-carbon energy and notably electrification can significantly re", "full_text": "", "wordcount": 261}, {"source": "publication", "date": "2026-04-16T14:00:33+01:00", "title": "Study supporting the evaluation of the EU Executive Agencies", "authors": ["Andreas Kopp", "Harry Crichton-Miller"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2026/04/study-supporting-the-evaluation-of-the-eu-executive-KI0126016ENN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/study-supporting-the-evaluation-of-the-eu-executive-agencies/", "excerpt": "According to Article 25 of Council Regulation laying down the statute for the executive agencies, an external evaluation of how each agency operates must be car", "full_text": "", "wordcount": 208}, {"source": "publication", "date": "2026-04-16T09:44:06+01:00", "title": "Private credit’s liquidity façade is beginning to fracture", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/No-107-Private-credit.pdf", "page_url": "https://www.ceps.eu/ceps-publications/private-credits-liquidity-facade-is-beginning-to-fracture/", "excerpt": "The recent string of withdrawal limits in private credit shouldn’t be waved away as a US-only sideshow. Over just a few weeks, BlackRock restricted withdrawals", "full_text": "", "wordcount": 109}, {"source": "publication", "date": "2026-04-15T13:41:53+01:00", "title": "Securitisation is back on the agenda. The question is whether the EU will use it properly", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/No-106-Securitisation.pdf", "page_url": "https://www.ceps.eu/ceps-publications/securitisation-is-back-on-the-agenda-the-question-is-whether-the-eu-will-use-it-properly/", "excerpt": "Brussels is no longer asking whether securitisation should return – that question has already been answered. The European Commission tabled reform, the Council", "full_text": "", "wordcount": 174}, {"source": "publication", "date": "2026-04-15T09:13:16+01:00", "title": "Leaving coal behind: international carbon credits under the EU’s 2040 climate target", "authors": ["Christian Dietz", "Luca Nipius", "Deniz Tekin", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-02-ERCC-carbon-credits-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/leaving-coal-behind-international-carbon-credits-under-the-eus-2040-climate-target/", "excerpt": "With the EU’s 2040 climate target, the emerging role of international carbon credits raises important policy choices. They could remain a limited flexibility me", "full_text": "", "wordcount": 217}, {"source": "publication", "date": "2026-04-14T13:31:35+01:00", "title": "The benefits and costs of website-blocking legislation: an economic, legal and policy assessment", "authors": ["J. Scott Marcus", "Artur Bogucki", "Jacob Griffith"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-03-Nord-Security-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-benefits-and-costs-of-website-blocking-legislation-an-economic-legal-and-policy-assessment/", "excerpt": "In recent years, we have witnessed a proliferation of new EU Member State measures and cases that seek to block the access of the public to specific internet co", "full_text": "", "wordcount": 180}, {"source": "publication", "date": "2026-04-14T08:29:39+01:00", "title": "Patient-centred health research and innovation in the EU", "authors": ["Cosima Lenz", "Petra Varkonyi", "Marta Dell’Aquila"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/patient-centred-health-research-and-innovation-in-the-eu/", "page_url": "https://www.ceps.eu/ceps-publications/patient-centred-health-research-and-innovation-in-the-eu/", "excerpt": "Patient-centredness refers to the deliberate and systematic integration of patients’ preferences, perspectives and lived experiences into the research and innov", "full_text": "", "wordcount": 148}, {"source": "publication", "date": "2026-04-13T14:51:33+01:00", "title": "More credit, better risk sharing: why Europe needs securitisation", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-02_FMI_Securitisation-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/more-credit-better-risk-sharing-why-europe-needs-securitisation/", "excerpt": "Securitisation can strengthen the EU’s financial system by expanding lending, supporting the green and digital transitions, and improving financing resilience,", "full_text": "", "wordcount": 242}, {"source": "commentary", "date": "2026-04-13T13:22:38", "title": "Orbán’s out, Magyar’s in – after 16 years, change in Hungary arrived by a landslide", "authors": ["Julia Pocze"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/orbans-out-magyars-in-after-16-years-change-in-hungary-arrived-by-a-landslide/", "page_url": "https://www.ceps.eu/orbans-out-magyars-in-after-16-years-change-in-hungary-arrived-by-a-landslide/", "excerpt": "For the first time in 16 years, Hungary’s prime minister won’t be called Viktor Orbán. Péter Magyar, an erstwhile Orbán ally who built a resistance movement from seemingly nothing, emerged victorious from yesterday’s parliamentary election. And victorious he was – following recor…", "full_text": "For the first time in 16 years, Hungary’s prime minister won’t be called Viktor Orbán. Péter Magyar, an erstwhile Orbán ally who built a resistance movement from seemingly nothing, emerged victorious from yesterday’s parliamentary election. And victorious he was – following record turnout, his TISZA party secured a supermajority with a projected 138 of 199 seats (69%). Orbán’s Fidesz, meanwhile, suffered an enormous defeat (only 55 seats). The extreme right Our Homeland Movement may have narrowly cleared the 5 % threshold, though with some absentee votes trickling still in from abroad, this could still change. Credit where credit’s due, Orbán quickly phoned Magyar with his congratulations. He then delivered a sombre, teary-eyed concession speech , vowing to serve the nation from opposition. An hour or two later, Magyar was greeted by a euphoric crowd, where he spoke for the first time as PM-elect with a firm, yet conciliatory tone that centred on the promise of a new beginning for all Hungarians. Spring breeze Fidesz, once the undisputed master of political communications and propaganda, stumbled its way through the campaign with uncharacteristic clumsiness. Having already started the year with a disadvantage in the polls, the government was also shaken by several scandals. Leaked audio recordings between Orbán, Foreign Minister Péter Szijjártó and their Russian counterparts laid bare where Fidesz’s loyalties lay. The campaign was then further derailed by whistleblowers who – among other things – detailed a James Bond-worthy secret service operation to bring down TISZA. To turn things around towards late March, Orbán had to embark on a nation-wide tour. At a stop in Győr, when confronted by counter-protesters chanting ‘filthy Fidesz’, Orbán, who usually appears calm and personable in public, lost his cool and lashed out. His hoarse-throated outburst revealed the desperate fury of a man whose grip on power was slipping away. As a last hail Mary , JD Vance campaigned alongside him, which most likely only hurt Fidesz’s campaign further. Likewise, not even the documented attempts at electoral fraud in rural areas – where the votes of the poorest were secured by money, food , threats and even drugs – could help save Fidesz. While Fidesz deteriorated, the TISZA campaigned remained laser-focused on domestic issues. Over the past year, Péter Magyar visited every corner of the country, from big cities to small villages, engaging hundreds of thousands of voters and turning districts that were previously Fidesz strongholds into promising battlegrounds . Unlike Fidesz, which hasn’t produced an actual electoral programme in over a decade , Magyar presented a comprehensive plan that offered policy proposals that appealed to left and right alike. And wherever he went, he brought a message of hope as opposed to Orbán’s fearmongering , encouraging people to ‘fear no more’ . A recently released film documenting Magyar’s road to the election only underlined him as the anti-Orbán seeking unity forged by hope, not fear. The hope for change has become so central to TISZA’s campaign that supporters have dubbed the phenomenon ‘hopium’ – a portmanteau of ‘opium’ and ‘hope’ – which highlights just how addictive the promise of meaningful change can be after 16 years built on inciting hatred and exclusion. Are we out of the woods? As the election novelty wears off, the country is at a point of transition and uncertainty. Domestically, TISZA’s programme outlines a clear roadmap towards system change, including uncovering past political a
