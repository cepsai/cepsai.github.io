re agreement, let alone a peace deal, is impossible while Russia denies Ukraine’s existence. There should be no Minsk 3-type of arrangement – it would allow Russia to freeze its illegally obtained territorial gains, regroup, rearm and eventually launch a new offensive. Instead, peace would be better served by effectively extending NATO and Russia’s hard border, somewhere in eastern Ukraine. This would of course require Ukraine’s democratic consent. To stop Russia abusing this new situation by launching a variety of hybrid and beyond-threshold attacks to test the European coalition’s resolve, it’s essential that breaches of the ceasefire agreement are called out and responded to in kind. Russia is not invincible and needs to be kept in check. This will require the right kind of intelligence, expertise, capabilities and quasi-automaticity in decision-making. To stop a Russian escalation that leads to a large-scale war with NATO , the US needs to be onboard to provide the full deterrent effect. Fast forward The European debate over a ceasefire and how to police it is a welcome one, if long overdue. Despite substantial military support from America and Europe, Russia has been making battlefield advances, meaning Putin has no genuine interest in negotiating a ceasefire. It’s difficult to make peace when both sides are not in a mutually painful stalemate . But the Russian advance has been slow, comes at the unsustainable cost of World War I-levels of human lives and has produced a sombre economic outlook. We need to urgently narrow Putin’s options so that he doesn’t see ceasefire negotiations as a way to continue the war by cheaper diplomatic means. Ukraine’s friends should double down on a variety of short-term measures, ranging from tightening sanctions on Russia and ramping up investments in Ukraine’s domestic arms production, to equipping Ukraine with more sophisticated hardware and allowing it to strike even deeper into Russia. It’s not in Europe or the US’ security interest that Ukraine loses the battle over the territory that it has already lost to Russia and a possible future war where all of Ukraine is taken. A ceasefire agreement policed by European boots on the ground would be a stepping stone to a durable and just peace. It’s now time to show some resolve.", "wordcount": 1153}, {"source": "publication", "date": "2025-01-24T11:14:23+01:00", "title": "Setting standards for critical raw materials", "authors": ["Edoardo Righetti", "Vasileios Rizos", "Marika Moreschi"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/2025-02_ERCC_Raw-Materials-Standardisation.pdf", "page_url": "https://www.ceps.eu/ceps-publications/setting-standards-for-critical-raw-materials/", "excerpt": "As the EU seeks to secure access to Critical Raw Materials (CRMs), CRM-related technical standardisation has been gaining increasing policy attention. Technical", "full_text": "", "wordcount": 226}, {"source": "publication", "date": "2025-01-16T16:35:35+01:00", "title": "Policies to reduce whole-life carbon in the built environment", "authors": ["Patricia Urban", "Ida Karlsson", "Luca Nipius"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/2025-01_ERCC_MCE-Construction.pdf", "page_url": "https://www.ceps.eu/ceps-publications/policies-to-reduce-whole-life-carbon-in-the-built-environment/", "excerpt": "Whole-life carbon (WLC) emissions from buildings, encompassing both operational and embodied emissions, contribute 40 % of global CO2 emissions. Policy efforts", "full_text": "", "wordcount": 206}, {"source": "publication", "date": "2025-01-13T12:14:11+01:00", "title": "ECRI Statistical Package 2024", "authors": ["Leonardo Trevisan", "Fredrik Andersson"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/01/Cover-ECRI-Stat-Pack.pdf", "page_url": "https://www. <script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const state = { source: 'all', year: '', q: '', filterKey: null, filterVal: null };

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function renderBars(target, data, klass) {
    if (!data.length) { target.innerHTML = '<div style="color:var(--ceps-grey-400);font-size:12px;">— none —</div>'; return; }
    const max = data[0][1];
    target.innerHTML = data.slice(0, 10).map(([name,n]) => {
      const pct = Math.round(n / max * 100);
      return `<div class="bar-row ${klass}"><div class="name" style="--pct:${pct}%" data-filter-key="${klass}" data-filter-val="${esc(name)}">${esc(name)}</div><div class="count">${n}</div></div>`;
    }).join('');
  }

  function renderKeywords(source) {
    const k = DATA.keywords[source] || DATA.keywords.all;
    const minSize = 12, maxSize = 18;
    const renderCloud = (target, rows) => {
      if (!rows.length) { target.innerHTML = '<div style="color:var(--ceps-grey-400);font-size:12px;">— none —</div>'; return; }
      const max = rows[0][1], min = rows[rows.length-1][1] || 1;
      const span = Math.max(1, max - min);
      target.innerHTML = rows.map(([term, df, tf]) => {
        const size = minSize + (df - min) / span * (maxSize - minSize);
        return `<span class="kw" data-term="${esc(term)}" style="font-size:${size.toFixed(1)}px"><span>${esc(term)}</span><span class="freq">${df}</span></span>`;
      }).join('');
    };
    renderCloud($('kw-uni'), k.unigrams);
    renderCloud($('kw-bi'),  k.bigrams);
    renderCloud($('kw-tri'), k.trigrams);
  }

  function renderHero() {
    const a = DATA.aggregates;
    $('hero-summary').textContent =
      `${a.n_publications} publications • ${a.n_commentaries} expert commentaries • ${DATA.items.length} items in total`;
    renderBars($('topics-bars'), a.topics, 'topics');
    renderBars($('units-bars'), a.units, 'units');
    renderBars($('types-bars'), a.types, 'types');
    renderKeywords('all');
    const dates = DATA.items.map(i => (i.date||'').slice(0,10)).filter(Boolean).sort();
    const oldest = dates[0] || '—', newest = dates[dates.length-1] || '—';
    const topTopic = a.topics[0] ? a.topics[0][0] : '—';
    const topUnit  = a.units[0]  ? a.units[0][0]  : '—';
    const topType  = a.types[0]  ? a.types[0][0]  : '—';
    $('summary-line').innerHTML =
      `Range: <b>${oldest} → ${newest}</b>. ` +
      `Most frequent commentary topic: <b>${esc(topTopic)}</b>. ` +
      `Most active unit: <b>${esc(topUnit)}</b>. ` +
      `Dominant publication format: <b>${esc(topType)}</b>.`;
    // Year dropdown
    const years = Array.from(new Set(dates.map(d => d.slice(0,4)))).sort().reverse();
    $('year-select').innerHTML = '<option value="">All years</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
  }

  function filterItems() {
    const q = state.q.toLowerCase();
    return DATA.items.filter(it => {
      if (state.source !== 'all' && it.source !== state.source) return false;
      if (state.year && !(it.date||'').startsWith(state.year)) return false;
      if (state.filterKey) {
        const bag =
          state.filterKey === 'topics' ? it.topics :
          state.filterKey === 'units'  ? it.units  :
          state.filterKey === 'types'  ? it.types  : [];
        if (!bag.includes(state.filterVal)) return false;
      }
      if (q) {
        const hay = (it.title + ' ' + (it.authors||[]).join(' ') + ' ' + (it.excerpt||'') + ' ' + (it.full_text||'')).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function cardHtml(it, idx) {
    const src = it.source === 'publication' ? 'publication' : 'commentary';
    const tags = []
      .concat(it.topics.map(t => `<span class="tag topic">${esc(t)}</span>`))
      .concat(it.units.map(u => `<span class="tag unit">${esc(u)}</span>`))
      .concat(it.types.map(c => `<span class="tag type">${esc(c)}</span>`))
      .join('');
    const dateStr = (it.date||'').slice(0,10);
    return `
      <div class="card ${src}" data-idx="${idx}">
        <div class="card-head">
          <div class="card-meta">
            <span class="card-source">${src === 'publication' ? 'Publication' : 'Commentary'}</span>
            &nbsp;•&nbsp; ${dateStr}
          </div>
          <div class="card-meta">${it.wordcount ? it.wordcount.toLocaleString()+' words' : ''}</div>
        </div>
        <div class="card-title">${esc(it.title)}</div>
        ${it.authors.length ? `<div class="card-authors">${esc(it.authors.join(' · '))}</div>` : ''}
        ${it.excerpt ? `<div class="card-excerpt">${esc(it.excerpt)}</div>` : ''}
        <div class="card-tags">${tags}</div>
      </div>
    `;
  }

  function renderActiveFilter() {
    if (!state.filterKey) { $('active-filter-slot').innerHTML = ''; return; }
    $('active-filter-slot').innerHTML =
      `<span class="active-filter" id="active-filter">${esc(state.filterVal)}</span>`;
    $('active-filter').onclick = () => { state.filterKey = null; state.filterVal = null; render(); };
  }

  function render() {
    const list = filterItems();
    $('result-count').textContent = `${list.length} item${list.length===1?'':'s'}`;
    $('cards').innerHTML = list.map((it, i) => cardHtml(it, DATA.items.indexOf(it))).join('');
    renderActiveFilter();
  }

  function showModal(it) {
    const m = $('modal');
    const src = it.source;
    const tags = []
      .concat(it.topics.map(t => `<span class="tag topic">${esc(t)}</span>`))
      .concat(it.units.map(u => `<span class="tag unit">${esc(u)}</span>`))
      .concat(it.types.map(c => `<span class="tag type">${esc(c)}</span>`))
      .join('');
    const bodyHtml = it.full_text
      ? it.full_text.split(/\n+/).map(p => `<p>${esc(p)}</p>`).join('')
      : (it.excerpt ? `<p>${esc(it.excerpt)}</p>` : '<p><em>No body text available — open the PDF.</em></p>');
    const ext = src === 'publication'
      ? (it.link ? `<a class="btn publication" href="${esc(it.link)}" target="_blank" rel="noopener">Open PDF ↗</a>` : '')
      : `<a class="btn primary" href="${esc(it.page_url)}" target="_blank" rel="noopener">Open on CEPS ↗</a>`;
    const pageBtn = src === 'publication' && it.page_url && it.page_url !== it.link
      ? `<a class="btn" href="${esc(it.page_url)}" target="_blank" rel="noopener">Publication page ↗</a>` : '';
    m.className = 'modal ' + src;
    m.innerHTML = `
      <div class="modal-meta">${src.toUpperCase()} • ${(it.date||'').slice(0,10)} • ${it.wordcount ? it.wordcount.toLocaleString()+' words' : ''}</div>
      <h2>${esc(it.title)}</h2>
      ${it.authors.length ? `<div class="authors">${esc(it.authors.join(' · '))}</div>` : ''}
      ${tags ? `<div class="tags">${tags}</div>` : ''}
      <div class="body">${bodyHtml}</div>
      <div class="actions">${ext}${pageBtn}<button class="btn" id="modal-close">Close</button></div>
    `;
    $('modal-close').onclick = closeModal;
    $('modal-bg').classList.add('open');
  }
  function closeModal() { $('modal-bg').classList.remove('open'); }

  // Event wiring
  document.addEventListener('click', (e) => {
    const card = e.target.closest('.card');
    if (card) {
      const idx = parseInt(card.dataset.idx, 10);
      if (!isNaN(idx)) showModal(DATA.items[idx]);
      return;
    }
    const bar = e.target.closest('.bar-row .name');
    if (bar) {
      state.filterKey = bar.dataset.filterKey;
      state.filterVal = bar.dataset.filterVal;
      render();
      window.scrollTo({ top: $('cards').offsetTop - 80, behavior: 'smooth' });
      return;
    }
    const kw = e.target.closest('.kw');
    if (kw) {
      state.q = kw.dataset.term;
      $('q').value = state.q;
      render();
      window.scrollTo({ top: $('cards').offsetTop - 80, behavior: 'smooth' });
      return;
    }
    if (e.target === $('modal-bg')) closeModal();
  });

  document.querySelectorAll('#kw-source-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#kw-source-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderKeywords(btn.dataset.kwSource);
    });
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('#source-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#source-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.source = btn.dataset.source;
      render();
    });
  });
  $('year-select').addEventListener('change', (e) => { state.year = e.target.value; render(); });
  $('q').addEventListener('input', (e) => { state.q = e.target.value; render(); });

  renderHero();
  render();
</script>
</body>
</html>
