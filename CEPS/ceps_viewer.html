framework, investment and entrepreneurship wouldn’t have been able to flourish. Sweden has built such a framework, promoting both innovation and broad-based market participation. Retail investors feel confident engaging in financial markets, particularly equities, thanks to policy efforts that demystify investing. Today, most Swedes are comfortable and confident investors. This reflects high levels of financial literacy but also a culture of participation built through ‘learning by doing’ and national education campaigns . Even setbacks – such as the overvalued IPO of state-owned telecoms company Telia in 2000, which was marketed as a ‘share for the people’ – didn’t deter participation. Retail investors remained engaged, with a sustained appetite for risk and long-term growth. This resilience is underpinned by strong legal and institutional frameworks that simplify investment processes, foster trust and enable easy access to financial products which offer real returns. Reforms that matter Sweden’s transformation into an investment-friendly economy began early, with a series of strategic reforms that steadily lowered barriers to market participation. In 1974, the government introduced tax-advantaged savings accounts, followed by tax-subsidised savings schemes in 1984. Both initiatives encouraged individuals to invest by offering tax-free capital gains, laying the groundwork for broader retail engagement. The system has been regularly adapted to respond to market and technological developments. The most significant recent change came in 2012 with the launch of the Investeringssparkonto (ISK), a simplified, direct digital savings account (with the Centralised Securities Depositories) that streamlined taxation and made investing more accessible. Through the ISK, individuals can easily invest in a wide range of products across multiple markets while clearly understanding how their savings are taxed. Before these reforms, Swedish households maintained conservative portfolios, favouring bank deposits, insurance products and pension entitlements. The progressive shift in tax policy and regulatory design has gradually reshaped their preferences, transforming Sweden into one of the EU’s most investment-friendly markets. Long-term by design A key strength of Sweden’s capital market lies in its ability to mobilise long-term capital. The pivotal moment came with the 1994 pension reform, which shifted the system away from a traditional pay-as-you-go model – still common in many Member States – towards a three- pillar structure: a publicly funded state pension, a semi-mandatory occupational pension negotiated through collective bargaining and a voluntary private pension. A cornerstone of this reform was the introduction of the Premium Pension System, which complements traditional schemes by requiring a portion of pensionable income to be invested in managed funds – thus expanding the role of institutional investors. What truly sets Sweden apart is how collective bargaining shapes occupational pensions. Almost all employers are required to offer coverage, with investment decisions jointly negotiated between employers and unions. These schemes are a largely defined contribution, meaning that households are directly exposed to capital markets, with the bulk of these investments being directed into equities. Combined with voluntary savings through the ISK and endowment insurance, the outcome is striking – over 90% of Swedish workers are also investors. Europe has the flatpack – now it just needs to build it Sweden’s capital market offers valuable lessons for reshaping how savings and investments work across the EU. It stands as a real-world example of how capital markets can be made both inclusive and growth-oriented, generating returns while fuelling innovation. This success didn’t happen overnight but nor has it stood still. Coherent regulation that encourages investment, a tax system that’s simple and transparent, pension models that mobilise long-term capital and continuous financial education have all evolved in tandem with the market itself. In short, Sweden’s approach changes with the times but never loses sight of its central goal – broad-based retail participation based on low costs and the active role of supervisors. The Swedish model provides a credible, tested foundation and that’s why Europe doesn’t need to start from scratch. It’s time to move from ambition to action – and for Europe to build capital markets that work for everyone. To dive even deeper into how Sweden has successfully built a resilient capital market, click here .", "wordcount": 915}, {"source": "publication", "date": "2025-08-26T14:58:43+01:00", "title": "The top 20 digital laws that all digital policy experts should know", "authors": ["Kai Zenner", "J. Scott Marcus"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/08/Dataset-3_Top20-digital-laws.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-top-20-digital-laws-that-all-digital-policy-experts-should-know/", "excerpt": "The complexity of EU laws and regulation for the digital world has been growing with dizzying speed. That’s why CEPS has been publishing a series of datasets to", "full_text": "", "wordcount": 139}, {"source": "commentary", "date": "2025-08-25T12:56:18", "title": "Beyond disclosure – or why the EU’s green strategy is coming apart", "authors": ["Apostolos Thomadakis"], "topics": ["Energy, Climate & Environment", "Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/beyond-disclosure-or-why-the-eus-green-strategy-is-coming-apart/", "page_url": "https://www.ceps.eu/beyond-disclosure-or-why-the-eus-green-strategy-is-coming-apart/", "excerpt": "By all appearances, Europe is doubling down on its green ambitions. But scratch the surface, and a different picture emerges: a continent obsessed with process over outcomes, clinging to disclosure frameworks while sidestepping the harder structural reforms that would actually re…", "full_text": "By all appearances, Europe is doubling down on its green ambitions. But scratch the surface, and a different picture emerges: a continent obsessed with process over outcomes, clinging to disclosure frameworks while sidestepping the harder structural reforms that would actually reduce emissions or improve competitiveness. The recent EU-US tariff deal and the retreat from key Green Deal measures should be understood not as isolated policy choices, but as symptoms of a deeper incoherence in Europe’s economic and climate strategy. Calls to preserve sustainability disclosure rules often rest on the belief that transparency improves capital allocation and strengthens long-term competitiveness . This logic holds in theory. But in practice, the assumption that disclosure alone leads to better outcomes – for investors, the environment or society – is a category error. It mistakes the provision of information for meaningful action. Disclosure isn’t a strategy The assumption that simply surfacing ESG risks will change is deeply flawed. At best, disclosure allows companies to claim plausible deniability (‘we warned you’) if risks materialise. At worst, it becomes a shield for inaction, shifting accountability from people to process. Consumers continue to vote with their wallets – demonstrating the classic value-action gap (or ‘awareness-action inconsistency’). If transparency truly altered demand, fossil fuel production would be falling sharply. It isn’t. In fact, governments plan to produce twice the amount of fossil fuels by 2030 than is consistent with limiting warming to 1.5 °C . Simply increasing awareness doesn’t automatically change behaviour: even when people are informed about climate regulations, their actions don’t necessarily follow . While awareness of climate change is widespread, people still seek warm homes, affordable energy, and the freedom to drive where and when they want. The EU’s Green Deal rhetoric often ignores this dissonance. It assumes consumers and companies will do the ‘right’ thing once properly informed – as if the barrier were awareness, not incentives, infrastructure, or political will. This is the sustainability equivalent of food labelling campaigns in a society where the only shops sell junk food. Accountability without consequence The problem isn’t just that disclosures don’t work. It’s that they displace more effective tools. Real change requires consequence. If company directors were held personally accountable (and legally liable) for environmental damage, corporate behaviour will shift. But climate liability remains abstract, dispersed and years away in court. Until accountability is backed by enforceable liability – for both public and private actors – much of the ESG agenda will remain performative. Nowhere is this clearer than in the EU’s retreat from its own climate commitments . The Green Deal’s disclosure architecture (CSRD, CSDDD, the Taxonomy) was meant to create a rational market for sustainability. But when tested, the EU blinked. The real challenge lies not in overlapping legal obligations, but in the operational convergence of these frameworks – a challenge the Omnibus fails to tackle. Instead, it proposes to exempt tens of thousands of companies from the very rules that were meant to ensure comparability and transparency. Investors lose critical data, smaller companies lose access to sustainable finance and the premise of ‘market-led transition’ collapses. Strategic incoherence, not patience This retreat might be defensible if the EU were making hard trade-offs in favour of other strategic priorities. But it isn’t. Instead, it is locking in legacy dependencies under the guise of competitiveness. The EU-US tariff deal is a prime example: a face-saving gesture that preserves US barriers on EU steel and aluminium while protecting high-value legacy exports like combustion-engine cars and luxury goods. The agreement imposes a 15% US tariff on most EU imports, keeps a 50% tariff on steel and aluminium, and commits the EU to large-scale purchases of US gas and military equipment – all while falling well short of the EU’s own zero-tariff proposal . Worse, the EU hesitates to build tomorrow’s champions – from clean-tech scale-ups to globally competitive digital platforms – and has delayed implementing carbon border tariffs meant to protect low-carbon production. The electricity market reform debacle is equally revealing. The EU still prices electricity based on the marginal cost of gas , even as renewables supply record shares of power. The result: high prices, volatile bills and an electricity system that punishes clean-energy users by tethering them to fossil fuel costs. In 2022, this design helped push wholesale prices above EUR 400/MWh in some markets – even when renewables met most demand. The illusion of market efficiency is maintained at the expense of affordability, resilience and decarbonisation. This is not just economic mismanagement, it’s policy sabotage. A better path: design, not disclosure What the EU needs is not another round of ESG reporting, but architectural reform. In energy, that means decoupling electricity prices from gas, scaling long-term contracts such as power-purchase agreements and contracts-for-difference, and building cross-border grids to unlock low-cost renewable flows. In finance, it means fixing capital markets so that long-term investment is rewarded, not undermined by short-term volatility – for example, by strengthening patient capital vehicles, adjusting prudential rules to favour long-term holdings and reducing pro-cyclical pressures that force premature divestment during market swings. In governance, it means shifting from paper compliance – where companies tick boxes to meet reporting requirements – to enforcement mechanisms that are actively monitored, result in penalties for breaches, and assign clear responsibility for managing risks. Spain has already shown that energy markets can be restructured to deliver lower wholesale prices and greater resilience In the face of external shocks. The Iberian price-cap mechanism introduced in 2022 kept wholesale prices roughly 30–40% below those in France or Germany at the height of the gas crisis, even if retail tariffs – set at Member State level – vary in how much of this benefit reaches households. The recent nationwide blackout and the current challenges in managing solar oversupply underscore that market design is not a one-off fix: grid investment, storage deployment and system stability must keep pace with renewable expansion. But the core lesson stands – targeted structural reform can meaningfully decouple electricity prices from fossil fuel volatility, something the EU has yet to deliver at scale. Achieving this across sectors would require confronting a hard truth: green industrial policy cannot coexist with status quo economic structures. From performance to power The EU is running out of time to reconcile its climate goals with its economic model. As the US flirts with industrial backsliding and China scales clean-tech dominance, the EU’s best hope lies in aligning its trade, competition and investment policies with the structural demands of the transition. That means supporting emerging industries, not incumbent ones; prioritising energy independence, not new fossil import dependencies; and designing markets for outcomes, not process. Disclosure frameworks may have a role, just as food labels do. But they are not, and never were, a substitute for action. The EU must move from performative transparency to structural accountability. The climate crisis doesn’t care what’s reported. Only what’s done.", "wordcount": 1146}, {"source": "publication", "date": "2025-08-25T08:59:22+01:00", "title": "Mapping civil dialogue practices in the EU institutions", "authors": ["Marta Dell’Aquila", "Olesya Grabova", "Maria Kostylew", "Berta Mizsei", "Julia Pocze", "Timothy Yeung"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/08/qe-01-25-020-en-n.pdf", "page_url": "https://www.ceps.eu/ceps-publications/mapping-civil-dialogue-practices-in-the-eu-institutions/", "excerpt": "What are the civil dialogues practices implemented by EU institutions, namely the Council, the Parliament, and the Commission? This study collects information o", "full_text": "", "wordcount": 179}, {"source": "commentary", "date": "2025-08-14T11:04:25", "title": "Europe absent in Alaska – a win for Putin", "authors": ["Tinatin Akhvlediani"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/europe-absent-in-alaska-a-win-for-putin/", "page_url": "https://www.ceps.eu/europe-absent-in-alaska-a-win-for-putin/", "excerpt": "The optics of this week’s planned Alaska meeting between US President Donald Trump and Russian President Vladimir Putin are deeply troubling. European security is being discussed while Ukraine and the EU are being sidelined. Let’s be clear. This is not a ceasefire negotiation – c…", "full_text": "The optics of this week’s planned Alaska meeting between US President Donald Trump and Russian President Vladimir Putin are deeply troubling. European security is being discussed while Ukraine and the EU are being sidelined. Let’s be clear. This is not a ceasefire negotiation – ceasefires require the participation of all parties to the war, and Ukraine is not invited. Furthermore, talking about European security without Europe at the table is pointless. The credibility of the Alaska meeting has been undermined from the outset. Instead, what we are looking at is a bilateral affair and a political concession to Putin. It gives him Trump’s attention without any enforceable outcomes and delays the sanctions that Trump himself has threatened . It also sends a dangerous signal that Ukraine and its allies are not being taken seriously when the security of Europe is being discussed. This is exactly the image Putin wants to project. By agreeing to meet Putin in person, Trump is playing right into the Kremlin’s hands. Meanwhile, EU leaders have reaffirmed their position on lasting peace, Ukraine’s sovereignty and territorial integrity, and condemnation of changes to international borders by force. Unsurprisingly, internal divisions persist, with Hungary once again not engaging. But the other 26 Member States stand united. What is more, the broader coalition of the willing, including the UK, is aligned as well. This matters. President Volodymyr Zelensky continues to show consistent leadership, working towards lasting peace grounded in international law. Ukrainians overwhelmingly reject territorial swaps. Handing territory to Russia would not end the war – it would embolden Moscow, threaten neighbours, and push its borders ever closer to the EU. The stakes could not be higher. If Alaska produces a feel-good narrative of ‘progress’ for Trump while giving Putin a political win, it will strengthen Russia, fracture Western unity, and suggest that Ukraine is negotiable. That would reverberate far beyond Kyiv, shaking the entire post-Cold War European security order. This is why the EU must act swiftly and decisively. First, it needs to ensure that Ukrainian and European interests are central in Washington’s calculations – and discussed when Europe is actually in the room. Second, even if some Member States, like Hungary, choose to keep out of it, internal divisions must not paralyse the EU’s action. Third and crucially, the EU must work closely with the coalition of the willing to strengthen partnerships capable of providing enforceable security guarantees – the foundation for any real ceasefire. History leaves no doubt: Russia repeatedly breaks ceasefire agreements, often within days, as shown in the hundreds of violations of the Minsk Agreement before Putin launched his full-scale invasion in 2022. Without enforceable guarantees, any ceasefire would be little more than a pause, giving Putin time to rearm and plan further aggression. The EU, which is not yet a security union, cannot provide these guarantees alone. Close coordination with the coalition of the willing is therefore essential, as is having the US on board. While the EU is Ukraine’s largest supporter , both militarily and financially, it still does not have the capacity to fully replace US military power. For now, American backing remains indispensable. Washington, in turn, faces a stark choice. It can work with its historic allies to strengthen the transatlantic bond and defend shared Western values or bypass them for a bilateral deal with Moscow. The latter would play directly into Putin’s hands and undermine the alliances that have underpinned Western security for decades. For US interests, the path should be clear: coordinate with allies, increase pressure on Putin and impose sanctions that cut off the funding for his war. If Trump truly wants to end this war, that is the way forward.", "wordcount": 614}, {"source": "commentary", "date": "2025-07-29T11:55:27", "title": "The EU-US trade deal promises temporary relief but longer-term pain", "authors": ["Cinzia Alcidi"], "topics": ["Economy & Monetary Affairs", "Trade"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/the-eu-us-trade-deal-promises-temporary-relief-but-longer-term-pain/", "page_url": "https://www.ceps.eu/the-eu-us-trade-deal-promises-temporary-relief-but-longer-term-pain/", "excerpt": "After months of uncertainty and escalating rhetoric, a new EU-US trade deal has finally been announced. Under the deal, a 15% US tariff will apply to most EU imports, including cars, pharmaceuticals and semiconductors. This is higher than the 10% rate applied to most imports from…", "full_text": "After months of uncertainty and escalating rhetoric, a new EU-US trade deal has finally been announced. Under the deal, a 15% US tariff will apply to most EU imports, including cars, pharmaceuticals and semiconductors. This is higher than the 10% rate applied to most imports from the EU since April, but lower than the 30% tariff President Trump had threatened just days earlier. A 50% tariff remains on steel and aluminium, with further negotiations expected in those sectors. In return, the EU has committed to eliminating existing sectoral tariffs, notably the 10% duty on car imports. The deal also includes an EU pledge to purchase more US gas (USD 750 billion by 2028), along with an unspecified amount of military equipment, and to raise its overall investment in the US by USD 600 billion. The deal has been widely criticised on the European side, viewed by some as a weak EU capitulating to Trump’s demands, unable to mount an effective response. While that perception is difficult to counter, the reality is much more complex and nuanced. A bad deal for the EU but… This is a bad deal for the EU but still a positive development, compared to the threat of 30% tariffs and a transatlantic trade war. Alas, compared to a world without tariffs – where the EU was just months ago – it’s indeed a big step backwards. The deal also appears worse than what the UK managed to secure – a 10% tariff. But in Trumpian logic, the UK deal was easy to achieve and sell. The UK runs a goods trade deficit with the US; it’s not a US target. In contrast, the EU-US deal was always presented as key for Trump. The outcome falls short of the EU’s zero-tariff proposal , strongly reflects US interests and gives the impression that the EU was pressured into concessions (an impression reinforced by the tone of Trump and Commission President Ursula von der Leyen’s joint press conference). The current US government has systematically relied on its hegemonic power and hasn’t hesitated to use coercion to extract favourable terms from trading partners – the EU included. Besides the specific deal, this strategy raises serious concerns about fairness in international relations, predictability in global trade and – above all – the US’ credibility as a trusted partner. A deal… but not quite an agreement It’s worth noting that the deal isn’t a fully fleshed-out trade agreement but, for the time being, one of the many symbolic political deals Trump has announced in recent months. Yet it’s not meaningless. It pauses what could have escalated into a full-scale transatlantic trade war and defuses a major source of volatility and anxiety. That said, the real challenge lies ahead – hammering out the details. Without legally binding documents, the door remains open to misinterpretation. We’ve seen this play out recently with the US-Japan agreement , hastily concluded a few days ago, and already sparking differing interpretations. The same could easily happen with the EU-US deal. Further complicating things is that the deal goes beyond traditional trade. Until (or unless) the pledges for the large-scale purchases and investments – challenging to deliver for both sides – are formalised into binding contracts (which would involve private sector actors), they aren’t enforceable commitments. Uncertain economic impacts Despite its political importance, the trade deal’s economic impact is difficult to predict, both for the US and the EU. It’s worth recalling that tariffs distort trade and increase costs for both sides. Most estimates suggest larger losses and higher prices in the US than in the EU. The estimated GDP fall for the EU typically ranges from 0.2% to 0.8%, depending on the scale of the tariffs and the EU’s response. The fall also won’t hit Member States equally. Countries like Germany, Italy and Ireland – whose exports to the US are significant – will be disproportionately affected. So will sectors like automotive, industrial machinery and agriculture. Yet, ultimately, the tariff pass-through, or how far tariffs will result in higher prices for US consumers/buyers, will determine the outcome. In some cases, EU exporters may absorb some or all the costs to preserve their market share. In others, the tariff may be fully passed on, leading to potentially reduced demand but higher US prices. The balance between the two options will vary across products and sectors and will determine the final impact on the economy. The exchange rate will also contribute to the final impact. The euro’s recent appreciation, compounded by tariffs, further undermines the EU’s competitiveness in the US market, but it may not last. One silver lining is that US consumption remains robust, buoyed by the extraordinary performance of the US stock market, which boosts households’ income and spending power. This may cushion the demand for EU goods… at least for now. Coming up next – uncertainty and potentially some new demands While this deal brings a temporary sense of calm, we need a formal agreement to establish long-term certainty. But even that may not be enough. Trump has shown his readiness to revisit or walk away from the agreements he’s signed. The USMCA agreement illustrates how quickly American trade policy can shift. Internally, the EU will face mounting pressure to compensate industries for losses incurred from the higher tariffs. Such calls should be firmly rejected. Doing this would shift the burden of US tariffs from American consumers to European taxpayers. That would not only be economically inefficient but would also hand Trump his greatest victory. The deal is being widely perceived as a big political win for Trump and a defeat for the EU, negatively affecting its image, domestically and worldwide. Unfortunately, this interpretation ultimately praises and legitimises an approach based on aggression and coercion, rewarding tactics that undermine trust and cooperation. Sadly, tariffs, long discredited as a blunt and damaging economic tool, are now being recast as effective policy instruments, which the EU should also wield. It’s astonishing how, in only a few months, Trump has managed to frame such a confrontational strategy and unsound economic policies as a success – even with Europe. It’s simply self-defeating. That said, the jury is still out on the economic consequences. For the EU, it’s yet another crucial reminder of the urgent need to rethink its strategy vis-à vis the US, beyond trade. Reducing its dependence, diversifying economic partnerships and strengthening internal coordination will be essential if the EU wants to avoid being held hostage during similar future power plays.", "wordcount": 1081}, {"source": "commentary", "date": "2025-07-25T09:48:02", "title": "Going beyond the ‘EuroStack’ could help the EU build a truly global (open) Science Stack", "authors": ["Stefaan Verhulst"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/going-beyond-the-eurostack-could-help-the-eu-build-a-truly-global-open-science-stack/", "page_url": "https://www.ceps.eu/going-beyond-the-eurostack-could-help-the-eu-build-a-truly-global-open-science-stack/", "excerpt": "Europe is facing a defining moment in its approach to science, research and innovation. As geopolitical tensions mount and investment in dual-use technologies surges, the EU is being called to reimagine its research policy – not just for strategic autonomy but for lasting societa…", "full_text": "Europe is facing a defining moment in its approach to science, research and innovation. As geopolitical tensions mount and investment in dual-use technologies surges, the EU is being called to reimagine its research policy – not just for strategic autonomy but for lasting societal relevance and real global impact. At a recent CEPS dialogue on ‘Reimagining EU Research and Innovation Policy ,’ this author focused on five asymmetries that policymakers absolutely must address if Europe is to avoid a future of diminished influence, declining trust and squandered opportunity. And the best way to avoid such a future is to build a truly (open) Science Stack. Data asymmetry – or ‘Winter is Coming’ The foundation of modern research – especially in the AI age – is data. Yet access to high-quality, dynamic datasets remains highly concentrated among a few private actors. Despite years of rhetorical support for data sharing, there’s been little progress made to foster systematic, sustainable and responsible data reuse. Without real incentives for data collaboration and investment in data stewardship, Europe risks entering a ‘ data winter ,’ where researchers and innovators are unable to access the very resources needed to compete or contribute meaningfully. A Data Commons approach – governed by clear purpose, ethical principles and structured collaboration mechanisms – isn’t a luxury. It’s an existential necessity. Information asymmetry – or lost in the labyrinth Despite open science proclamations, information asymmetries persist – both when accessing research results and in terms of visibility into what research is being funded and conducted. The trend toward increased security-driven research, particularly in dual-use technologies and defence , threatens to make opacity worse. Billions of euros earmarked for ‘strategic autonomy’ may fund critical innovations – yet under conditions of restricted scrutiny and with minimal accountability. That’s why transparency, including a publicly accessible map of research efforts across the EU, is essential – not only for scientific collaboration but also for democratic legitimacy. Agency asymmetry – or who sets the research agenda? EU Framework Programmes, like FP10 , offer vital continuity but their technocratic language and insular processes often alienate those outside the Brussels Bubble or academia. The critical question remains – who decides what Europe should research… and why? To correct this agency asymmetry, Europe needs to democratise its innovation agenda. A ‘100 Questions for Europe ’ initiative could provide a public platform to crowdsource and deliberate the research priorities that truly matter – from climate resilience to mental health to digital rights. In this context, ‘digital sovereignty’ must evolve from a defensive posture to one that champions digital self-determination , enabling communities to shape not only data flows but research priorities themselves. Such engagement could also provide much-needed social license for data re-use and research in an era of increased public scepticism and ethical concerns. Computational asymmetry – federate, don’t centralise AI and other computationally intensive domains aren’t just about raw processing power. Europe’s race to build more data centres and advanced infrastructure misses a crucial point – namely that computation must be mission-driven . Without federated models and cross-border collaboration, the continent risks reinforcing inequalities rather than unleashing innovation. Europe’s strength should lie in its ability to collaborate across regions, disciplines, and borders – not in replicating a ‘build it and they will come’ model that has already failed to deliver efficiency or effectiveness elsewhere. Skills symmetry – bilinguals, not just coders Finally, while STEM education is vital, it’s insufficient on its own. Solving society’s most complex challenges requires ‘ bilinguals ’. These are individuals who combine deep domain expertise with digital fluency. Such hybrid thinkers – able to frame the right questions and assess the limits of technology – are essential for avoiding solutionism and promoting real impact. They also enable collective intelligence . On top of this, we need investment not just in skills but in question literacy . What are we solving? Who defines the problem? What are the metrics for determining success? In an era where strategic autonomy is reshaping policy frameworks, the temptation to build a ‘ EuroStack ’ focused on technological independence is understandable. But if that stack is built atop brittle foundations – rife with asymmetries in access, information, agency, computation and skills – it won’t serve Europe’s broader ambitions to advance research and innovation. What we need instead is an (open) Science Stack – a holistic, polycentric architecture that blends data access, ethical guidelines, participatory governance and mission-driven infrastructure. A stack that empowers – not isolates. A stack that listens as much as it leads.", "wordcount": 754}, {"source": "publication", "date": "2025-07-24T13:10:22+01:00", "title": "Civic mobilisations in Georgia and Serbia: testing the EU’s enlargement credibility", "authors": ["Tinatin Akhvlediani", "Laure Delcour", "Daniela Vancic"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2025/07/REUNIR-Blog-_Serbia-Georgia-PDF.docx.pdf", "page_url": "https://www.ceps.eu/ceps-publications/civic-mobilisations-in-georgia-and-serbia-testing-the-eus-enlargement-credibility/", "excerpt": "Georgia and Serbia, both candidate countries for EU membership, have seen large waves of civic mobilisation in recent months. While the immediate triggers for p", "full_text": "", "wordcount": 173}, {"source": "publication", "date": "2025-07-22T15:25:46+01:00", "title": "How and why the EU should rethink Turkey-China relations", "authors": ["Ceren Ergenc", "Derya Gocer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/07/2025-04-FP-CATS-2.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-and-why-the-eu-should-rethink-turkey-china-relations/", "excerpt": "Not all countries are able (or willing) to take sides in the increasingly tense US-China rivalry and this might create new opportunities to increase the EU’s co", "full_text": "", "wordcount": 186}, {"source": "commentary", "date": "2025-07-18T11:11:28", "title": "The EU’s strategic compromises are blinding it to the ongoing fight for democracy in Serbia", "authors": ["Antigona Imeri"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security"], "units": ["Accounting And Administration"], "types": [], "link": "https://www.ceps.eu/the-eus-strategic-compromises-are-blinding-it-to-the-ongoing-fight-for-democracy-in-serbia/", "page_url": "https://www.ceps.eu/the-eus-strategic-compromises-are-blinding-it-to-the-ongoing-fight-for-democracy-in-serbia/", "excerpt": "Since November 2024, Serbia has experienced a huge wave of anti-government protests. As students and citizens continue to pump up the situation by doubling down on their demands , the government’s intimidation attempts continues. By imprisoning students and activists, and cutting…", "full_text": "Since November 2024, Serbia has experienced a huge wave of anti-government protests. As students and citizens continue to pump up the situation by doubling down on their demands , the government’s intimidation attempts continues. By imprisoning students and activists, and cutting professors’ salaries, the regime is effectively punishing anyone who aligns with the pro-democracy movement. Brussels’ response? In short – not good enough. It’s mostly carefully worded declarations acknowledging the crisis but without any meaningful action. Despite being attacked by Serbian pro-government media, Enlargement Commissioner Marta Kos has tried to echo EU values through a form of dual diplomacy – openly supporting the protesters while avoiding direct criticism of the government. High Representative Kaja Kallas’s recent visit stood out for its firmer language, urging Serbia to strategically orient itself towards the EU. But what felt like a promising stance ended with a willingness to understand President Aleksander Vučić’s ‘side of the story’. More troubling was their boss’s position. Just weeks after one of Serbia’s largest protests on 15 March, Commission President Ursula von der Leyen, together with Council President Antonio Costa, chose to host Vučić for a dinner. What followed was a tonal shift, from von der Leyen’s praise last October over Serbia’s accession progress to new but vague calls for Serbia to make ‘real progress’ on EU reforms. Not only did this meeting signal the EU’s indifference to the Serbians mobilising in the streets but the empty rhetoric signalled their further abandonment – this time concluded with dessert. Continuously choosing handshakes over accountability, one might ask why the EU – whose foundation rests on democracy, the rule of law and human rights – remains mostly silent about growing autocracy in a candidate country, all while continuing business as usual. Stability at all costs Given the Western Balkans’ complex socio-political structure, the EU’s ongoing dilemma of stability vs democratisation has consistently favored the former. This trade-off has enabled Vučić to consolidate his power while fostering a form of ‘ stabilitocracy ’. Vučić has used crisis management situations, such as Covid-19, to tighten authoritarian control. His presidency is marked by widespread allegations of election fraud , systematic media repression , direct links to organised crime , the suppression of civil society and even the alleged use of sonic weapons . His grip also extends to neighbouring countries, through proxies like Milan Radoicic who orchestrated the Banjska attack in northern Kosovo, and his support for Republika Srpska’s secessionist leader, Milorad Dodik , in Bosnia and Herzegovina. This all clearly shows that Brussels’ stability-first approach has not only backfired – but has made it easier for Russia and China to expand their influence. The Russia/China containment fantasy The Western Balkans has long been a chessboard for external powers. Yet Serbia hasn’t been a pawn but rather a master player, simultaneously accommodating both East and West. Despite pouring an enormous amount of money into Serbia, the EU has lacked a coherent strategy to transform its support into political influence, failing to break Belgrade’s long-lasting ties with Moscow. This gave Russia a safe space to fuel regional instability and spread anti-EU propaganda – reflected in Serbian public opinion that the West – not Russia – is to blame for the war in Ukraine. Serbia’s facade of neutrality, reluctantly condemning the invasion but refusing to join EU sanctions, coupled with Vučić attending the Liberation Day celebrations in Moscow and the recent halt of arms sales to Ukraine due to Russian pressure , highlight its ongoing resistance to adopting EU positions. Though such moves guarantee Russia’s diplomatic support (and cheap gas), it’s actually China that’s emerged as the EU’s main economic challenge in Serbia. Beijing giving billions in infrastructure projects without conditions is very alluring, compared to the EU’s long list of requirements. Yet these deals often overlook labour rights , environmental degradation , transparency and corruption, which in turn have undermined the objectives of the Fundamentals cluster – a key EU accession pillar. Democracy is nice… but so’s lithium The global critical raw materials race has also led the EU to sideline good governance principles and support Rio Tinto ‘s controversial lithium project in Serbia. This is despite the company’s largest shareholder being China’s Chinalco , and more importantly, the EU has ignored mass environmental protests in Serbia. In July 2024, former German chancellor Scholz and Commissioner Sefcovic recognised Serbia as a strategic partner . With China already present in the Serbian mining sector, the EU aims to kill two birds with one stone – securing supplies outside EU borders whilst limiting Beijing’s influence. But all this comes at the cost of dismissing local voices and potential environmental consequences . It’s further eroded public trust, reinforcing anti-EU sentiment and undermining Serbia’s democratisation and Europeanisation process. Being ‘deeply concerned’ isn’t enough Clearly, neither vague statements nor symbolic gestures – like a couple of Commissioners welcoming cycling students in Brussels – will dispel Serbians’ conviction that the EU has a soft spot for Vučić. Now it’s time for the EU to take some tangible steps. It has condemned the violence in Serbia but refrains from highlighting the role of Vučić, the government and the police. It should explicitly denounce police violence and demand the immediate release of detainees – which includes high school students. This would reinforce the EU’s credibility and its commitment to freedom of expression and peaceful assembly. Then the EU should impose concrete forms of accountability. Government officials and police chiefs who order the violence should face targeted restrictive measures such as asset freezes and visa bans. This could prompt them to reconsider their loyalty to the government. While systematic reforms take time, immediate financial pressure can signal the EU’s disapproval. Pre-accession IPA funds should be suspended until Serbia delivers clear results on anti-corruption measures, judicial reforms and media freedom. Likewise, under the Growth Plan ’s Article 21, withholding payments and reducing or redistributing funds should follow. The EU’s focus should also shift to civil society, hearing Serbian voices for free and fair elections. Coupled with support from international monitoring institutions, this will help to restore citizens’ trust in the democratic process. Finally, Serbia’s domestic turmoil mirrors its broader geopolitical drifts. With Hungary likely to block collective action, Member States should downgrade bilateral meetings due to Serbia not following the EU’s Common Foreign and Security Policy . The EU must also explicitly clarify that any progress towards opening Chapter 31 of the accession process will depend on Belgrade cutting ties with Moscow. To ensure its credibility, the EU must act quickly, honestly and substantially in its response to the rapid deterioration of democracy in Serbia, balancing incentives with the strict and firm approach that underpins EU enlargement policy. Antigona Imeri has an academic background in Political Science and International Relations with a focus on conflict-prevention and policy engagement in the Western Balkans.", "wordcount": 1137}, {"source": "publication", "date": "2025-07-17T09:15:41+01:00", "title": "Beyond high winds: hard truths about ‘made in the EU’ offshore wind in lower wind regions", "authors": ["Irina Kustova", "Ky Friedman", "Gustavo Quintana Cabrera"], "topics": [], "units": [], "types": ["Policy Contribution", "Project Report"], "link": "https://cdn.ceps.eu/2025/07/2025-10_ERCC_BLOW.pdf", "page_url": "https://www.ceps.eu/ceps-publications/beyond-high-winds-hard-truths-about-made-in-the-eu-offshore-wind-in-lower-wind-regions/", "excerpt": "Improving the currently limited prospects for offshore wind in Europe’s lower wind speed regions, such as the Black Sea and Eastern Mediterranean, involves addr", "full_text": "", "wordcount": 187}, {"source": "publication", "date": "2025-07-16T09:50:31+01:00", "title": "How digital product passports can enhance waste wood valorisation and circularity in the EU", "authors": ["Nwamaka Ikenze", "Vasileios Rizos"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/07/2025-09_ERCC_W2W-1607-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-digital-product-passports-can-enhance-waste-wood-valorisation-and-circularity-in-the-eu/", "excerpt": "Because of wood’s role as a renewable resource, efficient waste wood utilisation is key to a climate-neutral, sustainable and competitive Europe. Leveraging was", "full_text": "", "wordcount": 222}, {"source": "publication", "date": "2025-07-14T14:56:24+01:00", "title": "Study on the challenges and impacts to a social and inclusive Europe in the next decade", "authors": ["Laura Nurski", "Davide Monaco", "Caterina Astarita", "Harry Crichton-Miller"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/07/study-on-the-challenges-and-impacts-to-a-social-and-KE0125189ENN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/study-on-the-challenges-and-impacts-to-a-social-and-inclusive-europe-in-the-next-decade/", "excerpt": "Key megatrends – including technological, environmental, geopolitical, and demographic changes – are likely to reshape labour markets and social inclusion in Eu", "full_text": "", "wordcount": 186}, {"source": "commentary", "date": "2025-07-11T15:18:43", "title": "This week’s motion of censure in the European Parliament was a proxy war", "authors": ["Sophia Russack"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/this-weeks-motion-of-censure-in-the-european-parliament-was-a-proxy-war/", "page_url": "https://www.ceps.eu/this-weeks-motion-of-censure-in-the-european-parliament-was-a-proxy-war/", "excerpt": "This week’s motion of censure against President Ursula von der Leyen’s Commission was not about vaccines but rather a proxy war over the emerging centre-to-far-right alliances in the European Parliament (EP), with the far right exploiting the tool to destabilise and divide. Many …", "full_text": "This week’s motion of censure against President Ursula von der Leyen’s Commission was not about vaccines but rather a proxy war over the emerging centre-to-far-right alliances in the European Parliament (EP), with the far right exploiting the tool to destabilise and divide. Many MEPs —particularly from the centre left— also opted to abstain to signal their discontent without formally breaking ranks. Overall, the debacle reflects a deepening rift between the EPP and the S&D, Renew and the Greens, signalling a new, increasingly polarised, even hostile, dynamic within the EP. But it also reveals a deeper unease with von der Leyen’s leadership style – never have so many MEPs withheld their support from a Commission President in such a visible way. What happened – and why it’s important Seventy-five MEPs, mainly from far-right parties, launched a motion of censure against the second von der Leyen Commission, with the lack of transparency over Covid-19 vaccine procurement as their main criticism. As expected, von der Leyen survived. A total of 360 MEPs expressed their confidence in her by voting against the motion, while 175 voted in favour – almost all of them belonging to far-right groups. Von der Leyen received 360 votes of support – 40 fewer than when she was elected a year ago. Even the EPP fell short of its full strength: of 188 MEPs, only 169 were present. No Commission President has ever been ousted. Even Jacques Santer managed to resign before being formally forced out in 1999. Historically, censure motions were symbolic acts of protest from the political fringes (usually the far right), with 1999 remaining the only close call. The procedure is similar to impeachment in the US: it’s designed as a response to serious misconduct such as fraud, mismanagement or nepotism, precisely the kind of accusations that brought down Santer but wasn’t the case for von der Leyen, regardless of ‘Pfizergate’. What the vote was really about The centre-left parties used this vote to make a political point. The preceding debate was an opportunity to let off steam, given their growing frustration with the alliances von der Leyen and Manfred Weber have forged to advance the EPP’s agenda. Despite the platform agreement with the S&D and Renew in several key votes, the EPP has secured majorities with far-right support, including the ECR, Patriots for Europe and the ESN. In short, the centre-left used this vote to push back against a new centre-to-far-right coalition, which they see as democratically dangerous. The loss of their own political power is also a clear element. The motion’s (far-right) signatories were clearly not motivated by vaccines, let alone EU transparency. The motion’s text, with its rather random catalogue of accusations (i.e. the text message exchange with Pfizer’s CEO but also the use of Article 122 to establish the Security Action for Europe (SAFE) Regulation and the Commission’s alleged interference in the German and Romanian elections via the Digital Servies Act), shows that they were simply looking for an excuse to cause disruption and to undermine the Commission’s legitimacy. On this, von der Leyen wasn’t wrong in her scathing plenary address – driving a wedge between mainstream parties is a classic populist playbook move. The blessing of abstention Thanks to the roll-call vote, we know exactly how each MEP voted and the results are revealing. Abstention was an elegant way to express discontent with von der Leyen and Weber’s flirtation with the far right, without explicitly supporting a motion tabled by the far right. Many MEPs took advantage of this. While only 18 MEPs formally abstained, a striking 167 were either not present or didn’t make a choice. This latter behaviour can be seen as a form of ‘soft abstention’ – when a group line suggests voting against the motion, not voting becomes a discrete way to signal unhappiness without openly breaking ranks. Not all of them can be counted as deliberate abstentions. Some simply didn’t care or came into the chamber late. Looking at turnout and the maximum number of participants in roll call votes that day (657), still the conclusion must be that many MEPs deliberately chose not to take part. Their message was clear: they didn’t want to side with the far right, but they also didn’t want to support von der Leyen. Among The Left, no MEP voted in favour of von der Leyen; 33 abstained and 13 even supported the motion. Among the Greens, 33 out of 53 backed von der Leyen, while 20 abstained. As for the crucial S&D, out of 136, 98 voted against the motion, thus explicitly supporting her. But about a quarter abstained, despite concessions on including the European Social Fund Plus in the next MFF . Besides the EPP, the liberals were the most loyal – 57of its 77 members stood by her. Interestingly, abstention also appealed to many ECR MEPs, especially those who favour moderation and seek influence in EU policymaking. It allowed them to avoid alienating their EPP allies without undermining their own group (which had initiated the motion). And even within the EPP itself, about 20 MEPs did not vote— likely those who sympathised with the motion but ultimately fell in line. The EPP and the far-right gamble While the original signatories revealed some rifts amongst two of the three far-right groups, the voting itself revealed more unity: Almost all ESN MEPs and PfE MEPs voted in favour. Only the ECR was split. The vote shows that the EPP – and especially von der Leyen – will have to walk a tightrope throughout this mandate. Even as she urged the centre left not to side with the far right, by framing them as anti-democratic, extremists and Putin sympathisers, her own party increasingly relies on similar alliances to advance its agenda. It also shows how unreliable the far right is as a negotiation partner. Despite von der Leyen currently proposing many things that fit their agenda (i.e. deregulation, rolling back the Green Deal etc.) and although the EPP gives them heaps of decision-making power by arranging majorities with them, they still tried to topple her. As the dust settles on a particularly eventful week in Strasbourg, this is all food for thought for von der Leyen, Weber and the EPP going forward.", "wordcount": 1041}, {"source": "publication", "date": "2025-07-10T15:04:55+01:00", "title": "Making Europe’s Research and Innovation Programme an engine of global development", "authors": ["Andrea Renda", "Diana Senczyszyn", "Nicole Reynolds", "Timothy Yeung", "Hien Vu", "Cosima Lenz"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/07/FP10-and-global-challenges.pdf", "page_url": "https://www.ceps.eu/ceps-publications/making-europes-research-and-innovation-programme-an-engine-of-global-development/", "excerpt": "The EU’s approach to research and innovation (R&I) is often praised by commentators and policymakers as being oriented towards rewarding excellent science,", "full_text": "", "wordcount": 247}, {"source": "publication", "date": "2025-07-10T10:13:16+01:00", "title": "A new strategy to empower the single market", "authors": ["Jacques Pelkmans"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/07/2025-07-GRID-SingleMarket-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-new-strategy-to-empower-the-single-market/", "excerpt": "Following the publication of the European Commission’s new Single Market Strategy in May 2025, this CEPS Explainer looks at the finer details to answer one of t", "full_text": "", "wordcount": 163}, {"source": "publication", "date": "2025-07-10T09:53:38+01:00", "title": "Solving Europe’s AI talent equation", "authors": ["Siddhi Pal", "Catherine Schneider", "Laura Nurski"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/07/solving-europes-ai-talent-equation.pdf", "page_url": "https://www.ceps.eu/ceps-publications/solving-europes-ai-talent-equation/", "excerpt": "As Europe scales up its ambition to lead in AI, understanding the structure of AI labour markets becomes essential. This study offers a comparative mapping of A", "full_text": "", "wordcount": 279}, {"source": "publication", "date": "2025-07-08T14:00:15+01:00", "title": "Identification of hurdles that companies, especially innovative start-ups, face in the EU justifying the need for a 28th Regime", "authors": ["Apostolos Thomadakis", "J. Scott Marcus"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://cdn.ceps.eu/2025/07/IUST_STU2025775947_EN.pdf", "page_url": "https://www.ceps.eu/ceps-publications/identification-of-hurdles-that-companies-especially-innovative-start-ups-face-in-the-eu-justifying-the-need-for-a-28th-regime/", "excerpt": "The current discussion around a ‘28th Regime’ originates from a proposal included in the Letta report, that would allow firms that wish to do so to operate unde", "full_text": "", "wordcount": 245}, {"source": "publication", "date": "2025-07-08T09:00:11+01:00", "title": "Navigating the EV transition", "authors": ["Christian Dietz", "Edoardo Righetti", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/07/Formatted_IDA-ACEA-030725-2.pdf", "page_url": "https://www.ceps.eu/ceps-publications/navigating-the-ev-transition/", "excerpt": "The European automotive industry stands at a critical juncture. The transition to electric vehicles (EVs) is crucial to the EU’s climate targets in the transpor", "full_text": "", "wordcount": 201}, {"source": "commentary", "date": "2025-07-04T10:15:25", "title": "Why the EU needs a Special Representative for Global Health", "authors": ["Louise Bengtsson", "Hampus Holmer"], "topics": ["Health"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/why-the-eu-needs-a-special-representative-for-global-health/", "page_url": "https://www.ceps.eu/why-the-eu-needs-a-special-representative-for-global-health/", "excerpt": "When the Council conclusions on the Global Health Strategy – and disclaimer, one of us helped draft those conclusions – were adopted by ministers in January 2024, it marked a moment of real ambition. For the first time in over a decade, EU Member States endorsed a comprehensive v…", "full_text": "When the Council conclusions on the Global Health Strategy – and disclaimer, one of us helped draft those conclusions – were adopted by ministers in January 2024, it marked a moment of real ambition. For the first time in over a decade, EU Member States endorsed a comprehensive vision for Europe’s role in strengthening global health, rooted in equity, resilience and multilateral cooperation. Going beyond the EU’s role in development cooperation, the strategy clearly established health as an integral part of the EU’s foreign policy and the Global Gateway. The EU Global Health Strategy underpinning the conclusions was launched in November 2022. Since then, the international landscape has shifted. Geopolitical tensions have intensified, development assistance has declined, multilateralism is under pressure and major global health agreements have stalled or been diluted – except perhaps the Pandemic Agreement adopted in May. Today, if the EU wants to turn strategy into real-world influence, it needs more than just policy documents – it needs political leadership. An EU Special Representative makes sense The Global Health Strategy promised to ‘act with one voice’, making health a central pillar of the EU’s external action. The Council conclusions backed this, calling for investment in global health diplomacy and coordinated leadership across foreign policy, development, health security and climate. Yet implementation has been hampered by fragmentation across institutions, between Member States and in international engagement. On top of this, the Commission’s progress report on the strategy has been severely delayed. A Special Representative for Global Health could close the gap. Reporting to the EU’s High Representative, an EU Special Representative (EUSR) has both the political weight and institutional mandate to represent the EU in high-level diplomacy, coordinate cross-sector policy and ensure continuity across Commission cycles. Importantly, we’ve seen this work before . From the Sahel and the Horn of Africa to human rights and the Middle East peace process, EUSRs have given visibility and focus to EU priorities in complex, rapidly evolving contexts. An EUSR for Global Health would do the same thing. They would ensure that the EU plays a proactive, coherent role in multilateral forums like the G7, G20 and World Health Assembly but they would also promote a values-based approach to health equity and serve as a focal point in future global health crises. Additionally, they could work to strengthen health as a core aspect of bilateral and inter-regional partnerships with powers like India, the African Union and ASEAN, through dialogue and relationship building. The role would also fully leverage the capacities of the EEAS and its delegations. Crucially, this appointment wouldn’t duplicate the EU institutions’ work – it would connect and amplify it. The new reality for global health The appointment couldn’t be more relevant right now. Cuts in official development assistance (ODA ) have led to drastic consequences and stakeholders are carefully watching the Commission’s proposals for the next Multiannual Financial Framework. While unmet health and humanitarian needs soar, a post-ODA future is also emerging. In the new multipolar world order for global health , the demand for equal partnerships will only grow and agendas are increasingly set in regional forums by emerging powerhouses and south-south initiatives. There’s now a unique opportunity for an EUSR to help reset the EU’s role in global health, seizing existing opportunities and finding new policy coherence in the EU’s internal and external action. The EU can and should contribute not only with grant financing but also through enhancing technical and regulatory cooperation and support, including for the local development of critical technologies, digitalisation and workforce-related issues. Keeping in mind the grievances in the ‘Global South’ related to vaccine equity and tensions during the Pandemic Agreement negotiations, the EU needs to restore confidence and establish a more transparent approach anchored in its partner countries’ needs. Only then will the EU be able to turn its strategy into real-world influence, where words match its actions. For this, leadership that enhances external relations, bridges internal silos and leverages the full range of the EU’s policy areas and tools will be needed. Operating horizontally, the EUSR for Global Health would be well placed to rally Member State action across fragmented EU institutions, while respecting that national priorities will continue to shape policy in certain areas. Several Member States, including France, Germany, the Netherlands and Spain have adopted their own global health strategies and a growing number of countries also have a dedicated ambassador for global health (or its equivalent). This presents a great opportunity for synergies between national and EU efforts, building on the EU’s strengths and competences in relevant areas, from health to development cooperation, trade and health data regulation, and AI. As Covid-19 made plainly clear, protecting and promoting health globally is also in the EU’s interest. As such, the EUSR would also make an important contribution to the EU’s growing geopolitical ambitions. From words to action Creating an EUSR doesn’t require legislation or treaty change. The Council appoints EUSRs by qualified majority vote, typically following a proposal from the High Representative. The most recent appointment was in 2021, for the Horn of Africa. These roles are time-bound, targeted and designed to reflect strategic priorities. With a new Commission and Parliament now in place, and political space for fresh initiatives, now’s the moment to act and ensure clear responsibility for implementing the EU’s global health strategy and beyond. Global health threats are growing, not fading. The post-pandemic period has seen a backtracking on global health goals with rising inequities in access to medicines and vaccines, mounting pressure from climate-related health emergencies, growing antimicrobial resistance, as well as acute humanitarian crises. While the Pandemic Agreement negotiations have concluded, their success depends on political follow-through, not least on remaining sensitive issues, as well as global trust and accountability – something the EU can help lead but only if it has the right structure in place. Alas, an EUSR on Global Health is not a silver bullet. But it is a practical, strategic step that could give the EU the leadership edge it needs—and that the world expects. It would show that Europe is ready not just to positively contribute to the global health agenda but to deliver it, all while committing to more equal partnerships with emerging actors and partners. Perhaps, such an appointment could inspire other regional organisations to appoint their own special representatives for Global Health. Right now, the EU has the strategy. It has the tools. But without a single, clear and empowered voice to navigate the complex international terrain, its global health ambitions risk falling far short of its lofty ambitions. Hampus Holmer is a diplomat and affiliated researcher at the Karolinska Institutet, Stockholm (written in personal capacity).", "wordcount": 1112}, {"source": "publication", "date": "2025-07-03T13:30:25+01:00", "title": "A dataset of EU legal and policy instruments for the digital world", "authors": ["Kai Zenner", "J. Scott Marcus", "Kamil Sekut"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2025/08/CEPS-Zenner-Dataset-July-2025.pdf", "page_url": "https://www.ceps.eu/ceps-publications/a-dataset-of-eu-legal-and-policy-instruments-for-the-digital-world/", "excerpt": "This CEPS legislative dataset is an updated version and successor to a Bruegel dataset that was most recently published on 6 June 2024. Publishing an update now", "full_text": "", "wordcount": 178}, {"source": "commentary", "date": "2025-07-03T10:18:20", "title": "For the euro to go global, the EU must match its ambition with real action", "authors": ["Cinzia Alcidi"], "topics": ["Economy & Monetary Affairs"], "units": ["Economic Policy"], "types": [], "link": "https://www.ceps.eu/for-the-euro-to-go-global-the-eu-must-match-its-ambition-with-real-action/", "page_url": "https://www.ceps.eu/for-the-euro-to-go-global-the-eu-must-match-its-ambition-with-real-action/", "excerpt": "In recent weeks, EU leaders have voiced their support for strengthening the euro’s global role. Christine Lagarde has called for a ‘global euro’ moment and recent Council conclusions affirm the EU’s commitment to reinforcing the euro as both a reserve and transaction currency. Sh…", "full_text": "In recent weeks, EU leaders have voiced their support for strengthening the euro’s global role. Christine Lagarde has called for a ‘global euro’ moment and recent Council conclusions affirm the EU’s commitment to reinforcing the euro as both a reserve and transaction currency. Shifting global dynamics, accompanied by the US dollar’s vulnerability, and driven by the current US administration’s erratic foreign policy and deepening fiscal challenges, are creating a favourable environment for elevating the euro’s global standing. For Europe, this is both an opportunity and a challenge. A stronger global euro could indeed bolster the EU’s strategic autonomy, making it more resilient in an increasingly weaponised international economic landscape . Yet this requires more than just political rhetoric. It demands long overdue and politically sensitive steps towards deeper economic and financial integration, on which progress has stalled for years. The dollar’s edge The dollar’s dominance is neither accidental nor purely economic. It rests on two core pillars – the depth and liquidity of US financial markets, unmatched in scale and trust, and the country’s central role in global geopolitics. No other currency could offer the same combination of economic, financial and strategic weight. This is at the heart of the so-called US exorbitant privilege . But the dollar isn’t immune to being challenged and today that challenge comes primarily from within. US political polarisation, the weaponisation of trade and finance, and sanctions have all begun to erode confidence in the dollar-based system. For the first time in decades, this opens the way for alternatives. The EU’s evolving views The euro has benefited somewhat from the ongoing diversification flows away from the dollar, including a modest appreciation, and particularly since President Trump’s return to the White House. However, this hasn’t translated into a significant increase in official central bank reserves. According to a recent ECB report , over the past three years, the euro’s share has remained largely stable. For the ECB, it’s a sign of continued confidence in the euro, as many central banks — notably in China and Russia — have increased their gold holdings. This view has some merit but the lack of growth in the euro’s share, especially when compared to the rising (albeit still small) role of the Chinese renminbi and other currencies, underscores its uncertain status as a global reserve asset. This reflects the fact that Europe today lacks both a firm geopolitical role and fully integrated, liquid financial markets. Until now, the EU has also lacked the ambition to challenge US monetary dominance. Since the euro’s creation, promoting a more international role for the euro was viewed more as a risk than an opportunity for the EU’s export-driven economic model. This view is now beginning to shift, though concerns about the impact of a strong euro persist. The EU to-do list For a more globally prominent euro, three key conditions must be met. First , Europe must expand the supply of safe, liquid euro-denominated assets, necessary for reserve currency status. Second , the EU must deepen and integrate private capital markets. Third , it should promote the private use of the euro in global transactions. While central bank reserves are important, global currencies are ultimately defined just as much by private sector usage, investor trust and market infrastructure. For the first condition, one promising avenue is to issue common euro-denominated debt linked to shared European priorities, such as defence. The issuance of emergency joint debt during the pandemic created a precedent and doing this again would not only increase the supply of safe assets but also provide the political legitimacy needed for a more prominent global euro. Yet broad support for new common debt is still lacking. It’s no coincidence that unsuccessful policy proposals from the 2010s to pool portions of national sovereign debt into a common framework that would increase the supply of safe EU assets – such as the blue and red bonds – are resurfacing. Similarly, another recent proposal suggests replacing some national bonds with senior Eurobonds. While some argue that financial conditions have improved and they now offer a way forward, it’s still far from certain that a technical solution to secure a political compromise (in the absence of full support) will gain sufficient market traction. Currently, the only clear political commitment comes from Germany’s EUR 847 billion investment in defence and infrastructure. This would significantly increase the availability of Bunds, the most credible euro-denominated safe assets. For the second condition, the Capital Markets Union (CMU) and the Banking Union are being reframed under the broader Savings and Investments Union . Yet despite this rebranding, there’s very little genuine political momentum . Beyond the usual stumbling blocks – the lack of progress on the European Deposit Insurance Scheme or Italy’s refusal to ratify the European Stability (ESM) Treaty – there’s also increasing reluctance to pursue national bank mergers, let alone cross-border ones. The third condition is often overlooked – the euro’s international role ultimately depends on its position within global financial infrastructure and transactions, in areas such as SWIFT payments, international invoicing and foreign exchange trading. While the dollar remains dominant, the risks of relying on a single currency or network have become increasingly apparent, with some countries already taking steps to build alternatives (e.g. the Russian SPFS , the Chinese CIPS ). Strengthening the euro’s role in these transactional areas – through targeted regulatory support or investment in digital infrastructure – could complement broader integration efforts and enhance the euro’s appeal as a reserve currency. Political reality bites – but ambition requires real action And here lies the contradiction at the heart of the EU’s ambition – while the strategic case for a stronger euro is clear, the political appetite for the necessary integration is absent. The pushback usually comes not in principle but in practice: concerns about losing regulatory sovereignty, protecting national industries or potential domestic backlash. The EU’s collective logic is sound but its national politics are fragmented. The one thing that has changed is the recognition that a robust euro is not just an economic tool but a geopolitical necessity. The global economic landscape is evolving quickly and the euro does have a decent chance of becoming a more influential global currency – but seizing that chance requires more than just words. We need deeper integration and joint commitment. If the EU is truly serious about strategic autonomy, it must finally confront the mismatch between ambition and its (un)willingness to act collectively.", "wordcount": 1076}, {"source": "publication", "date": "2025-07-02T13:09:20+01:00", "title": "Disentangling Global Gateway: from Team Europe to the world", "authors": ["Stefania Benaglia", "Ceren Ergenc"], "topics": [], "units": [], "types": ["Task Force Report"], "link": "https://cdn.ceps.eu/wp-content/uploads/2025/07/2025-02_GG-TF-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/disentangling-global-gateway-from-team-europe-to-the-world/", "excerpt": "With the second von der Leyen Commission prioritising European competitiveness and security in an era of geostrategic rivalries, the EU has shifted its focus fr", "full_text": "", "wordcount": 211}, {"source": "commentary", "date": "2025-07-02T13:09:06", "title": "The EU is at a crossroads – the Global Gateway can still lead the way forward", "authors": ["Ceren Ergenc"], "topics": ["Foreign Policy & Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/the-eu-is-at-a-crossroads-the-global-gateway-can-still-lead-the-way-forward/", "page_url": "https://www.ceps.eu/the-eu-is-at-a-crossroads-the-global-gateway-can-still-lead-the-way-forward/", "excerpt": "The second Trump administration has intensified the global reshuffling of geoeconomic alliances following China’s phenomenal industrial growth and its near domination of new technology markets. While it increasingly feels like a new superpower tussle, middle powers and developing…", "full_text": "The second Trump administration has intensified the global reshuffling of geoeconomic alliances following China’s phenomenal industrial growth and its near domination of new technology markets. While it increasingly feels like a new superpower tussle, middle powers and developing countries can still choose from multiple alignments and derisking strategies better aligned with their specific development and security goals. With the Competitiveness Compass , the EU has recognised that it’s lagging in global competitiveness, meaning that it plans to shift from a development-focused role to ‘open strategic autonomy’, namely prioritising its own re-industrialisation. Enter the Global Gateway, increasingly the subject of intense debate in Brussels. That’s why the second Global Gateway Forum planned for mid-October 2025 will be fundamental in defining its future trajectory. New era, new challenges The Global Gateway is Europe’s response – or rebuke – to China’s Belt and Road Initiative (BRI). It began in 2021 and launched its first round of flagship projects in Africa and Latin America in 2023. Its distinctive feature is its commitment to the UN Sustainable Development Goals (SDG). Yet competing with the BRI while striving to uphold the SDGs is already a delicate balance. The EU’s internal divisions, also with its Member States, and pressure from traditional allies in the ‘Global South’ make things even more complex. The Global Gateway faces challenges from multiple directions. Within the EU, various voices pull in opposite directions. Prioritising development requires upholding the SDGs in investment choices and emphasising the green transition, technology and know-how transfer, as well as socioeconomic targets such as job creation in partner countries. Partner countries also need to be like-minded in their political values. Prioritising strategic autonomy , however, requires assessing what’s needed to upgrade Europe’s industries and their place in global value chains. That’s why it’s inaccurate to say that the Global Gateway is what the BRI isn’t , as is often perceived by partner countries. Today, it officially emphasises development as a priority… yet the flagship projects fall short of meeting expectations as they’ve been designed to serve strategic autonomy. Explaining the Global Gateway to Europe The inherent tensions between development and strategic autonomy negatively impacts Member States’ attitudes to the Global Gateway because the initiative’s internal contradictions are viewed as undermining national interests. And then the lack of commitment to Global Gateway goals leads to a lack of a unified voice and resources in partner countries. CEPS’ recently published Task Force report on the Global Gateway highlights that European Delegations simply don’t have the resources to identify potential investment opportunities or local partners, made worse by a lack of regular and structured communication with Member State Missions in partner countries. ‘ Team Europe ’, a term that implies the EU, Member States and the European financial institutions working together, falls short of generating trust in the Global Gateway. A whole-of-government approach was first advised to supplement a whole-of-EU approach to maximise Team Europe’s effectiveness – we now need to enlist ‘Team National’, namely the commitment of large European businesses to engage in joint ventures with partner countries on flagship projects that advance both competitiveness and development through infrastructure investment. As of now, many private investments have been identified as Global Gateway flagship projects but the Global Gateway itself doesn’t have a clear roadmap for how to involve the private sector in SDG-aligned projects that also contribute to supply chain security. In comparison, China’s BRI works by steering private sector commitment with targeted industrial policies and financing local development banks with risk aversion in mind. Explaining the Global Gateway to partners The lack of a clear roadmap to implement its dual objectives, as well as a dedicated formal institution or platform to coordinate, renders the Global Gateway a tool of European self-interest in the target countries, Africa in particular, given the colonial legacy. Europe’s traditional allies in Asia feel left out altogether. The ‘Global South’ countries simply don’t want to choose sides in a looming US-China economic conflict. And they don’t need to anymore due to the multitude of initiatives courting them for raw materials, side industries and consumer markets. Again, Africa is a good case study, with both traditional and emerging powers competing for influence there. The ongoing digital revolution places the continent’s critical raw materials – and the corridors that integrate them into global value chains – at the centre of global strategic competition. Regarding market competition, China’s overcapacity will shift from Europe to Africa after European tariffs. While the competition seems to be between China and Europe (or the West), African countries recognise many other influential actors on the continent, including Turkey, the Gulf countries, Russia and India. The Global Gateway in Europe’s future Europe typically distinguishes itself from China and other competitors through its commitment to European values. However, this is less clearcut today as China now has its own value-laden initiatives, such as the Global Development Initiative. Besides, the Global Gateway and the BRI are both criticised by partner countries in that they mainly work with central governments at the expense of local authorities , civil society and local communities. Facing new competition in its traditional values-based comfort zone, Europe needs to redefine what exactly development means. Development assistance is not inherently connected to achieving strategic autonomy – but helping partners climb up in the value chains is. Organising projects that bring the partners up value chains through skills and technology transfer will distinguish the Global Gateway from its counterparts and create synergies with less like-minded partners by building trust within local communities. This would solve the tension between development objectives and Global Gateway projects’ emphasis on strategic autonomy. Focusing on supply chain resilience will also act as a derisking tool for Europe’s private sector and facilitate political buy-in for Member State governments. Yet regardless of all the challenges discussed above, the Global Gateway can still make a positive contribution towards addressing the EU’s current concerns, ranging from competitiveness to supply chain security. It could also form the external dimension of recent frameworks pushing for open strategic autonomy, such as the Green Industrial Deal and the International Digital Strategy The task ahead is to really listen to local stakeholders – both at home and in partner countries – to build in-depth knowledge about competitors and to identify a new set of flagship projects, including those tailored to support strategic autonomy. To read the full CEPS Task Force report that this Expert Commentary is bas
