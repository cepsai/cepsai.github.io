nd economic abuse, restoring the democratic rule of law, increased spending on healthcare, education and social welfare, as well as restoring media freedom and putting an end to political propaganda. At the same time, there’s little to say about Magyar’s foreign policy aspirations, as his focus has been firmly on domestic affairs. While Fidesz’s propaganda machine painted him as an ardent supporter of Ukrainian President Zelenskyy, it’s difficult to gauge what his approach will be. It’s likely he’ll abandon Orbán’s staunch opposition to sanctions against Russia and he could be more amenable when it comes to enlargement or aid. However, one shouldn’t expect him to immediately join the Coalition of the Willing or rally behind EU efforts to maintain its spheres of interests and increasingly controversial allegiances , especially as the beginning of his term will likely be all about domestic affairs. Nevertheless, the EU should hope for much better cooperation, at least in most policy areas. Though Magyar said that TISZA has no interest in cooperating on migration, it is seeking to restore Hungary’s place as a ‘respected, influential member of the community’ and to ‘constructively shape’ the direction of EU integration. The new government will also be keen to unlock currently frozen EU budgetary commitments, which also suggest a willingness to rebuild the Brussels-Budapest friendship through cooperation and mutual support. The next few months will also test whether the EU institutions are ready for some soul-searching after 16 conflict-ridden years. Despite Orbán’s departure, the EU must assess its own mistakes and the structural weaknesses he exploited to ensure that the Treaty framework is ‘fit’ for the challenges of this decade and beyond. He may be gone, but his way of doing politics lives on through his fellow ‘ Patriots ’ across the EU. The promise of Prometheus While this is a moment of joy for many, it would be dangerous to paint Magyar as a messiah that freed Hungarians from their chains – we should still be cautious . Though the supermajority could allow him to begin a sweeping overhaul of Orbán’s self-serving system, uprooting the entire regime won’t happen immediately. And just like Orbán or any political leader, he must be held accountable by the people and the EU alike. But at the end of the day, Magyar pulled off an enormous feat. In the span of merely two years, not only did he build a nationwide movement from the ground up, he brought together over three million voters to unseat a deeply entrenched strongman backed up by a corrupt, unjust system. Things may not get better in the blink of an eye and dismantling Orbán’s ‘kingdom’ will be very difficult – but now we have the chance to at least try. And an empowered population that came together and overcame the slim odds of ridding itself of Fidesz by democratic means will be much better suited to keeping a vigilant eye on the new man in charge, ensuring he’s held accountable for how he takes the country forward.", "wordcount": 1065}, {"source": "publication", "date": "2026-04-09T09:26:49+01:00", "title": "The EU vs Hungary: a 16-year battle  with no winners", "authors": ["Julia Pocze"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-04_INST_HU-formatted-1.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-eu-vs-hungary-a-16-year-battle-with-no-winners/", "excerpt": "Hungary’s government has been at odds with the EU ever since Viktor Orbán and his party, Fidesz, reclaimed power in 2010. But by all accounts, Hungary has large", "full_text": "", "wordcount": 178}, {"source": "publication", "date": "2026-04-08T14:29:48+01:00", "title": "How to integrate social and climate objectives into the EU’s housing policy", "authors": ["Angela Köppl", "Stefan Schleicher", "Christian Egenhofer"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/04/2026-03_ERCC_Housing-policy-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/how-to-integrate-social-and-climate-objectives-into-the-eus-housing-policy/", "excerpt": "We spend the largest part of our lives either inside buildings or travelling between them. How and where we build is not only fundamental for household spending", "full_text": "", "wordcount": 224}, {"source": "commentary", "date": "2026-04-07T11:10:19", "title": "Unpacking the radical right’s (non-)paradoxes – and why their unity shouldn’t be underestimated", "authors": ["Csaba Stefán"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/unpacking-the-radical-rights-non-paradoxes-and-why-their-unity-shouldnt-be-underestimated/", "page_url": "https://www.ceps.eu/unpacking-the-radical-rights-non-paradoxes-and-why-their-unity-shouldnt-be-underestimated/", "excerpt": "At first glance, radical-right groups like the Patriots for Europe (PfE) are full of contradictions – they hold pan-European rallies yet would dismantle the EU in its current form; they’re highly active in the European Parliament (EP) yet disdain the institution; and they seek al…", "full_text": "At first glance, radical-right groups like the Patriots for Europe (PfE) are full of contradictions – they hold pan-European rallies yet would dismantle the EU in its current form; they’re highly active in the European Parliament (EP) yet disdain the institution; and they seek alliances with MAGA groups, though they’ve traditionally opposed US administrations. But once the radical right’s own theories of sovereignty, democracy and politics are considered, unpacking these paradoxes becomes easier. And understanding them reveals that the radical right is more than a simple byproduct of the EU’s past mistakes… but rather a coherent political force that will continue to shape European politics for the foreseeable future. Paradox 1 – united by Euroscepticism When looking at the radical right’s many rallies in Europe , particularly those held by the Patriots for Europe (PfE), one discovers that their national leaders stand united on a common stage, to deliver a common message, to a common European audience – something we’d expect federalists to do , not nationalists looking to deconstruct the EU. The elephant in the room is that the Patriots are vehemently against European integration in its current form and – as stated in The Great Reset , recently published by a think tank aligned with their thinking – would rather return the EU to its pre-1957 model, presumably gutting most EU law. This offers one of the clearest shared visions of the EU’s ideal end state from any EP group… even if that means dismantling it. To add to the contradiction, the nature of nationalist parties inherently makes reaching common policy positions challenging. For example, their economic positions strongly deviate from party to party. That’s why it shouldn’t come as a surprise that the Patriots reject most reforms but rarely offer alternatives, well summed up by one of their catchphrases: ‘ no migration, no gender, no war .’ It’s a mistake, however, to assume that radical right parties are merely acting opportunistically to further their own domestic agenda or that their unity is doomed to fall apart as soon as national interests start diverging. Such moments have already come and gone , without significantly affecting their cohesion. Rather, their rhetoric is underpinned by a coherent political philosophy that reinforces their unity – especially through Euroscepticism. Paradox 2 – inside the EP but against the EP A Patriot MEP explaining how sovereignty and democracy should be defined would likely raise plenty of eyebrows among EU officials but it would also help explain why the Patriots are very active in the EP despite often treating it as illegitimate. The EU’s legitimacy rests on the ( partly unresolved ) understanding that sovereignty can be lent, shared or even transferred. In trade policy, the EU exercises exclusive competence based on a mandate from the Member States. Normally, whenever more integration is opposed, subsidiarity is invoked because it’s the scope of competences in question – not the EU’s overall legitimacy. The Patriots understand sovereignty as absolute , non-negotiable and only belonging to the Member States. Whenever a supranational EU institution takes the initiative without Member States’ consent, they believe it’s doing so illegitimately and in disrespect of their sovereignty. This also explains why veto politics is, for certain leaders, a question of principle rather than mere obstructionism or sabotage. And why going back to pre-1957 might be preferable, so that neither the European Commission nor the EP could challenge national sovereignty. Radical-right MEPs might say that they’re all playing at ‘pretend democracy’ in the EP. Although the case can be made that the EU is democratic, as Radosław Sikorski did at the 2026 Munich Security Conference, for the radical right this is beside the point. For them, the only basis of democracy is the nation(-state) and so, without a common European demos (which doesn’t exist ), the EU’s only democratic legitimacy comes through the national governments in the Council. A nativist would argue that all democratic elements at a supranational level are a farce and nothing more than a power grab by EU Institutions. That’s why, based on the same logic, their presence in the EP is to use it to make their own power-grab in the opposite direction – away from the supranational EU institutions. Paradox 3 – the ‘Washington Connection’ The radical right’s newest paradox is its ideological alignment and quasi-political unity with MAGA, even though parties such as France’s Rassemblement National, or Germany’s AfD were previously intensely critical of US administrations and their influence in Europe. This hasn’t been smoothed over, as the radical right must often scramble to react to, for example, tariffs or the Greenland crisis. Yet radical-right MEPs will still speak as if there’s no ideological contradiction. There is – but again, it doesn’t matter to them. The Trump administration is highly convenient for European radical-right parties for two reasons. First, their beliefs about sovereignty and democracy are nearly identical and so their tirades against ‘unelected EU officials’ rhyme well. Second, the Trump administration is a strong material backer – as confirmed by its reported plans to finance ideologically-friendly think tanks across Europe. This helps radical-right parties in their mission to deconstruct European integration, even at the cost of accepting the very American influence they once denounced. United in opposition, fragmented once in power? The radical right’s shift from rejecting the EU to actively seeking to reshape it alongside other radical-right parties is a form of political adaptation. Things may change if they enter government. In opposition, internal contradictions can be managed or deferred – but once struggling for power gives way to exercising power, it’s much harder to avoid tough policy questions. Giorgia Meloni is a clear example. Despite initially being denounced as the leader of a neofascist party , she became something of a ‘ Commission President’s favourite ’ after entering office. Her domestic policy shows that her radical-right convictions haven’t disappeared but that the realities of governing have forced her to adopt a more pragmatic approach – including at EU level. Overall, the radical right should be pleased to eventually enter government, right? In fact, no. Radical-right ideologues may instead warn against the ‘deradicalisation’ of figures such as Meloni. Whether other radical-right leaders follow Meloni’s example once in power remains to be seen. What matters now is that these (non-)paradoxes shouldn’t obscure the fact that the radical right has emerged as a powerful political force whose unity – at least for the time being – probably won’t fall apart anytime soon. The radical right isn’t a passing fad that will eventually peter out. It’s a force that will stick around for some time yet and will undoubtedly leave a lasting mark on the EU’s future.", "wordcount": 1111}, {"source": "publication", "date": "2026-04-02T09:22:17+01:00", "title": "2026 Ideas Lab report", "authors": ["Keziah Edgoose", "Julien Libert"], "topics": [], "units": [], "types": [], "link": "https://cdn.ceps.eu/2026/04/IL-report-2026.pdf", "page_url": "https://www.ceps.eu/ceps-publications/2026-ideas-lab-report/", "excerpt": "As the EU works to adapt to the tumultuous international situation, discussions around competitiveness, security, sustainability, strategic autonomy and other p", "full_text": "", "wordcount": 207}, {"source": "publication", "date": "2026-04-01T08:43:31+01:00", "title": "The production of irregularity in Europe", "authors": ["Davide Colombi"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2026/04/The-production-of-irregularity-in-Europe_Policy-Brief.pdf", "page_url": "https://www.ceps.eu/ceps-publications/the-production-of-irregularity-in-europe/", "excerpt": "Migrants’ irregular status in Europe is commonly framed as a border control issue, unauthorised entry or failed return. However, irregularity and legal precarit", "full_text": "", "wordcount": 195}, {"source": "publication", "date": "2026-03-31T10:30:39+01:00", "title": "Building an EU industrial ecosystem of circularity applications for battery packs", "authors": ["Vasileios Rizos", "Patricia Urban", "Gustavo Quintana Cabrera", "Deniz Tekin", "Hien Vu", "Marika Moreschi"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/03/2026-01-ERCC-BATRAW-D7.8.pdf", "page_url": "https://www.ceps.eu/ceps-publications/building-an-eu-industrial-ecosystem-of-circularity-applications-for-battery-packs/", "excerpt": "Electric vehicles (EVs) are rapidly transforming the transportation landscape. In this context, circularity solutions, namely recycling and second-life applicat", "full_text": "", "wordcount": 213}, {"source": "commentary", "date": "2026-03-26T13:52:41", "title": "The Return Regulation will ‘ICE-ify’ the EU’s migration policy", "authors": ["Davide Colombi"], "topics": ["Human Rights & Justice", "Migration, Asylum & Borders"], "units": ["Justice & Home Affairs"], "types": [], "link": "https://www.ceps.eu/the-return-regulation-will-ice-ify-the-eus-migration-policy/", "page_url": "https://www.ceps.eu/the-return-regulation-will-ice-ify-the-eus-migration-policy/", "excerpt": "Europe is drawing on the US playbook on migration enforcement – precisely as that playbook’s costs are now becoming abundantly clear. It’s doing so on a misleading premise, without addressing how migrants’ irregularity is produced in the first place. On 26 March, the European Par…", "full_text": "Europe is drawing on the US playbook on migration enforcement – precisely as that playbook’s costs are now becoming abundantly clear. It’s doing so on a misleading premise, without addressing how migrants’ irregularity is produced in the first place. On 26 March, the European Parliament voted in plenary on the proposed Return Regulation, with 389 votes in favour, 206 against and 32 abstentions . The report by rapporteur Malik Azmani (Renew Europe) – already much more punitive than the Commission proposal – had previously been voted down in the LIBE Committee. An EPP-backed alternative passed with support from the ECR, Patriots for Europe and ESN, marking yet another collapse of the von der Leyen majority in the Parliament. With trilogue negotiations now due to begin and a Council general approach that goes even further, the direction of travel is clear. The Return Regulation is a decisive acceleration in a long-running direction: detection operations inside EU territory, expanded detention (including for children), forced deportation across a wide range of cases, cooperation penalties, return hubs in third countries that people may not have a connection with, and entry bans stretching to 10 years or more – with the Council now pushing for home raids. Europe on ICE While some European political groups have condemned the US’ Immigration and Customs Enforcement (ICE), others are voting to replicate its logic here. During the recent Milan-Cortina Olympics, some groups declared that it wasn’t acceptable for ICE agents to operate on European soil. These sentiments were linked to Renee Nicole Good and Alex Pretti’s murders in Minneapolis in January 2026, alongside 32 other people who died at ICE’s hands in 2025. Notably silent were the EPP, ECR, Patriots and ESN – the same majority that days later passed the revised report on the Return Regulation through LIBE. For the European right, ICE’s actions aren’t a warning. The ‘ICE-ification’ of Europe is the clear goal . And, if what’s happening in the US is anything to go by, the result will be less security for all of us – EU and non-EU citizens alike. ICE deployments have cost cities millions, stretched police departments thin and driven people away from medical care, food programmes and schools – harm that could take years to reverse. The 20% myth Under pressure from Member States and with no impact assessment, the Commission paved the way for this Regulation on a completely misleading premise : only around 20 % of migrants who receive a return order are removed from EU territory. This can only mean the system is broken and more ‘innovative’ solutions are needed. But the statistic hides more than it reveals. Some individuals are counted more than once across Member States. Return orders are issued where removal was never legally or practically feasible – be it because of pending appeals, health conditions, family ties or non-cooperation from the country of origin. The low enforcement rate reflects, in large part, legal constraints that no reform can override. Recent research from the EU-funded I-CLAIM project adds a structural dimension: ‘irregular migration’ isn’t just a border or asylum issue. People fall into irregular status through European rules operating normally: a permit tied to a single employer that lapses when the job ends; an income threshold missed after a difficult year; a family breakdown that removes the legal basis for residence. In various labour sectors, employer-tied permits convert migration control into labour discipline. Workers who risk losing their status by changing jobs cannot assert their rights, refuse unsafe conditions or organise. The constant threat they’ll be deported is an economic feature – not an accident. What the Regulation actually does The Return Regulation doesn’t merely tighten return procedures. It shifts migration policy towards policing and coercion. The Commission’s original proposal included expanded provisions allowing enforcement authorities to detect undocumented people inside EU territory. The Azmani report deleted them. The Council’s general approach goes further, endorsing home raids and searches of ‘other relevant premises’. The EPP’s François-Xavier Bellamy didn’t oppose including such provisions in the final text. Detection on EU territory means identity checks, workplace inspections with a migration focus, and home raids. Where enforcement enters workplaces, workers who fear detection won’t report wage theft, unsafe conditions, labour exploitation or trafficking. Racialised communities bear a disproportionate burden, with racial profiling being further normalised across the EU. A PICUM and Médecins du Monde report warns that the Regulation could allow for the sharing of medical data across authorities and with third countries for deportation purposes. This means people will simply stop seeking the care they need. The cooperation obligation is among the most troubling provisions. It requires individuals – including vulnerable ones – to cooperate with a system designed to detain, sanction and remove them. This applies even to those recognised as non-removable: people who cannot be expelled because of fundamental rights reasons, health conditions or non-cooperation from their country of origin. They would be sanctioned for failing to facilitate a removal that cannot legally take place. There’s another way… Nothing in the Regulation addresses what causes irregularity. There’s no pathway for people in administrative limbo. No firewall that protects access to basic services. And there’s nothing about regularisation. If policies lead people into irregularity, and the only available solution is return, irregularity will only become more prevalent – and with it, precarious living and working conditions, labour exploitation and fundamental rights violations. As the file moves into trilogue negotiations, the following four issues should be considered. First , immigration enforcement must be separated from essential services – healthcare, education, labour inspections – so that accessing your rights doesn’t trigger expulsion. This is a precondition for effective public health, worker protection and fundamental rights. Second , fix the cooperation trap. Being sanctioned for non-cooperation mustn’t apply to people who are non-removable. Penalising someone for failing to facilitate their own expulsion that cannot lawfully occur is disproportionate, legally dubious and counterproductive. Third , address the root causes. The Regulation should be accompanied by a commitment to decouple residence permits from single employers, expand regularisation pathways and reform the income and family reunification rules that cause irregularised people in the first place. Fourth , consider alternatives to return. Spain’s recent regularisation process has been politically controversial – but it does precisely what this Regulation claims to do. Alternatives exist, have also been used by centre-right governments , and would reduce irregularity while complying with fundamental rights, unlike the Regulation’s enforcement-first approach. Europe has a choice: either double down on US-style enforcement that’s expensive, legally fragile and inconsistent with its own stated objectives – or start from being honest about why irregularity exists and what could actually reduce it without having to compromise the EU’s own founding values.", "wordcount": 1119}, {"source": "commentary", "date": "2026-03-24T10:56:21", "title": "More finance, less friction – how the EU’s rulebook turned into a levy on investment (and what to do about it)", "authors": ["Apostolos Thomadakis"], "topics": ["Finance & Banking"], "units": ["Financial Markets & Institutions"], "types": [], "link": "https://www.ceps.eu/more-finance-less-friction-how-the-eus-rulebook-turned-into-a-levy-on-investment-and-what-to-do-about-it/", "page_url": "https://www.ceps.eu/more-finance-less-friction-how-the-eus-rulebook-turned-into-a-levy-on-investment-and-what-to-do-about-it/", "excerpt": "Europe’s financial problem isn’t a lack of rules. It comes from too much friction, and a large share of that drag is self-inflicted. After 15 years of post-crisis repairs, the EU can point to two real gains: a more resilient system and stronger protection for investors and consum…", "full_text": "Europe’s financial problem isn’t a lack of rules. It comes from too much friction, and a large share of that drag is self-inflicted. After 15 years of post-crisis repairs, the EU can point to two real gains: a more resilient system and stronger protection for investors and consumers. Yet alongside this, we’ve assembled a regulatory and supervisory apparatus that’s increasingly difficult to operate as a true single market. Rules pile up in layers, evolve via technical standards and guidance, then get interpreted differently across jurisdictions and finally they force firms into yet another round of internal overhauls. The outcome is a quiet, compounding toll on capital formation, paid through larger compliance teams, duplicate reporting, slower approvals and business models that stay domestic because EU-wide scaling simply isn’t worth the effort. That should trouble anyone thinking seriously about Europe’s growth model. A Savings and Investment Union won’t emerge from slogans alone. It requires a financial system that can move savings into productive investment at scale. And that, in turn, depends on regulation and supervision that are usable, predictable and aligned across borders. This isn’t an argument for deregulation, as President Ursula von der Leyen put it plainly on 1 October 2025 in Copenhagen. It’s an argument for better design. The real competitiveness gap isn’t standards, it’s usability When policymakers discuss competitiveness in finance, the conversation often slips into a false binary. Either we maintain high standards, or we weaken them to keep up with other jurisdictions. Such framing misses the point. In financial services, competitiveness largely comes down to whether the system can do three things effectively: 1) direct savings into investment with efficiency, 2) enable innovation and new entrants without opening loopholes, and 3) allow firms to scale across the single market without paying 27 times for the same idea. None of this requires weaker safeguards. It requires fewer moving parts and clearer accountability. That’s why the Council’s December 2025 conclusions on simplifying EU financial services regulation matter. They signal an institutional acknowledgment that complexity has gone beyond what’s necessary and that both the existing stock and flow of rules need to be managed with greater discipline. We keep adding when we should be replacing The EU has become very effective at introducing new obligations and weak at phasing out old ones. Consolidation is rare, sunset clauses are uncommon, and we almost never force a real trade-off. When something new is added, something else should come out. This habit of layering leads to a framework that grows harder each year to interpret, automate and supervise consistently. It also creates an innovation drag, as established players can absorb the fixed costs of complexity, while challengers struggle. If the goal is to reduce friction, the EU needs to adopt discipline that sounds boring but would be transformative – new measures should clearly map what they override, merge or remove. If nothing is being replaced, then we’re not simplifying, we’re expanding. Sequencing isn’t bureaucracy, it’s economics Much of the burden doesn’t stem from the rule itself but from the timing. When key technical standards and guidance arrive late (or shift repeatedly), firms don’t just implement, they’re forced to rebuild. These rebuild cycles are costly, resource-heavy and often regressive, hitting smaller firms hardest. And when identical rules are enforced differently across supervisors, cross-border groups respond in predictable ways. They duplicate structures, localise operations and avoid scaling across Europe. That’s why ‘readiness gates’ are essential. If critical standards or supervisory clarifications aren’t finalised early enough for proper build-and-test cycles, application dates shouldn’t pretend otherwise. This is just basic execution logic. It’s also telling that the ESAs themselves are calling for streamlining and more risk-based, proportionate processes. That is clear evidence that the current model is accumulating complexity faster than it can manage. Supervision is market-shaping – so divergence is a competitiveness problem Supervision doesn’t just enforce rules, it actively shapes markets. The speed of authorisations, model approvals, data requirements and enforcement intensity all affect whether firms invest, enter and grow. When these vary significantly across Member States, the result isn’t a true single market, it’s a shared rulebook with 27 different operating environments. That’s why stronger convergence with accountability matters. Not just peer reviews that stop at diagnosis but concrete remediation, follow-up and transparency on whether gaps actually close. Because EU markets differ in their level of integration, we also need a practical way to move past the ‘centralisation vs decentralisation’ debate. This means a supervisory efficiency test. Where activities are highly cross-border, standardised, and enforceable at EU level, fragmented supervision is inefficient. Where markets remain genuinely domestic, national oversight still makes sense. The aim is to match oversight to market reality, function by function, rather than rely on a one-size-fits-all approach. Data: stop collecting more and start collecting better Europe’s reporting burden is often framed as a volume problem, with too many templates. But the deeper issue is reuse. Firms still generate similar data repeatedly, in different formats, for different authorities and purposes. That’s simply inefficient. A serious simplification effort should focus on machine-readable standards, interoperable taxonomies and reporting built around clear supervisory use cases. The objective is straightforward – collect once, use many times, across authorities, sectors and borders. One hard truth: Europe won’t get its SIU without reform The Letta and Draghi reports reached the same conclusion: Europe’s fragmentation and slow execution have become strategic weaknesses and this includes finance. If simplification continues to be treated as an occasional burden-reduction exercise, the system will keep drifting towards more layers, more divergence, higher fixed costs and less financing capacity. So, the core argument is simple. Europe should stop measuring success by how much regulation it produces and start measuring it by whether the framework actually supports investment, scaling and supervision that works across borders. High standards are essential. But standards that can’t be used effectively end up stifling their own purpose. We can have more finance with less friction. But only if we accept that simplification is a redesign of how Europe writes rules, maintains them and supervises them. To read the full Task Force Report that this CEPS Expert Commentary is based on, please click here .", "wordcount": 1025}, {"source": "publication", "date": "2026-03-24T10:56:00+01:00", "title": "More finance, less friction: how to simplify the EU’s financial regulation and strengthen supervisory structures", "authors": ["Karel Lannoo", "Apostolos Thomadakis", "Judith Arnal"], "topics": [], "units": [], "types": ["Task Force Report"], "link": "https://cdn.ceps.eu/2026/03/TF-report-financial-regulation-march-2026-formatted.pdf", "page_url": "https://www.ceps.eu/ceps-publications/more-finance-less-friction-how-to-simplify-the-eus-financial-regulation-and-strengthen-supervisory-structures/", "excerpt": "Europe’s financial regulatory and supervisory framework has delivered major stability and protection gains over the past two decades but it has become increasin", "full_text": "", "wordcount": 171}, {"source": "publication", "date": "2026-03-19T16:22:31+01:00", "title": "Savings and investment accounts: the wrapper is easy – the system is not", "authors": ["Apostolos Thomadakis"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/03/No-105-SIAs.pdf", "page_url": "https://www.ceps.eu/ceps-publications/savings-and-investment-accounts-the-wrapper-is-easy-the-system-is-not/", "excerpt": "Europe doesn’t lack savings. It lacks conversion. Households save a lot but too much of that money sits in low-yield places that preserve nominal value while qu", "full_text": "", "wordcount": 144}, {"source": "commentary", "date": "2026-03-19T13:58:38", "title": "The EU should create a Quantum Sovereign Fund", "authors": ["Andrea G. Rodríguez"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/the-eu-should-create-a-quantum-sovereign-fund/", "page_url": "https://www.ceps.eu/the-eu-should-create-a-quantum-sovereign-fund/", "excerpt": "Europe’s quantum ecosystem is often described as a success story. It hosts world-class research centres, an increasing network of innovation clusters in cities such as Delft, Munich, Oxford, Copenhagen, Paris, and San Sebastian, and a steady pipeline of start-ups emerging from it…", "full_text": "Europe’s quantum ecosystem is often described as a success story. It hosts world-class research centres, an increasing network of innovation clusters in cities such as Delft, Munich, Oxford, Copenhagen, Paris, and San Sebastian, and a steady pipeline of start-ups emerging from its universities. In fact, around 36% of total quantum companies and startups are European, more than what the US can boast about (only around 24 %). Yet this apparent success hides a structural weakness. Much of Europe’s public support for quantum technologies has focused on solving fundamental scientific questions or developing early-stage applications . This has produced excellent science – but much less industry scale. If Europe really wants to become a global leader in quantum technologies, policymakers have a critical question to answer – are we building a competitive European quantum industry… or just a science powerhouse? If the answer is ‘yes’ to the former, then Europe should seriously consider a dedicated Quantum Sovereign Fund. The missing link in Europe’s quantum strategy Over the last few years, and particularly since the pandemic, public investment in quantum technologies has surged across Europe. EU programmes such as the EU Quantum Flagship have been complemented by a growing number of national initiatives. In total, the EU has invested around EUR 2 billion into quantum projects and EU Member States have declared their intentions for an additional EUR 9 billion, positioning Europe as one of the top three public investors in quantum. This has delivered clear results. Europe remains a global leader in quantum science, with strong capabilities across domains such as quantum communication, sensing and computing. However, quantum technologies aren’t simply another branch of digital innovation. They are capital-intensive, hardware-dependent and deeply intertwined with semiconductor manufacturing, advanced materials and cybersecurity infrastructure. Scaling requires fabrication capacity, advanced packaging, testing facilities and integrated supply chains. It also requires patient capital and credible demand signals. Since the Quantum Flagship launched in 2019, many promising start-ups have been born out of European universities and laboratories but just a few have reached the scale-up phase, and even fewer are ready to compete in global markets. The ecosystem is strong at generating ideas but much, much weaker at transforming them into industrial capabilities. The US does it differently. It doesn’t treat quantum as an isolated scientific domain but embeds it within a broader industrial strategy encompassing semiconductor manufacturing, supply-chain resilience and defence procurement. Public support isn’t confined to laboratories – it extends to production facilities, infrastructure and long-term demand commitments. The goal isn’t only scientific discovery but creating capacity and capabilities. In China, state support is showing signs of success with the development of kilometres-long quantum communication channels, even beyond national borders , and the emergence of some interesting players in quantum computing. The goal is technological sovereignty on Chinese terms, i.e. as little dependency on the outside world as possible. And this ambition is delivering on scale. In contrast, Europe has developed a rich but fragmented policy landscape. For example, the Chips Act strengthens semiconductor manufacturing and gives small grants for quantum pilot lines . Horizon Europe finances research and early innovation. National programmes nurture local clusters. Meanwhile, large-scale initiatives, such as the European Quantum Communication Infrastructure (EUROQCI), aim to deploy secure quantum networks across the EU. Each instrument is valuable in its own right – but which one funds scale? Great programmes are nothing without a good business plan EUROQCI is a good case study. It’s a forward-looking response to cybersecurity risks and geopolitical uncertainty, showing that the EU takes quantum-secure communication seriously. But its industrial impact will depend less on its technological ambition than on its economic design. If procurement remains fragmented and short term, the initiative risks becoming a connectivity project rather than an industrial catalyst. If instead it’s structured to create sustained demand for European suppliers, aligned with common standards and long-term commitments, it could anchor entire value chains in photonics, quantum repeaters and cryogenic electronics. And this will be fundamental not only for industry but also for European strategic autonomy. The difference between these two outcomes isn’t technological – it’s financial and institutional. This tension between EUROQCI’s design and the lack of a ‘business plan’ for the initiative highlights a broader coordination problem. Europe has invested a lot in knowledge creation, but the financial and institutional mechanisms required for going from lab to market, prototype to production, are still underdeveloped. On top of this, European venture capital markets, while improving, remain fragmented and often not well-suited to absorb such risk. Public and private buyers hesitate to act as early adopters without mature products, while investors wait for credible revenue prospects before committing larger rounds. The result is what’s been called the ‘ valley of death ’, a place of limbo between technological promise and industrial consolidation. It’s time to build quantum capacity As Europe is now giving the finishing touches to the upcoming Quantum Act, policymakers have a unique opportunity to close this gap. One proposal stands out – an EU Quantum Sovereign Fund. The EU is already investing massively in quantum technologies. Structuring investments through a dedicated instrument within InvestEU could help with targeting the missing scale-up phase. This would provide growth capital to companies transitioning from lab to demonstrators to industrial deployment. It would co-invest with private actors, mitigating risk while crowding in capital. Crucially, it would closely align with procurement initiatives such as EUROQCI and semiconductor policy, ensuring that financing, infrastructure and demand signals reinforce one another rather than evolve in parallel. The objective wouldn’t be to replace national programmes but to correct a structural coordination failure. In emerging, capital-intensive technologies with high spillovers and strategic relevance, private incentives alone aren’t enough to generate the investment levels required to scale. A targeted instrument, carefully governed and embedded within Europe’s broader economic security strategy, would help bridge this gap. Ultimately, the debate should shift from whether we fund research to whether we build capacity. Europe’s scientific foundations are strong. Its regulatory influence is considerable. But sovereignty in critical technologies is measured less by publications or policy documents than by production lines, exports and supply chain resilience vis-à-vis increasing external shocks. Europe has a choice to make. It can continue to excel in discovery while relying on others for large-scale deployment – or it can complement its scientific strengths with industrial courage. The next phase of European quantum policy should be defined by this transition. Funding research was necessary. Funding scale-up is now a must. A Quantum Sovereign Fund is the way to get there.", "wordcount": 1085}, {"source": "commentary", "date": "2026-03-17T10:24:03", "title": "EU gas markets may avoid a 2022-style crisis – but the consequences will bite anyway", "authors": ["Irina Kustova"], "topics": ["Energy, Climate & Environment"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/eu-gas-markets-may-avoid-a-2022-style-crisis-but-the-consequences-will-bite-anyway/", "page_url": "https://www.ceps.eu/eu-gas-markets-may-avoid-a-2022-style-crisis-but-the-consequences-will-bite-anyway/", "excerpt": "Since 28 February, the closure of the Strait of Hormuz has blocked roughly a fifth of global oil and LNG trade. Qatar Energy declared force majeure on LNG shipments, triggering a fresh spike in gas prices across Asia and Europe. The Dutch TTF surged 70-100 %, from around EUR 30 M…", "full_text": "Since 28 February, the closure of the Strait of Hormuz has blocked roughly a fifth of global oil and LNG trade. Qatar Energy declared force majeure on LNG shipments, triggering a fresh spike in gas prices across Asia and Europe. The Dutch TTF surged 70-100 %, from around EUR 30 MWh to EUR 50-60 MWh. This likely reflects market expectations that the war will be over soon. Equally, the market entered this crisis under relatively soft conditions . Yet if Qatari volumes remain unavailable for longer, the markets could quickly begin pricing in political uncertainty and tighter supply. Duration is everything, LNG flexibility can hurt Analysts had long expected a gas glut as new liquefaction capacity was set to come online from 2026. Delays have tightened the outlook. But the overnight removal of roughly a fifth of global LNG supply means there’s no immediate replacement: recently commissioned US terminals and the forthcoming Golden Pass LNG Train 1 won’t fill the gap. Even if the Strait reopens soon, Qatari production cannot restart overnight . Asia will feel the shock most as Qatar is a core LNG supplier to China, India, Japan, South Korea and especially Bangladesh and Pakistan. Even with a high share of long-term contracts providing some insulation to Asian buyers, replacing Qatari volumes on the spot market is extremely costly – a single redirected cargo could add USD 45 million . Europe’s direct exposure is lower – about 8% of imports – but price exposure is far more sensitive. Europe enters summer storage refill with inventories well below the five-year average and inverse summer-winter spreads. Unlike 2022, when soft Asian demand (partly due to China’s zero-Covid policy) helped Europe secure additional LNG, there’s very little spare supply today, thus putting Europe and Asia in direct competition. The upcoming ban on Russian spot LNG from April 2026 may add further tightness. US LNG offtakers could greatly benefit from the crisis. US FOB cargoes are already being redirected to Asia , despite sharply rising freight costs and longer voyages. Wealthier Asian buyers may outbid Europe, but vulnerable importers will brace for the impact. Oil switching won’t offer much relief either, leaving coal as an immediate alternative for Asia. Prolonged LNG disruption will further hit gas-dependent fertiliser production, with knock-on effects for food security in East Asia. The possible peril of relying on US LNG US LNG’s share of EU imports is growing , accounting for about 58 % of LNG imports in 2025 and roughly a quarter of total EU gas imports, causing concerns that Europe may become overreliant on the US. Yet fears of political disruption are likely overstated – although with the Trump administration one never knows. First, the rapid expansion of US export capacity is creating strong incentives to secure premium – i.e. European – markets . Second, geography matters – with most US LNG projects in the Gulf of Mexico, transatlantic shipments are generally more practical and economically attractive , at least while there are still constraints at the Panama Canal . Finally, US LNG exporters remain commercially driven and were among the first to offer flexible short- and medium-term contracts. Most US LNG bound for the EU are destination-free and can be redirected quickly. Halting US LNG exports to Europe would also likely mean pulling the emergency brake on most current US exports. However, it’s true that US LNG flexibility results in higher price sensitivity. While some volumes haven been contracted to European utilities, a large share still goes to aggregators with strong price incentives to divert cargoes elsewhere. Yet longer disruptions to Qatari volumes will only strengthen US exporters’ leverage further. Even though the market was just about to shift in Europe’s favour – after China stopped importing US LNG – at best this window has now been postponed. If the crisis limits the EU’s leverage, the EU Methane Regulation could become an early casualty. Although some US exporters have indicated their willingness to adapt , the Trump administration is insisting on exemptions until 2035. LNG’s ‘new normal’ Even if the disruption proves relatively short, the effects could be longer lasting. LNG has long been seen as politically safer than pipelines, thanks to its inherent flexibility. Yet LNG, advertised as a reliable transition fuel, could now face reputational damage. Supplies, even those considered relatively safe, are becoming increasingly exposed to disruption, and force majeure may also have reputational consequences for Qatar. All this will encourage buyers to consider alternative suppliers or sources, whether renewables and batteries – or coal. LNG trade itself is also becoming riskier. Geopolitical, military and security threats have exposed the vulnerabilities of what’s actually a highly concentrated supply chain . Even after the market stabilises, higher insurance premiums and rerouting costs will keep freight expenses high. Déjà vu for the EU? While many take comfort that prices remain far below the August 2022 peak, this misses the point: the gas glut probably won’t happen now and high prices are weighing on the EU economy, exposing painful lessons on the gas import portfolio structure. And of course, gas price spikes intensify political tensions over how to lower energy prices. Structural solutions – electrification, renewables, nuclear, flexibility and grid expansion – are essential but cannot offset short-term shocks. Some immediate solutions discussed include reopening the subsidies and price caps toolbox . Gas still often sets marginal electricity prices. Some EU Member States are again tempted by the good old idea of ‘decoupling from gas’ and blaming carbon pricing. But even if intervening in marginal prices ultimately creates more problems than it solves , the temptation to slide towards national interventions, ignoring industry calls for regulatory stability and investment certainty, is real. Similarly, efforts to limit interconnections to protect lower domestic prices could complicate the EU’s push for a more pan-European grid even further. Industrial sectors, especially those using natural gas as a heat source and feedstock, will be hit most. Temporary state support may offer limited relief, while demand destruction looms again, spurring questions about Europe’s industrial future. The consequences faced by fertiliser production could have knock-on effects on food security and living costs. Whether the current crisis reopens the Pandora’s box of national interventions is still unclear. What’s clear for now is that the gradual fall of gas prices towards pre-2021 levels over the past two years gave Europe hope of a return to normal. Alas, that hope is now fading. The author thanks Anne-Sophie Corbeau for providing comments on an earlier version of this commentary. All mistakes, opinions and omissions remain solely those of the author.", "wordcount": 1095}, {"source": "publication", "date": "2026-03-13T10:54:50+01:00", "title": "Gender, households and the production of irregularity in Europe", "authors": ["Davide Colombi"], "topics": [], "units": [], "types": ["Project Report"], "link": "https://cdn.ceps.eu/2026/03/Gender-households-and-the-production-of-irregularity-in-Europe_I-CLAIM_February-2026_Final.pdf", "page_url": "https://www.ceps.eu/ceps-publications/gender-households-and-the-production-of-irregularity-in-europe/", "excerpt": "Migrants’ irregular status in Europe is not a fixed legal category but a product of the interactions between migration, labour, welfare and family policy regime", "full_text": "", "wordcount": 165}, {"source": "publication", "date": "2026-03-12T16:46:54+01:00", "title": "There’s enough space on the plate: putting forward the case for protein diversification in the EU", "authors": ["Luca Nipius", "Tim Schröder"], "topics": [], "units": [], "types": ["Policy Contribution"], "link": "https://cdn.ceps.eu/2026/03/2026-02-ERCC-Explainer-on-proteins.pdf", "page_url": "https://www.ceps.eu/ceps-publications/theres-enough-space-on-the-plate-putting-forward-the-case-for-protein-diversification-in-the-eu/", "excerpt": "For several years now, the EU and its Member States have recognised the strategic importance of protein supply. Europe’s current protein system faces growing ch", "full_text": "", "wordcount": 157}, {"source": "commentary", "date": "2026-03-12T10:42:51", "title": "With European defence on everyone’s mind, we need to remember that security begins at home", "authors": ["Merili Arjakas"], "topics": ["Foreign Policy & Security", "Russia, Ukraine & European Security"], "units": ["Foreign Policy"], "types": [], "link": "https://www.ceps.eu/with-european-defence-on-everyones-mind-we-need-to-remember-that-security-begins-at-home/", "page_url": "https://www.ceps.eu/with-european-defence-on-everyones-mind-we-need-to-remember-that-security-begins-at-home/", "excerpt": "Unless a young European chooses to enlist in the armed forces or works in a national security institution or industry, there might not be obvious ways to contribute personally to European defence. However, this perception is only accurate if security is seen as a public good deli…", "full_text": "Unless a young European chooses to enlist in the armed forces or works in a national security institution or industry, there might not be obvious ways to contribute personally to European defence. However, this perception is only accurate if security is seen as a public good delivered exclusively by the state – as is the case of defending external borders with military kit. Such a narrow view underestimates the type of threats we face today and the essential role individuals, neighbourhoods and society plays in responding to them. That’s why security must also be considered a personal concern. In short, we all need to be involved. Unprepared is overexposed… First, crisis preparedness begins at home. While it matters for a state’s response whether a power or water outage is caused by a cyber-attack or from sabotage , unanticipated weather conditions or simple human error , the immediate concern for citizens is the same: do I have sufficient supplies, batteries or alternative sources of heating at home to sustain my family for the first hours or days of disruption? And could I manage for longer if shops were closed or deliveries interrupted? A special Eurobarometer survey conducted in early 2024 found that only 48 % of Europeans say they feel relatively well informed about disaster risks. Between the highest- and lowest-performing countries there are wide disparities, however: 90 % of Swedes, 80 % of Slovenians and 79 % of Finns report feeling well-informed, compared with just 28 % in Portugal, 31 % in Hungary and 33 % in Italy. Across the EU27, preparedness levels remain modest. For no single category of emergency supplies does the average exceed 50 %: 47 % of households have flashlights or candles, 36 % keep a home pharmacy for emergencies, 29 % keep a stock of food, 20 % store emergency water supplies, 20 % have a battery-powered radio, and only 18 % have agreed a family communication plan in the event of a crisis. Preparedness also varies significantly between regions, with northern and western European countries generally reporting higher levels than eastern and parts of southern Europe. Demographic differences are also visible, with older respondents more likely to have emergency measures in place. No country can ever achieve 100 % preparedness and short of a total societal collapse, that level of readiness isn’t necessary, nor realistic. Yet moving towards greater self-reliance is urgent. To be able to cope for 72 hours during an emergency is also part of EU official guidelines, as drawn up as part of its Preparedness Union Strategy , launched in March 2025. This followed the publication of ex-Finnish President Sauli Niinistö’s report on civilian and military preparedness. Looking to the Nordics and Baltics The Nordic and Baltic countries offer one model for bridging the gap between the state and individuals – voluntary home guards, whose members augment the national defence forces and first responders but also act as community pillars. These cross-sector networks help to build societal cohesion. At the most basic level, they reassure everyone that in a crisis there are people with the skills and capacity to help. Often, they can become a driving force for raising public awareness. In October 2025, Estonia’s Defence League launched basic drone training for civilians and reached over 300 people within two months, with nearly 3 000 more on the waiting list and growing. The programme offers a simple introduction to drone operation, encourages participants to think through countermeasures in the event of an attack, and incentivises further training. The ‘Be ready’ app developed by the Estonian Women’s Voluntary Defence Organisation includes practical guidelines and preparedness checklists. Similar brochures have been posted to all households by the rescue services. Both organisations also regularly conduct crisis preparedness training. Most importantly, these initiatives aim to encourage people to plan ahead and discuss these plans with their families. Similar volunteer-based civil protection networks exist in other EU Member States as well, but what the Nordic and Baltic approaches provide is a system that connects them with a territorial defence force. Certainly, the need to acquire skills to defend oneself is felt more keenly on Europe’s eastern flank, where the external threat is perceived as very real. Nevertheless, across the EU we must be better prepared to deal with ‘ the age of unpeace’ – a spectrum of hostile attacks that target civilian infrastructure, test institutional responsiveness, and seek to weaken societal cohesion and endurance. This would be well below the threshold of a conventional armed attack that might trigger a collective response yet exceeding the level of peacetime stability we’ve all grown accustomed to. Towards a European model of civil resilience It’s worth considering how existing organisations can be developed for improving awareness of the need for more robust civilian preparedness across society, not only among its most proactive segments. Western European countries that have traditionally maintained strict civil-military separation laws can look to the total defence model for inspiration. The EU could provide support and help with coordination. Some challenges vary, from Finland to Portugal, due to differences in risk perception and the natural environment. Other challenges, such as ensuring the continuity of essential services or mobilising citizens to take an active role, are quite similar. Sharing experiences across countries can help all Member States learn and adapt more effectively. National Defence Courses, programmes used in both Estonia and Finland that bring together the military, politicians, state and local officials, business executives, educators, cultural figures, and community leaders for lectures and practical workshops can be initiated elsewhere. These initiatives help reduce the mental distance between the general population and the work that the defence forces undertake to keep us all safe. Above all, citizens themselves should believe that ensuring our security is everybody’s concern, and that it’s not just the responsibility of state institutions and their personnel. The fewer resources the state must spare for the young and healthy, the more they have for the truly vulnerable groups. And the better we know our neighbours on the street or fellow compatriots, even those with different backgrounds or worldviews, the stronger our social cohesion becomes. And the stronger we’ll be as nations. For the fourth year in a row, CEPS is once again proud to mark International Women’s Day on 8 March with another short series of Expert Commentaries to showcase the insights and expertise of some of our most talented female researchers.", "wordcount": 1067}, {"source": "publication", "date": "2026-03-10T15:30:17+01:00", "title": "Navigating the European Commission’s MFF Proposal for 2028-2034", "authors": ["Eulalia Rubio", "Cinzia Alcidi"], "topics": [], "units": [], "types": ["Commissioned Reports"], "link": "https://www.ceps.eu/ceps-publications/navigating-the-european-commissions-mff-proposal-for-2028-2034/", "page_url": "https://www.ceps.eu/ceps-publications/navigating-the-european-commissions-mff-proposal-for-2028-2034/", "excerpt": "The Commission’s Multiannual Financial Framework 2028-34 proposes merging all EU shared management funds (Cohesion Policy, the Common Agriculture Policy and Hom", "full_text": "", "wordcount": 120}, {"source": "commentary", "date": "2026-03-10T14:10:45", "title": "Why Turkey’s women’s rights debate should matter to Europe", "authors": ["Deniz Tekin"], "topics": ["Diversity, Equity & Inclusion"], "units": ["Energy, Resources & Climate Change"], "types": [], "link": "https://www.ceps.eu/why-turkeys-womens-rights-debate-should-matter-to-europe/", "page_url": "https://www.ceps.eu/why-turkeys-womens-rights-debate-should-matter-to-europe/", "excerpt": "Last Sunday marked International Women’s Day (IWD) – a moment to commemorate both the struggles and the progress made for gender equality and women’s rights internationally. Yet today, in Europe and beyond, many of these hard-won gains are being reopened not as settled rights but…", "full_text": "Last Sunday marked International Women’s Day (IWD) – a moment to commemorate both the struggles and the progress made for gender equality and women’s rights internationally. Yet today, in Europe and beyond, many of these hard-won gains are being reopened not as settled rights but as contested politics. This rollback is visible in Poland’s stalled abortion reform , Latvia’s push to step back from the Istanbul Convention , as well as the ‘anti-LGBTQ+’ legislative surge under Donald Trump. Turkey is also a telling example, where violence against women is increasingly framed as a matter of strengthening and protecting the family , while protections against such violence – from the Istanbul Convention to practical enforcement – have weakened. Turkey’s experience could be the canary in the coalmine for Europe. In Turkey, the space for women’s rights and gender equality has grown noticeably narrower, with the country now ranked 106th in the 2025/26 Women, Peace and Security Index – which covers women’s inclusion, access to justice and security – placing it well below many countries in Central and Eastern Europe and Central Asia. The rollback became especially visible in 2021, when Turkey withdrew from the Istanbul Convention . This Council of Europe treaty aims to tackle all forms of violence against women and girls, recognising such violence as systematic and gender based. It also sets binding obligations on prevention, victim protection and support, and prosecution, alongside the requirement for improved data collection and awareness raising. Turkey was the first country to ratify the Convention in 2012 and it later became the first – and hopefully last – to withdraw, claiming the treaty had been ‘hijacked’ to normalise homosexuality and to undermine social and family values. Public space hasn’t been spared either. Every 8 March, Istanbul’s Feminist Night March , organised since 2003, brings thousands of women together to protest violence, patriarchy, gender inequality and the state’s failure to uphold women’s rights. In recent years, however, the march has increasingly been met with restrictions , including bans, transport closures, police cordons and detentions. These restrictions aren’t incidental and they’re not unique to Turkey – they show how anti-gender politics go hand in hand with shrinking democratic freedoms. 2025 as the Year of the Family? The Turkish government declared 2025 as the ‘ Year of the Family’ , portraying the traditional family as the cornerstone of society, while concepts such as gender identity were framed as threats to the family and national values. This logic even reached the football pitch, where male players took it upon themselves to speak over women’s bodies and choices, promoting ‘natural childbirth’ as part of a Health Ministry campaign during a Super League match. Yet when policy centres the family more than women’s rights, it becomes easier to obscure failures in protection and accountability. This is why the erosion of legal and institutional protections – including those linked to the Istanbul Convention framework – matters in practice, not only in principle. According to the We Will Stop Femicides Platform (KCDP), at least 294 women were killed in 2025, with 61 % murdered in their homes and 69 % killed by a male (sometimes former) family member. The so-called Year of the Family also saw 297 suspicious deaths of women, the first time ever that suspicious deaths surpassed recorded femicides – despite official claims that there are no unsolved murders. This indicates alarming structural shortcomings in investigation and accountability, including insufficient evidence collection and prematurely declaring cases as either suicides or accidents. Without reliable and comparable administrative data as evidence, the scale and patterns of abuse and violence remain blurred, limiting effective policy responses. Filling institutional gaps Equality exists on paper in civil and family law in Turkey, yet uneven implementation and weak enforcement persist , alongside legal gaps in addressing forms of gender-based violence such as stalking, forced marriage and digital violence. But the problem isn’t only within the justice system – it extends into education where gender equality and sexual education are absent from the curriculum, and into healthcare, where abortion is often nearly impossible to access despite being legal. In parallel, multiple assessments, including recent Commission reporting on Turkey , underline persistent gaps in how public authorities collect, track and report of cases of violence against women and femicides, which in turn obscures institutional failures of the state itself. Taken together, these issues leave much to be desired when it comes to gender equality in practice. In response, civil society has often stepped in where public institutions fall short. It has built parallel systems of documentation and support, even as civic space becomes increasingly constrained. Groups such as KCDP document and compile case-by-case data on femicides and suspicious deaths while initiatives like Anıt Sayaç (Monument Counter) serve as a digital memorial and database, created after official data requests went unanswered. Women’s assemblies and bar association offices provide free legal assistance and awareness-raising at the local level. We see similar cases, with civil society taking action amid institutional inaction; in Poland the first ‘abortion point’ opened across the street from parliament on IWD and Ireland’s citizens’ assemblies contributed towards lifting the constitutional ban on abortion. This is precisely where the EU can play a practical role – by helping sustain and strengthen the actors already filling these gaps. A key avenue would be to support civil society through funding and capacity-building, while also backing organisations that track implementation gaps against Istanbul Convention standards. In Turkey’s case, this should go hand in hand with urging the government to move back towards alignment with – and ultimately renewed commitment to – the Convention. In practice, this would mean scaling what already exists; EU-Council of Europe programmes on women’s access to justice aimed at strengthening the capacity of NGOs, monitoring efforts on gender equality indicators led by CEİD, and the European Institute for Gender Equality’s upcoming regional cooperation to improve gender statistics and mainstreaming. Turkey’s withdrawal from the Convention, the restrictions on feminist mobilisation and the rise in suspicious deaths are not an exception. Violations against gender equality and women’s rights don’t stop at national borders and are constantly reframed through cultural, family and political lenses. Similar struggles are visible across Europe, where backlash against Istanbul and the very language of gender is cast as a threat to traditional family structures and national values. Without a gender perspective, cases appear isolated and disconnected, masking both systemic patriarchal violence and the institutional shortcomings behind them. International Women’s Day therefore doesn’t reflect closure, but the persistence of a lot of unfinished work. For the fourth year in a row, CEPS is once again proud to mark International Women’s Day on 8 March with another short series of Expert Commentaries to showcase the insights and expertise of some of our most talented female researchers.", "wordcount": 1130}, {"source": "commentary", "date": "2026-03-09T10:15:29", "title": "In the fight between the European Parliament and Commission, Hungary is the ominous third party in an ongoing ‘triangle of madness’", "authors": ["Julia Pocze"], "topics": ["EU Institutions & Policy-making"], "units": ["Institutions"], "types": [], "link": "https://www.ceps.eu/in-the-fight-between-the-european-parliament-and-commission-hungary-is-the-ominous-third-party-in-an-ongoing-triangle-of-madness/", "page_url": "https://www.ceps.eu/in-the-fight-between-the-european-parliament-and-commission-hungary-is-the-ominous-third-party-in-an-ongoing-triangle-of-madness/", "excerpt": "Luxembourg, which hosts the Court of Justice of the European Union (CJEU), isn’t known for its snowy altitudes – but the avalanche it subjected the Hungarian government to on 12 February was certainly noteworthy. It started with the Advocate-General’s (AG) opinion on Hungary’s So…", "full_text": "Luxembourg, which hosts the Court of Justice of the European Union (CJEU), isn’t known for its snowy altitudes – but the avalanche it subjected the Hungarian government to on 12 February was certainly noteworthy. It started with the Advocate-General’s (AG) opinion on Hungary’s Sovereignty Protection Act – which established a Cold War-reminiscent surveillance and intimidation apparatus – arguing that Hungary infringed EU law, including several fundamental freedoms. Simultaneously, the AG opinion on the inter-institutional dispute Parliament v Commission called on the CJEU to throw out the Commission’s 2023 decision to payout Hungary in return for lifting Ukraine-related vetoes. Though there’s no guarantee that the CJEU’s judgments will mirror these views, both make the case for the Commission’s strange dual role as the ‘Guardian of the Treaties’ and as an increasingly politicised body that has become more politically influential by bargaining with the very Treaty principles it’s supposed to protect. Sue me once, sue me twice Inter-institutional disputes aren’t uncommon. In 2021, the European Parliament (EP) brought action against the Commission over its inaction on applying the Conditionality Regulation . The Commission had been waiting for the CJEU to uphold the Regulation before applying it, after Hungary and Poland took it to Luxembourg . The EP’s case was eventually withdrawn following the Court’s judgment and the Commission began to apply it. Nevertheless, the 2021 dispute shows a long-standing effort from MEPs to push the Commission to enforce the rule of law . But, unlike in the previous case, the one currently on the docket is about what the Commission did and not what it didn’t do. It’s difficult to untangle the complex web of the conditionality regime, as there are multiple, mutually reinforcing instruments – most being applied to Hungary – and budgetary programmes at play. Simply put, disbursing funds from the EU’s long-term budget and the post-Covid Recovery and Resilience Facility is contingent upon Member States’ respect of the rule of law , including an independent judiciary. Hungary has consistently not met such basic requirements. In 2022, the Commission determined that Hungary wasn’t applying the Charter of Fundamental Rights effectively and thus it didn’t meet all the horizontal enabling conditions (‘Charter HEC’) to fully access cohesion funds. Some of these funds were subsequently suspended until Hungary undertook certain reforms, including on judicial independence. A year later, the Commission decided that Hungary’s reforms fulfilled the Charter HEC on judicial independence and lifted the suspension, unblocking about EUR 10.2 billion. This was immediately highly contested and eventually led to the EP filing for its annulment. The enemy of my enemy…is also my enemy? Hungary’s government, long engaged in a bitter feud with the Commission – if the ever-evolving propaganda billboards featuring Ursula von der Leyen are any indication – found itself between a rock and a hard place. Usually, the Commission and Hungary are opposing parties, not allies. Yet once the EP brought the Commission to the CJEU, the case made the two frenemies strange bedfellows – Hungary decided to intervene on the Commission’s side, supporting the argument that unblocking the reimbursements was lawful. Teaming up with its long-standing nemesis wasn’t a Kumbaya moment but a matter of necessity – the Hungarian government must stand by the Commission to have a fighting chance of not having to pay back some EUR 10 billion. At the same time, it’s not like Viktor Orb á n has a better relationship with the EP’s ruling majority – those billboards also feature Orbán’s former group-mate and ally , Manfred Weber. Beyond an uneasy truce with roadblock Hungary, the case reflects badly on the Commission for two major reasons. First is the technically unrelated Sovereignty Protection case, where the Commission launched infringement proceedings over several breaches of EU law. In a sour twist of fate, the Sovereignty Protection Act was adopted only a day before the Commission concluded that Hungary’s ‘reforms’ appear to satisfy the Charter HEC. It’s almost like the Hungarian government thanked the Commission for the vote of confidence by then unveiling its most outrageous rule of law violation yet. The SPA – which was being closely monitored by the Commission ever since it was first mentioned – established a new Sovereignty Protection Office (SPO) tasked with investigating just about anyone , but particularly civil society, election candidates and independent media outlets suspected of ‘serving foreign interests’ or ‘threating national sovereignty’. Those subjected would have to hand over all manner of sensitive information and personal data and could be investigated on the grounds of receiving ‘foreign funding’. As many have pointed out , the targets of these investigations are intimidated, stigmatised and silenced – and once deemed a threat, the SPO’s actions and reports cannot be challenged . With the SPO operating outside the realm of judicial oversight, one would be hard-pressed to find ample procedural safeguards or judicial independence in Hungary. The second issue for the Commission is the why of the December 2023 decision. At this point, it’s basically undisputed that the funds were unblocked to stop Orbán from vetoing aid for Ukraine . The government made no secret that it might reconsider its veto if Hungary could access some previously blocked funds. There’s no denying that not only did the Commission use the rule of law – a core EU ‘value’ – as a bargaining chip to find a solution to a pressing geopolitical situation, it also allowed itself to be blackmailed . Using Article 2 TEU values as political leverage is a controversial move, especially as it’s the Commission’s number one duty to enforce them. Ultimately, this led the Commission into a situation where it simultaneously failed to respect its own detailed conditions for unlocking EU funds and stood on the losing side of a doomed gamble with the rule of law. These two fronts – against Hungary, against the EP – highlight a growing tension in the Commission’s own functioning: the duality of an increasingly politicised institution that’s often unable (or sometimes unwilling) to fulfil its own legal obligations due to mounting geopolitical pressure and internal disunity. The Commission’s politicisation puts it at odds with the Treaty framework. Until the Lisbon regime is reformed, the priority should still be on enforcing EU law – especially core Treaty values. As the Commission becomes more of a powerbroker, it must reassess what it’s willing or even allowed to sacrifice to achieve a consensus. Because the rule of law – pending the CJEU’s judgment – should be fully off limits. For the fourth year in a row, CEPS is once again proud to mark International Women’s Day on 8 March with another short series of Expert Commentaries to showcase the insights and expertise of some of our most talented female researchers.", "wordcount": 1118}, {"source": "commentary", "date": "2026-03-06T14:14:26", "title": "Legitimate data access will determine whether European science has a bright or bleak future", "authors": ["Stefaan Verhulst"], "topics": ["AI, Digitalisation & Innovation"], "units": ["GRID"], "types": [], "link": "https://www.ceps.eu/legitimate-data-access-will-determine-whether-european-science-has-a-bright-or-bleak-future/", "page_url": "https://www.ceps.eu/legitimate-data-access-will-determine-whether-european-science-has-a-bright-or-bleak-future/", "excerpt": "The world has become more complex, more dynamic and more interconnected than ever before. The challenges we face – from health to climate, from democratic resilience to economic transformation – are deeply intertwined. And we need new ideas to meet these challenges. Europe has ne…", "full_text": "The world has become more complex, more dynamic and more interconnected than ever before. The challenges we face – from health to climate, from democratic resilience to economic transformation – are deeply intertwined. And we need new ideas to meet these challenges. Europe has never lacked intellectual ambition, but ideas alone aren’t enough. To make real progress, we need breakthrough discoveries. We need evidence of what works. And we need the institutional capacity to test, validate and scale solutions across borders and disciplines. That’s where science comes in. Yet good science depends on data. And if we want AI to supercharge discovery and transform science, then data becomes even more important. The ‘datafication’ of society Digitalisation has led to an unprecedented datafication of society . When citizens engage with government services, visit a doctor, use a mobility platform, shop online or measure their steps and/or sleep through wearable devices, data are generated. But this datafication doesn’t stop with individual behaviour. It extends deep into the productive fabric of our economies. Manufacturing systems , industrial supply chains , logistics networks , energy grids and robotic production lines are now embedded with sensors, connected devices and intelligent control systems. The implication is profound – data is no longer a by-product of digital services alone. It’s a structural feature of both our digital and physical infrastructures. The remarkable feature of digital data isn’t merely its volume. It’s its reusability . When done responsibly, data created for one purpose can often be reused for entirely different objectives – including scientific research. But there’s a fundamental constraint: access. Much of today’s most valuable data remains locked away in institutional stovepipes – within government agencies, universities and private companies. Despite its public value potential, it often remains inaccessible to scientists and public interest actors. Europe has taken important steps to address this data asymmetry. Open data policies have expanded transparency. The Data Governance Act and the Data Act seek to facilitate data sharing and rebalance power in data markets. Article 40 of the Digital Services Act creates pathways for vetted researchers to access platform data. The European Open Science Cloud seeks to enable the sharing of scientific data. Sectoral data spaces – including those envisioned under the European Health Data Space – and Data Labs aim to provide structured, interoperable infrastructures for data access and use. Yet instead of a steady expansion of access, we’re now witnessing a ‘ data winter .’ Access to private sector data for research has declined in several domains. Open government data initiatives have slowed or been rolled back. Scientific datasets have become restricted or have disappeared. Open science has struggled to scale beyond pilot projects. And broader political retrenchment risks weakening some of the very infrastructures designed to enable responsible reuse. Generative AI’s rapid expansion has also triggered backlash . Large-scale data scraping for AI training has blurred the line between openness and extraction . Consequently, institutions and content creators have become more protective, sometimes closing access altogether . And without reliable access to diverse, high-quality data, scientific progress risks stagnation. What should Europe do? Three priorities stand out. Access shouldn’t be only supply-driven For too long, data policy has focused on releasing datasets without clearly articulating the questions they’re meant to answer. But the value of data – and increasingly the value of AI – depends directly on the value of the question. In short, better questions define better discovery. If we want to unlock meaningful access, we must invest in what might be called ‘ question science ’ – the systematic identification of high-priority societal questions; the structuring of those questions so they are researchable and actionable; the mapping of those questions to existing or potential data sources; and embedding them into funding frameworks, governance mandates, and institutional strategies. When demand is vague, access debates remain abstract. When questions are clear , access becomes purposeful. Researchers, policymakers and data holders can align around concrete objectives . This requires structured, participatory processes that bring scientists, communities, funders and regulators together to define and prioritise the questions that matter most. Strengthening legitimacy by going beyond consent Traditional consent models are increasingly insufficient in an AI-driven world. Consent is typically individual, transactional and static. Yet data reuse for research and AI is collective and dynamic. The societal impacts of AI models trained on large-scale datasets cannot be reduced to a series of isolated, one-off agreements. We must complement consent with social license – the process of building trust and legitimacy from ongoing community or stakeholder engagement and accepting how data is being reused. Social license involves understanding societal expectations and preferences; translating those expectations into governance agreements; embedding oversight, enforcement and redress mechanisms; and creating continu
