<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Channels builder — pick parameters &amp; open</title>
<style>
  :root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f6f8fb;--accent:#2563eb;--accent2:#1d4ed8;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:560px;margin:48px auto;padding:0 22px}
  h1{font-size:24px;font-weight:800;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 26px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 24px 20px;
        box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .field{margin-bottom:20px}
  .field>label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;
        letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
  .seg{display:flex;flex-wrap:wrap;gap:8px}
  .seg button{flex:1 1 auto;min-width:72px;border:1px solid var(--line);background:#fff;border-radius:10px;
        padding:9px 12px;font-size:13.5px;font-weight:600;color:#334155;cursor:pointer;transition:.12s}
  .seg button:hover{border-color:#94a3b8}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .hint{font-weight:600;text-transform:none;letter-spacing:0;color:#94a3b8}
  .preview{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#475569;
        background:#f1f5f9;border-radius:8px;padding:10px 12px;word-break:break-all;margin:4px 0 18px}
  .actions{display:flex;gap:10px}
  .btn{border:0;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer}
  .btn.open{background:var(--accent2);color:#fff;flex:1}
  .btn.open:hover{background:#1e40af}
  .btn.copy{background:#fff;border:1px solid var(--line);color:#334155}
  .btn.copy:hover{border-color:#94a3b8}
  .copied{color:var(--accent);font-size:12.5px;margin-left:4px;visibility:hidden}
  .copied.show{visibility:visible}
  .foot{margin-top:18px;font-size:12px;color:#94a3b8}
  .foot a{color:var(--accent);text-decoration:none;font-weight:600}
  .foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <h1>Channels builder</h1>
  <p class="sub">Pick the parameters, then <b>Open</b> to launch the matching
    &ldquo;who executes digital ODA&rdquo; channels view in a new tab.</p>
  <div class="card">
    <div class="field"><label>Size by</label>
      <div class="seg" data-group="metric" data-default="d">
        <button class="on" data-val="d">Disbursements</button>
        <button data-val="c">Commitments</button>
      </div>
    </div>

    <div class="field"><label>Funder group <span class="hint">(who funded it)</span></label>
      <div class="seg" data-group="fg" data-default="all">
        <button class="on" data-val="all">All funders</button>
        <button data-val="te">Team Europe</button>
        <button data-val="inst">· EU Institutions</button>
        <button data-val="mem">· EU member states</button>
        <button data-val="oth">Non-Team Europe</button>
        <button data-val="twn">Taiwan</button>
      </div>
    </div>

    <div class="field"><label>Recipient region</label>
      <div class="seg" data-group="region" data-default="all">
        <button class="on" data-val="all">All regions</button>
        <button data-val="af">Africa</button>
        <button data-val="ap">Asia-Pacific</button>
      </div>
    </div>

    <div class="field"><label>Scope</label>
      <div class="seg" data-group="scope" data-default="dig">
        <button class="on" data-val="dig">Digital only</button>
        <button data-val="all">Incl. non-digital</button>
      </div>
    </div>

    <div class="preview" id="preview"></div>
    <div class="actions">
      <button class="btn open" id="openBtn">Open in new tab ↗</button>
      <button class="btn copy" id="copyBtn">Copy link</button>
      <span class="copied" id="copied">copied</span>
    </div>
  </div>
  <p class="foot">Launches <a href="channels_explorer.html">channels_explorer.html</a>.
    Related: <a href="AID/treemap_builder.html">treemap builder</a>.</p>
</div>
<script>
  var sel = { metric:"d", fg:"all", region:"all", scope:"dig" };

  function buildUrl(){
    // channels_explorer.html deep links: ?fg=inst|mem|oth|te|twn&region=af|ap&metric=c&nd=1
    // defaults (all funders · all regions · disbursed · digital only) → no query string.
    var qs = [];
    if (sel.fg !== "all")       qs.push("fg=" + sel.fg);
    if (sel.region !== "all")   qs.push("region=" + sel.region);
    if (sel.metric === "c")     qs.push("metric=c");
    if (sel.scope === "all")    qs.push("nd=1");
    return "channels_explorer.html" + (qs.length ? "?" + qs.join("&") : "");
  }

  function refresh(){ document.getElementById("preview").textContent = buildUrl(); }

  document.querySelectorAll(".seg").forEach(function(seg){
    var group = seg.dataset.group;
    seg.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click", function(){
        seg.querySelectorAll("button").forEach(function(x){ x.classList.remove("on"); });
        b.classList.add("on");
        sel[group] = b.dataset.val;
        refresh();
      });
    });
  });

  document.getElementById("openBtn").addEventListener("click", function(){
    window.open(buildUrl(), "_blank");
  });
  document.getElementById("copyBtn").addEventListener("click", function(){
    var abs = new URL(buildUrl(), window.location.href).href;
    navigator.clipboard.writeText(abs).then(function(){
      var c = document.getElementById("copied"); c.classList.add("show");
      setTimeout(function(){ c.classList.remove("show"); }, 1400);
    });
  });
  refresh();
</script>
</body>
</html>
