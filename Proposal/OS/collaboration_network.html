<meta charset="utf-8">
<title>Acknowledgement network</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #chart { width: 100vw; height: 100vh; background: #ffffff; }
</style>

<div id="chart"></div>

<script src="../lib/echarts.min.js"></script>
<script>
const GRAPH = {"nodes": [{"name": "Alpaca", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "DeepSeek-OCR", "indeg": 1, "outdeg": 6, "both": true, "ocr": true}, {"name": "DeepSeek-OCR-2", "indeg": 0, "outdeg": 5, "both": false, "ocr": true}, {"name": "DocLayout-YOLO", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "ERNIE", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "GOT-OCR2.0", "indeg": 2, "outdeg": 0, "both": false, "ocr": true}, {"name": "GaMS-1B-Chat", "indeg": 0, "outdeg": 1, "both": false, "ocr": false}, {"name": "Gazal-R1-32B-GRPO-preview", "indeg": 0, "outdeg": 1, "both": false, "ocr": false}, {"name": "Gemma (Google)", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "InternVL3", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "Keye", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "LMDeploy", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "LMSys", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "Meta (Llama)", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "Meta-Llama-3-8B-Instruct-GGUF", "indeg": 0, "outdeg": 3, "both": false, "ocr": false}, {"name": "MinerU", "indeg": 4, "outdeg": 0, "both": false, "ocr": true}, {"name": "Mistral", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "MonkeyOCR", "indeg": 1, "outdeg": 9, "both": true, "ocr": true}, {"name": "Nanonets-OCR2-3B", "indeg": 0, "outdeg": 1, "both": false, "ocr": true}, {"name": "OPT (Meta)", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "Octopus-v2", "indeg": 0, "outdeg": 1, "both": false, "ocr": false}, {"name": "OmniDocBench", "indeg": 2, "outdeg": 0, "both": false, "ocr": true}, {"name": "OneChart", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "PP-DocLayout_plus-L", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "PP-StructureV3", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "PaddleOCR", "indeg": 2, "outdeg": 0, "both": false, "ocr": true}, {"name": "PaddleOCR-VL", "indeg": 0, "outdeg": 4, "both": false, "ocr": true}, {"name": "PyMuPDF", "indeg": 2, "outdeg": 0, "both": false, "ocr": true}, {"name": "Qwen", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "Qwen2.5-VL", "indeg": 4, "outdeg": 0, "both": false, "ocr": true}, {"name": "Slow Perception", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "UltraChat", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "UltraFeedback", "indeg": 1, "outdeg": 0, "both": false, "ocr": false}, {"name": "Vary", "indeg": 2, "outdeg": 0, "both": false, "ocr": true}, {"name": "aimv2", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "dots.ocr", "indeg": 0, "outdeg": 5, "both": false, "ocr": true}, {"name": "layoutreader", "indeg": 1, "outdeg": 0, "both": false, "ocr": true}, {"name": "llama.cpp", "indeg": 2, "outdeg": 0, "both": false, "ocr": false}, {"name": "olmOCR-2-7B-1025", "indeg": 0, "outdeg": 1, "both": false, "ocr": true}, {"name": "zephyr-7b-beta", "indeg": 0, "outdeg": 5, "both": false, "ocr": false}], "edges": [{"source": "DeepSeek-OCR", "target": "GOT-OCR2.0"}, {"source": "DeepSeek-OCR", "target": "MinerU"}, {"source": "DeepSeek-OCR", "target": "OneChart"}, {"source": "DeepSeek-OCR", "target": "PaddleOCR"}, {"source": "DeepSeek-OCR", "target": "Slow Perception"}, {"source": "DeepSeek-OCR", "target": "Vary"}, {"source": "DeepSeek-OCR-2", "target": "DeepSeek-OCR"}, {"source": "DeepSeek-OCR-2", "target": "GOT-OCR2.0"}, {"source": "DeepSeek-OCR-2", "target": "MinerU"}, {"source": "DeepSeek-OCR-2", "target": "PaddleOCR"}, {"source": "DeepSeek-OCR-2", "target": "Vary"}, {"source": "GaMS-1B-Chat", "target": "OPT (Meta)"}, {"source": "Gazal-R1-32B-GRPO-preview", "target": "Qwen"}, {"source": "Meta-Llama-3-8B-Instruct-GGUF", "target": "Meta (Llama)"}, {"source": "Meta-Llama-3-8B-Instruct-GGUF", "target": "llama.cpp"}, {"source": "MonkeyOCR", "target": "DocLayout-YOLO"}, {"source": "MonkeyOCR", "target": "InternVL3"}, {"source": "MonkeyOCR", "target": "LMDeploy"}, {"source": "MonkeyOCR", "target": "MinerU"}, {"source": "MonkeyOCR", "target": "PP-DocLayout_plus-L"}, {"source": "MonkeyOCR", "target": "PP-StructureV3"}, {"source": "MonkeyOCR", "target": "PyMuPDF"}, {"source": "MonkeyOCR", "target": "Qwen2.5-VL"}, {"source": "MonkeyOCR", "target": "layoutreader"}, {"source": "Nanonets-OCR2-3B", "target": "Qwen2.5-VL"}, {"source": "Octopus-v2", "target": "Gemma (Google)"}, {"source": "PaddleOCR-VL", "target": "ERNIE"}, {"source": "PaddleOCR-VL", "target": "Keye"}, {"source": "PaddleOCR-VL", "target": "MinerU"}, {"source": "PaddleOCR-VL", "target": "OmniDocBench"}, {"source": "dots.ocr", "target": "MonkeyOCR"}, {"source": "dots.ocr", "target": "OmniDocBench"}, {"source": "dots.ocr", "target": "PyMuPDF"}, {"source": "dots.ocr", "target": "Qwen2.5-VL"}, {"source": "dots.ocr", "target": "aimv2"}, {"source": "olmOCR-2-7B-1025", "target": "Qwen2.5-VL"}, {"source": "zephyr-7b-beta", "target": "Alpaca"}, {"source": "zephyr-7b-beta", "target": "LMSys"}, {"source": "zephyr-7b-beta", "target": "Mistral"}, {"source": "zephyr-7b-beta", "target": "UltraChat"}, {"source": "zephyr-7b-beta", "target": "UltraFeedback"}]};

const thanksOf = {};
const thankedBy = {};
GRAPH.nodes.forEach(n => { thanksOf[n.name]=[]; thankedBy[n.name]=[]; });
GRAPH.edges.forEach(e => { thanksOf[e.source].push(e.target); thankedBy[e.target].push(e.source); });

const maxIn = Math.max.apply(null, GRAPH.nodes.map(n=>n.indeg));

const nodes = GRAPH.nodes.map(n => {
  const size = 16 + (n.indeg / maxIn) * 46;
  const color = n.both ? '#FF9D00' : '#16a34a';
  return {
    name: n.name,
    symbolSize: size,
    value: n.indeg,
    itemStyle: { color: color },
    label: { show: size > 22 || n.ocr },
    category: n.ocr ? 0 : 1
  };
});

const links = GRAPH.edges.map(e => ({
  source: e.source, target: e.target,
  lineStyle: { color: '#cbd5e1', width: 1, curveness: 0.12 }
}));

const chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  backgroundColor: '#ffffff',
  tooltip: {
    confine: true, backgroundColor: '#fff', borderColor: '#e5e7eb', borderWidth: 1,
    textStyle: { color:'#111', fontSize: 12 },
    extraCssText: 'box-shadow:0 2px 10px rgba(0,0,0,.12); border-radius:8px; max-width:300px; white-space:normal;',
    formatter: function(p) {
      if (p.dataType === 'edge') {
        return '<b>' + p.data.source + '</b> thanks <b>' + p.data.target + '</b>';
      }
      const n = p.data.name;
      let html = '<b>' + n + '</b>';
      const t = thanksOf[n], by = thankedBy[n];
      if (t.length) html += '<div style="margin-top:6px;color:#b45309"><b>Thanks:</b> ' + t.join(', ') + '</div>';
      if (by.length) html += '<div style="margin-top:6px;color:#15803d"><b>Thanked by:</b> ' + by.join(', ') + '</div>';
      if (!t.length && !by.length) html += '<div style="margin-top:6px;color:#888">no links</div>';
      return html;
    }
  },
  series: [{
    type: 'graph',
    layout: 'force',
    roam: true,
    draggable: true,
    label: { position: 'right', fontSize: 11, color: '#333' },
    emphasis: { focus: 'adjacency', lineStyle: { width: 2.5, color:'#FF9D00' } },
    force: { repulsion: 360, edgeLength: [70, 160], gravity: 0.1, friction: 0.16 },
    categories: [{ name: 'OCR cluster' }, { name: 'Other' }],
    edgeSymbol: ['none', 'arrow'],
    edgeSymbolSize: 6,
    data: nodes,
    links: links
  }]
});
window.addEventListener('resize', () => chart.resize());
</script>
