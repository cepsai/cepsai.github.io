ed by the deployer.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":["high-risk AI system (Colorado)'","'consequential decision'"],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"deployer-of-high-risk-ai-systems-11","rowLabel":"Impact assessment","typeLabel":"Impact assessment","jdata":{"eu":{"label":"Obligations","text":"1.Prior to deploying a high-risk AI system referred to in Article 6(2), with the exception of high-risk AI systems intended to be used in the area listed in point 2 of Annex III, deployers that are bodies governed by public law, or are private entities providing public services, and deployers of high-risk AI systems referred to in points 5 (b) and (c) of Annex III, shall perform an assessment of the impact on fundamental rights that the use of such system may produce. For that purpose, deployers shall perform an assessment consisting of:\n(a) a description of the deployer’s processes in which the high-risk AI system will be used in line with its intended purpose;\n(b) a description of the period of time within which, and the frequency with which, each high-risk AI system is intended to be used;\n(c) the categories of natural persons and groups likely to be affected by its use in the specific context;\n(d) the specific risks of harm likely to have an impact on the categories of natural persons or groups of persons identified pursuant to point (c) of this paragraph, taking into account the information given by the provider pursuant to Article 13;\n(e) a description of the implementation of human oversight measures, according to the instructions for use;\n(f) the measures to be taken in the case of the materialisation of those risks, including the arrangements for internal governance and complaint mechanisms.\n2.The obligation laid down in paragraph 1 applies to the first use of the high-risk AI system. The deployer may, in similar cases, rely on previously conducted fundamental rights impact assessments or existing impact assessments carried out by provider. If, during the use of the high-risk AI system, the deployer considers that any of the elements listed in paragraph 1 has changed or is no longer up to date, the deployer shall take the necessary steps to update the information.\n(...)\n4.If any of the obligations laid down in this Article is already met through the data protection impact assessment conducted pursuant to Article 35 of Regulation (EU) 2016/679 or Article 27 of Directive (EU) 2016/680, the fundamental rights impact assessment referred to in paragraph 1 of this Article shall complement that data protection impact assessment.\n5.The AI Office shall develop a template for a questionnaire, including through an automated tool, to facilitate deployers in complying with their obligations under this Article in a simplified manner.","verbatim":false,"ref":"EU AI Act, Article 27","tags":[],"badges":[{"label":"EU AI Act, Article 27","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_27","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(3) (a) except as provided in subsections (3)(d), (3)(e), and (6) of this section:\n(i) a deployer, or a third party contracted by the deployer, that deploys a high-risk artificial intelligence system on or after February 1, 2026, shall complete an impact assessment for the high-risk artificial intelligence system; and\n(ii) on and after February 1, 2026, a deployer, or a third party contracted by the deployer, shall complete an impact assessment for a deployed high-risk artificial intelligence system at least annually and within ninety days after any intentional and substantial modification to the high-risk artificial intelligence system is made available.\n(b) an impact assessment completed pursuant to this subsection (3) must include, at a minimum, and to the extent reasonably known by or available to the deployer:\n(i) a statement by the deployer disclosing the purpose, intended use cases, and deployment context of, and benefits afforded by, the high-risk artificial intelligence system;\n(ii) an analysis of whether the deployment of the high-risk artificial intelligence system poses any known or reasonably foreseeable risks of algorithmic discrimination and, if so, the nature of the algorithmic discrimination and the steps that have been taken to mitigate the risks;\n(iii) a description of the categories of data the high-risk artificial intelligence system processes as inputs and the outputs the high-risk artificial intelligence system produces;\n(iv) if the deployer used data to customize the high-risk artificial intelligence system, an overview of the categories of data the deploy er used to customize the high-risk artificial intelligence system;\n(v) any metrics used to evaluate the performance and known limitations of the high-risk artificial intelligence system;\n(vi) a description of any transparency measures taken concerning the high-risk artificial intelligence system, including any measures taken to disclose to a consumer that the high-risk artificial intelligence system is in use when the high-risk artificial intelligence system is in use; and\n(vii) a description of the post-deployment monitoring and user safeguards provided concerning the high-risk artificial intelligence system, including the oversight, use, and learning process established by the deployer to address issues arising from the deployment of the high-risk artificial intelligence system.\n(c) in addition to the information required under subsection (3)(b) of this section, an impact assessment completed pursuant to this subsection (3) following an intentional and substantial modification to a high-risk artificial intelligence system on or after February 1, 2026, must include a statement disclosing the extent to which the high-risk artificial intelligence system was used in a manner that was consistent with, or varied from, the developer's intended uses of the high-risk artificial intelligence system.\n(d) a single impact assessment may address a comparable set of high-risk artificial intelligence systems deployed by a deployer.\n(e) if a deployer, or a third party contracted by the deployer, completes an impact assessment for the purpose of complying with another applicable law or regulation, the impact assessment satisfies the requirements established in this subsection (3) if the impact assessment is reasonably similar in scope and effect to the impact assessment that would otherwise be completed pursuant to this subsection (3).\n(f) a deployer shall maintain the most recently completed impact assessment for a high-risk artificial intelligence system as required under this subsection (3), all records concerning each impact assessment, and all prior impact assessments, if any, for at least three years following the final deployment of the high-risk artificial intelligence system.\n(g) on or before February 1, 2026, and at least annually thereafter, a deployer, or a third party contracted by the deployer, must review the deployment of each high-risk artificial intelligence system deployed by the deployer to ensure that the high-risk artificial intelligence system is not causing algorithmic discrimination.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"deployer-of-high-risk-ai-systems-12","rowLabel":"Notification","typeLabel":"Notification","jdata":{"eu":{"label":"Obligations","text":"3.Once the assessment referred to in paragraph 1 of this Article has been performed, the deployer shall notify the market surveillance authority of its results, submitting the filled-out template referred to in paragraph 5 of this Article as part of the notification. In the case referred to in Article 46(1), deployers may be exempt from that obligation to notify.","verbatim":false,"ref":"EU AI Act, Article 27","tags":[],"badges":[{"label":"EU AI Act, Article 27","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_27","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-13","rowLabel":"System logs","typeLabel":"System logs","jdata":{"eu":{"label":"Obligations","text":"6.Deployers of high-risk AI systems shall keep the logs automatically generated by that high-risk AI system to the extent such logs are under their control, for a period appropriate to the intended purpose of the high-risk AI system, of at least six months, unless provided otherwise in applicable Union or national law, in particular in Union law on the protection of personal data.\nDeployers that are financial institutions subject to requirements regarding their internal governance, arrangements or processes under Union financial services law shall maintain the logs as part of the documentation kept pursuant to the relevant Union financial service law.","verbatim":false,"ref":"EU AI Act, Article 26 (6)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (6)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-14","rowLabel":"Information to workers","typeLabel":"Information to workers","jdata":{"eu":{"label":"Obligations","text":"7. Before putting into service or using a high-risk AI system at the workplace, deployers who are employers shall inform workers’ representatives and the affected workers that they will be subject to the use of the high-risk AI system. This information shall be provided, where applicable, in accordance with the rules and procedures laid down in Union and national law and practice on information of workers and their representatives.","verbatim":false,"ref":"EU AI Act, Article 26 (7)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (7)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-15","rowLabel":"Data protection","typeLabel":"Data protection","jdata":{"eu":{"label":"Obligations","text":"9.Where applicable, deployers of high-risk AI systems shall use the information provided under Article 13 of this Regulation to comply with their obligation to carry out a data protection impact assessment under Article 35 of Regulation (EU) 2016/679 or Article 27 of Directive (EU) 2016/680.","verbatim":false,"ref":"EU AI Act, Article 26 (9)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (9)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-16","rowLabel":"Registration (public authorities)","typeLabel":"Registration (public authorities)","jdata":{"eu":{"label":"Obligations","text":"8.Deployers of high-risk AI systems that are public authorities, or Union institutions, bodies, offices or agencies shall comply with the registration obligations referred to in Article 49. When such deployers find that the high-risk AI system that they envisage using has not been registered in the EU database referred to in Article 71, they shall not use that system and shall inform the provider or the distributor.","verbatim":false,"ref":"EU AI Act, Article 26 (8)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (8)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-17","rowLabel":"Registration (public authorities)","typeLabel":"Registration (public authorities)","jdata":{"eu":{"label":"Obligations","text":"3. Before putting into service or using a high-risk AI system listed in Annex III, with the exception of high-risk AI systems listed in point 2 of Annex III, deployers that are public authorities, Union institutions, bodies, offices or agencies or persons acting on their behalf shall register themselves, select the system and register its use in the EU database referred to in Article 71.","verbatim":false,"ref":"EU AI Act, Article 49 (3)","tags":[],"badges":[{"label":"EU AI Act, Article 49 (3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_49","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-18","rowLabel":"Authorisation request (biometric identification systems)","typeLabel":"Authorisation request (biometric identification systems)","jdata":{"eu":{"label":"Obligations","text":"10.Without prejudice to Directive (EU) 2016/680, in the framework of an investigation for the targeted search of a person suspected or convicted of having committed a criminal offence, the deployer of a high-risk AI system for post-remote biometric identification shall request an authorisation, ex ante, or without undue delay and no later than 48 hours, by a judicial authority or an administrative authority whose decision is binding and subject to judicial review, for the use of that system, except when it is used for the initial identification of a potential suspect based on objective and verifiable facts directly linked to the offence. Each use shall be limited to what is strictly necessary for the investigation of a specific criminal offence.\nIf the authorisation requested pursuant to the first subparagraph is rejected, the use of the post-remote biometric identification system linked to that requested authorisation shall be stopped with immediate effect and the personal data linked to the use of the high-risk AI system for which the authorisation was requested shall be deleted.\nIn no case shall such high-risk AI system for post-remote biometric identification be used for law enforcement purposes in an untargeted way, without any link to a criminal offence, a criminal proceeding, a genuine and present or genuine and foreseeable threat of a criminal offence, or the search for a specific missing person. It shall be ensured that no decision that produces an adverse legal effect on a person may be taken by the law enforcement authorities based solely on the output of such post-remote biometric identification systems.\nThis paragraph is without prejudice to Article 9 of Regulation (EU) 2016/679 and Article 10 of Directive (EU) 2016/680 for the processing of biometric data.\nRegardless of the purpose or deployer, each use of such high-risk AI systems shall be documented in the relevant police file and shall be made available to the relevant market surveillance authority and the national data protection authority upon request, excluding the disclosure of sensitive operational data related to law enforcement. This subparagraph shall be without prejudice to the powers conferred by Directive (EU) 2016/680 on supervisory authorities.\nDeployers shall submit annual reports to the relevant market surveillance and national data protection authorities on their use of post-remote biometric identification systems, excluding the disclosure of sensitive operational data related to law enforcement. The reports may be aggregated to cover more than one deployment.\nMember States may introduce, in accordance with Union law, more restrictive laws on the use of post-remote biometric identification systems.","verbatim":false,"ref":"EU AI Act, Article 26 (10)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (10)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-19","rowLabel":"Cooperation with competent authorities","typeLabel":"Cooperation with competent authorities","jdata":{"eu":{"label":"Obligations","text":"12.Deployers shall cooperate with the relevant competent authorities in any action those authorities take in relation to the high-risk AI system in order to implement this Regulation.","verbatim":false,"ref":"EU AI Act, Article 26 (12)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (12)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(9) on and after February 1, 2026, the attorney general may require that a deployer, or a third party contracted by the deployer, disclose to the attorney general, no later than ninety days after the request and in a form and manner prescribed by the attorney general, the risk management policy implemented pursuant to subsection (2) of this section, the impact assessment completed pursuant to subsection (3) of this section, or the records maintained pursuant to subsection (3)(f) of this section.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703. (9)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703. (9)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"deployer-of-high-risk-ai-systems-20","rowLabel":"Incident reporting","typeLabel":"Incident reporting","jdata":{"eu":{"label":"Obligations","text":"Where deployers have identified a serious incident, they shall also immediately inform first the provider, and then the importer or distributor and the relevant market surveillance authorities of that incident. If the deployer is not able to reach the provider, Article 73 shall apply mutatis mutandis. This obligation shall not cover sensitive operational data of deployers of AI systems which are law enforcement authorities.","verbatim":false,"ref":"EU AI Act, Article 26 (5)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(7) if a deployer deploys a high-risk artificial intelligence system on or after February 1, 2026, and subsequently discovers that the high-risk artificial intelligence system has caused algorithmic discrimination, the deployer, without unreasonable delay, but no later than ninety days after the date of the discovery, shall send to the attorney general, in a form and manner prescribed by the attorney general, a notice disclosing the discovery.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703. (7)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703. (7)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"deployer-of-high-risk-ai-systems-21","rowLabel":"AI literacy","typeLabel":"AI literacy","jdata":{"eu":{"label":"Obligations","text":"Providers and deployers of AI systems shall take measures to ensure, to their best extent, a sufficient level of AI literacy of their staff and other persons dealing with the operation and use of AI systems on their behalf, taking into account their technical knowledge, experience, education and training and the context the AI systems are to be used in, and considering the persons or groups of persons on whom the AI systems are to be used.","verbatim":false,"ref":"EU AI Act, Article 4","tags":[],"badges":[{"label":"EU AI Act, Article 4","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_4","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-22","rowLabel":"Rebuttal","typeLabel":"Rebuttal","jdata":{"eu":null,"co":{"label":"Rebuttal","text":"(3) in any action commenced by the attorney general to enforce this part 17, it is an affirmative defense that the developer, deployer, or other person:\n(a) discovers and cures a violation of this part 17 as a result of:\n(i) feedback that the developer, deployer, or other person encourages deployers or users to provide to the developer, deployer, or other person;\n(ii) adversarial testing or red teaming, as those terms are defined or used by the National Institute of Standards and Technology; or\n(iii) an internal review process; and\n(b) is otherwise in compliance with:\n(i) the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and technology in the United States Department of Commerce and Standard ISO/IEC 42001 of the international organization for standardization;\n(ii) another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or\n(iii) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate and, if designated, shall publicly disseminate.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1706 (3)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1706 (3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Rebuttal","text":"(1) A person is not subject to an enforcement action for violating Section 13-75-103 if the person's generative artificial intelligence clearly and conspicuously discloses:\n(a) at the outset of any interaction with an individual in connection with:\n(i) a consumer transaction; or\n(ii) the provision of regulated services; and\n(b) throughout the interaction that it:\n(i) is generative artificial intelligence;\n(ii) is not human; or\n(iii) is an artificial intelligence assistant.\n(2) In accordance with Title 63G, Chapter 3, Utah Administrative Rulemaking Act, the division in consultation with the office, may make rules specifying forms and methods of disclosure that:\n(a) satisfy the requirements of Subsection (1); or\n(b) do not satisfy the requirements of Subsection (1).","verbatim":false,"ref":"Utah SB226, 13-75-104 (1, 2)","tags":[],"badges":[{"label":"Utah SB226, 13-75-104 (1, 2)","url":null,"sourceId":null}]}}},{"id":"deployer-of-high-risk-ai-systems-23","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"4. Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher (...).\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (4 - 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (4 - 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"Up to $20K per violation; $50K per violation if committed against an elderly person","verbatim":false,"ref":"Colorado Consumer Protection Act","tags":[],"badges":[{"label":"Colorado Consumer Protection Act","url":null,"sourceId":null}]},"tx":{"label":"Penalties","text":"(4) In addition to the division's enforcement powers described by Chapter 2, Division of Consumer Protection:\n(a) the division director may impose an administrative fine for up to $2,500 for each violation of this section;\n(b) the division may bring an action in court to enforce this chapter.","verbatim":false,"ref":"Utah SB226, 13-75-105 (4)","tags":[],"badges":[{"label":"Utah SB226, 13-75-105 (4)","url":null,"sourceId":null}]}}}],"types":["Classification rules for high-risk systems","Scope","Exemptions","General","Transparency","Right to explanation","Human oversight","System monitoring","Impact assessment","Notification","System logs","Information to workers","Data protection","Registration (public authorities)","Authorisation request (biometric identification systems)","Cooperation with competent authorities","Incident reporting","AI literacy","Rebuttal","Penalties"],"analysis_note":{"full_note":"This table compared requirements for deployers of high-risk AI systems in the EU AI Act and in Colorado's SB24-205, as well as those in place for suppliers of high-risk generative AI systems in Utah's SB226.\n\n- Scope of high-risk\nIn the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. \n\nIn Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas.\nIn Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations.\n \n- High-risk areas\nBoth the AI Act and Colorado's SB24-205 share a common understanding of some of the contexts or areas wherein the AI system’s development and deployment is considered high-risk, namely in education, employment and “essential public services and benefits” (AI Act, Annex III (5)) or “essential government services” (Colorado SB24-205). \n\nHowever, important differences exist between the two regulatory texts. While Colorado’s SB24-205 excludes “access and enjoyment of essential private services”, as listed in the AI Act, it lists healthcare-services, housing, insurance, and financial and legal services as part of high-risk contexts. Notable exclusions from Colorado’s SB24-205, when compared with the EU AI Act, include biometrics, critical infrastructure, migration, asylum and border control management.\n\nIn Utah, high-risk relates to services provided in the context of regulated occupations, which require state license or certification. These occupations cover sectors such as healthcare (physicians, nurses, dentists), construction/trades (contractors, plumbers), mortgage providers (banker), etc.\n\n- Transparency as common requirement\nTransparency is the only common obligation for deployers of high-risk AI systems across all three regulations. In the AI Act, this implies informing individuals that AI is being used as well as disclosing AI-generated content as artificially generated or manipulated. In Colorado's SB24-205, transparency requirements are centred on the need to disclose that AI has been deployed in making a consequential decision. In Utah, transparency means disclosing interaction with a generative AI system in services provided in the context of regulated occupations. \n\n- Obligations\nThe AIA and Colorado's SB24-205 require formal impact assessments to be conducted prior to deploying high-risk AI systems. The EU's impact assessment obligations focus on fundamental rights and data protection impacts. Colorado's, in turn, targets the analysis and mitigation of risks related to algorithmic discrimination, having some similarities with the AI Act's conformity assessment requirements for providers of high-risk AI systems. \n\nWhile Colorado's SB24-205, mentions oversight measures as part of the safeguards to be described upon conducting an impact assessment of high-risk AI systems, the AI Act is more explicit, having a dedicated article requiring deployers to put in place natural persons overseing high-risk AI systems.\n\nAI literacy and deployers' registration are unique obligations of the AI Act.\n\n- Right to explanation and appeal\nBoth the AI Act and Colorado's SB24-205 put in place obligations for deployers to explain the role of the AI system in the decision-making process in case of adverse decisions. Colorado's SB24-205 goes one step further in requiring deployers to provide consumers with the opportunity to appeal the decision and allow for human review. \n\n- Exemptions and compliance grace period\nIn Colorado, deployers of high-risk AI systems who employ less than 50 full-time equivalent employees, are exempt from the obligations stated in SB24-205. Moreover, compliance with NIST Risk Management Framework exempts providers from liability. If a deployer commits a violation of the bill, it has the opportunity to cure it.","subtopics":{"scope of high-risk":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas. In Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations.","high-risk areas":"Both the AI Act and Colorado's SB24-205 share a common understanding of some of the contexts or areas wherein the AI system’s development and deployment is considered high-risk, namely in education, employment and “essential public services and benefits” (AI Act, Annex III (5)) or “essential government services” (Colorado SB24-205). However, important differences exist between the two regulatory texts. While Colorado’s SB24-205 excludes “access and enjoyment of essential private services”, as listed in the AI Act, it lists healthcare-services, housing, insurance, and financial and legal services as part of high-risk contexts. Notable exclusions from Colorado’s SB24-205, when compared with the EU AI Act, include biometrics, critical infrastructure, migration, asylum and border control management. In Utah, high-risk relates to services provided in the context of regulated occupations, which require state license or certification. These occupations cover sectors such as healthcare (physicians, nurses, dentists), construction/trades (contractors, plumbers), mortgage providers (banker), etc.","transparency as common requirement":"Transparency is the only common obligation for deployers of high-risk AI systems across all three regulations. In the AI Act, this implies informing individuals that AI is being used as well as disclosing AI-generated content as artificially generated or manipulated. In Colorado's SB24-205, transparency requirements are centred on the need to disclose that AI has been deployed in making a consequential decision. In Utah, transparency means disclosing interaction with a generative AI system in services provided in the context of regulated occupations.","obligations":"The AIA and Colorado's SB24-205 require formal impact assessments to be conducted prior to deploying high-risk AI systems. The EU's impact assessment obligations focus on fundamental rights and data protection impacts. Colorado's, in turn, targets the analysis and mitigation of risks related to algorithmic discrimination, having some similarities with the AI Act's conformity assessment requirements for providers of high-risk AI systems. While Colorado's SB24-205, mentions oversight measures as part of the safeguards to be described upon conducting an impact assessment of high-risk AI systems, the AI Act is more explicit, having a dedicated article requiring deployers to put in place natural persons overseing high-risk AI systems. AI literacy and deployers' registration are unique obligations of the AI Act.","right to explanation and appeal":"Both the AI Act and Colorado's SB24-205 put in place obligations for deployers to explain the role of the AI system in the decision-making process in case of adverse decisions. Colorado's SB24-205 goes one step further in requiring deployers to provide consumers with the opportunity to appeal the decision and allow for human review.","exemptions and compliance grace period":"In Colorado, deployers of high-risk AI systems who employ less than 50 full-time equivalent employees, are exempt from the obligations stated in SB24-205. Moreover, compliance with NIST Risk Management Framework exempts providers from liability. If a deployer commits a violation of the bill, it has the opportunity to cure it."}}},{"id":"deployer-of-general-purpose-ai-systems","name":"Deployer of general-purpose AI systems","entries":[{"id":"deployer-of-general-purpose-ai-systems-0","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"(4) ‘deployer’ means a natural or legal person, public authority, agency or other body using an AI system under its authority except where the AI system is used in the course of a personal non-professional activity","verbatim":false,"ref":"EU AI Act, Article 3 (4)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"\"Supplier\" means a seller, lessor, assignor, offeror, broker, or other person who regularly solicits, engages in, or enforces consumer transactions, whether or not the person deals directly with the consumer.","verbatim":true,"ref":"Utah Code","tags":[],"badges":[{"label":"Utah Code","url":null,"sourceId":null}]},"tx":null},"note_tooltip":"The AI Act targets GPAI systems, which are defined based on their generality and versatility. Utah's SB226 targets specifically generative AI systems, which can be considered one category of GPAI."},{"id":"deployer-of-general-purpose-ai-systems-1","rowLabel":"System","typeLabel":"System","jdata":{"eu":{"label":"Scope","text":"(66) ‘general-purpose AI system’ means an AI system which is based on a general-purpose AI model and which has the capability to serve a variety of purposes, both for direct use as well as for integration in other AI systems","verbatim":false,"ref":"EU AI Act, Article 3 (66)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (66)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(4) \"Generative artificial intelligence\" means an artificial intelligence technology system that:\n(a) is trained on data;\n(b) is designed to simulate human conversation with a consumer through one or more oF the following:\n(i) text;\n(ii) audio; or\n(iii) visual communication; and\n(c) generates non-scripted outputs similar to outputs created by a human, with limited or no human oversight.","verbatim":false,"ref":"Utah SB226, 13-75-101. (4)","tags":[],"badges":[{"label":"Utah SB226, 13-75-101. (4)","url":null,"sourceId":null}]},"tx":null}},{"id":"deployer-of-general-purpose-ai-systems-2","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"4.Deployers of an AI system that generates or manipulates image, audio or video content constituting a deep fake, shall disclose that the content has been artificially generated or manipulated. This obligation shall not apply where the use is authorised by law to detect, prevent, investigate or prosecute criminal offence. Where the content forms part of an evidently artistic, creative, satirical, fictional or analogous work or programme, the transparency obligations set out in this paragraph are limited to disclosure of the existence of such generated or manipulated content in an appropriate manner that does not hamper the display or enjoyment of the work.\nDeployers of an AI system that generates or manipulates text which is published with the purpose of informing the public on matters of public interest shall disclose that the text has been artificially generated or manipulated. This obligation shall not apply where the use is authorised by law to detect, prevent, investigate or prosecute criminal offences or where the AI-generated content has undergone a process of human review or editorial control and where a natural or legal person holds editorial responsibility for the publication of the content.","verbatim":false,"ref":"EU AI Act, Article 50","tags":[],"badges":[{"label":"EU AI Act, Article 50","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(1)(a) A supplier that uses generative artificial intelligence to interact with an individual in connection with a consumer transaction shall disclose to the individual that the individual is interacting with generative artificial intelligence and not a human, if the individual asks or otherwise prompts the supplier about whether artificial intelligence is being used.\n(b) The individual's prompt or question under Subsection (1)(a) must be a clear and unambiguous request to determine whether the interaction is with a human or with artificial intelligence.","verbatim":false,"ref":"Utah SB226, 13-75-103 (1)","tags":[],"badges":[{"label":"Utah SB226, 13-75-103 (1)","url":null,"sourceId":null}]},"tx":null},"note_tooltip":"mandatory vs on-demand The AI Act puts in place mandatory disclosure of AI-generated content and, in the case of high-risk contexts, of AI-deployment. Utah, in contrast, mandates disclosure only upon explicit request by the individual to the supplier."},{"id":"deployer-of-general-purpose-ai-systems-3","rowLabel":"AI literacy","typeLabel":"AI literacy","jdata":{"eu":{"label":"Obligations","text":"Providers and deployers of AI systems shall take measures to ensure, to their best extent, a sufficient level of AI literacy of their staff and other persons dealing with the operation and use of AI systems on their behalf, taking into account their technical knowledge, experience, education and training and the context the AI systems are to be used in, and considering the persons or groups of persons on whom the AI systems are to be used.","verbatim":false,"ref":"EU AI Act, Article 4","tags":[],"badges":[{"label":"EU AI Act, Article 4","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_4","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-general-purpose-ai-systems-4","rowLabel":"Exemptions","typeLabel":"Exemptions","jdata":{"eu":null,"co":{"label":"Exemptions","text":"(1) A person is not subject to an enforcement action for violating Section 13-75-103 if the person's generative artificial intelligence clearly and conspicuously discloses:\n(a) at the outset of any interaction with an individual in connection with:\n(i) a consumer transaction; or\n(ii) the provision of regulated services; and\n(b) throughout the interaction that it:\n(i) is generative artificial intelligence;\n(ii) is not human; or\n(iii) is an artificial intelligence assistant.\n(2) In accordance with Title 63G, Chapter 3, Utah Administrative Rulemaking Act, the division in consultation with the office, may make rules specifying forms and methods of disclosure that:\n(a) satisfy the requirements of Subsection (1); or\n(b) do not satisfy the requirements of Subsection (1).","verbatim":false,"ref":"Utah SB226, 13-75-104 (1, 2)","tags":[],"badges":[{"label":"Utah SB226, 13-75-104 (1, 2)","url":null,"sourceId":null}]},"tx":null}},{"id":"deployer-of-general-purpose-ai-systems-5","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"4. Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher (...).\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (4 - 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (4 - 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"(4) In addition to the division's enforcement powers described by Chapter 2, Division of Consumer Protection:\n(a) the division director may impose an administrative fine for up to $2,500 for each violation of this section;\n(b) the division may bring an action in court to enforce this chapter.","verbatim":false,"ref":"Utah SB226, 13-75-105 (4)","tags":[],"badges":[{"label":"Utah SB226, 13-75-105 (4)","url":null,"sourceId":null}]},"tx":null}}],"types":["Scope","System","Transparency","AI literacy","Exemptions","Penalties"],"analysis_note":{"full_note":"This table compared requirements for deployers of general-purpose AI systems in the EU AI Act and supplier of generative AI systems in Utah's SB226.\n\n- Scope\nThe AI Act targets GPAI systems, which are defined based on their generality and versatility. Utah's SB226 targets specifically generative AI systems, which can be considered one category of GPAI.\n\n- Transparency: mandatory vs on-demand\nThe AI Act puts in place mandatory disclosure of AI-generated content and, in the case of high-risk contexts, of AI-deployment. Utah, in contrast, mandates disclosure only upon explicit request by the individual to the supplier.","subtopics":{"scope":"The AI Act targets GPAI systems, which are defined based on their generality and versatility. Utah's SB226 targets specifically generative AI systems, which can be considered one category of GPAI.","transparency":"mandatory vs on-demand The AI Act puts in place mandatory disclosure of AI-generated content and, in the case of high-risk contexts, of AI-deployment. Utah, in contrast, mandates disclosure only upon explicit request by the individual to the supplier."}}}]},{"tabId":"gpai","label":"GPAI / Frontier / Foundation","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"ca","label":"California"},{"id":"co","label":"Colorado"},{"id":"ny","label":"New York"}],"concepts":[{"id":"general-purpose-ai-model","name":"General-purpose AI model / Foundation model","names":{"eu":"General-purpose AI model","ca":"Foundation model","ny":"Foundation model"},"entries":[{"id":"general-purpose-ai-model-0","rowLabel":"GPAI model - definition","typeLabel":"GPAI model - definition","jdata":{"eu":{"label":"GPAI model - definition","text":"general-purpose AI model' means an AI model, including where such an AI model is trained with a large amount of data using self-supervision at scale, that displays significant generality and is capable of competently performing a wide range of distinct tasks regardless of the way the model is placed on the market and that can be integrated into a variety of downstream systems or applications, except AI models that are used for research, development or prototyping activities before they are placed on the market","verbatim":true,"ref":"AIA Article 3(63)","tags":["definition"],"badges":[{"label":"AIA Article 3(63)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - definition","text":"(f)  “Foundation model” means an artificial intelligence model that is all of the following: (1)  Trained on a broad data set. (2)  Designed for generality of output. (3)  Adaptable to a wide range of distinctive tasks.","verbatim":true,"ref":"CA SB 53 §22757.11(f)","tags":["definition"],"badges":[{"label":"CA SB 53 §22757.11(f)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - definition","text":"\"Foundation model\" means an artificial intelligence model that is all of the following: (A) Trained on a broad data set; (B) Designed for generality of output; and (C) Adaptable to a wide range of distinctive tasks.","verbatim":true,"ref":"NY S8828 §1420(6)","tags":["definition"],"badges":[{"label":"NY S8828 §1420(6)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-1","rowLabel":"GPAI model - scope","typeLabel":"GPAI model - scope","jdata":{"eu":{"label":"GPAI model - scope","text":"Applies to providers who place GPAI models on the Union market, including through libraries, APIs, direct download, or physical copy. The obligations apply once the model is placed on the market. Open-source models with publicly available parameters, weights, architecture, and usage information are exempt from transparency-related obligations (Art. 53(1)(a) and (b)), unless they present systemic risks.","verbatim":false,"ref":"AIA Articles 53(2), 54(6)","tags":["scope"],"badges":[{"label":"AIA Articles 53(2), 54(6)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - scope","text":"§22757.11(f): \"Foundation model\" means an artificial intelligence model that is all of the following: (1) Trained on a broad data set. (2) Designed for generality of output. (3) Adaptable to a wide range of distinctive tasks.\n\n§22757.11(h): \"Frontier developer\" means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision (i).\n\n§22757.11(i)(1): \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations.\n\n§22757.11(j): \"Large frontier developer\" means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars ($500,000,000) in the preceding calendar year.\n\n§22757.14(a): On or before January 1, 2027, and annually thereafter, the Department of Technology shall assess recent evidence and developments relevant to the purposes of this chapter and shall make recommendations about whether and how to update any of the following definitions for the purposes of this chapter to ensure that they accurately reflect technological developments, scientific literature, and widely accepted national and international standards: (1) \"Frontier model\" so that it applies to foundation models at the frontier of artificial intelligence development. (2) \"Frontier developer\" so that it applies to developers of frontier models who are themselves at the frontier of artificial intelligence development. (3) \"Large frontier developer\" so that it applies to well-resourced frontier developers.","verbatim":true,"ref":"CA SB 53 §22757.11(f), (h), (i), (j); §22757.14(a)","tags":["scope"],"badges":[{"label":"CA SB 53 §22757.11(f), (h), (i), (j)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"},{"label":"§22757.14(a)","url":null,"sourceId":null}]},"co":null,"ny":{"label":"Foundation model - scope","text":"This article shall only apply to frontier models that are developed, deployed, or operating in whole or in part in New York State. Exceptions apply for accredited colleges and universities engaging in academic research, and the Empire AI Consortium or the Institute.","verbatim":true,"ref":"NY S8828 §1425, §1426","tags":["scope"],"badges":[{"label":"NY S8828 §1425, §1426","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-2","rowLabel":"GPAI model - obligations - technical documentation","typeLabel":"GPAI model - obligations - technical documentation","jdata":{"eu":{"label":"GPAI model - obligations - technical documentation","text":"1. Providers of general-purpose AI models shall: (a) draw up and keep up-to-date the technical documentation of the model, including its training and testing process and the results of its evaluation, which shall contain, at a minimum, the information set out in Annex XI for the purpose of providing it, upon request, to the AI Office and the national competent authorities;","verbatim":true,"ref":"AIA Article 53(1)(a)","tags":["obligations","documentation"],"badges":[{"label":"AIA Article 53(1)(a)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - obligations - safety and security protocol","text":"(a) A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a frontier AI framework that applies to the large frontier developer's frontier models and describes how the large frontier developer approaches all of the following:\n(1) Incorporating national standards, international standards, and industry-consensus best practices into its frontier AI framework.\n(2) Defining and assessing thresholds used by the large frontier developer to identify and assess whether a frontier model has capabilities that could pose a catastrophic risk, which may include multiple-tiered thresholds.\n(3) Applying mitigations to address the potential for catastrophic risks based on the results of assessments undertaken pursuant to paragraph (2).\n(4) Reviewing assessments and adequacy of mitigations as part of the decision to deploy a frontier model or use it extensively internally.\n(5) Using third parties to assess the potential for catastrophic risks and the effectiveness of mitigations of catastrophic risks.\n(6) Revisiting and updating the frontier AI framework, including any criteria that trigger updates and how the large frontier developer determines when its frontier models are substantially modified enough to require disclosures pursuant to subdivision (c).\n(7) Cybersecurity practices to secure unreleased model weights from unauthorized modification or transfer by internal or external parties.\n(8) Identifying and responding to critical safety incidents.\n(9) Instituting internal governance practices to ensure implementation of these processes.\n(10) Assessing and managing catastrophic risk resulting from the internal use of its frontier models, including risks resulting from a frontier model circumventing oversight mechanisms.","verbatim":true,"ref":"CA SB 53 §22757.12(a)","tags":["obligations","framework"],"badges":[{"label":"CA SB 53 §22757.12(a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - obligations - frontier AI framework","text":"A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a frontier AI framework that applies to the large frontier developer's frontier models and describes in detail how the large frontier developer handles all of the following: (A) Incorporating national standards, frameworks, and best practices for managing the risks of frontier models [...]; (B) Defining and assessing thresholds for determining whether a frontier model poses an unreasonable risk of causing or materially enabling catastrophic harm [...]; (C) Applying mitigations to reduce the risk [...]; (D) Reviewing assessments and adequacy of mitigations [...]; (E) Using third parties to evaluate whether a frontier model poses an unreasonable risk [...]; (F) Revisiting and updating the framework [...]; (G) Cybersecurity practices and protections [...]; (H) Identifying and responding to critical safety incidents; (I) Instituting internal governance practices [...]; (J) Assessing and managing catastrophic risk arising from internal use [...].","verbatim":true,"ref":"NY S8828 §1421(1)","tags":["obligations","framework"],"badges":[{"label":"NY S8828 §1421(1)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-3","rowLabel":"GPAI model - obligations - downstream provider information","typeLabel":"GPAI model - obligations - downstream provider information","jdata":{"eu":{"label":"GPAI model - obligations - downstream provider information","text":"1. Providers of general-purpose AI models shall: (b) draw up, keep up-to-date and make available information and documentation to providers of AI systems who intend to\nintegrate the general-purpose AI model into their AI systems. Without prejudice to the need to observe and protect\nintellectual property rights and confidential business information or trade secrets in accordance with Union and\nnational law, the information and documentation shall:\n(i) enable providers of AI systems to have a good understanding of the capabilities and limitations of the\ngeneral-purpose AI model and to comply with their obligations pursuant to this Regulation; and\n(ii) contain, at a minimum, the elements set out in Annex XII;","verbatim":true,"ref":"AIA Article 53(1)(b)","tags":["obligations","documentation","downstream"],"badges":[{"label":"AIA Article 53(1)(b)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - obligations - risk assessment","text":"(b) (1) A large frontier developer shall review and, as appropriate, update its frontier AI framework at least once per year.\n(2) If a large frontier developer makes a material modification to its frontier AI framework, the large frontier developer shall clearly and conspicuously publish the modified frontier AI framework and a justification for that modification within 30 days.","verbatim":true,"ref":"CA SB 53 §22757.12(b)","tags":["obligations","annual review"],"badges":[{"label":"CA SB 53 §22757.12(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - obligations - risk assessment","text":"The frontier AI framework shall describe in detail how the large frontier developer handles all of the following: [...] (B) Defining and assessing thresholds for determining whether a frontier model poses an unreasonable risk of causing or materially enabling catastrophic harm, which may include multiple-tiered thresholds. [...] (E) Using third parties to evaluate whether a frontier model poses an unreasonable risk of causing or materially enabling catastrophic harm and the effectiveness of measures taken to mitigate such risk.","verbatim":true,"ref":"NY S8828 §1421(1)(b), (e)","tags":["obligations","risk assessment"],"badges":[{"label":"NY S8828 §1421(1)(b), (e)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-4","rowLabel":"GPAI model - obligations - copyright compliance","typeLabel":"GPAI model - obligations - copyright compliance","jdata":{"eu":{"label":"GPAI model - obligations - copyright compliance","text":"(c) put in place a policy to comply with Union law on copyright and related rights, and in particular to identify and comply with, including through state-of-the-art technologies, a reservation of rights expressed pursuant to Article 4(3) of Directive (EU) 2019/790;","verbatim":true,"ref":"AIA Article 53(1)(c)","tags":["obligations","copyright"],"badges":[{"label":"AIA Article 53(1)(c)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - obligations - shutdown capability","text":"(c) (1) Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report containing all of the following:\n(A) The internet website of the frontier developer.\n(B) A mechanism that enables a natural person to communicate with the frontier developer.\n(C) The release date of the frontier model.\n(D) The languages supported by the frontier model.\n(E) The modalities of output supported by the frontier model.\n(F) The intended uses of the frontier model.\n(G) Any generally applicable restrictions or conditions on uses of the frontier model.\n(2) Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a large frontier developer shall include in the transparency report required by paragraph (1) summaries of all of the following:\n(A) Assessments of catastrophic risks from the frontier model conducted pursuant to the large frontier developer's frontier AI framework.\n(B) The results of those assessments.\n(C) The extent to which third-party evaluators were involved.\n(D) Other steps taken to fulfill the requirements of the frontier AI framework with respect to the frontier model.","verbatim":true,"ref":"CA SB 53 §22757.12(c)","tags":["obligations","transparency"],"badges":[{"label":"CA SB 53 §22757.12(c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - obligations - cybersecurity","text":"The frontier AI framework shall describe in detail how the large frontier developer handles all of the following: [...] (G) Cybersecurity practices and protections the large frontier developer implements to prevent unauthorized access to, or misuse or unsafe modification of, the frontier model, including its model weights.","verbatim":true,"ref":"NY S8828 §1421(1)(g)","tags":["obligations","cybersecurity"],"badges":[{"label":"NY S8828 §1421(1)(g)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-5","rowLabel":"GPAI model - obligations - training data summary","typeLabel":"GPAI model - obligations - training data summary","jdata":{"eu":{"label":"GPAI model - obligations - training data summary","text":"(d) draw up and make publicly available a sufficiently detailed summary about the content used for training of the general-purpose AI model, according to a template provided by the AI Office.","verbatim":true,"ref":"AIA Article 53(1)(d)","tags":["obligations","transparency","training data"],"badges":[{"label":"AIA Article 53(1)(d)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - obligations - whistleblower protections","text":"(d) A large frontier developer shall transmit to the Office of Emergency Services a summary of any assessment of catastrophic risk resulting from internal use of its frontier models every three months or pursuant to another reasonable schedule specified by the large frontier developer and communicated in writing to the Office of Emergency Services with written updates, as appropriate.","verbatim":true,"ref":"CA SB 53 §22757.12(d)","tags":["obligations","risk reporting"],"badges":[{"label":"CA SB 53 §22757.12(d)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - obligations - transparency report","text":"Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report containing: the frontier developer's website, contact mechanism, a description of the frontier model, the release date, supported languages, modalities of output, intended uses, and any generally applicable restrictions or conditions on uses.","verbatim":true,"ref":"NY S8828 §1421(3)","tags":["obligations","transparency"],"badges":[{"label":"NY S8828 §1421(3)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-6","rowLabel":"GPAI model - obligations - cooperation","typeLabel":"GPAI model - obligations - cooperation","jdata":{"eu":{"label":"GPAI model - obligations - cooperation","text":"3. Providers of general-purpose AI models shall cooperate as necessary with the Commission and the national competent authorities in the exercise of their competences and powers pursuant to this Regulation.","verbatim":true,"ref":"AIA Article 53(3)","tags":["obligations","cooperation"],"badges":[{"label":"AIA Article 53(3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - obligations - incident reporting","text":"(e) (1) (A) A frontier developer shall not make a materially false or misleading statement about catastrophic risk from its frontier models or its management of catastrophic risk.\n(B) A large frontier developer shall not make a materially false or misleading statement about its implementation of, or compliance with, its frontier AI framework.\n(2) This subdivision does not apply to a statement that was made in good faith and was reasonable under the circumstances.","verbatim":true,"ref":"CA SB 53 §22757.12(e)","tags":["obligations","truthful statements"],"badges":[{"label":"CA SB 53 §22757.12(e)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - obligations - incident reporting","text":"A frontier developer shall report any critical safety incident to the Office within 72 hours from a determination that a critical safety incident has occurred or within 72 hours of learning facts sufficient to establish a reasonable belief that one has occurred. If the incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose within 24 hours to an appropriate authority. A large frontier developer shall also transmit quarterly summaries of catastrophic risk assessments from internal use of its frontier models to the Office.","verbatim":true,"ref":"NY S8828 §1422(2), (3)","tags":["obligations","incident reporting"],"badges":[{"label":"NY S8828 §1422(2), (3)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"general-purpose-ai-model-7","rowLabel":"GPAI model - penalties","typeLabel":"GPAI model - penalties","jdata":{"eu":{"label":"GPAI model - penalties","text":"1. The Commission may impose on providers of general-purpose AI models fines not exceeding 3 % of their annual total worldwide turnover in the preceding financial year or EUR 15 000 000, whichever is higher., when the  Commission finds that the provider intentionally or negligently:\n\n(a) infringed the relevant provisions of this Regulation;\n\n(b) failed to comply with a request for a document or for information pursuant to Article 91, or supplied incorrect, incomplete or misleading information;\n\n(c) failed to comply with a measure requested under Article 93;\n\n(d) failed to make available to the Commission access to the general-purpose AI model or general-purpose AI model with\nsystemic risk with a view to conducting an evaluation pursuant to Article 92.\n\nIn fixing the amount of the fine or periodic penalty payment, regard shall be had to the nature, gravity and duration of the\ninfringement, taking due account of the principles of proportionality and appropriateness. The Commission shall also into\naccount commitments made in accordance with Article 93(3) or made in relevant codes of practice in accordance with\nArticle 56.","verbatim":true,"ref":"AIA Article 101(1)","tags":["penalties","fines"],"badges":[{"label":"AIA Article 101(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_101","sourceId":"eu-ai-act"}]},"ca":{"label":"Foundation model - penalties","text":"(a) A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12, fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation.\n(b) A civil penalty described in this section shall be recovered in a civil action brought only by the Attorney General.","verbatim":true,"ref":"CA SB 53 §22757.15","tags":["penalties"],"badges":[{"label":"CA SB 53 §22757.15","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Foundation model - penalties","text":"The Attorney General may bring a civil action to recover a civil penalty not to exceed $1,000,000 for a first violation and not to exceed $3,000,000 per subsequent violation, determined based on the severity of the violation. No private right of action is established. For disclosure violations under §1428, the Office may levy a civil penalty of $1,000 per day the entity fails to file a disclosure or correct false information.","verbatim":true,"ref":"NY S8828 §1427(1)-(2), §1428(5)","tags":["penalties"],"badges":[{"label":"NY S8828 §1427(1)-(2), §1428(5)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["GPAI model - definition","GPAI model - scope","GPAI model - obligations - technical documentation","GPAI model - obligations - downstream provider information","GPAI model - obligations - copyright compliance","GPAI model - obligations - training data summary","GPAI model - obligations - cooperation","GPAI model - penalties"]},{"id":"gpai-model-with-systemic-risk","name":"GPAI model with systemic risk / Frontier model","names":{"eu":"GPAI model with systemic risk","ca":"Frontier model","ny":"Frontier model"},"entries":[{"id":"gpai-model-with-systemic-risk-0","rowLabel":"Systemic risk - definition","typeLabel":"Systemic risk - definition","jdata":{"eu":{"label":"Systemic risk - definition","text":"systemic risk' means a risk that is specific to the high-impact capabilities of general-purpose AI models, having a significant impact on the Union market due to their reach, or due to actual or reasonably foreseeable negative effects on public health, safety, public security, fundamental rights, or the society as a whole, that can be propagated at scale across the value chain","verbatim":true,"ref":"AIA Article 3(65)","tags":["definition"],"badges":[{"label":"AIA Article 3(65)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Frontier model - definition","text":"(i) (1) \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations.\n(2) The quantity of computing power described in paragraph (1) shall include computing for the original training run and for any subsequent fine-tuning, reinforcement learning, or other material modifications the developer applies to a preceding foundation model.","verbatim":true,"ref":"CA SB 53 §22757.11(i)","tags":["definition"],"badges":[{"label":"CA SB 53 §22757.11(i)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Frontier model - definition","text":"(A) \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations. (B) The quantity of computing power described in paragraph (A) of this subdivision shall include computing for the original training run and for any subsequent fine-tuning, reinforcement learning, or other material modifications the developer applies to a preceding foundation model.","verbatim":true,"ref":"NY S8828 §1420(9)","tags":["definition"],"badges":[{"label":"NY S8828 §1420(9)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"gpai-model-with-systemic-risk-1","rowLabel":"GPAI with systemic risk - classification criteria","typeLabel":"GPAI with systemic risk - classification criteria","jdata":{"eu":{"label":"GPAI with systemic risk - classification criteria","text":"1. A general-purpose AI model shall be classified as a general-purpose AI model with systemic risk if it meets any of the following conditions:\n\n(a) it has high impact capabilities evaluated on the basis of appropriate technical tools and methodologies, including indicators and benchmarks;\n\n(b) based on a decision of the Commission, ex officio or following a qualified alert from the scientific panel, it has capabilities or an impact equivalent to those set out in point (a) having regard to the criteria set out in Annex XIII.\n\n2. A general-purpose AI model shall be presumed to have high impact capabilities pursuant to paragraph 1, point (a), when the cumulative amount of computation used for its training measured in floating point operations is greater than 10^25.\n\n3. The Commission shall adopt delegated acts in accordance with Article 97 to amend the thresholds listed in paragraphs 1 and 2 of this Article, as well as to supplement benchmarks and indicators in light of evolving technological developments, such as algorithmic improvements or increased hardware efficiency, when necessary, for these thresholds to reflect the state of the art.","verbatim":true,"ref":"AIA Article 51(1), (2)","tags":["classification","systemic risk"],"badges":[{"label":"AIA Article 51(1), (2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_51","sourceId":"eu-ai-act"}]},"ca":{"label":"Frontier model - scope","text":"§22757.11(h): \"Frontier developer\" means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision (i).\n\n§22757.11(i)(1): \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations. (2) The quantity of computing power described in paragraph (1) shall include computing for the original training run and for any subsequent fine-tuning, reinforcement learning, or other material modifications the developer applies to a preceding foundation model.\n\n§22757.11(j): \"Large frontier developer\" means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars ($500,000,000) in the preceding calendar year.\n\n§22757.12(a): A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a frontier AI framework that applies to the large frontier developer's frontier models.\n\n§22757.12(c)(1): Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report.\n\n§22757.12(e)(1)(A): A frontier developer shall not make a materially false or misleading statement about catastrophic risk from its frontier models or its management of catastrophic risk. (B) A large frontier developer shall not make a materially false or misleading statement about its implementation of, or compliance with, its frontier AI framework.\n\n§22757.13(a): The Office of Emergency Services shall establish a mechanism to be used by a frontier developer or a member of the public to report a critical safety incident.","verbatim":true,"ref":"CA SB 53 §22757.11(h), (i), (j); §22757.12; §22757.13","tags":["scope"],"badges":[{"label":"CA SB 53 §22757.11(h), (i), (j)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"},{"label":"§22757.12","url":null,"sourceId":null},{"label":"§22757.13","url":null,"sourceId":null}]},"co":null,"ny":{"label":"Frontier model - scope","text":"§1420(8): \"Frontier developer\" means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision nine of this section.\n\n§1420(9)(A): \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations. (B) The quantity of computing power described in paragraph (A) of this subdivision shall include computing for the original training run and for any subsequent fine-tuning, reinforcement learning, or other material modifications the developer applies to a preceding foundation model.\n\n§1420(10): \"Large frontier developer\" means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars in the preceding calendar year.\n\n§1425: This article shall only apply to frontier models that are developed, deployed, or operating in whole or in part in New York State.\n\n§1426: Nothing in this article shall apply to: 1. Accredited colleges and universities in New York State, to the extent such colleges and universities are engaging in academic research regarding artificial intelligence models; or 2. The Empire AI Consortium or the Institute, as such terms are defined by section three hundred sixty-one of the economic development law.","verbatim":true,"ref":"NY S8828 §1420(8), (10)","tags":["scope"],"badges":[{"label":"NY S8828 §1420(8), (10)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"gpai-model-with-systemic-risk-2","rowLabel":"GPAI with systemic risk - scope","typeLabel":"GPAI with systemic risk - scope","jdata":{"eu":{"label":"GPAI with systemic risk - scope","text":"The classification applies to GPAI models that have high-impact capabilities based on technical evaluation, or that meet the computational threshold (10^25 FLOP), or that are designated by the Commission. The Commission shall maintain a published list of GPAI models with systemic risk. Providers may request reassessment at the earliest six months after designation.\n\nVERBATIM Article 52(4)-(6):\n4. The Commission may designate a general-purpose AI model as presenting systemic risks, ex officio or following\na qualified alert from the scientific panel pursuant to Article 90(1), point (a), on the basis of criteria set out in Annex XIII.\nThe Commission is empowered to adopt delegated acts in accordance with Article 97 in order to amend Annex XIII by\nspecifying and updating the criteria set out in that Annex.\n\n5. Upon a reasoned request of a provider whose model has been designated as a general-purpose AI model with systemic\nrisk pursuant to paragraph 4, the Commission shall take the request into account and may decide to reassess whether the\ngeneral-purpose AI model can still be considered to present systemic risks on the basis of the criteria set out in Annex XIII.\nSuch a request shall contain objective, detailed and new reasons that have arisen since the designation decision. Providers\nmay request reassessment at the earliest six months after the designation decision. Where the Commission, following its\nreassessment, decides to maintain the designation as a general-purpose AI model with systemic risk, providers may request\nreassessment at the earliest six months after that decision.\n\n6. The Commission shall ensure that a list of general-purpose AI models with systemic risk is published and shall keep\nthat list up to date, without prejudice to the need to observe and protect intellectual property rights and confidential\nbusiness information or trade secrets in accordance with Union and national law.","verbatim":false,"ref":"AIA Article 51, Article 52(4)-(6)","tags":["scope","systemic risk"],"badges":[{"label":"AIA Article 51, Article 52(4)-(6)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_51","sourceId":"eu-ai-act"}]},"ca":{"label":"Frontier model - obligations - safety and security protocol","text":"(a) The Office of Emergency Services shall establish a mechanism to be used by a frontier developer or a member of the public to report a critical safety incident that includes all of the following:\n(1) The date of the critical safety incident.\n(2) The reasons the incident qualifies as a critical safety incident.\n(3) A short and plain statement describing the critical safety incident.\n(4) Whether the incident was associated with internal use of a frontier model.\n(c) (1) Subject to paragraph (2), a frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the Office of Emergency Services within 15 days of discovering the critical safety incident.\n(2) If a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within 24 hours to an authority, including any law enforcement agency or public safety agency with jurisdiction, that is appropriate based on the nature of that incident and as required by law.","verbatim":true,"ref":"CA SB 53 §22757.13(a), (c)","tags":["obligations","incident reporting"],"badges":[{"label":"CA SB 53 §22757.13(a), (c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Frontier model - obligations - truthful statements","text":"A frontier developer shall not make a materially false or misleading statement about catastrophic risk from its frontier models or its management of catastrophic risk. A large frontier developer shall not make a materially false or misleading statement about its implementation of, or compliance with, its frontier AI framework. This does not apply to statements made in good faith that were reasonable under the circumstances.","verbatim":true,"ref":"NY S8828 §1421(4)","tags":["obligations","truthful statements"],"badges":[{"label":"NY S8828 §1421(4)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}},"note_tooltip":"the compute threshold The AIA puts in place for obligations for GPAI models with systemic risk starting at 10^25 FLOPs in training compute, whereas California’s SB53 and New York’s S8828, set the bar higher, designating frontier models with catastrophic risks only those starting at 10^26 FLOPs in compute. In the US, there are no significant regulatory requirements for developers of frontier models below the 10^26 FLOPs threshold. In contrast, in the EU, not only is the FLOPs threshold lower – therefore covering more models – as there are still provisions in place for providers of GPAI models below this compute threshold (see ‘providers of GPAI models’)."},{"id":"gpai-model-with-systemic-risk-3","rowLabel":"GPAI with systemic risk - obligations - notification","typeLabel":"GPAI with systemic risk - obligations - notification","jdata":{"eu":{"label":"GPAI with systemic risk - obligations - notification","text":"Where a general-purpose AI model meets the condition referred to in Article 51(1), point (a), the relevant provider shall notify the Commission without delay and in any event within
