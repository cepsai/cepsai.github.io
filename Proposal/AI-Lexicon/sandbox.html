e already been subject to a conformity assessment procedure shall undergo a new conformity assessment procedure in the event of a substantial modification, regardless of whether the modified system is intended to be further distributed or continues to be used by the current deployer. For high-risk AI systems that continue to learn after being placed on the market or put into service, changes to the high-risk AI system and its performance that have been predetermined by the provider at the moment of the initial conformity assessment and are part of the information contained in the technical documentation referred to in point 2(f) of Annex IV, shall not constitute a substantial modification.","verbatim":false,"ref":"EU AI Act, Article 43 (1-4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 43 (1-4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_43","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-16","rowLabel":"Declaration of conformity","typeLabel":"Declaration of conformity","jdata":{"eu":{"label":"Obligations","text":"(g) draw up an EU declaration of conformity in accordance with Article 47;","verbatim":false,"ref":"EU AI Act, Article 16 (g)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (g)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-17","rowLabel":"Declaration of conformity","typeLabel":"Declaration of conformity","jdata":{"eu":{"label":"Obligations","text":"1. The provider shall draw up a written machine readable, physical or electronically signed EU declaration of conformity for each high-risk AI system, and keep it at the disposal of the national competent authorities for 10 years after the high-risk AI system has been placed on the market or put into service. The EU declaration of conformity shall identify the high-risk AI system for which it has been drawn up. A copy of the EU declaration of conformity shall be submitted to the relevant national competent authorities upon request.","verbatim":false,"ref":"EU AI Act, Article 47 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 47 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_47","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-18","rowLabel":"CE marking","typeLabel":"CE marking","jdata":{"eu":{"label":"Obligations","text":"(h) affix the CE marking to the high-risk AI system or, where that is not possible, on its packaging or its accompanying documentation, to indicate conformity with this Regulation, in accordance with Article 48;","verbatim":false,"ref":"EU AI Act, Article 16 (h)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (h)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-19","rowLabel":"CE marking","typeLabel":"CE marking","jdata":{"eu":{"label":"Obligations","text":"1. The CE marking shall be subject to the general principles set out in Article 30 of Regulation (EC) No 765/2008.\n2. For high-risk AI systems provided digitally, a digital CE marking shall be used, only if it can easily be accessed via the interface from which that system is accessed or via an easily accessible machine-readable code or other electronic means.\n3. The CE marking shall be affixed visibly, legibly and indelibly for high-risk AI systems. Where that is not possible or not warranted on account of the nature of the high-risk AI system, it shall be affixed to the packaging or to the accompanying documentation, as appropriate.\n4. Where applicable, the CE marking shall be followed by the identification number of the notified body responsible for the conformity assessment procedures set out in Article 43. The identification number of the notified body shall be affixed by the body itself or, under its instructions, by the provider or by the provider’s authorised representative. The identification number shall also be indicated in any promotional material which mentions that the high-risk AI system fulfils the requirements for CE marking.\n5. Where high-risk AI systems are subject to other Union law which also provides for the affixing of the CE marking, the CE marking shall indicate that the high-risk AI system also fulfil the requirements of that other law.","verbatim":false,"ref":"EU AI Act, Article 48","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 48","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_48","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-20","rowLabel":"Registration","typeLabel":"Registration","jdata":{"eu":{"label":"Obligations","text":"(i) comply with the registration obligations referred to in Article 49(1);","verbatim":false,"ref":"EU AI Act, Article 16 (i)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (i)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null},"note_tooltip":"The AI Act mandates providers to register the AI system and its providers in an EU database, provide a declaration of conformity, as well as affix the CE marking to the high-risk system prior to placing it on the market. Conformity assessment must be completed through internal self-assessment, with the exception of AI systems deployed in the area of biometrics, limited critical infrastructure and AI systems which are safety components of products, which must undergo third-party conformity assessment (AI Act, Article 6, Article 43, Annex III). No such provisions exist in Colorado’s SB24-205, where obligations are limited to a developer’s public website statement summarising its high-risk AI systems."},{"id":"provider-of-high-risk-ai-systems-21","rowLabel":"Registration","typeLabel":"Registration","jdata":{"eu":{"label":"Obligations","text":"1. Before placing on the market or putting into service a high-risk AI system listed in Annex III, with the exception of high-risk AI systems referred to in point 2 of Annex III, the provider or, where applicable, the authorised representative shall register themselves and their system in the EU database referred to in Article 71.","verbatim":false,"ref":"EU AI Act, Article 49 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 49 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_49","sourceId":"eu-ai-act"}]},"co":null,"tx":null},"note_tooltip":"The AI Act mandates providers to register the AI system and its providers in an EU database, provide a declaration of conformity, as well as affix the CE marking to the high-risk system prior to placing it on the market. Conformity assessment must be completed through internal self-assessment, with the exception of AI systems deployed in the area of biometrics, limited critical infrastructure and AI systems which are safety components of products, which must undergo third-party conformity assessment (AI Act, Article 6, Article 43, Annex III). No such provisions exist in Colorado’s SB24-205, where obligations are limited to a developer’s public website statement summarising its high-risk AI systems."},{"id":"provider-of-high-risk-ai-systems-22","rowLabel":"Corrective actions","typeLabel":"Corrective actions","jdata":{"eu":{"label":"Obligations","text":"(j) take the necessary corrective actions and provide information as required in Article 20;","verbatim":false,"ref":"EU AI Act, Article 16 (h)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (h)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-23","rowLabel":"Corrective actions","typeLabel":"Corrective actions","jdata":{"eu":{"label":"Obligations","text":"1. Providers of high-risk AI systems which consider or have reason to consider that a high-risk AI system that they have placed on the market or put into service is not in conformity with this Regulation shall immediately take the necessary corrective actions to bring that system into conformity, to withdraw it, to disable it, or to recall it, as appropriate. They shall inform the distributors of the high-risk AI system concerned and, where applicable, the deployers, the authorised representative and importers accordingly.\n\n2. Where the high-risk AI system presents a risk within the meaning of Article 79(1) and the provider becomes aware of that risk, it shall immediately investigate the causes, in collaboration with the reporting deployer, where applicable, and inform the market surveillance authorities competent for the high-risk AI system concerned and, where applicable, the notified body that issued a certificate for that high-risk AI system in accordance with Article 44, in particular, of the nature of the non-compliance and of any relevant corrective action taken.","verbatim":false,"ref":"EU AI Act, Article 20 (1, 2)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 20 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_20","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-24","rowLabel":"Demonstration of conformity","typeLabel":"Demonstration of conformity","jdata":{"eu":{"label":"Obligations","text":"(k) upon a reasoned request of a national competent authority, demonstrate the conformity of the high-risk AI system with the requirements set out in Section 2;","verbatim":false,"ref":"EU AI Act, Article 16 (h)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (h)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-25","rowLabel":"Accessibility","typeLabel":"Accessibility","jdata":{"eu":{"label":"Obligations","text":"(l) ensure that the high-risk AI system complies with accessibility requirements in accordance with Directives (EU) 2016/2102 and (EU) 2019/882.","verbatim":false,"ref":"EU AI Act, Article 16 (h)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (h)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-26","rowLabel":"Cooperation with competent authorities","typeLabel":"Cooperation with competent authorities","jdata":{"eu":{"label":"Obligations","text":"1. Providers of high-risk AI systems shall, upon a reasoned request by a competent authority, provide that authority all the information and documentation necessary to demonstrate the conformity of the high-risk AI system with the requirements set out in Section 2, in a language which can be easily understood by the authority in one of the official languages of the institutions of the Union as indicated by the Member State concerned.\n2. Upon a reasoned request by a competent authority, providers shall also give the requesting competent authority, as applicable, access to the automatically generated logs of the high-risk AI system referred to in Article 12(1), to the extent such logs are under their control.","verbatim":false,"ref":"EU AI Act, Article 21 (1, 2)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 21 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_21","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-27","rowLabel":"Authorised representative","typeLabel":"Authorised representative","jdata":{"eu":{"label":"Obligations","text":"1. Prior to making their high-risk AI systems available on the Union market, providers established in third countries shall, by written mandate, appoint an authorised representative which is established in the Union.\n2. The provider shall enable its authorised representative to perform the tasks specified in the mandate received from the provider.\n3. The authorised representative shall perform the tasks specified in the mandate received from the provider. It shall provide a copy of the mandate to the market surveillance authorities upon request, in one of the official languages of the institutions of the Union, as indicated by the competent authority. For the purposes of this Regulation, the mandate shall empower the authorised representative to carry out the following tasks:\n(a) verify that the EU declaration of conformity referred to in Article 47 and the technical documentation referred to in Article 11 have been drawn up and that an appropriate conformity assessment procedure has been carried out by the provider;\n(b) keep at the disposal of the competent authorities and national authorities or bodies referred to in Article 74(10), for a period of 10 years after the high-risk AI system has been placed on the market or put into service, the contact details of the provider that appointed the authorised representative, a copy of the EU declaration of conformity referred to in Article 47, the technical documentation and, if applicable, the certificate issued by the notified body;\n(c) provide a competent authority, upon a reasoned request, with all the information and documentation, including that referred to in point (b) of this subparagraph, necessary to demonstrate the conformity of a high-risk AI system with the requirements set out in Section 2, including access to the logs, as referred to in Article 12(1), automatically generated by the high-risk AI system, to the extent such logs are under the control of the provider;\n(d) cooperate with competent authorities, upon a reasoned request, in any action the latter take in relation to the high-risk AI system, in particular to reduce and mitigate the risks posed by the high-risk AI system;\n(e) where applicable, comply with the registration obligations referred to in Article 49(1), or, if the registration is carried out by the provider itself, ensure that the information referred to in point 3 of Section A of Annex VIII is correct. The mandate shall empower the authorised representative to be addressed, in addition to or instead of the provider, by the competent authorities, on all issues related to ensuring compliance with this Regulation.\n4. The authorised representative shall terminate the mandate if it considers or has reason to consider the provider to be acting contrary to its obligations pursuant to this Regulation. In such a case, it shall immediately inform the relevant market surveillance authority, as well as, where applicable, the relevant notified body, about the termination of the mandate and the reasons therefor.","verbatim":false,"ref":"EU AI Act, Article 22 (1 - 4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 22 (1 - 4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_22","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-28","rowLabel":"Communication to downstream providers","typeLabel":"Communication to downstream providers","jdata":{"eu":{"label":"Obligations","text":"2.   High-risk AI systems shall be accompanied by instructions for use in an appropriate digital format or otherwise that include concise, complete, correct and clear information that is relevant, accessible and comprehensible to deployers.\n\n3.   The instructions for use shall contain at least the following information:\n(a)the identity and the contact details of the provider and, where applicable, of its authorised representative;\n(b)the characteristics, capabilities and limitations of performance of the high-risk AI system, including:\n(i)its intended purpose;\n(ii)the level of accuracy, including its metrics, robustness and cybersecurity referred to in Article 15 against which the high-risk AI system has been tested and validated and which can be expected, and any known and foreseeable circumstances that may have an impact on that expected level of accuracy, robustness and cybersecurity;\n(iii)any known or foreseeable circumstance, related to the use of the high-risk AI system in accordance with its intended purpose or under conditions of reasonably foreseeable misuse, which may lead to risks to the health and safety or fundamental rights referred to in Article 9(2);\n(iv)where applicable, the technical capabilities and characteristics of the high-risk AI system to provide information that is relevant to explain its output;\n(v)when appropriate, its performance regarding specific persons or groups of persons on which the system is intended to be used;\n(vi)when appropriate, specifications for the input data, or any other relevant information in terms of the training, validation and testing data sets used, taking into account the intended purpose of the high-risk AI system;\n(vii)where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately;\n(c)the changes to the high-risk AI system and its performance which have been pre-determined by the provider at the moment of the initial conformity assessment, if any;\n(d)the human oversight measures referred to in Article 14, including the technical measures put in place to facilitate the interpretation of the outputs of the high-risk AI systems by the deployers;\n(e)the computational and hardware resources needed, the expected lifetime of the high-risk AI system and any necessary maintenance and care measures, including their frequency, to ensure the proper functioning of that AI system, including as regards software updates;\n(f)where relevant, a description of the mechanisms included within the high-risk AI system that allows deployers to properly collect, store and interpret the logs in accordance with Article 12.","verbatim":false,"ref":"EU AI Act, Article 13 (2, 3)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 13 (2, 3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_13","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(a) a developer that offers, sells, leases, licenses, gives, or otherwise makes available to a deployer or other developer a high-risk artificial intelligence system on or after february 1, 2026, shall make available to the deployer or other developer, to the extent feasible, the documentation and information, through artifacts such as model cards, dataset cards, or other impact assessments, necessary for a deployer, or for a third party contracted by a deployer, to complete an impact assessment pursuant to section 6-1-1703 (3).","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (3)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-29","rowLabel":"Communication to downstream providers","typeLabel":"Communication to downstream providers","jdata":{"eu":{"label":"Obligations","text":"4. The provider of a high-risk AI system and the third party that supplies an AI system, tools, services, components, or processes that are used or integrated in a high-risk AI system shall, by written agreement, specify the necessary information, capabilities, technical access and other assistance based on the generally acknowledged state of the art, in order to enable the provider of the high-risk AI system to fully comply with the obligations set out in this Regulation.","verbatim":false,"ref":"EU AI Act, Article 25 (4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 25 (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_25","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-30","rowLabel":"Post-market monitoring","typeLabel":"Post-market monitoring","jdata":{"eu":{"label":"Obligations","text":"1. Providers shall establish and document a post-market monitoring system in a manner that is proportionate to the nature of the AI technologies and the risks of the high-risk AI system.\n\n2. The post-market monitoring system shall actively and systematically collect, document and analyse relevant data which may be provided by deployers or which may be collected through other sources on the performance of high-risk AI systems throughout their lifetime, and which allow the provider to evaluate the continuous compliance of AI systems with the requirements set out in Chapter III, Section 2. Where relevant, post-market monitoring shall include an analysis of the interaction with other AI systems. This obligation shall not cover sensitive operational data of deployers which are law enforcement authorities.\n\n3. The post-market monitoring system shall be based on a post-market monitoring plan. The post-market monitoring plan shall be part of the technical documentation referred to in Annex IV. The Commission shall adopt an implementing act laying down detailed provisions establishing a template for the post-market monitoring plan and the list of elements to be included in the plan by 2 February 2026. That implementing act shall be adopted in accordance with the examination procedure referred to in Article 98(2).\n\n4. For high-risk AI systems covered by the Union harmonisation legislation listed in Section A of Annex I, where a post-market monitoring system and plan are already established under that legislation, in order to ensure consistency, avoid duplications and minimise additional burdens, providers shall have a choice of integrating, as appropriate, the necessary elements described in paragraphs 1, 2 and 3 using the template referred in paragraph 3 into systems and plans already existing under that legislation, provided that it achieves an equivalent level of protection. The first subparagraph of this paragraph shall also apply to high-risk AI systems referred to in point 5 of Annex III placed on the market or put into service by financial institutions that are subject to requirements under Union financial services law regarding their internal governance, arrangements or processes.","verbatim":false,"ref":"EU AI Act, Article 72 (1 - 4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 72 (1 - 4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_72","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-31","rowLabel":"Incident reporting","typeLabel":"Incident reporting","jdata":{"eu":{"label":"Obligations","text":"1. Providers of high-risk AI systems placed on the Union market shall report any serious incident to the market surveillance authorities of the Member States where that incident occurred.\n2. The report referred to in paragraph 1 shall be made immediately after the provider has established a causal link between the AI system and the serious incident or the reasonable likelihood of such a link, and, in any event, not later than 15 days after the provider or, where applicable, the deployer, becomes aware of the serious incident. The period for the reporting referred to in the first subparagraph shall take account of the severity of the serious incident.\n3. Notwithstanding paragraph 2 of this Article, in the event of a widespread infringement or a serious incident as defined in Article 3, point (49) (b), the report referred to in paragraph 1 of this Article shall be provided immediately, and not later than two days after the provider or, where applicable, the deployer becomes aware of that incident.\n4. Notwithstanding paragraph 2, in the event of the death of a person, the report shall be provided immediately after the provider or the deployer has established, or as soon as it suspects, a causal relationship between the high-risk AI system and the serious incident, but not later than 10 days after the date on which the provider or, where applicable, the deployer becomes aware of the serious incident. [...]","verbatim":false,"ref":"EU AI Act, Article 73 (1 - 4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 73 (1 - 4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_73","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"a developer of a high-risk artificial intelligence system shall disclose to the attorney general, in a form and manner prescribed by the attorney general, and to all known deployers or other developers of the high-risk artificial intelligence system, any known or reasonably foreseeable risks of algorithmic discrimination arising from the intended uses of the high-risk artificial intelligence system without unreasonable delay but no later than ninety days after the date on which:\n(a) the developer discovers through the developer's ongoing testing and analysis that the developer's high-risk artificial intelligence system has been deployed and has caused or is reasonably likely to have caused algorithmic discrimination; or\n(b) the developer receives from a deployer a credible report that the high-risk artificial intelligence system has been deployed and has caused algorithmic discrimination.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (5)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (5)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-32","rowLabel":"Rebuttal","typeLabel":"Rebuttal","jdata":{"eu":{"label":"Rebuttal","text":"4. A provider who considers that an AI system referred to in Annex III is not high-risk shall document its assessment before that system is placed on the market or put into service. Such provider shall be subject to the registration obligation set out in Article 49(2). Upon request of national competent authorities, the provider shall provide the documentation of the assessment.","verbatim":false,"ref":"EU AI Act, Article 6 (4)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 6 (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_6","sourceId":"eu-ai-act"}]},"co":{"label":"Rebuttal","text":"(1) notwithstanding section 6-1-103, the attorney general has exclusive authority to enforce this part 17.\n(2) except as provided in subsection (3) of this section, a violation of the requirements established in this part 17 constitutes an unfair trade practice pursuant to section 6-1-105 (1)(hhhh).\n(3) in any action commenced by the attorney general to enforce this part 17, it is an affirmative defense that the developer, deployer, or other person:\n(a) discovers and cures a violation of this part 17 as a result of:\n(i) feedback that the developer, deployer, or other person encourages deployers or users to provide to the developer, deployer, or other person;\n(ii) adversarial testing or red teaming, as those terms are defined or used by the national institute of standards and technology; or\n(iii) an internal review process; and\n(b) is otherwise in compliance with:\n(i) the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and technology in the United States Department of Commerce and Standard ISO/IEC 42001 of the international organization for standardization;\n(ii) another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or\n(iii) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate and, if designated, shall publicly disseminate.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1706","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1706","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"The AIA allows a provider to argue that their system should not be classified as high-risk in the first place, but once it is classified as such, the compliance rules are rigid (Article 6). While Colorado’s SB24-205 does not have this kind of rebuttal option, it puts in place an opportunity to cure violations. This means that developers can fix their AI systems and avoid penalties. Importantly, should a developer prove that they followed recognised standards like NIST AI RMF or ISO 42001, they can legally rebut the accusation of a violation."},{"id":"provider-of-high-risk-ai-systems-33","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"4. Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher (...).\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (4 - 5)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 99 (4 - 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"Up to $20K per violation; $50K per violation if committed against an elderly person","verbatim":false,"ref":"Colorado Consumer Protection Act","tags":[],"badges":[{"label":"Colorado Consumer Protection Act","url":null,"sourceId":null}]},"tx":null}}],"types":["Classification rules for high-risk systems","Scope","Transparency","General","General information","Quality management system","Documentation","Technical documentation","System logs","Conformity assessment","Declaration of conformity","CE marking","Registration","Corrective actions","Demonstration of conformity","Accessibility","Cooperation with competent authorities","Authorised representative","Communication to downstream providers","Post-market monitoring","Incident reporting","Rebuttal","Penalties"],"analysis_note":{"full_note":"This table compares the AIA's terms and obligations for providers of high-risk AI systems with those put in place for developers of high-risk AI systems in Colorado (SB24-205).\n\n- Scope of high-risk\nIn the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. \nIn Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas.\n \n- High-risk areas\nBoth regulations share a common understanding of some of the contexts or areas wherein the AI system’s development and deployment is considered high-risk, namely in education, employment and “essential public services and benefits” (AI Act, Annex III (5)) or “essential government services” (Colorado SB24-205). \nHowever, important differences exist between the two regulatory texts. While Colorado’s SB24-205 excludes “access and enjoyment of essential private services”, as listed in the AI Act, it lists healthcare-services, housing, insurance, and financial and legal services as part of high-risk contexts. Notable exclusions from Colorado’s SB24-205, when compared with the EU AI Act, include biometrics, critical infrastructure, migration, asylum and border control management.\n\n- Substantial modification\nIn both regulations, providers or developers of high-risk AI systems include those who ‘substantially modify’ (AI Act) or ‘intentionally and substantially modify’ a high-risk AI system. Note the layer of intentionality in Colorado’s SB24-205.\n\n- Obligations\nWhere the AIA puts in a place a more comprehensive and granular set of obligations and documentation, Colorado’s SB24-205 primarily addresses transparency and prevention of algorithmic discrimination. \nBoth regulations prioritise risk management but, while the AIA requires putting in place a quality management system (Article 16) and a post-market monitoring system (Article 72), Colorado’s SB24-205 obligations for developers are centred on public disclosure, since core risk management requirements fall under the remit of deployers who “shall implement a risk management policy and program” (6-1-1703). \nThis means that the AIA more promptly addresses the entire lifecycle of the AI system and places an emphasis on the systematic reviewing and updating of the quality management system, including putting an accountability framework in place and strategies for regulatory compliance, a risk management system for identifying and mitigating risks, having an heavy focus of technical documentation. Colorado’s SB24-205 is primarily focused on disclosure of information, requiring developers to state the types of AI systems developed and how risks of algorithmic discrimination are managed. \n\n- Registration\nThe AI Act mandates providers to register the AI system and its providers in an EU database, provide a declaration of conformity, as well as affix the CE marking to the high-risk system prior to placing it on the market. Conformity assessment must be completed through internal self-assessment, with the exception of AI systems deployed in the area of biometrics, limited critical infrastructure and AI systems which are safety components of products, which must undergo third-party conformity assessment (AI Act, Article 6, Article 43, Annex III). \nNo such provisions exist in Colorado’s SB24-205, where obligations are limited to a developer’s public website statement summarising its high-risk AI systems.\n\n- Rebuttal and standards\nThe AIA allows a provider to argue that their system should not be classified as high-risk in the first place, but once it is classified as such, the compliance rules are rigid (Article 6).\nWhile Colorado’s SB24-205 does not have this kind of rebuttal option, it puts in place an opportunity to cure violations. This means that developers can fix their AI systems and avoid penalties. Importantly, should a developer prove that they followed recognised standards like NIST AI RMF or ISO 42001, they can legally rebut the accusation of a violation.","subtopics":{"scope of high-risk":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas.","high-risk areas":"Both regulations share a common understanding of some of the contexts or areas wherein the AI system’s development and deployment is considered high-risk, namely in education, employment and “essential public services and benefits” (AI Act, Annex III (5)) or “essential government services” (Colorado SB24-205). However, important differences exist between the two regulatory texts. While Colorado’s SB24-205 excludes “access and enjoyment of essential private services”, as listed in the AI Act, it lists healthcare-services, housing, insurance, and financial and legal services as part of high-risk contexts. Notable exclusions from Colorado’s SB24-205, when compared with the EU AI Act, include biometrics, critical infrastructure, migration, asylum and border control management.","substantial modification":"In both regulations, providers or developers of high-risk AI systems include those who ‘substantially modify’ (AI Act) or ‘intentionally and substantially modify’ a high-risk AI system. Note the layer of intentionality in Colorado’s SB24-205.","obligations":"Where the AIA puts in a place a more comprehensive and granular set of obligations and documentation, Colorado’s SB24-205 primarily addresses transparency and prevention of algorithmic discrimination. Both regulations prioritise risk management but, while the AIA requires putting in place a quality management system (Article 16) and a post-market monitoring system (Article 72), Colorado’s SB24-205 obligations for developers are centred on public disclosure, since core risk management requirements fall under the remit of deployers who “shall implement a risk management policy and program” (6-1-1703). This means that the AIA more promptly addresses the entire lifecycle of the AI system and places an emphasis on the systematic reviewing and updating of the quality management system, including putting an accountability framework in place and strategies for regulatory compliance, a risk management system for identifying and mitigating risks, having an heavy focus of technical documentation. Colorado’s SB24-205 is primarily focused on disclosure of information, requiring developers to state the types of AI systems developed and how risks of algorithmic discrimination are managed.","registration":"The AI Act mandates providers to register the AI system and its providers in an EU database, provide a declaration of conformity, as well as affix the CE marking to the high-risk system prior to placing it on the market. Conformity assessment must be completed through internal self-assessment, with the exception of AI systems deployed in the area of biometrics, limited critical infrastructure and AI systems which are safety components of products, which must undergo third-party conformity assessment (AI Act, Article 6, Article 43, Annex III). No such provisions exist in Colorado’s SB24-205, where obligations are limited to a developer’s public website statement summarising its high-risk AI systems.","rebuttal and standards":"The AIA allows a provider to argue that their system should not be classified as high-risk in the first place, but once it is classified as such, the compliance rules are rigid (Article 6). While Colorado’s SB24-205 does not have this kind of rebuttal option, it puts in place an opportunity to cure violations. This means that developers can fix their AI systems and avoid penalties. Importantly, should a developer prove that they followed recognised standards like NIST AI RMF or ISO 42001, they can legally rebut the accusation of a violation."}}},{"id":"provider-of-general-purpose-ai-models","name":"Provider of general-purpose AI models","entries":[{"id":"provider-of-general-purpose-ai-models-0","rowLabel":"Provider","typeLabel":"Provider","jdata":{"eu":{"label":"Scope","text":"(3) \"provider\" means a natural or legal person, public authority, agency or other body that develops an AI system or a general-purpose AI model or that has an AI system or a general-purpose AI model developed and places it on the market or puts the AI system into service under its own name or trademark, whether for payment or free of charge.","verbatim":false,"ref":"EU AI Act, Article 3 (3)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"“Covered provider” means a person that creates, codes, or otherwise produces a generative artificial intelligence system that has over 1,000,000 monthly visitors or users and is publicly accessible within the geographic boundaries of the state","verbatim":true,"ref":"California SB942, 22757.1. (b)","tags":[],"badges":[{"label":"California SB942, 22757.1. (b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"tx":{"label":"Scope","text":"“Developer” means a person, partnership, state or local government agency, or corporation that designs, codes, produces, or substantially modifies an artificial intelligence system or service for use by members of the public.","verbatim":true,"ref":"California AB2013, 3110. (b)","tags":["Generative artificial intelligence","substantial modification (CA)"],"badges":[{"label":"California AB2013, 3110. (b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB2013","sourceId":"ca-ab2013"}]}}},{"id":"provider-of-general-purpose-ai-models-1","rowLabel":"Model","typeLabel":"Model","jdata":{"eu":{"label":"Scope","text":"(63) ‘general-purpose AI model’ means an AI model, including where such an AI model is trained with a large amount of data using self-supervision at scale, that displays significant generality and is capable of competently performing a wide range of distinct tasks regardless of the way the model is placed on the market and that can be integrated into a variety of downstream systems or applications, except AI models that are used for research, development or prototyping activities before they are placed on the market;","verbatim":false,"ref":"EU AI Act, Article 3 (63)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (63)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"“Generative artificial intelligence system” or “GenAI system” means an artificial intelligence that can generate derived synthetic content, including text, images, video, and audio, that emulates the structure and characteristics of the system’s training data.","verbatim":true,"ref":"California SB942, 22757.1. (c)","tags":[],"badges":[{"label":"California SB942, 22757.1. (c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"tx":{"label":"Scope","text":"“Generative artificial intelligence” means artificial intelligence that can generate derived synthetic content, such as text, images, video, and audio, that emulates the structure and characteristics of the artificial intelligence’s training data.","verbatim":true,"ref":"California AB2013, 3110. (c)","tags":[],"badges":[{"label":"California AB2013, 3110. (c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB2013","sourceId":"ca-ab2013"}]}}},{"id":"provider-of-general-purpose-ai-models-2","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"1. Providers shall ensure that AI systems intended to interact directly with natural persons are designed and developed in such a way that the natural persons concerned are informed that they are interacting with an AI system, unless this is obvious from the point of view of a natural person who is reasonably well-informed, observant and circumspect, taking into account the circumstances and the context of use. \n\n2. Providers of AI systems, including general-purpose AI systems, generating synthetic audio, image, video or text content, shall ensure that the outputs of the AI system are marked in a machine-readable format and detectable as artificially generated or manipulated. Providers shall ensure their technical solutions are effective, interoperable, robust and reliable as far as this is technically feasible, taking into account the specificities and limitations of various types of content, the costs of implementation and the generally acknowledged state of the art, as may be reflected in relevant technical standards.","verbatim":false,"ref":"EU AI Act, Article 50 (1, 2)","tags":[],"badges":[{"label":"EU AI Act, Article 50 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(a) A covered provider shall offer the user the option to include a manifest disclosure in image, video, or audio content, or content that is any combination thereof, created or altered by the covered provider’s GenAI system that meets all of the following criteria:\n(1) The disclosure identifies content as AI-generated content.\n(2) The disclosure is clear, conspicuous, appropriate for the medium of the content, and understandable to a reasonable person.\n(3) The disclosure is permanent or extraordinarily difficult to remove, to the extent it is technically feasible.\n(b) A covered provider shall include a latent disclosure in AI-generated image, video, or audio content, or content that is any combination thereof, created by the covered provider’s GenAI system that meets all of the following criteria:\n[...]\n(c) (1) If a covered provider licenses its GenAI system to a third party, the covered provider shall require by contract that the licensee maintain the system’s capability to include a disclosure required by subdivision (b) in content the system creates or alters.\n(2) If a covered provider knows that a third-party licensee modified a licensed GenAI system such that it is no longer capable of including a disclosure required by subdivision (b) in content the system creates or alters, the covered provider shall revoke the license within 96 hours of discovering the licensee’s action.","verbatim":false,"ref":"California SB942, 22757.3. (a)","tags":[],"badges":[{"label":"California SB942, 22757.3. (a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"tx":null}},{"id":"provider-of-general-purpose-ai-models-3","rowLabel":"General description","typeLabel":"General description","jdata":{"eu":{"label":"Obligations","text":"1. Providers of general-purpose AI models shall:\n(a) draw up and keep up-to-date the technical documentation of the model, including its training and testing process and the results of its evaluation, which shall contain, at a minimum, the information set out in Annex XI for the purpose of providing it, upon request, to the AI Office and the national competent authorities;\n(b) draw up, keep up-to-date and make available information and documentation to providers of AI systems who intend to integrate the general-purpose AI model into their AI systems. Without prejudice to the need to observe and protect intellectual property rights and confidential business information or trade secrets in accordance with Union and national law, the information and documentation shall:\n(i) enable providers of AI systems to have a good understanding of the capabilities and limitations of the general-purpose AI model and to comply with their obligations pursuant to this Regulation; and\n(ii) contain, at a minimum, the elements set out in Annex XII;\n(c) put in place a policy to comply with Union law on copyright and related rights, and in particular to identify and comply with, including through state-of-the-art technologies, a reservation of rights expressed pursuant to Article 4(3) of Directive (EU) 2019/790;\n(d) draw up and make publicly available a sufficiently detailed summary about the content used for training of the general-purpose AI model, according to a template provided by the AI Office.","verbatim":false,"ref":"EU AI Act, Article 53 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 53 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"co":null,"tx":{"label":"Obligations","text":"On or before January 1, 2026, and before each time thereafter that a generative artificial intelligence system or service, or a substantial modification to a generative artificial intelligence system or service, (...) is made publicly available (...) the developer of the system or service shall post on the developer’s internet website documentation regarding the data used by the developer to train the generative artificial intelligence system or service, including, but not be limited to, all of the following:\n(a) A high-level summary of the datasets used in the development of the generative artificial intelligence system or service, including, but not limited to:\n(1) The sources or owners of the datasets.\n(2) A description of how the datasets further the intended purpose of the artificial intelligence system or service.\n(3) The number of data points included in the datasets, which may be in general ranges, and with estimated figures for dynamic datasets.\n(4) A description of the types of data points within the datasets. For purposes of this paragraph, the following definitions apply:\n(A) As applied to datasets that include labels, “types of data points” means the types of labels used.\n(B) As applied to datasets without labeling, “types of data points” refers to the general characteristics.\n(5) Whether the datasets include any data protected by copyright, trademark, or patent, or whether the datasets are entirely in the public domain.\n(6) Whether the datasets were purchased or licensed by the developer.\n(7) Whether the datasets include personal information, as defined in subdivision (v) of Section 1798.140.\n(8) Whether the datasets include aggregate consumer information, as defined in subdivision (b) of Section 1798.140.\n(9) Whether there was any cleaning, processing, or other modification to the datasets by the developer, including the intended purpose of those efforts in relation to the artificial intelligence system or service.\n(10) The time period during which the data in the datasets were collected, including a notice if the data collection is ongoing.\n(11) The dates the datasets were first used during the development of the artificial intelligence system or service.\n(12) Whether the generative artificial intelligence system or service used or continuously uses synthetic data generation in its development. A developer may include a description of the functional need or desired purpose of the synthetic data in relation to the intended purpose of the system or service.","verbatim":false,"ref":"California AB2013, 3111.","tags":["Generative artificial intelligence"],"badges":[{"label":"California AB2013, 3111.","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB2013","sourceId":"ca-ab2013"}]}}},{"id":"provider-of-general-purpose-ai-models-4","rowLabel":"Exemptions","typeLabel":"Exemptions","jdata":{"eu":{"label":"Obligations","text":"2. The obligations set out in paragraph 1, points (a) and (b), shall not apply to providers of AI models that are released under a free and open-source licence that allows for the access, usage, modification, and distribution of the model, and whose parameters, including the weights, the information on the model architecture, and the information on model usage, are made publicly available. This exception shall not apply to general-purpose AI models with systemic risks.","verbatim":false,"ref":"EU AI Act, Article 53 (2)","tags":[],"badges":[{"label":"EU AI Act, Article 53 (2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-5","rowLabel":"General information","typeLabel":"General information","jdata":{"eu":{"label":"Obligations","text":"[Relates to requirement Article 53(1), Point (a) - Technical documentation for providers of GPAI models]\n\n1. A general description of the general-purpose AI model including:\n(a) the tasks that the model is intended to perform and the type and nature of AI systems in which it can be integrated;\n(b) the acceptable use policies applicable;\n(c) the date of release and methods of distribution;\n(d) the architecture and number of parameters;\n(e) the modality (e.g. text, image) and format of inputs and outputs;\n(f) the licence.","verbatim":false,"ref":"EU AI Act, Annex XI","tags":[],"badges":[{"label":"EU AI Act, Annex XI","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XI","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-6","rowLabel":"Technical documentation","typeLabel":"Technical documentation","jdata":{"eu":{"label":"Obligations","text":"[Relates to requirement Article 53(1), Point (a) - Technical documentation for providers of GPAI models]\n\n2. A detailed description of the elements of the model referred to in point 1, and relevant information of the process for the development, including the following elements:\n(a) the technical means (e.g. instructions of use, infrastructure, tools) required for the general-purpose AI model to be integrated in AI systems;\n(b) the design specifications of the model and training process, including training methodologies and techniques, the key design choices including the rationale and assumptions made; what the model is designed to optimise for and the relevance of the different parameters, as applicable;\n(c) information on the data used for training, testing and validation, where applicable, including the type and provenance of data and curation methodologies (e.g. cleaning, filtering etc.), the number of data points, their scope and main characteristics; how the data was obtained and selected as well as all other measures to detect the unsuitability of data sources and methods to detect identifiable biases, where applicable;\n(d) the computational resources used to train the model (e.g. number of floating point operations ), training time, and other relevant details related to the training;\n(e) known or estimated energy consumption of the model. With regard to point (e), where the energy consumption of the model is unknown, the energy consumption may be based on information about computational resources used.","verbatim":false,"ref":"EU AI Act, Annex XI","tags":[],"badges":[{"label":"EU AI Act, Annex XI","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XI","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-7","rowLabel":"Documentation","typeLabel":"Documentation","jdata":{"eu":{"label":"Obligations","text":"[Text adapted from guiding document for demonstrating compliance with the obligations provided for in Articles 53 of the AI Act] \n\nSignatories of the Code of Practice for General-Purpose AI models commit to:\n1.Drawing up, updating, and retaining for ten years a standardized \"Model Documentation\" form that contains all information required by the AI Act.\n2. Providing accessible contact information and delivering necessary technical details to both the AI Office and downstream providers to enable regulatory oversight and adequate model integration.\n3. Following established protocols to ensure all documented information is controlled for quality, protected from alteration, and maintained as evidence of legal compliance.","verbatim":false,"ref":"Code of Practice for GPAI - Transparency Chapter","tags":[],"badges":[{"label":"Code of Practice for GPAI - Transparency Chapter","url":null,"sourceId":null}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-8","rowLabel":"Copyright","typeLabel":"Copyright","jdata":{"eu":{"label":"Obligations","text":"[Text adapted from guiding document for demonstrating compliance with the obligations provided for in Articles 53 of the AI Act] \n\nSignatories of the Code of Practice for General-Purpose AI models commit to:\n1. Drawing up, implementing, and maintaining a single comprehensive copyright policy that assigns internal responsibility for ensuring compliance with Union law.\n2. Extracting only lawfully accessible content by respecting technological measures like paywalls and excluding websites recognised by EU authorities as commercial-scale copyright infringers.\n3. Using web-crawlers that identify and follow machine-readable rights reservations, such as robots.txt, and provide transparency regarding their crawling methods.\n4. Using technical safeguards and contractual prohibitions to prevent AI models from generating outputs that infringe on protected training content.\n5. Establishing a designated point of contact and a diligent electronic mechanism for rightsholders to submit and resolve complaints regarding non-compliance.","verbatim":false,"ref":"Code of Practice for GPAI - Copyright Chapter","tags":[],"badges":[{"label":"Code of Practice for GPAI - Copyright Chapter","url":null,"sourceId":null}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-9","rowLabel":"Authorised representative","typeLabel":"Authorised representative","jdata":{"eu":{"label":"Obligations","text":"Prior to placing a general-purpose AI model on the Union market, providers established in third countries shall, by written mandate, appoint an authorised representative which is established in the Union.","verbatim":false,"ref":"EU AI Act, Article 54 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 54 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_54","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-10","rowLabel":"Communication to downstream providers","typeLabel":"Communication to downstream providers","jdata":{"eu":{"label":"Obligations","text":"[Related to requirement Article 53(1), Point (b) - Technical Documentation for Providers of General-Purpose AI Models to Downstream Providers that Integrate the Model into Their AI System]\n\n1. A general description of the general-purpose AI model including:\n(a) the tasks that the model is intended to perform and the type and nature of AI systems into which it can be integrated;\n(b) the acceptable use policies applicable;\n(c) the date of release and methods of distribution;\n(d) how the model interacts, or can be used to interact, with hardware or software that is not part of the model itself, where applicable;\n(e) the versions of relevant software related to the use of the general-purpose AI model, where applicable;\n(f) the architecture and number of parameters;\n(g) the modality (e.g. text, image) and format of inputs and outputs;\n(h) the licence for the model.\n\n2. A description of the elements of the model and of the process for its development, including:\n(a) the technical means (e.g. instructions for use, infrastructure, tools) required for the general-purpose AI model to be integrated into AI systems;\n(b) the modality (e.g. text, image, etc.) and format of the inputs and outputs and their maximum size (e.g. context window length, etc.);\n(c) information on the data used for training, testing and validation, where applicable, including the type and provenance of data and curation methodologies.","verbatim":false,"ref":"EU AI Act, Annex XII","tags":[],"badges":[{"label":"EU AI Act, Annex XII","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XII","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-11","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"4. Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher (...).\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (4 - 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (4 - 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"A covered provider that violates this chapter shall be liable for a civil penalty in the amount of five thousand dollars ($5,000) per violation to be collected in a civil action filed by the Attorney General, a city attorney, or a county counsel.","verbatim":false,"ref":"California SB942, 22757.4. (a)","tags":[],"badges":[{"label":"California SB942, 22757.4. (a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"tx":null}}],"types":["Provider","Model","Transparency","General description","Exemptions","General information","Technical documentation","Documentation","Copyright","Authorised representative","Communication to downstream providers","Penalties"],"analysis_note":{"full_note":"This table compares the AIA's terms and obligations for providers of GPAI models with those put in place for developers and covered providers of generative AI systems in California SB942 and AB2013. \n\nDespite the EU AI Act’s focus on AI models and California’s SB942 and AB2013 focus on AI systems, they can be said to have a overlapping understanding of ‘provider of general-purpose AI models’  (AI Act), ‘covered provider’ (SB942) and ‘developer’ (AB2013), due to the GPAI models addressed in the EU AI Act including generative AI models (AI Act, Recital 99).\n\n1. Scope and thresholds\nThe AIA defines GPAI models based on their generality, whereas California’s regulations apply based functionality – that is, generation of synthetic content – for AB2013, and reach, namely having over 1M monthly users/visitors for SB942. \n\n2. Obligations: from comprehensive governance to transparency\nThe AIA puts in place requirements for a comprehensive governance of the GPAI model, including extensive documentation on the model and training datasets, as well as registration obligations.\nIn contrast, California targets transparency understood as output transparency as AI-generated content for consumers (manifest disclosure) and through latent disclosure (SB 942) and, dataset transparency through developers’ obligation to publish a public statement detailing data provenance, characteristics and copyright. \n\nIt should be noted that while the AIA regulates providers of GPAI models, broadly understood, including those with greater capabilities (GPAI models with systemic risk), California puts in place obligations centred on comprehensive governance for developers of only those frontier systems with significant capabilities.","subtopics":{"scope and thresholds":"The AIA defines GPAI models based on their generality, whereas California’s regulations apply based functionality – that is, generation of synthetic content – for AB2013, and reach, namely having over 1M monthly users/visitors for SB942.","obligations":"from comprehensive governance to transparency The AIA puts in place requirements for a comprehensive governance of the GPAI model, including extensive documentation on the model and training datasets, as well as registration obligations. In contrast, California targets transparency understood as output transparency as AI-generated content for consumers (manifest disclosure) and through latent disclosure (SB 942) and, dataset transparency through developers’ obligation to publish a public statement detailing data provenance, characteristics and copyright. It should be noted that while the AIA regulates providers of GPAI models, broadly understood, including those with greater capabilities (GPAI models with systemic risk), California puts in place obligations centred on comprehensive governance for developers of only those frontier systems with significant capabilities."}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk","name":"Provider of general-purpose AI models with systemic risk","entries":[{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-0","rowLabel":"Provider","typeLabel":"Provider","jdata":{"eu":{"label":"Scope","text":"(3) \"provider\" means a natural or legal person, public authority, agency or other body that develops an AI system or a general-purpose AI model or that has an AI system or a general-purpose AI model developed and places it on the market or puts the AI system into service under its own name or trademark, whether for payment or free of charge.","verbatim":false,"ref":"EU AI Act, Article 3 (3)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(h) “Frontier developer” means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision (i).","verbatim":false,"ref":"California SB53, 22757.11. (h)","tags":["frontier model (CA)"],"badges":[{"label":"California SB53, 22757.11. (h)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Scope","text":"“Frontier developer” means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision nine of this section [model that was trained using a quatity of computer power greater than 10º26 FLOPs]","verbatim":true,"ref":"New York S8828 (pending), § 1420","tags":[],"badges":[{"label":"New York S8828 (pending), § 1420","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-1","rowLabel":"Model","typeLabel":"Model","jdata":{"eu":{"label":"Scope","text":"1.   A general-purpose AI model shall be classified as a general-purpose AI model with systemic risk if it meets any of the following conditions:\n(a)it has high impact capabilities evaluated on the basis of appropriate technical tools and methodologies, including indicators and benchmarks;\n(b)based on a decision of the Commission, ex officio or following a qualified alert from the scientific panel, it has capabilities or an impact equivalent to those set out in point (a) having regard to the criteria set out in Annex XIII.\n\n2.   A general-purpose AI model shall be presumed to have high impact capabilities pursuant to paragraph 1, point (a), when the cumulative amount of computation used for its training measured in floating point operations is greater than 10^25.","verbatim":false,"ref":"EU AI Act, Article 51 (1, 2)","tags":[],"badges":[{"label":"EU AI Act, Article 51 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_51","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(j) “Large frontier developer” means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars ($500,000,000) in the preceding calendar year.","verbatim":false,"ref":"California SB53, 22757.11. (j)","tags":[],"badges":[{"label":"California SB53, 22757.11. (j)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Scope","text":"“Large frontier developer” means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars in the preceding calendar year.","verbatim":true,"ref":"New York S8828 (pending), § 1420","tags":[],"badges":[{"label":"New York S8828 (pending), § 1420","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-2","rowLabel":"Exemptions","typeLabel":"Exemptions","jdata":{"eu":null,"co":null,"tx":{"label":"Exemptions","text":"Nothing in this article shall apply to:\n1. Accredited colleges and universities in New York state, to the extent such colleges and universities are engaging in academic research regarding artificial intelligence models; or\n2. The Empire AI consortium or the institute, as such terms are defined by section three hundred sixty-one of the economic development law.","verbatim":false,"ref":"New York S8828 (pending), § 1426","tags":[],"badges":[{"label":"New York S8828 (pending), § 1426","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-3","rowLabel":"General description","typeLabel":"General description","jdata":{"eu":{"label":"Obligations","text":"1. Providers of general-purpose AI models shall:\n(a) draw up and keep up-to-date the technical documentation of the model, including its training and testing process and the results of its evaluation, which shall contain, at a minimum, the information set out in Annex XI for the purpose of providing it, upon request, to the AI Office and the national competent authorities;\n(b) draw up, keep up-to-date and make available information and documentation to providers of AI systems who intend to integrate the general-purpose AI model into their AI systems. Without prejudice to the need to observe and protect intellectual property rights and confidential business information or trade secrets in accordance with Union and national law, the information and documentation shall:\n(i) enable providers of AI systems to have a good understanding of the capabilities and limitations of the general-purpose AI model and to comply with their obligations pursuant to this Regulation; and\n(ii) contain, at a minimum, the elements set out in Annex XII;\n(c) put in place a policy to comply with Union law on copyright and related rights, and in particular to identify and comply with, including through state-of-the-art technologies, a reservation of rights expressed pursuant to Article 4(3) of Directive (EU) 2019/790;\n(d) draw up and make publicly available a sufficiently detailed summary about the content used for training of the general-purpose AI model, according to a template provided by the AI Office.","verbatim":false,"ref":"EU AI Act, Article 53 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 53 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_53","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-4","rowLabel":"General information","typeLabel":"General information","jdata":{"eu":{"label":"Obligations","text":"[Relates to requirement Article 53(1), Point (a) - Technical documentation for providers of GPAI models]\n\n1. A general description of the general-purpose AI model including:\n(a) the tasks that the model is intended to perform and the type and nature of AI systems in which it can be integrated;\n(b) the acceptable use policies applicable;\n(c) the date of release and methods of distribution;\n(d) the architecture and number of parameters;\n(e) the modality (e.g. text, image) and format of inputs and outputs;\n(f) the licence.","verbatim":false,"ref":"EU AI Act, Annex XI","tags":[],"badges":[{"label":"EU AI Act, Annex XI","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XI","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(1) Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report containing all of the following:\n(A) The internet website of the frontier developer.\n(B) A mechanism that enables a natural person to communicate with the frontier developer.\n(C) The release date of the frontier model.\n(D) The languages supported by the frontier model.\n(E) The modalities of output supported by the frontier model.\n(F) The intended uses of the frontier model.\n(G) Any generally applicable restrictions or conditions on uses of the frontier model.\n(...)\n(4) A frontier developer is encouraged, but not required, to make disclosures described in this subdivision that are consistent with, or superior to, industry best practices.","verbatim":false,"ref":"California SB53, 22757.12. (c )","tags":[],"badges":[{"label":"California SB53, 22757.12. (c )","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Obligations (frontier developer, large frontier developer)","text":"3. (a) before, or concurrently with, deploying a new frontier model or  a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet  website a transparency report containing all of the following: \n(i) the internet website of the frontier developer; \n(ii) a mechanism that enables a natural person to communicate with the frontier developer;\n(iii) the release date of the frontier model; \n(iv) the languages supported by the frontier model; \n(v) the modalities of output supported by the frontier model; \n(vi) the intended uses of the frontier model; and \n(vii) any generally applicable restrictions or conditions on uses of the frontier model.","verbatim":false,"ref":"New York S8828 (pending), § 1421","tags":[],"badges":[{"label":"New York S8828 (pending), § 1421","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-5","rowLabel":"Technical documentation","typeLabel":"Technical documentation","jdata":{"eu":{"label":"Obligations","text":"[Relates to requirement Article 53(1), Point (a) - Technical documentation for providers of GPAI models]\n\n2. A detailed description of the elements of the model referred to in point 1, and relevant information of the process for the development, including the following elements:\n(a) the technical means (e.g. instructions of use, infrastructure, tools) required for the general-purpose AI model to be integrated in AI systems;\n(b) the design specifications of the model and training process, including training methodologies and techniques, the key design choices including the rationale and assumptions made; what the model is designed to optimise for and the relevance of the different parameters, as applicable;\n(c) information on the data used for training, testing and validation, where applicable, including the type and provenance of data and curation methodologies (e.g. cleaning, filtering etc.), the number of data points, their scope and main characteristics; how the data was obtained and selected as well as all other measures to detect the unsuitability of data sources and methods to detect identifiable biases, where applicable;\n(d) the computational resources used to train the model (e.g. number of floating point operations ), training time, and other relevant details related to the training;\n(e) known or estimated energy consumption of the model. With regard to point (e), where the energy consumption of the model is unknown, the energy consumption may be based on information about computational resources used.","verbatim":false,"ref":"EU AI Act, Annex XI","tags":[],"badges":[{"label":"EU AI Act, Annex XI","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XI","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-6","rowLabel":"Documentation keeping","typeLabel":"Documentation keeping","jdata":{"eu":{"label":"Obligations","text":"[Text adapted from guiding document for demonstrating compliance with the obligations provided for in Articles 53 of the AI Act] \n\nSignatories of the Code of Practice for General-Purpose AI models commit to:\n1.Drawing up, updating, and retaining for ten years a standardized \"Model Documentation\" form that contains all information required by the AI Act.\n2. Providing accessible contact information and delivering necessary technical details to both the AI Office and downstream providers to enable regulatory oversight and adequate model integration.\n3. Following established protocols to ensure all documented information is controlled for quality, protected from alteration, and maintained as evidence of legal compliance.","verbatim":false,"ref":"Code of Practice for GPAI - Transparency Chapter","tags":[],"badges":[{"label":"Code of Practice for GPAI - Transparency Chapter","url":null,"sourceId":null}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-7","rowLabel":"Copyright","typeLabel":"Copyright","jdata":{"eu":{"label":"Obligations","text":"[Text adapted from guiding document for demonstrating compliance with the obligations provided for in Articles 53 of the AI Act] \n\nSignatories of the Code of Practice for General-Purpose AI models commit to:\n1. Drawing up, implementing, and maintaining a single comprehensive copyright policy that assigns internal responsibility for ensuring compliance with Union law.\n2. Extracting only lawfully accessible content by respecting technological measures like paywalls and excluding websites recognised by EU authorities as commercial-scale copyright infringers.\n3. Using web-crawlers that identify and follow machine-readable rights reservations, such as robots.txt, and provide transparency regarding their crawling methods.\n4. Using technical safeguards and contractual prohibitions to prevent AI models from generating outputs that infringe on protected training content.\n5. Establishing a designated point of contact and a diligent electronic mechanism for rightsholders to submit and resolve complaints regarding non-compliance.","verbatim":false,"ref":"Code of Practice for GPAI - Copyright Chapter","tags":[],"badges":[{"label":"Code of Practice for GPAI - Copyright Chapter","url":null,"sourceId":null}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-8","rowLabel":"Authorised representative","typeLabel":"Authorised representative","jdata":{"eu":{"label":"Obligations","text":"Prior to placing a general-purpose AI model on the Union market, providers established in third countries shall, by written mandate, appoint an authorised representative which is established in the Union.","verbatim":false,"ref":"EU AI Act, Article 54 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 54 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_54","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-9","rowLabel":"Communication to downstream providers","typeLabel":"Communication to downstream providers","jdata":{"eu":{"label":"Obligations","text":"[Related to requirement Article 53(1), Point (b) - Technical Documentation for Providers of General-Purpose AI Models to Downstream Providers that I
