<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Lexicon — Sandbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --j-eu:#1d4ed8; --j-eu-bg:rgba(29,78,216,.07);
  --j-ca:#b45309; --j-ca-bg:rgba(180,83,9,.07);
  --j-co:#047857; --j-co-bg:rgba(4,120,87,.07);
  --j-ny:#7c3aed; --j-ny-bg:rgba(124,58,237,.07);
  --j-tx:#b91c1c; --j-tx-bg:rgba(185,28,28,.07);
  --j-utah:#0369a1; --j-utah-bg:rgba(3,105,161,.07);
  --border:#e2e8f0; --text:#1a202c; --text-sub:#64748b;
  --bg:#fff; --bg-alt:#f8fafc; --radius:8px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Roboto',sans-serif; color:var(--text); background:var(--bg-alt); font-size:14px; line-height:1.6; }
h1,h2,h3,h4 { font-family:'DM Sans',sans-serif; }

/* ── Navbar ── */
.navbar {
  position:sticky; top:0; z-index:200;
  background:#1a1a2e; color:#fff;
  display:flex; align-items:center; gap:12px;
  padding:0 20px; height:52px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-title { font-size:16px; font-weight:600; }
.navbar-badge { background:rgba(255,255,255,.15); border-radius:4px; padding:2px 8px; font-size:11px; }
.navbar-spacer { flex:1; }
.nav-btn {
  padding:5px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.25);
  background:transparent; color:rgba(255,255,255,.85); cursor:pointer;
  font-size:12px; font-weight:500; transition:all .15s;
}
.nav-btn:hover, .nav-btn.active { background:rgba(255,255,255,.15); color:#fff; border-color:rgba(255,255,255,.4); }

/* ── Controls ── */
.controls {
  position:sticky; top:52px; z-index:190;
  background:#fff; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:8px 20px;
}
.ctrl-label { font-size:12px; color:var(--text-sub); font-weight:500; white-space:nowrap; }
.toggle-group { display:flex; gap:4px; }
.tgl {
  padding:4px 11px; border-radius:20px; border:1.5px solid var(--border);
  background:#fff; cursor:pointer; font-size:12px; font-weight:500;
  color:var(--text-sub); transition:all .15s; white-space:nowrap;
}
.tgl.active { background:#1a1a2e; color:#fff; border-color:#1a1a2e; }
.tgl:hover:not(.active) { border-color:#94a3b8; color:var(--text); }
.ctrl-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.search-wrap { position:relative; margin-left:auto; }
.search-wrap input {
  padding:5px 12px 5px 30px; border:1.5px solid var(--border);
  border-radius:20px; font-size:12px; width:200px; outline:none; transition:border-color .15s;
}
.search-wrap input:focus { border-color:#1d4ed8; }
.search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-sub); font-size:13px; pointer-events:none; }

/* ── Tab bar ── */
.tab-bar {
  position:sticky; top:calc(52px + 41px); z-index:180;
  background:#fff; border-bottom:2px solid var(--border);
  display:flex; padding:0 20px;
}
.tab-btn {
  padding:9px 18px; border:none; background:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  color:var(--text-sub); border-bottom:3px solid transparent;
  margin-bottom:-2px; transition:all .15s;
}
.tab-btn.active { color:#1d4ed8; border-bottom-color:#1d4ed8; }
.tab-btn:hover:not(.active) { color:var(--text); }

/* ── Main ── */
.main { max-width:1400px; margin:0 auto; padding:20px; }

/* ── Concept card ── */
.concept-card {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:16px; box-shadow:var(--shadow); overflow:hidden;
}
.concept-header {
  display:flex; align-items:center; gap:10px;
  padding:12px 18px; background:var(--bg-alt);
  border-bottom:1px solid var(--border); cursor:pointer; user-select:none;
}
.concept-header:hover { background:#eef2f7; }
.concept-name { font-size:15px; font-weight:600; }
.concept-chevron { margin-left:auto; color:var(--text-sub); transition:transform .2s; }
.concept-card.open .concept-chevron { transform:rotate(180deg); }
.concept-body { display:none; padding:18px; }
.concept-card.open .concept-body { display:block; }

/* ── Entry rows ── */
.entry-label {
  font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--text-sub); margin:14px 0 8px; padding-top:10px;
  border-top:1px solid var(--border);
}
.entry-label:first-child { margin-top:0; border-top:none; padding-top:0; }
.jcard-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; }
.jcard {
  border-radius:6px; border:1px solid var(--border); padding:12px;
  background:#fafafa; position:relative;
}
.jcard[data-j="eu"]   { border-left:3px solid var(--j-eu);   background:var(--j-eu-bg); }
.jcard[data-j="ca"]   { border-left:3px solid var(--j-ca);   background:var(--j-ca-bg); }
.jcard[data-j="co"]   { border-left:3px solid var(--j-co);   background:var(--j-co-bg); }
.jcard[data-j="ny"]   { border-left:3px solid var(--j-ny);   background:var(--j-ny-bg); }
.jcard[data-j="tx"]   { border-left:3px solid var(--j-tx);   background:var(--j-tx-bg); }
.jcard[data-j="utah"] { border-left:3px solid var(--j-utah); background:var(--j-utah-bg); }
.jcard-header { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.j-pill {
  font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
  padding:2px 6px; border-radius:10px; color:#fff; flex-shrink:0;
}
.j-pill[data-j="eu"]   { background:var(--j-eu); }
.j-pill[data-j="ca"]   { background:var(--j-ca); }
.j-pill[data-j="co"]   { background:var(--j-co); }
.j-pill[data-j="ny"]   { background:var(--j-ny); }
.j-pill[data-j="tx"]   { background:var(--j-tx); }
.j-pill[data-j="utah"] { background:var(--j-utah); }
.jcard-term-label { font-size:12px; font-weight:600; }
.jcard-text { font-size:13px; color:var(--text); line-height:1.65; }
.jcard-text.verbatim { font-style:italic; }

/* ── Reference badges ── */
.badge-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:9px; }
.art-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; font-weight:500; padding:2px 7px;
  border-radius:4px; border:1px solid var(--border);
  background:#f1f5f9; color:var(--text-sub);
  text-decoration:none; transition:all .15s; white-space:nowrap; cursor:default;
}
.art-badge.linkable {
  color:#1d4ed8; border-color:rgba(29,78,216,.3);
  background:rgba(29,78,216,.05); cursor:pointer;
}
.art-badge.linkable:hover { background:rgba(29,78,216,.12); border-color:#1d4ed8; }

/* ── Term links ── */
.term-link {
  color:#1d4ed8; text-decoration:underline; text-decoration-style:dotted;
  text-underline-offset:2px; cursor:pointer; font-weight:500;
  border-radius:2px; padding:0 1px; transition:background .1s;
}
.term-link:hover { background:rgba(29,78,216,.08); }
.links-off .term-link {
  color:inherit; text-decoration:none; cursor:text; font-weight:inherit; pointer-events:none;
}

/* ── Popup ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.45); backdrop-filter:blur(2px);
  align-items:center; justify-content:center;
}
.overlay.open { display:flex; }
.popup {
  background:#fff; border-radius:12px; width:min(640px,92vw);
  max-height:82vh; overflow:auto; box-shadow:0 24px 64px rgba(0,0,0,.25);
  display:flex; flex-direction:column;
}
.popup-head {
  display:flex; align-items:center; gap:10px;
  padding:14px 18px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:#fff; z-index:1;
}
.popup-title { font-size:15px; font-weight:600; flex:1; }
.popup-close {
  background:none; border:none; cursor:pointer; font-size:18px;
  color:var(--text-sub); padding:4px; border-radius:4px;
}
.popup-close:hover { background:var(--bg-alt); }
.popup-body { padding:18px; }
.psec-title {
  font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--text-sub); margin-bottom:8px;
}
.popup-def {
  background:var(--bg-alt); border-radius:6px; padding:11px 13px;
  font-size:13px; line-height:1.65; margin-bottom:4px;
}
.usage-list { display:flex; flex-direction:column; gap:7px; }
.usage-item {
  border:1px solid var(--border); border-radius:6px; padding:9px 13px;
  font-size:13px; cursor:pointer; transition:background .15s;
}
.usage-item:hover { background:#eff6ff; border-color:#bfdbfe; }
.usage-term { font-weight:600; font-size:12px; color:#1d4ed8; margin-bottom:2px; }
.usage-snippet { color:var(--text-sub); font-size:12px; }

/* ── Law panel (Option 5/6/7) ── */
.law-panel {
  display:none; position:fixed; right:0; top:0; bottom:0;
  width:min(580px,44vw); z-index:400;
  background:#fff; box-shadow:-4px 0 24px rgba(0,0,0,.15);
  flex-direction:column;
}
.law-panel.open { display:flex; }
.lp-head {
  display:flex; align-items:center; gap:8px;
  padding:11px 14px; background:#1a1a2e; color:#fff; flex-shrink:0;
}
.lp-title { font-size:13px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lp-close { background:none; border:none; cursor:pointer; color:rgba(255,255,255,.7); font-size:18px; padding:4px; border-radius:4px; }
.lp-close:hover { color:#fff; background:rgba(255,255,255,.1); }
.lp-tabs { display:flex; gap:3px; padding:8px 12px 0; background:#1a1a2e; flex-shrink:0; }
.lp-tab {
  padding:5px 12px; border-radius:5px 5px 0 0; border:1px solid rgba(255,255,255,.2);
  border-bottom:none; background:rgba(255,255,255,.08); cursor:pointer;
  font-size:12px; font-weight:500; color:rgba(255,255,255,.6); transition:all .15s;
}
.lp-tab.active { background:#fff; color:var(--text); border-color:var(--border); }
.lp-content { flex:1; overflow:hidden; position:relative; background:#fff; }
.lp-iframe { width:100%; height:100%; border:none; display:none; }
.lp-iframe.show { display:block; }
.lp-external { display:none; padding:18px; flex-direction:column; gap:12px; overflow:auto; height:100%; }
.lp-external.show { display:flex; }
.lp-source-header { display:flex; flex-direction:column; gap:4px; }
.lp-source-name { font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600; }
.lp-source-full { font-size:12px; color:var(--text-sub); }
.lp-links { display:flex; flex-direction:column; gap:8px; }
.lp-link {
  display:flex; align-items:center; gap:8px; padding:10px 13px;
  border-radius:7px; border:1.5px solid var(--border);
  text-decoration:none; color:var(--text); font-size:13px;
  transition:all .15s;
}
.lp-link:hover { background:#eff6ff; border-color:#93c5fd; }
.lp-link-icon { font-size:16px; flex-shrink:0; }
.lp-link-label { font-weight:500; flex:1; }
.lp-link-arrow { color:var(--text-sub); font-size:12px; }
.lp-note { font-size:12px; color:var(--text-sub); line-height:1.6; padding:10px; background:var(--bg-alt); border-radius:6px; }
.lp-embed-note { font-size:12px; color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:6px; padding:8px 12px; }

/* ── Sources view (Option 7) ── */
.sources-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.source-card {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow);
}
.source-card-name { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; margin-bottom:2px; }
.source-card-full { font-size:12px; color:var(--text-sub); margin-bottom:12px; }
.source-card-links { display:flex; flex-direction:column; gap:6px; }
.sc-link {
  display:flex; align-items:center; gap:6px; padding:7px 10px;
  border-radius:5px; border:1px solid var(--border);
  text-decoration:none; color:var(--text); font-size:12px; transition:all .15s;
}
.sc-link:hover { background:#eff6ff; border-color:#93c5fd; }
.sc-link span { flex:1; }
.embed-badge {
  font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px;
  background:#d1fae5; color:#065f46;
}
.no-embed-badge {
  font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px;
  background:#fee2e2; color:#991b1b;
}

/* ── Flash highlight ── */
@keyframes hf { 0% { background:#fef08a; } 100% { background:transparent; } }
.highlight-flash { animation:hf 1.6s ease-out; }

/* ── Term choice popup (Both mode) ── */
.term-choice {
  position:absolute; z-index:600;
  background:#fff; border:1px solid var(--border); border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.18); padding:4px;
  display:flex; flex-direction:column; gap:2px; min-width:170px;
}
.term-choice-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; border:none; background:none; cursor:pointer;
  font-size:13px; font-weight:500; color:var(--text); border-radius:6px;
  text-align:left; white-space:nowrap; transition:background .1s;
}
.term-choice-btn:hover { background:#eff6ff; color:#1d4ed8; }
.term-choice-btn .tc-icon { font-size:15px; flex-shrink:0; width:20px; text-align:center; }
.term-choice-btn .tc-label { flex:1; }

/* ── Feature number tooltips ── */
.feat-num {
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%; background:#1d4ed8; color:#fff;
  font-size:10px; font-weight:700; cursor:help; position:relative;
  margin-left:4px; vertical-align:middle; flex-shrink:0;
}
.feat-num:hover::after {
  content:attr(data-tip); position:absolute;
  top:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#1a1a2e; color:#fff; font-size:12px; font-weight:400;
  padding:6px 12px; border-radius:6px; white-space:nowrap;
  z-index:999; pointer-events:none; box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.feat-num:hover::before {
  content:''; position:absolute; top:calc(100% + 4px); left:50%;
  transform:translateX(-50%); border:5px solid transparent;
  border-bottom-color:#1a1a2e; pointer-events:none; z-index:999;
}

/* ── Overview (concepts matrix) ── */
.overview-wrap { max-width:1200px; margin:0 auto; padding:20px; }
.overview-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.overview-sub { font-size:13px; color:var(--text-sub); margin-bottom:20px; }
.matrix-table {
  width:100%; border-collapse:collapse; font-size:13px;
  background:#fff; border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow); border:1px solid var(--border);
}
.matrix-table th {
  padding:10px 12px; font-weight:600; font-size:12px;
  text-transform:uppercase; letter-spacing:.04em;
  background:#f1f5f9; border-bottom:2px solid var(--border);
  text-align:left;
}
.matrix-table th[data-j="eu"]   { color:var(--j-eu); }
.matrix-table th[data-j="ca"]   { color:var(--j-ca); }
.matrix-table th[data-j="co"]   { color:var(--j-co); }
.matrix-table th[data-j="ny"]   { color:var(--j-ny); }
.matrix-table th[data-j="tx"]   { color:var(--j-tx); }
.matrix-table th[data-j="utah"] { color:var(--j-utah); }
.matrix-table td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
.matrix-table tr:last-child td { border-bottom:none; }
.cluster-label {
  font-weight:600; font-size:11px; text-transform:uppercase;
  letter-spacing:.05em; color:var(--text-sub); white-space:nowrap;
}
.matrix-pill {
  display:inline-block; padding:3px 10px; border-radius:14px;
  font-size:12px; font-weight:500; cursor:pointer;
  transition:all .15s; border:1px solid transparent;
}
.matrix-pill:hover { transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.12); }
.matrix-pill[data-j="eu"]   { background:var(--j-eu-bg); color:var(--j-eu); border-color:rgba(29,78,216,.2); }
.matrix-pill[data-j="ca"]   { background:var(--j-ca-bg); color:var(--j-ca); border-color:rgba(180,83,9,.2); }
.matrix-pill[data-j="co"]   { background:var(--j-co-bg); color:var(--j-co); border-color:rgba(4,120,87,.2); }
.matrix-pill[data-j="ny"]   { background:var(--j-ny-bg); color:var(--j-ny); border-color:rgba(124,58,237,.2); }
.matrix-pill[data-j="tx"]   { background:var(--j-tx-bg); color:var(--j-tx); border-color:rgba(185,28,28,.2); }
.matrix-pill[data-j="utah"] { background:var(--j-utah-bg); color:var(--j-utah); border-color:rgba(3,105,161,.2); }
.matrix-pill:hover[data-j="eu"]   { background:rgba(29,78,216,.15); }
.matrix-pill:hover[data-j="ca"]   { background:rgba(180,83,9,.15); }
.matrix-pill:hover[data-j="co"]   { background:rgba(4,120,87,.15); }
.matrix-pill:hover[data-j="ny"]   { background:rgba(124,58,237,.15); }
.matrix-pill:hover[data-j="tx"]   { background:rgba(185,28,28,.15); }
.matrix-pill:hover[data-j="utah"] { background:rgba(3,105,161,.15); }
.matrix-empty { color:#cbd5e1; font-size:12px; }

/* ── Data Map ── */
.dmap-wrap { max-width:1000px; margin:0 auto; padding:20px; }
.dmap-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.dmap-sub { font-size:13px; color:var(--text-sub); margin-bottom:20px; }
.dmap-table {
  width:100%; border-collapse:collapse; font-size:13px;
  background:#fff; border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow); border:1px solid var(--border);
}
.dmap-table th {
  padding:10px 12px; font-weight:600; font-size:12px;
  text-transform:uppercase; letter-spacing:.04em;
  background:#f1f5f9; border-bottom:2px solid var(--border); text-align:left;
}
.dmap-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.dmap-table tr:last-child td { border-bottom:none; }
.dmap-badge {
  display:inline-block; font-size:10px; font-weight:600; padding:2px 7px;
  border-radius:4px;
}
.dmap-badge.active { background:#d1fae5; color:#065f46; }
.dmap-badge.future { background:#e2e8f0; color:#475569; }
.dmap-link { color:#1d4ed8; cursor:pointer; text-decoration:underline; text-decoration-style:dotted; }
.dmap-link:hover { text-decoration-style:solid; }

/* ── Interpretative notes ── */
.analysis-note-section {
  margin-top:18px; padding-top:14px; border-top:2px solid var(--border);
}
.analysis-note-toggle {
  display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  font-size:13px; font-weight:600; color:#1d4ed8; border:none; background:none;
  padding:6px 0; font-family:'DM Sans',sans-serif;
}
.analysis-note-toggle:hover { text-decoration:underline; }
.analysis-note-toggle .chevron { transition:transform .2s; font-size:11px; }
.analysis-note-section.open .chevron { transform:rotate(180deg); }
.analysis-note-body {
  display:none; margin-top:10px; padding:14px 16px;
  background:#fefce8; border:1px solid #fde68a; border-radius:var(--radius);
  font-size:13px; line-height:1.7; color:#713f12; white-space:pre-wrap;
  max-height:500px; overflow-y:auto;
}
.analysis-note-section.open .analysis-note-body { display:block; }

/* ── Entry-level note tooltip ── */
.note-icon {
  display:inline-flex; align-items:center; justify-content:center;
  width:16px; height:16px; border-radius:50%;
  background:#fbbf24; color:#78350f; font-size:9px; font-weight:700;
  cursor:help; position:relative; margin-left:6px; flex-shrink:0;
  vertical-align:middle;
}
.note-icon:hover::after {
  content:attr(data-note);
  position:absolute; top:calc(100% + 6px); left:0;
  background:#78350f; color:#fff; font-size:12px; font-weight:400;
  padding:10px 14px; border-radius:8px; width:360px;
  z-index:999; pointer-events:none; box-shadow:0 4px 12px rgba(0,0,0,.2);
  line-height:1.55; white-space:normal;
}
.note-icon:hover::before {
  content:''; position:absolute; top:calc(100% + 2px); left:6px;
  border:5px solid transparent; border-bottom-color:#78350f;
  pointer-events:none; z-index:999;
}

<script>
const DATA    = [{"tabId":"provider","label":"Provider / Developer","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"co","label":"Colorado"},{"id":"tx","label":"Texas"}],"concepts":[{"id":"provider-developer","name":"Provider / Developer","entries":[{"id":"provider-developer-0","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"(3) \"provider\" means a natural or legal person, public authority, agency or other body that develops an AI system or a general-purpose AI model or that has an AI system or a general-purpose AI model developed and places it on the market or puts the AI system into service under its own name or trademark, whether for payment or free of charge.","verbatim":false,"ref":"EU AI Act, Article 3 (3)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (3)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"\"Developer\" means a person doing business in this state that develops or intentionally and substantially modifies an artificial intelligence system.","verbatim":true,"ref":"Colorado SB24-205, 6-1-1701","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Scope","text":"\"Developer\" means a person who develops an artificial intelligence system that is offered, sold, leased, given, or otherwise provided in this state.","verbatim":true,"ref":"Texas HB149, 552.001. (2)","tags":[],"badges":[{"label":"Texas HB149, 552.001. (2)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}},{"id":"provider-developer-1","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"1. Providers shall ensure that AI systems intended to interact directly with natural persons are designed and developed in such a way that the natural persons concerned are informed that they are interacting with an AI system, unless this is obvious from the point of view of a natural person who is reasonably well-informed, observant and circumspect, taking into account the circumstances and the context of use. \n\n2. Providers of AI systems, including general-purpose AI systems, generating synthetic audio, image, video or text content, shall ensure that the outputs of the AI system are marked in a machine-readable format and detectable as artificially generated or manipulated. Providers shall ensure their technical solutions are effective, interoperable, robust and reliable as far as this is technically feasible, taking into account the specificities and limitations of various types of content, the costs of implementation and the generally acknowledged state of the art, as may be reflected in relevant technical standards.","verbatim":false,"ref":"EU AI Act, Article 50 (1, 2)","tags":["general-purpose AI system","high-risk AI system"],"badges":[{"label":"EU AI Act, Article 50 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"Deployer or other developer that deploys, offers, sells, leases, licenses, gives, or otherwise makes available an artificial intelligence system that is intended to interact with consumers shall ensure the disclosure to each consumer who interacts with the artificial intelligence system that the consumer is interacting with an artificial intelligence system.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1704","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1704","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"The EU AI Act puts in place transparency obligations for all providers of AI systems or GPAI models including the need of making persons aware that they are interacting with the AI system through system design, as well as using machine-readable marking of AI-generated content / outputs. A similar appraoch is adopted in Colorado SB24-205, which requires all developers to disclose interaction with AI system to consumers. Whereas Texas HB 149, does not put in place transparency obligations for developers, it does so at the deployer level, albeit in a more limited manner, where governmental agencies and providers of healthcare services must disclose to the consumer the use of AI systems."},{"id":"provider-developer-2","rowLabel":"AI literacy","typeLabel":"AI literacy","jdata":{"eu":{"label":"Obligations","text":"4. Providers and deployers of AI systems shall take measures to ensure, to their best extent, a sufficient level of AI literacy of their staff and other persons dealing with the operation and use of AI systems on their behalf, taking into account their technical knowledge, experience, education and training and the context the AI systems are to be used in, and considering the persons or groups of persons on whom the AI systems are to be used.","verbatim":false,"ref":"EU AI Act, Article 4","tags":[],"badges":[{"label":"EU AI Act, Article 4","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_4","sourceId":"eu-ai-act"}]},"co":null,"tx":{"label":"Obligations","text":"The attorney general may request from the person reported through the online mechanism, pursuant to a civil investigative demand issued under Subsection (a):\n(1) a high-level description of the purpose, intended use, deployment context, and associated benefits of the artificial intelligence system with which the person is affiliated;\n(2) a description of the type of data used to program or train the artificial intelligence system;\n(3) a high-level description of the categories of data processed as inputs for the artificial intelligence system;\n(4) a high-level description of the outputs produced by the artificial intelligence system;\n(5) any metrics the person uses to evaluate the performance of the artificial intelligence system;\n(6) any known limitations of the artificial intelligence system;","verbatim":false,"ref":"Texas HB149 552.103 (b)","tags":[],"badges":[{"label":"Texas HB149 552.103 (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}},{"id":"provider-developer-3","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":{"label":"Obligations","text":"Additional obligations apply to specific categories of providers, namely to providers of high-risk AI systems and providers of general-purpose AI models.","verbatim":false,"ref":"","tags":["provider of GPAI models","provider of GPAI model with systemic risk","provider of high-risk AI system","general-purpose AI model","high-risk AI system"],"badges":[]},"co":null,"tx":{"label":"Obligations","text":"The attorney general may request from the person reported through the online mechanism, pursuant to a civil investigative demand issued under Subsection (a):\n(...)\n(7) a high-level description of the post-deployment monitoring and user safeguards the person uses for the artificial intelligence system, including, if the person is a deployer, the oversight, use, and learning process established by the person to address issues arising from the system ’s deployment;","verbatim":false,"ref":"Texas HB149 552.103 (b)","tags":[],"badges":[{"label":"Texas HB149 552.103 (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}},"note_tooltip":"Texas’ HB149 requires developers to provide certain documentation, including a description of the purpose, intended use, and deployment context of the AI system, the type of data used to train the system, limitations of the AI system and post-deployment monitoring and user safeguards. These requirements have some similarity with the EU AI Act’s documentation requirements for providers of high-risk systems and GPAI models, such as descriptions on the type of data used to train the system, evaluation of system performance and post-deployment monitoring."},{"id":"provider-developer-4","rowLabel":"Rebuttal","typeLabel":"Rebuttal","jdata":{"eu":null,"co":{"label":"Rebuttal","text":"(1) notwithstanding section 6-1-103, the attorney general has exclusive authority to enforce this part 17.\n(2) except as provided in subsection (3) of this section, a violation of the requirements established in this part 17 constitutes an unfair trade practice pursuant to section 6-1-105 (1)(hhhh).\n(3) in any action commenced by the attorney general to enforce this part 17, it is an affirmative defense that the developer, deployer, or other person:\n(a) discovers and cures a violation of this part 17 as a result of:\n(i) feedback that the developer, deployer, or other person encourages deployers or users to provide to the developer, deployer, or other person;\n(ii) adversarial testing or red teaming, as those terms are defined or used by the national institute of standards and technology; or\n(iii) an internal review process; and\n(b) is otherwise in compliance with:\n(i) the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and technology in the United States Department of Commerce and Standard ISO/IEC 42001 of the international organization for standardization;\n(ii) another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or\n(iii) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate and, if designated, shall publicly disseminate.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1706","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1706","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Rebuttal","text":"(b) The attorney general may not bring an action against the person:\n(1) before the 60th day after the date the attorney general provides the notice under Subsection (a); or\n(2) if, before the 60th day after the date the attorney general provides the notice under Subsection (a), the person:\n(A) cures the identified violation; and\n(B) provides the attorney general with a written statement that the person has:\n(i) cured the alleged violation;\n(ii) provided supporting documentation to show the manner in which the person cured the violation; and\n(iii) made any necessary changes to internal policies to reasonably prevent further violation of this chapter.","verbatim":false,"ref":"Texas HB149 552.104. (b)","tags":[],"badges":[{"label":"Texas HB149 552.104. (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}},{"id":"provider-developer-5","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"3. Non-compliance with the prohibition of the AI practices referred to in Article 5 [prohibited AI practices] shall be subject to administrative fines of up to 35 000 000 EUR or, if the offender is an undertaking, up to 7 % of its total worldwide annual turnover for the preceding financial year, whichever is higher. \n4. Non-compliance with any of the following provisions (...), other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher:\n(a) obligations of providers pursuant to Article 16;\n(…)\n(g) transparency obligations for providers and deployers pursuant to Article 50.\n(...)\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (3, 4, 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (3, 4, 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"Up to $20K per violation; $50K per violation if committed against an elderly person","verbatim":false,"ref":"Colorado Consumer Protection Act","tags":[],"badges":[{"label":"Colorado Consumer Protection Act","url":null,"sourceId":null}]},"tx":{"label":"Penalties","text":"A person who violates this chapter and does not cure the violation under Section 552.104 is liable to this state for a civil penalty in an amount of:\n(1) for each violation the court determines to be curable or a breach of a statement submitted to the attorney general under Section 552.104(b)(2), not less than $10,000 and not more than $12,000;\n(2) for each violation the court determines to be uncurable, not less than $80,000 and not more than $200,000; and\n(3) for a continued violation, not less than $2,000 and not more than $40,000 for each day the violation continues.","verbatim":false,"ref":"Texas HB149 552.105 (a)","tags":[],"badges":[{"label":"Texas HB149 552.105 (a)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}}],"types":["Scope","Transparency","AI literacy","Obligations","Rebuttal","Penalties"],"analysis_note":{"full_note":"This table compares the AIA's terms and obligations for providers of AI systems with those put in place for developers of AI systems in Texas HB 149. \n\nIt should be noted that the AIA puts in place obligations for providers depending on the nature of the AI system / model developed and placed on the market (e.g., high-risk AI systems, GPAI models) and, for this reason, only transparency obligations figure at this level of comparison, which comprises the most general category of provider or developers of AI systems found across the different regulations.\n\n- Regulatory trigger: reactive vs proactive approaches\nThe AIA adopts a proactive, ex-ante regulatory approach, whereby the placing on the market triggers obligations. In contrast, Texas HB 149 focuses on reactive, ex-post enforcement triggered by the Attorney General.\n\n- Transparency requirements\nThe EU AI Act puts in place transparency obligations for all providers of AI systems or GPAI models including the need of making persons aware that they are interacting with the AI system through system design, as well as using machine-readable marking of AI-generated content / outputs. A similar appraoch is adopted in Colorado SB24-205, which requires all developers to disclose interaction with AI system to consumers. Whereas Texas HB 149, does not put in place transparency obligations for developers, it does so at the deployer level, albeit in a more limited manner, where governmental agencies and providers of healthcare services must disclose to the consumer the use of AI systems.\n\n- Obligations\nTexas’ HB149 requires developers to provide certain documentation, including a description of the purpose, intended use, and deployment context of the AI system, the type of data used to train the system, limitations of the AI system and post-deployment monitoring and user safeguards. These requirements have some similarity with the EU AI Act’s documentation requirements for providers of high-risk systems and GPAI models, such as descriptions on the type of data used to train the system, evaluation of system performance and post-deployment monitoring.\n\n- Substantive filter: intention and framework compliance\nIn Texas, liability is largely contingent on proving a developer’s subjective \"intent to discriminate\". Conversely, in the AIA, penalties apply regardless of whether the provider actually meant to cause harm.\nMoreover, in Texas, ‘substantial compliance’ with NIST Risk Management Framework exempts developers from liability.\n\n- Compliance grace period: the right to cure\nTexas provides a 60-day opportunity to cure a violation. Such a rebuttal or cure period is not in place in the AIA.","subtopics":{"regulatory trigger":"reactive vs proactive approaches The AIA adopts a proactive, ex-ante regulatory approach, whereby the placing on the market triggers obligations. In contrast, Texas HB 149 focuses on reactive, ex-post enforcement triggered by the Attorney General.","transparency requirements":"The EU AI Act puts in place transparency obligations for all providers of AI systems or GPAI models including the need of making persons aware that they are interacting with the AI system through system design, as well as using machine-readable marking of AI-generated content / outputs. A similar appraoch is adopted in Colorado SB24-205, which requires all developers to disclose interaction with AI system to consumers. Whereas Texas HB 149, does not put in place transparency obligations for developers, it does so at the deployer level, albeit in a more limited manner, where governmental agencies and providers of healthcare services must disclose to the consumer the use of AI systems.","obligations":"Texas’ HB149 requires developers to provide certain documentation, including a description of the purpose, intended use, and deployment context of the AI system, the type of data used to train the system, limitations of the AI system and post-deployment monitoring and user safeguards. These requirements have some similarity with the EU AI Act’s documentation requirements for providers of high-risk systems and GPAI models, such as descriptions on the type of data used to train the system, evaluation of system performance and post-deployment monitoring.","substantive filter":"intention and framework compliance In Texas, liability is largely contingent on proving a developer’s subjective \"intent to discriminate\". Conversely, in the AIA, penalties apply regardless of whether the provider actually meant to cause harm. Moreover, in Texas, ‘substantial compliance’ with NIST Risk Management Framework exempts developers from liability.","compliance grace period":"the right to cure Texas provides a 60-day opportunity to cure a violation. Such a rebuttal or cure period is not in place in the AIA."}}},{"id":"provider-of-high-risk-ai-systems","name":"Provider of high-risk AI systems","entries":[{"id":"provider-of-high-risk-ai-systems-0","rowLabel":"Classification rules for high-risk systems","typeLabel":"Classification rules for high-risk systems","jdata":{"eu":{"label":"Scope","text":"1.   Irrespective of whether an AI system is placed on the market or put into service independently of the products referred to in points (a) and (b), that AI system shall be considered to be high-risk where both of the following conditions are fulfilled:\n(a)the AI system is intended to be used as a safety component of a product, or the AI system is itself a product, covered by the Union harmonisation legislation listed in Annex I;\n(b)the product whose safety component pursuant to point (a) is the AI system, or the AI system itself as a product, is required to undergo a third-party conformity assessment, with a view to the placing on the market or the putting into service of that product pursuant to the Union harmonisation legislation listed in Annex I.\n\n2.   In addition to the high-risk AI systems referred to in paragraph 1, AI systems referred to in Annex III shall be considered to be high-risk.\n\n3.   By derogation from paragraph 2, an AI system referred to in Annex III shall not be considered to be high-risk where it does not pose a significant risk of harm to the health, safety or fundamental rights of natural persons, including by not materially influencing the outcome of decision making.\n\nThe first subparagraph shall apply where any of the following conditions is fulfilled:\n(a)the AI system is intended to perform a narrow procedural task;\n(b)the AI system is intended to improve the result of a previously completed human activity;\n(c)the AI system is intended to detect decision-making patterns or deviations from prior decision-making patterns and is not meant to replace or influence the previously completed human assessment, without proper human review; or\n(d)the AI system is intended to perform a preparatory task to an assessment relevant for the purposes of the use cases listed in Annex III.","verbatim":false,"ref":"AI Act, Article 6","tags":["high-risk AI system"],"badges":[{"label":"AI Act, Article 6","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_6","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(9) (a) \"high-risk artificial intelligence system\" means any artificial intelligence system that, when deployed, makes, or is a substantial factor in making, a consequential decision.\n(b) \"high-risk artificial intelligence system\" does not include:\n(i) an artificial intelligence system if the artificial intelligence system is intended to:\n(a) perform a narrow procedural task; or\n(b) detect decision-making patterns or deviations from prior decision-making patterns and is not intended to replace or\n(ii) the following technologies, unless the technologies, when deployed, make, or are a substantial factor in making, a consequential decision:\n(a) anti-fraud technology that does not use facial recognition technology;\n(b) anti-malware;\n(c) anti-virus;\n(d) artificial intelligence-enabled video games;\n(e) calculators;\n(f) cybersecurity;\n(g) databases;\n(h) data storage;\n(i) firewall;\n(j) internet domain registration;\n(k) internet website loading;\n(l) networking;\n(m) spam- and robocall-filtering;\n(n) spell-checking;\n(0) spreadsheets;\n(p) web caching;\n(q) web hosting or any similar technology; or\n(r) technology that communicates with consumers in natural language for the purpose of providing users with information, making referrals or recommendations, and answering questions and is subject to an accepted use policy that prohibits generating content that is discriminatory or harmful.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas."},{"id":"provider-of-high-risk-ai-systems-1","rowLabel":"Classification rules for high-risk systems","typeLabel":"Classification rules for high-risk systems","jdata":{"eu":{"label":"Scope","text":"High-risk AI systems pursuant to Article 6(2) are the AI systems listed in any of the following areas:\n1.Biometrics, in so far as their use is permitted under relevant Union or national law:\n(a)remote biometric identification systems.This shall not include AI systems intended to be used for biometric verification the sole purpose of which is to confirm that a specific natural person is the person he or she claims to be;\n(b)AI systems intended to be used for biometric categorisation, according to sensitive or protected attributes or characteristics based on the inference of those attributes or characteristics;\n(c)AI systems intended to be used for emotion recognition.\n2.Critical infrastructure: AI systems intended to be used as safety components in the management and operation of critical digital infrastructure, road traffic, or in the supply of water, gas, heating or electricity.\n3.Education and vocational training:\n(a)AI systems intended to be used to determine access or admission or to assign natural persons to educational and vocational training institutions at all levels;\n(b)AI systems intended to be used to evaluate learning outcomes, including when those outcomes are used to steer the learning process of natural persons in educational and vocational training institutions at all levels;\n(c)AI systems intended to be used for the purpose of assessing the appropriate level of education that an individual will receive or will be able to access, in the context of or within educational and vocational training institutions at all levels;\n(d)AI systems intended to be used for monitoring and detecting prohibited behaviour of students during tests in the context of or within educational and vocational training institutions at all levels.\n4.Employment, workers’ management and access to self-employment:\n(a)AI systems intended to be used for the recruitment or selection of natural persons, in particular to place targeted job advertisements, to analyse and filter job applications, and to evaluate candidates;\n(b)AI systems intended to be used to make decisions affecting terms of work-related relationships, the promotion or termination of work-related contractual relationships, to allocate tasks based on individual behaviour or personal traits or characteristics or to monitor and evaluate the performance and behaviour of persons in such relationships.\n5.Access to and enjoyment of essential private services and essential public services and benefits:\n(a)AI systems intended to be used by public authorities or on behalf of public authorities to evaluate the eligibility of natural persons for essential public assistance benefits and services, including healthcare services, as well as to grant, reduce, revoke, or reclaim such benefits and services;\n(b)AI systems intended to be used to evaluate the creditworthiness of natural persons or establish their credit score, with the exception of AI systems used for the purpose of detecting financial fraud;\n(c)AI systems intended to be used for risk assessment and pricing in relation to natural persons in the case of life and health insurance;\n(d)AI systems intended to evaluate and classify emergency calls by natural persons or to be used to dispatch, or to establish priority in the dispatching of, emergency first response services, including by police, firefighters and medical aid, as well as of emergency healthcare patient triage systems.\n6.Law enforcement, in so far as their use is permitted under relevant Union or national law:\n(a)AI systems intended to be used by or on behalf of law enforcement authorities, or by Union institutions, bodies, offices or agencies in support of law enforcement authorities or on their behalf to assess the risk of a natural person becoming the victim of criminal offences;\n(b)AI systems intended to be used by or on behalf of law enforcement authorities or by Union institutions, bodies, offices or agencies in support of law enforcement authorities as polygraphs or similar tools;\n(c)AI systems intended to be used by or on behalf of law enforcement authorities, or by Union institutions, bodies, offices or agencies, in support of law enforcement authorities to evaluate the reliability of evidence in the course of the investigation or prosecution of criminal offences;\n(d)AI systems intended to be used by law enforcement authorities or on their behalf or by Union institutions, bodies, offices or agencies in support of law enforcement authorities for assessing the risk of a natural person offending or re-offending not solely on the basis of the profiling of natural persons as referred to in Article 3(4) of Directive (EU) 2016/680, or to assess personality traits and characteristics or past criminal behaviour of natural persons or groups;\n(e)AI systems intended to be used by or on behalf of law enforcement authorities or by Union institutions, bodies, offices or agencies in support of law enforcement authorities for the profiling of natural persons as referred to in Article 3(4) of Directive (EU) 2016/680 in the course of the detection, investigation or prosecution of criminal offences.\n7.Migration, asylum and border control management, in so far as their use is permitted under relevant Union or national law:\n(a)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies as polygraphs or similar tools;\n(b)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies to assess a risk, including a security risk, a risk of irregular migration, or a health risk, posed by a natural person who intends to enter or who has entered into the territory of a Member State;\n(c)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies to assist competent public authorities for the examination of applications for asylum, visa or residence permits and for associated complaints with regard to the eligibility of the natural persons applying for a status, including related assessments of the reliability of evidence;\n(d)AI systems intended to be used by or on behalf of competent public authorities, or by Union institutions, bodies, offices or agencies, in the context of migration, asylum or border control management, for the purpose of detecting, recognising or identifying natural persons, with the exception of the verification of travel documents.\n8.Administration of justice and democratic processes:\n(a)AI systems intended to be used by a judicial authority or on their behalf to assist a judicial authority in researching and interpreting facts and the law and in applying the law to a concrete set of facts, or to be used in a similar way in alternative dispute resolution;\n(b)AI systems intended to be used for influencing the outcome of an election or referendum or the voting behaviour of natural persons in the exercise of their vote in elections or referenda. This does not include AI systems to the output of which natural persons are not directly exposed, such as tools used to organise, optimise or structure political campaigns from an administrative or logistical point of view.","verbatim":false,"ref":"AI Act, Annex III","tags":["high-risk AI system"],"badges":[{"label":"AI Act, Annex III","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_III","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(3) \"consequential decision\" means a decision that has a material legal or similarly significant effect on the provision or denial to any consumer of, or the cost or terms of:\n(a) education enrollment or an education opportunity;\n(b) employment or an employment opportunity;\n(c) a financial or lending service;\n(d) an essential government service;\n(e) health-care services;\n(f) housing;\n(g) insurance; or\n(h) a legal service.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas."},{"id":"provider-of-high-risk-ai-systems-2","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"1. Any distributor, importer, deployer or other third-party shall be considered to be a provider of a high-risk AI system (…) in any of the following circunstances:\n(a) they put their name or trademark on a high-risk AI system already placed on the market or put into service, without prejudice to contractual arrangements stipulating that the obligations are otherwise allocated;\n(b) they make a substantial modification to a high-risk AI system that has already been placed on the market or has already been put into service in such a way that it remains a high-risk AI system pursuant to Article 6;\n(c) they modify the intended purpose of an AI system, including a general-purpose AI system, which has not been classified as high-risk and has already been placed on the market or put into service in such a way that the AI system concerned becomes a high-risk AI system.","verbatim":false,"ref":"EU AI Act, Article 25 (1)","tags":["general-purpose AI system","high-risk AI system","substantial modification"],"badges":[{"label":"EU AI Act, Article 25 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_25","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"\"Developer\" means a person doing business in this state that develops or intentionally and substantially modifies an artificial intelligence system.","verbatim":true,"ref":"Colorado SB24-205, 6-1-1701","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas."},{"id":"provider-of-high-risk-ai-systems-3","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"1. Providers shall ensure that AI systems intended to interact directly with natural persons are designed and developed in such a way that the natural persons concerned are informed that they are interacting with an AI system, unless this is obvious from the point of view of a natural person who is reasonably well-informed, observant and circumspect, taking into account the circumstances and the context of use. \n\n2. Providers of AI systems, including general-purpose AI systems, generating synthetic audio, image, video or text content, shall ensure that the outputs of the AI system are marked in a machine-readable format and detectable as artificially generated or manipulated. Providers shall ensure their technical solutions are effective, interoperable, robust and reliable as far as this is technically feasible, taking into account the specificities and limitations of various types of content, the costs of implementation and the generally acknowledged state of the art, as may be reflected in relevant technical standards.","verbatim":false,"ref":"EU AI Act, Article 50 (1, 2)","tags":["general-purpose AI system","high-risk AI system"],"badges":[{"label":"EU AI Act, Article 50 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"Deployer or other developer that deploys, offers, sells, leases, licenses, gives, or otherwise makes available an artificial intelligence system that is intended to interact with consumers shall ensure the disclosure to each consumer who interacts with the artificial intelligence system that the consumer is interacting with an artificial intelligence system.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1704","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1704","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-4","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"1.   High-risk AI systems shall be designed and developed in such a way as to ensure that their operation is sufficiently transparent to enable deployers to interpret a system’s output and use it appropriately. An appropriate type and degree of transparency shall be ensured with a view to achieving compliance with the relevant obligations of the provider and deployer set out in Section 3.","verbatim":false,"ref":"EU AI Act, Article 13 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 13 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_13","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-5","rowLabel":"General","typeLabel":"General","jdata":{"eu":{"label":"Obligations","text":"Providers of high-risk AI systems shall:\n(a) ensure that their high-risk AI systems are compliant with the requirements set out in Section 2 [requirements for high-risk AI systems outlined under obligations of high-risk systems];","verbatim":false,"ref":"EU AI Act, Article 16 (a)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (a)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-6","rowLabel":"General information","typeLabel":"General information","jdata":{"eu":{"label":"Obligations","text":"(...) (b) indicate on the high-risk AI system or, where that is not possible, on its packaging or its accompanying documentation, as applicable, their name, registered trade name or registered trade mark, the address at which they can be contacted;","verbatim":false,"ref":"EU AI Act, Article 16 (b)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (b)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(4) (a) on and after february 1, 2026, a developer shall make available, in a manner that is clear and readily available on the developer's website or in a public use case inventory, a statement summarizing:\n(i) the types of high-risk artificial intelligence systems that the developer has developed or intentionally and substantially modified and currently makes available to a deployer or other developer; and\n(...)\n(b) a developer shall update the statement described in subsection (4)(a) of this section:\n(i) as necessary to ensure that the statement remains accurate; and\n(ii) no later than ninety days after the developer intentionally and substantially modifies any high-risk artificial intelligence system described in subsection (4)(a)(i) of this section.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (4)","tags":["high-risk AI system (Colorado)'","'consequential decision'"],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (4)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-7","rowLabel":"Quality management system","typeLabel":"Quality management system","jdata":{"eu":{"label":"Obligations","text":"(c) have a quality management system in place which complies with Article 17;","verbatim":false,"ref":"EU AI Act, Article 16 (c)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (c)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-8","rowLabel":"Quality management system","typeLabel":"Quality management system","jdata":{"eu":{"label":"Obligations","text":"1. Providers of high-risk AI systems shall put a quality management system in place that ensures compliance with this Regulation. That system shall be documented in a systematic and orderly manner in the form of written policies, procedures and instructions, and shall include at least the following aspects:\n(a) a strategy for regulatory compliance, including compliance with conformity assessment procedures and procedures for the management of modifications to the high-risk AI system;\n(b) techniques, procedures and systematic actions to be used for the design, design control and design verification of the high-risk AI system;\n(c) techniques, procedures and systematic actions to be used for the development, quality control and quality assurance of the high-risk AI system;\n(d) examination, test and validation procedures to be carried out before, during and after the development of the high-risk AI system, and the frequency with which they have to be carried out;\n(e) technical specifications, including standards, to be applied and, where the relevant harmonised standards are not applied in full or do not cover all of the relevant requirements set out in Section 2, the means to be used to ensure that the high-risk AI system complies with those requirements;\n(f) systems and procedures for data management, including data acquisition, data collection, data analysis, data labelling, data storage, data filtration, data mining, data aggregation, data retention and any other operation regarding the data that is performed before and for the purpose of the placing on the market or the putting into service of high-risk AI systems;\n(g) the risk management system referred to in Article 9;\n(h) the setting-up, implementation and maintenance of a post-market monitoring system, in accordance with Article 72;\n(i) procedures related to the reporting of a serious incident in accordance with Article 73;\n(j) the handling of communication with national competent authorities, other relevant authorities, including those providing or supporting the access to data, notified bodies, other operators, customers or other interested parties;\n(k) systems and procedures for record-keeping of all relevant documentation and information;\n(l) resource management, including security-of-supply related measures;\n(m) an accountability framework setting out the responsibilities of the management and other staff with regard to all the aspects listed in this paragraph.","verbatim":false,"ref":"EU AI Act, Article 17 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 17 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_17","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(4) (a) on and after february 1, 2026, a developer shall make available, in a manner that is clear and readily available on the developer's website or in a public use case inventory, a statement summarizing:\n(...)\n(ii) how the developer manages known or reasonably foreseeable risks of algorithmic discrimination that may arise from the development or intentional and substantial modification of the types of high-risk artificial intelligence systems described in accordance with subsection (4)(a)(i) of this section.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (4)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (4)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-9","rowLabel":"Documentation","typeLabel":"Documentation","jdata":{"eu":{"label":"Obligations","text":"1. The provider shall, for a period ending 10 years after the high-risk AI system has been placed on the market or put into service, keep at the disposal of the national competent authorities:\n(a) the technical documentation referred to in Article 11;\n(b) the documentation concerning the quality management system referred to in Article 17;\n(c) the documentation concerning the changes approved by notified bodies, where applicable;\n(d) the decisions and other documents issued by the notified bodies, where applicable;\n(e) the EU declaration of conformity referred to in Article 47.","verbatim":false,"ref":"EU AI Act, Article 18 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 18 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_18","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"On and after February 1, 2026, and except as provided in subsection (6) of this section, a developer of a high-risk artificial intelligence system shall make available to the deployer or other developer of the high-risk artificial intelligence system:\n(a) a general statement describing the reasonably foreseeable uses and known harmful or inappropriate uses of the high-risk artificial intelligence system;\n(b) documentation disclosing:\n(i) high-level summaries of the type of data used to train the high-risk artificial intelligence system;\n(ii) known or reasonably foreseeable limitations of the high-risk artificial intelligence system, including known or reasonably foreseeable risks of algorithmic discrimination arising from the intended uses of the high-risk artificial intelligence system;\n(iii) the purpose of the high-risk artificial intelligence system;\n(iv) the intended benefits and uses of the high-risk artificial intelligence system; and\n(v) all other information necessary to allow the deployer to comply with the requirements of section 6-1-1703;","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (2)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (2)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-10","rowLabel":"Technical documentation","typeLabel":"Technical documentation","jdata":{"eu":{"label":"Obligations","text":"1. The technical documentation of a high-risk AI system shall be drawn up before that system is placed on the market or put into service and shall be kept up-to date. The technical documentation shall be drawn up in such a way as to demonstrate that the high-risk AI system complies with the requirements set out in this Section and to provide national competent authorities and notified bodies with the necessary information in a clear and comprehensive form to assess the compliance of the AI system with those requirements.","verbatim":false,"ref":"EU AI Act, Article 11 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 11 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_11","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-11","rowLabel":"Technical documentation","typeLabel":"Technical documentation","jdata":{"eu":{"label":"Obligations","text":"The technical documentation referred to in Article 11(1) shall contain at least the following information, as applicable to the relevant AI system:\n1. A general description of the AI system including:\n(a) its intended purpose, the name of the provider and the version of the system reflecting its relation to previous versions;\n(b) how the AI system interacts with, or can be used to interact with, hardware or software, including with other AI systems, that are not part of the AI system itself, where applicable;\n(c) the versions of relevant software or firmware, and any requirements related to version updates;\n(d) the description of all the forms in which the AI system is placed on the market or put into service, such as software packages embedded into hardware, downloads, or APIs;\n(e) the description of the hardware on which the AI system is intended to run;\n(f) where the AI system is a component of products, photographs or illustrations showing external features, the marking and internal layout of those products;\n(g) a basic description of the user-interface provided to the deployer;\n(h) instructions for use for the deployer, and a basic description of the user-interface provided to the deployer, where applicable;\n2. A detailed description of the elements of the AI system and of the process for its development, including:\n(a) the methods and steps performed for the development of the AI system, including, where relevant, recourse to pre-trained systems or tools provided by third parties and how those were used, integrated or modified by the provider;\n(b) the design specifications of the system, namely the general logic of the AI system and of the algorithms; the key design choices including the rationale and assumptions made, including with regard to persons or groups of persons in respect of who, the system is intended to be used; the main classification choices; what the system is designed to optimise for, and the relevance of the different parameters; the description of the expected output and output quality of the system; the decisions about any possible trade-off made regarding the technical solutions adopted to comply with the requirements set out in Chapter III, Section 2;\n(c) the description of the system architecture explaining how software components build on or feed into each other and integrate into the overall processing; the computational resources used to develop, train, test and validate the AI system;\n(d) where relevant, the data requirements in terms of datasheets describing the training methodologies and techniques and the training data sets used, including a general description of these data sets, information about their provenance, scope and main characteristics; how the data was obtained and selected; labelling procedures (e.g. for supervised learning), data cleaning methodologies (e.g. outliers detection);\n(e) assessment of the human oversight measures needed in accordance with Article 14, including an assessment of the technical measures needed to facilitate the interpretation of the outputs of AI systems by the deployers, in accordance with Article 13(3), point (d);\n(f) where applicable, a detailed description of pre-determined changes to the AI system and its performance, together with all the relevant information related to the technical solutions adopted to ensure continuous compliance of the AI system with the relevant requirements set out in Chapter III, Section 2;\n(g) the validation and testing procedures used, including information about the validation and testing data used and their main characteristics; metrics used to measure accuracy, robustness and compliance with other relevant requirements set out in Chapter III, Section 2, as well as potentially discriminatory impacts; test logs and all test reports dated and signed by the responsible persons, including with regard to predetermined changes as referred to under point (f);\n(h) cybersecurity measures put in place;\n3. Detailed information about the monitoring, functioning and control of the AI system, in particular with regard to: its capabilities and limitations in performance, including the degrees of accuracy for specific persons or groups of persons on which the system is intended to be used and the overall expected level of accuracy in relation to its intended purpose; the foreseeable unintended outcomes and sources of risks to health and safety, fundamental rights and discrimination in view of the intended purpose of the AI system; the human oversight measures needed in accordance with Article 14, including the technical measures put in place to facilitate the interpretation of the outputs of AI systems by the deployers; specifications on input data, as appropriate;\n4. A description of the appropriateness of the performance metrics for the specific AI system;\n5. A detailed description of the risk management system in accordance with Article 9;\n6. A description of relevant changes made by the provider to the system through its lifecycle;\n7. A list of the harmonised standards applied in full or in part the references of which have been published in the Official Journal of the European Union; where no such harmonised standards have been applied, a detailed description of the solutions adopted to meet the requirements set out in Chapter III, Section 2, including a list of other relevant standards and technical specifications applied;\n8. A copy of the EU declaration of conformity referred to in Article 47;\n9. A detailed description of the system in place to evaluate the AI system performance in the post-market phase in accordance with Article 72, including the post-market monitoring plan referred to in Article 72(3).","verbatim":false,"ref":"EU AI Act, Annex IV (1 - 9)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Annex IV (1 - 9)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_IV","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(c) documentation describing:\n(i) how the high-risk artificial intelligence system was evaluated for performance and mitigation of algorithmic discrimination before the high-risk artificial intelligence system was offered, sold, leased, licensed, given, or otherwise made available to the deployer;\n(ii) the data governance measures used to cover the training datasets and the measures used to examine the suitability of data sources, possible biases, and appropriate mitigation;\n(iii) the intended outputs of the high-risk artificial intelligence system;\n(iv) the measures the developer has taken to mitigate known or reasonably foreseeable risks of algorithmic discrimination that may arise from the reasonably foreseeable deployment of the high-risk artificial intelligence system; and\n(v) how the high-risk artificial intelligence system should be used, not be used, and be monitored by an individual when the high-risk artificial intelligence system is used to make, or is a substantial factor in making, a consequential decision; and\n(d) any additional documentation that is reasonably necessary to assist the deployer in understanding the outputs and monitor the performance of the high-risk artificial intelligence system for risks of algorithmic discrimination.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1702 (2)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1702 (2)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"provider-of-high-risk-ai-systems-12","rowLabel":"System logs","typeLabel":"System logs","jdata":{"eu":{"label":"Obligations","text":"(e) when under their control, keep the logs automatically generated by their high-risk AI systems as referred to in Article 19;","verbatim":false,"ref":"EU AI Act, Article 16 (e)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (e)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-13","rowLabel":"System logs","typeLabel":"System logs","jdata":{"eu":{"label":"Obligations","text":"1. Providers of high-risk AI systems shall keep the logs referred to in Article 12(1), automatically generated by their high-risk AI systems, to the extent such logs are under their control. Without prejudice to applicable Union or national law, the logs shall be kept for a period appropriate to the intended purpose of the high-risk AI system, of at least six months, unless provided otherwise in the applicable Union or national law, in particular in Union law on the protection of personal data.","verbatim":false,"ref":"EU AI Act, Article 19 (1)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 19 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_19","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-14","rowLabel":"Conformity assessment","typeLabel":"Conformity assessment","jdata":{"eu":{"label":"Obligations","text":"(f) ensure that the high-risk AI system undergoes the relevant conformity assessment procedure as referred to in Article 43, prior to its being placed on the market or put into service;","verbatim":false,"ref":"EU AI Act, Article 16 (f)","tags":["high-risk AI system"],"badges":[{"label":"EU AI Act, Article 16 (f)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_16","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-high-risk-ai-systems-15","rowLabel":"Conformity assessment","typeLabel":"Conformity assessment","jdata":{"eu":{"label":"Obligations","text":"1. For high-risk AI systems listed in point 1 of Annex III, where, in demonstrating the compliance of a high-risk AI system with the requirements set out in Section 2, the provider has applied harmonised standards referred to in Article 40, or, where applicable, common specifications referred to in Article 41, the provider shall opt for one of the following conformity assessment procedures based on:\n\n(a) the internal control referred to in Annex VI; or\n\n(b) the assessment of the quality management system and the assessment of the technical documentation, with the involvement of a notified body, referred to in Annex VII. In demonstrating the compliance of a high-risk AI system with the requirements set out in Section 2, the provider shall follow the conformity assessment procedure set out in Annex VII where:\n\n(a) harmonised standards referred to in Article 40 do not exist, and common specifications referred to in Article 41 are not available;\n\n(b) the provider has not applied, or has applied only part of, the harmonised standard;\n\n(c) the common specifications referred to in point (a) exist, but the provider has not applied them;\n\n(d) one or more of the harmonised standards referred to in point (a) has been published with a restriction, and only on the part of the standard that was restricted. For the purposes of the conformity assessment procedure referred to in Annex VII, the provider may choose any of the notified bodies. However, where the high-risk AI system is intended to be put into service by law enforcement, immigration or asylum authorities or by Union institutions, bodies, offices or agencies, the market surveillance authority referred to in Article 74(8) or (9), as applicable, shall act as a notified body.\n\n2. For high-risk AI systems referred to in points 2 to 8 of Annex III, providers shall follow the conformity assessment procedure based on internal control as referred to in Annex VI, which does not provide for the involvement of a notified body.\n\n3. For high-risk AI systems covered by the Union harmonisation legislation listed in Section A of Annex I, the provider shall follow the relevant conformity assessment procedure as required under those legal acts. The requirements set out in Section 2 of this Chapter shall apply to those high-risk AI systems and shall be part of that assessment. Points 4.3., 4.4., 4.5. and the fifth paragraph of point 4.6 of Annex VII shall also apply. For the purposes of that assessment, notified bodies which have been notified under those legal acts shall be entitled to control the conformity of the high-risk AI systems with the requirements set out in Section 2, provided that the compliance of those notified bodies with requirements laid down in Article 31(4), (5), (10) and (11) has been assessed in the context of the notification procedure under those legal acts. Where a legal act listed in Section A of Annex I enables the product manufacturer to opt out from a third-party conformity assessment, provided that that manufacturer has applied all harmonised standards covering all the relevant requirements, that manufacturer may use that option only if it has also applied harmonised standards or, where applicable, common specifications referred to in Article 41, covering all requirements set out in Section 2 of this Chapter.\n\n4. High-risk AI systems that hav
