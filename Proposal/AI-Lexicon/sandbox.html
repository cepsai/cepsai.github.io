rs must notify consumers when the system is used to make, or is a substantial factor in making, a consequential decision (§6-1-1703(4)(a)). The concept bridges AI system output to consequential human decisions, capturing indirect AI influence on outcomes.","verbatim":false,"ref":"CO SB 24-205 §6-1-1701(9)(a); §6-1-1703(4)","tags":["Measurement","High-risk AI","Consumer notification"],"badges":[{"label":"CO SB 24-205 §6-1-1701(9)(a)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1703(4)","url":null,"sourceId":null}]},"ny":{"label":"Application","text":"The \"critical safety incident\" concept serves as the primary incident-based risk trigger in the NY RAISE Act. It links directly to the \"catastrophic risk\" definition — materialization of a catastrophic risk is itself a critical safety incident. This creates a layered risk framework: catastrophic risk defines potential harms, while critical safety incident captures realized harms plus additional categories (model weight theft, loss of control, deceptive behavior). Unlike the EU's broad \"risk\" definition or Colorado's \"substantial factor\" in consequential decisions, NY focuses specifically on frontier model safety incidents rather than a general risk framework.","verbatim":false,"ref":"NY S8828 §1420(3)-(4), §1422","tags":["Measurement","Risk classification"],"badges":[{"label":"NY S8828 §1420(3)-(4), §1422","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["Definition","Application"]}]},{"tabId":"incident","label":"Incident","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"ca","label":"California"},{"id":"co","label":"Colorado"},{"id":"ny","label":"New York"}],"concepts":[{"id":"serious-incident","name":"Serious incident / Critical safety incident / Algorithmic discrimination (disclosure)","names":{"eu":"Serious incident","ca":"Critical safety incident","co":"Algorithmic discrimination (disclosure)","ny":"Critical safety incident"},"entries":[{"id":"serious-incident-0","rowLabel":"Definition","typeLabel":"Definition","jdata":{"eu":{"label":"Definition","text":"Article 3(49): 'serious incident' means an incident or malfunctioning of an AI system that directly or indirectly leads to any of the following: (a) the death of a person, or serious harm to a person's health; (b) a serious and irreversible disruption of the management or operation of critical infrastructure; (c) the infringement of obligations under Union law intended to protect fundamental rights; (d) serious harm to property or the environment.","verbatim":true,"ref":"AIA Article 3(49)","tags":["Trustworthy","Safety","Incident"],"badges":[{"label":"AIA Article 3(49)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Definition","text":"§22757.11(d): \"Critical safety incident\" means any of the following: (1) Unauthorized access to, modification of, or exfiltration of, the model weights of a frontier model that results in death or bodily injury. (2) Harm resulting from the materialization of a catastrophic risk. (3) Loss of control of a frontier model causing death or bodily injury. (4) A frontier model that uses deceptive techniques against the frontier developer to subvert the controls or monitoring of its frontier developer outside of the context of an evaluation designed to elicit this behavior and in a manner that demonstrates materially increased catastrophic risk.","verbatim":true,"ref":"CA SB 53 §22757.11(d)","tags":["Trustworthy","Safety","Incident"],"badges":[{"label":"CA SB 53 §22757.11(d)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Definition","text":"Colorado SB 24-205 does not define a \"serious incident\" or \"critical safety incident.\" The closest equivalent is the obligation to disclose discovery of algorithmic discrimination to the Attorney General (§6-1-1702(5), §6-1-1703(7)).\n\n§6-1-1701(1): \"Algorithmic discrimination\" means any condition in which the use of an artificial intelligence system results in an unlawful differential treatment or impact that disfavors an individual or group of individuals on the basis of their actual or perceived age, color, disability, ethnicity, genetic information, limited proficiency in the English language, national origin, race, religion, reproductive health, sex, veteran status, or any other classification protected under the laws of this state or federal law.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(1)","tags":["Trustworthy","Discrimination","Disclosure"],"badges":[{"label":"CO SB 24-205 §6-1-1701(1)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Definition","text":"§1420(4): \"Critical safety incident\" means any of the following: (A) Unauthorized access to, modification of, or exfiltration of, the model weights of a frontier model that results in death or bodily injury; (B) Harm resulting from the materialization of a catastrophic risk; (C) Loss of control of a frontier model causing death or bodily injury; or (D) A frontier model that uses deceptive techniques against the frontier developer to subvert the controls or monitoring of its frontier developer outside of the context of an evaluation designed to elicit this behavior and in a manner that demonstrates materially increased catastrophic risk.","verbatim":true,"ref":"NY S8828 §1420(4)","tags":["Trustworthy","Safety","Incident"],"badges":[{"label":"NY S8828 §1420(4)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"serious-incident-1","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"Article 73(1): Applies to providers of high-risk AI systems placed on the Union market. Reporting is to market surveillance authorities of the Member States where the incident occurred.\n\nArticle 55(1)(c): Providers of general-purpose AI models with systemic risk shall keep track of, document, and report, without undue delay, to the AI Office and, as appropriate, to national competent authorities, relevant information about serious incidents and possible corrective measures to address them.","verbatim":true,"ref":"AIA Article 73(1); Article 55(1)(c)","tags":["Trustworthy","High-risk AI","GPAI systemic risk"],"badges":[{"label":"AIA Article 73(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_73","sourceId":"eu-ai-act"},{"label":"Article 55(1)(c)","url":null,"sourceId":null}]},"ca":{"label":"Scope","text":"§22757.13(c)(1): Applies to any frontier developer with respect to critical safety incidents pertaining to one or more of its frontier models. Reports are made to the Office of Emergency Services.\n\n§22757.13(c)(4): A frontier developer is encouraged, but not required, to report critical safety incidents pertaining to foundation models that are not frontier models.","verbatim":true,"ref":"CA SB 53 §22757.13(c)(1), (c)(4)","tags":["Trustworthy","Frontier model","OES"],"badges":[{"label":"CA SB 53 §22757.13(c)(1), (c)(4)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Scope","text":"§6-1-1702(5): Applies to developers of high-risk artificial intelligence systems doing business in this state who discover algorithmic discrimination risks. Disclosure is to the Attorney General and to all known deployers or other developers.\n\n§6-1-1703(7): Applies to deployers of high-risk artificial intelligence systems doing business in this state who discover that a deployed system has caused algorithmic discrimination. Notice is to the Attorney General.","verbatim":true,"ref":"CO SB 24-205 §6-1-1702(5); §6-1-1703(7)","tags":["Trustworthy","High-risk AI","Discrimination"],"badges":[{"label":"CO SB 24-205 §6-1-1702(5)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1703(7)","url":null,"sourceId":null}]},"ny":{"label":"Scope","text":"§1422(1): Applies to frontier developers with respect to critical safety incidents pertaining to one or more of their frontier models. Reports are made to the Office.\n\n§1422(2)(A): Large frontier developers must transmit to the Office summaries of assessments of catastrophic risk from internal use of frontier models every three months.","verbatim":true,"ref":"NY S8828 §1422(1), (2)(A)","tags":["Trustworthy","Frontier model","Office"],"badges":[{"label":"NY S8828 §1422(1), (2)(A)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"serious-incident-2","rowLabel":"Reporting mechanism","typeLabel":"Reporting mechanism","jdata":{"eu":{"label":"Reporting mechanism","text":"Article 73(1): Providers of high-risk AI systems placed on the Union market shall report any serious incident to the market surveillance authorities of the Member States where that incident occurred.\n\nArticle 73(5): Where necessary to ensure timely reporting, the provider or, where applicable, the deployer, may submit an initial report that is incomplete, followed by a complete report.","verbatim":true,"ref":"AIA Article 73(1), (5)","tags":["Trustworthy","Reporting","Market surveillance"],"badges":[{"label":"AIA Article 73(1), (5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_73","sourceId":"eu-ai-act"}]},"ca":{"label":"Reporting mechanism","text":"§22757.13(a): The Office of Emergency Services shall establish a mechanism to be used by a frontier developer or a member of the public to report a critical safety incident that includes all of the following: (1) The date of the critical safety incident. (2) The reasons the incident qualifies as a critical safety incident. (3) A short and plain statement describing the critical safety incident. (4) Whether the incident was associated with internal use of a frontier model.\n\n§22757.13(b)(1): The Office of Emergency Services shall establish a mechanism to be used by a large frontier developer to confidentially submit summaries of any assessments of the potential for catastrophic risk resulting from internal use of its frontier models.\n\n§22757.13(c)(3): A frontier developer that discovers information about a critical safety incident after filing the initial report required by this subdivision may file an amended report.","verbatim":true,"ref":"CA SB 53 §22757.13(a), (b)(1), (c)(3)","tags":["Trustworthy","Reporting","OES"],"badges":[{"label":"CA SB 53 §22757.13(a), (b)(1), (c)(3)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Reporting mechanism","text":"§6-1-1702(5): A developer shall disclose to the Attorney General, in a form and manner prescribed by the Attorney General, and to all known deployers or other developers of the high-risk artificial intelligence system, any known or reasonably foreseeable risks of algorithmic discrimination arising from the intended uses of the high-risk artificial intelligence system.\n\n§6-1-1703(7): If a deployer discovers that a deployed high-risk artificial intelligence system has caused algorithmic discrimination, the deployer shall send to the Attorney General, in a form and manner prescribed by the Attorney General, a notice disclosing the discovery.","verbatim":true,"ref":"CO SB 24-205 §6-1-1702(5); §6-1-1703(7)","tags":["Trustworthy","Reporting","Attorney General"],"badges":[{"label":"CO SB 24-205 §6-1-1702(5)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1703(7)","url":null,"sourceId":null}]},"ny":{"label":"Reporting mechanism","text":"§1422(1): The Office shall establish a mechanism to be used by a frontier developer or a member of the public to report a critical safety incident that includes all of the following: (A) The date of the critical safety incident; (B) The reasons the incident qualifies as a critical safety incident; (C) A short and plain statement describing the critical safety incident; and (D) Whether the incident was associated with internal use of a frontier model.\n\n§1422(2)(A): The Office shall establish a mechanism to be used by a large frontier developer to confidentially submit summaries of any assessments of the potential for catastrophic risk resulting from internal use of its frontier models.\n\n§1422(3)(C): A frontier developer that discovers information about a critical safety incident after filing the initial report required by this subdivision may file an amended report.","verbatim":true,"ref":"NY S8828 §1422(1), (2)(A), (3)(C)","tags":["Trustworthy","Reporting","Office"],"badges":[{"label":"NY S8828 §1422(1), (2)(A), (3)(C)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"serious-incident-3","rowLabel":"Reporting timelines","typeLabel":"Reporting timelines","jdata":{"eu":{"label":"Reporting timelines","text":"Article 73(2): The report shall be made immediately after the provider has established a causal link between the AI system and the serious incident or the reasonable likelihood of such a link, and, in any event, not later than 15 days after the provider or, where applicable, the deployer, becomes aware of the serious incident.\n\nArticle 73(3): In the event of a widespread infringement or a serious incident as defined in Article 3, point (49)(b), the report shall be provided immediately, and not later than two days after the provider or, where applicable, the deployer becomes aware of that incident.\n\nArticle 73(4): In the event of the death of a person, the report shall be provided immediately after the provider or the deployer has established, or as soon as it suspects, a causal relationship between the high-risk AI system and the serious incident, but not later than 10 days after the date on which the provider or, where applicable, the deployer becomes aware of the serious incident.","verbatim":true,"ref":"AIA Article 73(2)-(4)","tags":["Trustworthy","Timelines","Reporting"],"badges":[{"label":"AIA Article 73(2)-(4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_73","sourceId":"eu-ai-act"}]},"ca":{"label":"Reporting timelines","text":"§22757.13(c)(1): A frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the Office of Emergency Services within 15 days of discovering the critical safety incident.\n\n§22757.13(c)(2): If a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within 24 hours to an authority, including any law enforcement agency or public safety agency with jurisdiction, that is appropriate based on the nature of that incident and as required by law.","verbatim":true,"ref":"CA SB 53 §22757.13(c)(1)-(2)","tags":["Trustworthy","Timelines","Reporting"],"badges":[{"label":"CA SB 53 §22757.13(c)(1)-(2)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Reporting timelines","text":"§6-1-1702(5): Developer disclosure: without unreasonable delay but no later than ninety days after the date on which: (a) the developer discovers through the developer's ongoing testing and analysis that the developer's high-risk artificial intelligence system has been deployed and has caused or is reasonably likely to have caused algorithmic discrimination; or (b) the developer receives from a deployer a credible report that the high-risk artificial intelligence system has been deployed and has caused algorithmic discrimination.\n\n§6-1-1703(7): Deployer notification: without unreasonable delay, but no later than ninety days after the date of the discovery that a deployed high-risk artificial intelligence system has caused algorithmic discrimination.","verbatim":true,"ref":"CO SB 24-205 §6-1-1702(5); §6-1-1703(7)","tags":["Trustworthy","Timelines","Reporting"],"badges":[{"label":"CO SB 24-205 §6-1-1702(5)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1703(7)","url":null,"sourceId":null}]},"ny":{"label":"Reporting timelines","text":"§1422(3)(A): A frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the Office within seventy-two hours from a determination that a critical safety incident has occurred or within seventy-two hours of the frontier developer learning facts sufficient to establish a reasonable belief that a critical safety incident has occurred.\n\n§1422(3)(B): If a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within twenty-four hours to an authority, including any law enforcement agency or public safety agency with jurisdiction, that is appropriate based on the nature of that incident and as required by law.","verbatim":true,"ref":"NY S8828 §1422(3)(A)-(B)","tags":["Trustworthy","Timelines","Reporting"],"badges":[{"label":"NY S8828 §1422(3)(A)-(B)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"serious-incident-4","rowLabel":"Post-report obligations","typeLabel":"Post-report obligations","jdata":{"eu":{"label":"Post-report obligations","text":"Article 73(6): Following the reporting of a serious incident pursuant to paragraph 1, the provider shall, without delay, perform the necessary investigations in relation to the serious incident and the AI system concerned. This shall include a risk assessment of the incident, and corrective action. The provider shall cooperate with the competent authorities, and where relevant with the notified body concerned, during the investigations, and shall not perform any investigation which involves altering the AI system concerned in a way which may affect any subsequent evaluation of the causes of the incident, prior to informing the competent authorities of such action.\n\nArticle 73(7): Upon receiving a notification related to a serious incident referred to in Article 3, point (49)(c), the relevant market surveillance authority shall inform the national public authorities or bodies referred to in Article 77(1).","verbatim":true,"ref":"AIA Article 73(6)-(7)","tags":["Trustworthy","Investigation","Corrective action"],"badges":[{"label":"AIA Article 73(6)-(7)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_73","sourceId":"eu-ai-act"}]},"ca":{"label":"Post-report obligations","text":"§22757.13(d): The Office of Emergency Services shall review critical safety incident reports submitted by frontier developers and may review reports submitted by members of the public.\n\n§22757.13(e)(1): The Attorney General or the Office of Emergency Services may transmit reports of critical safety incidents and reports from covered employees made pursuant to Chapter 5.1 (commencing with Section 1107) of Part 3 of Division 2 of the Labor Code to the Legislature, the Governor, the federal government, or appropriate state agencies.","verbatim":true,"ref":"CA SB 53 §22757.13(d), (e)(1)","tags":["Trustworthy","Review","Government"],"badges":[{"label":"CA SB 53 §22757.13(d), (e)(1)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Post-report obligations","text":"§6-1-1703(9): On and after February 1, 2026, the Attorney General may require that a deployer, or a third party contracted by the deployer, disclose to the Attorney General, no later than ninety days after the request and in a form and manner prescribed by the Attorney General, the risk management policy implemented pursuant to subsection (2) of this section, the most recent impact assessment completed pursuant to subsection (3) of this section, or both.","verbatim":true,"ref":"CO SB 24-205 §6-1-1703(9)","tags":["Trustworthy","Attorney General","Impact assessment"],"badges":[{"label":"CO SB 24-205 §6-1-1703(9)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Post-report obligations","text":"§1422(4): The Office shall review critical safety incident reports submitted by frontier developers and may review reports submitted by members of the public.\n\n§1422(5)(A): The Office may transmit reports of critical safety incidents or summaries of any assessments of catastrophic risk from internal use of frontier models to other governmental entities at their discretion, considering for example and without limitation the following: the severity of any such incident, potential ongoing risks, legal or regulatory obligations, the need for coordinating with other governmental agencies or other entities and the availability of information.","verbatim":true,"ref":"NY S8828 §1422(4), (5)(A)","tags":["Trustworthy","Review","Government"],"badges":[{"label":"NY S8828 §1422(4), (5)(A)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"serious-incident-5","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"Article 99(4): Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5, shall be subject to administrative fines of up to EUR 15 000 000 or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher: (a) obligations of providers pursuant to Article 16.\n\nArticle 101(1): The Commission may impose on providers of general-purpose AI models fines not exceeding 3 % of their annual total worldwide turnover in the preceding financial year or EUR 15 000 000, whichever is higher, when the Commission finds that the provider intentionally or negligently infringes the relevant provisions of this Regulation.","verbatim":true,"ref":"AIA Article 99(4); Article 101(1)","tags":["Trustworthy","Enforcement"],"badges":[{"label":"AIA Article 99(4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"},{"label":"Article 101(1)","url":null,"sourceId":null}]},"ca":{"label":"Penalties","text":"§22757.15(a): A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12, fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation.\n\n§22757.15(b): A civil penalty described in this section shall be recovered in a civil action brought only by the Attorney General.","verbatim":true,"ref":"CA SB 53 §22757.15(a)-(b)","tags":["Trustworthy","Enforcement"],"badges":[{"label":"CA SB 53 §22757.15(a)-(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Penalties","text":"§6-1-1706(1): Notwithstanding section 6-1-103, the attorney general has exclusive authority to enforce this part 17.\n\n§6-1-1706(2): Except as provided in subsection (3) of this section, a violation of the requirements established in this part 17 constitutes an unfair trade practice pursuant to section 6-1-105(1)(hhhh).\n\n§6-1-1706(6): This part 17 does not provide the basis for, and is not subject to, a private right of action for violations of this part 17 or any other law.","verbatim":true,"ref":"CO SB 24-205 §6-1-1706(1), (2), (6)","tags":["Trustworthy","Enforcement"],"badges":[{"label":"CO SB 24-205 §6-1-1706(1), (2), (6)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Penalties","text":"§1427(1): The Attorney General may bring a civil action to recover a civil penalty in an amount not to exceed one million dollars for a first violation and in an amount not to exceed three million dollars per subsequent violation, determined based on the severity of the violation where a large frontier developer fails to publish or transmit a compliant document required to be published or transmitted under this article, makes a statement in violation of subdivision four of section fourteen hundred twenty-one of this article, fails to report an incident as required by section fourteen hundred twenty-two of this article, or fails to comply with its own frontier AI framework.\n\n§1427(2): Nothing in this article shall be construed to establish, authorize or create a private right of action associated with violations of this article.","verbatim":true,"ref":"NY S8828 §1427(1)-(2)","tags":["Trustworthy","Enforcement"],"badges":[{"label":"NY S8828 §1427(1)-(2)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["Definition","Scope","Reporting mechanism","Reporting timelines","Post-report obligations","Penalties"]}]},{"tabId":"submod","label":"Substantial Modification","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"ca","label":"California"},{"id":"co","label":"Colorado"},{"id":"ny","label":"New York"}],"concepts":[{"id":"substantial-modification","name":"Substantial Modification","entries":[{"id":"substantial-modification-0","rowLabel":"Definition","typeLabel":"Definition","jdata":{"eu":{"label":"Definition","text":"substantial modification' means a change to an AI system after its placing on the market or putting into service which is not foreseen or planned in the initial conformity assessment carried out by the provider and as a result of which the compliance of the AI system with the requirements set out in Chapter III, Section 2 is affected or results in a modification to the intended purpose for which the AI system has been assessed;","verbatim":true,"ref":"AIA Article 3(23)","tags":["Measurement","High-risk AI","Compliance"],"badges":[{"label":"AIA Article 3(23)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Definition","text":"SB 53 does not provide a standalone statutory definition of \"substantial modification.\" The term is used in context: a frontier developer must publish a transparency report before deploying \"a substantially modified version of an existing frontier model\" (§22757.12(c)(1)). The frontier AI framework must describe criteria for determining \"when its frontier models are substantially modified enough to require disclosures\" (§22757.12(a)(6)).","verbatim":false,"ref":"CA SB 53 §22757.12(a)(6), (c)(1)","tags":["Measurement","Frontier model","Disclosure"],"badges":[{"label":"CA SB 53 §22757.12(a)(6), (c)(1)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Definition","text":"\"Intentional and substantial modification\" or \"intentionally and substantially modifies\" means a deliberate change made to an artificial intelligence system that results in any new reasonably foreseeable risk of algorithmic discrimination.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(10)(a)","tags":["Measurement","High-risk AI","Modification"],"badges":[{"label":"CO SB 24-205 §6-1-1701(10)(a)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Definition","text":"S8828 does not provide a standalone statutory definition of \"substantial modification.\" However, the bill references \"a substantially modified version of an existing frontier model\" in the context of transparency reporting requirements (§1421(3)) and references the frontier AI framework describing criteria that trigger updates and how the developer determines when frontier models are substantially modified enough to require disclosures (§1421(1)(f)).","verbatim":false,"ref":"NY S8828 §1421(1)(f), §1421(3)","tags":["Measurement","Frontier model","Disclosure"],"badges":[{"label":"NY S8828 §1421(1)(f), §1421(3)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"substantial-modification-1","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"Applies to high-risk AI systems (Chapter III). A substantial modification triggers the obligation for the AI system to undergo a new conformity assessment. The concept of significant change should be understood as equivalent in substance to the notion of substantial modification, which is used only with regard to high-risk AI systems.","verbatim":false,"ref":"AIA Article 3(23); Recital (177)","tags":["Measurement","High-risk AI","Conformity"],"badges":[{"label":"AIA Article 3(23)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"},{"label":"Recital (177)","url":null,"sourceId":null}]},"ca":{"label":"Scope","text":"Applies to frontier models (foundation models trained using >10^26 integer or floating-point operations). Substantial modification triggers the obligation for a new transparency report and updated catastrophic risk assessments.","verbatim":false,"ref":"CA SB 53 §22757.11(i); §22757.12(c)","tags":["Measurement","Frontier model","Transparency"],"badges":[{"label":"CA SB 53 §22757.11(i)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"},{"label":"§22757.12(c)","url":null,"sourceId":null}]},"co":{"label":"Scope","text":"Applies to high-risk AI systems. \"Intentional and substantial modification\" does not include a change to a high-risk AI system if: (I) the system continues to learn after being offered/deployed; (II) the change is made as a result of such learning; (III) the change was predetermined by the deployer when completing the initial impact assessment pursuant to §6-1-1703(3); and (IV) the change is included in technical documentation for the system.","verbatim":false,"ref":"CO SB 24-205 §6-1-1701(10)(b)","tags":["Measurement","High-risk AI","Learning systems"],"badges":[{"label":"CO SB 24-205 §6-1-1701(10)(b)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Scope","text":"Applies to frontier developers deploying new or substantially modified frontier models. The frontier AI framework must include criteria that trigger updates and how the large frontier developer determines when its frontier models are substantially modified enough to require disclosures pursuant to §1421(3).","verbatim":false,"ref":"NY S8828 §1421(1)(f), §1421(3)","tags":["Measurement","Frontier model","Transparency"],"badges":[{"label":"NY S8828 §1421(1)(f), §1421(3)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"substantial-modification-2","rowLabel":"Consequences","typeLabel":"Consequences","jdata":{"eu":{"label":"Consequences","text":"When a substantial modification occurs, the AI system should be considered a new AI system which should undergo a new conformity assessment. Changes occurring to the algorithm and performance of AI systems which continue to \"learn\" after being placed on the market or put into service do not constitute a substantial modification if those changes have been pre-determined by the provider and assessed at the moment of the conformity assessment.","verbatim":true,"ref":"AIA Article 3(23); Recital (128)","tags":["Measurement","Conformity","Learning systems"],"badges":[{"label":"AIA Article 3(23)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"},{"label":"Recital (128)","url":null,"sourceId":null}]},"ca":{"label":"Consequences","text":"(c)  (1)  Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report containing all of the following: (A)  The internet website of the frontier developer. (B)  A mechanism that enables a natural person to communicate with the frontier developer. (C)  The release date of the frontier model. (D)  The languages supported by the frontier model. (E)  The modalities of output supported by the frontier model. (F)  The intended uses of the frontier model. (G)  Any generally applicable restrictions or conditions on uses of the frontier model. (2)  Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a large frontier developer shall include in the transparency report required by paragraph (1) summaries of all of the following: (A)  Assessments of catastrophic risks from the frontier model conducted pursuant to the large frontier developer’s frontier AI framework. (B)  The results of those assessments. (C)  The extent to which third-party evaluators were involved. (D)  Other steps taken to fulfill the requirements of the frontier AI framework with respect to the frontier model.","verbatim":true,"ref":"CA SB 53 §22757.12(c)(1)-(2)","tags":["Measurement","Transparency","Disclosure"],"badges":[{"label":"CA SB 53 §22757.12(c)(1)-(2)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Consequences","text":"An intentional and substantial modification triggers the obligation for deployers to complete a new impact assessment within 90 days (§6-1-1703(3)(a)(II)). The impact assessment following modification must include a statement disclosing the extent to which the system was used consistently with, or varied from, the developer's intended uses (§6-1-1703(3)(c)). Developers must update their public use case inventory within 90 days of intentionally and substantially modifying a system (§6-1-1702(4)(b)(II)).","verbatim":false,"ref":"CO SB 24-205 §6-1-1703(3); §6-1-1702(4)(b)","tags":["Measurement","Impact assessment","Disclosure"],"badges":[{"label":"CO SB 24-205 §6-1-1703(3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1702(4)(b)","url":null,"sourceId":null}]},"ny":{"label":"Consequences","text":"Deploying a substantially modified version of an existing frontier model triggers the obligation for the frontier developer to publish a transparency report containing model details, intended uses, and restrictions. For large frontier developers, this includes summaries of catastrophic risk assessments, results of assessments, extent of third-party evaluator involvement, and other steps taken to fulfill the frontier AI framework.","verbatim":false,"ref":"NY S8828 §1421(3)(a)-(b)","tags":["Measurement","Transparency","Disclosure"],"badges":[{"label":"NY S8828 §1421(3)(a)-(b)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"substantial-modification-3","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"4. Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Article 5, shall be subject to administrative fines of up to EUR 15 000 000 or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher. [...]\n\n6. In the case of SMEs, including start-ups, each fine referred to in this Article shall be up to the percentages or amount referred to in paragraphs 3, 4 and 5, whichever thereof is lower.","verbatim":true,"ref":"AIA Article 99(3)-(5)","tags":["Measurement","Enforcement"],"badges":[{"label":"AIA Article 99(3)-(5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"ca":{"label":"Penalties","text":"(a)  A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12, fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation. (b)  A civil penalty described in this section shall be recovered in a civil action brought only by the Attorney General.","verbatim":true,"ref":"CA SB 53 §22757.15(a)-(b)","tags":["Measurement","Enforcement"],"badges":[{"label":"CA SB 53 §22757.15(a)-(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Penalties","text":"Same enforcement regime as above: violations constitute unfair trade practice under the Colorado Consumer Protection Act (§6-1-105(1)(hhhh)), enforced exclusively by the Attorney General. No specific dollar amounts in the CAIA. No private right of action.","verbatim":false,"ref":"CO SB 24-205 §6-1-1706","tags":["Measurement","Enforcement"],"badges":[{"label":"CO SB 24-205 §6-1-1706","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Penalties","text":"Failure to publish or transmit required transparency documents constitutes a violation. The Attorney General may bring a civil action for penalties up to $1,000,000 for a first violation and up to $3,000,000 per subsequent violation (§1427(1)). No private right of action (§1427(2)).","verbatim":false,"ref":"NY S8828 §1427(1)-(2)","tags":["Measurement","Enforcement"],"badges":[{"label":"NY S8828 §1427(1)-(2)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["Definition","Scope","Consequences","Penalties"]}]}];

// ── term auto-linking ─────────────────────────────────────────────────────────
const TERMS_SORTED = Object.keys(INDEX).sort((a,b) => b.length - a.length);

function buildLinkedText(text, sourceConceptId) {
  const matches = [];
  for (const term of TERMS_SORTED) {
    const info = INDEX[term];
    if (info.concept === sourceConceptId) continue;
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx = new RegExp('(?<![a-zA-Z0-9])(' + escaped + ')(?![a-zA-Z0-9])', 'gi');
    let m;
    while ((m = rx.exec(text)) !== null) {
      const start = m.index, end = m.index + m[0].length;
      if (matches.some(x => !(end <= x.start || start >= x.end))) continue;
      matches.push({ start, end, match: m[0], term, info });
    }
  }
  matches.sort((a,b) => a.start - b.start);
  let html = '', pos = 0;
  for (const { start, end, match, term, info } of matches) {
    if (start > pos) html += escH(text.slice(pos, start));
    html += '<span class="term-link"'
      + ' data-term="' + escH(term) + '"'
      + ' data-tab="'  + escH(info.tab) + '"'
      + ' data-concept="' + escH(info.concept) + '"'
      + ' onclick="onTermClick(this)">' + escH(match) + '</span>';
    pos = end;
  }
  if (pos < text.length) html += escH(text.slice(pos));
  return html;
}

// ── term click ────────────────────────────────────────────────────────────────
function onTermClick(el) {
  if (linksMode === 'off') return;
  if (clickMode === 'jump') {
    jumpToConcept(el.dataset.tab, el.dataset.concept);
  } else if (clickMode === 'reverse') {
    showReversePopup(el.dataset.term, el.dataset.tab, el.dataset.concept);
  } else {
    showTermChoice(el);
  }
}

function showTermChoice(el) {
  closeTermChoice();
  const rect = el.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'term-choice';
  pop.id = 'term-choice-popup';
  pop.innerHTML =
    '<button class="term-choice-btn" data-action="jump"><span class="tc-icon">→</span><span class="tc-label">Jump to definition</span></button>'
    + '<button class="term-choice-btn" data-action="reverse"><span class="tc-icon">🔍</span><span class="tc-label">Where is it used?</span></button>';
  pop.style.left = rect.left + 'px';
  pop.style.top  = (rect.bottom + 4) + 'px';
  pop.style.position = 'fixed';
  document.body.appendChild(pop);

  pop.addEventListener('click', function(e) {
    const btn = e.target.closest('.term-choice-btn');
    if (!btn) return;
    closeTermChoice();
    if (btn.dataset.action === 'jump') {
      jumpToConcept(el.dataset.tab, el.dataset.concept);
    } else {
      showReversePopup(el.dataset.term, el.dataset.tab, el.dataset.concept);
    }
  });

  // Close on outside click (delayed to avoid immediate close)
  setTimeout(() => document.addEventListener('click', _closeTermChoiceOutside, { once:true }), 10);
}

function closeTermChoice() {
  const existing = document.getElementById('term-choice-popup');
  if (existing) existing.remove();
}
function _closeTermChoiceOutside(e) {
  const pop = document.getElementById('term-choice-popup');
  if (pop && !pop.contains(e.target)) closeTermChoice();
}

function jumpToConcept(tabId, conceptId) {
  if (activeView !== 'lexicon') showView('lexicon');
  if (activeTab !== tabId) { activeTab = tabId; renderTabs(); renderMain(); }
  setTimeout(() => {
    const card = document.getElementById('card-' + conceptId);
    if (!card) return;
    if (!card.classList.contains('open')) card.classList.add('open');
    card.scrollIntoView({ behavior:'smooth', block:'start' });
    card.classList.add('highlight-flash');
    setTimeout(() => card.classList.remove('highlight-flash'), 1700);
  }, 60);
}

// ── reverse popup ─────────────────────────────────────────────────────────────
function showReversePopup(term, ownTab, ownConceptId) {
  const usages = [];
  const termRx = new RegExp('(?<![a-zA-Z0-9])(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')(?![a-zA-Z0-9])', 'i');
  for (const tab of DATA) {
    for (const concept of tab.concepts) {
      if (concept.id === ownConceptId) continue;
      for (const entry of concept.entries) {
        for (const [jid, jd] of Object.entries(entry.jdata)) {
          if (!jd || !jd.text || !termRx.test(jd.text)) continue;
          const m = termRx.exec(jd.text);
          const s = Math.max(0, m.index-60), e = Math.min(jd.text.length, m.index+m[0].length+60);
          const snippet = (s>0?'…':'') + jd.text.slice(s,e) + (e<jd.text.length?'…':'');
          usages.push({ conceptName:concept.name, entryLabel:entry.rowLabel,
            snippet, tabId:tab.tabId, conceptId:concept.id });
          break;
        }
      }
    }
  }

  let ownDef = '';
  for (const tab of DATA) for (const c of tab.concepts) {
    if (c.id !== ownConceptId) continue;
    for (const e of c.entries) {
      const jd = Object.values(e.jdata).find(x => x && x.text);
      if (jd) { ownDef = jd.text; break; }
    }
  }

  let html = '';
  if (ownDef) html += '<div class="psec-title">Definition</div>'
    + '<div class="popup-def">' + escH(ownDef.slice(0,300)) + (ownDef.length>300?'…':'') + '</div>';

  html += '<div class="psec-title" style="margin-top:14px">Appears in ' + usages.length + ' term definition(s)</div>';
  if (usages.length) {
    html += '<div class="usage-list">';
    for (const u of usages) {
      html += '<div class="usage-item" data-tab="' + escH(u.tabId) + '" data-concept="' + escH(u.conceptId) + '" onclick="jumpToConcept(this.dataset.tab,this.dataset.concept);closePopup()">'
        + '<div class="usage-term">' + escH(u.conceptName) + ' — ' + escH(u.entryLabel) + '</div>'
        + '<div class="usage-snippet">' + escH(u.snippet) + '</div>'
        + '</div>';
    }
    html += '</div>';
  } else {
    html += '<div style="color:var(--text-sub);font-size:13px;margin-top:6px">Not found in other definitions.</div>';
  }

  document.getElementById('popup-title').textContent = '"' + term + '" — used in ' + usages.length + ' term(s)';
  document.getElementById('popup-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function closePopup() { document.getElementById('overlay').classList.remove('open'); }
function closePopupIfBg(e) { if (e.target===e.currentTarget) closePopup(); }

  if (!url) return;
  if (lawMode === 'newtab') { window.open(url,'_blank','noopener'); return; }
  const src = sourceId ? SRC_MAP[sourceId] : null;
  const panel = document.getElementById('law-panel');

  document.getElementById('lp-title').textContent = label;
  document.getElementById('lp-src-name').textContent = src ? src.name : label;
  document.getElementById('lp-src-full').textContent = src ? src.full : '';

  // Build links list
  let linksHtml = '';
  if (src && src.refs) {
    for (const ref of src.refs) {
      linksHtml += '<a class="lp-link" href="' + escH(ref.url) + '" target="_blank" rel="noopener">'
        + '<span class="lp-link-icon">📄</span>'
        + '<span class="lp-link-label">' + escH(ref.label) + '</span>'
        + '<span class="lp-link-arrow">↗</span>'
        + '</a>';
    }
  } else {
    linksHtml += '<a class="lp-link" href="' + escH(url) + '" target="_blank" rel="noopener">'
      + '<span class="lp-link-icon">📄</span>'
      + '<span class="lp-link-label">' + escH(label) + '</span>'
      + '<span class="lp-link-arrow">↗</span>'
      + '</a>';
  }
  document.getElementById('lp-links').innerHTML = linksHtml;

  const canEmbed = src ? src.embed : false;
  const note = canEmbed
    ? 'This site may allow embedding. Switch to the "Try embed" tab to view inline.'
    : 'This site blocks embedding (X-Frame-Options: SAMEORIGIN). Use the links above to open in a new tab.';
  document.getElementById('lp-note').textContent = note;

  // Pre-load iframe URL
  document.getElementById('lp-iframe').src = url;
  setLpTab('ext');
  panel.classList.add('open');
}

// ── render main ───────────────────────────────────────────────────────────────
function navigateToTerm(tabId, termName) {
  if (!tabId) return;
  showView('lexicon');
  activeTab = tabId; renderTabs();
  // Find matching concept
  const tab = DATA.find(t => t.tabId === tabId);
  if (!tab) { renderMain(); return; }
  const slug = termName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  let conceptId = '';
  for (const c of tab.concepts) {
    if (c.id === slug || c.name.toLowerCase().includes(termName.toLowerCase())) {
      conceptId = c.id; break;
    }
  }
  renderMain();
  if (conceptId) {
    setTimeout(() => jumpToConcept(tabId, conceptId), 80);
  }
}

    let html = '<div class="overview-wrap">'
      + '<h2 class="overview-title">AI Regulatory Concepts Overview</h2>'
      + '<p class="overview-sub">Click any term to navigate to its detailed comparison across jurisdictions.</p>'
      + '<table class="matrix-table"><thead><tr><th>Cluster</th>';
    for (const j of jcols) html += '<th data-j="' + j.id + '">' + escH(j.label) + '</th>';
    html += '</tr></thead><tbody>';
    let prevCluster = '';
    for (const row of MATRIX) {
      html += '<tr>';
      if (row.cluster !== prevCluster) {
        html += '<td class="cluster-label">' + escH(row.cluster) + '</td>';
        prevCluster = row.cluster;
      } else {
        html += '<td></td>';
      }
      for (const cell of row.cells) {
        if (cell) {
          html += '<td><span class="matrix-pill" data-j="' + cell.jid + '"'
            + (cell.tab ? ' data-tab="' + escH(cell.tab) + '" data-term="' + escH(cell.term) + '" onclick="navigateToTerm(this.dataset.tab,this.dataset.term)"' : '')
            + '>' + escH(cell.term) + '</span></td>';
        } else {
          html += '<td><span class="matrix-empty">—</span></td>';
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    main.innerHTML = html;
    return;
  }

  // ── Data Map ──
  if (activeView === 'datamap') {
    let html = '<div class="dmap-wrap">'
      + '<h2 class="dmap-title">Data Map: Excel → Tool</h2>'
      + '<p class="dmap-sub">How each sheet in the Excel workbook maps to a feature in this tool.</p>'
      + '<table class="dmap-table"><thead><tr>'
      + '<th>Excel Sheet</th><th>Tool Feature</th><th>Jurisdictions</th><th>Status</th>'
      + '</tr></thead><tbody>';
    for (const d of DMAP) {
      const badge = d.status === 'active'
        ? '<span class="dmap-badge active">Active</span>'
        : '<span class="dmap-badge future">Future</span>';
      const tabLink = d.status === 'active' && d.tab !== 'Term index (auto-linking)' && d.tab !== 'Law Sources panel' && d.tab !== 'Overview (frontpage)'
        ? '<span class="dmap-link" data-action="lexicon" onclick="showView(this.dataset.action)">' + escH(d.tab) + '</span>'
        : escH(d.tab);
      html += '<tr><td>' + escH(d.sheet) + '</td><td>' + tabLink + '</td>'
        + '<td>' + escH(d.jurisdictions) + '</td><td>' + badge + '</td></tr>';
    }
    html += '</tbody></table></div>';
    main.innerHTML = html;
    return;
  }

  // ── Sources view ──
  if (activeView === 'sources') {
    let html = '<div style="padding:0 0 16px"><h2 style="font-size:18px;font-weight:600;margin-bottom:4px">Law Sources</h2>'
      + '<p style="font-size:13px;color:var(--text-sub)">Official texts and key references for each act tracked in this lexicon.</p></div>'
      + '<div class="sources-grid">';
    for (const src of SOURCES) {
      html += '<div class="source-card">'
        + '<div class="source-card-name">' + escH(src.name) + '</div>'
        + '<div class="source-card-full">' + escH(src.full) + '</div>'
        + '<div class="source-card-links">';
      for (const ref of src.refs) {
        html += '<a class="sc-link" href="' + escH(ref.url) + '" target="_blank" rel="noopener">'
          + '<span>📄 ' + escH(ref.label) + '</span>'
          + (src.embed ? '<span class="embed-badge">embeds</span>' : '<span class="no-embed-badge">no embed</span>')
          + '</a>';
      }
      html += '</div></div>';
    }
    html += '</div>';
    main.innerHTML = html;
    return;
  }

  // ── Lexicon view ──
  const tab = DATA.find(t => t.tabId === activeTab);
  if (!tab) return;
  const q = searchQ;

  const cards = tab.concepts
    .filter(c => !q || c.name.toLowerCase().includes(q)
      || c.entries.some(e => Object.values(e.jdata).some(jd => jd && jd.text && jd.text.toLowerCase().includes(q))))
    .map(concept => {
      const body = concept.entries.map(entry => {
        const jcards = tab.jdefs.map(jdef => {
          const jd = entry.jdata[jdef.id];
          if (!jd) return '';
          const linked = linksMode==='on' ? buildLinkedText(jd.text, concept.id) : escH(jd.text);
          return '<div class="jcard" data-j="' + jdef.id + '">'
            + '<div class="jcard-header">'
            + '<span class="j-pill" data-j="' + jdef.id + '">' + escH(jdef.label) + '</span>'
            + (jd.label ? '<span class="jcard-term-label">' + escH(jd.label) + '</span>' : '')
            + '</div>'
            + '<div class="jcard-text' + (jd.verbatim?' verbatim':'') + '">' + linked + '</div>'
            + renderBadges(jd.badges)
            + '</div>';
        }).filter(Boolean).join('');
        const noteIcon = entry.note_tooltip
          ? '<span class="note-icon" data-note="' + escH(entry.note_tooltip).replace(/"/g,'&quot;') + '">i</span>'
          : '';
        return '<div class="entry-label">' + escH(entry.rowLabel||'Entry') + noteIcon + '</div>'
          + '<div class="jcard-grid">' + jcards + '</div>';
      }).join('');

      // Analysis note at bottom of concept
      let noteSection = '';
      if (concept.analysis_note) {
        const noteId = 'note-' + concept.id;
        noteSection = '<div class="analysis-note-section" id="' + noteId + '">'
          + '<button class="analysis-note-toggle" data-target="' + noteId + '" onclick="toggleNoteSection(this.dataset.target)">'
          + '<span class="chevron">▼</span> Interpretative notes</button>'
          + '<div class="analysis-note-body">' + escH(concept.analysis_note.full_note) + '</div>'
          + '</div>';
      }

      return '<div class="concept-card open" id="card-' + concept.id + '">'
        + '<div class="concept-header" data-id="' + concept.id + '" onclick="toggleCard(this.dataset.id)">'
        + '<span class="concept-name">' + escH(concept.name) + '</span>'
        + (concept.analysis_note ? '<span style="font-size:11px;color:#b45309;margin-left:8px;font-weight:500">📝 Notes</span>' : '')
        + '<span class="concept-chevron">⌄</span>'
        + '</div>'
        + '<div class="concept-body">' + body + noteSection + '</div>'
        + '</div>';
    }).join('');

  main.innerHTML = cards || '<p style="padding:24px;color:var(--text-sub)">No results.</p>';
}

function toggleCard(id) {
  document.getElementById('card-'+id).classList.toggle('open');
}
function toggleNoteSection(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── init ──────────────────────────────────────────────────────────────────────
renderTabs();
showView('overview');
</script>
</body>
</html>
