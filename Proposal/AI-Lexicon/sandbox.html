two weeks after that requirement is met or it becomes known that it will be met. That notification shall include the information necessary to demonstrate that the relevant requirement has been met. If the Commission becomes aware of a general-purpose AI model presenting systemic risks of which it has not been notified, it may decide to designate it as a model with systemic risk.","verbatim":true,"ref":"AIA Article 52(1)","tags":["obligations","notification"],"badges":[{"label":"AIA Article 52(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_52","sourceId":"eu-ai-act"}]},"ca":{"label":"Frontier model - obligations - annual certification","text":"(a) A frontier developer shall not make, adopt, enforce, or enter into a rule, regulation, policy, or contract that prevents a covered employee from disclosing, or retaliates against a covered employee for disclosing, information to the Attorney General, a federal authority, a person with authority over the covered employee, or another covered employee who has authority to investigate, discover, or correct the reported issue, if the covered employee has reasonable cause to believe that the information discloses either of the following:\n(1) The frontier developer's activities pose a specific and substantial danger to the public health or safety resulting from a catastrophic risk.\n(2) The frontier developer has violated Chapter 25.1 (commencing with Section 22757.10) of Division 8 of the Business and Professions Code.","verbatim":true,"ref":"CA SB 53, Labor Code §1107.1(a)","tags":["obligations","whistleblower"],"badges":[{"label":"CA SB 53, Labor Code §1107.1(a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":null,"ny":{"label":"Frontier model - obligations - annual review","text":"A large frontier developer shall review and, as appropriate, update its frontier AI framework at least once per year. If a large frontier developer makes a material modification to its frontier AI framework, it shall clearly and conspicuously publish the modified framework and a justification for that modification within 30 days.","verbatim":true,"ref":"NY S8828 §1421(2)","tags":["obligations","annual review"],"badges":[{"label":"NY S8828 §1421(2)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}},"note_tooltip":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far."},{"id":"gpai-model-with-systemic-risk-4","rowLabel":"GPAI with systemic risk - obligations - model evaluation","typeLabel":"GPAI with systemic risk - obligations - model evaluation","jdata":{"eu":{"label":"GPAI with systemic risk - obligations - model evaluation","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n\n(a) perform model evaluation in accordance with standardised protocols and tools reflecting the state of the art, including conducting and documenting adversarial testing of the model with a view to identifying and mitigating systemic risks;","verbatim":true,"ref":"AIA Article 55(1)(a)","tags":["obligations","evaluation","adversarial testing"],"badges":[{"label":"AIA Article 55(1)(a)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"ca":{"label":"Frontier model - penalties","text":"§22757.15.(a) A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12, fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation.\n(b) A civil penalty described in this section shall be recovered in a civil action brought only by the Attorney General.\n§22757.16. The loss of value of equity does not count as damage to or loss of property for the purposes of this chapter.","verbatim":true,"ref":"CA SB 53 §22757.15; §22757.16","tags":["penalties"],"badges":[{"label":"CA SB 53 §22757.15","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"},{"label":"§22757.16","url":null,"sourceId":null}]},"co":null,"ny":null},"note_tooltip":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far."},{"id":"gpai-model-with-systemic-risk-5","rowLabel":"GPAI with systemic risk - obligations - risk assessment and mitigation","typeLabel":"GPAI with systemic risk - obligations - risk assessment and mitigation","jdata":{"eu":{"label":"GPAI with systemic risk - obligations - risk assessment and mitigation","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n\n(b) assess and mitigate possible systemic risks at Union level, including their sources, that may stem from the development, the placing on the market, or the use of general-purpose AI models with systemic risk;","verbatim":true,"ref":"AIA Article 55(1)(b)","tags":["obligations","risk assessment","mitigation"],"badges":[{"label":"AIA Article 55(1)(b)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null},"note_tooltip":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far."},{"id":"gpai-model-with-systemic-risk-6","rowLabel":"GPAI with systemic risk - obligations - incident reporting","typeLabel":"GPAI with systemic risk - obligations - incident reporting","jdata":{"eu":{"label":"GPAI with systemic risk - obligations - incident reporting","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n\n(c) keep track of, document, and report, without undue delay, to the AI Office and, as appropriate, to national competent\nauthorities, relevant information about serious incidents and possible corrective measures to address them;","verbatim":true,"ref":"AIA Article 55(1)(c)","tags":["obligations","incident reporting"],"badges":[{"label":"AIA Article 55(1)(c)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null},"note_tooltip":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far."},{"id":"gpai-model-with-systemic-risk-7","rowLabel":"GPAI with systemic risk - obligations - cybersecurity","typeLabel":"GPAI with systemic risk - obligations - cybersecurity","jdata":{"eu":{"label":"GPAI with systemic risk - obligations - cybersecurity","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n\n(d) ensure an adequate level of cybersecurity protection for the general-purpose AI model with systemic risk and the physical infrastructure of the model.","verbatim":true,"ref":"AIA Article 55(1)(d)","tags":["obligations","cybersecurity"],"badges":[{"label":"AIA Article 55(1)(d)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null},"note_tooltip":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far."},{"id":"gpai-model-with-systemic-risk-8","rowLabel":"GPAI with systemic risk - penalties","typeLabel":"GPAI with systemic risk - penalties","jdata":{"eu":{"label":"GPAI with systemic risk - penalties","text":"1. The Commission may impose on providers of general-purpose AI models fines not exceeding 3 % of their annual total\nworldwide turnover in the preceding financial year or EUR 15 000 000, whichever is higher., when the Commission finds\nthat the provider intentionally or negligently:\n\n(a) infringed the relevant provisions of this Regulation;\n\n(b) failed to comply with a request for a document or for information pursuant to Article 91, or supplied incorrect,\nincomplete or misleading information;\n\n(c) failed to comply with a measure requested under Article 93;\n\n(d) failed to make available to the Commission access to the general-purpose AI model or general-purpose AI model with\nsystemic risk with a view to conducting an evaluation pursuant to Article 92.\n\nIn fixing the amount of the fine or periodic penalty payment, regard shall be had to the nature, gravity and duration of the\ninfringement, taking due account of the principles of proportionality and appropriateness. The Commission shall also into\naccount commitments made in accordance with Article 93(3) or made in relevant codes of practice in accordance with\nArticle 56.","verbatim":true,"ref":"AIA Article 101(1)","tags":["penalties","fines"],"badges":[{"label":"AIA Article 101(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_101","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}}],"types":["Systemic risk - definition","GPAI with systemic risk - classification criteria","GPAI with systemic risk - scope","GPAI with systemic risk - obligations - notification","GPAI with systemic risk - obligations - model evaluation","GPAI with systemic risk - obligations - risk assessment and mitigation","GPAI with systemic risk - obligations - incident reporting","GPAI with systemic risk - obligations - cybersecurity","GPAI with systemic risk - penalties"],"analysis_note":{"full_note":"This table compares the terms and respective obligations of ‘Provider of general purpose AI models with systemic risk’  (AI Act), ‘large developer’ (New York A6453B),  and ‘frontier developer’ / ‘large frontier developer’ (California SB53, New York S8828).\nIt should be noted that S8828 will amend bill A6453B. The bill is currently pending governor approval.\n\n1. Scope: the compute threshold\nThe AIA puts in place for obligations for GPAI models with systemic risk starting at 10^25 FLOPs in training compute, whereas California’s SB53 and New York’s S8828, set the bar higher, designating frontier models with catastrophic risks only those starting at 10^26 FLOPs in compute. \nIn the US, there are no significant regulatory requirements for developers of frontier models below the 10^26 FLOPs threshold. In contrast, in the EU, not only is the FLOPs threshold lower – therefore covering more models – as there are still provisions in place for providers of GPAI models below this compute threshold (see ‘providers of GPAI models’).\n\n2. Tiered regulatory requirements\nWhere the AIA puts in place equal obligations for all providers of GPAI models with systemic risk, California (SB 53) and New York (S8828) have different requirements for smaller and larger frontier developers, putting forward a tiered approach where ‘frontier developers’ have a limited set of obligations and ‘large frontier developers’ – that is, those who have over $500M in annual gross revenues – must comply with a larger set of regulatory requirements. A similar approach was adopted in New York’s A6453B, with only those spending over $1M in compute costs being covered by the regulation.\n\n3. Obligations: risk management\nObligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. \nDespite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues.\nOne core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far.\n\n4. Notification and registration\nAs per the AIA, providers must notify the European Commission when their GPAI models meet (or are expect to meet) the systemic risk threshold.\nA similar approach is adopted in New York’s S8828, with large developers being obliged to file a disclosure statement, to be updated every two years, and pay a respective share. California’s SB53 does not have such requirements in place. \n\n5. Reporting: incidents and risks\nWhile incident reporting is mandatory in the AIA, SB53 and S8828, with the US states having much shorter deadlines for doing so (24 to 72 hours versus 25 hours to 15 days in the EU), the US-states put in place additional reporting obligations.\nCalifornia and New York require quarterly reports summarising catastrophic risk assessments. The EU AI Act does not have a quarterly reporting requirement.\n\n6. Exemptions\nWhile open source AI models are exempt from certain obligations under the AIA (Article 53), this is not the case for GPAI models with systemic risks.\nIn New York, accredited colleges and universities, as well as members of the Empire AI consortium (universities partnership), are exempt from all obligations under S8828 and A6453B.","subtopics":{"scope":"the compute threshold The AIA puts in place for obligations for GPAI models with systemic risk starting at 10^25 FLOPs in training compute, whereas California’s SB53 and New York’s S8828, set the bar higher, designating frontier models with catastrophic risks only those starting at 10^26 FLOPs in compute. In the US, there are no significant regulatory requirements for developers of frontier models below the 10^26 FLOPs threshold. In contrast, in the EU, not only is the FLOPs threshold lower – therefore covering more models – as there are still provisions in place for providers of GPAI models below this compute threshold (see ‘providers of GPAI models’).","tiered regulatory requirements":"Where the AIA puts in place equal obligations for all providers of GPAI models with systemic risk, California (SB 53) and New York (S8828) have different requirements for smaller and larger frontier developers, putting forward a tiered approach where ‘frontier developers’ have a limited set of obligations and ‘large frontier developers’ – that is, those who have over $500M in annual gross revenues – must comply with a larger set of regulatory requirements. A similar approach was adopted in New York’s A6453B, with only those spending over $1M in compute costs being covered by the regulation.","obligations":"risk management Obligations for provider of GPAI models with systemic risk are comparable to those in place in California and New York for large frontier developers. All regulations require these providers / developers to perform continuous post-market monitoring of their models and put in place risk management frameworks that should be reviewed, at least, once per year: the AIA’s ‘Safety and Security Framework’ and California’s and New York’s ‘Frontier AI Framework’. Despite some nuances across these frameworks, they all emphasise the relevance of involving third-parties in model evaluation, determining acceptable risk and put in place important cybersecurity measures. It should be noted that, in the two US states, such obligations do not apply to frontier developers with less than $500M in annual gross revenues. One core difference between the EU and the US, is the AIA’s requirement for putting in place a comprehensive copyright compliance policy that provides a mechanism for creators to opt-out of training. In the US, developers must provide a summary of datasets (including copyrighted ones), but there is no such opt-out mechanism in place. Specific AI copyright bills (e.g., California AB-412) have failed to pass so far.","notification and registration":"As per the AIA, providers must notify the European Commission when their GPAI models meet (or are expect to meet) the systemic risk threshold. A similar approach is adopted in New York’s S8828, with large developers being obliged to file a disclosure statement, to be updated every two years, and pay a respective share. California’s SB53 does not have such requirements in place.","reporting":"incidents and risks While incident reporting is mandatory in the AIA, SB53 and S8828, with the US states having much shorter deadlines for doing so (24 to 72 hours versus 25 hours to 15 days in the EU), the US-states put in place additional reporting obligations. California and New York require quarterly reports summarising catastrophic risk assessments. The EU AI Act does not have a quarterly reporting requirement.","exemptions":"While open source AI models are exempt from certain obligations under the AIA (Article 53), this is not the case for GPAI models with systemic risks. In New York, accredited colleges and universities, as well as members of the Empire AI consortium (universities partnership), are exempt from all obligations under S8828 and A6453B."}}},{"id":"general-purpose-ai-system","name":"General-purpose AI system / Generative artificial intelligence","names":{"eu":"General-purpose AI system","ca":"Generative artificial intelligence"},"entries":[{"id":"general-purpose-ai-system-0","rowLabel":"GPAI system - definition","typeLabel":"GPAI system - definition","jdata":{"eu":{"label":"GPAI system - definition","text":"general-purpose AI system' means an AI system which is based on a general-purpose AI model and which has the capability to serve a variety of purposes, both for direct use as well as for integration in other AI systems","verbatim":true,"ref":"AIA Article 3(66)","tags":["definition"],"badges":[{"label":"AIA Article 3(66)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Generative AI - definition (SB 942)","text":"(c)  “Generative artificial intelligence system” or “GenAI system” means an artificial intelligence that can generate derived synthetic content, including text, images, video, and audio, that emulates the structure and characteristics of the system’s training data.","verbatim":true,"ref":"CA SB 942 §22757.1(c)","tags":["definition"],"badges":[{"label":"CA SB 942 §22757.1(c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"co":null,"ny":null}},{"id":"general-purpose-ai-system-1","rowLabel":"GPAI system - scope","typeLabel":"GPAI system - scope","jdata":{"eu":{"label":"GPAI system - scope","text":"When a general-purpose AI model is integrated into or forms part of an AI system, this system should be considered to be general-purpose AI system when, due to this integration, this system has the capability to serve a variety of purposes. A general-purpose AI system can be used directly, or it may be integrated into other AI systems.","verbatim":true,"ref":"AIA Recital (100)","tags":["scope"],"badges":[{"label":"AIA Recital (100)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#rec_100","sourceId":"eu-ai-act"}]},"ca":{"label":"Generative AI - definition (AB 2013)","text":"(c)  “Generative artificial intelligence” means artificial intelligence that can generate derived synthetic content, such as text, images, video, and audio, that emulates the structure and characteristics of the artificial intelligence’s training data.","verbatim":true,"ref":"CA AB 2013 §3110(c)","tags":["definition"],"badges":[{"label":"CA AB 2013 §3110(c)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB2013","sourceId":"ca-ab2013"}]},"co":null,"ny":null}},{"id":"general-purpose-ai-system-2","rowLabel":"GPAI system - obligations - transparency","typeLabel":"GPAI system - obligations - transparency","jdata":{"eu":{"label":"GPAI system - obligations - transparency","text":"Providers of AI systems, including general-purpose AI systems, generating synthetic audio, image, video or text content, shall ensure that the outputs of the AI system are marked in a machine-readable format and detectable as artificially generated or manipulated. Providers shall ensure their technical solutions are effective, interoperable, robust and reliable as far as this is technically feasible, taking into account the specificities and limitations of various types of content, the costs of implementation and the generally acknowledged state of the art, as may be reflected in relevant technical standards. This obligation shall not apply to the extent the AI systems perform an assistive function for standard editing or do not substantially alter the input data provided by the deployer or the semantics thereof, or where authorised by law to detect, prevent, investigate or prosecute criminal offences.","verbatim":true,"ref":"AIA Article 50(2)","tags":["obligations","transparency"],"badges":[{"label":"AIA Article 50(2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"ca":{"label":"Generative AI - scope","text":"\"Covered provider\" means a person that creates, codes, or otherwise produces a generative artificial intelligence system that has over 1,000,000 monthly visitors or users and is publicly accessible within the geographic boundaries of the state. \"Developer\" means a person, partnership, state or local government agency, or corporation that designs, codes, produces, or substantially modifies an artificial intelligence system or service for use by members of the public.","verbatim":true,"ref":"CA SB 942 §22757.1(b); CA AB 2013, Civil Code §3110(b)","tags":["scope"],"badges":[{"label":"CA SB 942 §22757.1(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"},{"label":"CA AB 2013, Civil Code §3110(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240AB2013","sourceId":"ca-ab2013"}]},"co":null,"ny":null}},{"id":"general-purpose-ai-system-3","rowLabel":"GPAI system - obligations - interaction disclosure","typeLabel":"GPAI system - obligations - interaction disclosure","jdata":{"eu":{"label":"GPAI system - obligations - interaction disclosure","text":"Providers shall ensure that AI systems intended to interact directly with natural persons are designed and developed in such a way that the natural persons concerned are informed that they are interacting with an AI system, unless this is obvious from the point of view of a natural person who is reasonably well-informed, observant and circumspect, taking into account the circumstances and the context of use. This obligation shall not apply to AI systems authorised by law to detect, prevent, investigate or prosecute criminal offences, subject to appropriate safeguards for the rights and freedoms of third parties, unless those systems are available for the public to report a criminal offence.","verbatim":true,"ref":"AIA Article 50(1)","tags":["obligations","transparency","interaction"],"badges":[{"label":"AIA Article 50(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"ca":{"label":"Generative AI - obligations - AI detection tools (SB 942)","text":"A covered provider shall make available an AI detection tool at no cost to the user that meets all of the following criteria: (1) The tool allows a user to assess whether image, video, or audio content, or content that is any combination thereof, was created or altered by the covered provider's GenAI system. (2) The tool outputs any system provenance data that is detected in the content. (3) The tool does not output any personal provenance data that is detected in the content. (4) Subject to subparagraph (B), the tool is publicly accessible. (5) The tool allows a user to upload content or provide a uniform resource locator (URL) linking to online content. (6) The tool supports an application programming interface that allows a user to invoke the tool without visiting the covered provider's internet website.","verbatim":true,"ref":"CA SB 942 §22757.2(a)","tags":["obligations","detection","transparency"],"badges":[{"label":"CA SB 942 §22757.2(a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"co":null,"ny":null}},{"id":"general-purpose-ai-system-4","rowLabel":"GPAI system - penalties","typeLabel":"GPAI system - penalties","jdata":{"eu":{"label":"GPAI system - penalties","text":"Non-compliance with the transparency obligations for providers and deployers pursuant to Article 50 shall be subject to administrative fines of up to EUR 15,000,000 or, if the offender is an undertaking, up to 3% of its total worldwide annual turnover for the preceding financial year, whichever is higher.\n\nIn the case of SMEs, including start-ups, each fine referred to in this Article shall be up to the percentages or amount\nreferred to in paragraphs 3, 4 and 5, whichever thereof is lower.","verbatim":false,"ref":"AIA Article 99(4)(g), (6)","tags":["penalties","fines"],"badges":[{"label":"AIA Article 99(4)(g), (6)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"ca":{"label":"Generative AI - obligations - provenance disclosure (SB 942)","text":"\"Provenance data\" means data that is embedded into digital content, or that is included in the digital content's metadata, for the purpose of verifying the digital content's authenticity, origin, or history of modification.","verbatim":true,"ref":"CA SB 942 §22757.1(i)","tags":["obligations","provenance"],"badges":[{"label":"CA SB 942 §22757.1(i)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202320240SB942","sourceId":"ca-sb942"}]},"co":null,"ny":null}}],"types":["GPAI system - definition","GPAI system - scope","GPAI system - obligations - transparency","GPAI system - obligations - interaction disclosure","GPAI system - penalties"]},{"id":"generative-ai-obligations-training-data-transparency-ab-2013","name":"Generative AI - obligations - training data transparency (AB 2013)","names":{"ca":"Generative AI - obligations - training data transparency (AB 2013)"},"entries":[],"types":[]},{"id":"generative-ai-obligations-latent-disclosure-sb-942","name":"Generative AI - obligations - latent disclosure (SB 942)","names":{"ca":"Generative AI - obligations - latent disclosure (SB 942)"},"entries":[],"types":[]},{"id":"generative-ai-obligations-manifest-disclosure-sb-942","name":"Generative AI - obligations - manifest disclosure (SB 942)","names":{"ca":"Generative AI - obligations - manifest disclosure (SB 942)"},"entries":[],"types":[]},{"id":"generative-ai-penalties","name":"Generative AI - penalties","names":{"ca":"Generative AI - penalties"},"entries":[],"types":[]},{"id":"high-risk-ai-system","name":"High-risk AI system","names":{"eu":"High-risk AI system"},"entries":[{"id":"high-risk-ai-system-0","rowLabel":"High-risk AI system - definition","typeLabel":"High-risk AI system - definition","jdata":{"eu":{"label":"High-risk AI system - definition","text":"1. Irrespective of whether an AI system is placed on the market or put into service independently of the products referred to in points (a) and (b), that AI system shall be considered to be high-risk where both of the following conditions are fulfilled:\n\n(a) the AI system is intended to be used as a safety component of a product, or the AI system is itself a product, covered by the Union harmonisation legislation listed in Annex I;\n\n(b) the product whose safety component pursuant to point (a) is the AI system, or the AI system itself as a product, is required to undergo a third-party conformity assessment, with a view to the placing on the market or the putting into service of that product pursuant to the Union harmonisation legislation listed in Annex I.\n\n2. In addition to the high-risk AI systems referred to in paragraph 1, AI systems referred to in Annex III shall be\nconsidered to be high-risk.","verbatim":true,"ref":"AIA Article 6(1), (2)","tags":["definition"],"badges":[{"label":"AIA Article 6(1), (2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_6","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}},{"id":"high-risk-ai-system-1","rowLabel":"High-risk AI system - scope","typeLabel":"High-risk AI system - scope","jdata":{"eu":{"label":"High-risk AI system - scope","text":"3. By derogation from paragraph 2, an AI system referred to in Annex III shall not be considered to be high-risk where it does not pose a significant risk of harm to the health, safety or fundamental rights of natural persons, including by not materially influencing the outcome of decision making. The first subparagraph shall apply where any of the following conditions is fulfilled: (a) the AI system is intended to perform a narrow procedural task; (b) the AI system is intended to improve the result of a previously completed human activity; (c) the AI system is intended to detect decision-making patterns or deviations from prior decision-making patterns and is not meant to replace or influence the previously completed human assessment, without proper human review; or (d) the AI system is intended to perform a preparatory task to an assessment relevant for the purposes of the use cases listed in Annex III. Notwithstanding the first subparagraph, an AI system referred to in Annex III shall always be considered to be high-risk where the AI system performs profiling of natural persons.\n\n4. A provider who considers that an AI system referred to in Annex III is not high-risk shall document its assessment before that system is placed on the market or put into service. Such provider shall be subject to the registration obligation set out in Article 49(2). Upon request of national competent authorities, the provider shall provide the documentation of the assessment.","verbatim":true,"ref":"AIA Article 6(3), (4)","tags":["scope"],"badges":[{"label":"AIA Article 6(3), (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_6","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}},{"id":"high-risk-ai-system-2","rowLabel":"High-risk AI system - obligations - general","typeLabel":"High-risk AI system - obligations - general","jdata":{"eu":{"label":"High-risk AI system - obligations - general","text":"Article 8(1): High-risk AI systems shall comply with the requirements laid down in this Section, taking into account their intended purpose as well as the generally acknowledged state of the art on AI and AI-related technologies. The risk management system referred to in Article 9 shall be taken into account when ensuring compliance with those requirements.\n\nSection 2 requirements: Article 9 (Risk management system), Article 10 (Data and data governance), Article 11 (Technical documentation), Article 12 (Record-keeping), Article 13 (Transparency and provision of information to deployers), Article 14 (Human oversight), Article 15 (Accuracy, robustness and cybersecurity).\n\nArticle 17(1): Providers of high-risk AI systems shall put a quality management system in place that ensures compliance with this Regulation. That system shall be documented in a systematic and orderly manner in the form of written policies, procedures and instructions.\n\nAdditional provider obligations: Conformity assessment (Article 43), CE marking (Article 48), EU database registration (Article 49).","verbatim":true,"ref":"AIA Articles 8-15, 17, 43, 48, 49","tags":["obligations","general"],"badges":[{"label":"AIA Articles 8-15, 17, 43, 48, 49","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_8","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}},{"id":"high-risk-ai-system-3","rowLabel":"High-risk AI system - obligations - post-market monitoring","typeLabel":"High-risk AI system - obligations - post-market monitoring","jdata":{"eu":{"label":"High-risk AI system - obligations - post-market monitoring","text":"Article 72(1): Providers shall establish and document a post-market monitoring system in a manner that is proportionate to the nature of the AI technologies and the risks of the high-risk AI system.\n\nArticle 72(2): The post-market monitoring system shall actively and systematically collect, document and analyse relevant data which may be provided by deployers or which may be collected through other sources on the performance of high-risk AI systems throughout their lifetime, and which allow the provider to evaluate the continuous compliance of AI systems with the requirements set out in Chapter III, Section 2.\n\nArticle 72(3): The post-market monitoring system shall be based on a post-market monitoring plan. The post-market monitoring plan shall be part of the technical documentation referred to in Annex IV.\n\nArticle 73(1): Providers of high-risk AI systems placed on the Union market shall report any serious incident to the market surveillance authorities of the Member States where that incident occurred.","verbatim":true,"ref":"AIA Articles 72, 73","tags":["obligations","post-market monitoring"],"badges":[{"label":"AIA Articles 72, 73","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_72","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}},{"id":"high-risk-ai-system-4","rowLabel":"High-risk AI system - penalties","typeLabel":"High-risk AI system - penalties","jdata":{"eu":{"label":"High-risk AI system - penalties","text":"Article 99(3): Non-compliance with the prohibition of the AI practices referred to in Article 5 shall be subject to administrative fines of up to EUR 35 000 000 or, if the offender is an undertaking, up to 7 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.\n\nArticle 99(4): Non-compliance with any of the following provisions related to operators or notified bodies, other than those laid down in Articles 5, shall be subject to administrative fines of up to EUR 15 000 000 or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher: (a) obligations of providers pursuant to Article 16; (b) obligations of authorised representatives pursuant to Article 22; (c) obligations of importers pursuant to Article 23; (d) obligations of distributors pursuant to Article 24; (e) obligations of deployers pursuant to Article 26; (f) requirements and obligations of notified bodies pursuant to Article 31, Article 33(1), (3) and (4) or Article 34; (g) transparency obligations for providers and deployers pursuant to Article 50.\n\nArticle 99(6): In the case of SMEs, including start-ups, each fine referred to in this Article shall be up to the percentages or amount referred to in paragraphs 3, 4 and 5, whichever thereof is lower.","verbatim":true,"ref":"AIA Article 99(3), (4), (6)","tags":["penalties","fines"],"badges":[{"label":"AIA Article 99(3), (4), (6)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"ca":null,"co":null,"ny":null}}],"types":["High-risk AI system - definition","High-risk AI system - scope","High-risk AI system - obligations - general","High-risk AI system - obligations - post-market monitoring","High-risk AI system - penalties"]},{"id":"ai-system-model-definition","name":"AI system / model definition","names":{"eu":"AI system / model definition","ca":"AI system / model definition","co":"AI system / model definition","ny":"AI system / model definition"},"entries":[{"id":"ai-system-model-definition-0","rowLabel":"AI system - definition","typeLabel":"AI system - definition","jdata":{"eu":{"label":"AI system - definition","text":"AI system' means a machine-based system that is designed to operate with varying levels of autonomy and that may exhibit adaptiveness after deployment, and that, for explicit or implicit objectives, infers, from the input it receives, how to generate outputs such as predictions, content, recommendations, or decisions that can influence physical or virtual environments.","verbatim":true,"ref":"AIA Article 3(1)","tags":["definition"],"badges":[{"label":"AIA Article 3(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Artificial intelligence model - definition","text":"\"Artificial intelligence model\" means an engineered or machine-based system that varies in its level of autonomy and that can, for explicit or implicit objectives, infer from the input it receives how to generate outputs that can influence physical or virtual environments.","verbatim":true,"ref":"CA SB 53 §22757.11(b)","tags":["definition"],"badges":[{"label":"CA SB 53 §22757.11(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Artificial intelligence system - definition","text":"\"Artificial intelligence system\" means any machine-based system that, for any explicit or implicit objective, infers from the inputs the system receives how to generate outputs, including content, decisions, predictions, or recommendations, that can influence physical or virtual environments.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(2)","tags":["definition"],"badges":[{"label":"CO SB 24-205 §6-1-1701(2)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Artificial intelligence model - definition","text":"\"Artificial intelligence model\" means an engineered or machine-based system that varies in its level of autonomy and that can, for explicit or implicit objectives, infer from the input it receives how to generate outputs that can influence physical or virtual environments.","verbatim":true,"ref":"NY S8828 §1420(2)","tags":["definition"],"badges":[{"label":"NY S8828 §1420(2)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"ai-system-model-definition-1","rowLabel":"AI system - scope implications","typeLabel":"AI system - scope implications","jdata":{"eu":{"label":"AI system - scope implications","text":"The EU definition uses 'AI system' and requires the system to be 'designed to operate with varying levels of autonomy' and 'may exhibit adaptiveness after deployment'. This is broader than a model-only definition, as it covers the full deployed system. The EU also separately defines 'general-purpose AI model' (Art. 3(63)) as a model that 'displays significant generality and is capable of competently performing a wide range of distinct tasks', creating a layered regulatory framework where system-level and model-level obligations are distinct.","verbatim":false,"ref":"AIA Articles 3(1), 3(63), 3(66)","tags":["scope","comparison"],"badges":[{"label":"AIA Articles 3(1), 3(63), 3(66)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Artificial intelligence model - scope implications","text":"California SB 53 defines 'artificial intelligence model' — not 'AI system' — using language derived from the NIST AI framework. The definition focuses on the model as an engineered system that infers outputs from inputs. SB 53's regulatory obligations apply specifically to 'frontier models' (foundation models trained with >10^26 FLOPs) and their developers, creating a narrower scope focused on the most capable models rather than all AI systems.","verbatim":false,"ref":"CA SB 53 §22757.11(b), (f), (i)","tags":["scope","comparison"],"badges":[{"label":"CA SB 53 §22757.11(b), (f), (i)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Artificial intelligence system - scope implications","text":"Colorado defines 'artificial intelligence system' rather than 'model', focusing on the system level. Unlike the EU, CA, and NY definitions, the Colorado definition does not include language about 'varying levels of autonomy' or 'adaptiveness'. Colorado's regulatory obligations focus specifically on 'high-risk artificial intelligence systems' — those that make or are a substantial factor in making a 'consequential decision' — and apply to both developers and deployers. This creates a use-case-driven scope rather than a capability-based threshold (like the 10^26 FLOPs in CA and NY).","verbatim":false,"ref":"CO SB 24-205 §6-1-1701(2), (9)","tags":["scope","comparison"],"badges":[{"label":"CO SB 24-205 §6-1-1701(2), (9)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Artificial intelligence model - scope implications","text":"New York S8828 uses the same NIST-derived 'artificial intelligence model' definition as California SB 53, focusing on the model rather than the system. Like California, NY's obligations apply only to frontier models (>10^26 FLOPs) and their developers, with enhanced obligations for 'large frontier developers' (>$500M annual revenue). The scope is further limited to frontier models developed, deployed, or operating in New York State, with exceptions for academic research institutions and the Empire AI Consortium.","verbatim":false,"ref":"NY S8828 §1420(2), (9), (10), §1425, §1426","tags":["scope","comparison"],"badges":[{"label":"NY S8828 §1420(2), (9), (10), §1425, §1426","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["AI system - definition","AI system - scope implications"]}]},{"tabId":"risk","label":"Risk","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"ca","label":"California"},{"id":"co","label":"Colorado"},{"id":"ny","label":"New York"}],"concepts":[{"id":"systemic-risk","name":"Systemic risk / Catastrophic risk / Consequential decision","names":{"eu":"Systemic risk","ca":"Catastrophic risk","co":"Consequential decision","ny":"Catastrophic risk"},"entries":[{"id":"systemic-risk-0","rowLabel":"Definition","typeLabel":"Definition","jdata":{"eu":{"label":"Definition","text":"systemic risk' means a risk that is specific to the high-impact capabilities of general-purpose AI models, having a significant impact on the Union market due to their reach, or due to actual or reasonably foreseeable negative effects on public health, safety, public security, fundamental rights, or the society as a whole, that can be propagated at scale across the value chain;","verbatim":true,"ref":"AIA Article 3(65)","tags":["Measurement","GPAI","Risk"],"badges":[{"label":"AIA Article 3(65)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"Definition","text":"\"Catastrophic risk\" means a foreseeable and material risk that a frontier developer's development, storage, use, or deployment of a frontier model will materially contribute to the death of, or serious injury to, more than 50 people or more than one billion dollars ($1,000,000,000) in damage to, or loss of, property arising from a single incident involving a frontier model doing any of the following:\n(A) Providing expert-level assistance in the creation or release of a chemical, biological, radiological, or nuclear weapon.\n(B) Engaging in conduct with no meaningful human oversight, intervention, or supervision that is either a cyberattack or, if committed by a human, would constitute the crime of murder, assault, extortion, or theft, including theft by false pretense.\n(C) Evading the control of its frontier developer or user.","verbatim":true,"ref":"CA SB 53 §22757.11(c)(1)","tags":["Measurement","Frontier model","Risk"],"badges":[{"label":"CA SB 53 §22757.11(c)(1)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Definition","text":"\"Consequential decision\" means a decision that has a material legal or similarly significant effect on the provision or denial to any consumer of, or the cost or terms of:\n(a) Education enrollment or an education opportunity;\n(b) Employment or an employment opportunity;\n(c) A financial or lending service;\n(d) An essential government service;\n(e) Health-care services;\n(f) Housing;\n(g) Insurance; or\n(h) A legal service.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(3)","tags":["Measurement","High-risk AI","Consumer protection"],"badges":[{"label":"CO SB 24-205 §6-1-1701(3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Definition","text":"\"Catastrophic risk\" means a foreseeable and material risk that a frontier developer's development, storage, use, or deployment of a frontier model will materially contribute to the death of, or serious injury to, more than 50 people or more than one billion dollars in damage to, or loss of, property arising from a single incident involving a frontier model doing any of the following: (I) providing expert-level assistance in the creation or release of a chemical, biological, radiological, or nuclear weapon; (II) engaging in conduct with no meaningful human oversight, intervention, or supervision that is either a cyberattack or, if the conduct had been committed by a human, would constitute the crime of murder, assault, extortion, or theft, including theft by false pretense; or (III) evading the control of its frontier developer or user.","verbatim":true,"ref":"NY S8828 §1420(3)(a)","tags":["Measurement","Frontier model","Risk"],"badges":[{"label":"NY S8828 §1420(3)(a)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"systemic-risk-1","rowLabel":"Exclusions","typeLabel":"Exclusions","jdata":{"eu":{"label":"Exclusions","text":"Article 51(1): A general-purpose AI model shall be classified as a general-purpose AI model with systemic risk if it meets any of the following conditions: (a) it has high impact capabilities evaluated on the basis of appropriate technical tools and methodologies, including indicators and benchmarks; (b) based on a decision of the Commission, ex officio or following a qualified alert from the scientific panel, it has capabilities or an impact equivalent to those set out in point (a) having regard to the criteria set out in Annex XIII.\n\nArticle 51(2): A general-purpose AI model shall be presumed to have high impact capabilities pursuant to paragraph 1, point (a), when the cumulative amount of computation used for its training measured in floating point operations is greater than 10^25.","verbatim":true,"ref":"AIA Article 51(1)-(2)","tags":["Measurement","Threshold"],"badges":[{"label":"AIA Article 51(1)-(2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_51","sourceId":"eu-ai-act"}]},"ca":{"label":"Exclusions","text":"\"Catastrophic risk\" does not include a foreseeable and material risk from any of the following:\n(A) Information that a frontier model outputs if the information is otherwise publicly accessible in a substantially similar form from a source other than a foundation model.\n(B) Lawful activity of the federal government.\n(C) Harm caused by a frontier model in combination with other software if the frontier model did not materially contribute to the harm.","verbatim":true,"ref":"CA SB 53 §22757.11(c)(2)","tags":["Measurement","Safe harbour"],"badges":[{"label":"CA SB 53 §22757.11(c)(2)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Exclusions","text":"§6-1-1701(9)(b): \"High-risk artificial intelligence system\" does not include:\n(I) An artificial intelligence system if the artificial intelligence system is intended to:\n(A) Perform a narrow procedural task; or\n(B) Detect decision-making patterns or deviations from prior decision-making patterns and is not intended to replace or influence a previously completed human assessment without sufficient human review; or\n(II) The following technologies, unless the technologies, when deployed, make, or are a substantial factor in making, a consequential decision:\n(A) Anti-fraud technology that does not use facial recognition technology;\n(B) Anti-malware;\n(C) Anti-virus;\n(D) Artificial intelligence-enabled video games;\n(E) Calculators;\n(F) Cybersecurity;\n(G) Databases;\n(H) Data storage;\n(I) Firewall;\n(J) Internet domain registration;\n(K) Internet website loading;\n(L) Networking;\n(M) Spam- and robocall-filtering;\n(N) Spell-checking;\n(O) Spreadsheets;\n(P) Web caching;\n(Q) Web hosting or any similar technology; or\n(R) Technology that communicates with consumers in natural language for the purpose of providing users with information, making referrals or recommendations, and answering questions and is subject to an accepted use policy that prohibits generating content that is discriminatory or harmful.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(9)(b)","tags":["Measurement","High-risk AI","Exclusions"],"badges":[{"label":"CO SB 24-205 §6-1-1701(9)(b)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Exclusions","text":"\"Catastrophic risk\" does not include a foreseeable and material risk from any of the following: (I) information that a frontier model outputs if the information is otherwise publicly accessible in a substantially similar form from a source other than a foundation model; (II) lawful activity of the federal government; or (III) harm caused by a frontier model in combination with other software if the frontier model did not materially contribute to the harm.","verbatim":true,"ref":"NY S8828 §1420(3)(b)","tags":["Measurement","Safe harbour"],"badges":[{"label":"NY S8828 §1420(3)(b)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"systemic-risk-2","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"Article 51(1): A general-purpose AI model shall be classified as a general-purpose AI model with systemic risk if it meets any of the following conditions: (a) it has high impact capabilities evaluated on the basis of appropriate technical tools and methodologies, including indicators and benchmarks; (b) based on a decision of the Commission, ex officio or following a qualified alert from the scientific panel, it has capabilities or an impact equivalent to those set out in point (a) having regard to the criteria set out in Annex XIII.\n\nArticle 51(2): A general-purpose AI model shall be presumed to have high impact capabilities pursuant to paragraph 1, point (a), when the cumulative amount of computation used for its training measured in floating point operations is greater than 10^25.\n\nArticle 51(3): The Commission shall adopt delegated acts in accordance with Article 97 to amend the thresholds listed in paragraphs 1 and 2 of this Article, as well as to supplement benchmarks and indicators in light of evolving technological developments, such as algorithmic improvements or increased hardware efficiency, when necessary, for these thresholds to reflect the state of the art.","verbatim":true,"ref":"AIA Article 51(1)-(2)","tags":["Measurement","GPAI","Classification"],"badges":[{"label":"AIA Article 51(1)-(2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_51","sourceId":"eu-ai-act"}]},"ca":{"label":"Scope","text":"§22757.11(h): \"Frontier developer\" means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision (i).\n\n§22757.11(i)(1): \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations.\n\n§22757.11(j): \"Large frontier developer\" means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars ($500,000,000) in the preceding calendar year.","verbatim":true,"ref":"CA SB 53 §22757.11(h)-(j)","tags":["Measurement","Frontier model","Developer"],"badges":[{"label":"CA SB 53 §22757.11(h)-(j)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Scope","text":"§6-1-1701(6): \"Deployer\" means a person doing business in this state that deploys a high-risk artificial intelligence system.\n\n§6-1-1701(7): \"Developer\" means a person doing business in this state that develops or intentionally and substantially modifies an artificial intelligence system.\n\n§6-1-1701(9)(a): \"High-risk artificial intelligence system\" means any artificial intelligence system that, when deployed, makes, or is a substantial factor in making, a consequential decision.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(6)-(7), (9)(a)","tags":["Measurement","High-risk AI","Algorithmic discrimination"],"badges":[{"label":"CO SB 24-205 §6-1-1701(6)-(7), (9)(a)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Scope","text":"§1420(8): \"Frontier developer\" means a person who has trained, or initiated the training of, a frontier model, with respect to which the person has used, or intends to use, at least as much computing power to train the frontier model as would meet the technical specifications found in subdivision nine of this section.\n\n§1420(9)(A): \"Frontier model\" means a foundation model that was trained using a quantity of computing power greater than 10^26 integer or floating-point operations.\n\n§1420(10): \"Large frontier developer\" means a frontier developer that together with its affiliates collectively had annual gross revenues in excess of five hundred million dollars in the preceding calendar year.\n\n§1425: This article shall only apply to frontier models that are developed, deployed, or operating in whole or in part in New York State.\n\n§1426: Nothing in this article shall apply to: 1. Accredited colleges and universities in New York State, to the extent such colleges and universities are engaging in academic research regarding artificial intelligence models; or 2. The Empire AI Consortium or the Institute, as such terms are defined by section three hundred sixty-one of the economic development law.","verbatim":true,"ref":"NY S8828 §1420(8)-(10), §1425, §1426","tags":["Measurement","Frontier model","Developer"],"badges":[{"label":"NY S8828 §1420(8)-(10), §1425, §1426","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"systemic-risk-3","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":{"label":"Obligations","text":"Providers of GPAI models with systemic risk shall:\n(a) perform model evaluation in accordance with standardised protocols and tools, including conducting and documenting adversarial testing;\n(b) assess and mitigate possible systemic risks at Union level, including their sources;\n(c) keep track of, document, and report, without undue delay, to the AI Office and national competent authorities, relevant information about serious incidents and possible corrective measures;\n(d) ensure an adequate level of cybersecurity protection for the general-purpose AI model with systemic risk and the physical infrastructure of the model.","verbatim":true,"ref":"AIA Article 55(1)","tags":["Measurement","Obligations","Safety"],"badges":[{"label":"AIA Article 55(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"ca":{"label":"Obligations","text":"§22757.12(a): A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a frontier AI framework that applies to the large frontier developer's frontier models and describes how the large frontier developer approaches all of the following: (1) Incorporating national standards, international standards, and industry-consensus best practices into its frontier AI framework. (2) Defining and assessing thresholds used by the large frontier developer to identify and assess whether a frontier model has capabilities that could pose a catastrophic risk, which may include multiple-tiered thresholds. (3) Applying mitigations to address the potential for catastrophic risks based on the results of assessments undertaken pursuant to paragraph (2). (4) Reviewing assessments and adequacy of mitigations as part of the decision to deploy a frontier model or use it extensively internally. (5) Using third parties to assess the potential for catastrophic risks and the effectiveness of mitigations of catastrophic risks. [...]\n\n§22757.12(b)(1): A large frontier developer shall review and, as appropriate, update its frontier AI framework at least once per year.\n\n§22757.12(c)(1): Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report.\n\n§22757.12(d): A large frontier developer shall transmit to the Office of Emergency Services a summary of any assessment of catastrophic risk resulting from internal use of its frontier models every three months or pursuant to another reasonable schedule specified by the large frontier developer and communicated in writing to the Office of Emergency Services with written updates, as appropriate.\n\n§22757.12(e)(1)(A): A frontier developer shall not make a materially false or misleading statement about catastrophic risk from its frontier models or its management of catastrophic risk.","verbatim":true,"ref":"CA SB 53 §22757.12","tags":["Measurement","Obligations","Transparency"],"badges":[{"label":"CA SB 53 §22757.12","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Obligations","text":"§6-1-1702(1): A developer of a high-risk artificial intelligence system shall use reasonable care to protect consumers from any known or reasonably foreseeable risks of algorithmic discrimination arising from the intended and contracted uses of the high-risk artificial intelligence system. [...] There is a rebuttable presumption that a developer used reasonable care as required under this section if the developer complied with this section and any additional requirements or obligations as set forth in rules promulgated by the attorney general pursuant to section 6-1-1707.\n\n§6-1-1702(2): A developer of a high-risk artificial intelligence system shall make available to the deployer or other developer: (a) a general statement describing the reasonably foreseeable uses and known harmful or inappropriate uses; (b) documentation disclosing: (I) high-level summaries of the type of data used to train the high-risk artificial intelligence system; (II) known or reasonably foreseeable limitations, including risks of algorithmic discrimination; (III) the purpose of the high-risk artificial intelligence system; (IV) the intended benefits and uses of the high-risk artificial intelligence system; and (V) all other information necessary to allow the deployer to comply with section 6-1-1703.\n\n§6-1-1702(4)(a): A developer shall make available, in a manner that is clear and readily available on the developer's website or in a public use case inventory, a statement summarizing: (I) the types of high-risk artificial intelligence systems that the developer has developed or intentionally and substantially modified and currently makes available; and (II) how the developer manages known or reasonably foreseeable risks of algorithmic discrimination.\n\n§6-1-1702(5): A developer of a high-risk artificial intelligence system shall disclose to the attorney general [...] any known or reasonably foreseeable risks of algorithmic discrimination arising from the intended uses of the high-risk artificial intelligence system without unreasonable delay but no later than ninety days after the date on which the developer discovers the risk.\n\n§6-1-1703(2)(a): A deployer of a high-risk artificial intelligence system shall implement a risk management policy and program to govern the deployer's deployment of the high-risk artificial intelligence system. The risk management policy and program must specify and incorporate the principles, processes, and personnel that the deployer uses to identify, document, and mitigate known or reasonably foreseeable risks of algorithmic discrimination.\n\n§6-1-1703(3)(a)(II): A deployer, or a third party contracted by the deployer, shall complete an impact assessment for a deployed high-risk artificial intelligence system at least annually and within ninety days after any intentional and substantial modification to the high-risk artificial intelligence system is made available.\n\n§6-1-1703(4)(a): No later than the time that a deployer deploys a high-risk artificial intelligence system to make, or be a substantial factor in making, a consequential decision concerning a consumer, the deployer shall: (I) notify the consumer that the deployer has deployed a high-risk artificial intelligence system to make, or be a substantial factor in making, a consequential decision before the decision is made.","verbatim":true,"ref":"CO SB 24-205 §6-1-1702; §6-1-1703","tags":["Measurement","Obligations","Discrimination"],"badges":[{"label":"CO SB 24-205 §6-1-1702","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"},{"label":"§6-1-1703","url":null,"sourceId":null}]},"ny":{"label":"Obligations","text":"§1421(1): A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a frontier AI framework that applies to the large frontier developer's frontier models and describes in detail how the large frontier developer handles all of the following: (a) Incorporating national standards, international standards, and industry consensus best practices into its frontier AI framework; (b) Defining and assessing thresholds used by the large frontier developer to identify and assess whether a frontier model has capabilities that could pose a catastrophic risk, which may include multiple-tiered thresholds; (c) Applying mitigations to address the potential for catastrophic risks based on the results of assessments undertaken pursuant to paragraph (b) of this subdivision; (d) Reviewing assessments and adequacy of mitigations as part of the decision to deploy a frontier model or use it extensively internally; (e) Using third parties to assess the potential for catastrophic risks and the effectiveness of mitigations of catastrophic risks; [...]\n\n§1421(2)(A): A large frontier developer shall review and, as appropriate, update its frontier AI framework at least once per year.\n\n§1421(3)(A): Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a frontier developer shall clearly and conspicuously publish on its internet website a transparency report.\n\n§1421(4)(A)(I): A frontier developer shall not make a materially false or misleading statement about catastrophic risk from its frontier models or its management of catastrophic risk.\n\n§1422(3)(A): A frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the Office within seventy-two hours from a determination that a critical safety incident has occurred.\n\n§1422(3)(B): If a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within twenty-four hours.\n\n§1422(2)(A): A large frontier developer shall transmit to the Office a summary of any assessment of catastrophic risk resulting from internal use of its frontier models every three months or pursuant to another reasonable schedule.","verbatim":true,"ref":"NY S8828 §1421, §1422","tags":["Measurement","Obligations","Transparency"],"badges":[{"label":"NY S8828 §1421, §1422","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"systemic-risk-4","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"1. The Commission may impose on providers of general-purpose AI models fines not exceeding 3 % of their annual total worldwide turnover in the preceding financial year or EUR 15 000 000, whichever is higher, when the Commission finds that the provider intentionally or negligently: (a) infringed the relevant provisions of this Regulation; (b) failed to comply with a request for a document or for information pursuant to Article 91, or supplied incorrect, incomplete or misleading information; (c) failed to comply with a measure requested under Article 93; (d) failed to make available to the Commission access to the general-purpose AI model or general-purpose AI model with systemic risk with a view to conducting an evaluation pursuant to Article 92.","verbatim":true,"ref":"AIA Article 101(1)","tags":["Measurement","Enforcement"],"badges":[{"label":"AIA Article 101(1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_101","sourceId":"eu-ai-act"}]},"ca":{"label":"Penalties","text":"(a)  A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12, fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation. (b)  A civil penalty described in this section shall be recovered in a civil action brought only by the Attorney General.","verbatim":true,"ref":"CA SB 53 §22757.15(a)-(b)","tags":["Measurement","Enforcement"],"badges":[{"label":"CA SB 53 §22757.15(a)-(b)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"co":{"label":"Penalties","text":"§6-1-1706(1): Notwithstanding section 6-1-103, the attorney general has exclusive authority to enforce this part 17.\n\n§6-1-1706(2): Except as provided in subsection (3) of this section, a violation of the requirements established in this part 17 constitutes an unfair trade practice pursuant to section 6-1-105(1)(hhhh).\n\n§6-1-1706(3): In any action commenced by the attorney general to enforce this part 17, it is an affirmative defense that the developer, deployer, or other person: (a) discovers and cures a violation of this part 17 as a result of: (I) feedback that the developer, deployer, or other person encourages deployers or users to provide to the developer, deployer, or other person; (II) adversarial testing or red teaming, as those terms are defined or used by the National Institute of Standards and Technology; or (III) an internal review process; and (b) is otherwise in compliance with: (I) the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and Technology in the United States Department of Commerce and standard ISO/IEC 42001 of the International Organization for Standardization; (II) another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or (III) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate.\n\n§6-1-1706(6): This part 17 does not provide the basis for, and is not subject to, a private right of action for violations of this part 17 or any other law.","verbatim":true,"ref":"CO SB 24-205 §6-1-1706","tags":["Measurement","Enforcement"],"badges":[{"label":"CO SB 24-205 §6-1-1706","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Penalties","text":"1. The Attorney General may bring a civil action to recover a civil penalty not to exceed $1,000,000 for a first violation and not to exceed $3,000,000 per subsequent violation, determined based on the severity of the violation where a large frontier developer fails to publish or transmit a compliant document, makes a materially false or misleading statement, fails to report an incident, or fails to comply with its own frontier AI framework (§1427(1)). 2. Nothing in this article shall be construed to establish, authorize or create a private right of action associated with violations of this article. (§1427(2)).\n\nFor disclosure violations under §1428, the Office may levy a civil penalty of $1,000 per day for failure to file or correct false information (§1428(5)).","verbatim":true,"ref":"NY S8828 §1427, §1428(5)","tags":["Measurement","Enforcement"],"badges":[{"label":"NY S8828 §1427, §1428(5)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["Definition","Exclusions","Scope","Obligations","Penalties"]},{"id":"risk-general-definition","name":"Risk (general definition) / Substantial factor / Critical safety incident","names":{"eu":"Risk (general definition)","ca":"Risk (general definition)","co":"Substantial factor","ny":"Critical safety incident"},"entries":[{"id":"risk-general-definition-0","rowLabel":"Definition","typeLabel":"Definition","jdata":{"eu":{"label":"Definition","text":"risk' means the combination of the probability of an occurrence of harm and the severity of that harm;","verbatim":true,"ref":"AIA Article 3(2)","tags":["Measurement","Risk framework"],"badges":[{"label":"AIA Article 3(2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"ca":{"label":"","text":"No equivalent general risk definition in SB 53. California uses the specific concept of \"catastrophic risk\" (see above) rather than a general risk framework.","verbatim":false,"ref":"","tags":[],"badges":[]},"co":{"label":"Definition","text":"(a) \"Substantial factor\" means a factor that:\n(I) Assists in making a consequential decision;\n(II) Is capable of altering the outcome of a consequential decision; and\n(III) Is generated by an artificial intelligence system.\n(b) \"Substantial factor\" includes any use of an artificial intelligence system to generate any content, decision, prediction, or recommendation concerning a consumer that is used as a basis to make a consequential decision concerning the consumer.","verbatim":true,"ref":"CO SB 24-205 §6-1-1701(11)(a)-(b)","tags":["Measurement","High-risk AI","Decision-making"],"badges":[{"label":"CO SB 24-205 §6-1-1701(11)(a)-(b)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"ny":{"label":"Definition","text":"\"Critical safety incident\" means any of the following: (A) unauthorized access to, modification of, or exfiltration of, the model weights of a frontier model that results in death or bodily injury; (B) harm resulting from the materialization of a catastrophic risk; (C) loss of control of a frontier model causing death or bodily injury; or (D) a frontier model that uses deceptive techniques against the frontier developer to subvert the controls or monitoring of its frontier developer outside of the context of an evaluation designed to elicit this behavior and in a manner that demonstrates materially increased catastrophic risk.","verbatim":true,"ref":"NY S8828 §1420(4)","tags":["Measurement","Safety incident","Risk"],"badges":[{"label":"NY S8828 §1420(4)","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"risk-general-definition-1","rowLabel":"Application","typeLabel":"Application","jdata":{"eu":{"label":"Application","text":"The general risk definition underpins the entire EU AI Act risk-based approach. It is used to classify AI systems into risk categories: unacceptable risk (prohibited, Art. 5), high-risk (Chapter III), limited risk (transparency obligations, Art. 50), and minimal risk (voluntary codes of conduct).","verbatim":false,"ref":"AIA Article 3(2); Recital (26)-(27)","tags":["Measurement","Risk classification"],"badges":[{"label":"AIA Article 3(2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"},{"label":"Recital (26)-(27)","url":null,"sourceId":null}]},"ca":{"label":"","text":"SB 53 focuses exclusively on \"catastrophic risk\" from frontier models without establishing a broader risk classification framework. California does not categorise AI systems by risk level in the way the EU AI Act does.","verbatim":false,"ref":"","tags":[],"badges":[]},"co":{"label":"Application","text":"\"Substantial factor\" is a key element in the definition of \"high-risk artificial intelligence system\" (§6-1-1701(9)(a)): a system is high-risk when it makes, or is a substantial factor in making, a consequential decision. It is also central to deployer obligations: deploye
