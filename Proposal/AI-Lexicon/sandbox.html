ntegrate the Model into Their AI System]\n\n1. A general description of the general-purpose AI model including:\n(a) the tasks that the model is intended to perform and the type and nature of AI systems into which it can be integrated;\n(b) the acceptable use policies applicable;\n(c) the date of release and methods of distribution;\n(d) how the model interacts, or can be used to interact, with hardware or software that is not part of the model itself, where applicable;\n(e) the versions of relevant software related to the use of the general-purpose AI model, where applicable;\n(f) the architecture and number of parameters;\n(g) the modality (e.g. text, image) and format of inputs and outputs;\n(h) the licence for the model.\n\n2. A description of the elements of the model and of the process for its development, including:\n(a) the technical means (e.g. instructions for use, infrastructure, tools) required for the general-purpose AI model to be integrated into AI systems;\n(b) the modality (e.g. text, image, etc.) and format of the inputs and outputs and their maximum size (e.g. context window length, etc.);\n(c) information on the data used for training, testing and validation, where applicable, including the type and provenance of data and curation methodologies.","verbatim":false,"ref":"EU AI Act, Annex XII","tags":[],"badges":[{"label":"EU AI Act, Annex XII","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_XII","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-10","rowLabel":"Risk management","typeLabel":"Risk management","jdata":{"eu":{"label":"Obligations","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n(a) perform model evaluation in accordance with standardised protocols and tools reflecting the state of the art, including conducting and documenting adversarial testing of the model with a view to identifying and mitigating systemic risks;\n(b) assess and mitigate possible systemic risks at Union level, including their sources, that may stem from the development, the placing on the market, or the use of general-purpose AI models with systemic risk;\n(...)\n(d) ensure an adequate level of cybersecurity protection for the general-purpose AI model with systemic risk and the physical infrastructure of the model.","verbatim":false,"ref":"EU AI Act, Article 55 (1)","tags":["general-purpose AI models","systemic risk"],"badges":[{"label":"EU AI Act, Article 55 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(2) Before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a large frontier developer shall include in the transparency report required by paragraph (1) [see 'frontier developer - obligations - general] summaries of all of the following:\n(A) Assessments of catastrophic risks from the frontier model conducted pursuant to the large frontier developer’s frontier AI framework.\n(B) The results of those assessments.\n(C) The extent to which third-party evaluators were involved.\n(D) Other steps taken to fulfill the requirements of the frontier AI framework with respect to the frontier model.","verbatim":false,"ref":"California SB53, 22757.12. (c )","tags":[],"badges":[{"label":"California SB53, 22757.12. (c )","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Obligations","text":"(b) before, or concurrently with, deploying a new frontier model or a substantially modified version of an existing frontier model, a large frontier developer shall include in the transparency report required by paragraph (a) of this subdivision [see 'frontier developer - obligations'], summaries of all of the following: \n(i) assessments of catastrophic risks from the frontier model conducted pursuant to the large frontier developer's frontier ai framework; \n(ii) the results of the assessments under subparagraph (i) of this paragraph; \n(iii) the extent to which third-party evaluators were involved; and \n(iv) other steps taken to fulfill the requirements of the frontier ai framework with respect to the frontier model.","verbatim":false,"ref":"New York S8828 (pending), § 1421","tags":[],"badges":[{"label":"New York S8828 (pending), § 1421","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-11","rowLabel":"Risk management","typeLabel":"Risk management","jdata":{"eu":{"label":"Obligations","text":"[Text adapted from guiding document for demonstrating compliance with the obligations provided for in Articles 53 and 55 of the AI Act] \n\nSignatories of the Code of Practice for General-Purpose AI models commit to:\n1. Creating, implementing update a Safety and Security Framework outlining systemic risk management processes. This includes defining trigger points for additional model evaluations and establishing risk acceptance criteria. Review Safety and Security Framework at least once per year.\n2. Following a structured process to identify risks to public health, safety, security, fundamental rights, and society. Providers must develop specific \"systemic risk scenarios\" for each identified risk.\n3. Gathering model-independent information, conducting state-of-the-art model evaluations, and estimating the probability and severity of potential harm.\n4. Specifying criteria to decide if identified risks are acceptable and only proceed with development or market placement if they meet these standards.\n5. Implementing appropriate measures such as filtering training data, fine-tuning for refusal of harmful requests, and staging model access to vetted users.\n6. Defining a \"Security Goal\" to protect against specific threat actors. This involves securing model parameters through encryption, access management, and protection against insider threats.\n7. Creating and maintaining a Safety and Security Model Report for the AI Office before placing a model on the market, describing its architecture, identified risks, and implemented mitigation strategies. In addition to internal model evaluations, providers shall ensure that adequately qualified independent external evaluators conduct model evaluations.\n8. Defining clear systemic risk responsibility allocation, through risk oversight, ownership, and assurance across all organisational levels. Signatories must promote a healthy risk culture and allocate adequate resources to these functions.\n9. Implementing processes to track, document, and report serious incidents to the AI Office without undue delay. Reporting timelines range from 2 to 15 days depending on the severity of the harm (e.g., death or critical infrastructure disruption).\n10. Keeping detailed technical documentation for at least 10 years and publish summarised, public versions of frameworks and model reports.","verbatim":false,"ref":"Code of Practice for GPAI - Safety and Security Chapter","tags":[],"badges":[{"label":"Code of Practice for GPAI - Safety and Security Chapter","url":null,"sourceId":null}]},"co":{"label":"Obligations","text":"A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on its internet website a Frontier AI Framework that applies to the large frontier developer’s frontier models and describes how the large frontier developer approaches all of the following:\n(1) Incorporating national standards, international standards, and industry-consensus best practices into its frontier AI framework.\n(2) Defining and assessing thresholds used by the large frontier developer to identify and assess whether a frontier model has capabilities that could pose a catastrophic risk, which may include multiple-tiered thresholds.\n(3) Applying mitigations to address the potential for catastrophic risks based on the results of assessments undertaken pursuant to paragraph (2).\n(4) Reviewing assessments and adequacy of mitigations as part of the decision to deploy a frontier model or use it extensively internally.\n(5) Using third parties to assess the potential for catastrophic risks and the effectiveness of mitigations of catastrophic risks.\n(6) Revisiting and updating the frontier AI framework, including any criteria that trigger updates and how the large frontier developer determines when its frontier models are substantially modified enough to require disclosures pursuant to subdivision (c) [transparency report].\n(7) Cybersecurity practices to secure unreleased model weights from unauthorized modification or transfer by internal or external parties.\n(8) Identifying and responding to critical safety incidents.\n(9) Instituting internal governance practices to ensure implementation of these processes.\n(10) Assessing and managing catastrophic risk resulting from the internal use of its frontier models, including risks resulting from a frontier model circumventing oversight mechanisms.\n(b) (1) A large frontier developer shall review and, as appropriate, update its frontier AI framework at least once per year.\n(2) If a large frontier developer makes a material modification to its frontier AI framework, the large frontier developer shall clearly and conspicuously publish the modified frontier AI framework and a justification for that modification within 30 days.","verbatim":false,"ref":"California SB53, 22757.12.","tags":[],"badges":[{"label":"California SB53, 22757.12.","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Obligations","text":"1. A large frontier developer shall write, implement, comply with, and clearly and conspicuously publish on  its internet website a Frontier AI Framework that applies to the large frontier developer's frontier models and describes in detail how the large frontier developer handles all of the following: \n(a) incorporating national standards, international standards, and industry consensus best practices into its Frontier AI Framework; \n(b) defining and assessing thresholds used by the large frontier developer to identify and assess whether a frontier model has capabilities that could pose a catastrophic risk, which may include multiple-tiered thresholds; \n(c) applying mitigations to address the potential for catastrophic risks based on the results of assessments undertaken pursuant to paragraph (b) of this subdivision; \n(d) reviewing assessments and adequacy of mitigations as part of the decision to deploy a frontier model or use it extensively internally; \n(e) using third parties to assess the potential for catastrophic risks and the effectiveness of mitigations of catastrophic risks; \n(f) revisiting and updating the Frontier AI Framework, including any criteria that trigger updates and how the large frontier developer determines when its frontier models are substantially modified enough to require disclosures pursuant to subdivision three of this section; \n(g) cybersecurity practices to secure unreleased model weights from unauthorized modification or transfer by internal or external parties; \n(h) identifying and responding to critical safety incidents; \n(i) instituting internal governance practices to ensure implementation of these processes; and \n(j) assessing and managing catastrophic risk resulting from the internal use of its frontier models, including risks resulting from a frontier model circumventing oversight mechanisms. \n2. (a) a large frontier developer shall review and, as appropriate, update its Frontier AI Framework at least once per year. \n(b) if a large frontier developer makes a material modification to its Frontier AI Framework, the large frontier developer shall clearly and conspicuously publish the modified Frontier AI Framework and a justification for that modification within thirty days.","verbatim":false,"ref":"New York S8828 (pending), § 1421","tags":[],"badges":[{"label":"New York S8828 (pending), § 1421","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-12","rowLabel":"Notification / Registration","typeLabel":"Notification / Registration","jdata":{"eu":{"label":"Obligations","text":"1.Where a general-purpose AI model meets the condition referred to in Article 51(1), point (a), the relevant provider shall notify the Commission without delay and in any event within two weeks after that requirement is met or it becomes known that it will be met. That notification shall include the information necessary to demonstrate that the relevant requirement has been met. If the Commission becomes aware of a general-purpose AI model presenting systemic risks of which it has not been notified, it may decide to designate it as a model with systemic risk.\n2.The provider of a general-purpose AI model that meets the condition referred to in Article 51(1), point (a), may present, with its notification, sufficiently substantiated arguments to demonstrate that, exceptionally, although it meets that requirement, the general-purpose AI model does not present, due to its specific characteristics, systemic risks and therefore should not be classified as a general-purpose AI model with systemic risk.","verbatim":false,"ref":"EU AI Act, Article 52 (1, 2)","tags":[],"badges":[{"label":"EU AI Act, Article 52 (1, 2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_52","sourceId":"eu-ai-act"}]},"co":null,"tx":{"label":"Obligations","text":"1. Except as otherwise provided in this section, no large frontier developer may develop, deploy, or operate a frontier model, in whole or in part in New York state, without having a current disclosure statement filed with the office and paying the required share.\n2. The disclosure statement shall be filed in the form and the manner prescribed by the office and shall contain all the information required by the office. It shall be renewed every two years, whenever ownership of the frontier model is transferred or whenever there is a material change to the information reported in the previously filed disclosure statement, whichever occurs earlier. \n3. Such disclosure statement shall identify: \n(a) the identity of the large frontier developer and all names under which such large frontier developer conducts business; \n(b) the address of the principal place of business and the address of each office it maintains in New York state; \n(c) in the event such large frontier developer or the ultimate parent of such large frontier developer is a privately or closely held company, a list of all persons or entities that beneficially own a five percent or greater interest in such large frontier developer at the time of the filing of the disclosure statement and [...]\n(d) the name and contact information of a point of contact, secondary contact, and tertiary contact for such large frontier developer. Such point of contact shall be responsible for receiving inquiries relating to this article from the office or other governmental entities.","verbatim":false,"ref":"New York S8828 (pending), § 1428","tags":[],"badges":[{"label":"New York S8828 (pending), § 1428","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-13","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":null,"co":{"label":"Obligations","text":"(d) A large frontier developer shall transmit to the Office of Emergency Services a summary of any assessment of catastrophic risk resulting from internal use of its frontier models every three months or pursuant to another reasonable schedule specified by the large frontier developer and communicated in writing to the Office of Emergency Services with written updates, as appropriate.","verbatim":false,"ref":"California SB53, 22757.12. (d)","tags":[],"badges":[{"label":"California SB53, 22757.12. (d)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Obligations","text":"2. (a) a large frontier developer shall transmit to the office a  summary of any assessment of catastrophic risk resulting from internal use of its frontier models every three months or pursuant to another reasonable schedule requested by the large frontier developer, communicated in writing to the office with written updates, as appropriate, and agreed upon by the office. The office shall establish a mechanism to be used by a large frontier developer to confidentially submit summaries of any assessments of the potential for catastrophic risk resulting from internal use of its frontier models.","verbatim":false,"ref":"New York S8828 (pending), § 1422","tags":[],"badges":[{"label":"New York S8828 (pending), § 1422","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-14","rowLabel":"Incident reporting","typeLabel":"Incident reporting","jdata":{"eu":{"label":"Obligations","text":"1. In addition to the obligations listed in Articles 53 and 54, providers of general-purpose AI models with systemic risk shall:\n(...)\n(c) keep track of, document, and report, without undue delay, to the AI Office and, as appropriate, to national competent authorities, relevant information about serious incidents and possible corrective measures to address them;","verbatim":false,"ref":"EU AI Act, Article 55 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 55 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_55","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(1) A frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the Office of Emergency Services within 15 days of discovering the critical safety incident.\n(2) If a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within 24 hours to an authority, including any law enforcement agency or public safety agency with jurisdiction, that is appropriate based on the nature of that incident and as required by law.\n(3) A frontier developer that discovers information about a critical safety incident after filing the initial report required by this subdivision may file an amended report.\n(4) A frontier developer is encouraged, but not required, to report critical safety incidents pertaining to foundation models that are not frontier models.","verbatim":false,"ref":"California SB53, 22757.13. (c )","tags":[],"badges":[{"label":"California SB53, 22757.13. (c )","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Obligations","text":"3. (...) A frontier developer shall report any critical safety incident pertaining to one or more of its frontier models to the office within seventy-two hours from a determination that a critical safety incident has occurred or within seventy-two hours of the frontier developer learning facts sufficient to establish a reasonable belief that a critical safety incident has occurred. \n(b) if a frontier developer discovers that a critical safety incident poses an imminent risk of death or serious physical injury, the frontier developer shall disclose that incident within twenty-four hours to an authority, including any law enforcement agency or public safety agency with jurisdiction, that is appropriate based on the nature of that incident and as required by law. \n(c) a frontier developer that discovers information about a critical safety incident after filing the initial report required by this subdivision may file an amended report.","verbatim":false,"ref":"New York S8828 (pending), § 1422","tags":[],"badges":[{"label":"New York S8828 (pending), § 1422","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-15","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":null,"co":{"label":"Obligations","text":"(1) A large frontier developer shall provide a reasonable internal process through which a covered employee may anonymously disclose information to the large frontier developer if the covered employee believes in good faith that the information indicates that the large frontier developer’s activities present a specific and substantial danger to the public health or safety resulting from a catastrophic risk or that the large frontier developer violated Chapter 25.1 (commencing with Section 22757.10) of Division 8 of the Business and Professions Code, including a monthly update to the person who made the disclosure regarding the status of the large frontier developer’s investigation of the disclosure and the actions taken by the large frontier developer in response to the disclosure.","verbatim":false,"ref":"California SB53, 1107.1. (e )","tags":[],"badges":[{"label":"California SB53, 1107.1. (e )","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":null}},{"id":"provider-of-general-purpose-ai-models-with-systemic-risk-16","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"3. Non-compliance with the prohibition of the AI practices referred to in Article 5 [prohibited AI practices] shall be subject to administrative fines of up to 35 000 000 EUR or, if the offender is an undertaking, up to 7 % of its total worldwide annual turnover for the preceding financial year, whichever is higher. \n4. Non-compliance with any of the following provisions (...), other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher:\n(a) obligations of providers pursuant to Article 16;\n(…)\n(g) transparency obligations for providers and deployers pursuant to Article 50.\n(...)\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (3, 4, 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (3, 4, 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"(a) A large frontier developer that fails to publish or transmit a compliant document required to be published or transmitted under this chapter, makes a statement in violation of subdivision (e) of Section 22757.12 [false claims], fails to report an incident as required by Section 22757.13, or fails to comply with its own frontier AI framework shall be subject to a civil penalty in an amount dependent upon the severity of the violation that does not exceed one million dollars ($1,000,000) per violation.","verbatim":false,"ref":"California SB53, 22757.15.(a)","tags":[],"badges":[{"label":"California SB53, 22757.15.(a)","url":"https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53","sourceId":"ca-sb53"}]},"tx":{"label":"Penalties","text":"1. The attorney general may bring a civil action to recover a civil penalty in an amount not to exceed one million dollars for a first violation and in an amount not to exceed three million dollars per subsequent violation, determined based on the severity of the violation where a large frontier developer fails to publish or transmit a compliant document required to be published or transmitted under this article, makes a statement in violation of subdivision four of section fourteen hundred twenty-one of this article, fails to report an incident as required by section fourteen hundred twenty-two of this article, or fails to comply with its own frontier AI framework.","verbatim":false,"ref":"New York S8828 (pending), § 1427","tags":[],"badges":[{"label":"New York S8828 (pending), § 1427","url":"https://www.nysenate.gov/legislation/bills/2023/S8828","sourceId":"ny-s8828"}]}}}],"types":["Provider","Model","Exemptions","General description","General information","Technical documentation","Documentation keeping","Copyright","Authorised representative","Communication to downstream providers","Risk management","Notification / Registration","Obligations","Incident reporting","Penalties"]}]},{"tabId":"deployer","label":"Deployer / Supplier","jdefs":[{"id":"eu","label":"EU (AI Act)"},{"id":"co","label":"Colorado"},{"id":"tx","label":"Texas"}],"concepts":[{"id":"deployer-supplier","name":"Deployer / Supplier","entries":[{"id":"deployer-supplier-0","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"(4) ‘deployer’ means a natural or legal person, public authority, agency or other body using an AI system under its authority except where the AI system is used in the course of a personal non-professional activity","verbatim":false,"ref":"EU AI Act, Article 3 (4)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(6) \"Deployer\" means a person doing business in this state that deploys a high-risk artificial intelligence system.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701. (6)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701. (6)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Scope","text":"(1) \"Deployer\" means a person who deploys an artificial intelligence system for use in this state.","verbatim":false,"ref":"Texas HB149, A552.001. (1)","tags":[],"badges":[{"label":"Texas HB149, A552.001. (1)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}},{"id":"deployer-supplier-1","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":null,"co":{"label":"Obligations","text":"Deployer or other developer that deploys, offers, sells, leases, licenses, gives, or otherwise makes available an artificial intelligence system that is intended to interact with consumers shall ensure the disclosure to each consumer who interacts with the artificial intelligence system that the consumer is interacting with an artificial intelligence system.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1704. (1)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1704. (1)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Obligations","text":"(b) A governmental agency that makes available an artificial intelligence system intended to interact with consumers shall disclose to each consumer, before or at the time of interaction, that the consumer is interacting with an artificial intelligence system.\n(c) A person is required to make the disclosure under Subsection (b) regardless of whether it would be obvious to a reasonable consumer that the consumer is interacting with an artificial intelligence system.\n(d) A disclosure under Subsection (b):\n(1) must be clear and conspicuous;\n(2) must be written in plain language; and\n(3) may not use a dark pattern \n[...]\n(f) If an artificial intelligence system is used in relation to health care service or treatment, the provider of the service or treatment shall provide the disclosure under Subsection (b) to the recipient of the service or treatment or the recipient ’s personal representative not later than the date the service or treatment is first provided, except in the case of emergency, in which case the provider shall provide the required disclosure as soon as reasonably possible.","verbatim":false,"ref":"Texas HB149 552.051. (b - f)","tags":[],"badges":[{"label":"Texas HB149 552.051. (b - f)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}},"note_tooltip":"Texas' HB149 puts in place additional obligations for governmental agencies and providers of healthcare services. These are centred on transparency: governmental agencies must make consumers aware that they are interacting with an AI system; healthcare services must disclose when an  AI system has been used in the provision of a service or treatment."},{"id":"deployer-supplier-2","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":null,"co":null,"tx":{"label":"Obligations","text":"The attorney general may request from the person reported through the online mechanism, pursuant to a civil investigative demand issued under Subsection (a):\n(1) a high-level description of the purpose, intended use, deployment context, and associated benefits of the artificial intelligence system with which the person is affiliated;\n(2) a description of the type of data used to program or train the artificial intelligence system;\n(3) a high-level description of the categories of data processed as inputs for the artificial intelligence system;\n(4) a high-level description of the outputs produced by the artificial intelligence system;\n(5) any metrics the person uses to evaluate the performance of the artificial intelligence system;\n(6) any known limitations of the artificial intelligence system;","verbatim":false,"ref":"Texas HB149 552.103 (b)","tags":[],"badges":[{"label":"Texas HB149 552.103 (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}},"note_tooltip":"Texas' HB149 puts in place additional obligations for governmental agencies and providers of healthcare services. These are centred on transparency: governmental agencies must make consumers aware that they are interacting with an AI system; healthcare services must disclose when an  AI system has been used in the provision of a service or treatment."},{"id":"deployer-supplier-3","rowLabel":"Obligations","typeLabel":"Obligations","jdata":{"eu":null,"co":null,"tx":{"label":"Obligations","text":"The attorney general may request from the person reported through the online mechanism, pursuant to a civil investigative demand issued under Subsection (a):\n(...)\n(7) a high-level description of the post-deployment monitoring and user safeguards the person uses for the artificial intelligence system, including, if the person is a deployer, the oversight, use, and learning process established by the person to address issues arising from the system ’s deployment;","verbatim":false,"ref":"Texas HB149 552.103 (b)","tags":[],"badges":[{"label":"Texas HB149 552.103 (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}},"note_tooltip":"Texas' HB149 puts in place additional obligations for governmental agencies and providers of healthcare services. These are centred on transparency: governmental agencies must make consumers aware that they are interacting with an AI system; healthcare services must disclose when an  AI system has been used in the provision of a service or treatment."},{"id":"deployer-supplier-4","rowLabel":"AI literacy","typeLabel":"AI literacy","jdata":{"eu":{"label":"Obligations","text":"Providers and deployers of AI systems shall take measures to ensure, to their best extent, a sufficient level of AI literacy of their staff and other persons dealing with the operation and use of AI systems on their behalf, taking into account their technical knowledge, experience, education and training and the context the AI systems are to be used in, and considering the persons or groups of persons on whom the AI systems are to be used.","verbatim":false,"ref":"EU AI Act, Article 4","tags":[],"badges":[{"label":"EU AI Act, Article 4","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_4","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-supplier-5","rowLabel":"Rebuttal","typeLabel":"Rebuttal","jdata":{"eu":null,"co":{"label":"Rebuttal","text":"(3) in any action commenced by the attorney general to enforce this part 17, it is an affirmative defense that the developer, deployer, or other person:\n(a) discovers and cures a violation of this part 17 as a result of:\n(i) feedback that the developer, deployer, or other person encourages deployers or users to provide to the developer, deployer, or other person;\n(ii) adversarial testing or red teaming, as those terms are defined or used by the National Institute of Standards and Technology; or\n(iii) an internal review process; and\n(b) is otherwise in compliance with:\n(i) the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and technology in the United States Department of Commerce and Standard ISO/IEC 42001 of the international organization for standardization;\n(ii) another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or\n(iii) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate and, if designated, shall publicly disseminate.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1706 (3)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1706 (3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Rebuttal","text":"(b) The attorney general may not bring an action against the person:\n(1) before the 60th day after the date the attorney general provides the notice under Subsection (a); or\n(2) if, before the 60th day after the date the attorney general provides the notice under Subsection (a), the person:\n(A) cures the identified violation; and\n(B) provides the attorney general with a written statement that the person has:\n(i) cured the alleged violation;\n(ii) provided supporting documentation to show the manner in which the person cured the violation; and\n(iii) made any necessary changes to internal policies to reasonably prevent further violation of this chapter.","verbatim":false,"ref":"Texas HB149 552.104. (b)","tags":[],"badges":[{"label":"Texas HB149 552.104. (b)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}},{"id":"deployer-supplier-6","rowLabel":"Penalties","typeLabel":"Penalties","jdata":{"eu":{"label":"Penalties","text":"3. Non-compliance with the prohibition of the AI practices referred to in Article 5 [prohibited AI practices] shall be subject to administrative fines of up to 35 000 000 EUR or, if the offender is an undertaking, up to 7 % of its total worldwide annual turnover for the preceding financial year, whichever is higher. \n4. Non-compliance with any of the following provisions (...), other than those laid down in Articles 5 [prohibited AI practices], shall be subject to administrative fines of up to 15 000 000 EUR or, if the offender is an undertaking, up to 3 % of its total worldwide annual turnover for the preceding financial year, whichever is higher:\n(a) obligations of providers pursuant to Article 16;\n(…)\n(g) transparency obligations for providers and deployers pursuant to Article 50.\n(...)\n5. The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to 7 500 000 EUR or, if the offender is an undertaking, up to 1 % of its total worldwide annual turnover for the preceding financial year, whichever is higher.","verbatim":false,"ref":"EU AI Act, Article 99 (3, 4, 5)","tags":[],"badges":[{"label":"EU AI Act, Article 99 (3, 4, 5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_99","sourceId":"eu-ai-act"}]},"co":{"label":"Penalties","text":"Up to $20K per violation; $50K per violation if committed against an elderly person","verbatim":false,"ref":"Colorado Consumer Protection Act","tags":[],"badges":[{"label":"Colorado Consumer Protection Act","url":null,"sourceId":null}]},"tx":{"label":"Penalties","text":"A person who violates this chapter and does not cure the violation under Section 552.104 is liable to this state for a civil penalty in an amount of:\n(1) for each violation the court determines to be curable or a breach of a statement submitted to the attorney general under Section 552.104(b)(2), not less than $10,000 and not more than $12,000;\n(2) for each violation the court determines to be uncurable, not less than $80,000 and not more than $200,000; and\n(3) for a continued violation, not less than $2,000 and not more than $40,000 for each day the violation continues.","verbatim":false,"ref":"Texas HB149 552.105 (a)","tags":[],"badges":[{"label":"Texas HB149 552.105 (a)","url":"https://capitol.texas.gov/BillLookup/History.aspx?LegSess=89R&Bill=HB149","sourceId":"tx-hb149"}]}}}],"types":["Scope","Obligations","AI literacy","Rebuttal","Penalties"],"analysis_note":{"full_note":"This table compares the terms and obligations for deployers of AI systems put in place in the AIA, Colorado's SB24-205 and Texas' HB 149. \n\nIt should be noted that the AIA puts in place obligations for deployers depending on the nature of the AI system used (e.g., high-risk AI systems, GPAI systems) and, for this reason, only AI literacy obligations figure at this level of comparison, which comprises the most general category of deployers of AI systems found across the different regulations.\n\n- Regulatory trigger: reactive vs proactive approaches\nThe AIA adopts a proactive, ex-ante regulatory approach, whereby the deployment of the system triggers obligations, in this case, centred on AI literacy. A similar approach is adopted in Colorado's SB25-205, which mandates the disclosure of AI interaction upon AI system deployment. In contrast, Texas' HB 149 focuses on reactive, ex-post enforcement triggered by the Attorney General, with the exception of governmental agencies and providers of healthcare services, which must comply with transparency obligations upon system deployment.\n\n- Additional obligations for public agencies\nTexas' HB149 puts in place additional obligations for governmental agencies and providers of healthcare services. These are centred on transparency: governmental agencies must make consumers aware that they are interacting with an AI system; healthcare services must disclose when an  AI system has been used in the provision of a service or treatment.\n\n- Transparency requirements\nWhile the EU AI Act puts in place transparency obligations for all providers of AI systems or GPAI models, at the deployer level, obligations apply only to deployer of high-risk AI systems and GPAI systems. In Texas' HB 149, transparency obligations only apply at the deployer level, with governmental agencies and providers of healthcare services being required to disclose the use of AI systems to the consumer.\n\n- Obligations\nTexas’ HB149 requires all deployers to provide certain documentation upon request by public authorities, including a description of the purpose, intended use, and deployment context of the AI system, the type of data used to train the system, limitations of the AI system and post-deployment monitoring and user safeguards. These requirements have some similarity with the EU AI Act’s documentation requirements for deployers of high-risk systems, namely post-deployment monitoring of the system and transparency requirements.\n\n- Substantive filter: intention and framework compliance\nIn Texas, liability is largely contingent on proving a provider’s \"intent to discriminate\". Conversely, in the AIA, penalties apply regardless of whether the provider actually meant to cause harm.\nMoreover, in Texas and Colorado, compliance with NIST Risk Management Framework exempts providers from liability.\n\n- Compliance grace period: the right to cure\nBoth U.S. states,Texas and Colorado, provide an opportunity to cure violations. Such a rebuttal or cure period is not in place in the AIA.","subtopics":{"regulatory trigger":"reactive vs proactive approaches The AIA adopts a proactive, ex-ante regulatory approach, whereby the deployment of the system triggers obligations, in this case, centred on AI literacy. A similar approach is adopted in Colorado's SB25-205, which mandates the disclosure of AI interaction upon AI system deployment. In contrast, Texas' HB 149 focuses on reactive, ex-post enforcement triggered by the Attorney General, with the exception of governmental agencies and providers of healthcare services, which must comply with transparency obligations upon system deployment.","additional obligations for public agencies":"Texas' HB149 puts in place additional obligations for governmental agencies and providers of healthcare services. These are centred on transparency: governmental agencies must make consumers aware that they are interacting with an AI system; healthcare services must disclose when an  AI system has been used in the provision of a service or treatment.","transparency requirements":"While the EU AI Act puts in place transparency obligations for all providers of AI systems or GPAI models, at the deployer level, obligations apply only to deployer of high-risk AI systems and GPAI systems. In Texas' HB 149, transparency obligations only apply at the deployer level, with governmental agencies and providers of healthcare services being required to disclose the use of AI systems to the consumer.","obligations":"Texas’ HB149 requires all deployers to provide certain documentation upon request by public authorities, including a description of the purpose, intended use, and deployment context of the AI system, the type of data used to train the system, limitations of the AI system and post-deployment monitoring and user safeguards. These requirements have some similarity with the EU AI Act’s documentation requirements for deployers of high-risk systems, namely post-deployment monitoring of the system and transparency requirements.","substantive filter":"intention and framework compliance In Texas, liability is largely contingent on proving a provider’s \"intent to discriminate\". Conversely, in the AIA, penalties apply regardless of whether the provider actually meant to cause harm. Moreover, in Texas and Colorado, compliance with NIST Risk Management Framework exempts providers from liability.","compliance grace period":"the right to cure Both U.S. states,Texas and Colorado, provide an opportunity to cure violations. Such a rebuttal or cure period is not in place in the AIA."}}},{"id":"deployer-of-high-risk-ai-systems","name":"Deployer of high-risk AI systems","entries":[{"id":"deployer-of-high-risk-ai-systems-0","rowLabel":"Classification rules for high-risk systems","typeLabel":"Classification rules for high-risk systems","jdata":{"eu":{"label":"Scope","text":"1.   Irrespective of whether an AI system is placed on the market or put into service independently of the products referred to in points (a) and (b), that AI system shall be considered to be high-risk where both of the following conditions are fulfilled:\n(a)the AI system is intended to be used as a safety component of a product, or the AI system is itself a product, covered by the Union harmonisation legislation listed in Annex I;\n(b)the product whose safety component pursuant to point (a) is the AI system, or the AI system itself as a product, is required to undergo a third-party conformity assessment, with a view to the placing on the market or the putting into service of that product pursuant to the Union harmonisation legislation listed in Annex I.\n\n2.   In addition to the high-risk AI systems referred to in paragraph 1, AI systems referred to in Annex III shall be considered to be high-risk.\n\n3.   By derogation from paragraph 2, an AI system referred to in Annex III shall not be considered to be high-risk where it does not pose a significant risk of harm to the health, safety or fundamental rights of natural persons, including by not materially influencing the outcome of decision making.\n\nThe first subparagraph shall apply where any of the following conditions is fulfilled:\n(a)the AI system is intended to perform a narrow procedural task;\n(b)the AI system is intended to improve the result of a previously completed human activity;\n(c)the AI system is intended to detect decision-making patterns or deviations from prior decision-making patterns and is not meant to replace or influence the previously completed human assessment, without proper human review; or\n(d)the AI system is intended to perform a preparatory task to an assessment relevant for the purposes of the use cases listed in Annex III.","verbatim":false,"ref":"AI Act, Article 6","tags":[],"badges":[{"label":"AI Act, Article 6","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_6","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(9) (a) \"high-risk artificial intelligence system\" means any artificial intelligence system that, when deployed, makes, or is a substantial factor in making, a consequential decision.\n(b) \"high-risk artificial intelligence system\" does not include:\n(i) an artificial intelligence system if the artificial intelligence system is intended to:\n(a) perform a narrow procedural task; or\n(b) detect decision-making patterns or deviations from prior decision-making patterns and is not intended to replace or\n(ii) the following technologies, unless the technologies, when deployed, make, or are a substantial factor in making, a consequential decision:\n(a) anti-fraud technology that does not use facial recognition technology;\n(b) anti-malware;\n(c) anti-virus;\n(d) artificial intelligence-enabled video games;\n(e) calculators;\n(f) cybersecurity;\n(g) databases;\n(h) data storage;\n(i) firewall;\n(j) internet domain registration;\n(k) internet website loading;\n(l) networking;\n(m) spam- and robocall-filtering;\n(n) spell-checking;\n(0) spreadsheets;\n(p) web caching;\n(q) web hosting or any similar technology; or\n(r) technology that communicates with consumers in natural language for the purpose of providing users with information, making referrals or recommendations, and answering questions and is subject to an accepted use policy that prohibits generating content that is discriminatory or harmful.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701. (9)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701. (9)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Scope","text":"(5) \"High-risk artificial intelligence interaction\" means an interaction with generative artificial intelligence that involves:\n(a) the collection of sensitive personal information, including:\n(i) health data;\n(ii) financial data; or\n(iii) biometric data;\n(b) the provision of personalized recommendations, advice, or information that could reasonably be relied upon to make significant personal decisions, including the provision of:\n(i) financial advice or services;\n(ii) legal advice or services;\n(iii) medical advice or services; or\n(iv) mental health advice or services; or\n(c) other applications as defined by division rule.","verbatim":false,"ref":"Utah SB226, 13-75-101 (5)","tags":[],"badges":[{"label":"Utah SB226, 13-75-101 (5)","url":null,"sourceId":null}]}},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas. In Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-1","rowLabel":"Classification rules for high-risk systems","typeLabel":"Classification rules for high-risk systems","jdata":{"eu":{"label":"Scope","text":"High-risk AI systems pursuant to Article 6(2) are the AI systems listed in any of the following areas:\n1.Biometrics, in so far as their use is permitted under relevant Union or national law:\n(a)remote biometric identification systems.This shall not include AI systems intended to be used for biometric verification the sole purpose of which is to confirm that a specific natural person is the person he or she claims to be;\n(b)AI systems intended to be used for biometric categorisation, according to sensitive or protected attributes or characteristics based on the inference of those attributes or characteristics;\n(c)AI systems intended to be used for emotion recognition.\n2.Critical infrastructure: AI systems intended to be used as safety components in the management and operation of critical digital infrastructure, road traffic, or in the supply of water, gas, heating or electricity.\n3.Education and vocational training:\n(a)AI systems intended to be used to determine access or admission or to assign natural persons to educational and vocational training institutions at all levels;\n(b)AI systems intended to be used to evaluate learning outcomes, including when those outcomes are used to steer the learning process of natural persons in educational and vocational training institutions at all levels;\n(c)AI systems intended to be used for the purpose of assessing the appropriate level of education that an individual will receive or will be able to access, in the context of or within educational and vocational training institutions at all levels;\n(d)AI systems intended to be used for monitoring and detecting prohibited behaviour of students during tests in the context of or within educational and vocational training institutions at all levels.\n4.Employment, workers’ management and access to self-employment:\n(a)AI systems intended to be used for the recruitment or selection of natural persons, in particular to place targeted job advertisements, to analyse and filter job applications, and to evaluate candidates;\n(b)AI systems intended to be used to make decisions affecting terms of work-related relationships, the promotion or termination of work-related contractual relationships, to allocate tasks based on individual behaviour or personal traits or characteristics or to monitor and evaluate the performance and behaviour of persons in such relationships.\n5.Access to and enjoyment of essential private services and essential public services and benefits:\n(a)AI systems intended to be used by public authorities or on behalf of public authorities to evaluate the eligibility of natural persons for essential public assistance benefits and services, including healthcare services, as well as to grant, reduce, revoke, or reclaim such benefits and services;\n(b)AI systems intended to be used to evaluate the creditworthiness of natural persons or establish their credit score, with the exception of AI systems used for the purpose of detecting financial fraud;\n(c)AI systems intended to be used for risk assessment and pricing in relation to natural persons in the case of life and health insurance;\n(d)AI systems intended to evaluate and classify emergency calls by natural persons or to be used to dispatch, or to establish priority in the dispatching of, emergency first response services, including by police, firefighters and medical aid, as well as of emergency healthcare patient triage systems.\n6.Law enforcement, in so far as their use is permitted under relevant Union or national law:\n(a)AI systems intended to be used by or on behalf of law enforcement authorities, or by Union institutions, bodies, offices or agencies in support of law enforcement authorities or on their behalf to assess the risk of a natural person becoming the victim of criminal offences;\n(b)AI systems intended to be used by or on behalf of law enforcement authorities or by Union institutions, bodies, offices or agencies in support of law enforcement authorities as polygraphs or similar tools;\n(c)AI systems intended to be used by or on behalf of law enforcement authorities, or by Union institutions, bodies, offices or agencies, in support of law enforcement authorities to evaluate the reliability of evidence in the course of the investigation or prosecution of criminal offences;\n(d)AI systems intended to be used by law enforcement authorities or on their behalf or by Union institutions, bodies, offices or agencies in support of law enforcement authorities for assessing the risk of a natural person offending or re-offending not solely on the basis of the profiling of natural persons as referred to in Article 3(4) of Directive (EU) 2016/680, or to assess personality traits and characteristics or past criminal behaviour of natural persons or groups;\n(e)AI systems intended to be used by or on behalf of law enforcement authorities or by Union institutions, bodies, offices or agencies in support of law enforcement authorities for the profiling of natural persons as referred to in Article 3(4) of Directive (EU) 2016/680 in the course of the detection, investigation or prosecution of criminal offences.\n7.Migration, asylum and border control management, in so far as their use is permitted under relevant Union or national law:\n(a)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies as polygraphs or similar tools;\n(b)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies to assess a risk, including a security risk, a risk of irregular migration, or a health risk, posed by a natural person who intends to enter or who has entered into the territory of a Member State;\n(c)AI systems intended to be used by or on behalf of competent public authorities or by Union institutions, bodies, offices or agencies to assist competent public authorities for the examination of applications for asylum, visa or residence permits and for associated complaints with regard to the eligibility of the natural persons applying for a status, including related assessments of the reliability of evidence;\n(d)AI systems intended to be used by or on behalf of competent public authorities, or by Union institutions, bodies, offices or agencies, in the context of migration, asylum or border control management, for the purpose of detecting, recognising or identifying natural persons, with the exception of the verification of travel documents.\n8.Administration of justice and democratic processes:\n(a)AI systems intended to be used by a judicial authority or on their behalf to assist a judicial authority in researching and interpreting facts and the law and in applying the law to a concrete set of facts, or to be used in a similar way in alternative dispute resolution;\n(b)AI systems intended to be used for influencing the outcome of an election or referendum or the voting behaviour of natural persons in the exercise of their vote in elections or referenda. This does not include AI systems to the output of which natural persons are not directly exposed, such as tools used to organise, optimise or structure political campaigns from an administrative or logistical point of view.","verbatim":false,"ref":"AI Act, Annex III","tags":[],"badges":[{"label":"AI Act, Annex III","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#anx_III","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(3) \"consequential decision\" means a decision that has a material legal or similarly significant effect on the provision or denial to any consumer of, or the cost or terms of:\n(a) education enrollment or an education opportunity;\n(b) employment or an employment opportunity;\n(c) a financial or lending service;\n(d) an essential government service;\n(e) health-care services;\n(f) housing;\n(g) insurance; or\n(h) a legal service.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701. (3)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701. (3)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Scope","text":"(8) \"Regulated occupation\" means an occupation that:\n (a) is regulated by the Department of Commerce; and\n(b) requires an individual to obtain a license or state certification to practice the occupation.\n\n[Regulated occupations include: physician, surgeon, nursing, veterinary, dentistry, accountancy, pharmacy, etc.]","verbatim":false,"ref":"Utah SB226, 13-75-101 (8)","tags":[],"badges":[{"label":"Utah SB226, 13-75-101 (8)","url":null,"sourceId":null}]}},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas. In Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-2","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"(4) ‘deployer’ means a natural or legal person, public authority, agency or other body using an AI system under its authority except where the AI system is used in the course of a personal non-professional activity","verbatim":false,"ref":"EU AI Act, Article 3 (4)","tags":[],"badges":[{"label":"EU AI Act, Article 3 (4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_3","sourceId":"eu-ai-act"}]},"co":{"label":"Scope","text":"(6) \"Deployer\" means a person doing business in this state that deploys a high-risk artificial intelligence system.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1701. (6)","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1701. (6)","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Scope","text":"\"Supplier\" means a seller, lessor, assignor, offeror, broker, or other person who regularly solicits, engages in, or enforces consumer transactions, whether or not the person deals directly with the consumer.","verbatim":true,"ref":"Utah Code","tags":[],"badges":[{"label":"Utah Code","url":null,"sourceId":null}]}},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas. In Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-3","rowLabel":"Scope","typeLabel":"Scope","jdata":{"eu":{"label":"Scope","text":"1. Any distributor, importer, deployer or other third-party shall be considered to be a provider of a high-risk AI system (…) in any of the following circunstances:\n(a) they put their name or trademark on a high-risk AI system already placed on the market or put into service, without prejudice to contractual arrangements stipulating that the obligations are otherwise allocated;\n(b) they make a substantial modification to a high-risk AI system that has already been placed on the market or has already been put into service in such a way that it remains a high-risk AI system pursuant to Article 6;\n(c) they modify the intended purpose of an AI system, including a general-purpose AI system, which has not been classified as high-risk and has already been placed on the market or put into service in such a way that the AI system concerned becomes a high-risk AI system.","verbatim":false,"ref":"EU AI Act, Article 25 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 25 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_25","sourceId":"eu-ai-act"}]},"co":null,"tx":null},"note_tooltip":"In the AIA a system is high-risk if it is a safety component of a regulated product or if it is intended to operate in specific areas like law enforcement, migration, or critical infrastructure. This is linked to a broad understanding of risk as the probability and severity of harm. In Colorado’s SB24-205, the fact that its understanding of risk is limited to “algorithmic discrimination” means that a system is deemed high-risk if it is a \"substantial factor\" in “consequential decisions” taken in listed areas. In Utah's SB226, high-risk systems are generative AI systems deployed in regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-4","rowLabel":"Exemptions","typeLabel":"Exemptions","jdata":{"eu":null,"co":{"label":"Exemptions","text":"(6) subsections (2), (3), and (5) of this section do not apply to a deployer if, at the time the deployer deploys a high-risk artificial intelligence system and at all times while the high-risk artificial intelligence system is deployed:\n(a) the deployer:\n(i) employs fewer than fifty full-time equivalent employees; and\n(ii) does not use the deployer's own data to train the high-risk artificial intelligence system;\n(b) the high-risk artificial intelligence system:\n(i) is used for the intended uses that are disclosed to the deployer as required by section 6-1-1702 (2)(a); and\n(ii) continues learning based on data derived from sources other than the deployer's own data; and\n(c) the deployer makes available to consumers any impact assessment that:\n(i) the developer of the high-risk artificial intelligence system has completed and provided to the deployer; and\n(ii) includes information that is substantially similar to the information in the impact assessment required under subsection (3)(b) of this section.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"In Colorado, deployers of high-risk AI systems who employ less than 50 full-time equivalent employees, are exempt from the obligations stated in SB24-205. Moreover, compliance with NIST Risk Management Framework exempts providers from liability. If a deployer commits a violation of the bill, it has the opportunity to cure it."},{"id":"deployer-of-high-risk-ai-systems-5","rowLabel":"General","typeLabel":"General","jdata":{"eu":{"label":"Obligations","text":"1. Deployers of high-risk AI systems shall take appropriate technical and organisational measures to ensure they use such systems in accordance with the instructions for use accompanying the systems, pursuant to paragraphs 3 and 6.\n(…)\n4.Without prejudice to paragraphs 1 and 2, to the extent the deployer exercises control over the input data, that deployer shall ensure that input data is relevant and sufficiently representative in view of the intended purpose of the high-risk AI system.","verbatim":false,"ref":"EU AI Act, Article 26 (1, 4)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (1, 4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(5) (a) on and after February 1, 2026, and except as provided in subsection (6) of this section, a deployer shall make available, in a manner that is clear and readily available on the deployer's website, a statement summarizing:\n(i) the types of high-risk artificial intelligence systems that are currently deployed by the deployer;\n(ii) how the deployer manages known or reasonably foreseeable risks of algorithmic discrimination that may arise from the deployment of each high-risk artificial intelligence system described pursuant to subsection (5)(a)(i) of this section; and\n(iii) in detail, the nature, source, and extent of the information collected and used by the deployer.\n(b) a deployer shall periodically update the statement described in subsection (5)(a) of this section.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null}},{"id":"deployer-of-high-risk-ai-systems-6","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"11. Without prejudice to Article 50 of this Regulation, deployers of high-risk AI systems referred to in Annex III that make decisions or assist in making decisions related to natural persons shall inform the natural persons that they are subject to the use of the high-risk AI system. For high-risk AI systems used for law enforcement purposes Article 13 of Directive (EU) 2016/680 shall apply.","verbatim":false,"ref":"EU AI Act, Article 26 (11)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (11)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(4) (a) on and after February 1, 2026, and no later than the time that a deployer deploys a high-risk artificial intelligence system to make, or be a substantial factor in making, a consequential decision concerning a consumer, the deployer shall:\n(i) notify the consumer that the deployer has deployed a high-risk artificial intelligence system to make, or be a substantial factor in making, a consequential decision before the decision is made;\n(ii) provide to the consumer a statement disclosing the purpose of the high-risk artificial intelligence system and the nature of the consequential decision; the contact information for the deployer; a description, in plain language, of the high-risk artificial intelligence system; and instructions on how to access the statement required by subsection (5)(a) of this section; and\n(iii) provide to the consumer information, if applicable, regarding the consumer's right to opt out of the processing of personal data concerning the consumer for purposes of profiling in furtherance of decisions that produce legal or similarly significant effects concerning the consumer under section 6-1-1306 (1)(a)(I)(C).\n(...)\n(c) (i) except as provided in subsection (4)(c)(ii) of this section, a deployer shall provide the notice, statement, contact information, and description required by subsections (4)(a) and (4)(b) of this section:\n(a) directly to the consumer;\n(b) in plain language;\n(c) in all languages in which the deployer, in the ordinary course of the deployer's business, provides contracts, disclaimers, sale announcements, and other information to consumers; and\n(d) in a format that is accessible to consumers with disabilities.\n(ii) if the deployer is unable to provide the notice, statement, contact information, and description required by subsections (4)(a) and (4)(b) of this section directly to the consumer, the deployer shall make the notice, statement, contact information, and description available in a manner that is reasonably calculated to ensure that the consumer receives the notice, statement, contact information, and description.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":{"label":"Obligations","text":"(2) An individual providing services in a regulated occupation shall:\n(a) prominently disclose when an individual receiving services is interacting with generative artificial intelligence in the provision of regulated services if the use of generative artificial intelligence constitutes a high-risk artificial intelligence interaction; and\n(b) comply with all requirements of the regulated occupation when providing services through generative artificial intelligence.\n(3) A disclosure required under Subsection (2) shall be provided:\n(a) verbally at the start of a verbal interaction; and\n(b) in writing before the start of a written interaction.","verbatim":false,"ref":"Utah SB226, 13-75-103 (2)","tags":[],"badges":[{"label":"Utah SB226, 13-75-103 (2)","url":null,"sourceId":null}]}},"note_tooltip":"Transparency is the only common obligation for deployers of high-risk AI systems across all three regulations. In the AI Act, this implies informing individuals that AI is being used as well as disclosing AI-generated content as artificially generated or manipulated. In Colorado's SB24-205, transparency requirements are centred on the need to disclose that AI has been deployed in making a consequential decision. In Utah, transparency means disclosing interaction with a generative AI system in services provided in the context of regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-7","rowLabel":"Transparency","typeLabel":"Transparency","jdata":{"eu":{"label":"Obligations","text":"3.Deployers of an emotion recognition system or a biometric categorisation system shall inform the natural persons exposed thereto of the operation of the system, and shall process the personal data in accordance with Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, as applicable. This obligation shall not apply to AI systems used for biometric categorisation and emotion recognition, which are permitted by law to detect, prevent or investigate criminal offences, subject to appropriate safeguards for the rights and freedoms of third parties, and in accordance with Union law.\n\n4.Deployers of an AI system that generates or manipulates image, audio or video content constituting a deep fake, shall disclose that the content has been artificially generated or manipulated. This obligation shall not apply where the use is authorised by law to detect, prevent, investigate or prosecute criminal offence. Where the content forms part of an evidently artistic, creative, satirical, fictional or analogous work or programme, the transparency obligations set out in this paragraph are limited to disclosure of the existence of such generated or manipulated content in an appropriate manner that does not hamper the display or enjoyment of the work.\nDeployers of an AI system that generates or manipulates text which is published with the purpose of informing the public on matters of public interest shall disclose that the text has been artificially generated or manipulated. This obligation shall not apply where the use is authorised by law to detect, prevent, investigate or prosecute criminal offences or where the AI-generated content has undergone a process of human review or editorial control and where a natural or legal person holds editorial responsibility for the publication of the content.","verbatim":false,"ref":"EU AI Act, Article 50 (3, 4)","tags":[],"badges":[{"label":"EU AI Act, Article 50 (3, 4)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_50","sourceId":"eu-ai-act"}]},"co":null,"tx":null},"note_tooltip":"Transparency is the only common obligation for deployers of high-risk AI systems across all three regulations. In the AI Act, this implies informing individuals that AI is being used as well as disclosing AI-generated content as artificially generated or manipulated. In Colorado's SB24-205, transparency requirements are centred on the need to disclose that AI has been deployed in making a consequential decision. In Utah, transparency means disclosing interaction with a generative AI system in services provided in the context of regulated occupations."},{"id":"deployer-of-high-risk-ai-systems-8","rowLabel":"Right to explanation","typeLabel":"Right to explanation","jdata":{"eu":{"label":"Obligations","text":"1. Any affected person subject to a decision which is taken by the deployer on the basis of the output from a high-risk AI system listed in Annex III, with the exception of systems listed under point 2 thereof, and which produces legal effects or similarly significantly affects that person in a way that they consider to have an adverse impact on their health, safety or fundamental rights shall have the right to obtain from the deployer clear and meaningful explanations of the role of the AI system in the decision-making procedure and the main elements of the decision taken.","verbatim":false,"ref":"EU AI Act, Article 86 (1)","tags":[],"badges":[{"label":"EU AI Act, Article 86 (1)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_86","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(b) on and after February 1, 2026, a deployer that has deployed a high-risk artificial intelligence system to make, or be a substantial factor in making, a consequential decision concerning a consumer shall, if the consequential decision is adverse to the consumer, provide to the consumer:\n(i) a statement disclosing the principal reason or reasons for the consequential decision, including:\n(a) the degree to which, and manner in which, the high-risk artificial intelligence system contributed to the consequential decision;\n(b) the type of data that was processed by the high-risk artificial intelligence system in making the consequential decision; and\n(c) the source or sources of the data described in subsection (4)(b)(i)(b) of this section;\n(ii) an opportunity to correct any incorrect personal data that the high-risk artificial intelligence system processed in making, or as a substantial factor in making, the consequential decision; and\n(iii) an opportunity to appeal an adverse consequential decision concerning the consumer arising from the deployment of a high-risk artificial intelligence system, which appeal must, if technically feasible, allow for human review unless providing the opportunity for appeal is not in the best interest of the consumer, including in instances in which any delay might pose a risk to the life or safety of such consumer.","verbatim":false,"ref":"Colorado SB24-205, 6-1-1703.","tags":[],"badges":[{"label":"Colorado SB24-205, 6-1-1703.","url":"https://leg.colorado.gov/bills/sb24-205","sourceId":"co-sb24205"}]},"tx":null},"note_tooltip":"Both the AI Act and Colorado's SB24-205 put in place obligations for deployers to explain the role of the AI system in the decision-making process in case of adverse decisions. Colorado's SB24-205 goes one step further in requiring deployers to provide consumers with the opportunity to appeal the decision and allow for human review."},{"id":"deployer-of-high-risk-ai-systems-9","rowLabel":"Human oversight","typeLabel":"Human oversight","jdata":{"eu":{"label":"Obligations","text":"2. Deployers shall assign human oversight to natural persons who have the necessary competence, training and authority, as well as the necessary support.","verbatim":false,"ref":"EU AI Act, Article 26 (2)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (2)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":null,"tx":null}},{"id":"deployer-of-high-risk-ai-systems-10","rowLabel":"System monitoring","typeLabel":"System monitoring","jdata":{"eu":{"label":"Obligations","text":"5.Deployers shall monitor the operation of the high-risk AI system on the basis of the instructions for use and, where relevant, inform providers in accordance with Article 72. Where deployers have reason to consider that the use of the high-risk AI system in accordance with the instructions may result in that AI system presenting a risk within the meaning of Article 79(1), they shall, without undue delay, inform the provider or distributor and the relevant market surveillance authority, and shall suspend the use of that system. (...)\nFor deployers that are financial institutions subject to requirements regarding their internal governance, arrangements or processes under Union financial services law, the monitoring obligation set out in the first subparagraph shall be deemed to be fulfilled by complying with the rules on internal governance arrangements, processes and mechanisms pursuant to the relevant financial service law.","verbatim":false,"ref":"EU AI Act, Article 26 (5)","tags":[],"badges":[{"label":"EU AI Act, Article 26 (5)","url":"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32024R1689#art_26","sourceId":"eu-ai-act"}]},"co":{"label":"Obligations","text":"(2) (a) On and after February 1, 2026, and except as provided in subsection (6) of this section, a deployer of a high-risk artificial intelligence system shall implement a Risk Management Policy and Program to govern the deployer's deployment of the high-risk artificial intelligence system. The risk management policy and program must specify and incorporate the principles, processes, and personnel that the deployer uses to identify, document, and mitigate known or reasonably foreseeable risks of algorithmic discrimination. The Risk Management Policy and Program must be an iterative process planned, implemented, and regularly and systematically reviewed and updated over the life cycle of a high-risk artificial intelligence system, requiring regular, systematic review and updates. A Risk Management Policy and Program implemented and maintained pursuant to this subsection (2) must be reasonable considering:\n(i) (a) the guidance and standards set forth in the latest version of the \"Artificial Intelligence Risk Management Framework\" published by the National Institute of Standards and Technology in the United States Department of Commerce, standard ISO/IEC 42001 of the International Organization for Standardization, or another nationally or internationally recognized risk management framework for artificial intelligence systems, if the standards are substantially equivalent to or more stringent than the requirements of this part 17; or\n(b) any risk management framework for artificial intelligence systems that the attorney general, in the attorney general's discretion, may designate;\n(ii) the size and complexity of the deployer;\n(iii) the nature and scope of the high-risk artificial intelligence systems deployed by the deployer, including the intended uses of the high-risk artificial intelligence systems; and\n(iv) the sensitivity and volume of data processed in connection with the high-risk artificial intelligence systems deployed by the deployer.\n(b) a risk management policy and program implemented pursuant to subsection (2)(a) of this section may cover multiple high-risk artificial intelligence systems deploy
