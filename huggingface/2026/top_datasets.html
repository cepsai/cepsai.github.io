<!doctype html>

<head>
    <meta charset="utf-8">
    <style type="text/css">
        .knitr .inline {
            background-color: #F7F7F7;
            border: solid 1px #B0B0B0;
        }

        .error {
            font-weight: bold;
            color: #FF0000;
        }

        .warning {
            font-weight: bold;
        }

        .message {
            font-style: italic;
        }

        .source,
        .output,
        .warning,
        .error,
        .message {
            padding: 0 1em;
            border: solid 1px #F7F7F7;
        }

        .source {
            background-color: #F5F5F5;
        }

        .rimage .left {
            text-align: left;
        }

        .rimage .right {
            text-align: right;
        }

        .rimage .center {
            text-align: center;
        }

        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
            background-color: white;
        }

        .viz-grid {
            display: grid;
            grid-template-rows: 16fr 1fr 2fr 1fr;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding-bottom: clamp(8px, 2vh, 18px);
        }

        #container1 {
            grid-row: 1;
            grid-column: 1 / span 2;
            overflow: hidden;
            min-height: 0;
        }

        #container5 {
            grid-row: 2;
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            overflow: hidden;
        }

        #container2 {
            grid-row: 3;
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #container3 {
            grid-row: 4;
            grid-column: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
            overflow: hidden;
            min-width: 0;
        }

        #container4 {
            grid-row: 4;
            grid-column: 2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            overflow: hidden;
            min-width: 0;
        }

        #container4 a {
            height: 100%;
            display: flex;
            align-items: center;
        }

        #viz {
            width: 100%;
            height: 100%;
            min-height: 0;
            min-width: 0;
        }

        .custom-legend {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 10px);
            padding: clamp(2px, 0.5vh, 4px) clamp(4px, 0.8vw, 8px);
            overflow: auto;
            max-width: 100%;
            max-height: 100%;
            font-size: clamp(8px, 1.3vw, 13px);
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            font-weight: 600;
            color: #333;
            position: relative;
        }

        .legend-item.inactive {
            opacity: 0.35;
        }

        .legend-square {
            width: clamp(10px, 1.2vw, 14px);
            height: clamp(10px, 1.2vw, 14px);
            border-radius: 4px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15) inset;
        }

        .legend-item:focus-visible {
            outline: 2px solid rgba(0, 0, 0, 0.5);
            outline-offset: 2px;
        }

        .logo {
            height: 100%;
            width: auto;
            max-height: 100%;
            max-width: 100%;
            pointer-events: auto;
            object-fit: contain;
        }

        .source-text {
            font-size: clamp(10px, 1.6vw, 16px);
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            font-style: normal;
        }

        .source-text a {
            color: #2756d3;
            text-decoration: underline;
            cursor: pointer;
            font-style: normal;
        }

        .source-text a:visited {
            color: #2756d3;
        }

        .footnote-text {
            font-size: clamp(10px, 1.6vw, 16px);
            font-style: italic;
            color: #333;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }


        @media (max-height: 500px) {
            .viz-grid {
                grid-template-rows: 1fr;
                grid-template-columns: 1fr;
            }

            #container1 {
                grid-row: 1;
                grid-column: 1;
            }

            #container2,
            #container3,
            #container4,
            #container5 {
                display: none !important;
            }

            .custom-legend,
            .source-text,
            .logo,
            .footnote-text {
                display: none !important;
            }
        }
    </style>

    <script src="https://d3js.org/d3.v5.min.js"></script>
</head>

        const ORIGINAL_DATA = originalData;
        const BAR_BORDER_RADIUS = 4;
        const BAR_USE_GRADIENT = 1;
        const BAR_VALUE_POSITION = "outside"; // "inside", "outside", "none"
        const BAR_ORIENTATION = "horizontal";
        const BAR_COLOR_BY_GROUP = 0;
        const SHOW_TOOLTIP = 1;
        const PALETTE_MODE = "none";
        const BAR_SORT_MODE = "descending"; // "ascending", "descending", "none"

        function normalizeData(arr) {
            return arr.map(function (d) {
                var parent = d.parent || d.group || d.domain || d.category || d.type || d.class;
                var name = d.name || d.id || d.label || d.title;
                var value = (d.value != null) ? +d.value : (d.count != null) ? +d.count : (d.size != null) ? +d.size : 0;
                var color = d.color != null ? d.color : null;
                return { parent: parent, name: name, value: value, color: color };
            });
        }

        let treemapData = normalizeData(originalData); // keeping variable name to avoid big refactor
        const groups = Array.from(new Set(treemapData.map(function (d) { return d.parent; })));
        const inferredColors = {};
        groups.forEach(function (g) {
            var item = originalData.find(function (x) {
                var p = x.parent || x.group || x.domain || x.category || x.type || x.class;
                return p === g;
            });
            inferredColors[g] = item && item.color ? item.color : null;
        });

        const fallbackPalette = ["#1F77B4", "#FF7F0E", "#2CA02C", "#9467BD", "#D62728", "#17BECF", "#8C564B", "#E377C2", "#7F7F7F", "#BCBD22"];
        const groupColors = {};
        groups.forEach(function (g, i) {
            var baseColor;
            if (inferredColors[g]) baseColor = inferredColors[g];
            else if (PALETTE_MODE === "aiw") baseColor = "#2756d3";
            else if (PALETTE_MODE === "ceps") baseColor = "#207164";
            else baseColor = fallbackPalette[i % fallbackPalette.length];
            groupColors[g] = baseColor;
        });

        const activeGroups = new Set(groups);

        function getGroupColor(parent) {
            var c = groupColors[parent];
            if (!c && (PALETTE_MODE === "aiw" || PALETTE_MODE === "ceps")) {
                return PALETTE_MODE === "aiw" ? "#2756d3" : "#207164";
            }
            return c || "#666666";
        }

        let legendInitialized = false;

        function getLegendElement() {
            var legend = document.getElementById("legend");
            if (legend) return legend;
            var legendContainer = document.getElementById("container2");
            if (!legendContainer) return null;
            legend = document.createElement("div");
            legend.id = "legend";
            legend.className = "custom-legend";
            legendContainer.appendChild(legend);
            return legend;
        }

        function buildLegend() {
            if (legendInitialized) return;
            var legend = getLegendElement();
            if (!legend) return;
            legend.innerHTML = "";
            groups.forEach(function (g) {
                var item = document.createElement("div");
                item.className = "legend-item active";
                item.setAttribute("data-group", g);
                item.setAttribute("role", "button");
                item.setAttribute("tabindex", "0");
                item.setAttribute("aria-pressed", "true");

                var square = document.createElement("div");
                square.className = "legend-square";
                square.style.backgroundColor = getGroupColor(g);
                square.style.borderRadius = "4px";

                var label = document.createElement("span");
                label.textContent = g;

                item.appendChild(square);
                item.appendChild(label);

                var toggleGroup = function () {
                    if (activeGroups.has(g)) {
                        activeGroups.delete(g);
                    } else {
                        activeGroups.add(g);
                    }
                    updateVisualization();
                };

                item.addEventListener("click", toggleGroup);
                item.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        toggleGroup();
                    }
                });

                legend.appendChild(item);
            });
            legendInitialized = true;
        }

        function updateLegendStyles() {
            var legend = document.getElementById("legend");
            if (!legend) return;
            var items = legend.querySelectorAll(".legend-item");
            items.forEach(function (item) {
                var grp = item.getAttribute("data-group");
                var isActive = activeGroups.has(grp);
                item.classList.toggle("inactive", !isActive);
                item.classList.toggle("active", isActive);
                item.setAttribute("aria-pressed", isActive ? "true" : "false");
            });
        }

        let barSvg = null;
        let barTooltip = null;

        // Draws a bar path with rounded corners only at the "end" of the bar.
        // For horizontal bars (roundTop=false): rounds the right two corners.
        // For vertical bars (roundTop=true): rounds the top two corners.
        function roundedBarPath(bx, by, bw, bh, r, roundTop) {
            if (bw <= 0 || bh <= 0) return "M" + bx + " " + by + " L" + bx + " " + by;
            r = r > 0 ? Math.min(r, bw / 2, bh / 2) : 0;
            if (!r) return "M" + bx + " " + by + " H" + (bx + bw) + " V" + (by + bh) + " H" + bx + " Z";
            if (roundTop) {
                return ["M", bx, by + r, "Q", bx, by, bx + r, by, "H", bx + bw - r, "Q", bx + bw, by, bx + bw, by + r, "V", by + bh, "H", bx, "Z"].join(" ");
            } else {
                return ["M", bx, by, "H", bx + bw - r, "Q", bx + bw, by, bx + bw, by + r, "V", by + bh - r, "Q", bx + bw, by + bh, bx + bw - r, by + bh, "H", bx, "Z"].join(" ");
            }
        }

        function renderBarChart(width, height) {
            if (!vizContainer) return;

            while (vizContainer.firstChild) {
                vizContainer.removeChild(vizContainer.firstChild);
            }

            if (!Array.isArray(treemapData) || treemapData.length === 0) {
                const empty = document.createElement("div");
                empty.style.display = "flex";
                empty.style.alignItems = "center";
                empty.style.justifyContent = "center";
                empty.style.height = "100%";
                empty.style.fontFamily = "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif";
                empty.style.color = "#666";
                empty.textContent = "No data available";
                vizContainer.appendChild(empty);
                barSvg = null;
                return;
            }

            const isVertical = BAR_ORIENTATION === "vertical";

            // 1. Prepare and sort data first so we can measure label widths for margin sizing
            var data = treemapData.slice();
            var groupedByName = {};
            data.forEach(function (d) {
                var key = d.name || "";
                if (!key) return;
                if (!groupedByName[key]) {
                    groupedByName[key] = {
                        name: d.name,
                        parent: d.parent,
                        value: (typeof d.value === "number" ? d.value : +d.value || 0),
                        color: d.color
                    };
                }
            });
            data = Object.keys(groupedByName).map(function (k) { return groupedByName[k]; });

            if (BAR_SORT_MODE === "descending") {
                data.sort(function (a, b) {
                    return d3.descending(
                        typeof a.value === "number" ? a.value : +a.value || 0,
                        typeof b.value === "number" ? b.value : +b.value || 0
                    );
                });
            } else if (BAR_SORT_MODE === "ascending") {
                data.sort(function (a, b) {
                    return d3.ascending(
                        typeof a.value === "number" ? a.value : +a.value || 0,
                        typeof b.value === "number" ? b.value : +b.value || 0
                    );
                });
            }
            // BAR_SORT_MODE === "none" keeps data in original order

            // 2. Estimate axis label width to set a tight left margin (horizontal bars)
            var maxLabelLen = d3.max(data, function (d) { return (d.name || "").length; }) || 0;
            var estFontPx = Math.max(9, Math.min(13, (height - 44) / Math.max(6, data.length) * 0.6));
            var estimatedLabelWidth = Math.max(40, Math.min(width * 0.28, maxLabelLen * estFontPx * 0.58 + 20));

            // 3. Set margins
            const margin = isVertical
                ? {
                    top: 16,
                    right: Math.max(40, width * 0.06),
                    bottom: Math.max(36, height * 0.1),
                    left: Math.max(40, width * 0.06)
                }
                : {
                    top: 16,
                    right: Math.max(40, width * 0.08),
                    bottom: 28,
                    left: estimatedLabelWidth
                };

            const innerWidth = Math.max(40, width - margin.left - margin.right);
            const innerHeight = Math.max(40, height - margin.top - margin.bottom);

            const svg = d3.select(vizContainer)
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .attr("viewBox", "0 0 " + width + " " + height)
                .style("width", "100%")
                .style("height", "100%");

            barSvg = svg;

            const g = svg.append("g")
                .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

            const maxValue = d3.max(data, function (d) {
                return typeof d.value === "number" ? d.value : +d.value || 0;
            }) || 0;

            let x, y;

            if (isVertical) {
                x = d3.scaleBand()
                    .domain(data.map(function (d) { return d.name; }))
                    .rangeRound([0, innerWidth])
                    .padding(0);

                y = d3.scaleLinear()
                    .domain([0, maxValue * 1.05 || 1])
                    .nice()
                    .range([innerHeight, 0]);
            } else {
                y = d3.scaleBand()
                    .domain(data.map(function (d) { return d.name; }))
                    .rangeRound([0, innerHeight])
                    .padding(0);

                x = d3.scaleLinear()
                    .domain([0, maxValue * 1.05 || 1])
                    .nice()
                    .range([0, innerWidth]);
            }

            const bg = g.append("g").attr("fill", "none");

            if (isVertical) {
                bg.selectAll("rect.col-bg")
                    .data(data)
                    .enter()
                    .append("rect")
                    .attr("class", "col-bg")
                    .attr("x", function (d) { return x(d.name); })
                    .attr("y", 0)
                    .attr("width", x.bandwidth())
                    .attr("height", innerHeight)
                    .attr("fill", function (_d, i) { return i % 2 ? "#f5f5f5" : "#ffffff"; })
                    .attr("pointer-events", "none");
            } else {
                bg.selectAll("rect.row-bg")
                    .data(data)
                    .enter()
                    .append("rect")
                    .attr("class", "row-bg")
                    .attr("x", -margin.left)
                    .attr("y", function (d) { return y(d.name); })
                    .attr("width", innerWidth + margin.left + margin.right)
                    .attr("height", y.bandwidth())
                    .attr("fill", function (_d, i) { return i % 2 ? "#f5f5f5" : "#ffffff"; })
                    .attr("pointer-events", "none");
            }

            const axisFont = Math.max(9, Math.min(13, innerHeight / Math.max(6, data.length) * 0.6));

            if (isVertical) {
                g.append("g")
                    .attr("class", "axis axis--y")
                    .call(d3.axisLeft(y))
                    .selectAll("text")
                    .style("font-size", axisFont + "px")
                    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif");

                g.append("g")
                    .attr("class", "axis axis--x")
                    .attr("transform", "translate(0," + innerHeight + ")")
                    .call(d3.axisBottom(x))
                    .selectAll("text")
                    .style("font-size", axisFont + "px")
                    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif");
            } else {
                g.append("g")
                    .attr("class", "axis axis--y")
                    .call(d3.axisLeft(y))
                    .selectAll("text")
                    .style("font-size", axisFont + "px")
                    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif");

                g.append("g")
                    .attr("class", "axis axis--x")
                    .attr("transform", "translate(0," + innerHeight + ")")
                    .call(d3.axisBottom(x).ticks(4))
                    .selectAll("text")
                    .style("font-size", axisFont + "px")
                    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif");
            }

            const defs = svg.append("defs");
            const grad = defs.append("linearGradient")
                .attr("id", "barGradient")
                .attr("gradientUnits", "objectBoundingBox");

            if (isVertical) {
                grad.attr("x1", "0%").attr("y1", "100%").attr("x2", "0%").attr("y2", "0%");
            } else {
                grad.attr("x1", "0%").attr("y1", "0%").attr("x2", "100%").attr("y2", "0%");
            }

            grad.append("stop").attr("offset", "0%").attr("stop-color", "#cfe8ff");
            grad.append("stop").attr("offset", "100%").attr("stop-color", "#1f78ff");

            if (SHOW_TOOLTIP && !barTooltip) {
                barTooltip = document.createElement("div");
                barTooltip.style.position = "fixed";
                barTooltip.style.pointerEvents = "none";
                barTooltip.style.zIndex = "9999";
                barTooltip.style.background = "#fff";
                barTooltip.style.border = "1px solid #eee";
                barTooltip.style.borderRadius = "2px";
                barTooltip.style.boxShadow = "0px 2px 5px rgba(0, 0, 0, 0.15)";
                barTooltip.style.padding = "6px 8px";
                barTooltip.style.fontSize = "12px";
                barTooltip.style.fontFamily = "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif";
                barTooltip.style.color = "#444";
                barTooltip.style.opacity = "0";
                barTooltip.style.transition = "opacity 0.1s ease";
                barTooltip.style.transform = "translateY(0)";
                document.body.appendChild(barTooltip);
            }

            const barGroup = g.append("g").attr("class", "bars");

            const barThickness = isVertical
                ? Math.max(10, x.bandwidth() * 0.6)
                : Math.max(10, y.bandwidth() * 0.8);

            function getBarFill(d) {
                if (d.color) return d.color;
                if (BAR_COLOR_BY_GROUP) return getGroupColor(d.parent);
                if (PALETTE_MODE === "aiw") return "#2756d3";
                if (PALETTE_MODE === "ceps") return "#207164";
                if (BAR_USE_GRADIENT) return "url(#barGradient)";
                return "#1f78ff";
            }

            // Use path elements so we can round only the "end" corners of each bar
            const bars = barGroup.selectAll("path.bar")
                .data(data)
                .enter()
                .append("path")
                .attr("class", "bar")
                .attr("fill", getBarFill)
                .attr("opacity", 0.95);

            if (isVertical) {
                const xOffset = (x.bandwidth() - barThickness) / 2;
                bars
                    .attr("d", function (d) {
                        return roundedBarPath(x(d.name) + xOffset, innerHeight, barThickness, 0, BAR_BORDER_RADIUS, true);
                    })
                    .transition()
                    .duration(700)
                    .attrTween("d", function (d) {
                        var bx = x(d.name) + xOffset;
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        var finalH = Math.max(4, innerHeight - y(v));
                        var r = BAR_BORDER_RADIUS;
                        return function (t) {
                            var h = finalH * t;
                            return roundedBarPath(bx, innerHeight - h, barThickness, h, r, true);
                        };
                    });
            } else {
                bars
                    .attr("d", function (d) {
                        var yPos = y(d.name) + (y.bandwidth() - barThickness) / 2;
                        return roundedBarPath(0, yPos, 0, barThickness, BAR_BORDER_RADIUS, false);
                    })
                    .transition()
                    .duration(700)
                    .attrTween("d", function (d) {
                        var yPos = y(d.name) + (y.bandwidth() - barThickness) / 2;
                        var finalW = x(d.value || 0);
                        var r = BAR_BORDER_RADIUS;
                        return function (t) {
                            return roundedBarPath(0, yPos, finalW * t, barThickness, r, false);
                        };
                    });
            }

            const formatValue = d3.format(".1f");
            if (BAR_VALUE_POSITION !== "none") {
                barGroup.selectAll("text.value-label")
                    .data(data)
                    .enter()
                    .append("text")
                    .attr("class", "value-label")
                    .attr("x", function (d) {
                        if (isVertical) return x(d.name) + x.bandwidth() / 2;
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        var barW = x(v);
                        if (BAR_VALUE_POSITION === "outside") return barW + 6;
                        // "inside": fall back to outside if the bar is too narrow to fit the label
                        var labelW = formatValue(v).length * Math.max(9, axisFont) * 0.55 + 8;
                        return barW < labelW ? barW + 6 : barW - 6;
                    })
                    .attr("y", function (d) {
                        if (!isVertical) return y(d.name) + (y.bandwidth() * 0.8) / 2 + 4;
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        var topY = y(v);
                        var barH = Math.max(4, innerHeight - topY);
                        if (BAR_VALUE_POSITION === "outside") return topY - 6;
                        // fall back above the bar if it's too short
                        return barH >= Math.max(9, axisFont) + 8 ? topY + Math.min(14, barH / 2) : topY - 6;
                    })
                    .attr("text-anchor", function (d) {
                        if (isVertical) return "middle";
                        if (BAR_VALUE_POSITION === "outside") return "start";
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        var barW = x(v);
                        var labelW = formatValue(v).length * Math.max(9, axisFont) * 0.55 + 8;
                        return barW < labelW ? "start" : "end";
                    })
                    .attr("fill", function (d) {
                        if (BAR_VALUE_POSITION !== "inside") return "#111827";
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        if (isVertical) {
                            return Math.max(4, innerHeight - y(v)) < Math.max(9, axisFont) + 8 ? "#111827" : "#ffffff";
                        }
                        var barW = x(v);
                        var labelW = formatValue(v).length * Math.max(9, axisFont) * 0.55 + 8;
                        return barW < labelW ? "#111827" : "#ffffff";
                    })
                    .style("font-size", Math.max(9, axisFont) + "px")
                    .style("font-weight", "600")
                    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif")
                    .text(function (d) {
                        var v = typeof d.value === "number" ? d.value : +d.value || 0;
                        return formatValue(v);
                    });
            }

            bars.on("mousemove", function (d) {
                if (!barTooltip) return;
                var name = d.name || "";
                var v = typeof d.value === "number" ? d.value : +d.value || 0;
                barTooltip.innerHTML = "<strong>" + name + "</strong><br/>Value: " + formatValue(v);
                barTooltip.style.left = (d3.event.clientX + 14) + "px";
                barTooltip.style.top = (d3.event.clientY - 24) + "px";
                barTooltip.style.opacity = "1";
                barTooltip.style.transform = "translateY(-2px)";
            });

            bars.on("mouseleave", function () {
                if (!barTooltip) return;
                barTooltip.style.opacity = "0";
                barTooltip.style.transform = "translateY(0)";
            });
        }

        function updateVisualization(width, height) {
            treemapData = normalizeData(originalData).filter(function (d) {
                return activeGroups.has(d.parent);
            });

            renderBarChart(width, height);

            updateLegendStyles();
        }

        const renderVisualization = function (currentData, width, height) {
            buildLegend();
            updateVisualization(width, height);
        };

        const renderVisualizationForContainer = function () {
            if (!vizContainer) {
                return
            }
            const rect = vizContainer.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            renderVisualization(null, width, height);
        };

        let resizeTimer;

        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderVisualizationForContainer, 120);
        });

        if (typeof ResizeObserver !== 'undefined' && vizContainer) {
            const resizeObserver = new ResizeObserver(function () {
                renderVisualizationForContainer();
            });
            resizeObserver.observe(vizContainer);
        }

        renderVisualizationForContainer();
    </script>
</body>

</html>
