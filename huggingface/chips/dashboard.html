<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Classification Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #222;
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 14px 0 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            background: #fff;
        }

        .header select {
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid #bbb;
            border-radius: 4px;
            min-width: 380px;
            background: #fff;
            vertical-align: middle;
        }

        .hf-btn {
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
            text-decoration: none;
            color: #222;
            margin-left: 10px;
            display: none;
            vertical-align: middle;
        }

        .hf-btn:hover {
            background: #f0f0f0;
        }

        .diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 24px 12px;
            height: calc(100vh - 50px);
            overflow-y: auto;
        }

        /* Nodes */
        .node {
            border: 1.5px solid #ccc;
            border-radius: 6px;
            padding: 10px 14px;
            background: #fff;
            width: 520px;
        }

        .node-title {
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        .node.dimmed {
            opacity: 0.35;
        }

        /* Two-col layout inside nodes */
        .two-col {
            display: flex;
            gap: 20px;
        }

        .two-col>div {
            flex: 1;
        }

        .col-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #999;
            margin-bottom: 3px;
        }

        /* Key-value */
        .kv {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0;
        }

        .kv .k {
            color: #777;
            font-size: 12px;
        }

        .kv .v {
            font-weight: 600;
        }

        /* Connector arrows with decision labels */
        .connector {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2px 0;
            width: 520px;
        }

        .connector-line {
            width: 1.5px;
            height: 12px;
            background: #bbb;
        }

        .connector-label {
            font-size: 11px;
            color: #666;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 2px 10px;
            margin: 2px 0;
            white-space: nowrap;
        }

        .connector-label.decision {
            background: #fff8e1;
            border-color: #ffe082;
            color: #8d6e00;
        }

        .connector-label.llm-call {
            background: #f3e5f5;
            border-color: #ce93d8;
            color: #6a1b9a;
        }

        .connector-label.skip {
            background: #ffebee;
            border-color: #ef9a9a;
            color: #b71c1c;
        }

        .connector-label.win {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }

        .connector-arrow {
            font-size: 14px;
            color: #bbb;
            line-height: 1;
        }

        /* Confidence bar - full width, color = confidence level */
        .conf-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 1px 0;
        }

        .conf-track {
            flex: 1;
            height: 7px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .conf-fill {
            height: 100%;
            border-radius: 3px;
        }

        .conf-pct {
            font-size: 11px;
            color: #888;
            min-width: 30px;
            text-align: right;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-modelcard {
            background: #fff3cd;
            color: #856404;
        }

        .badge-github_code {
            background: #cce5ff;
            color: #004085;
        }

        .badge-heuristic {
            background: #d4edda;
            color: #155724;
        }

        .badge-llm,
        .badge-llm_chip {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .badge-arxiv_paper {
            background: #fff0e6;
            color: #bf360c;
        }

        .badge-base_model {
            background: #e8eaf6;
            color: #283593;
        }

        .badge-framework_default_derivative {
            background: #fce4ec;
            color: #880e4f;
        }

        .badge-unknown {
            background: #eee;
            color: #888;
        }

        /* Chip / framework value colors */
        .val-nvidia {
            color: #2e7d32;
        }

        .val-google_tpu {
            color: #1565c0;
        }

        .val-intel {
            color: #00838f;
        }

        .val-amd {
            color: #c62828;
        }

        .val-apple {
            color: #555;
        }

        .val-unknown {
            color: #aaa;
        }

        .val-pytorch {
            color: #e65100;
        }

        .val-tensorflow {
            color: #1565c0;
        }

        .val-jax {
            color: #6a1b9a;
        }

        .val-onnx {
            color: #00838f;
        }

        .val-mxnet {
            color: #c62828;
        }

        .val-paddlepaddle {
            color: #0d47a1;
        }

        /* Bar fill colors */
        .fill-nvidia {
            background: #4caf50;
        }

        .fill-google_tpu {
            background: #42a5f5;
        }

        .fill-intel {
            background: #26c6da;
        }

        .fill-amd {
            background: #ef5350;
        }

        .fill-apple {
            background: #9e9e9e;
        }

        .fill-unknown {
            background: #d0d0d0;
        }

        .fill-pytorch {
            background: #ff9800;
        }

        .fill-tensorflow {
            background: #42a5f5;
        }

        .fill-jax {
            background: #ab47bc;
        }

        .fill-onnx {
            background: #26c6da;
        }

        .fill-mxnet {
            background: #ef5350;
        }

        .fill-paddlepaddle {
            background: #1976d2;
        }

        /* GitHub link list */
        .link-list {
            font-size: 11px;
            margin: 3px 0;
        }

        .link-item {
            margin: 1px 0;
        }

        .link-item a {
            color: #1565c0;
            text-decoration: none;
            word-break: break-all;
        }

        .link-item a:hover {
            text-decoration: underline;
        }

        .link-item.selected {
            font-weight: 600;
        }

        .link-item.rejected {
            color: #aaa;
        }

        .link-item.rejected a {
            color: #aaa;
        }

        /* Toggle button for link list */
        .toggle-links-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
            margin-top: 4px;
        }

        .toggle-links-btn:hover {
            color: #222;
        }

        .toggle-links-btn svg {
            width: 12px;
            height: 12px;
            transition: transform 0.2s;
        }

        .toggle-links-btn.expanded svg {
            transform: rotate(180deg);
        }

        .node-conclusion {
            transform: scale(1.05);
            margin: 15px 0 25px 0;
            border-color: #bbb;
            border-width: 2px;
        }

        .conclusion-row {
            display: flex;
            gap: 14px;
        }

        .conclusion-dim {
            flex: 1;
            padding: 6px 10px;
            border-left: 3px solid #ccc;
            border-radius: 0 4px 4px 0;
        }

        .conclusion-dim.src-modelcard {
            border-left-color: #ffc107;
            background: #fffdf0;
        }

        .conclusion-dim.src-github_code {
            border-left-color: #42a5f5;
            background: #f5faff;
        }

        .conclusion-dim.src-arxiv_paper {
            border-left-color: #ff7043;
            background: #fff8f5;
        }

        .conclusion-val {
            font-size: 16px;
            font-weight: 700;
            margin: 2px 0;
        }

        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 3px;
        }

        .pill {
            font-size: 10px;
            padding: 1px 5px;
            background: #f0f0f0;
            border-radius: 3px;
            color: #666;
        }

        .det-files code {
            background: #f5f5f5;
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 10px;
            color: #555;
        }

        .empty {
            color: #999;
            font-style: italic;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

<body>

    <div class="header">
        <select id="sort-select"
            style="font-size: 14px; padding: 6px 12px; border: 1px solid #bbb; border-radius: 4px; background: #fff; vertical-align: middle; margin-right: 10px; min-width: auto;">
            <option value="desc" selected>Default Order</option>
            <option value="asc">Alphabetical</option>
        </select>
        <select id="model-select">
            <option value="">-- Select a model --</option>
        </select>
        <a id="hf-button" class="hf-btn" target="_blank">🤗</a>
    </div>

    <div class="diagram" id="diagram">
        <p class="empty">Select a model</p>
    </div>

    <script>
        let RAW_DATA = [];
        let DATA = [];
        let currentStatsMode = 'results';

        function applySort() {
            const sortVal = document.getElementById('sort-select').value;
            if (sortVal === 'asc') {
                DATA.sort((a, b) => a.id.localeCompare(b.id));
            } else {
                DATA.sort((a, b) => a.original_index - b.original_index);
            }
        }

        function renderModelSelect() {
            const sel = document.getElementById('model-select');
            sel.innerHTML = '<option value="">-- Select a model --</option>';
            DATA.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.original_index;
                opt.textContent = m.id;
                sel.appendChild(opt);
            });
        }

        document.getElementById('sort-select').addEventListener('change', function () {
            const currentSelected = document.getElementById('model-select').value;
            applySort();
            renderModelSelect();
            if (currentSelected !== '') {
                document.getElementById('model-select').value = currentSelected;
            }
        });

        function setStatsMode(mode) {
            currentStatsMode = mode;
            if (document.getElementById('model-select').value === '') {
                document.getElementById('diagram').innerHTML = drawGlobalStats();
            }
        }

        function hasViableEvidence(block, sourceType, finalChip) {
            if (!block) return false;

            const chipMatch = (finalChip && finalChip !== 'unknown')
                ? block.chip_provider === finalChip
                : (block.chip_provider && block.chip_provider !== 'unknown');

            if (sourceType === 'modelcard') {
                return !!(block.matched_sections && block.matched_sections.length) && chipMatch;
            }

            if (sourceType === 'github') {
                return !!(block.detection_files && block.detection_files.length) && chipMatch;
            }

            if (sourceType === 'arxiv') {
                return !!(block.detection_sections && block.detection_sections.length) && chipMatch;
            }

            return false;
        }

        function confColor(val) {
            if (val >= 0.7) return '#4caf50';
            if (val >= 0.4) return '#ff9800';
            return '#ef5350';
        }

        function confBarHTML(val) {
            const pct = Math.round((val || 0) * 100);
            return `<div class="conf-row">
    <div class="conf-track"><div class="conf-fill" style="width:${pct}%;background:${confColor(val || 0)}"></div></div>
    <span class="conf-pct">${pct}%</span>
  </div>`;
        }

        function badgeHTML(src) {
            return `<span class="badge badge-${src || 'unknown'}">${src || 'none'}</span>`;
        }

        function connector(labels) {
            let h = '<div class="connector"><div class="connector-line"></div>';
            labels.forEach(l => { h += `<span class="connector-label ${l.cls || ''}">${l.text}</span>`; });
            h += '<div class="connector-arrow">▼</div></div>';
            return h;
        }

        function drawGlobalStats() {
            let chartHTML = '';

            if (currentStatsMode === 'results') {
                const counts = {};
                let total = 0;
                RAW_DATA.forEach(d => {
                    const provider = (d.conclusion && d.conclusion.chip_provider) ? d.conclusion.chip_provider : 'unknown';
                    counts[provider] = (counts[provider] || 0) + 1;
                    total++;
                });

                if (total === 0) return '<p class="empty">Select a model to view its classification path.</p>';

                const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);

                const colors = {
                    'nvidia': '#4caf50',
                    'google_tpu': '#42a5f5',
                    'intel': '#26c6da',
                    'amd': '#ef5350',
                    'apple': '#9e9e9e',
                    'unknown': '#d0d0d0'
                };

                let conicGrad = [];
                let currentPct = 0;
                let legendHTML = '';

                entries.forEach(([provider, count]) => {
                    const pct = (count / total) * 100;
                    const color = colors[provider] || '#999';
                    conicGrad.push(`${color} ${currentPct}% ${currentPct + pct}%`);
                    currentPct += pct;

                    legendHTML += `<div style="display: flex; align-items: center; gap: 6px;"><span style="display:inline-block; width:14px; height:14px; background:${color}; border-radius:3px;"></span> ${provider} (${count})</div>`;
                });

                const conic = `conic-gradient(\n                ${conicGrad.join(',\n                ')}\n            )`;

                chartHTML = `
                    <h3 style="margin-bottom:20px; color:#444; font-size: 16px;">Chip Provider Distribution</h3>
                    <div style="width: 220px; height: 220px; border-radius: 50%; background: ${conic}; margin: 0 auto; border: 4px solid #fff;"></div>
                    <div style="margin-top: 25px; display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; font-size: 13px; font-weight: 500;">
                        ${legendHTML}
                    </div>
                `;
            } else if (currentStatsMode === 'comparison') {
                let match = 0, mismatch = 0, noEval = 0;
                RAW_DATA.forEach(d => {
                    const correct = d.conclusion && d.conclusion.correct;
                    if (correct === 1) match++;
                    else if (correct === 0) mismatch++;
                    else noEval++;
                });

                const total = match + mismatch + noEval;
                if (total === 0) return '<p class="empty">Select a model to view its classification path.</p>';

                const evaluated = match + mismatch;
                const matchPct = (match / total) * 100;
                const mismatchPct = (mismatch / total) * 100;
                const accuracyPct = evaluated > 0 ? Math.round(match / evaluated * 100) : null;

                const conic = `conic-gradient(
                    #4caf50 0% ${matchPct}%,
                    #ef5350 ${matchPct}% ${matchPct + mismatchPct}%,
                    #e0e0e0 ${matchPct + mismatchPct}% 100%
                )`;

                chartHTML = `
                    <h3 style="margin-bottom:6px; color:#444; font-size: 16px;">Evaluation Accuracy</h3>
                    ${accuracyPct !== null ? `<div style="font-size:28px; font-weight:700; color:${accuracyPct >= 70 ? '#2e7d32' : accuracyPct >= 50 ? '#e65100' : '#c62828'}; margin-bottom:16px;">${accuracyPct}%</div>` : ''}
                    <div style="width: 220px; height: 220px; border-radius: 50%; background: ${conic}; margin: 0 auto; border: 4px solid #fff;"></div>
                    <div style="margin-top: 25px; display: flex; justify-content: center; gap: 20px; font-size: 13px; font-weight: 500;">
                        <div style="display: flex; align-items: center; gap: 6px;"><span style="display:inline-block; width:14px; height:14px; background:#4caf50; border-radius:3px;"></span> Correct (${match})</div>
                        <div style="display: flex; align-items: center; gap: 6px;"><span style="display:inline-block; width:14px; height:14px; background:#ef5350; border-radius:3px;"></span> Incorrect (${mismatch})</div>
                        ${noEval > 0 ? `<div style="display: flex; align-items: center; gap: 6px;"><span style="display:inline-block; width:14px; height:14px; background:#e0e0e0; border-radius:3px;"></span> Not evaluated (${noEval})</div>` : ''}
                    </div>
                `;
            } else {
                const total = RAW_DATA.length;
                if (total === 0) return '<p class="empty">Select a model to view its classification path.</p>';

                let modelcardCount = 0, githubCount = 0, arxivCount = 0;
                const combos = {};

                RAW_DATA.forEach(d => {
                    const m = hasViableEvidence(d.modelcard_analysis, 'modelcard', d.chip_provider);
                    const g = hasViableEvidence(d.github_code_analysis, 'github', d.chip_provider);
                    const a = hasViableEvidence(d.arxiv_paper_analysis, 'arxiv', d.chip_provider);

                    if (m) modelcardCount++;
                    if (g) githubCount++;
                    if (a) arxivCount++;

                    const key = `m=${m ? 1 : 0} g=${g ? 1 : 0} a=${a ? 1 : 0}`;
                    combos[key] = (combos[key] || 0) + 1;
                });

                const iconCell = (present, label, color) => `
                    <td style="padding:10px 8px; text-align:center;" aria-label="${label}: ${present ? 'yes' : 'no'}">
                        <span style="
                            display:inline-flex;
                            align-items:center;
                            justify-content:center;
                            width:22px;
                            height:22px;
                            border-radius:999px;
                            border:1px solid ${present ? color : '#d6d6d6'};
                            background:${present ? color : '#f5f5f5'};
                            color:${present ? '#fff' : '#9a9a9a'};
                            font-size:12px;
                            font-weight:700;
                        ">${present ? '✓' : '–'}</span>
                    </td>
                `;

                const comboEntries = Object.entries(combos)
                    .sort((a, b) => b[1] - a[1])
                    .map(([label, count]) => {
                        const match = label.match(/m=(\d) g=(\d) a=(\d)/);
                        const modelcard = match && match[1] === '1';
                        const github = match && match[2] === '1';
                        const arxiv = match && match[3] === '1';
                        return `
                            <tr>
                                ${iconCell(modelcard, 'Model card', '#f9a825')}
                                ${iconCell(github, 'GitHub', '#1e88e5')}
                                ${iconCell(arxiv, 'arXiv', '#f4511e')}
                                <td style="padding:10px 12px; text-align:right; white-space:nowrap; font-weight:600; color:#222;">${count}</td>
                                <td style="padding:10px 12px; text-align:right; white-space:nowrap; color:#666;">${Math.round(count / total * 100)}%</td>
                            </tr>
                        `;
                    }).join('');

                const noEvidence = combos['m=0 g=0 a=0'] || 0;
                const sourceCard = (title, count, color) => `
                    <div style="flex:1; min-width:180px; background:#fff; border:1px solid #ddd; border-radius:8px; padding:16px;">
                        <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.4px; color:#777; margin-bottom:6px;">${title}</div>
                        <div style="font-size:28px; font-weight:700; color:${color}; margin-bottom:6px;">${count}</div>
                        <div style="font-size:12px; color:#666;">${Math.round(count / total * 100)}% of models</div>
                    </div>
                `;

                chartHTML = `
                    <div style="font-size:12px; color:#666; margin-bottom:22px;">* Viable evidence means source produced at least one non-unknown chip signal with supporting matched sections/files.</div>
                    <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:14px; margin:0 auto 24px; max-width:900px;">
                        ${sourceCard('Model card signal', modelcardCount, '#f9a825')}
                        ${sourceCard('GitHub signal', githubCount, '#1e88e5')}
                        ${sourceCard('arXiv signal', arxivCount, '#f4511e')}
                        ${sourceCard('No signal anywhere', noEvidence, '#9e9e9e')}
                    </div>
                    <div style="max-width:760px; margin:0 auto; background:#fff; border:1px solid #ddd; border-radius:8px; padding:18px 22px; text-align:left;">
                        <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.4px; color:#777; margin-bottom:10px;">Source overlap</div>
                        <table style="width:100%; border-collapse:collapse; font-size:12px;">
                            <thead>
                                <tr style="border-bottom:1px solid #e5e5e5;">
                                    <th style="padding:0 8px 10px; text-align:center; color:#777; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">Model card</th>
                                    <th style="padding:0 8px 10px; text-align:center; color:#777; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">GitHub</th>
                                    <th style="padding:0 8px 10px; text-align:center; color:#777; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">arXiv</th>
                                    <th style="padding:0 12px 10px; text-align:right; color:#777; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">Models</th>
                                    <th style="padding:0 12px 10px; text-align:right; color:#777; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">Share</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${comboEntries}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            const tabsHTML = `
                <div style="display:flex; justify-content:center; gap: 10px; margin-bottom: 30px;">
                    <button onclick="setStatsMode('results')" style="padding: 6px 16px; border-radius: 20px; border: 1px solid #ccc; background: ${currentStatsMode === 'results' ? '#e0e0e0' : '#fff'}; cursor: pointer; font-size: 12px; font-weight: ${currentStatsMode === 'results' ? '600' : '400'}; transition: all 0.2s;">Results Mode</button>
                    <button onclick="setStatsMode('comparison')" style="padding: 6px 16px; border-radius: 20px; border: 1px solid #ccc; background: ${currentStatsMode === 'comparison' ? '#e0e0e0' : '#fff'}; cursor: pointer; font-size: 12px; font-weight: ${currentStatsMode === 'comparison' ? '600' : '400'}; transition: all 0.2s;">Comparison Mode</button>
                    <button onclick="setStatsMode('coverage')" style="padding: 6px 16px; border-radius: 20px; border: 1px solid #ccc; background: ${currentStatsMode === 'coverage' ? '#e0e0e0' : '#fff'}; cursor: pointer; font-size: 12px; font-weight: ${currentStatsMode === 'coverage' ? '600' : '400'}; transition: all 0.2s;">Coverage Mode</button>
                </div>
            `;

            return `
            <div style="text-align:center; margin-top: 40px; width: 100%;">
                ${tabsHTML}
                ${chartHTML}
                <p class="empty" style="margin-top:40px;">Select a model to view its classification path.</p>
            </div>
            `;
        }

        fetch('results.json')
            .then(r => r.json())
            .then(data => {
                RAW_DATA = data;
                RAW_DATA.forEach((d, i) => d.original_index = i);
                DATA = [...RAW_DATA];
                applySort();
                renderModelSelect();
                document.getElementById('diagram').innerHTML = drawGlobalStats();
            })
            .catch(e => {
                document.getElementById('diagram').innerHTML = '<p class="empty">Failed to load ../database/results.json: ' + e.message + '</p>';
            });

        document.getElementById('model-select').addEventListener('change', function () {
            const hfBtn = document.getElementById('hf-button');
            if (this.value === '') {
                document.getElementById('diagram').innerHTML = drawGlobalStats();
                hfBtn.style.display = 'none';
                return;
            }
            const model = RAW_DATA[parseInt(this.value)];
            hfBtn.href = 'https://huggingface.co/' + model.id;
            hfBtn.style.display = 'inline-block';
            render(model);
        });

        function render(m) {
            const mc = m.modelcard_analysis || {};
            const gr = m.github_resolution || {};
            const gc = m.github_code_analysis || {};
            const ar = m.arxiv_resolution || {};
            const ap = m.arxiv_paper_analysis || {};
            const co = m.conclusion || {};
            const hasGithub = gr.selected_link != null;
            const hasArxiv = ar.selected_link != null;
            const chipWin = co.chip_provider_source;
            const fwWin = co.framework_source;

            let h = '';

            h += '<div class="node">';
            h += '<div class="node-title">1. Model Card Analysis</div>';
            h += '<div class="two-col">';
            h += '<div>';
            h += `<div class="kv"><span class="k">Chip</span><span class="v val-${mc.chip_provider || 'unknown'}">${mc.chip_provider || 'unknown'}</span></div>`;
            h += confBarHTML(mc.chip_provider_confidence);
            h += '</div>';
            h += '<div>';
            h += `<div class="kv"><span class="k">Framework</span><span class="v val-${mc.framework || 'unknown'}">${mc.framework || 'unknown'}</span></div>`;
            h += confBarHTML(mc.framework_confidence);
            h += '</div>';
            h += '</div>';
            if (mc.matched_sections && mc.matched_sections.length) {
                h += '<div style="margin-top:5px"><span class="k" style="font-size:11px">Sections: </span><span class="pills">';
                mc.matched_sections.forEach(s => h += `<span class="pill">${s}</span>`);
                h += '</span></div>';
            }
            h += '</div>';

            const numGhCandidates = (gr.candidate_links || []).length;
            if (numGhCandidates > 0) {
                h += connector([{ text: `${numGhCandidates} GitHub link${numGhCandidates > 1 ? 's' : ''} found in model card`, cls: '' }]);
            } else {
                h += connector([{ text: 'No GitHub links in model card', cls: 'skip' }]);
            }

            h += `<div class="node${!hasGithub && numGhCandidates === 0 ? ' dimmed' : ''}">`;
            h += '<div class="node-title">2. GitHub Link Selection</div>';

            if (numGhCandidates === 0) {
                h += '<div style="color:#aaa;font-style:italic">Skipped — no candidate links</div>';
            } else if (numGhCandidates === 1) {
                const link = gr.candidate_links[0] || '';
                const short = link.replace('https://github.com/', '');
                const isSel = link === gr.selected_link;
                h += `<div class="kv"><span class="k">Only candidate</span><span class="v" style="font-size:11px"><a href="${link}" target="_blank" style="color:${isSel ? '#1565c0' : '#aaa'};text-decoration:none">${short}</a>${isSel ? '' : ' (rejected)'}</span></div>`;
                h += confBarHTML(gr.heuristic_confidence);
            } else {
                h += `<button class="toggle-links-btn" onclick="toggleLinks(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    Show ${numGhCandidates} links
                </button>`;
                h += '<div class="link-list" style="display:none;">';
                (gr.candidate_links || []).forEach(link => {
                    if (!link) return;
                    const isSel = link === gr.selected_link;
                    const short = link.replace('https://github.com/', '');
                    h += `<div class="link-item${isSel ? ' selected' : ' rejected'}">${isSel ? '→ ' : '&nbsp;&nbsp;'}<a href="${link}" target="_blank">${short}</a></div>`;
                });
                h += '</div>';
                h += `<div class="kv" style="margin-top:4px"><span class="k">Selected by</span>${badgeHTML(gr.source)}</div>`;
                h += confBarHTML(gr.heuristic_confidence);
                if (gr.source === 'llm') {
                    h += '<div style="font-size:11px;color:#6a1b9a;margin-top:3px">Heuristic confidence too low — LLM chose the link</div>';
                }
            }
            h += '</div>';

            if (hasGithub) {
                const connLabels = [];
                if (gr.source === 'llm') {
                    connLabels.push({ text: 'LLM selected repo', cls: 'llm-call' });
                } else if (numGhCandidates > 1) {
                    connLabels.push({ text: 'Heuristic picked best match', cls: 'decision' });
                }
                connLabels.push({ text: 'Fetching & scanning repo code', cls: '' });
                h += connector(connLabels);
            } else {
                h += connector([{ text: 'No repo to analyze — skipping code scan', cls: 'skip' }]);
            }

            h += `<div class="node${!hasGithub ? ' dimmed' : ''}">`;
            h += '<div class="node-title">3. GitHub Code Analysis</div>';
            if (hasGithub) {
                h += '<div class="two-col">';
                h += '<div>';
                h += `<div class="kv"><span class="k">Chip</span><span class="v val-${gc.chip_provider || 'unknown'}">${gc.chip_provider || 'unknown'}</span></div>`;
                h += confBarHTML(gc.chip_provider_confidence);
                h += '</div>';
                h += '<div>';
                h += `<div class="kv"><span class="k">Framework</span><span class="v val-${gc.framework || 'unknown'}">${gc.framework || 'unknown'}</span></div>`;
                h += confBarHTML(gc.framework_confidence);
                h += '</div>';
                h += '</div>';
                if (gc.detection_files && gc.detection_files.length) {
                    h += '<div style="margin-top:4px"><span class="k" style="font-size:11px">Scanned: </span>';
                    h += gc.detection_files.map(f => `<code>${f}</code>`).join(' ');
                    h += '</div>';
                }
            } else {
                h += '<div style="color:#aaa;font-style:italic">Skipped — no repo</div>';
            }
            h += '</div>';

            const numAxCandidates = (ar.candidate_links || []).length;
            if (numAxCandidates > 0) {
                h += connector([{ text: `${numAxCandidates} arXiv paper${numAxCandidates > 1 ? 's' : ''} found in model card`, cls: '' }]);
            } else {
                h += connector([{ text: 'No arXiv papers in model card', cls: 'skip' }]);
            }

            h += `<div class="node${!hasArxiv && numAxCandidates === 0 ? ' dimmed' : ''}">`;
            h += '<div class="node-title">4. ArXiv Paper Analysis</div>';

            if (numAxCandidates === 0) {
                h += '<div style="color:#aaa;font-style:italic">Skipped — no arXiv papers found</div>';
            } else {
                if (hasArxiv) {
                    const paperLink = ar.selected_link;
                    const paperId = paperLink.replace('https://arxiv.org/abs/', '');
                    h += `<div class="kv"><span class="k">Selected paper</span><span class="v" style="font-size:11px"><a href="${paperLink}" target="_blank" style="color:#bf360c;text-decoration:none">${paperId}</a></span></div>`;
                    h += `<div class="kv" style="margin-top:2px"><span class="k">Selected by</span>${badgeHTML(ar.source)}</div>`;
                    h += confBarHTML(ar.heuristic_confidence);

                    if (numAxCandidates > 1) {
                        h += `<button class="toggle-links-btn" onclick="toggleLinks(this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            Show all ${numAxCandidates} papers
                        </button>`;
                        h += '<div class="link-list" style="display:none;">';
                        (ar.candidate_links || []).forEach(link => {
                            if (!link) return;
                            const isSel = link === ar.selected_link;
                            const pid = link.replace('https://arxiv.org/abs/', '');
                            h += `<div class="link-item${isSel ? ' selected' : ' rejected'}">${isSel ? '→ ' : '&nbsp;&nbsp;'}<a href="${link}" target="_blank">${pid}</a></div>`;
                        });
                        h += '</div>';
                    }

                    if (ap.chip_provider && ap.chip_provider !== 'unknown' || ap.framework && ap.framework !== 'unknown') {
                        h += '<div class="two-col" style="margin-top:6px">';
                        h += '<div>';
                        h += `<div class="kv"><span class="k">Chip</span><span class="v val-${ap.chip_provider || 'unknown'}">${ap.chip_provider || 'unknown'}</span></div>`;
                        h += confBarHTML(ap.chip_provider_confidence);
                        h += '</div>';
                        h += '<div>';
                        h += `<div class="kv"><span class="k">Framework</span><span class="v val-${ap.framework || 'unknown'}">${ap.framework || 'unknown'}</span></div>`;
                        h += confBarHTML(ap.framework_confidence);
                        h += '</div>';
                        h += '</div>';
                    } else {
                        h += '<div style="color:#aaa;font-style:italic;margin-top:4px">No hardware/framework signals found in paper</div>';
                    }

                    if (ap.detection_sections && ap.detection_sections.length) {
                        h += '<div style="margin-top:4px"><span class="k" style="font-size:11px">Sections: </span><span class="pills">';
                        ap.detection_sections.forEach(s => h += `<span class="pill">${s}</span>`);
                        h += '</span></div>';
                    }
                } else {
                    h += '<div style="color:#aaa;font-style:italic">Papers found but none selected as primary</div>';
                }
            }
            h += '</div>';

            const usedLlm = chipWin === 'llm_chip';
            if (usedLlm) {
                h += connector([{ text: 'Heuristics conflicted or were too low — triggering AI fallback', cls: 'llm-call' }]);
            } else {
                h += connector([{ text: 'Heuristics were sufficiently confident', cls: 'skip' }]);
            }

            h += `<div class="node${!usedLlm ? ' dimmed' : ''}">`;
            h += '<div class="node-title">5. AI Chip Verification</div>';
            if (usedLlm) {
                h += `<div class="kv"><span class="k">LLM Output</span><span class="v val-${co.chip_provider || 'unknown'}">${co.chip_provider || 'unknown'}</span></div>`;
                h += confBarHTML(co.chip_provider_confidence);
            } else {
                h += '<div style="color:#aaa;font-style:italic">Skipped — no ambiguity detected</div>';
            }
            h += '</div>';

            const decLabels = [];

            if (chipWin === 'llm_chip') {
                decLabels.push({ text: `Chip: AI verified as ${co.chip_provider}`, cls: 'win' });
            } else if (chipWin === 'arxiv_paper') {
                decLabels.push({ text: `Chip: arXiv paper (${Math.round((ap.chip_provider_confidence || 0) * 100)}%) wins — highest priority`, cls: 'win' });
            } else if (chipWin === 'github_code') {
                decLabels.push({ text: `Chip: GitHub code (${Math.round((gc.chip_provider_confidence || 0) * 100)}%) beat model card (${Math.round((mc.chip_provider_confidence || 0) * 100)}%)`, cls: 'win' });
            } else if (chipWin === 'modelcard') {
                const reason = !hasGithub ? 'no GitHub data' :
                    (gc.chip_provider_confidence || 0) < 0.3 ? 'GitHub below 30% threshold' :
                        `model card (${Math.round((mc.chip_provider_confidence || 0) * 100)}%) ≥ GitHub (${Math.round((gc.chip_provider_confidence || 0) * 100)}%)`;
                decLabels.push({ text: `Chip: model card wins — ${reason}`, cls: 'decision' });
            } else if (chipWin === 'base_model') {
                decLabels.push({ text: `Chip: inherited from base model`, cls: 'decision' });
            } else {
                decLabels.push({ text: 'Chip: all sources unknown', cls: 'skip' });
            }

            if (fwWin === 'arxiv_paper') {
                decLabels.push({ text: `Framework: arXiv paper (${Math.round((ap.framework_confidence || 0) * 100)}%) wins — highest priority`, cls: 'win' });
            } else if (fwWin === 'github_code') {
                decLabels.push({ text: `Framework: GitHub code (${Math.round((gc.framework_confidence || 0) * 100)}%) beat model card (${Math.round((mc.framework_confidence || 0) * 100)}%)`, cls: 'win' });
            } else if (fwWin === 'modelcard') {
                const reason = !hasGithub ? 'no GitHub data' :
                    (gc.framework_confidence || 0) < 0.3 ? 'GitHub below 30% threshold' :
                        `model card (${Math.round((mc.framework_confidence || 0) * 100)}%) ≥ GitHub (${Math.round((gc.framework_confidence || 0) * 100)}%)`;
                decLabels.push({ text: `Framework: model card wins — ${reason}`, cls: 'decision' });
            } else {
                decLabels.push({ text: 'Framework: all sources unknown', cls: 'skip' });
            }
            h += connector(decLabels);

            h += '<div class="node node-conclusion">';
            h += '<div class="node-title">6. Conclusion</div>';
            h += '<div class="conclusion-row">';

            h += `<div class="conclusion-dim src-${chipWin || ''}">`;
            h += `<div class="conclusion-val val-${co.chip_provider || 'unknown'}">${co.chip_provider || 'unknown'}</div>`;
            h += `<div class="kv"><span class="k">Chip Provider</span>${badgeHTML(chipWin)}</div>`;
            h += confBarHTML(co.chip_provider_confidence);
            h += '</div>';

            h += `<div class="conclusion-dim src-${fwWin || ''}">`;
            h += `<div class="conclusion-val val-${co.framework || 'unknown'}">${co.framework || 'unknown'}</div>`;
            h += `<div class="kv"><span class="k">Framework</span>${badgeHTML(fwWin)}</div>`;
            h += confBarHTML(co.framework_confidence);
            h += '</div>';
            h += '</div>';

            if (co.correct === 1) {
                h += `<div style="margin-top:12px; padding:8px 12px; background:#e8f5e9; border:1px solid #a5d6a7; color:#2e7d32; border-radius:4px; font-weight:600; font-size:12px;">`;
                h += `✓ Correct — matches ground truth`;
                if (co.expected_provider) h += ` (expected: ${co.expected_provider})`;
                h += `</div>`;
            } else if (co.correct === 0) {
                h += `<div style="margin-top:12px; padding:8px 12px; background:#ffebee; border:1px solid #ef9a9a; color:#b71c1c; border-radius:4px; font-weight:600; font-size:12px;">`;
                h += `✗ Incorrect`;
                if (co.expected_provider) h += ` — expected <strong>${co.expected_provider}</strong>, got <strong>${co.chip_provider || 'unknown'}</strong>`;
                h += `</div>`;
            }

            h += '</div>';

            document.getElementById('diagram').innerHTML = h;
        }

        function toggleLinks(btn) {
            btn.classList.toggle('expanded');
            const list = btn.nextElementSibling;
            if (list.style.display === 'none') {
                list.style.display = 'block';
            } else {
                list.style.display = 'none';
            }
        }
    </script>
</body>

</html>
