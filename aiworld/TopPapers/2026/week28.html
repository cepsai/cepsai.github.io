<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-28";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Fortuitous Forgetting in Connectionist Networks",
                "authors": "Hattie Zhou, Ankit Vani, Hugo Larochelle et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2202.00155"
            },
            {
                "title": "Loss of Plasticity in Deep Continual Learning",
                "authors": "Shibhansh Dohare, J. Fernando Hernandez-Garcia, Qingfeng Lan et al.",
                "icon": "fa-solid fa-gears",
                "url": "https://www.nature.com/articles/s41586-024-07711-7"
            },
            {
                "title": "Forgetting Transformer: Softmax Attention with a Forget Gate",
                "authors": "Zhixuan Lin, Evgenii Nikishin, Xu Owen He et al.",
                "icon": "fa-solid fa-arrows-rotate",
                "url": "https://arxiv.org/abs/2503.02130"
            },
            {
                "title": "Measuring Forgetting of Memorized Training Examples",
                "authors": "Matthew Jagielski, Om Thakkar, Florian Tramèr et al.",
                "icon": "fa-solid fa-chart-line",
                "url": "https://arxiv.org/abs/2207.00099"
            },
            {
                "title": "A Quantitative Characterization of Forgetting in Post-Training",
                "authors": "Krishnakumar Balasubramanian, Shiva Prasad Kasiviswanathan",
                "icon": "fa-solid fa-chart-column",
                "url": "https://arxiv.org/abs/2603.12163"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
