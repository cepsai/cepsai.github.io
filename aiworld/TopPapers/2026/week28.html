<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-28";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Limits to AI Growth: The Ecological and Social Consequences of Scaling",
                "authors": "Eshta Bhardwaj, Rohan Alexander, Christoph Becker",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2501.17980"
            },
            {
                "title": "Photons = Tokens: The Physics of AI and the Economics of Knowledge",
                "authors": "Alec Litowitz, Nick Polson, Vadim Sokolov",
                "icon": "fa-solid fa-atom",
                "url": "https://arxiv.org/abs/2603.06630"
            },
            {
                "title": "Power hungry: How AI will drive energy demand",
                "authors": "Christian Bogmans, Ganchimeg Ganpurev, Patricia Gomez-Gonzalez et al.",
                "icon": "fa-solid fa-battery-full",
                "url": "https://www.imf.org/en/Publications/WP/Issues/2025/04/21/Power-Hungry-How-AI-Will-Drive-Energy-Demand-566304"
            },
            {
                "title": "Power Couple? AI Growth and Renewable Energy Investment",
                "authors": "Luyi Gui, Tinglong Dai",
                "icon": "fa-solid fa-seedling",
                "url": "https://arxiv.org/abs/2603.26678"
            },
            {
                "title": "Powering the Future of AI: Navigating the Trade-offs for Europe's Energy Transition and Net-Zero Goals",
                "authors": "Mohammad Hemmati, Gbemi Oluleye, Vassilis M. Charitopoulos",
                "icon": "fa-solid fa-bolt",
                "url": "https://arxiv.org/abs/2606.09617"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
