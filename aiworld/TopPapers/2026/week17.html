<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-17";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Generative AI in architectural design: Application, data, and evaluation methods",
                "authors": "Suhyung Jang, Hyunsung Roh, Ghang Lee",
                "icon": "fa-solid fa-compass-drafting",
                "url": "https://www.sciencedirect.com/science/article/abs/pii/S0926580525002146"
            },
            {
                "title": "Shaping Architecture with Generative Artificial Intelligence: Deep Learning Models in Architectural Design Workflow",
                "authors": "Socrates Yiannoudes",
                "icon": "fa-solid fa-diagram-project",
                "url": "https://www.mdpi.com/2673-8945/5/4/94"
            },
            {
                "title": "The Double-Edged Roles of Generative AI in the Creative Process: Experiments on Design Work",
                "authors": "Jinghui Hou, Lei Wang, Gang Wang et al.",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://pubsonline.informs.org/doi/10.1287/isre.2024.0937"
            },
            {
                "title": "Generative AI enhances individual creativity but reduces the collective diversity of novel content",
                "authors": "Anil Doshi, Oliver Hauser",
                "icon": "fa-solid fa-people-group",
                "url": "https://www.science.org/doi/10.1126/sciadv.adn5290"
            },
            {
                "title": "Residential floor plans: Multi-conditional automatic generation using diffusion models",
                "authors": "Pengyu Zeng, Wen Gao, Jun Yin",
                "icon": "fa-solid fa-draw-polygon",
                "url": "https://www.sciencedirect.com/science/article/abs/pii/S0926580524001109"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
