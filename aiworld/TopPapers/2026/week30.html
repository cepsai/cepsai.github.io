<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-30";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Transparency as Architecture: Structural Compliance Gaps in EU AI Act Article 50 II",
                "authors": "Vera Schmitt, Niklas Kruse, Premtim Sahitaj, Julius Schöning",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://arxiv.org/abs/2603.26983"
            },
            {
                "title": "Adoption of Watermarking for Generative AI Systems in Practice and Implications under the new EU AI Act",
                "authors": "Bram Rijsbosch, Gijs van Dijck, Konrad Kollnig",
                "icon": "fa-solid fa-magnifying-glass",
                "url": "https://arxiv.org/abs/2503.18156"
            },
            {
                "title": "Watermarking Large Language Models in Europe: Interpreting the AI Act in Light of Technology",
                "authors": "Thomas Souverain",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2511.03641"
            },
            {
                "title": "Secure and Robust Watermarking for AI-generated Images: A Comprehensive Survey",
                "authors": "Jie Cao, Qi Li, Zelin Zhang, Jianbing Ni, Rongxing Lu",
                "icon": "fa-solid fa-shield-halved",
                "url": "https://arxiv.org/abs/2510.02384"
            },
            {
                "title": "Seeing Is No Longer Believing: Frontier Image Generation Models, Synthetic Visual Evidence, and Real-World Risk",
                "authors": "Shuai Wu, Xue Li, Yanna Feng et al.",
                "icon": "fa-solid fa-eye",
                "url": "https://arxiv.org/abs/2604.24197"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
