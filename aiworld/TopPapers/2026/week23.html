<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-23";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "The Turing trap: the promise and peril of human-like artificial intelligenc",
                "authors": "Erik Brynjolfsson",
                "icon": "fa-solid fa-robot",
                "url": "https://www.amacad.org/publication/daedalus/turing-trap-promise-peril-human-artificial-intelligence"
            },
            {
                "title": "Generative AI at work. The Quarterly Journal of Economics",
                "authors": "Erik Brynjolfsson, Danielle Li, Lindsey R. Raymond",
                "icon": "fa-solid fa-briefcase",
                "url": "https://academic.oup.com/qje/article/140/2/889/7990658"
            },
            {
                "title": "Navigating the jagged technological frontier: field experimental evidence of the effects of artificial intelligence on knowledge worker productivity and quality",
                "authors": "Fabrizio Dell'Acqua, Edward McFowland III, Ethan Mollick et al.",
                "icon": "fa-solid fa-compass",
                "url": "https://www.hbs.edu/faculty/Pages/item.aspx?num=64700"
            },
            {
                "title": "AI-generated 'workslop' is destroying productivity",
                "authors": "Kate Niederhoffer, Gabriella Rosen Kellerman, Angela Lee et al.",
                "icon": "fa-solid fa-triangle-exclamation",
                "url": "https://hbr.org/2025/09/ai-generated-workslop-is-destroying-productivity"
            },
            {
                "title": "Can we have pro-worker AI? Choosing a path of machines in service of minds",
                "authors": "Daron Acemoglu, David Autor, Simon Johnson",
                "icon": "fa-solid fa-handshake",
                "url": "https://cepr.org/publications/policy-insight-123-can-we-have-pro-worker-ai-choosing-path-machines-service-minds"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
