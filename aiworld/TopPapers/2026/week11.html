<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-11";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "The Brussels Side-Effect: How the AI Act Can Reduce the Global Reach of EU Policy",
                "authors": "Marco Almada & Anca Radu",
                "icon": "fa-solid fa-scale-balanced",
                "url": "hhttps://www.cambridge.org/core/journals/german-law-journal/article/brussels-sideeffect-how-the-ai-act-can-reduce-the-global-reach-of-eu-policy/032C72AEC537EBB6AE96C0FD90387E3E"
            },
            {
                "title": "The EU AI Act will have global impact, but a limited Brussels Effect",
                "authors": "Alex Engler",
                "icon": "fa-solid fa-globe",
                "url": "https://www.brookings.edu/articles/the-eu-ai-act-will-have-global-impact-but-a-limited-brussels-effect/"
            },
            {
                "title": "The Brussels Effect and Artificial Intelligence: How EU regulation will impact the global AI market",
                "authors": "Charlotte Siegmann & Markus Anderljung",
                "icon": "fa-solid fa-money-bill-trend-up",
                "url": "https://arxiv.org/abs/2208.12645"
            },
            {
                "title": "EU AI Act: Brussels effect(s) or a race to the bottom?",
                "authors": "Graham Greenleaf",
                "icon": "fa-solid fa-magnifying-glass",
                "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4975172"
            },
            {
                "title": "Towards the Effective Extraterritorial Enforcement of the AI Act",
                "authors": "Michal Czerniawski",
                "icon": "fa-solid fa-clipboard",
                "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4975460"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
