<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-19";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Ukraine's future vision and current capabilities for waging AI-enabled autonomous warfare",
                "authors": "Kateryna Bondar",
                "icon": "fa-solid fa-robot",
                "url": "https://www.csis.org/analysis/ukraines-future-vision-and-current-capabilities-waging-ai-enabled-autonomous-warfare"
            },
            {
                "title": "Code, command, and conflict: charting the future of military AI",
                "authors": "Priyesh Mishra, Prakhar Pandey, Leah Cole et al.",
                "icon": "fa-solid fa-terminal",
                "url": "https://www.belfercenter.org/research-analysis/code-command-and-conflict-charting-future-military-ai"
            },
            {
                "title": "Restructuring the EU's defence industrial base amid geopolitical shifts",
                "authors": "Davide Genini",
                "icon": "fa-solid fa-industry",
                "url": "https://journals.sagepub.com/doi/10.1177/1023263X251394132"
            },
            {
                "title": "Lethal autonomous weapon systems (LAWS): meaningful human control, collective moral responsibility and institutional design",
                "authors": "Seumas Miller",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://link.springer.com/article/10.1007/s10676-025-09874-x"
            },
            {
                "title": "Algorithmic war and the dangers of in-visibility, anonymity, and fragmentation",
                "authors": "Bianca Baggiarini",
                "icon": "fa-solid fa-chart-simple",
                "url": "https://www.tandfonline.com/doi/full/10.1080/10357718.2024.2333824"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
