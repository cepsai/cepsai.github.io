<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-15";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Characterizing Web Search in The Age of Generative AI",
                "authors": "Abbas Jafar, Nabila Bibi, Rizwan Ali Naqvi et al.",
                "icon": "fa-solid fa-magnifying-glass-chart",
                "url": "https://arxiv.org/abs/2510.11560"
            },
            {
                "title": "Generative AI Search Engines as Arbiters of Public Knowledge: An Audit of Bias and Authority",
                "authors": "Alice Li, Luanne Sinnamon",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://arxiv.org/abs/2405.14034"
            },
            {
                "title": "IAnswer Bubbles: Information Exposure in AI-Mediated Search",
                "authors": "Michelle Huang, Agam Goyal, Koustuv Saha et al.",
                "icon": "fa-solid fa-filter",
                "url": "https://arxiv.org/abs/2603.16138"
            },
            {
                "title": "Impact of AI Search Summaries on Website Traffic: Evidence from Google AI Overviews and Wikipedia",
                "authors": "Mehrzad Khosravi, Hema Yoganarasimhan",
                "icon": "fa-solid fa-laptop",
                "url": "fa-solid fa-arrow-trend-up"
            },
            {
                "title": "NExT-Search: Rebuilding User Feedback Ecosystem for Generative AI Search",
                "authors": "Sunhao Dai, Ziyi Chen, Weizhi Ma, Pengjie Ren et al.",
                "icon": "fa-solid fa-recycle",
                "url": "fa-solid fa-arrows-rotate"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
