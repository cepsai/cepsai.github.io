<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-27";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Studying the Effect of AI Code Generators on Supporting Novice Learners in Introductory Programming",
                "authors": "Majeed Kazemitabaar, Justin Chow, Carl Ka To Ma et al.",
                "icon": "fa-solid fa-rocket",
                "url": "https://dl.acm.org/doi/10.1145/3544548.3580919"
            },
            {
                "title": "Signals in the Noise: Open Source Intelligence (OSINT) for AI Loss of Control Detection",
                "authors": "Sarah Bollinger, Nada Aboserie, Amanda Coakley et al.",
                "icon": "fa-solid fa-globe",
                "url": "https://arxiv.org/abs/2606.20610"
            },
            {
                "title": "Granular Privacy Control for Geolocation with Vision Language Models",
                "authors": "Ethan Mendes, Yang Chen, James Hays et al.",
                "icon": "fa-solid fa-shield-halved",
                "url": "https://arxiv.org/abs/2407.04952"
            },
            {
                "title": "LLM Agents can Autonomously Exploit One-day Vulnerabilities",
                "authors": "Richard Fang, Rohan Bindu, Akul Gupta et al.",
                "icon": "fa-solid fa-triangle-exclamation",
                "url": "https://arxiv.org/abs/2404.08144"
            },
            {
                "title": "Teams of LLM Agents can Exploit Zero-Day Vulnerabilities",
                "authors": "Yuxuan Zhu, Antony Kellermann, Akul Gupta et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2406.01637"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
