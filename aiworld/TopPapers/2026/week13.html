<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-13";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Reimagining mental health with AI",
                "authors": "iloofar Mikaeili, Mahdi Naeim, Mohammad Narimani",
                "icon": "fa-solid fa-brain",
                "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC12604579/"
            },
            {
                "title": "Passive sensing for mental health monitoring: scoping review",
                "authors": "Niloofar Mikaeili, Mahdi Naeim, Mohammad Narimani",
                "icon": "fa-solid fa-chart-bar",
                "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC12395114/"
            },
            {
                "title": "Interpreting psychiatric digital phenotyping data with LLMs",
                "authors": "Matthew Flathers, Winna Xia, Christine Hau BMJ Mental Health",
                "icon": "fa-solid fa-search",
                "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC12458714/"
            },
            {
                "title": "LLMs in mental health: systematic review of 205 studies",
                "authors": "Evdokia Voultsiou, Lefteris Moussiades",
                "icon": "fa-solid fa-book",
                "url": "https://www.mdpi.com/2079-9292/15/3/524"
            },
            {
                "title": "Accurately predicting mood episodes using wearable sleep and circadian rhythm features",
                "authors": "Dongju Lim, Jaegwon Jeong, Yun Min Song npj Digital Medicine",
                "icon": "fa-solid fa-clock",
                "url": "https://www.nature.com/articles/s41746-024-01333-z"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
