<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-12";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "AI integration in financial services: a systematic review of trends and regulatory challenges",
                "authors": "Darko B. Vuković, Senanu Dekpo-Adza, Stefana Matović",
                "icon": "fa-solid fa-chart-column",
                "url": "https://www.nature.com/articles/s41599-025-04850-8"
            },
            {
                "title": "Leveraging large language models in finance: pathways to responsible adoption Institut Louis Bachelier, Alan Turing Institute & ESMA",
                "authors": "Bagattini Giulio, Brière Marie, Maple Carsten et al.",
                "icon": "fa-solid fa-globe",
                "url": "https://www.esma.europa.eu/sites/default/files/2025-06/LLMs_in_finance_-_ILB_ESMA_Turing_Report.pdf"
            },
            {
                "title": "Financial stability in focus: artificial intelligence in the financial system",
                "authors": "Bank of England Financial Policy Committee",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://www.bankofengland.co.uk/financial-stability-in-focus/2025/april-2025"
            },
            {
                "title": "Artificial intelligence in financial services World Economic Forum & Accenture",
                "authors": "Maria Basso, Jesse Caruso et al.",
                "icon": "fa-solid fa-magnifying-glass",
                "url": "https://reports.weforum.org/docs/WEF_Artificial_Intelligence_in_Financial_Services_2025.pdf"
            },
            {
                "title": "Annual survey report on AI use in financial services",
                "authors": "Jessica Renier, Conan French et al.",
                "icon": "fa-solid fa-clipboard",
                "url": "https://www.iif.com/Publications/ID/5992/IIF-EY-Annual-Survey-Report-on-AIML-Use-in-Financial-Services"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
