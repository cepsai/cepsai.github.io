<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-17";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "On benchmarking human-like intelligence in machines",
                "authors": "Lance Ying, Katherine M. Collins, Lionel Wong et al.",
                "icon": "fa-solid fa-brain",
                "url": "https://arxiv.org/abs/2502.20502"
            },
            {
                "title": "AI tools in society: impacts on cognitive offloading and the future of critical thinking",
                "authors": "Michael Gerlich",
                "icon": "fa-solid fa-cloud-arrow-up",
                "url": "https://doi.org/10.3390/soc15010006"
            },
            {
                "title": "The impact of generative AI on critical thinking: self-reported reductions in cognitive effort and confidence effects from a survey of knowledge workers",
                "authors": "Hao-Ping Lee, Advait Sarkar, Lev Tankelevitch et al.",
                "icon": "fa-solid fa-person-circle-question",
                "url": "https://dl.acm.org/doi/10.1145/3706598.3713778"
            },
            {
                "title": "Your brain on ChatGPT: accumulation of cognitive debt when using an AI assistant for essay writing task",
                "authors": "Nataliya Kosmyna, Eugene Hauptmann, Ye Tong Yuan et al.",
                "icon": "fa-solid fa-battery-quarter",
                "url": "https://arxiv.org/abs/2506.08872"
            },
            {
                "title": "The cognitive divergence: AI context windows, human attention decline, and the delegation feedback loop",
                "authors": "Netanel Eliav",
                "icon": "fa-solid fa-arrows-rotate",
                "url": "https://arxiv.org/abs/2603.26707"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
