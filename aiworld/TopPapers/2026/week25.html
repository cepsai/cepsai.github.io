<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-25";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Draft on decentralised and federated infrastructure for artificial intelligence and services (AI)",
                "authors": "Joint European Forum for IPCEI, Workgroup on Digital (2024)",
                "icon": "fa-solid fa-network-wired",
                "url": "https://www.gov.pl/attachment/dd64298b-4e9a-4e2d-bfdf-2052fb8479e1"
            },
            {
                "title": "Regulating foundation models in the AI Act: from 'high' to 'systemic' risk",
                "authors": "Cornelia Kutterer",
                "icon": "fa-solid fa-shield-halved",
                "url": "https://ai-regulation.com/wp-content/uploads/2024/01/C-Kutterer-Regulating-Foundation-Models-in-the-AI.pdf"
            },
            {
                "title": "Federated learning is needed to overcome key challenges arising from the European Union AI Act",
                "authors": "Herbert Woisetschläger, Alexander Erben, Bill Marino et al.",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://openreview.net/forum?id=Aa50oIovvD"
            },
            {
                "title": "Federated learning and AI regulation in the European Union: who is responsible? An interdisciplinary analysis",
                "authors": "Herbert Woisetschläger, Simon Mertel, Christoph Krönke et al.",
                "icon": "fa-solid fa-globe",
                "url": "https://arxiv.org/abs/2407.08105"
            },
            {
                "title": "DiLoCo: Distributed Low-Communication Training of Language Models",
                "authors": "Arthur Douillard, Qixuan Feng, Andrei A. Rusu et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2311.08105"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
