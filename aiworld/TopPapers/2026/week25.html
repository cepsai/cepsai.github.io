<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-24";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Competition and Innovation: An Inverted-U Relationship",
                "authors": "Philippe Aghion, Nicholas Bloom, Richard Blundell et al.",
                "icon": "fa-solid fa-lightbulb",
                "url": "https://doi.org/10.1093/qje/120.2.701"
            },
            {
                "title": "DeepSeek's release of an open-weight frontier AI model",
                "authors": "John Bansemer, Kyle Miller",
                "icon": "fa-solid fa-robot",
                "url": "https://www.iiss.org/publications/strategic-comments/2025/04/deepseeks-release-of-an-open-weight-frontier-ai-model/"
            },
            {
                "title": "The AI Index 2025 Annual Report. Stanford Institute for Human-Centered AI",
                "authors": "Nestor Maslej et al.",
                "icon": "fa-solid fa-chart-column",
                "url": "https://hai.stanford.edu/ai-index/2025-ai-index-report"
            },
            {
                "title": "Modeling AI-Driven Production and Competitiveness: A Multi-Agent Economic Simulation of China and the United States",
                "authors": "Yuxinyue Qian, Jun Liu",
                "icon": "fa-solid fa-globe",
                "url": "https://arxiv.org/abs/2510.11085"
            },
            {
                "title": "The State of AI Competition in Advanced Economies",
                "authors": "Alex Haag",
                "icon": "fa-solid fa-landmark",
                "url": "https://www.federalreserve.gov/econres/notes/feds-notes/the-state-of-ai-competition-in-advanced-economies-20251006.html"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
