<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-21";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "MobileLLM: Optimizing Sub-billion Parameter Language Models for On-Device Use Cases.",
                "authors": "Zechun Liu, Changsheng Zhao, Forrest Iandola et al.",
                "icon": "fa-solid fa-microchip",
                "url": "https://arxiv.org/abs/2402.14905"
            },
            {
                "title": "Small Language Models: Survey, Measurements, and Insights",
                "authors": "Zhenyan Lu, Xiang Li, Dongqi Cai et al.",
                "icon": "fa-solid fa-chart-line",
                "url": "https://arxiv.org/abs/2409.15790"
            },
            {
                "title": "Small Language Models are the Future of Agentic AI",
                "authors": "Peter Belcak, Greg Heinrich, Shizhe Diao et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://arxiv.org/abs/2506.02153"
            },
            {
                "title": "Hybrid LLM: Cost-Efficient and Quality-Aware Query Routing",
                "authors": "Dujian Ding, Ankur Mallick, Chi Wang et al.",
                "icon": "fa-solid fa-shuffle",
                "url": "https://arxiv.org/abs/2404.14618"
            },
            {
                "title": "Are We There Yet? A Measurement Study of Efficiency for LLM Applications on Mobile Devices",
                "authors": "Xiao Yan, Yi Ding",
                "icon": "fa-solid fa-bolt",
                "url": "https://arxiv.org/abs/2504.00002"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
