<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-22";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "AI-Powered Lawyering: AI Reasoning Models, Retrieval Augmented Generation, and the Future of Legal Practice",
                "authors": "Daniel Schwarcz, Sam Manning, Patrick Barry et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://doi.org/10.1177/2755323X261427048"
            },
            {
                "title": "Hallucination-Free? Assessing the Reliability of Leading AI Legal Research Tools",
                "authors": "Varun Magesh, Faiz Surani, Matthew Dahl et al.",
                "icon": "fa-solid fa-circle-check",
                "url": "https://doi.org/10.1111/jels.12413"
            },
            {
                "title": "Generative AI and Legal Aid: Results from a Field Study and 100 Use Cases to Bridge the Access to Justice Gap",
                "authors": "Colleen V. Chien, Miriam Kim",
                "icon": "fa-solid fa-handshake-angle",
                "url": "https://digitalcommons.lmu.edu/llr/vol57/iss4/2/"
            },
            {
                "title": "Risks Without Rights? The EU AI Act's Approach to AI in Law and Rule-Making",
                "authors": "Nicoletta Rangone, Luca Megale",
                "icon": "fa-solid fa-landmark",
                "url": "https://doi.org/10.1017/err.2025.13"
            },
            {
                "title": "The Overstated Cost of AI Fairness in Criminal Justice",
                "authors": "Ignacio Cofone, Warut Khern-am-nuai",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://www.repository.law.indiana.edu/ilj/vol100/iss4/4/"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
