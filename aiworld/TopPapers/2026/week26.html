<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-25";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Artificial intelligence for modeling and understanding extreme weather and climate events",
                "authors": "Gustau Camps-Valls, Miguel-Ángel Fernández-Torres, Kai-Hendrik Cohrs, et al.",
                "icon": "fa-solid fa-wind",
                "url": "https://doi.org/10.1038/s41467-025-56573-8"
            },
            {
                "title": "Artificial intelligence and climate change: the potential roles of foundation models",
                "authors": "Walter Leal Filho, Marina Kovaleva, Artie W. Ng, et al.",
                "icon": "fa-solid fa-earth-americas",
                "url": "https://doi.org/10.1186/s12302-025-01153-2"
            },
            {
                "title": "Generative AI tools can enhance climate literacy but must be checked for biases and inaccuracies",
                "authors": "Carmen Atkins, Gina Girgente, Manoochehr Shirzaei et al.",
                "icon": "fa-solid fa-magnifying-glass",
                "url": "https://doi.org/10.1038/s43247-024-01392-w"
            },
            {
                "title": "Realistic AI-generated climate disaster images decrease support for climate action when artificial origin is suspected",
                "authors": "Martin J. Eppler",
                "icon": "fa-solid fa-robot",
                "url": "https://doi.org/10.1038/s44458-026-00092-0"
            },
            {
                "title": "Potential futures for the IPCC's approach to artificial intelligence",
                "authors": "Holly Jean Buck, Alaa Al Khourdajie, Shinichiro Asayama et al.",
                "icon": "fa-solid fa-arrow-trend-up",
                "url": "https://doi.org/10.1038/s43247-026-03514-y"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
