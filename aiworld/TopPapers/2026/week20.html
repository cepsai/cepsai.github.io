<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-20";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Empowering distributed solutions in renewable energy systems and grid optimization",
                "authors": "KMohammad Mohammadi, Ali Mohammadi",
                "icon": "fa-solid fa-leaf",
                "url": "https://arxiv.org/abs/2310.15468"
            },
            {
                "title": "An automated geographical information system-based spatial machine learning method for leak detection in WDNs using monitoring sensors",
                "authors": "Doha Elshazly, Rahul Gawai, Tarig Ali et al.",
                "icon": "fa-solid fa-droplet",
                "url": "https://doi.org/10.3390/app14135853"
            },
            {
                "title": "Artificial intelligence in water distribution networks: a systematic review of models, input variables, databases, and output strategies for leak detection",
                "authors": "Mariana Zuñiga-Uribe, Rafael Rojas-Galván, Marcos Aviles et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://doi.org/10.3390/smartcities9030045"
            },
            {
                "title": "Implementing deep reinforcement learning-based grid voltage control in real-world power systems: challenges and insights",
                "authors": "Di Shi, Qiang Zhang, Mingguo Hong et al.",
                "icon": "fa-solid fa-bolt",
                "url": "https://arxiv.org/abs/2410.19880"
            },
            {
                "title": "A comprehensive review of reinforcement learning-based voltage control in smart grids",
                "authors": "Mehrnaz Ahmadi, Hamed Aly",
                "icon": "fa-solid fa-battery-full",
                "url": "https://doi.org/10.1016/j.rser.2025.116526"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
