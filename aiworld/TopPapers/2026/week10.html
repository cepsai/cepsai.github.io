<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-10";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Small models, big threats: Characterizing safety challenges from low-compute AI models",
                "authors": "P. Puri",
                "icon": "fa-solid fa-microchip",
                "url": "https://arxiv.org/abs/2601.21365"
            },
            {
                "title": "Regulating Uncertainty: Governing General-Purpose AI Models and Systemic Risk",
                "authors": "S. Carey",
                "icon": "fa-solid fa-scale-balanced",
                "url": "https://www.cambridge.org/core/journals/european-journal-of-risk-regulation/article/regulating-uncertainty-governing-generalpurpose-ai-models-and-systemic-risk/7EEFE1D8421A43A98CE91F7C697DE538#article"
            },
            {
                "title": "On the Limitations of Compute Thresholds as a Governance Strategy",
                "authors": "S. Hooker",
                "icon": "fa-solid fa-gauge-high",
                "url": "https://arxiv.org/abs/2407.05694"
            },
            {
                "title": "Adapting Probabilistic Risk Assessment for AI",
                "authors": "A. K. Wisakanto, J. Rogero, A. M. Casheekar, R. Mallah",
                "icon": "fa-solid fa-triangle-exclamation",
                "url": "https://arxiv.org/abs/2504.18536"
            },
            {
                "title": "Defending Compute Thresholds Against Legal Loopholes",
                "authors": "M. Pistillo, P. Villalobos",
                "icon": "fa-solid fa-shield-halved",
                "url": "https://arxiv.org/abs/2502.00003"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
