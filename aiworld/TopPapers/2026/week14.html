<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers of the Week</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="resources/styles.css">
</head>

<body>
    <img src="resources/logo.svg" id="corner-logo" alt="Logo">
    <div id="bg-layer"></div>

    <div class="main-title">NOTABLE AI RESEARCH PAPERS</div>
    <div class="subtitle">WEEKLY BRIEF</div>

    <div class="crystal-window" id="crystal-window">
    </div>

    <div id="version-display"></div>

    <script>
        const version = "1.1.0";
        const week = "2026-14";
        document.querySelector('.subtitle').textContent += ` #${week}`;
        const data = [
            {
                "title": "Revolutionizing agriculture with artificial intelligence: plant disease detection methods, applications, and their limitations",
                "authors": "Abbas Jafar, Nabila Bibi, Rizwan Ali Naqvi et al.",
                "icon": "fa-solid fa-seedling",
                "url": "https://doi.org/10.3389/fpls.2024.1356260"
            },
            {
                "title": "AI can empower agriculture for global food security: challenges and prospects in developing nations",
                "authors": "Ali Ahmad, Anderson X. W. Liew, Francesca Venturini",
                "icon": "fa-solid fa-wheat-awn",
                "url": "https://www.frontiersin.org/journals/artificial-intelligence/articles/10.3389/frai.2024.1328530/full"
            },
            {
                "title": "Indigenous peoples and artificial intelligence: A systematic review and future directions",
                "authors": "Maneesha Perera, Rajith Vidanaarachchi, Sangeetha Chandrashekeran et al.",
                "icon": "fa-solid fa-robot",
                "url": "https://journals.sagepub.com/doi/10.1177/20539517251349170"
            },
            {
                "title": "Digitalization and the third food regime",
                "authors": "Louisa Prause, Sarah Hackfort & Margit Lindgren",
                "icon": "fa-solid fa-laptop",
                "url": "https://link.springer.com/article/10.1007/s10460-020-10161-2"
            },
            {
                "title": "Artificial intelligence in sustainable agriculture: Towards a socio-technical roadmap",
                "authors": "Peiqian Wu, Yuxin Zhong",
                "icon": "fa-solid fa-recycle",
                "url": "https://www.sciencedirect.com/science/article/pii/S2772375525008093"
            }
        ];

        const container = document.getElementById('crystal-window');

        data.forEach(item => {
            const row = document.createElement('a');
            row.className = 'row';
            row.href = item.url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';

            const iconContainer = document.createElement('div');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = `<i class="${item.icon}"></i>`;

            const titleContainer = document.createElement('div');
            titleContainer.className = 'title-container';
            titleContainer.innerHTML = `
                <div class="paper-title">${item.title}</div>
                <div class="paper-authors"><span class="author-name">${item.authors}</span></div>
            `;

            row.appendChild(iconContainer);
            row.appendChild(titleContainer);
            container.appendChild(row);
        });

        const [year, weekNum] = week.split('-');
        const mobileLabel = document.createElement('div');
        mobileLabel.className = 'mobile-label';
        mobileLabel.innerHTML = `Week ${weekNum},<br>${year}`;
        container.insertBefore(mobileLabel, container.firstChild);

        const versionDisplay = document.getElementById('version-display');
        versionDisplay.textContent = `v${version}`;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.add('visible');
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'v' || e.key === 'V') versionDisplay.classList.remove('visible');
        });
    </script>
</body>

</html>
