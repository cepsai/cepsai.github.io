<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Where does each market's funding come from?</title>
<link rel="stylesheet" href="viz.css">
</head>
<body>
<div class="viz-grid">
  <div id="container1">
    <div class="chart-area"><div class="chart-fit" id="chart"></div></div>
  </div>
  <div id="container2">
    <div class="ctrl-left">
      <div class="source-text">Source: <a href="https://www.crunchbase.com/" target="_blank" rel="noopener">Crunchbase</a></div>
    </div>
    <div class="ctrl-center">
      <div class="custom-legend">
        <span class="legend-item"><span class="legend-square" style="background:var(--dom)"></span>Domestic</span>
        <span class="legend-item"><span class="legend-square" style="background:var(--ib)"></span>Elsewhere in the bloc</span>
        <span class="legend-item"><span class="legend-square" style="background:var(--intl)"></span>Outside the bloc</span>
      </div>
    </div>
    <div class="ctrl-right">
      <div class="top-filter" id="eupills">
        <button data-eu="EU27" class="active">EU-27</button>
        <button data-eu="EUWIDE">EU+</button>
      </div>
      <a href="https://aiworld.eu/" target="_blank" rel="noopener" class="logo-link">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo"/>
      </a>
    </div>
  </div>
</div>
<script src="../data/data.js"></script>
<script src="viz-lib.js"></script>
<script>
(function(){
  const M=VL.M; let eu='EU27';
  function draw(){
    VL.compositionBars('chart',[
      ['US','us',M.summary.US],
      [VL.euLabel(eu),'eu',M.summary[eu]],
    ]);
  }
  VL.pills('eupills', v=>{eu=v;draw();});
  draw();
})();
</script>
</body>
</html>
