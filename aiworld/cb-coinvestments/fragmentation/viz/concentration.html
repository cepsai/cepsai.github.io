<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Concentration of the investment market</title>
<link rel="stylesheet" href="viz.css">
</head>
<body>
<div class="viz-grid">
  <div id="container1">
    <div class="chart-area"><div class="chart-fit" id="chart"></div></div>
  </div>
  <div id="container2">
    <div class="ctrl-left">
      <div class="source-text">Source: <a href="https://www.crunchbase.com/" target="_blank" rel="noopener">Crunchbase</a> · Lorenz curve of investor activity across jurisdictions, 2015–2025. Further from the diagonal = more concentrated.</div>
    </div>
    <div class="ctrl-center">
      <div class="custom-legend">
        <span class="legend-item"><span class="legend-square" style="background:var(--us)"></span>US (states)</span>
        <span class="legend-item"><span class="legend-square" style="background:var(--eu)"></span>EU (member states)</span>
      </div>
    </div>
    <div class="ctrl-right">
      <div class="top-filter" id="wpills">
        <button data-w="rounds" class="active">Rounds</button>
        <button data-w="usd">$</button>
      </div>
      <div class="top-filter" id="eupills">
        <button data-eu="EU27" class="active">EU-27</button>
        <button data-eu="EUWIDE">EU+</button>
      </div>
      <a href="https://aiworld.eu/" target="_blank" rel="noopener" class="logo-link">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo"/>
      </a>
    </div>
  </div>
</div>
<script src="../data/data.js"></script>
<script src="viz-lib.js"></script>
<script>
(function(){
  const M=VL.M; let eu='EU27', w='rounds';
  const field=()=>w==='rounds'?'inv_n':'inv_usd';
  function draw(){
    const f=field();
    VL.lorenz('chart',[
      {label:'US',color:'var(--us)',values:M.by_jur.US.map(d=>d[f])},
      {label:'EU',color:'var(--eu)',values:M.by_jur[eu].map(d=>d[f])},
    ],{unit: w==='rounds'?'investments':'invested $'});
  }
  VL.pills('wpills', v=>{w=v;draw();});
  VL.pills('eupills', v=>{eu=v;draw();});
  draw();
})();
</script>
</body>
</html>
