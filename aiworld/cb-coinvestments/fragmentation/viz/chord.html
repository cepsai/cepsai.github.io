<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Co-investment network</title>
<link rel="stylesheet" href="viz.css">
</head>
<body>
<div class="viz-grid">
  <div id="container1">
    <div class="chart-area">
      <div class="duo">
        <div class="col"><div class="col-cap us" id="capUS">US · states</div><div class="chart-fit" id="chord-US"></div></div>
        <div class="col"><div class="col-cap eu" id="capEU">EU-27 · member states</div><div class="chart-fit" id="chord-EU"></div></div>
      </div>
    </div>
  </div>
  <div id="container2">
    <div class="ctrl-left">
      <div class="source-text">Source: <a href="https://www.crunchbase.com/" target="_blank" rel="noopener">Crunchbase</a> · ribbon = rounds two jurisdictions co-invested in, 2015–2025 (top 14 shown)</div>
    </div>
    <div class="ctrl-center">
      <div class="custom-legend">
        <span class="legend-item"><span class="legend-square" style="background:#3d4753"></span>Jurisdiction</span>
        <span class="legend-item"><span class="legend-square" style="background:var(--ib);opacity:.5"></span>Shared rounds</span>
      </div>
    </div>
    <div class="ctrl-right">
      <div class="top-filter" id="wpills">
        <button data-w="rounds" class="active">Rounds</button>
        <button data-w="usd">$</button>
      </div>
      <div class="top-filter" id="eupills">
        <button data-eu="EU27" class="active">EU-27</button>
        <button data-eu="EUWIDE">EU+</button>
      </div>
      <a href="https://aiworld.eu/" target="_blank" rel="noopener" class="logo-link">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo"/>
      </a>
    </div>
  </div>
</div>
<script src="../data/data.js"></script>
<script src="viz-lib.js"></script>
<script>
(function(){
  const M=VL.M; let eu='EU27', w='rounds';
  const topN=(mk,n)=>M.by_jur[mk].slice().sort((a,b)=>b.inv_n-a.inv_n).slice(0,n).map(d=>d.jur);
  function draw(){
    document.getElementById('capEU').textContent = VL.euLabel(eu) + ' · member states';
    VL.chord('chord-US', M.pairwise.US.links, topN('US',14), {weight:w});
    VL.chord('chord-EU', M.pairwise[eu].links, topN(eu,14), {weight:w});
  }
  VL.pills('wpills', v=>{w=v;draw();});
  VL.pills('eupills', v=>{eu=v;draw();});
  draw();
})();
</script>
</body>
</html>
