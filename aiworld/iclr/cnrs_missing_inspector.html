<script>
const DATA = {"summary": {"keyword": "cnrs", "tile": "CNRS", "total_mentions": 44, "tagged": 44, "missing": 0, "by_category": {"close_variant": 0, "regional_partner": 0, "dropped_secondary": 0}}, "rows": [], "tagged_rows": [{"paper_id": "47eKYCaBIV", "title": "Robust Federated Inference", "current": ["EPFL", "University of Copenhagen", "Sorbonne UniversitГ©"], "excerpt": "i1, Rachid Guerraoui1, Nirupam Gupta2,\nMaxime Jacovella1, Anne-Marie Kermarrec1, Rafael Pinot3\n1EPFL, Switzerland\n2University of Copenhagen, Denmark\n3Sorbonne UniversitВҙe and UniversitВҙe Paris CitВҙe, <mark class=\"inria\">CNRS</mark>, LPSM, France\nakash.dhasade@epfl.ch\nnigu@di.ku.dk\npinot@lpsm.paris\nABSTRACT\nFederated inference, in the form of one-shot federated learning, edge ensembles, or\nfederated ensembles, has emerged as an attractive solution to combine predictions\nfrom multiple models. This paradigm enables each model to remain local and\nproprietary while a central server queries them and aggregates predictions. Yet,\nt"}, {"paper_id": "4sDszSYKP6", "title": "Strongly Convex Sets in Riemannian Manifolds", "current": ["Samsung", "IMDEA Software Institute", "Galeio", "CNRS", "Zuse Institute Berlin"], "excerpt": "RIEMANNIAN MANI-\nFOLDS\nDamien ScieurвҲ—\nSamsung AI Lab,\nMontreal, Canada.\nDavid MartВҙДұnez-RubioвҲ—вҖ \nIMDEA Software Institute,\nMadrid, Spain.\nThomas KerdreuxвҲ—вҖ \nGaleio,\nParis, France.\nAlexandre dвҖҷAspremont\n<mark class=\"inria\">CNRS</mark> & D.I. ВҙEcole Normale SupВҙerieure,\nParis, France.\nSebastian Pokutta\nZuse Institute Berlin & Technische UniversitВЁat,\nBerlin, Germany.\nABSTRACT\nStrong convexity plays a key role in designing and analyzing convex optimiza-\ntion algorithms and is well-understood in Hilbert spaces. However, the notion\nof strongly convex sets beyond Hilbert spaces remains unclear. In this paper,\nwe propose various def"}, {"paper_id": "5C3LljOEGC", "title": "HATSolver: Learning GrГ¶bner Bases with Hierarchical Attention Transformers", "current": ["Meta", "EPITA"], "excerpt": "HATSOLVER: LEARNING GR ВЁOBNER BASES WITH\nHIERARCHICAL ATTENTION TRANSFORMERS\nMohamed Malhou\nFAIR, Meta Superintelligence Labs\nSorbonne UniversitВҙe, <mark class=\"inria\">CNRS</mark>, LIP6\nF-75005 Paris, France\nmmalhou@meta.com\nLudovic Perret\nEPITA, EPITA Research Lab (LRE)\nLe Kremlin-BicЛҶetre, France\nludovic.perret@epita.fr\nKristin Lauter\nFAIR, Meta Superintelligence Labs\nklauter@meta.com\nABSTRACT\nAt NeurIPS, Kera et al. (2024) introduced the use of transformers for comput-\ning GrВЁobner bases, a central object in computer algebra with numerous practical\napplications. In this"}, {"paper_id": "7FvUJu63zq", "title": "Unified Brain Surface and Volume Registration", "current": ["MIT", "MGH", "UniversitГ© Paris CitГ©", "CNRS"], "excerpt": "vsjanikov4\nLilla ZГ¶llei2\nJohn Guttag1\nBruce Fischl2вҲ—\nAdrian V. Dalca1,2вҲ—\n1MIT Computer Science and Artificial Intelligence Laboratory 2MGH, Harvard Medical School\n3 UniversitГ© Paris CitГ©, INRIA\n4LIX, <mark class=\"inria\">CNRS</mark>, Гүcole Polytechnique\nabulnaga@csail.mit.edu\nABSTRACT\nAccurate registration of brain MRI scans is fundamental for cross-subject anal-\nysis in neuroscientific studies. This involves aligning both the cortical surface\nof the brain and the interior volume. Traditional methods treat volumetric and\nsurface-based registration separately, which often leads to inconsistencies that\nlimit downstream analyse"}, {"paper_id": "83pHDDmkXt", "title": "Soft-Di[M]O: Improving One-Step Discrete Image Generation with Soft Embeddings", "current": ["Гүcole Polytechnique", "Inria"], "excerpt": "ference paper at ICLR 2026\nSOFT-DI[M]O: IMPROVING ONE-STEP DISCRETE IM-\nAGE GENERATION WITH SOFT EMBEDDINGS\nYuanzhi Zhu1\nXi Wang1\nStВҙephane Lathuili`ere2\nVicky Kalogeiton1\n1LIX, ВҙEcole Polytechnique, <mark class=\"inria\">CNRS</mark>, IPP\n2Inria, Univ. Grenoble Alpes, <mark class=\"inria\">CNRS</mark>, LJK\nABSTRACT\nOne-step generators distilled from Masked Diffusion Models (MDMs) compress\nmultiple sampling steps into a single forward pass, enabling efficient text and\nimage synthesis. However, they suffer two key limitations: they inherit model-\ning bias from the teacher, and their discrete token outputs block gradient flow,\npreventing post-distillation r"}, {"paper_id": "8L83ZbFDjk", "title": "Conformal Prediction for Long-Tailed Classification", "current": ["University of California, Berkeley", "University of Montpellier"], "excerpt": " paper at ICLR 2026\nCONFORMAL PREDICTION FOR LONG-TAILED CLAS-\nSIFICATION\nTiffany Ding1\nJean-Baptiste Fermanian2\nJoseph Salmon2\n1University of California, Berkeley, 2University of Montpellier, Inria, <mark class=\"inria\">CNRS</mark>\ntiffany ding@berkeley.edu\n{jean-baptiste.fermanian, joseph.salmon}@inria.fr\nABSTRACT\nMany real-world classification problems, such as plant identification, have ex-\ntremely long-tailed class distributions. In order for prediction sets to be useful\nin such settings, they should (i) provide good class-conditional coverage, ensur-\ning that rare classes are not systematically omitted from the predict"}, {"paper_id": "8SyEcWVe10", "title": "LVTINO: LAtent Video consisTency INverse sOlver for High Definition Video Restoration", "current": ["UniversitГ© Paris CitГ©", "Heriot-Watt University"], "excerpt": "ce paper at ICLR 2026\nL\nA\nTINO: LATENT VIDEO CONSISTENCY INVERSE\nSOLVER FOR HIGH DEFINITION VIDEO RESTORATION\nAlessio Spagnoletti & AndrВҙes Almansa\nLaboratoire MAP5, UMR 8145\nUniversitВҙe Paris CitВҙe, <mark class=\"inria\">CNRS</mark>\nF-75006 Paris, France\nalessio.spagnoletti@etu.u-paris.fr, andres.almansa@u-paris.fr\nMarcelo Pereyra\nHeriot-Watt University, MACS & Maxwell Institute for Mathematical Sciences\nEH14 4AS, Edinburgh, United Kingdom\nM.Pereyra@hw.ac.uk\ny\nL\nA\nTINO\nFigure 1: Results on joint spatial-temporal super-resolution by factor Г—8.\nABSTRACT\nComputational imaging methods increasingly rely on powerful generative dif"}, {"paper_id": "8pQsiFyTQi", "title": "Provably Accelerated Imaging with Restarted Inertia and Score-based Image Priors", "current": ["University of Bordeaux", "Johns Hopkins University"], "excerpt": "ce paper at ICLR 2026\nPROVABLY ACCELERATED IMAGING WITH RESTARTED\nINERTIA AND SCORE-BASED IMAGE PRIORS\nMarien Renaud1вҲ—, Julien Hermant1вҲ—, Deliang Wei2вҲ—, Yu Sun2\n1University of Bordeaux, Bordeaux INP, <mark class=\"inria\">CNRS</mark>, IMB, UMR 5251, F-33400 Talence, France\n2Johns Hopkins University, Baltimore MD, USA\n{deliang, ysun214}@jh.edu\n{marien.renaud, julien.hermant}@math.u-bordeaux.fr\nABSTRACT\nFast convergence and high-quality image recovery are two essential features of al-\ngorithms for solving ill-posed imaging inverse problems. Existing methods, such\nas regularization by denoising (RED), often focus on designing so"}, {"paper_id": "92d74WdgtG", "title": "A New Initialization to Control Gradients in Sinusoidal Neural Networks", "current": ["CNRS"], "excerpt": "Published as a conference paper at ICLR 2026\nA NEW INITIALISATION TO CONTROL GRADIENTS IN\nSINUSOIDAL NEURAL NETWORK\nAndrea Combette, Antoine Venaille & Nelly Pustelnik\n<mark class=\"inria\">CNRS</mark>, ENS de Lyon\nLaboratoire de Physique UMR5672\nLyon, 69007, France\n{andrea.combette,antoine.venaille,nelly.pustelnik}@ens-lyon.fr\nABSTRACT\nProper initialisation strategy is of primary importance to mitigate gradient explo-\nsion or vanishing when training neural networks. Yet, the impact of initialisa-\ntion parameters still lacks a precise theoretical understanding for several well-\nestablished arch"}, {"paper_id": "Ae4eZpkXBX", "title": "Fast Escape, Slow Convergence: Learning Dynamics of Phase Retrieval under Power-Law Data", "current": ["RIKEN AIP", "Гүcole Normale SupГ©rieure, PSL", "University of Tokyo"], "excerpt": "s a conference paper at ICLR 2026\nFAST ESCAPE, SLOW CONVERGENCE: LEARNING DY-\nNAMICS OF PHASE RETRIEVAL UNDER POWER-LAW\nDATA\nGuillaume Braun\nRIKEN AIP\nBruno Loureiro\nВҙEcole Normale SupВҙerieure, PSL & <mark class=\"inria\">CNRS</mark>\nHa Quang Minh\nRIKEN AIP\nMasaaki Imaizumi\nUniversity of Tokyo & RIKEN AIP & Kyoto University\nABSTRACT\nScaling laws describe how learning performance improves with data, compute,\nor training time, and have become a central theme in modern deep learning.\nWe study this phenomenon in a canonical nonlinear model: phase retrieval with\nanisotropic Gaussian inputs whose covariance spectrum follows a power"}, {"paper_id": "AhtDnPyfOE", "title": "(U)NFV: (Un)Supervised Neural Finite Volume Methods for Solving Hyperbolic PDEs", "current": ["University of California, Berkeley"], "excerpt": "athan LichtlГ©1,вҲ—, Alexi Canesse1,2,вҲ—, Zhe Fu1,вҲ—, Hossein Nick Zinat Matin1,вҲ—,\nMaria Laura Delle Monache1, Alexandre M. Bayen1\n1University of California, Berkeley, 2Гүcole polytechnique, LIX, IP Paris, <mark class=\"inria\">CNRS</mark>\n{lichtle, alexi.canesse, zhefu, h-matin, mldellemonache, bayen}@berkeley.edu\nABSTRACT\nWe introduce (U)NFV, a modular neural network architecture that general-\nizes classical finite volume (FV) methods for solving hyperbolic conservation\nlaws. Hyperbolic partial differential equations (PDEs) are challenging to solve,\nparticularly conservation laws whose physically relevant solutions contain shocks"}, {"paper_id": "BBDhQJh6GB", "title": "Test-time Verification via Optimal Transport: Coverage, ROC, & Sub-optimality", "current": ["Imperial College London", "UniversitГ© de Lille"], "excerpt": "UB-OPTIMALITY\nArpan MukherjeeвҖ , Marcello BulloвҖ , Debabrota BasuвҲ—, Deniz GВЁundВЁuzвҖ \nвҖ Imperial College London\n{a.mukherjee,m.bullo21,d.gunduz}@imperial.ac.uk\nвҲ—Equipe School, UniversitВҙe de Lille, Inria, <mark class=\"inria\">CNRS</mark>\n{debabrota.basu}@inria.fr\nABSTRACT\nWhile test-time scaling with verification has shown promise in improving the per-\nformance of large language models (LLMs), role of the verifier and its imperfec-\ntions remain underexplored. The effect of verification manifests through interac-\ntions of three quantities: (i) the generatorвҖҷs coverage, (ii) the verifierвҖҷs region of\nconvergence (ROC), and (iii) the"}, {"paper_id": "BdeUsYlyIf", "title": "Octax: Accelerated CHIP-8 Arcade Environments for Reinforcement Learning in JAX", "current": ["Univ. Lille", "Independent Researcher"], "excerpt": "Published as a conference paper at ICLR 2026\nOCTAX: ACCELERATED CHIP-8 ARCADE ENVIRON-\nMENTS FOR REINFORCEMENT LEARNING IN JAX\nWaris Radji1вҲ—\nThomas Michel1\nHector Piteau2\n1Univ. Lille, Inria, <mark class=\"inria\">CNRS</mark>, Centrale Lille, UMR 9189-CRIStAL, France\n2Independent Researcher\n{waris.radji,thomas.michel}@inria.fr\nhector.piteau@gmail.com\nABSTRACT\nReinforcement learning (RL) research requires diverse, challenging environments\nthat are both tractable and scalable. While modern video games may offer rich\ndynamics, they are computationally expensive and poorly suited for large-scale\nexperimentation due to the"}, {"paper_id": "C6vpifaZvU", "title": "Graph Representational Learning: When Does More Expressivity Hurt Generalization?", "current": ["Aleph Alpha Research", "LMU Munich", "TU Wien", "Institut Polytechnique de Paris"], "excerpt": "Learning (MCML)\n4Machine Learning Research Unit, CAIML, TU Wien\n5Institute for Robotics and Mechatronics, DLR-German Aerospace Center\n6Department of Physics and Technology, University of TromsГё\n7LIX, <mark class=\"inria\">CNRS</mark>, ВҙEcole Polytechnique, Institut Polytechnique de Paris, France\nABSTRACT\nGraph Neural Networks (GNNs) are powerful tools for learning on structured data,\nyet the relationship between their expressivity and predictive performance remains\nunclear. We introduce a family of pseudometrics that capture different degrees of\nstructural similarity between graphs and relate these similarities to generalizat"}, {"paper_id": "EBjy1rmpv0", "title": "Guided Flow Policy: Learning from High-Value Actions in Offline Reinforcement Learning", "current": ["PSL Research University", "Sorbonne UniversitГ©"], "excerpt": "NFORCEMENT LEARNING\nFranki Nguimatsia Tiofack1,*\nThВҙeotime Le Hellard1,*\nFabian Schramm1,*\nNicolas Perrin-Gilbert2\nJustin Carpentier1\n1Inria and DI-ENS, PSL Research University\n2Sorbonne UniversitВҙe, <mark class=\"inria\">CNRS</mark>, ISIR, France\n*Equal contribution. Correspondence to: franki.nguimatsia-tiofack@inria.fr\nABSTRACT\nOffline reinforcement learning often relies on behavior regularization that enforces\npolicies to remain close to the dataset distribution. However, such approaches fail\nto distinguish between high-value and low-value actions in their regularization\ncomponents. We introduce Guided Flow Policy (GFP), w"}, {"paper_id": "GEtOzC4MIi", "title": "Fisher-Rao Sensitivity for Out-of-Distribution Detection in Deep Neural Networks", "current": ["Paris-Saclay University"], "excerpt": "O\nSENSITIVITY\nFOR\nOUT-OF-\nDISTRIBUTION DETECTION IN DEEP NEURAL NET-\nWORKS\nAnthony Nguyen,вҲ—вҖ Sylvie Le HВҙegarat-Mascle, Emanuel Aldea, Renaud LustratвҖ \nSATIE Laboratory UMR 8029 Paris-Saclay University <mark class=\"inria\">CNRS</mark>, Gif-sur-Yvette, France\n{anthony.nguyen,sylvie.le-hegarat,emanuel.aldea}@universite-paris-saclay.fr,\nrenaud.lustrat@thalesgroup.com\nAntonin Bertrand,вҲ—вҖЎFranck Florin,вҖЎMohammed Nabil El-Korso\nL2S Laboratory UMR 8506 Paris Saclay University <mark class=\"inria\">CNRS</mark>, Centrale Supelec, Gif-Sur-Yvette, France\n{antonin.bertrand, mohammed.nabil.el-korso}@centralesupelec.fr,\nfranck.florin@fr.thalesgroup.com\nABSTRACT\nDeep neu"}, {"paper_id": "I6xjMoLY3j", "title": "Disentangled representation learning through unsupervised symmetry group discovery", "current": ["Sorbonne UniversitГ©"], "excerpt": " as a conference paper at ICLR 2026\nDISENTANGLED\nREPRESENTATION\nLEARNING\nTHROUGH UNSUPERVISED SYMMETRY GROUP DIS-\nCOVERY\nBarthВҙelВҙemy Dang-Nhu, Louis Annabi & Sylvain Argentieri\nSorbonne UniversitВҙe, <mark class=\"inria\">CNRS</mark>,\nInstitut des Syst`emes Intelligents et de Robotique, ISIR,\nF-75005 Paris, France\n{dangnhu,annabi,argentieri}@isir.upmc.fr\nABSTRACT\nSymmetry-based disentangled representation learning leverages the group struc-\nture of environment transformations to uncover the latent factors of variation.\nPrior approaches to symmetry-based disentanglement have required strong prior\nknowledge of the symmetry grou"}, {"paper_id": "IlyesljaNb", "title": "Intrinsic training dynamics of deep neural networks", "current": ["PSL Univ.", "CNRS", "Inria"], "excerpt": "Published as a conference paper at ICLR 2026\nINTRINSIC TRAINING DYNAMICS\nOF DEEP NEURAL NETWORKS\nSibylle Marcotte\nENS - PSL Univ.\nsibylle.marcotte@ens.fr\nGabriel PeyrГ©\n<mark class=\"inria\">CNRS</mark>, ENS - PSL Univ.\ngabriel.peyre@ens.fr\nRГ©mi Gribonval\nInria, <mark class=\"inria\">CNRS</mark>, ENS de Lyon,\nUniversitГ© Claude Bernard Lyon 1,\nLIP, UMR 5668, 69342, Lyon cedex 07, France\nremi.gribonval@inria.fr\nABSTRACT\nA fundamental challenge in the theory of deep learning is to understand whether\ngradient-based training can promote parameters belonging to certain lower-\ndimensional structures (e.g., sparse or low-rank sets)"}, {"paper_id": "JTUOGo7NFD", "title": "Unified Privacy Guarantees for Decentralized Learning via Matrix Factorization", "current": ["University of Rennes", "Institute of Science & Technology Austria (ISTA)"], "excerpt": "lier, France\nEdwige Cyffers\nInstitute of Science & Technology Austria (ISTA)\nKlosterneuburg, Austria\nDavide Frey, Romaric Gaudel, Dimitri LerВҙevВҙerendвҲ—, FrancВёois TaВЁДұani\nUniversity of Rennes, Inria, <mark class=\"inria\">CNRS</mark>, IRISA\nRennes, France\nABSTRACT\nDecentralized Learning (DL) enables users to collaboratively train models with-\nout sharing raw data by iteratively averaging local updates with neighbors in a net-\nwork graph. This setting is increasingly popular for its scalability and its ability to\nkeep data local under user control. Strong privacy guarantees in DL are typically\nachieved through Differential Pri"}, {"paper_id": "Ks9zNS6OsU", "title": "Reconstruct Anything Model a lightweight general model for computational imaging", "current": ["UniversitГ© Paris-Saclay", "ENS Paris", "ENSL"], "excerpt": "HING MODEL:\nA LIGHTWEIGHT GENERAL MODEL FOR\nCOMPUTATIONAL IMAGING\nMatthieu Terris1,2\nSamuel Hurault3\nMaxime Song4\nJuliВҙan Tachella5,2\n1UniversitВҙe Paris-Saclay, Inria, CEA\n2Blur Labs\n3ENS Paris, PSL, <mark class=\"inria\">CNRS</mark>\n4CNRS UAR 851, UniversitВҙe Paris-Saclay\n5ENSL, <mark class=\"inria\">CNRS</mark> UMR 5672\nFigure 1: The proposed Reconstruct Anything Model (RAM) model can solve a wide variety of\ninverse problems, from medical imaging to microscopy and low-photon imaging, obtaining state-of-\nthe-art zero-shot performance in imaging problems and datasets in or close to the training distribu-\ntion. RAM can also be finetuned in a self-supervis"}, {"paper_id": "MFrJ3NzA5H", "title": "Continuous Audio Language Models", "current": ["Kyutai", "IRCAM-CNRS Sorbonne Univ."], "excerpt": "Published as a conference paper at ICLR 2026\nCONTINUOUS AUDIO LANGUAGE MODELS\nSimon RouardвҲ—\nKyutai\nUMR STMS\nIRCAM-<mark class=\"inria\">CNRS</mark> Sorbonne Univ.\nsimon@kyutai.org\nManu OrsiniвҲ—\nKyutai\nmanu@kyutai.org\nAxel Roebel\nUMR STMS\nIRCAM-<mark class=\"inria\">CNRS</mark> Sorbonne Univ.\nNeil Zeghidour\nKyutai\nAlexandre DГ©fossez\nKyutai\nalex@kyutai.org\nABSTRACT\nAudio Language Models (ALM) have emerged as the dominant paradigm for\nspeech and music generation by representing audio as sequences of discrete\ntokens. Yet, unlike text tokens, which are invertible, audio token"}, {"paper_id": "O93c9H4SXc", "title": "Beyond Softmax and Entropy: Convergence Rates of Policy Gradients with $\\boldsymbol{f}$-SoftArgmax Parameterization $\\&$ Coupled Regularization", "current": ["Institut Polytechnique de Paris", "Mohamed bin Zayed University of Artificial Intelligence"], "excerpt": "EYOND SOFTMAX AND ENTROPY: CONVERGENCE\nRATES OF POLICY GRADIENTS WITH f-SOFTARGMAX\nPARAMETERIZATION & COUPLED REGULARIZATION\nSafwan Labbi1, Daniil Tiapkin1,2 , Paul Mangold1, Eric Moulines3,4\n1 CMAP, <mark class=\"inria\">CNRS</mark>, ВҙEcole Polytechnique, Institut Polytechnique de Paris, 91120 Palaiseau, France\n2 UniversitВҙe Paris-Saclay, <mark class=\"inria\">CNRS</mark>, LMO, 91405, Orsay, France\n3 Mohamed bin Zayed University of Artificial Intelligence, UAE\n4 LRE EPITA , 94270 Le Kremlin-BicЛҶetre, France\n{safwan.labbi, daniil.tiapkin, paul.mangold}@polytechnique.edu\neric.moulines@mbzuai.ac.ae\nABSTRACT\nPolicy gradient methods are known to be highly se"}, {"paper_id": "OJupg4mDjS", "title": "On the Wasserstein Geodesic Principal Component Analysis of probability measures", "current": ["IP Paris", "CNRS", "UniversitГ© Paris 1 PanthГ©on Sorbonne"], "excerpt": "shed as a conference paper at ICLR 2026\nON THE WASSERSTEIN GEODESIC PRINCIPAL COMPO-\nNENT ANALYSIS OF PROBABILITY MEASURES\nNina Vesseron\nCREST-ENSAE, IP Paris\n{nina.vesseron}@ensae.fr\nElsa Cazelles вҲ—\n<mark class=\"inria\">CNRS</mark>, IRIT, UniversitВҙe de Toulouse\n{elsa.cazelles}@irit.fr\nAlice Le Brigant вҲ—\nUniversitВҙe Paris 1 PanthВҙeon Sorbonne\n{alice.le-brigant}@univ-paris1.fr\nThierry Klein\nENAC, IMT, UniversitВҙe de Toulouse\n{thierry.klein}@math.univ-toulouse.fr\nABSTRACT\nThis paper focuses on Geodesic Principal Component Analysis (GPCA) on a\ncollection of probability distributions using the Otto-Wasserstein geometry. The\ngoa"}, {"paper_id": "Q3yLIIkt7z", "title": "Scaling Laws and Spectra of Shallow Neural Networks in the Feature Learning Regime", "current": ["Гүcole Normale SupГ©rieure, PSL", "Гүcole Polytechnique FГ©dГ©rale de Lausanne (EPFL)"], "excerpt": "ilippisвҲ—1, Yizhou XuвҲ—2,3, Julius Girardin2, Emanuele Troiani2, Vittorio Erba2,\nLenka ZdeborovВҙa2, Bruno Loureiro1, and Florent Krzakala3\n1Departement dвҖҷInformatique, ВҙEcole Normale SupВҙerieure, PSL & <mark class=\"inria\">CNRS</mark>\n2Statistical Physics of Computation Laboratory, ВҙEcole Polytechnique FВҙedВҙerale de Lausanne (EPFL)\n3Information, Learning and Physics Laboratory, ВҙEcole Polytechnique FВҙedВҙerale de Lausanne (EPFL)\nABSTRACT\nNeural scaling laws underlie many of the recent advances in deep learning, yet\ntheir theoretical understanding remains largely confined to linear models. In this\nwork, we present a systematic a"}, {"paper_id": "R44n1gZNjQ", "title": "Statistical Advantage of Softmax Attention: Insights from Single-Location Regression", "current": ["ВҙEcole polytechnique fВҙedВҙerale de Lausanne (EPFL)", "Inria, Paris", "UniversitГ© Paris-Saclay", "Ecole Normale SupГ©rieure", "EPFL - EPF Lausanne"], "excerpt": "search University\nC. Boyer\nLaboratoire de MathВҙematiques dвҖҷOrsay\nUniversitВҙe Paris Saclay\nand Institut Universitaire de France\nB. Loureiro\nDepartement dвҖҷInformatique\nВҙEcole Normale SupВҙerieure, PSL & <mark class=\"inria\">CNRS</mark>\nABSTRACT\nLarge language models rely on attention mechanisms with a softmax activation.\nYet the dominance of softmax over alternatives (e.g., component-wise or lin-\near) remains poorly understood, and many theoretical works have focused on the\neasier-to-analyze linearized attention. In this work, we address this gap through a\nprincipled study of the single-location regression task, where the outpu"}, {"paper_id": "RRbnVt9c8t", "title": "Pulp Motion: Framing-aware multimodal camera and human motion generation", "current": ["Гүcole Polytechnique", "Inria"], "excerpt": "ence paper at ICLR 2026\nPULP MOTION: FRAMING-AWARE MULTIMODAL\nCAMERA AND HUMAN MOTION GENERATION\nRobin Courant1\nXi Wang1\nDavid Loiseaux1,2\nMarc Christie3\nVicky Kalogeiton1\n1LIX, ВҙEcole Polytechnique, <mark class=\"inria\">CNRS</mark>, IPP\n2Inria Saclay\n3Inria, IRISA, Univ Rennes, <mark class=\"inria\">CNRS</mark>\nABSTRACT\nTreating human motion and camera trajectory generation separately overlooks a\ncore principle of cinematography: the tight interplay between actor performance\nand camera work in the screen space. In this paper, we are the first to cast this task\nas a text-conditioned joint generation, aiming to maintain consistent on-screen\nframing while"}, {"paper_id": "RuYwbd5xYa", "title": "SCRAPL: Scattering Transform with Random Paths for Machine Learning", "current": ["Queen Mary University of London", "Nantes UniversitГ©"], "excerpt": "stanlenвҷҜ\nEmmanouil Benetosвҷӯ\nMathieu LagrangeвҷҜ\nвҷӯCentre for Digital Music, Queen Mary University of London, UK\n{c.mitcheltree, emmanouil.benetos}@qmul.ac.uk\nвҷҜNantes UniversitВҙe, ВҙEcole Centrale Nantes, <mark class=\"inria\">CNRS</mark>, LS2N, UMR 6004, France\n{vincent.lostanlen, mathieu.lagrange}@ls2n.fr\nABSTRACT\nThe Euclidean distance between wavelet scattering transform coefficients (known\nas paths) provides informative gradients for perceptual quality assessment of deep\ninverse problems in computer vision, speech, and audio processing. However, these\ntransforms are computationally expensive when employed as differentiable lo"}, {"paper_id": "V1i58pZmp3", "title": "Optimal transport unlocks end-to-end learning for single-molecule localization", "current": ["Inria, Paris", "Institut Pasteur", "ВҙEcole normale supВҙerieure (ENS-PSL)", "UniversitВҙe Grenoble Alpes"], "excerpt": "RT UNLOCKS END-TO-END LEARN-\nING FOR SINGLE-MOLECULE LOCALIZATION\nRomain SВҙeaillesвҲ—\nDВҙepartement dвҖҷinformatique, ВҙEcole normale supВҙerieure (ENS-PSL), Paris, France\nUniversitВҙe Grenoble Alpes, Inria, <mark class=\"inria\">CNRS</mark>, Grenoble INP, LJK, Grenoble, France\nJean-Baptiste Masson\nDecision and Bayesian Computation, Institut Pasteur, UniversitВҙe Paris CitВҙe, <mark class=\"inria\">CNRS</mark>,\nInria (EpimВҙethВҙee), Paris, France\nJean Ponce\nDВҙepartement dвҖҷinformatique, ВҙEcole normale supВҙerieure (ENS-PSL), Paris, France\nCourant Institute School of Mathematics, Computing, and Data Science,\nNew York University (NYU), New York, NY, USA\nJulien Mairal\nU"}, {"paper_id": "XGEZ9q02Ys", "title": "Decision-Theoretic Approaches for Improved Learning-Augmented Algorithms", "current": ["CNRS", "Sorbonne UniversitГ©"], "excerpt": "Published as a conference paper at ICLR 2026\nDECISION-THEORETIC APPROACHES FOR IMPROVED\nLEARNING-AUGMENTED ALGORITHMS\nSpyros Angelopoulos\n<mark class=\"inria\">CNRS</mark> and International Laboratory\non Learning Systems\nMontreal, Canada\nChristoph DВЁurr\nSorbonne University, <mark class=\"inria\">CNRS</mark>, LIP6\nParis, France\nGeorgii Melidi\nSorbonne University, <mark class=\"inria\">CNRS</mark>, LIP6\nParis, France\nABSTRACT\nWe initiate the systematic study of decision-theoretic metrics in the design and\nanalysis of algorithms with machine-learned predictions.\nWe introduce ap-\nproaches based on both deterministic measures "}, {"paper_id": "a5lL1ygtkG", "title": "Divergence-Free Neural Networks with Application to Image Denoising", "current": ["Univ Rennes", "Inria"], "excerpt": "Published as a conference paper at ICLR 2026\nDIVERGENCE-FREE NEURAL NETWORKS WITH APPLI-\nCATION TO IMAGE DENOISING\nSВҙebastien Herbreteau\nUniv Rennes, Ensai, <mark class=\"inria\">CNRS</mark>, CRESTвҖ”UMR 9194\nF-35000 Rennes, France\nsebastien.herbreteau@ensai.fr\nEtienne Meunier\nCentre Inria de Paris\nParis, France\netienne.meunier@inria.fr\nABSTRACT\nWe introduce a resource-efficient neural network architecture with zero diver-\ngence by design, adapted for high-dimensional problems. Our method is directly\napplicable to image denoising, for which divergence-free estimators are particu-\nlarly"}, {"paper_id": "aIBFTh2ThF", "title": "Robust Fine-Tuning from Non-Robust Pretrained Models: Mitigating Suboptimal Transfer With Epsilon-Scheduling", "current": ["UniversitГ© Laval", "Thales Digital Solutions", "UniversitГ© CГҙte dвҖҷAzur"], "excerpt": "i Sahoo1,2\nYann Pequignot1,2\nOla Ahmad3\nAudrey Durand1,2,5\nFrВҙedВҙeric Precioso4\nChristian GagnВҙe1,2,5\n1UniversitВҙe Laval (IID)\n2Mila\n3CortAIx Labs, Thales Digital Solutions\n4UniversitВҙe CЛҶote dвҖҷAzur, <mark class=\"inria\">CNRS</mark>, INRIA, I3S, Maasai\n5Canada CIFAR AI Chair\nABSTRACT\nFine-tuning pretrained models is a standard and effective workflow in modern\nmachine learning. However, robust fine-tuning (RFT), which aims to simulta-\nneously achieve adaptation to a downstream task and robustness to adversarial\nexamples, remains challenging. Despite the abundance of non-robust pretrained\nmodels in open-source repositories, th"}, {"paper_id": "bAG7lS1AUL", "title": "Fused-Planes: Why Train a Thousand Tri-Planes When You Can Share?", "current": ["Criteo AI Lab", "UniversitГ© Gustave Eiffel", "UniversitГ© CГҙte dвҖҷAzur"], "excerpt": "ry1, Andrew ComportвҖ  3, ValВҙerie Gouet-BrunetвҖ  2\n* вҖ  Equal contribution\n1 Criteo AI Lab, Paris, France\n2 LASTIG, UniversitВҙe Gustave Eiffel, IGN-ENSG, F-94160 Saint-MandВҙe\n3 UniversitВҙe CЛҶote dвҖҷAzur, <mark class=\"inria\">CNRS</mark>, I3S, France\nABSTRACT\nTri-Planar NeRFs enable the application of powerful 2D vision models for 3D\ntasks, by representing 3D objects using 2D planar structures.\nThis has made\nthem the prevailing choice to model large collections of 3D objects. However,\ntraining Tri-Planes to model such large collections is computationally intensive\nand remains largely inefficient.\nThis is because the current appro"}, {"paper_id": "dDHnO3Vhyj", "title": "Closing the Gap Between Text and Speech Understanding in LLMs", "current": ["UniversitГ© de Toulon", "Apple"], "excerpt": "G IN LLMS\nSantiago CuervoвҖ вҲ—, Skyler SetoвҖЎ, Maureen de SeysselвҖЎ, Richard He BaiвҖЎ, Zijin GuвҖЎ,\nTatiana LikhomanenkoвҖЎ, Navdeep JaitlyвҖЎ, Zakaria AldenehвҖЎ\nвҖ UniversitВҙe de Toulon, Aix Marseille UniversitВҙe, <mark class=\"inria\">CNRS</mark>, LIS\nвҖЎApple\nABSTRACT\nLarge Language Models (LLMs) can be adapted to extend their text capabilities to\nspeech inputs. However, these speech-adapted LLMs consistently underperform\ntheir text-based counterpartsвҖ”and even cascaded pipelinesвҖ”on language under-\nstanding tasks. We term this shortfall the textвҖ“speech understanding gap: the\nperformance drop observed when a speech-adapted LLM processes spok"}, {"paper_id": "f5MC1G6XhB", "title": "Dual Perspectives on Non-Contrastive Self-Supervised Learning", "current": ["Ecole Normale SupГ©rieure", "Meta FAIR", "Carnegie Mellon University", "Univ. Grenoble Alpes"], "excerpt": "York University\njean.ponce@ens.fr\nBasile Terver\nMeta FAIR\nINRIA Paris\nbasileterv@meta.com\nMartial Hebert\nCarnegie-Mellon University\nmartial.hebert@cs.cmu.edu\nMichael Arbel\nUniv. Grenoble Alpes, Inria\n<mark class=\"inria\">CNRS</mark>, Grenoble INP, LJK\nmichael.arbel@inria.fr\nABSTRACT\nThe stop gradient and exponential moving average iterative procedures are com-\nmonly used in non-contrastive approaches to self-supervised learning to avoid rep-\nresentation collapse, with excellent performance in downstream applications in\npractice. This presentation investigates these procedures from the dual viewpoints\nof optimization and dyna"}, {"paper_id": "f8z2bzOLK2", "title": "$\\mu$LO: Compute-Efficient Meta-Generalization of Learned Optimizers", "current": ["UniversitГ© de MontrГ©al", "Sorbonne UniversitГ©", "Mila"], "excerpt": "1,2,4\nEdouard Oyallon5\nIrina Rish1,2\nEugene Belilovsky2,3\n1UniversitГ© de MontrГ©al; 2Mila вҖ“ Quebec AI Institute; 3Concordia University, MontrГ©al;\n4Samsung AI Lab, MontrГ©al; 5ISIR, Sorbonne University, <mark class=\"inria\">CNRS</mark>, Paris, France.\nABSTRACT\nLearned optimizers (LOs) have the potential to signiп¬Ғcantly reduce the wall-clock\ntraining time of neural networks. However, they can struggle to optimize unseen\ntasks (meta-generalize), especially when training networks wider than those seen\nduring meta-training. To address this, we derive the Maximal Update Parametriza-\ntion (ВөP) for two state-of-the-art learned optimiz"}, {"paper_id": "fhEwTOLYNZ", "title": "Designing Affine-Invariant Neural Networks for Photometric Corruption Robustness and Generalization", "current": ["Inria Center at University of Rennes", "Univ Rennes"], "excerpt": "es, France, SAIRPICO Team\nU1339 INSERM, Institut Curie, Chemical Biology of Cancer Unit, Paris, France\n{mounir.messaoudi,quentin.rapilly,anais.badoual,charles.kervrann}@inria.fr\n2 Univ Rennes, Ensai, <mark class=\"inria\">CNRS</mark>, CRESTвҖ”UMR 9194, F-35000 Rennes, France\nвҲ—corresponds to equal contribution.\nABSTRACT\nStandard Convolutional Neural Networks are notoriously sensitive to photometric\nvariations, a critical flaw that data augmentation only partially mitigates without\noffering formal guarantees. We introduce the Scale-Equivariant Shift-Invariant\n(SEqSI) model, a novel architecture that achieves intensity scale equiv"}, {"paper_id": "hFxivbAgVP", "title": "Log Probability Tracking of LLM APIs", "current": ["UniversitГ© de Rennes", "LAAS"], "excerpt": "Published as a conference paper at ICLR 2026\nLOG PROBABILITY TRACKING OF LLM APIS\nTimothВҙee Chauvin 1\nErwan Le Merrer 1\nFrancВёois TaВЁДұani 1\nGilles Tredan 2\n1UniversitВҙe de Rennes, Inria, <mark class=\"inria\">CNRS</mark>/IRISA (Rennes, France)\n2LAAS, <mark class=\"inria\">CNRS</mark> (Toulouse, France)\nABSTRACT\nWhen using an LLM through an API provider, users expect the served model\nto remain consistent over time, a property crucial for the reliability of down-\nstream applications and the reproducibility of research. Existing audit methods\nare too costly to apply at regular time intervals to the wide range of available\nLLM APIs. This means t"}, {"paper_id": "hU2gT2Ucua", "title": "APPLE: Toward General Active Perception via Reinforcement Learning", "current": ["TU Darmstadt", "TU Dresden", "CNRS", "DFKI"], "excerpt": "L ACTIVE PERCEPTION\nVIA REINFORCEMENT LEARNING\nTim Schneider1,2, Cristiana de Farias1, Roberto Calandra3, Liming Chen2, and Jan Peters4\n1Department of Computer Science, TU Darmstadt, Germany.\n2LIRIS, <mark class=\"inria\">CNRS</mark> UMR5205, ВҙEcole Centrale de Lyon, France.\n3LASR Lab & CeTI, TU Dresden, Germany.\n4DFKI, Hessian.AI, RIG, and Centre for Cognitive Science, TU Darmstadt, Germany.\nCorresponding author: tim@robot-learning.de\nABSTRACT\nActive perception is a fundamental skill that enables us humans to deal with\nuncertainty in our inherently partially observable environment. For senses such\nas touch, where the informa"}, {"paper_id": "l5zZ2EEijD", "title": "Improved $\\ell_{p}$ Regression via Iteratively Reweighted Least Squares", "current": ["Boston University", "CNRS"], "excerpt": "IA\nITERATIVELY\nREWEIGHTED LEAST SQUARES\nAlina Ene\nDepartment of Computer Science\nBoston University\naene@bu.edu\nTa Duy Nguyen\nDepartment of Computer Science\nBoston University\ntaduy@bu.edu\nAdrian Vladu\n<mark class=\"inria\">CNRS</mark> & IRIF\nUniversitВҙe Paris CitВҙe\nvladu@irif.fr\nABSTRACT\nWe introduce fast algorithms for solving в„“p regression problems using the iteratively\nreweighted least squares (IRLS) method. Our approach achieves state-of-the-art\niteration complexity, outperforming the IRLS algorithm by Adil-Peng-Sachdeva\n(NeurIPS 2019) and matching the theoretical bounds established by the complex\nalgorithm of Adil-Kyng-Pe"}, {"paper_id": "mpAMH1OyMO", "title": "MARL2Grid-TR: A Multi-Agent RL Benchmark in Power Grid Operations", "current": ["Massachusetts Institute of Technology", "TAU", "INSA Rouen Normandy", "Northeastern University", "RTE RГ©seau de Transport dвҖҷElectricitГ©"], "excerpt": "wski2,3вҲ—\nAlessandro Leite4\nChristopher Amato5\nMatthieu Dussartre3\nMarc Schoenauer2\nBenjamin Donnot3вҖ \nPriya L. Donti1вҖ \n1Massachusetts Institute of Technology, Cambridge (MA), USA\n2TAU, INRIA and LISN (<mark class=\"inria\">CNRS</mark> & Univ. Paris-Saclay), Orsay, France\n3RTE RВҙeseau de Transport dвҖҷВҙElectricitВҙe, Puteaux, France\n4INSA Rouen Normandy, Univ. of Rouen Normandy, LITIS UR 4108, Rouen, France\n5Northeastern University, Boston (MA), USA\nABSTRACT\nImproving power grid operations is essential for enhancing flexibility and accel-\nerating grid decarbonization. Reinforcement learning (RL) has shown promise in\nthis domain, m"}, {"paper_id": "pHckxhmBlI", "title": "Neyman-Pearson Classification under Both Null and Alternative Distributions Shift", "current": ["Columbia University"], "excerpt": "Published as a conference paper at ICLR 2026\nNEYMAN-PEARSON CLASSIFICATION\nUNDER BOTH\nNULL AND ALTERNATIVE DISTRIBUTIONS SHIFT\nMohammadreza M. Kalan\nUniv Rennes, Ensai, <mark class=\"inria\">CNRS</mark>,\nCRESTвҖ“UMR 9194, F-35000 Rennes, France\nmohammadreza.kalan@ensai.fr\nYuyang Deng\nColumbia University, Department of Statistics\nyd2824@columbia.edu\nEitan J. Neugut\nColumbia University, Department of Statistics\neitan.neugut@columbia.edu\nSamory Kpotufe\nColumbia University, Department of Statistics\nsamory@columbia.edu\nABSTRACT\nWe consider the problem of transfer learning in NeymanвҖ“Pearson classificati"}, {"paper_id": "upMIVpe467", "title": "Equivariant Splitting: Self-supervised learning from incomplete data", "current": ["CNRS", "Prysm"], "excerpt": " paper at ICLR 2026\nEQUIVARIANT SPLITTING: SELF-SUPERVISED LEARN-\nING FROM INCOMPLETE DATA\nVictor SechaudвҲ—1, JВҙerВҙemy ScanvicвҲ—1, 2, Quentin BarthВҙelemy2, Patrice Abry1, and JuliВҙan Tachella1\n1LPENSL, <mark class=\"inria\">CNRS</mark>, ENS de Lyon, France\n2Prysm, Lyon, France\nABSTRACT\nSelf-supervised learning for inverse problems allows to train a reconstruction net-\nwork from noise and/or incomplete data alone. These methods have the poten-\ntial of enabling learning-based solutions when obtaining ground-truth references\nfor training is expensive or even impossible. In this paper, we propose a new\nself-supervised learning stra"}, {"paper_id": "xs9xwFphLy", "title": "Revisiting [CLS] and Patch Token Interaction in  Vision Transformers", "current": ["Meta"], "excerpt": "EVISITING [CLS] AND PATCH TOKEN INTERACTION\nIN VISION TRANSFORMERS\nAlexis Marouani1,2вҲ—\nOriane SimВҙeoni1\nHervВҙe JВҙegou1\nPiotr Bojanowski1\nHuy V. Vo1\n1 FAIR, Meta\n2 LIGM, Ecole des Ponts, IPParis, UGE, <mark class=\"inria\">CNRS</mark>, 77455 Marne-la-VallВҙee, France\nABSTRACT\nVision Transformers have emerged as powerful, scalable and versatile representa-\ntion learners. To capture both global and local features, a learnable [CLS] class\ntoken is typically prepended to the input sequence of patch tokens. Despite their\ndistinct nature, both token types are processed identically throughout the model.\nIn this work, we investigate th"}, {"paper_id": "zSsNzxjWP4", "title": "On the Interaction of Compressibility and Adversarial Robustness", "current": ["Imperial College London", "Uppsala University"], "excerpt": " AND\nADVERSARIAL ROBUSTNESS\nMelih Barsbey\nDepartment of Computing\nImperial College London, UK\nAntГҙnio H. Ribeiro\nDepartment of Information Technology\nUppsala University, Sweden\nUmut ВёSimВёsekli\nINRIA, <mark class=\"inria\">CNRS</mark>, DГ©partement dвҖҷInformatique\nENS / PSL, France\nTolga Birdal\nDepartment of Computing\nImperial College London, UK\nABSTRACT\nAs demands for resource efficiency and safety in modern neural networks\nintensify, substantial research effort has gone into model compression and\nadversarial robustness. Yet despite progress on each in isolation, a systematic\nunderstanding of how compressibility shapes robustne"}]};

  if (q) rows = rows.filter(r =>
    (r.paper_id||"").toLowerCase().includes(q) || (r.title||"").toLowerCase().includes(q));
  document.querySelector("#tblT tbody").innerHTML = rows.map(r => `
    <tr>
      <td><div class="ttl">${esc(r.title)}</div><div class="pid">${esc(r.paper_id)}</div>
        <a href="https://openreview.net/forum?id=${esc(r.paper_id)}" target="_blank" style="font-size:11px">OR вҶ—</a></td>
      <td class="current">${r.current.map(esc).join("<br>")}</td>
      <td><div class="snippet">${r.excerpt}</div></td>
    </tr>`).join("");
}
document.getElementById("qM").addEventListener("input", renderMissing);
document.getElementById("cCv").addEventListener("change", renderMissing);
document.getElementById("cRp").addEventListener("change", renderMissing);
document.getElementById("cDs").addEventListener("change", renderMissing);
document.getElementById("qT").addEventListener("input", renderTagged);
for (const b of document.querySelectorAll(".tabs button")) b.addEventListener("click", () => {
  for (const x of document.querySelectorAll(".tabs button")) x.classList.remove("active");
  b.classList.add("active");
  for (const v of document.querySelectorAll(".view")) v.classList.remove("active");
  document.getElementById("view-" + b.dataset.view).classList.add("active");
});
renderMissing(); renderTagged();
