<style>

    :root {

      --panel: #ffffff;
      --panel-2: #f4f6fa;
      --border: #e5e8ee;
      --text: #1a1f2b;

      --chip: #eef1f6;
      --chip-on: #e3e8f0;
    }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);

  a { color: var(--accent-2); text-decoration: none; }

  }

  .controls {

  }
  select.ctl, button.ctl {

  select.ctl { padding-right: 28px; }

  .stats {

  }
  .stats strong { color: var(--text); font-weight: 600; }

  .chiprow {
    max-width: 1280px; margin: 0 auto; padding: 12px 24px 0;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    background: var(--chip); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 12px; font-size: 12px;
    cursor: pointer; user-select: none; transition: all 0.1s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: white; }
  .chip .ct { opacity: 0.7; margin-left: 4px; font-variant-numeric: tabular-nums; }

  main {

  }

  .card:hover { border-color: var(--accent); }
  .card h3 {

  }

  }
  .card .desc { font-size: 13px; line-height: 1.5; color: var(--text); }
  .badges {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    margin-top: auto; padding-top: 8px;
  }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--chip); border: 1px solid var(--border);
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .badge.cat { background: var(--chip-on); color: var(--text); }

  .links { display: flex; gap: 8px; margin-top: 4px; }
  .links a {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 4px 10px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
  }
  .links a:hover { border-color: var(--accent); text-decoration: none; }
  .links a.ph { color: var(--accent); }

  .empty {
    text-align: center; color: var(--muted); padding: 48px 16px;
    font-size: 14px;
  }

  footer {
    max-width: 1280px; margin: 0 auto; padding: 24px;
    color: var(--muted); font-size: 12px; line-height: 1.6;
    border-top: 1px solid var(--border);
  }
  footer .notes { max-width: 80ch; margin-top: 6px; }

  .visually-hidden { position: absolute; left: -9999px; }
</style>
</head>

<script>
(function () {
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const agents = DATA.agents;

  // Header
  document.getElementById('hdr-count').textContent = agents.length;
  document.getElementById('hdr-date').textContent = DATA.generated_at;
  document.getElementById('total').textContent = agents.length;
  document.getElementById('src').textContent = DATA.source;
  document.getElementById('notes').textContent = DATA.notes;

  // Category + pricing counts
  const catCounts = {};
  const priceCounts = {};
  for (const a of agents) {
    catCounts[a.category] = (catCounts[a.category] || 0) + 1;
    const p = a.pricing || 'unknown';
    priceCounts[p] = (priceCounts[p] || 0) + 1;
  }

  // Build category chips (sorted by count desc)
  const cats = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);
  const catChipsEl = document.getElementById('cat-chips');
  const activeCats = new Set();
  for (const c of cats) {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip';
    chip.dataset.cat = c;
    chip.innerHTML = `${escapeHtml(c)} <span class="ct">${catCounts[c]}</span>`;
    chip.addEventListener('click', () => {
      if (activeCats.has(c)) { activeCats.delete(c); chip.classList.remove('on'); }
      else { activeCats.add(c); chip.classList.add('on'); }
      render();
    });
    catChipsEl.appendChild(chip);
  }

  // Build pricing chips
  const prices = ['free', 'freemium', 'paid', 'open-source'].filter(p => priceCounts[p]);
  const priceChipsEl = document.getElementById('price-chips');
  const activePrices = new Set();
  for (const p of prices) {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip';
    chip.dataset.price = p;
    chip.innerHTML = `${escapeHtml(p)} <span class="ct">${priceCounts[p]}</span>`;
    chip.addEventListener('click', () => {
      if (activePrices.has(p)) { activePrices.delete(p); chip.classList.remove('on'); }
      else { activePrices.add(p); chip.classList.add('on'); }
      render();
    });
    priceChipsEl.appendChild(chip);
  }

  // Wire search + sort + reset
  const q = document.getElementById('q');
  const sortEl = document.getElementById('sort');
  q.addEventListener('input', render);
  sortEl.addEventListener('change', render);
  document.getElementById('reset').addEventListener('click', () => {
    q.value = '';
    activeCats.clear(); activePrices.clear();
    catChipsEl.querySelectorAll('.chip.on').forEach(el => el.classList.remove('on'));
    priceChipsEl.querySelectorAll('.chip.on').forEach(el => el.classList.remove('on'));
    sortEl.value = 'launch-desc';
    render();
  });

  function sortAgents(list) {
    const mode = sortEl.value;
    const cmp = {
      'name-asc':   (a, b) => a.name.localeCompare(b.name),
      'name-desc':  (a, b) => b.name.localeCompare(a.name),
      'launch-asc': (a, b) => (a.launch_date || '').localeCompare(b.launch_date || ''),
      'launch-desc':(a, b) => (b.launch_date || '').localeCompare(a.launch_date || ''),
      'cat':        (a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name),
    }[mode];
    return list.slice().sort(cmp);
  }

  function render() {
    const term = q.value.trim().toLowerCase();
    let filtered = agents.filter(a => {
      if (activeCats.size && !activeCats.has(a.category)) return false;
      if (activePrices.size && !activePrices.has(a.pricing)) return false;
      if (term) {
        const hay = (a.name + ' ' + a.tagline + ' ' + a.description + ' ' + a.category).toLowerCase();
        if (!hay.includes(term)) return false;
      }
      return true;
    });
    filtered = sortAgents(filtered);

    document.getElementById('shown').textContent = filtered.length;

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    if (!filtered.length) {
      empty.hidden = false;
      return;
    }
    empty.hidden = true;

    const frag = document.createDocumentFragment();
    for (const a of filtered) frag.appendChild(card(a));
    grid.appendChild(frag);
  }

  function card(a) {
    const el = document.createElement('article');
    el.className = 'card';
    const priceClass = a.pricing ? `badge price-${a.pricing}` : 'badge';
    const phLink = a.producthunt_url
      ? `<a class="ph" href="${escapeAttr(a.producthunt_url)}" target="_blank" rel="noopener">Product Hunt ↗</a>` : '';
    const siteLink = a.website
      ? `<a href="${escapeAttr(a.website)}" target="_blank" rel="noopener">Website ↗</a>` : '';

    el.innerHTML = `
      <h3>${escapeHtml(a.name)}</h3>
      <div class="tagline">${escapeHtml(a.tagline || '')}</div>
      <div class="desc">${escapeHtml(a.description || '')}</div>
      <div class="badges">
        <span class="badge cat">${escapeHtml(a.category)}</span>
        ${a.pricing ? `<span class="${priceClass}">${escapeHtml(a.pricing)}</span>` : ''}
        ${a.launch_date ? `<span class="badge">launched ${escapeHtml(a.launch_date)}</span>` : ''}
      </div>
      <div class="links">${phLink}${siteLink}</div>
    `;
    return el;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escapeAttr(s) { return escapeHtml(s); }

  render();
})();
</script>
