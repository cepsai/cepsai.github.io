<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1f2933;
        }

        .viz-grid {
            display: grid;
            grid-template-rows: 1fr auto auto auto;
            /* Viz, Footnote, Legend, Source/Logo */
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 1vh, 12px);
            height: 100vh;
            width: 100vw;
            padding: clamp(12px, 2vh, 24px);
            box-sizing: border-box;
        }

        .container {
            border-radius: 0;
            background: transparent;
            box-shadow: none;
        }

        #container1 {
            grid-row: 1;
            grid-column: 1 / span 2;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            overflow: visible;
        }

        #container5 {
            grid-row: 2;
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 clamp(4px, 1vw, 8px);
            overflow: hidden;
            min-height: 0;
        }

        .footnote-text {
            font-size: clamp(10px, 1.6vw, 16px);
            color: #333;
            font-style: italic;
        }

        #container2 {
            grid-row: 3;
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 0;
        }

        .custom-legend {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 1vw, 14px);
            padding: clamp(4px, 1vh, 10px) 0;
            font-size: clamp(0.625rem, 1.4vw, 1rem);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 8px);
            cursor: pointer;
        }

        .legend-square {
            width: clamp(10px, 1.2vw, 14px);
            height: clamp(10px, 1.2vw, 14px);
            border-radius: 4px;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15) inset;
        }

        #container3 {
            grid-row: 4;
            grid-column: 1;
            display: flex;
            align-items: center;
            padding: 0 clamp(4px, 1vw, 8px);
            overflow: hidden;
            height: 40px;
        }

        #container4 {
            grid-row: 4;
            grid-column: 2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 clamp(4px, 1vw, 8px);
            overflow: hidden;
            height: 40px;
        }

        #container4 a {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #viz {
            width: 100%;
            height: 100%;
            flex: 1;
            min-height: 0;
            min-width: 0;
            position: relative;
        }

        #viz svg,
        #viz canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #viz canvas {
            z-index: 1;
            pointer-events: none;
        }

        #viz svg {
            z-index: 2;
        }

        .source-text {
            font-size: clamp(12px, 1.5vw, 16px);
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .source-text a {
            color: #2756d3;
            text-decoration: none;
        }

        .source-text a:hover {
            text-decoration: underline;
        }

        .logo {
            height: 100%;
            width: auto;
            max-height: 100%;
            max-width: 100%;
            pointer-events: auto;
            object-fit: contain;
        }

        .links path {
            fill: none;
            stroke-opacity: 0.4;
            transition: all 0.3s ease;
        }

        .nodes rect {
            stroke-width: 1px;
            transition: all 0.3s ease;
        }

        .nodes text {
            font-size: 14px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .hoveredNode rect {
            filter: drop-shadow(0 0 5px #fff);
            stroke-width: 2px;
        }

        .hoveredNode text {
            font-weight: bold;
        }

        .hoveredLink {
            stroke-opacity: 1 !important;
        }

        .dimmedNode rect {
            fill: #eeeeee !important;
            stroke: #eeeeee !important;
        }

        .dimmedNode text {
            fill: #999999 !important;
        }

        .dimmedLink {
            stroke: #eeeeee !important;
        }

        .dimmedLabel {
            opacity: 0.1 !important;
            transition: opacity 0.2s;
        }

        .hoveredLabel {
            opacity: 1 !important;
            font-weight: 700;
        }

        .tooltip {
            position: absolute;
            text-align: left;
            padding: 6px 8px;
            background: #fff;
            border: 1px solid #eee;
            font-size: 12px;
            border-radius: 2px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.15);
            pointer-events: none;
            opacity: 0;
            color: #444;
            z-index: 9999;
            transition: opacity 0.1s ease;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
        }

        .particle {
            fill: #fff;
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 1px;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.6));
            pointer-events: none;
        }

        .level-label {
            font-weight: 700;
            fill: #333;
            text-anchor: middle;
            font-size: 14px;
        }

        #filter-bar {
            display: flex;
            gap: 10px;
            padding: 8px 4px 4px;
            position: relative;
            z-index: 60;
            flex-wrap: wrap;
        }

        .filter-group {
            position: relative;
        }

        .filter-toggle {
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            color: #1f2933;
            background: #f4f6f9;
            border: 1px solid #d4dae2;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-toggle:hover {
            background: #e9edf2;
        }

        .filter-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            z-index: 100;
            width: 230px;
            max-height: 340px;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #d4dae2;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .filter-panel[hidden] {
            display: none;
        }

        .filter-actions {
            display: flex;
            gap: 6px;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .filter-actions button {
            font: inherit;
            font-size: 12px;
            flex: 1;
            padding: 4px 0;
            border: 1px solid #d4dae2;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
        }

        .filter-actions button:hover {
            background: #f0f3f7;
        }

        .filter-list {
            overflow-y: auto;
            padding: 4px 0;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-option:hover {
            background: #f4f6f9;
        }

        .filter-option .name {
            flex: 1;
        }

        .filter-option input {
            cursor: pointer;
        }

        .eu-tag {
            font-size: 10px;
            font-weight: 700;
            color: #2756d3;
            background: #e7edfb;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .us-tag {
            font-size: 10px;
            font-weight: 700;
            color: #b5460f;
            background: #fbe7dd;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .toggle-btn {
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            color: #1f2933;
            background: #f4f6f9;
            border: 1px solid #d4dae2;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .toggle-btn input {
            cursor: pointer;
            margin: 0;
        }

        .toggle-btn.active {
            background: #e7edfb;
            border-color: #b9c8ee;
        }

        @media (max-height: 500px) {
            .viz-grid {
                grid-template-rows: 1fr;
                grid-template-columns: 1fr;
                padding: 12px;
            }

            #container1 {
                grid-row: 1;
                grid-column: 1;
            }

            #container2,
            #container3,
            #container4,
            #container5 {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="viz-grid">
        <div id="container1" class="container viz-container">
            <div id="filter-bar">
                <div class="filter-group" data-side="source">
                    <button type="button" class="filter-toggle" data-side="source">From: All ▾</button>
                    <div class="filter-panel" data-side="source" hidden>
                        <div class="filter-actions">
                            <button type="button" data-act="all">All</button>
                            <button type="button" data-act="eu">EU</button>
                            <button type="button" data-act="us">US</button>
                            <button type="button" data-act="none">None</button>
                        </div>
                        <div class="filter-list" data-side="source"></div>
                    </div>
                </div>
                <div class="filter-group" data-side="target">
                    <button type="button" class="filter-toggle" data-side="target">To: All ▾</button>
                    <div class="filter-panel" data-side="target" hidden>
                        <div class="filter-actions">
                            <button type="button" data-act="all">All</button>
                            <button type="button" data-act="eu">EU</button>
                            <button type="button" data-act="us">US states</button>
                            <button type="button" data-act="none">None</button>
                        </div>
                        <div class="filter-list" data-side="target"></div>
                    </div>
                </div>
                <div class="filter-group" data-side="round">
                    <button type="button" class="filter-toggle" data-side="round">Rounds: All ▾</button>
                    <div class="filter-panel" data-side="round" hidden>
                        <div class="filter-actions">
                            <button type="button" data-act="all">All</button>
                            <button type="button" data-act="none">None</button>
                        </div>
                        <div class="filter-list" data-side="round"></div>
                    </div>
                </div>
                <label class="toggle-btn" id="combine-us-toggle">
                    <input type="checkbox" id="combine-us"> Combine US states
                </label>
            </div>
            <div id="viz">
                <canvas id="particle-canvas"></canvas>
                <svg id="sankey"></svg>
            </div>
        </div>

        <div id="container5" class="container footnote-container">
            <div class="footnote-text" id="footnote-text">
                <!-- Footnote injected here -->
            </div>
        </div>

        <div id="container2" class="container legend-container">
            <div id="legend" class="custom-legend"></div>
        </div>

        <div id="container3" class="container source-container">
            <div class="source-text" id="source-text">
                <!-- Source injected here -->
            </div>
        </div>

    </div>

        const SHOW_CONTAINER_4 = 1; // Logo
        const SHOW_CONTAINER_5 = 0; // Footnote

        // Custom Settings
        const SANKEY_SHOW_LABELS = 1;
        const SANKEY_SHOW_PARTICLES = 1;
        const SHOW_TOOLTIP = 1;

        // Source and Footnote Injection
        const SOURCE_NAME = "";
        const SOURCE_HREF = "";
        const FOOTNOTE_TEXT = "";

        const vizContainer = document.getElementById('viz');
        const svg = d3.select('#sankey');
        const tooltip = d3.select('body').append('div')
            .attr('class', 'tooltip');
        const particleCanvas = document.getElementById('particle-canvas');
        const particleContext = particleCanvas ? particleCanvas.getContext('2d') : null;
        const legendContainer = d3.select('#legend');

        const container2 = document.getElementById('container2');
        if (SHOW_LEGEND === 0) {
            container2.style.display = 'none';
        }
        if (SHOW_CONTAINER_3 === 0) {
            document.getElementById('container3').style.display = 'none';
        }
        if (SHOW_CONTAINER_4 === 0) {
            document.getElementById('container4').style.display = 'none';
        }
        if (SHOW_CONTAINER_5 === 0) {
            document.getElementById('container5').style.display = 'none';
        }

        // Adjust Grid Layout based on visibility
        (function adjustLayout() {
            const vizGrid = document.querySelector('.viz-grid');
            const showFooter = (SHOW_CONTAINER_3 || SHOW_CONTAINER_4);
            const gridRows = ['1fr'];
            if (SHOW_CONTAINER_5) gridRows.push('auto');
            if (SHOW_LEGEND) gridRows.push('auto');
            if (showFooter) gridRows.push('auto');

            vizGrid.style.gridTemplateRows = gridRows.join(' ');
        })();

        let width = 0;
        let height = 0;
        let cleanData = [];      // full dataset (after parse/clean)
        let displayData = [];    // filtered subset actually rendered
        const sourceSel = new Set();
        const targetSel = new Set();
        const roundSel = new Set();
        let combineUS = false;                  // roll US states up to "United States" for display
        const US_STATE_NODES = new Set();       // node names that are US states (populated from data)
        // US-state nodes are suffixed " (US)" in the data (e.g. "California (US)"),
        // which also disambiguates Georgia-the-state from Georgia-the-country.
        const isUSState = name => typeof name === 'string' && name.endsWith(' (US)');
        const EU_COUNTRIES = new Set([
            'Austria', 'Belgium', 'Bulgaria', 'Croatia', 'Cyprus', 'Czechia', 'Czech Republic',
            'Denmark', 'Estonia', 'Finland', 'France', 'Germany', 'Greece', 'Hungary', 'Ireland',
            'Italy', 'Latvia', 'Lithuania', 'Luxembourg', 'Malta', 'Netherlands', 'The Netherlands',
            'Poland', 'Portugal', 'Romania', 'Slovakia', 'Slovenia', 'Spain', 'Sweden'
        ]);
        let nodeColorMap = new Map();
        let particles = [];
        let particleLinks = [];
        let particleTimer = null;
        let hoveredLinkIds = new Set();
        let columnLabels = [];

        const PARTICLE_TIMER_DELAY = 800;
        const PARTICLE_SETTINGS = {
            frequencyRange: [0.08, 0.65],
            sizeRange: [1.5, 4],
            speedRange: [0.15, 0.54],
            emissionIterations: 2,
            densityScale: 0.02
        };

        const sankey = d3.sankey()
            .nodeWidth(20)
            .nodePadding(16);

        const linkPath = d3.sankeyLinkHorizontal();

        function updateDimensions() {
            const rect = vizContainer.getBoundingClientRect();
            width = rect.width || window.innerWidth;
            height = rect.height || window.innerHeight;
            svg
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', `0 0 ${width} ${height}`);
            if (particleCanvas) {
                particleCanvas.width = width;
                particleCanvas.height = height;
            }
        }

        function positionTooltip(event) {
            const tooltipOffset = 10;
            const screenWidth = window.innerWidth;
            const isLeftSide = event.pageX < screenWidth / 2;

            if (isLeftSide) {
                tooltip
                    .style('left', `${event.pageX + tooltipOffset}px`)
                    .style('top', `${event.pageY - 28}px`);
            } else {
                const tooltipNode = tooltip.node();
                const tooltipWidth = tooltipNode ? tooltipNode.offsetWidth : 150;
                tooltip
                    .style('left', `${event.pageX - tooltipWidth - tooltipOffset}px`)
                    .style('top', `${event.pageY - 28}px`);
            }
        }

        function setHoveredLinks(links) {
            const linkArray = Array.isArray(links) ? links : Array.from(links || []);
            const idSet = new Set();
            linkArray.forEach(link => {
                if (link && link.id) {
                    idSet.add(link.id);
                }
            });
            hoveredLinkIds = idSet;
            return hoveredLinkIds;
        }

        function clearHoveredLinks() {
            hoveredLinkIds = new Set();
            return hoveredLinkIds;
        }

        function getColorPalette() {
            // Combine standard schemes
            return d3.schemeTableau10.concat(d3.schemeSet3);
        }

        function buildGraph(data) {
            if (!data.length) {
                return { nodes: [], links: [], levelCount: 0 };
            }

            const nodeNames = new Set();
            const linkKeyMap = new Map();
            // Source-side and target-side nodes get distinct identities so the
            // graph is a DAG. Without this, country->same-country rows (e.g.
            // "US -> US") and reciprocal pairs (US->UK + UK->US) form cycles and
            // d3-sankey throws "circular link", aborting render (blank chart).
            const displayName = new Map();

            data.forEach(d => {
                const sKey = `src␀${d.from}`;
                const tKey = `tgt␀${d.to}`;
                nodeNames.add(sKey);
                nodeNames.add(tKey);
                displayName.set(sKey, d.from);
                displayName.set(tKey, d.to);

                const key = `${sKey}|${tKey}`;
                let link = linkKeyMap.get(key);
                if (!link) {
                    link = {
                        id: key,
                        sourceName: sKey,
                        targetName: tKey,
                        value: 0,
                        color: d.color
                    };
                    linkKeyMap.set(key, link);
                }
                link.value += d.value;
            });

            const adjacency = new Map();
            const indegree = new Map();
            nodeNames.forEach(name => {
                adjacency.set(name, new Set());
                indegree.set(name, 0);
            });

            linkKeyMap.forEach(link => {
                if (!adjacency.has(link.sourceName)) {
                    adjacency.set(link.sourceName, new Set());
                }
                adjacency.get(link.sourceName).add(link.targetName);
                indegree.set(link.targetName, (indegree.get(link.targetName) || 0) + 1);
            });

            const levels = new Map();
            const queue = [];

            nodeNames.forEach(name => {
                if ((indegree.get(name) || 0) === 0) {
                    queue.push(name);
                    levels.set(name, 0);
                }
            });

            while (queue.length) {
                const current = queue.shift();
                const currentLevel = levels.get(current) || 0;
                const neighbors = adjacency.get(current);
                if (!neighbors) continue;
                neighbors.forEach(target => {
                    const candidate = currentLevel + 1;
                    const existing = levels.get(target);
                    if (existing === undefined || candidate > existing) {
                        levels.set(target, candidate);
                    }
                    indegree.set(target, (indegree.get(target) || 0) - 1);
                    if ((indegree.get(target) || 0) === 0) {
                        queue.push(target);
                    }
                });
            }

            nodeNames.forEach(name => {
                if (!levels.has(name)) {
                    levels.set(name, 0);
                }
            });

            // Sort nodes by level, then name
            const sortedNames = Array.from(nodeNames).sort((a, b) => {
                const levelDiff = (levels.get(a) || 0) - (levels.get(b) || 0);
                if (levelDiff !== 0) return levelDiff;
                return (displayName.get(a) || a).localeCompare(displayName.get(b) || b);
            });

            const nodes = sortedNames.map(key => ({
                key,
                name: displayName.get(key) || key,
                level: levels.get(key) || 0
            }));

            // Calculate node colors - Default grey, or inherit from incoming links?
            // Simple approach: nodes involved in "colored" links remain grey to not clash,
            // or if we have a node-based coloring logic.
            // Current user request: color field not working.
            // If data has 'color' on row, it colors the LINK.
            // Nodes are naturally grey in this style unless we want to color them by category.
            nodes.forEach(n => {
                n.color = '#b3b3b3';
            });

            const nodeIndexMap = new Map(nodes.map((node, index) => [node.key, index]));

            const links = Array.from(linkKeyMap.values())
                .map(link => ({
                    id: link.id || `${link.sourceName}|${link.targetName}`,
                    source: nodeIndexMap.get(link.sourceName),
                    target: nodeIndexMap.get(link.targetName),
                    value: link.value,
                    color: link.color || '#999'
                }))
                .filter(link => link.source !== undefined && link.target !== undefined && link.value > 0);

            const levelCount = nodes.length
                ? nodes.reduce((max, node) => Math.max(max, node.level), 0) + 1
                : 0;

            return { nodes, links, levelCount };
        }

        function render() {
            resetParticles();
            updateDimensions();
            svg.selectAll('*').remove();

            if (!displayData.length) {
                return;
            }

            const graph = buildGraph(displayData);

            // Determine margins for labels
            const hasLabels = columnLabels && columnLabels.length > 0;
            const labelHeight = hasLabels ? 24 : 0;
            const innerHeight = height - labelHeight;

            sankey.size([width, innerHeight]);

            sankey.nodeAlign((node, columns) => {
                const maxColumns = Number.isFinite(columns) ? columns : (graph.levelCount ? graph.levelCount - 1 : 0);
                const maxLevel = graph.levelCount ? Math.min(graph.levelCount - 1, maxColumns) : maxColumns;
                const nodeLevel = typeof node.level === 'number' ? node.level : 0;
                return Math.max(0, Math.min(nodeLevel, maxLevel));
            });

            sankey(graph);

            const linkSelection = svg.append('g')
                .attr('class', 'links')
                .selectAll('path')
                .data(graph.links)
                .enter().append('path')
                .attr('d', linkPath)
                .attr('stroke-width', d => Math.max(1, d.width))
                .attr('stroke', d => d.color);

            const nodeSelection = svg.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(graph.nodes)
                .enter().append('g')
                .attr('transform', d => `translate(${d.x0},${d.y0})`);

            // Highlight Layer (highest z-index)
            const highlightLayer = svg.append('g')
                .attr('class', 'highlight-layer')
                .style('pointer-events', 'none');

            function highlightLinksOverlay(selection) {
                highlightLayer.selectAll('*').remove();
                selection.each(function () {
                    const clone = this.cloneNode(true);
                    d3.select(clone).classed('hoveredLink', true).classed('dimmedLink', false);
                    highlightLayer.node().appendChild(clone);
                });
            }

            function clearHighlightOverlay() {
                highlightLayer.selectAll('*').remove();
            }

            // --- Level Labels ---
            if (hasLabels) {
                // Determine column positions
                // Group nodes by x0 to find column centers
                const columnGroups = d3.nest()
                    .key(d => Math.round(d.x0))
                    .entries(graph.nodes)
                    .sort((a, b) => Number(a.key) - Number(b.key));

                // We have N columns from sankey layout.
                // We have M labels from data.
                // If M matches N, great.
                if (columnLabels.length > 0) {
                    const labelLayer = svg.append('g').attr('class', 'level-labels');
                    columnGroups.forEach((group, i) => {
                        if (i < columnLabels.length) {
                            const x0 = Number(group.key);
                            // Assuming standard nodeWidth, center is x0 + sankey.nodeWidth()/2
                            const centerX = x0 + sankey.nodeWidth() / 2;
                            labelLayer.append('text')
                                .attr('class', 'level-label')
                                .attr('x', centerX)
                                .attr('y', height - 5) // Bottom padding
                                .text(columnLabels[i]);
                        }
                    });
                }
            }
            // --------------------

            function getLabelFontSize() {
                const minSide = Math.max(0, Math.min(width, height));
                return Math.max(12, Math.min(22, Math.round(minSide * 0.022)));
            }

            const labelLayer = svg.append('g')
                .attr('class', 'link-labels')
                .style('pointer-events', 'none');

            function clearLinkLabels() {
                labelLayer.selectAll('*').remove();
            }

            function showLinkLabels(links) {
                // Link labels shown on hover ALWAYS if links provided (hover logic calls this only on hover)
                // However, user setting 'SANKEY_SHOW_LABELS' probably targets NODE labels usually. 
                // But for safety, lets keep link Percentage labels always on hover as it's useful context. 
                // Or if user wants NO labels entirely, we can check.
                // Assuming 'Show Labels' means 'Show Node Text'. 
                // I will NOT block link hover labels here unless explicitly asked.
                // But previous code blocked it. Let's unblock it if it was blocking useful info, 
                // but the user said "toggling OFF doesn't hide labels", implying they want to hide visible ones.
                // The visible ones are the NODE labels.

                clearLinkLabels();
                if (!links || !links.length) {
                    return;
                }
                const fontSize = getLabelFontSize();
                const labelOffset = Math.max(14, fontSize * 1.4);
                const labelFill = '#ffffff';
                const labelStroke = 'rgba(0,0,0,0.45)';

                function appendLabel(point, textValue) {
                    if (!point || textValue === null || textValue === undefined) return;
                    labelLayer.append('text')
                        .attr('x', point.x)
                        .attr('y', point.y)
                        .attr('dy', '0.35em')
                        .attr('text-anchor', 'middle')
                        .attr('fill', labelFill)
                        .attr('stroke', labelStroke)
                        .attr('stroke-width', Math.max(1.5, fontSize * 0.12))
                        .attr('paint-order', 'stroke fill')
                        .style('font-weight', '700')
                        .style('font-size', `${fontSize}px`)
                        .style('fill', labelFill)
                        .style('stroke', labelStroke)
                        .style('paint-order', 'stroke fill')
                        .text(textValue);
                }

                links.forEach(link => {
                    const pathNode = linkSelection.filter(ld => ld.id === link.id).node();
                    if (!pathNode || !pathNode.getTotalLength) return;
                    const pathLength = pathNode.getTotalLength();
                    if (!pathLength) return;

                    const startLen = Math.min(pathLength, labelOffset);
                    const endLen = Math.max(0, pathLength - labelOffset);

                    const startPoint = pathNode.getPointAtLength(startLen);
                    const endPoint = pathNode.getPointAtLength(endLen);

                    const sourceTotal = graph.nodes[link.source.index].value || 0;
                    const targetTotal = graph.nodes[link.target.index].value || 0;
                    const sourceShare = sourceTotal ? (link.value / sourceTotal) * 100 : null;
                    const targetShare = targetTotal ? (link.value / targetTotal) * 100 : null;

                    if (sourceShare !== null) {
                        appendLabel(startPoint, `${sourceShare.toFixed(1)}%`);
                    }
                    if (targetShare !== null) {
                        appendLabel(endPoint, `${targetShare.toFixed(1)}%`);
                    }
                });
            }

            // 5. Node Rects (Part 1 of Nodes)
            nodeSelection.append('rect')
                .attr('height', d => d.y1 - d.y0)
                .attr('width', sankey.nodeWidth())
                .attr('fill', d => d.color)
                .attr('stroke', '#999');

            // 6. Node Text Layer (Labels always on top of Highlight Layer)
            const nodeTextLayer = svg.append('g')
                .attr('class', 'node-labels');
            // Allow pointer events on text to trigger hover

            const nodeLabels = nodeTextLayer.selectAll('text')
                .data(graph.nodes)
                .enter().append('text')
                .attr('x', d => d.x0 < width / 2 ? d.x0 + sankey.nodeWidth() + 6 : d.x0 - 6)
                .attr('y', d => d.y0 + (d.y1 - d.y0) / 2)
                .attr('dy', '0.35em')
                .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
                .attr('fill', '#000')
                .style('cursor', 'pointer') // Indicate clickability
                .style('font-size', '14px')
                .text(d => d.name);

            // Replicate hover logic for labels (same as rects)
            function handleNodeMouseOver(d) {
                if (SHOW_TOOLTIP) {
                    tooltip.transition().duration(200).style('opacity', 0.95);
                    const columnText = graph.levelCount ? `Column: ${Math.min(d.level + 1, graph.levelCount)} / ${graph.levelCount}` : '';
                    const nodeTooltip = columnText
                        ? `Name: ${d.name}<br/>Total: ${d.value}<br/>`
                        : `Name: ${d.name}<br/>Total: ${d.value}`;
                    tooltip.html(nodeTooltip);
                    positionTooltip(d3.event);
                }

                const nodeIndex = d.index;
                const connectedLinks = graph.links.filter(l => l.source.index === nodeIndex || l.target.index === nodeIndex);
                const connectedNodes = new Set([nodeIndex]);
                const connectedLinkIds = setHoveredLinks(connectedLinks);
                connectedLinks.forEach(l => {
                    connectedNodes.add(l.source.index);
                    connectedNodes.add(l.target.index);
                });
                showLinkLabels(connectedLinks);

                nodeSelection.classed('dimmedNode', true).classed('hoveredNode', false);
                linkSelection.classed('dimmedLink', true).classed('hoveredLink', false);

                nodeSelection.filter(nd => connectedNodes.has(nd.index))
                    .classed('dimmedNode', false)
                    .classed('hoveredNode', true);
                linkSelection.filter(ld => connectedLinkIds.has(ld.id))
                    .classed('dimmedLink', false)
                    .classed('hoveredLink', true);

                nodeLabels.classed('dimmedLabel', true).classed('hoveredLabel', false);
                nodeLabels.filter(d => connectedNodes.has(d.index))
                    .classed('dimmedLabel', false)
                    .classed('hoveredLabel', true);

                highlightLinksOverlay(linkSelection.filter(ld => connectedLinkIds.has(ld.id)));
            }

            function handleNodeMouseOut() {
                tooltip.transition().duration(200).style('opacity', 0);
                clearHoveredLinks();
                clearLinkLabels();
                clearHighlightOverlay();
                nodeSelection.classed('hoveredNode', false).classed('dimmedNode', false);
                linkSelection.classed('hoveredLink', false).classed('dimmedLink', false);
                nodeLabels.classed('hoveredLabel', false).classed('dimmedLabel', false);
            }

            // Attach handlers to both Rects and Labels
            nodeSelection
                .on('mouseover', handleNodeMouseOver)
                .on('mousemove', function () { positionTooltip(d3.event); })
                .on('mouseout', handleNodeMouseOut);

            nodeLabels
                .on('mouseover', function (d) { d3.select(this).style('cursor', 'pointer'); handleNodeMouseOver(d); })
                .on('mousemove', function () { positionTooltip(d3.event); })
                .on('mouseout', handleNodeMouseOut);

            // Hide labels if setting is off
            if (!SANKEY_SHOW_LABELS) {
                nodeLabels.style('display', 'none');
            } else {
                // Determine visibility based on height? (optional refinement, not requested)
            }

            /* 
               Handlers now attached via helper function above.
               Removing old inline handlers block for nodeSelection.
            */
            linkSelection
                .on('mouseover', function (d) {
                    d3.select(this).style('cursor', 'pointer');
                    tooltip.transition().duration(200).style('opacity', 0.95);
                    const sourceName = graph.nodes[d.source.index].name;
                    const targetName = graph.nodes[d.target.index].name;
                    const sourceLevel = graph.levelCount ? `${Math.min((d.source.level || 0) + 1, graph.levelCount)}` : null;
                    const targetLevel = graph.levelCount ? `${Math.min((d.target.level || 0) + 1, graph.levelCount)}` : null;
                    const levelInfo = (sourceLevel && targetLevel)
                        ? `<br/>Columns: ${sourceLevel} -> ${targetLevel} / ${graph.levelCount}`
                        : '';
                    const targetTotal = graph.nodes[d.target.index].value || 0;
                    const targetShare = targetTotal ? (d.value / targetTotal) * 100 : null;
                    const shareText = targetShare !== null ? `<br/>Share: ${targetShare.toFixed(1)}%` : '';
                    tooltip.html(`Source: ${sourceName}<br/>Target: ${targetName}<br/>Value: ${d.value}${shareText}`);
                    positionTooltip(d3.event);

                    const connectedNodes = new Set([d.source.index, d.target.index]);
                    setHoveredLinks([d]);
                    showLinkLabels([d]);
                    nodeSelection.classed('dimmedNode', true).classed('hoveredNode', false);
                    linkSelection.classed('dimmedLink', true).classed('hoveredLink', false);

                    nodeSelection.filter(nd => connectedNodes.has(nd.index))
                        .classed('dimmedNode', false)
                        .classed('hoveredNode', true);
                    d3.select(this).classed('dimmedLink', false).classed('hoveredLink', true);

                    nodeLabels.classed('dimmedLabel', true).classed('hoveredLabel', false);
                    nodeLabels.filter(d => connectedNodes.has(d.index))
                        .classed('dimmedLabel', false)
                        .classed('hoveredLabel', true);

                    highlightLinksOverlay(d3.select(this));
                })
                .on('mousemove', function () {
                    positionTooltip(d3.event);
                })
                .on('mouseout', function () {
                    tooltip.transition().duration(200).style('opacity', 0);
                    clearHoveredLinks();
                    clearLinkLabels();
                    clearHighlightOverlay();
                    nodeSelection.classed('hoveredNode', false).classed('dimmedNode', false);
                    linkSelection.classed('hoveredLink', false).classed('dimmedLink', false);
                    d3.select(this).style('cursor', null);
                });

            if (SANKEY_SHOW_PARTICLES) {
                startParticleFlow(graph, linkSelection);
            }
        }

        // Particle functions ... (keep existing)
        function resetParticles() {
            if (particleTimer) {
                particleTimer.stop();
                particleTimer = null;
            }
            particles = [];
            particleLinks = [];
            clearHoveredLinks();
            if (particleContext && particleCanvas) {
                particleContext.clearRect(0, 0, particleCanvas.width || width, particleCanvas.height || height);
            }
        }
        function startParticleFlow(graph, linkSelection) {
            // ... existing logic ... 
            if (!particleContext || !particleCanvas || !graph.links.length) {
                return;
            }

            const values = graph.links.map(l => l.value);
            const extent = d3.extent(values);
            if (!extent || !Number.isFinite(extent[0]) || !Number.isFinite(extent[1])) {
                return;
            }
            const normalizedExtent = extent[0] === extent[1]
                ? [extent[0], extent[0] + 1]
                : extent;

            const frequencyScale = d3.scaleLinear()
                .domain(normalizedExtent)
                .range(PARTICLE_SETTINGS.frequencyRange);
            const sizeScale = d3.scaleLinear()
                .domain(normalizedExtent)
                .range(PARTICLE_SETTINGS.sizeRange);

            particleLinks = [];
            linkSelection.each(function (d) {
                // Should particle inherit link color?
                const sourceColor = '#999'; // d.source.color... (nodes are grey now)
                const targetColor = '#ccc';
                // If link has color, use it
                const linkColor = d.color || '#999';

                const freqValue = frequencyScale(d.value);
                const clampedFreq = Math.max(PARTICLE_SETTINGS.frequencyRange[0], Math.min(freqValue, PARTICLE_SETTINGS.frequencyRange[1]));
                d.freq = clampedFreq * PARTICLE_SETTINGS.densityScale;
                d.particleSize = sizeScale(d.value);
                // Particle color interpolation
                d.particleColor = d3.scaleLinear().domain([0, 1]).range([linkColor, linkColor]); // Uniform color for now
                particleLinks.push({ link: d, path: this });
            });

            if (particleTimer) {
                particleTimer.stop();
            }
            particles = [];

            particleTimer = d3.timer((elapsed) => {
                tickParticles(elapsed);
            }, PARTICLE_TIMER_DELAY);
        }
        function tickParticles(elapsed) {
            particles = particles.filter(p => p.current < p.length && p.path);
            particleLinks.forEach(({ link, path }) => {
                if (!path || !link.freq) {
                    return;
                }
                for (let i = 0; i < PARTICLE_SETTINGS.emissionIterations; i += 1) {
                    if (Math.random() < link.freq) {
                        const offsetRange = Math.max(1, (link.width || 2) - (link.particleSize || 1));
                        const offset = (Math.random() - 0.5) * offsetRange;
                        const totalLength = path.getTotalLength();
                        particles.push({
                            link,
                            path,
                            length: totalLength,
                            startTime: elapsed,
                            offset,
                            speed: PARTICLE_SETTINGS.speedRange[0] +
                                Math.random() * (PARTICLE_SETTINGS.speedRange[1] - PARTICLE_SETTINGS.speedRange[0])
                        });
                    }
                }
            });
            drawParticles(elapsed);
        }
        function drawParticles(elapsed) {
            if (!particleContext || !particleCanvas) {
                return;
            }
            particleContext.clearRect(0, 0, particleCanvas.width || width, particleCanvas.height || height);
            particles.forEach(p => {
                const elapsedTime = elapsed - p.startTime;
                p.current = elapsedTime * 0.15 * p.speed;
                if (p.current > p.length) {
                    return;
                }
                const currentPos = p.path.getPointAtLength(p.current);
                if (!currentPos) {
                    return;
                }
                particleContext.beginPath();
                // If hovered, white. Else link color.
                const hasHoveredId = p.link && p.link.id && hoveredLinkIds.has(p.link.id);
                const isHovered = hasHoveredId;
                let fill = isHovered ? '#ffffff' : (p.link.color || '#999');

                particleContext.fillStyle = fill;
                particleContext.arc(
                    currentPos.x,
                    currentPos.y + p.offset,
                    p.link.particleSize || 2,
                    0,
                    2 * Math.PI
                );
                particleContext.fill();
            });
        }

        // Build Legend
        function buildLegend(parentColorMap) {
            const container = d3.select('#legend');
            container.selectAll('*').remove();
            if (!SHOW_LEGEND || !parentColorMap || parentColorMap.size === 0) return;

            const entries = Array.from(parentColorMap.entries());
            entries.forEach(([parent, color]) => {
                const item = container.append('div').attr('class', 'legend-item');
                item.append('div')
                    .attr('class', 'legend-square')
                    .style('background', color);
                item.append('div').text(parent);
            });
        }

        function processData() {
            const parents = new Set();
            const levelsSet = new Set();

            cleanData = originalData.map(row => {
                const p = row.parent ? String(row.parent).trim() : null;
                const l = row.level ? String(row.level).trim() : null;
                if (p) parents.add(p);
                if (l) levelsSet.add(l);
                return {
                    from: row.from ? String(row.from).trim() : null,
                    to: row.to ? String(row.to).trim() : null,
                    value: row.value ? +row.value : 0,
                    color: row.color ? String(row.color).trim() : null,
                    round: row.round ? String(row.round).trim() : null,
                    parent: p,
                    level: l
                };
            }).filter(d => d.from && d.to && d.value > 0);

            // Level Labels
            columnLabels = Array.from(levelsSet);
            // Sort columnLabels? If they are numbers, numeric. If text, maybe input order or alphabetical.
            // Best effort: Assume they are provided in order via Unique set iteration (insertion order usually preserved in recent JS, but risky).
            // Better: use unique values from data order.
            // Re-extract unique in order of appearance
            const orderedLevels = [];
            const seenLevels = new Set();
            cleanData.forEach(d => {
                if (d.level && !seenLevels.has(d.level)) {
                    seenLevels.add(d.level);
                    orderedLevels.push(d.level);
                }
            });
            columnLabels = orderedLevels;

            // Parent Colors
            let parentColorMap = new Map();
            if (parents.size > 0) {
                const palette = getColorPalette();
                const parentArray = Array.from(parents).sort();
                parentArray.forEach((p, i) => {
                    parentColorMap.set(p, palette[i % palette.length]);
                });
                buildLegend(parentColorMap);
            }

            // Assign Colors
            cleanData.forEach(d => {
                if (d.color) {
                    // Already set
                } else if (d.parent) {
                    d.color = parentColorMap.get(d.parent);
                }
            });

            setupFilters();
            applyFilters();
        }

        // --- Filters (origin / destination / funding round) ---
        // Each side has its own selection set, label prefix, and the field it
        // filters on. A flow row survives only if it passes all three.
        const SELS = { source: sourceSel, target: targetSel, round: roundSel };
        const PREFIX = { source: 'From', target: 'To', round: 'Rounds' };
        const FIELD = { source: 'from', target: 'to', round: 'round' };

        // Canonical funding-round order (early -> late, then non-standard).
        // Rounds not listed here are appended alphabetically at the end.
        const ROUND_ORDER = [
            'Angel', 'Pre Seed', 'Pre-Seed', 'Seed', 'Series A', 'Series B', 'Series C',
            'Series D', 'Series E', 'Series F', 'Series G', 'Series H', 'Series I', 'Series J',
            'Series Unknown', 'Corporate Round', 'Private Equity', 'Convertible Note',
            'Debt Financing', 'Post IPO Equity', 'Post IPO Debt', 'Post IPO Secondary',
            'Secondary Market', 'Undisclosed'
        ];

        function applyFilters() {
            // Filter on raw (state-level) granularity first...
            let data = cleanData.filter(d =>
                sourceSel.has(d.from) &&
                targetSel.has(d.to) &&
                (d.round === null || roundSel.has(d.round)));
            // ...then optionally roll US states up to "United States" for display.
            if (combineUS) {
                data = data.map(d => {
                    const from = isUSState(d.from) ? 'United States' : d.from;
                    const to = isUSState(d.to) ? 'United States' : d.to;
                    return (from === d.from && to === d.to) ? d : Object.assign({}, d, { from, to });
                });
            }
            displayData = data;
            render();
        }

        function buildFilterList(side, values) {
            const list = document.querySelector(`.filter-list[data-side="${side}"]`);
            list.innerHTML = '';
            values.forEach(value => {
                const label = document.createElement('label');
                label.className = 'filter-option';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = true;
                checkbox.value = value;
                checkbox.dataset.side = side;

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = value;

                label.appendChild(checkbox);
                label.appendChild(name);
                if (side !== 'round' && EU_COUNTRIES.has(value)) {
                    const tag = document.createElement('span');
                    tag.className = 'eu-tag';
                    tag.textContent = 'EU';
                    label.appendChild(tag);
                }
                if (side !== 'round' && US_STATE_NODES.has(value)) {
                    const tag = document.createElement('span');
                    tag.className = 'us-tag';
                    tag.textContent = 'US';
                    label.appendChild(tag);
                }
                list.appendChild(label);
            });
        }

        function updateFilterLabel(side) {
            const sel = SELS[side];
            const total = document.querySelectorAll(`.filter-list[data-side="${side}"] input[type=checkbox]`).length;
            const n = sel.size;
            const prefix = PREFIX[side];
            let txt;
            if (n === total) txt = `${prefix}: All`;
            else if (n === 0) txt = `${prefix}: None`;
            else txt = `${prefix}: ${n} selected`;
            document.querySelector(`.filter-toggle[data-side="${side}"]`).textContent = `${txt} ▾`;
        }

        function sortRounds(rounds) {
            return rounds.slice().sort((a, b) => {
                const ia = ROUND_ORDER.indexOf(a);
                const ib = ROUND_ORDER.indexOf(b);
                if (ia === -1 && ib === -1) return a.localeCompare(b);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });
        }

        function setupFilters() {
            // US states (suffixed " (US)") on either side, so Georgia-the-state
            // stays distinct from Georgia-the-country.
            US_STATE_NODES.clear();
            cleanData.forEach(d => {
                if (isUSState(d.from)) US_STATE_NODES.add(d.from);
                if (isUSState(d.to)) US_STATE_NODES.add(d.to);
            });

            const valuesFor = side => Array.from(new Set(
                cleanData.map(d => d[FIELD[side]]).filter(v => v !== null && v !== undefined)
            ));
            ['source', 'target', 'round'].forEach(side => {
                let values = valuesFor(side);
                values = side === 'round' ? sortRounds(values) : values.sort();
                const sel = SELS[side];
                sel.clear();
                values.forEach(v => sel.add(v));
                buildFilterList(side, values);
                updateFilterLabel(side);
            });
        }

        function applyAction(side, act) {
            const sel = SELS[side];
            const boxes = document.querySelectorAll(`.filter-list[data-side="${side}"] input[type=checkbox]`);
            sel.clear();
            boxes.forEach(cb => {
                let on;
                if (act === 'all') on = true;
                else if (act === 'none') on = false;
                else if (act === 'us') on = US_STATE_NODES.has(cb.value) || cb.value === 'United States';
                else on = side !== 'round' && EU_COUNTRIES.has(cb.value); // 'eu'
                cb.checked = on;
                if (on) sel.add(cb.value);
            });
            updateFilterLabel(side);
            applyFilters();
        }

        function togglePanel(side) {
            document.querySelectorAll('.filter-panel').forEach(p => {
                p.hidden = p.dataset.side === side ? !p.hidden : true;
            });
        }

        const filterBar = document.getElementById('filter-bar');
        filterBar.addEventListener('click', (event) => {
            const toggle = event.target.closest('.filter-toggle');
            if (toggle) {
                togglePanel(toggle.dataset.side);
                return;
            }
            const action = event.target.closest('[data-act]');
            if (action) {
                applyAction(action.closest('.filter-group').dataset.side, action.dataset.act);
            }
        });
        filterBar.addEventListener('change', (event) => {
            const cb = event.target.closest('input[type=checkbox]');
            if (!cb || !cb.dataset.side) return; // ignore the combine-US toggle here
            const sel = SELS[cb.dataset.side];
            if (cb.checked) sel.add(cb.value);
            else sel.delete(cb.value);
            updateFilterLabel(cb.dataset.side);
            applyFilters();
        });

        // "Combine US states" toggle: roll all is_us state nodes into "United States"
        const combineToggle = document.getElementById('combine-us');
        combineToggle.addEventListener('change', () => {
            combineUS = combineToggle.checked;
            document.getElementById('combine-us-toggle').classList.toggle('active', combineUS);
            applyFilters();
        });
        // Close any open panel when clicking outside the filter groups
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.filter-group')) {
                document.querySelectorAll('.filter-panel').forEach(p => { p.hidden = true; });
            }
        });

        // Initialize
        processData();
        window.addEventListener('resize', () => {
            updateDimensions();
            render();
        });

    </script>
</body>

</html>
