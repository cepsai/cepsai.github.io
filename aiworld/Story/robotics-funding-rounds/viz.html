<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NEURA Robotics enters the top robotics funding rounds</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ─── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
    --fs-control:  clamp(9px, 1.4vw, 13px);        /* selectors, dropdown */
    --fs-legend:   clamp(0.625rem, 1.4vw, 1rem);   /* legend text */
    --fs-meta:     clamp(10px, 1.6vw, 16px);       /* source, footnote */
    --fs-slider:   clamp(11px, 1.2vw, 13px);       /* slider tooltip */

    /* Compact breakpoint — MUST match BREAKPOINT_COMPACT in JS (SKILL.md). */
    --breakpoint-compact: 500px;
}

/* ─── BASE ────────────────────────────────────────────────────────────────── */
html, body {
    height: 100%;
}

body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
    background-color: white;
}

/* ─── LAYOUT GRID ─────────────────────────────────────────────────────────── */
.viz-grid {
    display: grid;
    grid-template-rows: 16fr 1fr 1fr;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    width: 100vw;
    box-sizing: border-box;
    padding-bottom: clamp(8px, 2vh, 18px);
}

#container1 {
    grid-row: 1;
    grid-column: 1 / span 2;
    overflow: hidden;
    min-height: 0;
}

#container2 {
    grid-row: 2;
    grid-column: 1 / span 2;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

#container3 {
    grid-row: 3;
    grid-column: 1;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 20px;
    overflow: hidden;
    min-width: 0;
}

#container4 {
    grid-row: 3;
    grid-column: 2;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 20px;
    overflow: hidden;
    min-width: 0;
}

#container4 a {
    height: 100%;
    display: flex;
    align-items: center;
    cursor: pointer;
}

/* ─── CHART CANVAS ────────────────────────────────────────────────────────── */
#viz {
    width: 100%;
    height: 100%;
    min-height: 0;
    min-width: 0;
}

#chart {
    display: block;
    width: 100%;
    height: 100%;
}

/* ─── LEGEND ──────────────────────────────────────────────────────────────── */
.legend {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 1vw, 14px);
    background: rgba(255, 255, 255, 1);
    padding: clamp(4px, 1vh, 10px) clamp(10px, 2vw, 16px);
    border-radius: clamp(6px, 1vw, 12px);
    max-width: 100%;
    max-height: 100%;
    font-size: var(--fs-legend);
}

.legend-item {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1vw, 8px);
    font-weight: 600;
    color: #333;
    font-size: inherit;
    padding: 2px 6px;
    cursor: default;
}

.legend-item.interactive {
    cursor: pointer;
    transition: opacity 0.2s ease;
}

.legend-item.dim {
    opacity: 0.35;
}

.legend-item:focus-visible {
    outline: 2px solid rgba(0, 0, 0, 0.5);
    outline-offset: 2px;
}

.legend-square {
    width: clamp(8px, 0.9vw, 12px);
    height: clamp(8px, 0.9vw, 12px);
    border-radius: 0;
    flex-shrink: 0;
}

/* ─── SOURCE + LOGO ───────────────────────────────────────────────────────── */
.source-text {
    font-size: var(--fs-meta);
    font-weight: 600;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    font-style: normal;
}

.source-text a {
    color: #2756d3;
    text-decoration: underline;
    cursor: pointer;
    font-style: normal;
}

.source-text a:visited {
    color: #2756d3;
}

.logo {
    height: 100%;
    width: auto;
    max-height: 100%;
    max-width: 100%;
    pointer-events: auto;
    object-fit: contain;
}

/* ─── CHART ELEMENTS (D3) ─────────────────────────────────────────────────── */
.axis path,
.axis line {
    stroke: #cfd2d7;
}

.tick text {
    font-weight: 600;
    fill: #4b5563;
}

.grid-lines line {
    stroke: #DBDBDB;
    stroke-dasharray: 2, 3;
}

.grid-lines path {
    stroke: none;
}

.bar-label {
    fill: #555;
    font-weight: 500;
}

/* ─── TOOLTIP (custom) ────────────────────────────────────────────────────── */
#tooltip {
    position: fixed;
    pointer-events: none;
    display: none;
    background: #ffffff;
    border: 1px solid #DBDBDB;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    color: #0f172a;
    box-shadow: 0 2px 8px rgba(15, 23, 42, .15);
    max-width: 280px;
    z-index: 10;
    line-height: 1.45;
}

#tooltip .tt-title {
    font-weight: 700;
    margin-bottom: 2px;
}

#tooltip .tt-muted {
    color: #475569;
}

/* ─── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media (max-height: 500px) {
    .viz-grid {
        grid-template-rows: 1fr !important;
        grid-template-columns: 1fr !important;
        padding-bottom: 0;
    }

    #container1 {
        grid-row: 1 !important;
        grid-column: 1 !important;
    }

    #container2,
    #container3,
    #container4,
    #container5 {
        display: none !important;
    }

    .legend,
    .source-text,
    .logo,
    .footnote-text {
        display: none !important;
    }
}
</style>
</head>
<body>
<div class="viz-grid">
  <div id="container1" class="container viz-container">
    <div id="viz"></div>
  </div>
  <div id="container2" class="container legend-container">
    <div class="legend" id="legend"></div>
  </div>
  <div id="container3" class="container source-container">
    <div class="source-text" id="source-text"></div>
  </div>
  <div id="container4" class="container logo-container">
    <a href="https://aiworld.eu/" target="_blank" rel="noopener">
      <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
    </a>
  </div>
</div>
<div id="tooltip"></div>
<script>
// ---------------- CONFIG ----------------
const SHOW_CONTAINER_2 = 1;      // legend
const SHOW_CONTAINER_3 = 1;      // source
const SHOW_CONTAINER_4 = 1;      // logo
const SHOW_CONTAINER_5 = 0;      // footnote

const SHOW_TOOLTIP = 1;
const COLORS = { "USA": "#f59e0b", "China": "#E53229", "Europe": "#2756d3", "RoW": "#475569" };
const SOURCE_NAME = "Crunchbase";
const SOURCE_HREF = "https://www.crunchbase.com/";
const FOOTNOTE_TEXT = "";
const BREAKPOINT_COMPACT = 500;  // px; MUST equal --breakpoint-compact in CSS

(function applyContainerVisibility() {
  const vizGrid = document.querySelector('.viz-grid');
  const c2 = document.getElementById('container2');
  const c3 = document.getElementById('container3');
  const c4 = document.getElementById('container4');
  const c5 = document.getElementById('container5');

  if (!SHOW_CONTAINER_2 && c2) c2.style.display = 'none';
  if (!SHOW_CONTAINER_3 && c3) c3.style.display = 'none';
  if (!SHOW_CONTAINER_4 && c4) c4.style.display = 'none';
  if (c5 && !SHOW_CONTAINER_5) c5.style.display = 'none';

  const row2Visible = SHOW_CONTAINER_5;
  const row3Visible = SHOW_CONTAINER_2;
  const row4Visible = SHOW_CONTAINER_3 || SHOW_CONTAINER_4;

  let gridRows = [];
  let currentRow = 1;
  const chartHeight = 20 - (row2Visible ? 1 : 0) - (row3Visible ? 1 : 0) - (row4Visible ? 1 : 0);
  gridRows.push(`${chartHeight}fr`);

  if (row2Visible) { gridRows.push('1fr'); currentRow++; if (c5) c5.style.gridRow = String(currentRow); }
  if (row3Visible) { gridRows.push('1fr'); currentRow++; if (c2) c2.style.gridRow = String(currentRow); }
  if (row4Visible) {
    gridRows.push('1fr'); currentRow++;
    if (SHOW_CONTAINER_3 && c3) c3.style.gridRow = String(currentRow);
    if (SHOW_CONTAINER_4 && c4) c4.style.gridRow = String(currentRow);
    if (row4Visible && SHOW_CONTAINER_3 && !SHOW_CONTAINER_4 && c3) c3.style.gridColumn = '1 / span 2';
    if (row4Visible && !SHOW_CONTAINER_3 && SHOW_CONTAINER_4 && c4) c4.style.gridColumn = '1 / span 2';
  }

  vizGrid.style.gridTemplateRows = gridRows.join(' ');
  document.getElementById('container1').style.gridRow = '1';
})();

// Top 20 robotics funding rounds overall (series C or earlier, announced 2018+).
// The NEURA Robotics Series C is flagged for emphasis (bold labels).
// [announced_on, company, location, round_type, money_usd_m, post_money_usd_m, region, description, highlight]
const DATA = [
["2026-01-14", "Skild AI", "Pittsburgh,Pennsylvania,United States,North America", "series_c", 1400.0, 14000.0, "USA", "Skild AI develops artificial intelligence systems that enable robots to act in physical environments.", 0],
["2025-09-16", "Figure", "San Jose,California,United States,North America", "series_c", 1000.0, 39000.0, "USA", "Figure is an AI robotics company that develops autonomous general-purpose humanoid robots.", 0],
["2019-02-11", "Nuro", "Mountain View,California,United States,North America", "series_b", 940.0, 2700.0, "USA", "Nuro is a robotics company specializing in the development of autonomous driving technologies.", 0],
["2018-05-03", "UBTech Robotics", "Shenzhen,Guangdong,China,Asia", "series_c", 820.0, 5000.0, "China", "UBTech Robotics is a robot manufacturing company specializing in the design, development, and commercialization of smart service robots.", 0],
["2024-02-24", "Figure", "San Jose,California,United States,North America", "series_b", 675.0, 2675.0, "USA", "Figure is an AI robotics company that develops autonomous general-purpose humanoid robots.", 0],
["2021-06-10", "Horizon Robotics", "Haidian,Beijing,China,Asia", "series_c", 600.0, null, "China", "Horizon Robotics is a leading provider of ADAS and AD solutions for passenger vehicles with proprietary software and hardware.", 0],
["2019-02-27", "Horizon Robotics", "Haidian,Beijing,China,Asia", "series_b", 600.0, 3000.0, "China", "Horizon Robotics is a leading provider of ADAS and AD solutions for passenger vehicles with proprietary software and hardware.", 0],
["2025-11-20", "Physical Intelligence", "San Francisco,California,United States,North America", "series_b", 600.0, 5600.0, "USA", "Physical Intelligence is an AI company developing machine learning for robots and other physical devices.", 0],
["2026-02-11", "Apptronik", "Austin,Texas,United States,North America", "series_a", 520.0, 5500.0, "USA", "Apptronik is a robotics company that designs and builds humanoid robots for various real-world applications.", 0],
["2026-04-16", "TARS", "Xuhui,Shanghai,China,Asia", "seed", 513.1, 1906.0, "China", "TARS is a company that integrates embodied intelligence.", 0],
["2026-03-11", "Mind Robotics", "Palo Alto,California,United States,North America", "series_a", 500.0, 2000.0, "USA", "Mind Robotics develops artificial intelligence and robotics systems designed for industrial environments and manufacturing operations.", 0],
["2020-11-09", "Nuro", "Mountain View,California,United States,North America", "series_c", 500.0, 5000.0, "USA", "Nuro is a robotics company specializing in the development of autonomous driving technologies.", 0],
["2018-04-25", "Singulato Motors", "Beijing,Beijing,China,Asia", "series_c", 474.2, null, "China", "Singulato Motors is a electric car start-up that covers new energy vehicles, smart car systems, vehicle networking services and solutions.", 0],
["2018-07-08", "Zoox", "Foster City,California,United States,North America", "series_b", 465.0, 3200.0, "USA", "Zoox is an AI robotics company that provides mobility-as-a-service and self-driving car services.", 0],
["2026-03-10", "Rhoda AI", "Palo Alto,California,United States,North America", "series_a", 450.0, 1700.0, "USA", "Rhoda AI is a tech company that develops a class of robot foundation models designed to bring general intelligence into the physical world.", 0],
["2025-02-13", "Apptronik", "Austin,Texas,United States,North America", "series_a", 415.0, 1800.0, "USA", "Apptronik is a robotics company that designs and builds humanoid robots for various real-world applications.", 0],
["2026-06-04", "Generalist AI", "San Mateo,California,United States,North America", "series_b", 400.0, 2000.0, "USA", "Generalist AI is a robotics firm formed by a senior researcher who left Google to investigate robotics and artificial intelligence (AI).", 0],
["2024-11-04", "Physical Intelligence", "San Francisco,California,United States,North America", "series_a", 400.0, 2400.0, "USA", "Physical Intelligence is an AI company developing machine learning for robots and other physical devices.", 0],
["2021-01-07", "Horizon Robotics", "Haidian,Beijing,China,Asia", "series_c", 400.0, 4050.0, "China", "Horizon Robotics is a leading provider of ADAS and AD solutions for passenger vehicles with proprietary software and hardware.", 0],
["2026-06-11", "NEURA Robotics", "Metzingen,Baden-Wurttemberg,Germany,Europe", "series_c", 1400.0, null, "Europe", "Neura Robotics develops robotic assistants used in both industrial and daily settings to enhance robots cognitive abilities.", 1]
];
// -----------------------------------------

document.getElementById("source-text").innerHTML =
  'Source: <a href="' + SOURCE_HREF + '" target="_blank" rel="noopener">' + SOURCE_NAME + "</a>";

const items = DATA.map((d, i) => ({
  id: i, dateStr: d[0], company: d[1], location: d[2] || "",
  type: d[3], money: d[4], post: d[5], region: d[6], desc: d[7] || "", highlight: d[8] === 1
}));
// Rank descending by round size; highlighted round wins ties.
items.sort((a, b) => d3.descending(a.money, b.money) || (a.highlight ? -1 : b.highlight ? 1 : a.id - b.id));
items.forEach((d, i) => { d.rank = i + 1; });
const NB = items.length;
const MAX_MONEY = d3.max(items, d => d.money);

function fmtMoney(m) {
  return m >= 1000 ? "$" + (m / 1000).toFixed(1) + "B" : "$" + Math.round(m) + "M";
}

const legend = d3.select("#legend");
[...new Set(items.map(d => d.region))].forEach(region => {
  const item = legend.append("div").attr("class", "legend-item");
  item.append("span").attr("class", "legend-square").style("background", COLORS[region]);
  item.append("span").text(region);
});

const tooltip = d3.select("#tooltip");
function showTooltip(event, d) {
  if (!SHOW_TOOLTIP) return;
  const parts = d.location ? d.location.split(",") : [];
  const place = parts.length > 1 ? parts[0] + ", " + parts[parts.length - 2] : "location n/a";
  tooltip.style("display", "block").html(
    '<div class="tt-title">' + d.company + "</div>" +
    '<div class="tt-muted">' + place + " (" + d.region + ")</div>" +
    (d.desc ? "<div>" + d.desc + "</div>" : "") +
    '<div class="tt-muted">' + d.type.replace(/_/g, " ") + ", " + d.dateStr + "</div>" +
    "<div>Raised: <b>" + fmtMoney(d.money) + "</b></div>" +
    "<div>Post-money valuation: " + (d.post == null ? "n/a" : fmtMoney(d.post)) + "</div>"
  );
  moveTooltip(event);
}
function moveTooltip(event) {
  const node = tooltip.node();
  let x = event.clientX + 14, y = event.clientY + 12;
  if (x + node.offsetWidth > window.innerWidth - 8) x = event.clientX - node.offsetWidth - 14;
  if (y + node.offsetHeight > window.innerHeight - 8) y = event.clientY - node.offsetHeight - 12;
  tooltip.style("left", x + "px").style("top", y + "px");
}
function hideTooltip() { tooltip.style("display", "none"); }

function roundedRight(x, y, w, h, r) {
  r = Math.min(r, w);
  return `M${x},${y} h${w - r} a${r},${r} 0 0 1 ${r},${r} v${h - 2 * r} a${r},${r} 0 0 1 -${r},${r} h${-(w - r)} Z`;
}

let firstRender = true;

function render() {
  const vizContainer = document.getElementById("viz");
  d3.select("#viz").selectAll("*").remove();
  const rect = vizContainer.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return;
  const width = Math.max(320, rect.width);
  const height = Math.max(220, rect.height);
  const compact = window.matchMedia(`(max-height:${BREAKPOINT_COMPACT}px)`).matches;

  const nameFont = compact ? 10 : Math.max(11, Math.min(14, height * 0.024));
  const longestName = items.reduce((a, d) => (d.company.length > a.length ? d.company : a), "");
  const margin = {
    top: 6, right: Math.max(56, nameFont * 5.4), bottom: compact ? 24 : 30,
    left: longestName.length * nameFont * 0.62 + 16
  };
  const innerWidth = Math.max(40, width - margin.left - margin.right);
  const innerHeight = Math.max(40, height - margin.top - margin.bottom);

  const svg = d3.select("#viz").append("svg")
    .attr("width", width).attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`)
    .style("width", "100%").style("height", "100%")
    .attr("role", "img")
    .attr("aria-label", "Horizontal bar chart of the twenty largest robotics funding rounds since 2018, ranked by amount raised and colored by region, with the NEURA Robotics series C round at the top at 1.4 billion dollars");
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const xScale = d3.scaleLinear().domain([0, MAX_MONEY * 1.02]).range([0, innerWidth]);
  const yScale = d3.scaleBand().domain(d3.range(1, NB + 1)).range([0, innerHeight]).padding(0.18);
  const bh = yScale.bandwidth();
  const cornerR = Math.min(5, bh / 3);

  const xTicks = compact ? 4 : 5;
  const axisFont = Math.max(9, Math.min(13, innerWidth / Math.max(5, xTicks) * 0.5));
  const fmtAxis = v => v === 0 ? "0" : fmtMoney(v);

  g.append("g")
    .attr("class", "grid-lines")
    .attr("transform", `translate(0,${innerHeight})`)
    .call(d3.axisBottom(xScale).ticks(xTicks).tickSize(-innerHeight).tickFormat(""))
    .select(".domain").remove();

  g.append("g")
    .attr("class", "axis")
    .attr("transform", `translate(0,${innerHeight})`)
    .call(d3.axisBottom(xScale).ticks(xTicks).tickFormat(fmtAxis))
    .selectAll("text")
    .style("font-size", `${axisFont}px`)
    .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

  const bars = g.append("g").selectAll("path.bar").data(items, d => d.id)
    .join("path")
    .attr("class", "bar")
    .attr("fill", d => COLORS[d.region])
    .attr("fill-opacity", 0.92)
    .style("cursor", "pointer")
    .on("mouseenter", (event, d) => showTooltip(event, d))
    .on("mousemove", event => moveTooltip(event))
    .on("mouseleave", hideTooltip);

  g.append("g").selectAll("text.name").data(items, d => d.id)
    .join("text")
    .attr("class", "name")
    .attr("text-anchor", "end")
    .attr("dy", "0.35em")
    .attr("x", -10)
    .attr("y", d => yScale(d.rank) + bh / 2)
    .attr("fill", "#333")
    .style("font-size", nameFont + "px")
    .style("font-weight", d => d.highlight ? 700 : 600)
    .text(d => d.company);

  const values = g.append("g").selectAll("text.value").data(items, d => d.id)
    .join("text")
    .attr("class", "value")
    .attr("text-anchor", "start")
    .attr("dy", "0.35em")
    .attr("x", d => xScale(d.money) + 8)
    .attr("y", d => yScale(d.rank) + bh / 2)
    .attr("fill", "#333")
    .style("font-size", nameFont + "px")
    .style("font-weight", d => d.highlight ? 700 : 600)
    .text(d => fmtMoney(d.money));

  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (firstRender && !reducedMotion) {
    bars.attr("d", d => roundedRight(0, yScale(d.rank), 0.1, bh, cornerR))
      .transition().duration(850).ease(d3.easeCubicOut)
      .attr("d", d => roundedRight(0, yScale(d.rank), Math.max(0.1, xScale(d.money)), bh, cornerR));
    values.attr("opacity", 0)
      .transition().duration(850).delay(100).attr("opacity", 1);
  } else {
    bars.attr("d", d => roundedRight(0, yScale(d.rank), Math.max(0.1, xScale(d.money)), bh, cornerR));
  }
  firstRender = false;
}

render();

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 220);
});
if (typeof ResizeObserver !== "undefined") {
  let roFirst = true;
  new ResizeObserver(() => {
    if (roFirst) { roFirst = false; return; }
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 220);
  }).observe(document.getElementById("viz"));
}
</script>
</body>
</html>
