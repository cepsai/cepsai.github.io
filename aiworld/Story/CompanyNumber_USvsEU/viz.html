<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Companies by Funding Stage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
      background-color: white;
    }

    .viz-grid {
      display: grid;
      grid-template-rows: 16fr 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding-bottom: clamp(8px, 2vh, 18px);
    }

    #container1 {
      grid-row: 1;
      grid-column: 1 / span 2;
      overflow: hidden;
      min-height: 0;
    }

    #container2 {
      grid-row: 2;
      grid-column: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #container3 {
      grid-row: 3;
      grid-column: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 20px;
      overflow: hidden;
      min-width: 0;
    }

    #container4 {
      grid-row: 3;
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      overflow: hidden;
      min-width: 0;
    }

    #container4 a {
      height: 100%;
      display: flex;
      align-items: center;
      cursor: default;
    }

    #viz {
      width: 100%;
      height: 100%;
      min-height: 0;
      min-width: 0;
    }

    #chart {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1vw, 14px);
      background: rgba(255, 255, 255, 1);
      padding: clamp(4px, 1vh, 10px) clamp(10px, 2vw, 16px);
      border-radius: clamp(6px, 1vw, 12px);
      max-width: 100%;
      max-height: 100%;
      font-size: clamp(0.625rem, 1.4vw, 1rem);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: clamp(4px, 1vw, 8px);
      font-weight: 600;
      color: #333;
      font-size: inherit;
      padding: 2px 6px;
      cursor: default;
    }

    .legend-square {
      width: clamp(8px, 0.9vw, 12px);
      height: clamp(8px, 0.9vw, 12px);
      border-radius: 0;
      flex-shrink: 0;
    }

    .logo {
      height: 100%;
      width: auto;
      max-height: 100%;
      max-width: 100%;
      pointer-events: auto;
      object-fit: contain;
    }

    .source-text {
      font-size: clamp(10px, 1.6vw, 16px);
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-style: normal;
    }

    .source-text a {
      color: #2756d3;
      text-decoration: underline;
      cursor: default;
      font-style: normal;
    }

    .source-text a:visited {
      color: #2756d3;
    }

    .axis path,
    .axis line {
      stroke: #cfd2d7;
    }

    .tick text {
      font-weight: 600;
      fill: #4b5563;
    }

    .grid-lines line {
      stroke: #DBDBDB;
      stroke-dasharray: 2, 3;
    }

    .grid-lines path {
      stroke: none;
    }

    .bar-label {
      fill: #555;
      font-weight: 500;
    }

    @media (max-height: 500px) {
      .viz-grid {
        grid-template-rows: 1fr !important;
        grid-template-columns: 1fr !important;
        padding-bottom: 0;
      }

      #container1 {
        grid-row: 1 !important;
        grid-column: 1 !important;
      }

      #container2,
      #container3,
      #container4 {
        display: none !important;
      }

      .legend,
      .source-text,
      .logo {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="viz-grid">
    <div id="container1" class="container chart-container">
      <div id="viz">
        <svg id="chart"></svg>
      </div>
    </div>
    <div id="container2" class="container legend-container">
      <div class="legend" id="legend">
        <div class="legend-item"><span class="legend-square" style="background:#2b6cb0;"></span><span>EU --
            Classified</span></div>
        <div class="legend-item"><span class="legend-square" style="background:#9ecae1;"></span><span>EU --
            Attributed</span></div>
        <div class="legend-item"><span class="legend-square" style="background:#de2d26;"></span><span>US --
            Classified</span></div>
        <div class="legend-item"><span class="legend-square" style="background:#f4a582;"></span><span>US --
            Attributed</span></div>
      </div>
    </div>
    <div id="container3" class="container source-container">
      <div class="source-text">Source: Crunchbase</div>
    </div>
    <div id="container4" class="container logo-container">
      <a href="https://aiworld.eu/" target="_blank" rel="noopener">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
      </a>
    </div>
  </div>
  <script>
    const STAGE_ORDER = ["seed", "series_a", "series_b", "series_c", "series_d", "series_e", "series_f", "series_g"];
    const SERIES_ORDER = [
      { key: "EU__Classified", region: "EU", source: "Classified", color: "#2b6cb0", label: "EU -- Classified" },
      { key: "EU__Attributed", region: "EU", source: "Attributed", color: "#9ecae1", label: "EU -- Attributed" },
      { key: "US__Classified", region: "US", source: "Classified", color: "#de2d26", label: "US -- Classified" },
      { key: "US__Attributed", region: "US", source: "Attributed", color: "#f4a582", label: "US -- Attributed" }
    ];

    let rawData = [];

    function parseNum(value) {
      if (value == null || value === "") return 0;
      const n = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function formatStage(stage) {
      if (!stage) return "";
      if (stage === "seed") return "Seed";
      return "Series " + String(stage).replace(/^series_/, "").toUpperCase();
    }

    function getStageData() {
      return STAGE_ORDER.map(stage => {
        const stageRows = rawData.filter(d => d.stage_unified === stage);
        const series = SERIES_ORDER.map(seriesDef => ({
          ...seriesDef,
          stage,
          stageLabel: formatStage(stage),
          value: d3.sum(
            stageRows.filter(d => d.region === seriesDef.region && d.source === seriesDef.source),
            d => d.n_companies
          )
        }));

        return {
          stage,
          label: formatStage(stage),
          series
        };
      }).filter(d => d.series.some(s => s.value > 0));
    }

    function createChart() {
      const data = getStageData();
      const svg = d3.select("#chart");
      svg.selectAll("*").remove();

      const vizContainer = document.getElementById("viz");
      const rect = vizContainer ? vizContainer.getBoundingClientRect() : { width: window.innerWidth, height: window.innerHeight };
      const width = Math.max(320, rect.width);
      const height = Math.max(220, rect.height);
      const compact = window.matchMedia("(max-height:500px)").matches;
      const maxValue = d3.max(data.flatMap(d => d.series), d => d.value) || 1;
      const yMax = Math.ceil(maxValue * 1.15 / 100) * 100;
      const yAxisTickFormat = d3.format(",");
      const yMaxStr = yAxisTickFormat(Math.max(100, yMax));
      const yLabelWidth = Math.max(yMaxStr.length * 7.5, 28) + 16;
      const xLabels = data.map(d => d.label);
      const rotateX = xLabels.length > 7 || (xLabels.length > 4 && xLabels.some(label => String(label).length > 5));
      const bottomMargin = rotateX
        ? Math.min(height * 0.22, Math.max(48, d3.max(xLabels, label => String(label).length) * 5 + 20))
        : Math.max(28, height * 0.07);
      const margin = {
        top: 16,
        right: Math.max(24, width * 0.04),
        bottom: bottomMargin,
        left: yLabelWidth + 32
      };
      const innerWidth = Math.max(40, width - margin.left - margin.right);
      const innerHeight = Math.max(40, height - margin.top - margin.bottom);
      const axisFont = Math.max(9, Math.min(13, innerWidth / Math.max(5, data.length) * 0.5));

      svg
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", `0 0 ${width} ${height}`)
        .style("width", "100%")
        .style("height", "100%");

      const g = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const x0 = d3.scaleBand()
        .domain(data.map(d => d.stage))
        .range([0, innerWidth])
        .paddingInner(compact ? 0.34 : 0.42)
        .paddingOuter(compact ? 0.1 : 0.14);

      const x1 = d3.scaleBand()
        .domain(SERIES_ORDER.map(d => d.key))
        .range([0, x0.bandwidth()])
        .padding(compact ? 0.05 : 0.08);
      const barLabelFont = Math.max(7, Math.min(13, x1.bandwidth() * 0.42));
      const barLabelOffset = Math.max(5, Math.min(10, barLabelFont * 0.7));

      const y = d3.scaleLinear()
        .domain([0, Math.max(100, yMax)])
        .nice()
        .range([innerHeight, 0]);

      const grid = g.append("g")
        .attr("class", "grid-lines")
        .call(d3.axisLeft(y).ticks(compact ? 4 : 5).tickSize(-innerWidth).tickFormat(""));

      grid.select(".domain").remove();

      const xAxisG = g.append("g")
        .attr("class", "axis axis--x")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x0).tickFormat(formatStage).tickSizeOuter(0));

      xAxisG.selectAll("text")
        .style("font-size", `${axisFont}px`)
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

      if (rotateX) {
        xAxisG.selectAll("text")
          .attr("transform", "rotate(-35)")
          .attr("text-anchor", "end")
          .attr("dx", "-0.4em")
          .attr("dy", "0.8em");
      }

      const yAxisG = g.append("g")
        .attr("class", "axis axis--y")
        .call(d3.axisLeft(y).ticks(compact ? 4 : 5).tickFormat(yAxisTickFormat).tickSizeOuter(0));

      yAxisG.selectAll("text")
        .style("font-size", `${axisFont}px`)
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

      yAxisG.append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", -margin.left + 16)
        .attr("x", -(innerHeight / 2))
        .attr("dy", "0.71em")
        .attr("text-anchor", "middle")
        .style("fill", "#000")
        .style("font-weight", "700")
        .style("font-size", "clamp(12px, 1.5vw, 18px)")
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
        .text("Number of distinct companies");

      const stageGroups = g.selectAll(".stage-group")
        .data(data, d => d.stage)
        .enter()
        .append("g")
        .attr("class", "stage-group")
        .attr("transform", d => `translate(${x0(d.stage)},0)`);

      const barDuration = 850;

      const bars = stageGroups.selectAll("rect.bar")
        .data(d => d.series.filter(s => s.value > 0), d => d.key)
        .enter()
        .append("rect")
        .attr("class", d => `bar bar--${d.key}`)
        .attr("x", d => x1(d.key))
        .attr("y", y(0))
        .attr("width", x1.bandwidth())
        .attr("height", 0)
        .attr("fill", d => d.color);

      bars.transition()
        .duration(barDuration)
        .ease(d3.easeCubicOut)
        .attr("y", d => y(d.value))
        .attr("height", d => y(0) - y(d.value));

      stageGroups.selectAll("text.bar-label")
        .data(d => d.series.filter(s => s.value > 0), d => d.key)
        .enter()
        .append("text")
        .attr("class", "bar-label")
        .attr("x", d => x1(d.key) + x1.bandwidth() / 2)
        .attr("y", d => y(d.value) - barLabelOffset)
        .attr("text-anchor", "middle")
        .attr("font-size", barLabelFont)
        .attr("opacity", 0)
        .text(d => d3.format(",")(d.value))
        .transition()
        .duration(barDuration)
        .delay(100)
        .attr("opacity", 1);
    }

    function load() {
      d3.csv("data.csv").then(data => {
        rawData = data.map(row => ({
          region: String(row.region || "").trim(),
          stage_unified: String(row.stage_unified || "").trim().toLowerCase(),
          source: String(row.source || "").trim(),
          n_companies: parseNum(row.n_companies)
        }));

        createChart();
      });
    }

    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(createChart, 220);
    });

    load();
  </script>
</body>

</html>
