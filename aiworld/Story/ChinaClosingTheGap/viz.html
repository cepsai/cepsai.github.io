<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Capability over Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root{
    --ink:#0f172a; --ink-soft:#334155; --muted:#64748b;
    --grid:#e5e7eb; --line:#cbd5e1;
    --brand:#2756d3;
    --us:#3b82f6; --china:#ef4444; --france:#5c5a74; --other:#c2c9d6;
    --panel:#ffffff;
    --font: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--panel);color:var(--ink);font-family:var(--font);}
  .viz-grid{
    display:grid;
    grid-template-rows:auto 19fr auto;
    grid-template-columns:1fr auto;
    height:100vh;width:100vw;padding-bottom:6px;
  }
  /* control row */
  #controls{
    grid-row:1;grid-column:1 / span 2;
    display:flex;align-items:flex-start;justify-content:space-between;
    gap:16px;padding:16px 20px 6px;flex-wrap:wrap;
  }
  .titles{min-width:0;}
  .chart-title{font-size:clamp(15px,2vw,22px);font-weight:700;color:var(--ink);line-height:1.15;}
  .chart-sub{font-size:clamp(10px,1.2vw,12.5px);color:var(--muted);margin-top:2px;font-weight:500;}
  .ctl-col{display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
  .ctl-row{display:flex;align-items:center;gap:8px;}
  .ctl-label{font-size:clamp(9px,1.1vw,11.5px);font-weight:600;color:var(--muted);letter-spacing:.01em;}
  .seg{display:inline-flex;background:#eef1f6;border-radius:8px;padding:2px;gap:2px;}
  .seg button{
    border:0;background:transparent;cursor:pointer;font-family:inherit;
    font-size:clamp(9px,1.1vw,11.5px);font-weight:600;color:var(--ink-soft);
    padding:4px 10px;border-radius:6px;line-height:1.1;white-space:nowrap;transition:background .12s,color .12s;
  }
  .seg button:hover{color:var(--ink);}
  .seg button.active{background:var(--brand);color:#fff;}
  .tabs .seg button.active{background:#fff;color:var(--brand);box-shadow:0 1px 2px rgba(15,23,42,.12);}
  /* chart */
  #container1{grid-row:2;grid-column:1 / span 2;display:flex;overflow:hidden;min-height:0;}
  #chart{display:block;width:100%;height:100%;}
  .axis-grid line{stroke:var(--grid);stroke-dasharray:2 3;shape-rendering:crispEdges;}
  .axis-grid path{stroke:none;}
  .axis text{font-size:clamp(9px,1.1vw,11px);font-weight:600;fill:var(--ink-soft);}
  .axis .domain{stroke:var(--line);}
  .axis-title{font-size:clamp(10px,1.2vw,13px);font-weight:700;fill:var(--ink-soft);}
  .scatter-label{font-size:clamp(8px,1.05vw,11.5px);font-weight:600;pointer-events:none;user-select:none;}
  .trendline{pointer-events:none;stroke-dasharray:6 4;stroke-width:2;fill:none;opacity:.7;}
  .label-line{pointer-events:none;}
  .scatter-dot{transition:r .15s ease;cursor:pointer;}
  .badge-hit{cursor:pointer;}
  /* footer */
  #footer{
    grid-row:3;grid-column:1;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:6px 8px 4px 20px;min-height:42px;
  }
  .legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .legend-item{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
    font-size:clamp(9px,1.1vw,11.5px);font-weight:600;color:var(--ink-soft);}
  .legend-item .sw{width:11px;height:11px;border-radius:50%;}
  .legend-item.off{opacity:.34;}
  .legend-note{font-size:clamp(8px,1vw,10.5px);color:var(--muted);display:inline-flex;align-items:center;gap:6px;font-weight:500;}
  .legend-note .chip{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;
    background:#fff;border:1.5px solid var(--line);overflow:hidden;}
  .legend-note .chip img{width:11px;height:11px;}
  #brand{grid-row:3;grid-column:2;display:flex;align-items:center;justify-content:flex-end;padding:4px 18px 4px 0;}
  #brand .src{font-size:clamp(8px,1vw,10.5px);color:var(--muted);margin-right:12px;}
  #brand .src a{color:var(--brand);text-decoration:none;}
  #brand img{height:22px;width:auto;opacity:.92;}
  /* tooltip */
  #tooltip{position:fixed;pointer-events:none;opacity:0;z-index:50;
    background:rgba(15,23,42,.96);color:#fff;border-radius:9px;padding:9px 11px;
    font-size:12px;line-height:1.35;box-shadow:0 8px 24px rgba(15,23,42,.25);max-width:230px;transition:opacity .1s;}
  #tooltip .tt-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
  #tooltip .tt-logo{width:18px;height:18px;border-radius:50%;background:#fff;padding:2px;flex:none;}
  #tooltip b{font-size:12.5px;}
  #tooltip .tt-org{color:#cbd5e1;font-size:10.5px;}
  #tooltip table{width:100%;border-spacing:0;margin-top:2px;}
  #tooltip td{padding:1.5px 0;font-size:11px;}
  #tooltip td.k{color:#cbd5e1;padding-right:10px;}
  #tooltip td.v{text-align:right;font-variant-numeric:tabular-nums;}
  @media (max-height:520px),(max-width:620px){
    .viz-grid{grid-template-rows:auto 1fr auto auto;grid-template-columns:1fr;padding-bottom:0;}
    #controls{grid-column:1;grid-row:1;}
    #container1{grid-column:1;grid-row:2;}
    #footer{grid-column:1;grid-row:3;padding-bottom:2px;}
    #brand{grid-column:1;grid-row:4;justify-content:space-between;padding:2px 20px 8px;}
    .ctl-col{align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="viz-grid">
  <div id="controls">
    <div class="titles">
      <div class="chart-title" id="chartTitle">AI Capability over Time</div>
      <div class="chart-sub" id="chartSub">Released vs. capability. Logos mark each provider's leading model.</div>
    </div>
    <div class="ctl-col">
      <div class="ctl-row tabs">
        <div class="seg" id="tabSeg">
          <button data-tab="ALL" class="active">Overall</button>
          <button data-tab="lma">LMArena</button>
          <button data-tab="aa">Artificial Analysis</button>
          <button data-tab="lb">LiveBench</button>
        </div>
      </div>
      <div class="ctl-row">
        <span class="ctl-label">Models by provider</span>
        <div class="seg" id="modeSeg">
          <button data-mode="0" class="active">All</button>
          <button data-mode="1">Best</button>
        </div>
      </div>
    </div>
  </div>

  <div id="container1"><svg id="chart"></svg></div>

  <div id="footer">
    <div class="legend" id="legend"></div>
    <div class="legend-note"><span class="chip" id="noteChip"></span>= provider's top model</div>
  </div>
  <div id="brand">
    <span class="src">Source: <a href="https://aiworld.eu" target="_blank" rel="noopener">AI World</a></span>
    <a href="https://aiworld.eu/" target="_blank" rel="noopener">
      <img src="https://aiworld.eu/logo-transparent.svg" alt="AI World">
    </a>
  </div>
</div>
<div id="tooltip"></div>

const GEO_ORDER  = ["US","China","France","Other"];
const GEO_LABEL  = {US:"United States", China:"China", France:"France", Other:"Other"};
const GEO_COLORS = {US:"var(--us)", China:"var(--china)", France:"var(--france)", Other:"var(--other)"};
const GEO_HEX    = {US:"#3b82f6", China:"#ef4444", France:"#5c5a74", Other:"#c2c9d6"};
const TREND_GEOS = ["US","China","France"];
const ORG_NAME = {
  gpt:"OpenAI", claude:"Anthropic", gemini:"Google", qwen:"Alibaba (Qwen)",
  xiaomi:"Xiaomi (MiMo)", meta:"Meta", minimax:"MiniMax", deepseek:"DeepSeek",
  zai:"Z.ai", grok:"xAI", nemotron:"NVIDIA", moonshot:"Moonshot (Kimi)", stepfun:"StepFun"
};
const Y_TITLE = {ALL:"Capability score (normalised, GPT-5 = 0.50)", lma:"LMArena Elo",
                 aa:"Artificial Analysis Index", lb:"LiveBench score"};
const VAL_FMT = {ALL:d3.format(".3f"), lma:d3.format(".0f"), aa:d3.format(".0f"), lb:d3.format(".1f")};
const TITLE   = {ALL:"AI Capability over Time", lma:"LMArena over Time",
                 aa:"Artificial Analysis over Time", lb:"LiveBench over Time"};
const TRANSITION_MS = 450;

/* ============================ STATE ============================ */
let state = { tab:"ALL", mode:0 };
let hiddenGeos = new Set();
let layers = null, resizeTimer = null;
const tooltip = d3.select("#tooltip");
const parseDate = d3.timeParse("%Y-%m-%d");
DATA.forEach(d => { d._date = parseDate(d.rd); });

const scoreOf = (d, tab) => tab === "ALL" ? d.overall : (+d[tab] || 0);

/* set the legend note chip to the first logo as a sample */
document.getElementById("noteChip").innerHTML =
  '<img src="' + (LOGOS.gpt || "") + '" alt="">';

/* ============================ DATA SHAPING ============================ */
function getPlotData(){
  let rows = DATA
    .filter(d => d._date && scoreOf(d, state.tab) > 0)
    .filter(d => !hiddenGeos.has(GEO_ORDER.includes(d.geo) ? d.geo : "Other"))
    .map(d => ({
      model:d.model, name:d.name, logo:d.logo,
      geo: GEO_ORDER.includes(d.geo) ? d.geo : "Other",
      os:d.os, date:d._date, score:scoreOf(d, state.tab), raw:d
    }));
  if (state.mode === 1){            // best model per provider
    const best = {};
    rows.forEach(d => { if(!best[d.logo] || d.score > best[d.logo].score) best[d.logo] = d; });
    rows = Object.values(best);
  }
  // mark each provider's leader as "important" (gets a logo badge)
  const lead = {};
  rows.forEach(d => { if(!lead[d.logo] || d.score > lead[d.logo].score) lead[d.logo] = d; });
  rows.forEach(d => { d.important = (lead[d.logo] === d) && !!LOGOS[d.logo]; });
  return rows;
}

function linReg(pts){
  const n = pts.length; if(n < 2) return null;
  let sx=0,sy=0,sxy=0,sxx=0;
  pts.forEach(p=>{const x=p.date.getTime();sx+=x;sy+=p.score;sxy+=x*p.score;sxx+=x*x;});
  const den = n*sxx - sx*sx; if(den===0) return null;
  const slope=(n*sxy - sx*sy)/den, intercept=(sy - slope*sx)/n;
  return {slope, intercept};
}

/* ============================ LAYERS ============================ */
function ensureLayers(){
  const svg = d3.select("#chart");
  if(layers && layers.node === svg.node()) return layers;
  svg.selectAll("*").remove();
  const root = svg.append("g");
  layers = {
    node:svg.node(), svg, root,
    gridY:root.append("g").attr("class","axis-grid"),
    gridX:root.append("g").attr("class","axis-grid"),
    trend:root.append("g"),
    leaders:root.append("g"),
    dots:root.append("g"),
    badges:root.append("g"),
    labels:root.append("g"),
    axisX:root.append("g").attr("class","axis"),
    axisY:root.append("g").attr("class","axis"),
    xTitle:svg.append("text").attr("class","axis-title").attr("text-anchor","middle"),
    yTitle:svg.append("text").attr("class","axis-title").attr("text-anchor","middle"),
    empty:svg.append("text").attr("text-anchor","middle").attr("fill","#94a3b8")
            .attr("font-size",14).style("opacity",0)
  };
  return layers;
}

/* ============================ RENDER ============================ */
function render(){
  const box = document.getElementById("container1");
  const W = box.clientWidth, H = box.clientHeight;
  if(W<=0 || H<=0) return;
  const compact = window.matchMedia("(max-height:520px),(max-width:620px)").matches;
  const L = ensureLayers();
  L.svg.attr("width",W).attr("height",H).attr("viewBox",`0 0 ${W} ${H}`);
  const t = d3.transition().duration(TRANSITION_MS).ease(d3.easeCubicOut);

  const data = getPlotData();
  document.getElementById("chartTitle").textContent = TITLE[state.tab];

  if(!data.length){
    L.empty.attr("x",W/2).attr("y",H/2).text("No models match the current filters")
      .transition(t).style("opacity",1);
    [L.dots,L.badges,L.labels,L.trend,L.leaders].forEach(g=>g.selectAll("*").transition(t).style("opacity",0).remove());
    return;
  }
  L.empty.transition(t).style("opacity",0);

  const m = {top: compact?14:18, right: compact?60:118, bottom:54, left: compact?56:74};
  const iW = Math.max(40, W - m.left - m.right);
  const iH = Math.max(40, H - m.top - m.bottom);
  L.root.attr("transform",`translate(${m.left},${m.top})`);

  L.xTitle.attr("x", m.left + iW/2).attr("y", H-14).text("Release date");
  L.yTitle.attr("transform",`translate(16,${m.top + iH/2}) rotate(-90)`).text(Y_TITLE[state.tab]);

  // scales
  const xExt = d3.extent(data, d=>d.date);
  const xPad = Math.max(15*864e5, (xExt[1]-xExt[0])*0.05);
  const x = d3.scaleTime()
    .domain([new Date(+xExt[0]-xPad), new Date(+xExt[1]+xPad)]).range([0,iW]);
  const yExt = d3.extent(data, d=>d.score);
  const yPad = Math.max((yExt[1]-yExt[0])*0.12, (yExt[1]-yExt[0])===0?1:0);
  const y = d3.scaleLinear().domain([yExt[0]-yPad, yExt[1]+yPad]).nice().range([iH,0]);
  const fmt = VAL_FMT[state.tab];

  // gridlines
  L.gridY.transition(t).call(d3.axisLeft(y).tickSize(-iW).tickFormat(""));
  L.gridY.select(".domain").attr("stroke","none");
  L.gridX.attr("transform",`translate(0,${iH})`).transition(t)
    .call(d3.axisBottom(x).tickSize(-iH).tickFormat(""));
  L.gridX.select(".domain").attr("stroke","none");

  // axes
  L.axisX.attr("transform",`translate(0,${iH})`).transition(t)
    .call(d3.axisBottom(x).ticks(Math.max(3,Math.floor(iW/120))).tickFormat(d3.timeFormat("%b %Y")));
  L.axisY.transition(t).call(d3.axisLeft(y).ticks(7).tickFormat(fmt));

  // trendlines per country
  const groups = d3.group(data.filter(d=>TREND_GEOS.includes(d.geo)), d=>d.geo);
  const trend = [];
  groups.forEach((pts,key)=>{
    const r = linReg(pts); if(!r) return;
    const x0 = d3.min(pts,p=>+p.date), x1 = d3.max(pts,p=>+p.date);
    trend.push({key, color:GEO_HEX[key],
      x1:x(new Date(x0)), y1:y(r.slope*x0+r.intercept),
      x2:x(new Date(x1)), y2:y(r.slope*x1+r.intercept)});
  });
  const tr = L.trend.selectAll("line").data(trend, d=>d.key);
  tr.exit().transition(t).style("opacity",0).remove();
  tr.enter().append("line").attr("class","trendline")
      .attr("stroke",d=>d.color).style("opacity",0)
      .attr("x1",d=>d.x1).attr("y1",d=>d.y1).attr("x2",d=>d.x2).attr("y2",d=>d.y2)
    .merge(tr).transition(t).style("opacity",.7)
      .attr("stroke",d=>d.color)
      .attr("x1",d=>d.x1).attr("y1",d=>d.y1).attr("x2",d=>d.x2).attr("y2",d=>d.y2);

  // label positions with collision resolution
  const R   = Math.max(4, Math.min(5.5, iW/220));   // plain dot radius
  const BR  = compact ? 10 : 13;                    // badge radius
  const labelObjs = data.map(d=>({
    ...d, x0:x(d.date), y0:y(d.score),
    lx: x(d.date) + (d.important?BR+5:R+5), ly:y(d.score)
  }));
  resolveCollisions(labelObjs, iH);

  // leader lines (label connectors)
  const llData = labelObjs.filter(d=>Math.abs(d.ly-d.y0)>6);
  const ll = L.leaders.selectAll("line").data(llData, d=>d.model);
  ll.exit().transition(t).style("opacity",0).remove();
  ll.enter().append("line").attr("class","label-line")
      .attr("stroke",d=>GEO_HEX[d.geo]).attr("stroke-width",.8).style("opacity",0)
      .attr("x1",d=>d.x0).attr("y1",d=>d.y0).attr("x2",d=>d.lx-2).attr("y2",d=>d.ly)
    .merge(ll).transition(t).style("opacity",.45)
      .attr("stroke",d=>GEO_HEX[d.geo])
      .attr("x1",d=>d.x0).attr("y1",d=>d.y0).attr("x2",d=>d.lx-2).attr("y2",d=>d.ly);

  // plain dots (non-important)
  const plain = data.filter(d=>!d.important);
  const dot = L.dots.selectAll("circle").data(plain, d=>d.model);
  dot.exit().transition(t).attr("r",0).style("opacity",0).remove();
  dot.enter().append("circle").attr("class","scatter-dot")
      .attr("cx",d=>x(d.date)).attr("cy",d=>y(d.score)).attr("r",0)
      .attr("fill",d=>GEO_HEX[d.geo]).attr("stroke","#fff").attr("stroke-width",1.2)
      .style("opacity",0).call(bindTip)
    .merge(dot).transition(t)
      .attr("cx",d=>x(d.date)).attr("cy",d=>y(d.score)).attr("r",R)
      .attr("fill",d=>GEO_HEX[d.geo]).style("opacity",1);

  // logo badges (important models)
  const imp = data.filter(d=>d.important);
  const bsel = L.badges.selectAll("g.badge").data(imp, d=>d.model);
  bsel.exit().transition(t).style("opacity",0).remove();
  const bEnter = bsel.enter().append("g").attr("class","badge")
      .attr("transform",d=>`translate(${x(d.date)},${y(d.score)})`).style("opacity",0);
  bEnter.append("circle").attr("class","badge-bg").attr("r",BR)
      .attr("fill","#fff").attr("stroke",d=>GEO_HEX[d.geo]).attr("stroke-width",2.4);
  bEnter.each(function(d){
    const g = d3.select(this);
    const cid = "clip-"+d.model.replace(/[^a-z0-9]/gi,"");
    g.append("clipPath").attr("id",cid).append("circle").attr("r",BR-3);
    g.append("image").attr("href",LOGOS[d.logo]||"")
      .attr("x",-(BR-3.5)).attr("y",-(BR-3.5)).attr("width",(BR-3.5)*2).attr("height",(BR-3.5)*2)
      .attr("clip-path",`url(#${cid})`).attr("preserveAspectRatio","xMidYMid meet");
    g.append("circle").attr("class","badge-hit").attr("r",BR).attr("fill","transparent").call(bindTip);
  });
  bEnter.merge(bsel).transition(t).style("opacity",1)
      .attr("transform",d=>`translate(${x(d.date)},${y(d.score)})`);
  L.badges.selectAll("g.badge").select("circle.badge-bg")
      .attr("r",BR).attr("stroke",d=>GEO_HEX[d.geo]);

  // labels
  const lab = L.labels.selectAll("text").data(labelObjs, d=>d.model);
  lab.exit().transition(t).style("opacity",0).remove();
  lab.enter().append("text").attr("class","scatter-label")
      .attr("x",d=>d.lx).attr("y",d=>d.ly).attr("dy","0.32em")
      .attr("fill",d=>d.geo==="Other"?"#7c8597":GEO_HEX[d.geo])
      .attr("font-weight",d=>d.important?700:600).style("opacity",0).text(d=>d.name)
    .merge(lab).text(d=>d.name).transition(t)
      .attr("x",d=>d.lx).attr("y",d=>d.ly)
      .attr("fill",d=>d.geo==="Other"?"#7c8597":GEO_HEX[d.geo])
      .attr("font-weight",d=>d.important?700:600).style("opacity",1);
}

function resolveCollisions(labels, height){
  const minDy = 13, xWin = 72;
  labels.sort((a,b)=>a.y0-b.y0);
  for(let pass=0; pass<40; pass++){
    let moved = false;
    for(let i=0;i<labels.length;i++)for(let j=i+1;j<labels.length;j++){
      const a=labels[i], b=labels[j];
      if(Math.abs(a.lx-b.lx)>xWin) continue;
      const dy=b.ly-a.ly;
      if(Math.abs(dy)<minDy){
        const need=(minDy-Math.abs(dy))/2+.1;
        if(dy>=0){a.ly-=need;b.ly+=need;} else {a.ly+=need;b.ly-=need;}
        moved=true;
      }
    }
    if(!moved) break;
  }
  labels.forEach(d=>{ d.ly=Math.max(6,Math.min(height-6,d.ly)); });
}

/* ============================ TOOLTIP ============================ */
function bindTip(sel){
  sel.on("mouseover",function(e,d){
      d3.select(this.classList && this.classList.contains("scatter-dot") ? this : this)
        .interrupt();
      if(this.tagName==="circle" && this.classList.contains("scatter-dot"))
        d3.select(this).attr("r", (+d3.select(this).attr("r"))+2);
      showTip(e,d);
    })
    .on("mousemove",e=>posTip(e))
    .on("mouseout",function(e,d){
      if(this.tagName==="circle" && this.classList.contains("scatter-dot"))
        d3.select(this).interrupt().attr("r", Math.max(4, Math.min(5.5, document.getElementById("container1").clientWidth/220)));
      tooltip.style("opacity",0);
    });
}
function showTip(e,d){
  const org = ORG_NAME[d.logo] || "";
  const logo = LOGOS[d.logo] ? `<img class="tt-logo" src="${LOGOS[d.logo]}">` : "";
  const rows = [];
  if(state.tab==="ALL"){
    rows.push(["Overall", VAL_FMT.ALL(d.raw.overall)]);
    if(d.raw.lma>0) rows.push(["LMArena", VAL_FMT.lma(d.raw.lma)]);
    if(d.raw.aa>0)  rows.push(["Artificial Analysis", VAL_FMT.aa(d.raw.aa)]);
    if(d.raw.lb>0)  rows.push(["LiveBench", VAL_FMT.lb(d.raw.lb)]);
  } else {
    rows.push([{lma:"LMArena Elo",aa:"AA Index",lb:"LiveBench"}[state.tab], VAL_FMT[state.tab](d.score)]);
  }
  rows.push(["Released", d3.timeFormat("%b %d, %Y")(d.date)]);
  rows.push(["Origin", GEO_LABEL[d.geo]]);
  rows.push(["Type", d.os===1 ? "Open weights" : "Proprietary"]);
  const body = "<table>"+rows.map(r=>`<tr><td class="k">${r[0]}</td><td class="v">${r[1]}</td></tr>`).join("")+"</table>";
  tooltip.html(`<div class="tt-head">${logo}<div><b>${d.name}</b>${org?`<div class="tt-org">${org}</div>`:""}</div></div>${body}`)
    .style("opacity",1);
  posTip(e);
}
function posTip(e){
  const pad=14, tw=tooltip.node().offsetWidth, th=tooltip.node().offsetHeight;
  let lx=e.clientX+pad, ly=e.clientY+pad;
  if(lx+tw>window.innerWidth-8) lx=e.clientX-tw-pad;
  if(ly+th>window.innerHeight-8) ly=e.clientY-th-pad;
  tooltip.style("left",lx+"px").style("top",ly+"px");
}

/* ============================ LEGEND + CONTROLS ============================ */
function renderLegend(){
  const present = new Set(DATA.map(d=>GEO_ORDER.includes(d.geo)?d.geo:"Other"));
  const el = d3.select("#legend");
  el.selectAll("*").remove();
  GEO_ORDER.filter(g=>present.has(g)).forEach(g=>{
    const item = el.append("div").attr("class","legend-item"+(hiddenGeos.has(g)?" off":""))
      .attr("role","button").attr("tabindex",0)
      .on("click",()=>toggleGeo(g))
      .on("keydown",(ev)=>{ if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();toggleGeo(g);} });
    item.append("span").attr("class","sw").style("background",GEO_HEX[g]);
    item.append("span").text(GEO_LABEL[g]);
  });
}
function toggleGeo(g){
  if(hiddenGeos.has(g)) hiddenGeos.delete(g); else hiddenGeos.add(g);
  renderLegend(); render();
}
function setupSeg(id, key, cast){
  document.querySelectorAll(`#${id} button`).forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(`#${id} button`).forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      state[key] = cast(btn.dataset[key]);
      render();
    });
  });
}

/* ============================ INIT ============================ */
setupSeg("tabSeg","tab", v=>v);
setupSeg("modeSeg","mode", v=>+v);
renderLegend();
render();
window.addEventListener("resize",()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(render,120); });
</script>
