<!doctype html><html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>European AI data centre capacity by country, 2026–2031</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root { --breakpoint-compact: 500px; }
  html,body { margin:0; height:100vh; width:100vw; overflow:hidden; color:#0f172a;
    font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Helvetica,Arial,sans-serif; }
  /* chart takes the slack (and may shrink to nothing); footer rows size to their content with a
     constant padding, so their margins don't scale with viewport height and never get squeezed */
  .viz-grid { display:grid; height:100vh; box-sizing:border-box; padding-bottom:clamp(8px,2vh,18px);
    grid-template-rows:minmax(0,1fr) auto auto clamp(22px,5.5vh,50px); grid-template-columns:1fr 1fr; }
  #container1 { grid-column:1 / -1; min-height:0; overflow:hidden; } #viz { width:100%; height:100%; }
  #container5 { grid-column:1 / -1; display:flex; align-items:center; justify-content:center; gap:clamp(10px,2vw,28px); flex-wrap:wrap; padding:8px 0; }
  #container2 { grid-column:1 / -1; }
  #container3 { font-size:clamp(5px,1.6vw,16px); display:flex; align-items:center; justify-content:flex-start;
    padding:0 20px; overflow:hidden; min-width:0; }
  #container3 #source-text { font-weight:600; color:#333; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  #container3 #source-text a { color:#2756d3; text-decoration:underline; }
  #container4 { display:flex; justify-content:flex-end; align-items:center; padding:0 20px; overflow:hidden; min-width:0; }
  #container4 a { height:100%; display:flex; align-items:center; }
  #container4 img { height:100%; width:auto; max-height:100%; max-width:100%; object-fit:contain; }
  #tooltip { position:fixed; pointer-events:none; display:none; background:#fff;
    border:1px solid #DBDBDB; padding:6px 8px; font-size:12px; border-radius:4px; }
  #legend { display:flex; flex-wrap:wrap; align-items:center; align-content:center; justify-content:center;
    gap:clamp(3px,0.7vw,9px); padding:4px 10px; min-height:30px; font-size:clamp(9px,1.4vh,12px); }
  #legend .item { display:flex; align-items:center; gap:5px; white-space:nowrap; }
  #legend .sw { width:12px; height:12px; border-radius:2px; flex:0 0 auto; }
  .ctrl { display:flex; align-items:center; gap:8px; }
  .ctrl > span { font-size:clamp(9px,1.4vw,12px); font-weight:700; color:#475569; }
  .selector-group { display:flex; align-items:center; justify-content:center;
    gap:clamp(2px,0.5vw,6px); padding:clamp(2px,0.4vw,4px);
    border-radius:6px; border:1px solid rgba(17,24,39,0.15); background:#f8fafc; }
  .selector-button { border:none; background:transparent; border-radius:6px;
    padding:clamp(4px,0.8vh,8px) clamp(8px,1.5vw,14px);
    font-size:clamp(9px,1.4vw,13px); font-weight:600; color:#475569;
    cursor:pointer; white-space:nowrap; transition:background .2s ease,color .2s ease; }
  .selector-button.active { background:#2756d3; color:#fff; }
  /* short screens/embeds: drop all chrome (legend, buttons, source, logo), leave only the chart */
  @media (max-height:500px){
    .viz-grid{ grid-template-rows:1fr; padding-bottom:0; }
    #container2,#container3,#container4,#container5{ display:none; }
  }
</style></head><body>
<div class="viz-grid">
  <div id="container1"><div id="viz"></div></div>
  <div id="container5">
    <div class="ctrl"><span>Values</span><div id="valueSel" class="selector-group"></div></div>
    <div class="ctrl"><span>Show</span><div id="groupSel" class="selector-group"></div></div>
  </div>
  <div id="container2"><div id="legend"></div></div>
  <div id="container3"><span id="source-text"></span></div>
  <div id="container4"><a href="https://aiworld.eu/" target="_blank" rel="noopener"><img src="https://aiworld.eu/logo-transparent.svg" alt="AI World"></a></div>
</div>
<div id="tooltip"></div>
<script>
// ---- CONFIG ----
const SHOW_CONTAINER_2 = 1, SHOW_CONTAINER_3 = 1, SHOW_CONTAINER_4 = 1, SHOW_CONTAINER_5 = 1;
const SHOW_TOOLTIP = 1;
const BREAKPOINT_COMPACT = 500;
const YEARS = [2026,2027,2028,2029,2030,2031];
const TOP7 = ["France","Norway","Germany","Portugal","Netherlands","Sweden","Finland"];
const TRANSITION_FRAC = 0.52;                       // share of each year-gap used for the change; rest is a flat plateau
const SOURCE_NAME = "europe2031.ai";
const SOURCE_HREF = "https://europe2031.ai/compute-forecast/";
const COLORS = {
  // Nordics — kept in the blue family, but spread cyan → azure → navy for variety
  "Sweden":"#06b6d4","Norway":"#3b82f6","Finland":"#1e3a8a","Denmark":"#38bdf8","Iceland":"#155e75",
  // other Top-7 bands — vivid, label-legible national colours
  "France":"#7c3aed","Germany":"#dc2626","Netherlands":"#f97316","Portugal":"#16a34a",
  // long tail (only shown in "All countries") — separable hues
  "Ireland":"#10b981","Italy":"#65a30d","Spain":"#f43f5e","Poland":"#fb7185",
  "Switzerland":"#b91c1c","Austria":"#9f1239","Romania":"#eab308","UK":"#c026d3",
  "Czech Republic":"#a855f7",
  // residual buckets (these two never appear together)
  "EU Gigafactories (TBD)":"#94a3b8","Rest Europe":"#64748b",
  // Full World view — Europe blue, US amber, China red, Rest of World grey (same as Rest of Europe)
  "Europe":"#2756d3","US":"#f59e0b","China":"#E53229","RoW":"#64748b"
};
const DATA = [{"country":"France","year":2026,"mw":220.0},{"country":"France","year":2027,"mw":650.0},{"country":"France","year":2028,"mw":2698.0},{"country":"France","year":2029,"mw":2698.0},{"country":"France","year":2030,"mw":4248.0},{"country":"France","year":2031,"mw":7348.0},{"country":"Portugal","year":2026,"mw":36.3},{"country":"Portugal","year":2027,"mw":256.3},{"country":"Portugal","year":2028,"mw":436.3},{"country":"Portugal","year":2029,"mw":436.3},{"country":"Portugal","year":2030,"mw":1492.3},{"country":"Portugal","year":2031,"mw":1492.3},{"country":"Netherlands","year":2026,"mw":27.5},{"country":"Netherlands","year":2027,"mw":187.0},{"country":"Netherlands","year":2028,"mw":313.5},{"country":"Netherlands","year":2029,"mw":349.8},{"country":"Netherlands","year":2030,"mw":443.3},{"country":"Netherlands","year":2031,"mw":1273.0},{"country":"Romania","year":2026,"mw":80.0},{"country":"Romania","year":2027,"mw":224.0},{"country":"Romania","year":2028,"mw":224.0},{"country":"Romania","year":2029,"mw":812.0},{"country":"Romania","year":2030,"mw":812.0},{"country":"Romania","year":2031,"mw":812.0},{"country":"Germany","year":2026,"mw":96.6},{"country":"Germany","year":2027,"mw":618.96},{"country":"Germany","year":2028,"mw":1049.86},{"country":"Germany","year":2029,"mw":1093.86},{"country":"Germany","year":2030,"mw":1703.86},{"country":"Germany","year":2031,"mw":1703.86},{"country":"UK","year":2026,"mw":94.4},{"country":"UK","year":2027,"mw":190.4},{"country":"UK","year":2028,"mw":230.4},{"country":"UK","year":2029,"mw":309.6},{"country":"UK","year":2030,"mw":769.6},{"country":"UK","year":2031,"mw":769.6},{"country":"Spain","year":2026,"mw":13.0},{"country":"Spain","year":2027,"mw":40.5},{"country":"Spain","year":2028,"mw":466.7},{"country":"Spain","year":2029,"mw":666.2},{"country":"Spain","year":2030,"mw":856.2},{"country":"Spain","year":2031,"mw":856.2},{"country":"Sweden","year":2026,"mw":152.0},{"country":"Sweden","year":2027,"mw":770.0},{"country":"Sweden","year":2028,"mw":1070.0},{"country":"Sweden","year":2029,"mw":1070.0},{"country":"Sweden","year":2030,"mw":1070.0},{"country":"Sweden","year":2031,"mw":1070.0},{"country":"Norway","year":2026,"mw":656.1},{"country":"Norway","year":2027,"mw":749.3},{"country":"Norway","year":2028,"mw":1836.8},{"country":"Norway","year":2029,"mw":1850.0},{"country":"Norway","year":2030,"mw":1850.0},{"country":"Norway","year":2031,"mw":1850.0},{"country":"Italy","year":2026,"mw":53.0},{"country":"Italy","year":2027,"mw":116.8},{"country":"Italy","year":2028,"mw":795.0},{"country":"Italy","year":2029,"mw":795.0},{"country":"Italy","year":2030,"mw":795.0},{"country":"Italy","year":2031,"mw":795.0},{"country":"Finland","year":2026,"mw":208.0},{"country":"Finland","year":2027,"mw":578.0},{"country":"Finland","year":2028,"mw":888.0},{"country":"Finland","year":2029,"mw":888.0},{"country":"Finland","year":2030,"mw":888.0},{"country":"Finland","year":2031,"mw":888.0},{"country":"Denmark","year":2026,"mw":30.0},{"country":"Denmark","year":2027,"mw":30.0},{"country":"Denmark","year":2028,"mw":150.0},{"country":"Denmark","year":2029,"mw":150.0},{"country":"Denmark","year":2030,"mw":530.0},{"country":"Denmark","year":2031,"mw":530.0},{"country":"Iceland","year":2026,"mw":218.0},{"country":"Iceland","year":2027,"mw":218.0},{"country":"Iceland","year":2028,"mw":218.0},{"country":"Iceland","year":2029,"mw":218.0},{"country":"Iceland","year":2030,"mw":218.0},{"country":"Iceland","year":2031,"mw":218.0},{"country":"EU Gigafactories (TBD)","year":2026,"mw":0.0},{"country":"EU Gigafactories (TBD)","year":2027,"mw":0.0},{"country":"EU Gigafactories (TBD)","year":2028,"mw":780.0},{"country":"EU Gigafactories (TBD)","year":2029,"mw":780.0},{"country":"EU Gigafactories (TBD)","year":2030,"mw":780.0},{"country":"EU Gigafactories (TBD)","year":2031,"mw":780.0},{"country":"Poland","year":2026,"mw":68.84},{"country":"Poland","year":2027,"mw":100.3},{"country":"Poland","year":2028,"mw":263.3},{"country":"Poland","year":2029,"mw":263.3},{"country":"Poland","year":2030,"mw":263.3},{"country":"Poland","year":2031,"mw":263.3},{"country":"Ireland","year":2026,"mw":60.0},{"country":"Ireland","year":2027,"mw":110.0},{"country":"Ireland","year":2028,"mw":110.0},{"country":"Ireland","year":2029,"mw":110.0},{"country":"Ireland","year":2030,"mw":110.0},{"country":"Ireland","year":2031,"mw":110.0},{"country":"Austria","year":2026,"mw":25.0},{"country":"Austria","year":2027,"mw":25.0},{"country":"Austria","year":2028,"mw":25.0},{"country":"Austria","year":2029,"mw":25.0},{"country":"Austria","year":2030,"mw":25.0},{"country":"Austria","year":2031,"mw":25.0},{"country":"Czech Republic","year":2026,"mw":4.0},{"country":"Czech Republic","year":2027,"mw":25.0},{"country":"Czech Republic","year":2028,"mw":25.0},{"country":"Czech Republic","year":2029,"mw":25.0},{"country":"Czech Republic","year":2030,"mw":25.0},{"country":"Czech Republic","year":2031,"mw":25.0},{"country":"Switzerland","year":2026,"mw":11.0},{"country":"Switzerland","year":2027,"mw":11.0},{"country":"Switzerland","year":2028,"mw":35.0},{"country":"Switzerland","year":2029,"mw":35.0},{"country":"Switzerland","year":2030,"mw":35.0},{"country":"Switzerland","year":2031,"mw":35.0}];

document.getElementById("source-text").innerHTML =
  'Source: <a href="'+SOURCE_HREF+'" target="_blank" rel="noopener">'+SOURCE_NAME+'</a>';
(function applyContainerVisibility(){
  const flags={2:SHOW_CONTAINER_2,3:SHOW_CONTAINER_3,4:SHOW_CONTAINER_4,5:SHOW_CONTAINER_5};
  Object.entries(flags).forEach(([k,v])=>{ if(!v){const el=document.getElementById("container"+k); if(el) el.style.display="none";}});
})();

// ---- data prep ----
const lookup = {};                                   // "country|year" -> mw
DATA.forEach(d=>{ lookup[d.country+"|"+d.year]=d.mw; });
const ALL = Array.from(new Set(DATA.map(d=>d.country)));
const yearTotal = {}, sumTop7 = {};
YEARS.forEach(y=>{
  yearTotal[y] = d3.sum(ALL, c=>lookup[c+"|"+y]||0);
  sumTop7[y]   = d3.sum(TOP7, c=>lookup[c+"|"+y]||0);
});
// World AI-compute forecast (GW → MW), from "DATA WORLD Compute Projections (Default)".
// Used by the "Full World" view: Europe as one band alongside US, China and Rest of World.
const WORLD = {
  US:     {2026:35300,2027:61300,2028:104400,2029:146600,2030:208200,2031:255100},
  China:  {2026:5000, 2027:9800, 2028:19100, 2029:29000, 2030:45000, 2031:56000},
  Europe: {2026:2100, 2027:5200, 2028:11800, 2029:12800, 2030:16800, 2031:20900},
  RoW:    {2026:2700, 2027:5700, 2028:11800, 2029:18600, 2030:30000, 2031:41000}
};

function rawVal(country, year){
  if(WORLD[country]) return WORLD[country][year]||0;
  if(country==="Rest of Europe") return (yearTotal[year]-sumTop7[year]);
  return lookup[country+"|"+year]||0;
}
function activeCountries(group){
  if(group==="world") return ["US","China","Europe","RoW"];
  return group==="top" ? [...TOP7,"Rest of Europe"] : ALL.slice();
}

// Stack independently per year, largest at the bottom -> bands re-rank over time (the "bump").
function computeBands(group, value){
  const cs = activeCountries(group);
  const bmap = {}; cs.forEach(c=> bmap[c]={country:c, points:[]});
  YEARS.forEach(year=>{
    const total = d3.sum(cs, c=>rawVal(c,year))||1;   // per-group total (Europe total, or World total)
    const vals = cs.map(c=>({c, v: rawVal(c,year)}));
    vals.sort((a,b)=> (b.v-a.v) || (a.c<b.c?-1:1));   // largest first => bottom of stack
    let cum=0;
    vals.forEach((o,i)=>{
      const val = value==="pct" ? o.v/total : o.v;
      bmap[o.c].points.push({year, y0:cum, y1:cum+val, mw:o.v, pct:o.v/total, rank:i+1});
      cum += val;
    });
  });
  // order returned bands by 2031 size (Rest of Europe forced last) for legend/label priority
  return cs.map(c=>bmap[c]).sort((a,b)=>{
    const resid=c=>c==="Rest of Europe"||c==="RoW";
    if(resid(a.country)&&!resid(b.country)) return 1; if(resid(b.country)&&!resid(a.country)) return -1;
    return rawVal(b.country,2031)-rawVal(a.country,2031);
  });
}

// ---- state + controls ----
let currentValue="mw", currentGroup="top", animUntil=0;
const tooltip = d3.select("#tooltip");
const vizContainer = document.getElementById("viz");
const fmt = d3.format(",.0f");
const pct = d3.format(".1%");
let firstRender = true, ctx=null;

function buildSelector(node, options, getState, setState){
  node.innerHTML="";
  options.forEach(o=>{
    const b=document.createElement("button");
    b.type="button"; b.className="selector-button"; b.textContent=o.label; b.dataset.val=o.val;
    b.addEventListener("click",()=>{ if(getState()===o.val) return; setState(o.val); updateSelStates(); drawAll(true); });
    node.appendChild(b);
  });
}
function updateSelStates(){
  document.querySelectorAll("#valueSel .selector-button").forEach(b=>b.classList.toggle("active", b.dataset.val===currentValue));
  document.querySelectorAll("#groupSel .selector-button").forEach(b=>b.classList.toggle("active", b.dataset.val===currentGroup));
}
buildSelector(document.getElementById("valueSel"),
  [{val:"mw",label:"Absolute (MW)"},{val:"pct",label:"Relative (%)"}], ()=>currentValue, v=>currentValue=v);
buildSelector(document.getElementById("groupSel"),
  [{val:"top",label:"Top 7 EU"},{val:"all",label:"Full Europe"},{val:"world",label:"Full World"}], ()=>currentGroup, v=>currentGroup=v);
updateSelStates();

// ---- render ----
function render(){
  d3.select("#viz").selectAll("*").remove();
  const rect = vizContainer.getBoundingClientRect();
  const W=rect.width, H=rect.height;
  const compact = window.matchMedia(`(max-height:${BREAKPOINT_COMPACT}px)`).matches;
  const m={ top:16, right:compact?12:84, bottom:34, left:58 };
  const iw=Math.max(10,W-m.left-m.right), ih=Math.max(10,H-m.top-m.bottom);
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform",`translate(${m.left},${m.top})`);
  const x=d3.scalePoint().domain(YEARS).range([0,iw]);

  // clip for first-render left-to-right reveal
  const clip=svg.append("defs").append("clipPath").attr("id","reveal").append("rect")
    .attr("x",0).attr("y",-m.top).attr("height",H);
  const gGrid=g.append("g"), gYAxis=g.append("g"),
        gBands=g.append("g").attr("clip-path","url(#reveal)"),
        gXAxis=g.append("g").attr("transform",`translate(0,${ih})`),
        gLabels=g.append("g");
  const gRibbons=gBands.append("g"), gPlateaus=gBands.append("g"); // ribbons under plateaus

  ctx={g,x,iw,ih,compact,gGrid,gYAxis,gBands,gRibbons,gPlateaus,gXAxis,gLabels,m,H,clipRect:clip};

  // x axis (static)
  gXAxis.call(d3.axisBottom(x).tickFormat(d3.format("d")))
    .call(s=>s.select(".domain").attr("stroke","#0f172a"))
    .selectAll("text").attr("font-weight",600).attr("font-size",compact?10:12);

  drawAll(false);

  // Resting state is always full width (so the chart is visible even if the entry
  // transition never ticks — e.g. a background iframe where rAF is throttled).
  const reduced=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  clip.attr("width", iw+m.right);
  if(firstRender && !reduced && document.visibilityState==="visible"){
    clip.attr("width",0).transition().duration(1000).ease(d3.easeCubicOut).attr("width", iw+m.right);
  }
  firstRender=false;
}

function drawAll(animate){
  const {x,iw,ih,compact,gGrid,gYAxis,gBands,gRibbons,gPlateaus,gLabels}=ctx;
  const bands=computeBands(currentGroup,currentValue);
  const yMax= currentValue==="pct" ? 1 : d3.max(bands, b=>d3.max(b.points, p=>p.y1)); // per-group max total
  const y=d3.scaleLinear().domain([0,yMax]).range([ih,0]); if(currentValue==="mw") y.nice();
  // Each year is a solid rounded "plateau" block; the value only changes inside the
  // TRANSITION_FRAC window between plateaus, drawn as a translucent ribbon. The re-ranking
  // gaps are confined to those ribbons, where transparency reads as a soft blend.
  const H=(1-TRANSITION_FRAC)/2, CORNER=0, SEAM=Math.max(2,CORNER+1); // SEAM: ribbon overlap tucked under plateaus to hide the seam
  const ribbon=d3.area().x(d=>d.x).y0(d=>y(d.y0)).y1(d=>y(d.y1)).curve(d3.curveBumpX);
  const col=d=>COLORS[d.country]||"#64748b";
  const dur=700;
  if(animate) animUntil=performance.now()+dur+120;   // shield this transition from a self-induced (legend) resize
  // Only attach a transition when actually animating; a duration-0 transition still
  // schedules an rAF tick that never settles in a throttled/background tab.
  const T = sel => animate ? sel.transition().duration(dur).ease(d3.easeCubicOut) : sel;

  // gridlines + y axis
  const yAxis = currentValue==="pct"
    ? d3.axisLeft(y).ticks(5).tickFormat(d3.format(".0%"))
    : d3.axisLeft(y).ticks(6).tickFormat(d=>fmt(d));
  T(gGrid).call(d3.axisLeft(y).tickSize(-iw).tickFormat(""))
    .call(s=>s.select(".domain").remove())
    .call(s=>s.selectAll("line").attr("stroke","#DBDBDB").attr("stroke-dasharray","2,3"));
  T(gYAxis).call(yAxis).call(s=>s.select(".domain").remove());
  gYAxis.selectAll("text").attr("font-weight",600).attr("font-size",compact?10:12);

  // build plateau (solid block per year) + ribbon (translucent connector per gap) geometry
  const plateaus=[], ribbons=[];
  bands.forEach(b=>{
    const xs=b.points.map(p=>x(p.year)), n=b.points.length;
    b.points.forEach((p,i)=>{
      const xL=i>0 ? xs[i]-(xs[i]-xs[i-1])*H : xs[i];
      const xR=i<n-1 ? xs[i]+(xs[i+1]-xs[i])*H : xs[i];
      plateaus.push({key:b.country+"|"+p.year, country:b.country, points:b.points, xL, xR, y0:p.y0, y1:p.y1});
      if(i<n-1){ const np=b.points[i+1], xLn=xs[i+1]-(xs[i+1]-xs[i])*H;
        ribbons.push({key:b.country+"|"+i, country:b.country, points:b.points,
          pts:[{x:xR-SEAM,y0:p.y0,y1:p.y1},{x:xR,y0:p.y0,y1:p.y1},
               {x:xLn,y0:np.y0,y1:np.y1},{x:xLn+SEAM,y0:np.y0,y1:np.y1}]}); }
    });
  });
  const cr=d=>Math.max(0, Math.min(CORNER,(d.xR-d.xL)/2,(y(d.y0)-y(d.y1))/2));

  // ribbons connecting the plateaus (drawn under them), same solid fill as the blocks
  const rsel=gRibbons.selectAll("path.ribbon").data(ribbons, d=>d.key);
  rsel.exit().remove();
  const rent=rsel.enter().append("path").attr("class","ribbon seg")
    .attr("d",d=>ribbon(d.pts)).style("opacity",animate?0:1);
  const rmer=rent.merge(rsel).attr("fill",col);
  (animate? rmer.transition().duration(dur).ease(d3.easeCubicOut):rmer).attr("d",d=>ribbon(d.pts)).style("opacity",1);

  // solid rounded plateau blocks (on top)
  const setRect=s=>s.attr("x",d=>d.xL).attr("width",d=>Math.max(0,d.xR-d.xL))
    .attr("y",d=>y(d.y1)).attr("height",d=>Math.max(0,y(d.y0)-y(d.y1))).attr("rx",cr).attr("ry",cr);
  const psel=gPlateaus.selectAll("rect.plateau").data(plateaus, d=>d.key);
  psel.exit().remove();
  const pent=psel.enter().append("rect").attr("class","plateau seg").call(setRect).style("opacity",animate?0:1);
  const pmer=pent.merge(psel).attr("fill",col);
  (animate? setRect(pmer.transition().duration(dur).ease(d3.easeCubicOut)) : setRect(pmer)).style("opacity",1);

  applyHandlers(gBands.selectAll(".seg"), x, y);

  // right-edge labels: only bands thick enough at 2031 to read
  const last=bands.map(b=>({b, p:b.points[b.points.length-1]}))
                  .filter(o=> (y(o.p.y0)-y(o.p.y1)) > 13 );
  const lsel=gLabels.selectAll("text.lbl").data(compact?[]:last, o=>o.b.country);
  lsel.exit().remove();
  const lent=lsel.enter().append("text").attr("class","lbl")
    .attr("x",iw+6).attr("font-size",11).attr("font-weight",700);
  const lmerged=lent.merge(lsel).attr("fill",o=>COLORS[o.b.country]||"#64748b");
  lmerged.each(function(o){
    const lines=labelLines(o.b.country), t=d3.select(this); t.selectAll("tspan").remove();
    lines.forEach((ln,i)=> t.append("tspan").attr("x",iw+6)
      .attr("dy", i===0 ? (lines.length>1?"-0.15em":"0.32em") : "1.05em").text(ln));
  });
  T(lmerged).attr("y",o=> (y(o.p.y0)+y(o.p.y1))/2 );

  buildLegend(bands);
}

function applyHandlers(sel,x,y){
  if(!SHOW_TOOLTIP) return;
  const px=YEARS.map(yr=>x(yr));
  sel.on("mousemove",function(event,d){
      const [mx]=d3.pointer(event, ctx.g.node());
      let idx=0,best=Infinity; px.forEach((p,i)=>{const dd=Math.abs(p-mx); if(dd<best){best=dd;idx=i;}});
      const p=d.points[idx];
      tooltip.style("display","block")
        .style("left",(event.clientX+12)+"px").style("top",(event.clientY+12)+"px")
        .html(`<strong>${d.country}</strong> &middot; ${p.year}<br>${fmt(p.mw)} MW &middot; ${pct(p.pct)} &middot; rank ${p.rank}`);
    })
    .on("mouseleave",()=>tooltip.style("display","none"));
}

// Legend keeps the full names on a single line.
function legendLines(c){ return [c]; }
// Right-edge axis labels are tighter: split "Rest of Europe" and abbreviate the long Gigafactories name.
function labelLines(c){
  if(c==="Rest of Europe") return ["Rest of","Europe"];
  if(c==="EU Gigafactories (TBD)") return ["EU (TBD)"];
  return [c];
}

function buildLegend(bands){
  const legend=d3.select("#legend"); legend.html("");
  bands.forEach(b=>{
    const it=legend.append("div").attr("class","item");
    it.append("span").attr("class","sw").style("background",COLORS[b.country]||"#64748b");
    it.append("span").html(legendLines(b.country).join("<br>"));
  });
}

render();
let resizeTimer=null;
// Defer a re-render past any active transition so a self-induced resize (the legend changing height
// on a group switch) can't cut the animation short with an instant rebuild.
function scheduleRender(){ clearTimeout(resizeTimer); resizeTimer=setTimeout(render, Math.max(220, animUntil-performance.now()+30)); }
window.addEventListener("resize", scheduleRender);
if(typeof ResizeObserver!=="undefined")
  new ResizeObserver(scheduleRender).observe(vizContainer);
</script></body></html>
