// project name -> full MW trajectory, for the tooltip sparkline
const TRAJ = {}; FAC.forEach(f=>{ TRAJ[f.n]=f.v; });
// ---- detail tooltip: shows on hover, PINS on click until the next click ----
const card = document.getElementById("card");
const closeBtn = card.querySelector(".card-close");
let pinned = false, hoverName = null;

closeBtn.addEventListener("click", e=>{ e.stopPropagation(); hideCard(); });
function hideCard(){ pinned=false; hoverName=null; closeBtn.style.display="none"; card.style.display="none"; }
// track the cursor ourselves — d3plus does not expose d3.event to its listeners
let mouseX=0, mouseY=0;
window.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; }, true);
function positionCard(){
  const cw=card.offsetWidth, ch=card.offsetHeight;
  card.style.left = Math.max(8, Math.min(mouseX+14, innerWidth-cw-8))+"px";
  card.style.top  = Math.max(8, Math.min(mouseY+14, innerHeight-ch-8))+"px";
}
function fillCard(d){
  const color = COLORS[d.c] || "#64748b";
  card.querySelector(".card-title").textContent = d.n;
  const cc = card.querySelector(".card-country"); cc.textContent = d.c; cc.style.color = color;
  drawCardChart(TRAJ[d.n], color, currentYear-2026);
}
function onMove(d){
  if(pinned || !d || !d.n || !TRAJ[d.n]) return;
  if(hoverName!==d.n){ hoverName=d.n; fillCard(d); closeBtn.style.display="none"; card.style.pointerEvents="none"; card.style.display="block"; }
  positionCard();
}
function onLeave(){ if(!pinned){ hoverName=null; card.style.display="none"; } }
function onClick(d){
  if(!d || !d.n || !TRAJ[d.n]) return;
  pinned=true; hoverName=null; fillCard(d);
  closeBtn.style.display="block"; card.style.pointerEvents="auto"; card.style.display="block"; positionCard();
}

// capacity line 2026..2031 with ONE movable point; its value sits top-left in the country colour.
// Hovering across the chart (when the tooltip is pinned/interactive) moves the point and value.
function drawCardChart(v, color, startIdx){
  const W=200,H=96,m={t:20,r:10,b:18,l:10}, iw=W-m.l-m.r, ih=H-m.t-m.b;
  const svg=d3.select(card).select(".card-chart").html("").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scalePoint().domain(YEARS).range([0,iw]);
  const y=d3.scaleLinear().domain([0, d3.max(v)||1]).range([ih,0]);
  const line=d3.line().x((dd,i)=>x(YEARS[i])).y(dd=>y(dd));
  const area=d3.area().x((dd,i)=>x(YEARS[i])).y0(ih).y1(dd=>y(dd));
  g.append("path").datum(v).attr("d",area).attr("fill",color).attr("opacity",0.16);
  g.append("path").datum(v).attr("d",line).attr("fill","none").attr("stroke",color)
    .attr("stroke-width",2).attr("stroke-linejoin","round").attr("stroke-linecap","round");
  g.append("text").attr("x",0).attr("y",ih+13).attr("font-size",9).attr("fill","#94a3b8").text("2026");
  g.append("text").attr("x",iw).attr("y",ih+13).attr("font-size",9).attr("fill","#94a3b8").attr("text-anchor","end").text("2031");
  const dot=g.append("circle").attr("r",4).attr("fill",color).attr("stroke","#fff").attr("stroke-width",1.5);
  const corner=svg.append("text").attr("x",m.l).attr("y",13).attr("font-size",12).attr("font-weight",700).attr("fill",color);
  function setIdx(i){ i=Math.max(0,Math.min(YEARS.length-1,i));
    dot.attr("cx",x(YEARS[i])).attr("cy",y(v[i]));
    corner.text(YEARS[i]+" · "+fmt(v[i])+" MW"); }
  setIdx(startIdx);
  const xs=YEARS.map(yr=>x(yr));
  g.append("rect").attr("width",iw).attr("height",ih).attr("fill","transparent").style("cursor","crosshair")
    .on("mousemove",function(){ const mx=d3.mouse(this)[0]; let best=0,bd=Infinity;
      xs.forEach((px,i)=>{const dd=Math.abs(px-mx); if(dd<bd){bd=dd;best=i;}}); setIdx(best); });
}

// rows for a year+mode — one row per PROJECT (top-N filter is per project, not per country)
function rowsFor(year, mode){
  const k = year - 2026;
  let rows = FAC.map(f=>({c:f.c, n:f.n, mw:f.v[k]})).filter(d=>d.mw>0);
  if(mode==="top"){
    rows = rows.slice().sort((a,b)=>b.mw-a.mw);
    const top=rows.slice(0,TOP_N), rest=rows.slice(TOP_N);
    if(rest.length){
      const sum=rest.reduce((s,d)=>s+d.mw,0);
      top.push({c:"Other", n:"Other ("+rest.length+" projects)", mw:sum});  // one big grey tile
    }
    rows=top;
  }
  return rows;
}

const col = d => COLORS[d.c] || "#94a3b8";
const treemap = new d3plus.Treemap()
  .select("#viz")
  .legend(false)
  .groupBy(["c","n"])                 // group by country, then individual project
  .sum("mw")
  .sort(function(a,b){                // size order, but the grey "Other" block always goes last (right)
    const ao=a.data&&a.data.key==="Other", bo=b.data&&b.data.key==="Other";
    if(ao!==bo) return ao?1:-1;
    return b.value-a.value;
  })
  .duration(900)
  .shapeConfig({
    fill: col,
    labelConfig: { fontFamily:"system-ui, sans-serif", fontColor:"#ffffff", fontResize:true }
  })
  .label(d => d.n)
  .tooltip(false)                                   // custom card instead of the follow-cursor tooltip
  .on("mousemove",  function(d){ onMove(d); })
  .on("mouseleave", function(){ onLeave(); })
  .on("click",      function(d){ onClick(d); });

// d3plus caches its measured size in _width/_height and won't re-measure on a plain render(),
// so clear them before each render to force a fresh fit to the live container box (needed on resize).
// (Setting .width()/.height() explicitly instead breaks sizing in this d3plus build.)
function fitTreemap(){ treemap._width = undefined; treemap._height = undefined; }

function update(animate){
  const rows = rowsFor(currentYear, currentMode);
  document.getElementById("yearOut").textContent = currentYear;
  document.getElementById("yearSlider").value = currentYear;
  document.getElementById("viz").classList.toggle("nodim", currentMode==="top"); // no hover shading in Top 10
  // Build the legend FIRST: its item count drives the footer height, which resizes the chart. Doing it
  // before we measure/render lets the treemap animate straight to the final size (no mid-flight resize snap).
  if(currentMode==="us") setLegend([["Europe","#2756d3"],["United States","#0f172a"]]);
  else buildLegend(rows);
  if(animate) animUntil = performance.now()+1000;        // shield this transition from the self-induced resize
  fitTreemap();
  treemap.duration(animate?900:0).data(rows).render();
  layoutPanes(rows, currentMode==="us" && !introPending);  // zoomed once intro has fired; full treemap until then
}

// US comparison: keep the full-size treemap but uniformly zoom it out (CSS transform) into a small
// block, beside a much larger solid US block. Both sized on a FIXED scale (area ∝ MW, linear ∝ √MW).
const CMP_MAX_GW = 255.1, CMP_MAX_FRAC = 0.72;      // US 2031 sets the scale; its block ≈ 72% of the pane
const US_MAXH = 0.85;                               // US 2031 block height as a fraction of the pane height
const EU_MAX_GW = Math.max.apply(null, YEARS.map(y=>FAC.reduce((s,f)=>s+f.v[y-2026],0)))/1000; // Europe 2031 total
const frac = g => CMP_MAX_FRAC * Math.sqrt(g / CMP_MAX_GW);
// zoom=false renders the intro state (full-size Europe treemap, US block collapsed) so the
// transition into zoom=true reads as a zoom-out next to a growing US block.
function layoutPanes(rows, zoom){
  const panes=document.getElementById("panes"), usSq=document.getElementById("usSq"),
        euLabel=document.getElementById("euLabel"), usLabel=document.getElementById("usLabel");
  if(currentMode!=="us"){
    panes.classList.remove("zoom"); panes.style.transform="";
    usSq.style.display="none"; euLabel.style.display="none"; usLabel.style.display="none";
    return;
  }
  const euGW=rows.reduce((s,d)=>s+d.mw,0)/1000, usGW=(US_MW[currentYear]||0)/1000;
  const r=document.getElementById("container1").getBoundingClientRect(), W=r.width, H=r.height;
  // Europe: uniform 2-D zoom (area ∝ euGW). US: FIXED width + vertical-only growth (area = usW*hUs ∝ usGW).
  // The US width is derived from the SAME area scale, so US area / Europe area == usGW / euGW exactly.
  const sEu=frac(euGW), wEu=W*sEu, hEu=H*sEu;
  const usW=W*(CMP_MAX_FRAC*CMP_MAX_FRAC/US_MAXH);   // fixed width (keeps US on Europe's area scale)
  const hUs=H*US_MAXH*(usGW/CMP_MAX_GW);             // grows only vertically
  // Fixed horizontal layout (independent of year): Europe pinned bottom-left, US pinned to its right.
  const euMaxW=W*frac(EU_MAX_GW), gap=Math.min(0.04*W,30);
  const startX=(W-(euMaxW+gap+usW))/2, yBot=H-6, xEu=startX, xUs=startX+euMaxW+gap;
  panes.classList.add("zoom");
  usSq.style.display="flex";
  usSq.style.left=xUs.toFixed(1)+"px"; usSq.style.width=usW.toFixed(1)+"px";   // US horizontally fixed
  if(!zoom){
    // intro / pre-zoom: full Europe treemap, US block collapsed at the baseline, no labels
    panes.style.transform="";
    usSq.style.top=yBot.toFixed(1)+"px"; usSq.style.height="0px";
    euLabel.style.display="none"; usLabel.style.display="none";
    return;
  }
  panes.style.transform="translate("+xEu.toFixed(1)+"px,"+(yBot-hEu).toFixed(1)+"px) scale("+sEu.toFixed(4)+")";
  usSq.style.top=(yBot-hUs).toFixed(1)+"px"; usSq.style.height=hUs.toFixed(1)+"px";
  euLabel.style.display="block"; euLabel.textContent="Europe "+gw(euGW*1000);
  euLabel.style.left=(xEu+wEu/2).toFixed(1)+"px"; euLabel.style.top=(yBot-hEu-22).toFixed(1)+"px";
  usLabel.style.display="block"; usLabel.textContent="United States "+gw(usGW*1000);
  usLabel.style.left=(xUs+usW/2).toFixed(1)+"px"; usLabel.style.top=(yBot-hUs-22).toFixed(1)+"px";
}

// legend = countries present in the current view, ordered by total MW
function setLegend(pairs){
  const legend = d3.select("#legend"); legend.html("");
  pairs.forEach(p=>{
    const it = legend.append("div").attr("class","item");
    it.append("span").attr("class","sw").style("background",p[1]);
    it.append("span").text(p[0]);
  });
}
// a "More" swatch: a little colour wheel of the folded countries (the map keeps each real colour)
function moreSwatch(countries){
  const cs=countries.map(c=>COLORS[c]||"#94a3b8"), seg=360/cs.length;
  return "conic-gradient("+cs.map((c,i)=>c+" "+(i*seg).toFixed(1)+"deg "+((i+1)*seg).toFixed(1)+"deg").join(", ")+")";
}
function buildLegend(rows){
  const tot = {};
  rows.forEach(d=>{ tot[d.c]=(tot[d.c]||0)+d.mw; });
  let order = Object.keys(tot).sort((a,b)=>tot[b]-tot[a]);
  const hasOther = order.includes("Other");          // Top 10 view's project-aggregate tile
  order = order.filter(c=>c!=="Other");
  // fold Denmark and every lower-ranked country into a single "More" legend item
  const pIdx = order.indexOf("Denmark");
  let pairs;
  if(pIdx>-1){
    pairs = order.slice(0,pIdx).map(c=>[c, COLORS[c]||"#94a3b8"]);
    pairs.push(["More", moreSwatch(order.slice(pIdx))]);
  } else {
    pairs = order.map(c=>[c, COLORS[c]||"#94a3b8"]);
  }
  if(hasOther) pairs.push(["Other", COLORS["Other"]]);  // aggregate tile stays last
  setLegend(pairs);
}

// ---- controls ----
function buildSelector(node, options){
  node.innerHTML="";
  options.forEach(o=>{
    const b=document.createElement("button");
    b.type="button"; b.className="selector-button"; b.textContent=o.label; b.dataset.val=o.val;
    b.addEventListener("click",()=>{ if(currentMode===o.val) return; currentMode=o.val; introPending=false; updateModeState(); hideCard(); update(true); });
    node.appendChild(b);
  });
}
function updateModeState(){
  document.querySelectorAll("#modeSel .selector-button").forEach(b=>b.classList.toggle("active", b.dataset.val===currentMode));
}
buildSelector(document.getElementById("modeSel"),
  [{val:"top",label:"Top 10 projects"},{val:"all",label:"Full Europe"},{val:"us",label:"US comparison"}]);
updateModeState();

function play(){
  const btn=document.getElementById("playBtn");
  introPending=false;
  if(timer){ clearInterval(timer); timer=null; btn.textContent="▶"; return; }
  btn.textContent="❚❚";
  if(currentYear>=2031){ currentYear=2026; update(true); }
  timer=setInterval(()=>{
    if(currentYear>=2031){ clearInterval(timer); timer=null; btn.textContent="▶"; return; }
    currentYear++; update(true);
  }, STEP_MS);
}
document.getElementById("playBtn").addEventListener("click", play);
document.getElementById("yearSlider").addEventListener("input", e=>{
  introPending=false;
  if(timer){ clearInterval(timer); timer=null; document.getElementById("playBtn").textContent="▶"; }
  currentYear=+e.target.value; update(true);
});

update(false);

// US-comparison hero: keep the full Europe treemap, then play the zoom-out ONCE, the first time the
// (iframe-embedded) viz scrolls into view. An IntersectionObserver inside an iframe still accounts for
// the iframe's own visibility in the parent page, so this fires correctly in a blog post.
function triggerIntro(){
  if(!introPending) return;
  introPending=false;
  // hold on the full Europe treemap for a beat, then play the (1.5s) zoom-out
  setTimeout(()=>{ if(currentMode==="us") layoutPanes(rowsFor(currentYear,currentMode), true); }, 1000);
}
if(introPending){
  if("IntersectionObserver" in window){
    const io=new IntersectionObserver((entries,obs)=>{
      if(entries.some(e=>e.isIntersecting)){ obs.disconnect(); triggerIntro(); }
    }, {threshold:0.25});
    io.observe(document.getElementById("container1"));
  } else { triggerIntro(); }
}

let resizeTimer=null;
function redraw(){
  const now=performance.now();
  if(now<animUntil){ clearTimeout(resizeTimer); resizeTimer=setTimeout(redraw, animUntil-now+30); return; }  // defer past an active transition so it isn't snapped
  hideCard(); fitTreemap(); treemap.duration(0).render(); layoutPanes(rowsFor(currentYear,currentMode), currentMode==="us" && !introPending);
}
window.addEventListener("resize", ()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(redraw,220); });
if(typeof ResizeObserver!=="undefined")
  new ResizeObserver(()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(redraw,220); }).observe(document.getElementById("viz"));
</script></body></html>
