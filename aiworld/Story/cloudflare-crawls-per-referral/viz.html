document.getElementById("source-text").innerHTML =
  'Source: <a href="'+SOURCE_HREF+'" target="_blank" rel="noopener">'+SOURCE_NAME;

(function applyContainerVisibility(){
  const grid = document.querySelector(".viz-grid"), c = n => document.getElementById("container"+n);
  const c2=c(2), c3=c(3), c4=c(4), c5=c(5);
  if (c2 && !SHOW_CONTAINER_2) c2.style.display="none";
  if (c3 && !SHOW_CONTAINER_3) c3.style.display="none";
  if (c4 && !SHOW_CONTAINER_4) c4.style.display="none";
  if (c5 && !SHOW_CONTAINER_5) c5.style.display="none";
  const rowCtrl=SHOW_CONTAINER_5, rowLegend=SHOW_CONTAINER_2, rowFooter=SHOW_CONTAINER_3||SHOW_CONTAINER_4;
  const rows=[]; let r=1;
  rows.push((20-(rowCtrl?1:0)-(rowLegend?2:0)-(rowFooter?1:0))+"fr");  // legend gets 2 rows of weight
  if (rowCtrl)   { rows.push("1fr"); r++; if (c5) c5.style.gridRow=r; }
  if (rowLegend) { rows.push("2fr"); r++; if (c2) c2.style.gridRow=r; }
  if (rowFooter) { rows.push("1fr"); r++;
    if (SHOW_CONTAINER_3 && c3) c3.style.gridRow=r;
    if (SHOW_CONTAINER_4 && c4) c4.style.gridRow=r;
    if (SHOW_CONTAINER_3 && !SHOW_CONTAINER_4 && c3) c3.style.gridColumn="1 / span 2";
    if (!SHOW_CONTAINER_3 && SHOW_CONTAINER_4 && c4) c4.style.gridColumn="1 / span 2";
  }
  grid.style.gridTemplateRows = rows.join(" ");
  c(1).style.gridRow = "1";
})();

const parseDate = d3.timeParse("%Y-%m-%d");
const dates = DATA.map(d => parseDate(d.date));
const activeSeries = new Set(SERIES_ORDER);
const tooltip = d3.select("#tooltip");
const vizContainer = document.getElementById("viz");
let firstRender = true;

const fmtTick = v => {
  if (v >= 1000) return d3.format("~s")(v).replace("G","B");
  if (v >= 1) return d3.format("d")(v);
  return d3.format("~g")(v);
};
const fmtVal = v => v >= 1000 ? d3.format(",.0f")(v) : d3.format("~g")(v);

// per-series: points within its active window (first..last non-null), and the valid subset
function seriesPoints(op){
  const pts = DATA.map((d,i) => ({ date: dates[i], v: d[op] }));
  let lo = pts.findIndex(p => p.v != null);
  let hi = pts.length - 1; while (hi >= 0 && pts[hi].v == null) hi--;
  if (lo < 0) return { active: [], valid: [] };
  const active = pts.slice(lo, hi+1);
  return { active, valid: active.filter(p => p.v != null) };
}

function buildLegend(){
  const legend = d3.select("#legend"); legend.html("");
  GROUPS.forEach(g => {
    legend.append("span").attr("class","lg-head").text(g.label);
    g.ops.forEach(op => {
      const on = activeSeries.has(op);
      const item = legend.append("div").attr("class","lg-item")
        .attr("role","button").attr("tabindex",0).attr("aria-pressed", on)
        .on("click", () => toggle(op))
        .on("keydown", (e) => { if (e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(op); } });
      const svg = item.append("svg").attr("width",18).attr("height",10);
      svg.append("line").attr("x1",1).attr("y1",5).attr("x2",17).attr("y2",5)
        .attr("stroke",COLORS[op]).attr("stroke-width",2.5);
      svg.append("circle").attr("cx",9).attr("cy",5).attr("r",2.6).attr("fill",COLORS[op]);
      item.append("span").text(op);
    });
  });
}
function toggle(op){
  if (activeSeries.has(op)) activeSeries.delete(op); else activeSeries.add(op);
  buildLegend(); render();
}

function render(){
  d3.select("#viz").selectAll("*").remove();
  const rect = vizContainer.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  if (W < 10 || H < 10) return;
  const compact = window.matchMedia(`(max-height:${BREAKPOINT_COMPACT}px)`).matches;

  const m = { top: compact ? 16 : 64, right: compact ? 16 : 116, bottom: 30, left: 58 };
  const innerW = Math.max(10, W - m.left - m.right);
  const innerH = Math.max(10, H - m.top - m.bottom);

  const svg = d3.select("#viz").append("svg").attr("width", W).attr("height", H);
  const g = svg.append("g").attr("transform", `translate(${m.left},${m.top})`);

  // y-domain from all active, valid, positive values
  const vals = [];
  SERIES_ORDER.forEach(op => { if (activeSeries.has(op)) seriesPoints(op).valid.forEach(p => vals.push(p.v)); });
  const yMin = vals.length ? d3.min(vals) : 1, yMax = vals.length ? d3.max(vals) : 10;
  const x = d3.scaleTime().domain(d3.extent(dates)).range([0, innerW]);
  const y = d3.scaleLog().domain([Math.max(0.1, yMin/1.6), yMax*1.4]).range([innerH, 0]).clamp(true);

  // gridlines + y axis at powers of 10
  const decades = [];
  for (let e = Math.floor(Math.log10(y.domain()[0])); e <= Math.ceil(Math.log10(y.domain()[1])); e++) decades.push(Math.pow(10,e));
  g.append("g").selectAll("line").data(decades).join("line")
    .attr("x1",0).attr("x2",innerW).attr("y1",d=>y(d)).attr("y2",d=>y(d))
    .attr("stroke","#DBDBDB").attr("stroke-dasharray","2,3");
  g.append("g").call(d3.axisLeft(y).tickValues(decades).tickFormat(fmtTick).tickSize(0))
    .call(s => s.select(".domain").remove())
    .call(s => s.selectAll("text").attr("font-weight",600).attr("font-size",11).attr("fill","#475569"));

  // x axis
  g.append("g").attr("transform",`translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(W < 560 ? 4 : 7).tickFormat(d3.timeFormat("%b %y")).tickSizeOuter(0))
    .call(s => s.selectAll("text").attr("font-weight",600).attr("font-size",11).attr("fill","#475569"));

  // parity reference (y = 1) if in range
  if (1 >= y.domain()[0] && 1 <= y.domain()[1]) {
    g.append("line").attr("x1",0).attr("x2",innerW).attr("y1",y(1)).attr("y2",y(1))
      .attr("stroke","#0f172a").attr("stroke-width",1).attr("stroke-dasharray","5,4").attr("opacity",0.55);
    g.append("text").attr("x",innerW-4).attr("y",y(1)+13).attr("text-anchor","end").attr("font-size",10).attr("font-weight",700)
      .attr("fill","#0f172a").attr("opacity",0.7).text("parity (crawls = referrals)");
  }

  // y-axis title
  if (!compact) g.append("text").attr("transform","rotate(-90)").attr("x",-innerH/2).attr("y",-44)
    .attr("text-anchor","middle").attr("font-size",11).attr("font-weight",700).attr("fill","#475569").text(Y_AXIS_TITLE);

  const lineGen = d3.line().x(d=>x(d.date)).y(d=>y(d.v));
  const solidGen = d3.line().defined(d=>d.v!=null).x(d=>x(d.date)).y(d=>y(d.v==null?yMin:d.v));

  const plot = g.append("g");
  const drawn = SERIES_ORDER.filter(op => activeSeries.has(op));
  drawn.forEach(op => {
    const { active, valid } = seriesPoints(op);
    if (valid.length === 0) return;
    const col = COLORS[op];
    // dotted underlay through all valid points -> straight bridges across interior gaps
    if (valid.length > 1)
      plot.append("path").datum(valid).attr("fill","none").attr("stroke",col)
        .attr("stroke-width",1.4).attr("stroke-dasharray","2,3").attr("opacity",0.9).attr("d",lineGen);
    // solid overlay only across contiguous (defined) stretches
    plot.append("path").datum(active).attr("fill","none").attr("stroke",col)
      .attr("stroke-width",2).attr("stroke-linejoin","round").attr("d",solidGen);
    // dot on the final value
    const last = valid[valid.length-1];
    plot.append("circle").attr("cx",x(last.date)).attr("cy",y(last.v)).attr("r",2.6).attr("fill",col);
  });

  // direct end-of-line labels (spread to avoid overlap)
  if (!compact) {
    const labels = drawn.map(op => {
      const { valid } = seriesPoints(op);
      if (!valid.length) return null;
      const last = valid[valid.length-1];
      return { op, y: y(last.v), color: COLORS[op] };
    }).filter(Boolean).sort((a,b)=>a.y-b.y);
    const gap = 13;
    for (let i=1;i<labels.length;i++) if (labels[i].y - labels[i-1].y < gap) labels[i].y = labels[i-1].y + gap;
    // pull back into frame if pushed past bottom
    for (let i=labels.length-1;i>0;i--) if (labels[i].y > innerH) labels[i].y = labels[i-1].y; // rare
    const lg = g.append("g");
    labels.forEach(l => {
      lg.append("text").attr("x", innerW+6).attr("y", l.y+3).attr("font-size",11).attr("font-weight",700)
        .attr("fill", l.color).text(l.op);
    });
  }

  // hover: vertical guide + multi-series tooltip at nearest week
  const bisect = d3.bisector(d=>d).left;
  const guide = g.append("line").attr("y1",0).attr("y2",innerH).attr("stroke","#94a3b8")
    .attr("stroke-width",1).style("display","none");
  g.append("rect").attr("width",innerW).attr("height",innerH).attr("fill","transparent")
    .on("mousemove", (event) => {
      const mx = d3.pointer(event)[0];
      const t0 = x.invert(mx);
      let i = bisect(dates, t0);
      if (i>0 && (i>=dates.length || (t0-dates[i-1] < dates[i]-t0))) i--;
      i = Math.max(0, Math.min(dates.length-1, i));
      guide.attr("x1",x(dates[i])).attr("x2",x(dates[i])).style("display",null);
      const rowsHtml = drawn.map(op => ({op, v:DATA[i][op]})).filter(d=>d.v!=null)
        .sort((a,b)=>b.v-a.v)
        .map(d => `<div class="tt-row"><span class="tt-sw" style="background:${COLORS[d.op]}"></span>${d.op}<span class="tt-val">${fmtVal(d.v)}</span></div>`).join("");
      tooltip.style("display","block")
        .style("left",(event.clientX+14)+"px").style("top",(event.clientY+14)+"px")
        .html(`<div class="tt-date">${d3.timeFormat("%d %b %Y")(dates[i])}</div>${rowsHtml || "<div>no data</div>"}`);
    })
    .on("mouseleave", () => { guide.style("display","none"); tooltip.style("display","none"); });

  // title
  if (!compact) {
    svg.append("text").attr("x",m.left).attr("y",24).attr("font-size",17).attr("font-weight",800)
      .attr("fill","#0f172a").text(TITLE);
    svg.append("text").attr("x",m.left).attr("y",43).attr("font-size",12).attr("font-weight",600)
      .attr("fill","#475569").text(SUBTITLE);
  }

  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (firstRender && !reducedMotion) {
    plot.style("opacity",0).transition().duration(850).ease(d3.easeCubicOut).style("opacity",1);
  }
  firstRender = false;
}

buildLegend();
render();

let resizeTimer = null;
window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(render, 220); });
if (typeof ResizeObserver !== "undefined")
  new ResizeObserver(() => { clearTimeout(resizeTimer); resizeTimer = setTimeout(render, 220); }).observe(vizContainer);
</script></body></html>
