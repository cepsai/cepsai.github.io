<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>AI Impact Expectations: U.S. Adults vs AI Experts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
      background-color: white;
    }


    .viz-grid {
      display: grid;
      grid-template-rows: 16fr 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding-bottom: clamp(8px, 2vh, 18px);
    }

    #container1 {
      grid-row: 1;
      grid-column: 1 / span 2;
      overflow: hidden;
      min-height: 0;
    }

    #container1 .chart-wrapper {
      flex: 1 1 auto;
      display: flex;
      min-width: 0;
      height: 100%;
      margin-left: 0;
    }

    #container1 .chart-wrapper-inner {
      flex: 1 1 auto;
      display: flex;
      min-width: 0;
      height: 100%;
    }

    #container2 {
      grid-row: 2;
      grid-column: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #container3 {
      grid-row: 3;
      grid-column: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 20px;
      overflow: hidden;
      min-width: 0;
    }

    #container4 {
      grid-row: 3;
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      overflow: hidden;
      min-width: 0;
    }

    #container4 a {
      height: 100%;
      display: flex;
      align-items: center;
      cursor: default;
    }

    #viz {
      width: 100%;
      height: 100%;
      min-height: 0;
      min-width: 0;
    }

    #chart {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1vw, 14px);
      background: rgba(255, 255, 255, 1);
      padding: clamp(4px, 1vh, 10px) clamp(10px, 2vw, 16px);
      border-radius: clamp(6px, 1vw, 12px);
      max-width: 100%;
      max-height: 100%;
      font-size: clamp(0.625rem, 1.4vw, 1rem);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: clamp(4px, 1vw, 8px);
      font-weight: 600;
      color: #333;
      font-size: inherit;
      padding: 2px 6px;
      cursor: default;
    }

    .legend-square {
      width: clamp(8px, 0.9vw, 12px);
      height: clamp(8px, 0.9vw, 12px);
      border-radius: 0;
      flex-shrink: 0;
    }

    .source-text {
      font-size: clamp(10px, 1.6vw, 16px);
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-style: normal;
    }

    .source-text a {
      color: #2756d3;
      text-decoration: underline;
      cursor: pointer;
      font-style: normal;
    }

    .source-text a:visited {
      color: #2756d3;
    }

    .logo {
      height: 100%;
      width: auto;
      max-height: 100%;
      max-width: 100%;
      pointer-events: auto;
      object-fit: contain;
    }

    .axis path,
    .axis line {
      stroke: #cfd2d7;
    }

    .tick text {
      font-weight: 600;
      fill: #4b5563;
    }

    .grid-lines line {
      stroke: #DBDBDB;
      stroke-dasharray: 2, 3;
    }

    .grid-lines path {
      stroke: none;
    }

    .bar-label {
      fill: #555;
      font-weight: 500;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #fff;
      color: #333;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 13px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 500;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 1000;
      white-space: nowrap;
    }

    @media (max-height: 500px) {
      .viz-grid {
        grid-template-rows: 1fr !important;
        grid-template-columns: 1fr !important;
        padding-bottom: 0;
      }

      #container1 {
        grid-row: 1 !important;
        grid-column: 1 !important;
      }

      #container2,
      #container3,
      #container4,
      #container5 {
        display: none !important;
      }

      .legend,
      .source-text,
      .logo {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="viz-grid">
    <div id="container1" class="container viz-container">
      <div id="viz">
        <svg id="chart"></svg>
      </div>
    </div>

    <div id="container2" class="container legend-container">
      <div class="legend" id="legend">
        <div class="legend-item">
          <span class="legend-square" style="background:#2756d3;"></span>
          <span>U.S. Adults (%)</span>
        </div>
        <div class="legend-item">
          <span class="legend-square" style="background:#9ecae1;"></span>
          <span>AI Experts (%)</span>
        </div>
      </div>
    </div>

    <div id="container3" class="container source-container">
      <div class="source-text" id="source-text">Source: <a href="https://hai.stanford.edu/ai-index/2026-ai-index-report"
          target="_blank" rel="noopener">Stanford HAI, AI Index Report 2026</a></div>
    </div>

    <div id="container4" class="container logo-container">
      <a href="https://aiworld.eu/" target="_blank" rel="noopener">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
      </a>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    const SHOW_LEGEND = 1;
    const SHOW_TOOLTIP = 1;

    const SOURCE_NAME = "Stanford HAI, AI Index Report 2026";
    const SOURCE_HREF = "https://hai.stanford.edu/ai-index/2026-ai-index-report";

    const SHOW_CONTAINER_2 = 1;
    const SHOW_CONTAINER_3 = 1;
    const SHOW_CONTAINER_4 = 1;
    const SHOW_CONTAINER_5 = 0;

    const COLOR_US_ADULTS = "#2756d3";
    const COLOR_AI_EXPERTS = "#9ecae1";

    (function applyContainerVisibility() {
      const vizGrid = document.querySelector('.viz-grid');
      const c2 = document.getElementById('container2');
      const c3 = document.getElementById('container3');
      const c4 = document.getElementById('container4');
      const c5 = document.getElementById('container5');

      if (!SHOW_CONTAINER_2 && c2) c2.style.display = 'none';
      if (!SHOW_CONTAINER_3 && c3) c3.style.display = 'none';
      if (!SHOW_CONTAINER_4 && c4) c4.style.display = 'none';
      if (c5 && !SHOW_CONTAINER_5) c5.style.display = 'none';

      const row2Visible = SHOW_CONTAINER_5;
      const row3Visible = SHOW_CONTAINER_2;
      const row4Visible = SHOW_CONTAINER_3 || SHOW_CONTAINER_4;

      let gridRows = [];
      let currentRow = 1;
      const chartHeight = 20 - (row2Visible ? 1 : 0) - (row3Visible ? 1 : 0) - (row4Visible ? 1 : 0);
      gridRows.push(`${chartHeight}fr`);

      if (row2Visible) { gridRows.push('1fr'); currentRow++; if (c5) c5.style.gridRow = String(currentRow); }
      if (row3Visible) { gridRows.push('1fr'); currentRow++; if (c2) c2.style.gridRow = String(currentRow); }
      if (row4Visible) {
        gridRows.push('1fr'); currentRow++;
        if (SHOW_CONTAINER_3 && c3) c3.style.gridRow = String(currentRow);
        if (SHOW_CONTAINER_4 && c4) c4.style.gridRow = String(currentRow);
        if (row4Visible && SHOW_CONTAINER_3 && !SHOW_CONTAINER_4 && c3) c3.style.gridColumn = '1 / span 2';
        if (row4Visible && !SHOW_CONTAINER_3 && SHOW_CONTAINER_4 && c4) c4.style.gridColumn = '1 / span 2';
      }

      vizGrid.style.gridTemplateRows = gridRows.join(' ');
      document.getElementById('container1').style.gridRow = '1';
    })();

    function parseNum(value) {
      if (value == null || value === "") return 0;
      const n = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function smartFormat(v) {
      if (!isFinite(v)) return "N/A";
      if (Math.abs(v) >= 1e9) return d3.format(".1f")(v / 1e9) + "B";
      if (Math.abs(v) >= 1e6) return d3.format(".1f")(v / 1e6) + "M";
      if (Math.abs(v) >= 1e3 && Math.floor(v) === v) return d3.format(",")(v);
      if (Math.floor(v) === v) return d3.format(",")(v);
      return d3.format(",.1f")(v);
    }

    const data = [
      { category: "Medical care", usAdults: 44, aiExperts: 84 },
      { category: "K-12 education", usAdults: 24, aiExperts: 61 },
      { category: "How people do their jobs", usAdults: 23, aiExperts: 73 },
      { category: "The economy", usAdults: 21, aiExperts: 69 },
      { category: "Arts and entertainment", usAdults: 20, aiExperts: 48 },
      { category: "The environment", usAdults: 20, aiExperts: 36 },
      { category: "The criminal justice system", usAdults: 19, aiExperts: 32 },
      { category: "The news people get", usAdults: 10, aiExperts: 18 },
      { category: "Elections", usAdults: 9, aiExperts: 11 },
      { category: "Personal relationships", usAdults: 7, aiExperts: 22 }
    ];

    data.sort((a, b) => b.usAdults - a.usAdults);

    const tooltip = document.getElementById("tooltip");

    function render() {
      const vizContainer = document.getElementById("viz");
      const rect = vizContainer.getBoundingClientRect();
      const width = Math.max(320, rect.width);
      const height = Math.max(220, rect.height);
      const compact = window.matchMedia("(max-height:500px)").matches;

      const svg = d3.select("#chart")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", `0 0 ${width} ${height}`)
        .style("width", "100%")
        .style("height", "100%");
      svg.selectAll("*").remove();

      const maxLabelLength = d3.max(data, d => d.category.length);
      const labelCharWidth = Math.max(6, Math.min(8, width / 80));
      const leftMargin = Math.max(120, Math.min(width * 0.32, maxLabelLength * labelCharWidth + 20));
      const rightMargin = Math.max(50, width * 0.08);

      const margin = {
        top: Math.max(12, height * 0.03),
        right: rightMargin,
        bottom: Math.max(28, height * 0.07),
        left: leftMargin
      };
      const innerWidth = Math.max(40, width - margin.left - margin.right);
      const innerHeight = Math.max(40, height - margin.top - margin.bottom);

      const g = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const xMax = Math.ceil(d3.max(data, d => d.aiExperts) * 1.15 / 10) * 10;

      const xScale = d3.scaleLinear()
        .domain([0, xMax])
        .range([0, innerWidth]);

      const yScale = d3.scaleBand()
        .domain(data.map(d => d.category))
        .range([0, innerHeight])
        .paddingInner(compact ? 0.25 : 0.3)
        .paddingOuter(compact ? 0.08 : 0.1);

      const axisFont = Math.max(7, Math.min(13, innerHeight / data.length * 0.35));

      g.append("g")
        .attr("class", "grid-lines")
        .call(d3.axisBottom(xScale)
          .ticks(compact ? 4 : 5)
          .tickSize(innerHeight)
          .tickFormat(""))
        .select(".domain").remove();

      const xAxisG = g.append("g")
        .attr("class", "axis x-axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(xScale)
          .ticks(compact ? 4 : 5)
          .tickFormat(d => d + "%"));

      xAxisG.selectAll("text")
        .style("font-size", `${axisFont}px`)
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

      const yAxisG = g.append("g")
        .attr("class", "axis y-axis")
        .call(d3.axisLeft(yScale).tickSize(0));

      yAxisG.select(".domain").remove();

      const labelWrapWidth = margin.left - 16;
      yAxisG.selectAll(".tick text").each(function () {
        const text = d3.select(this);
        const fullText = text.text();
        text.text(null)
          .style("font-size", `${axisFont}px`)
          .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

        const words = fullText.split(/\s+/);
        let line = [];
        let lineNumber = 0;
        const lineHeight = 1.15;
        let tspan = text.append("tspan")
          .attr("x", -8).attr("dy", "0em").attr("text-anchor", "end");

        words.forEach(word => {
          line.push(word);
          tspan.text(line.join(" "));
          if (tspan.node().getComputedTextLength() > labelWrapWidth && line.length > 1) {
            line.pop();
            tspan.text(line.join(" "));
            line = [word];
            lineNumber++;
            tspan = text.append("tspan")
              .attr("x", -8).attr("dy", `${lineHeight}em`).attr("text-anchor", "end")
              .text(word);
          }
        });

        const totalLines = lineNumber + 1;
        const offset = -(totalLines - 1) * lineHeight / 2;
        text.selectAll("tspan").filter((d, i) => i === 0)
          .attr("dy", `${offset}em`);
      });

      const barGroups = g.selectAll(".bar-group")
        .data(data)
        .enter()
        .append("g")
        .attr("class", "bar-group")
        .attr("transform", d => `translate(0,${yScale(d.category)})`);

      barGroups.append("rect")
        .attr("class", "bar-us")
        .attr("x", 0)
        .attr("y", 0)
        .attr("height", yScale.bandwidth())
        .attr("fill", COLOR_US_ADULTS)
        .attr("width", d => xScale(d.usAdults));

      barGroups.append("rect")
        .attr("class", "bar-experts")
        .attr("x", d => xScale(d.usAdults))
        .attr("y", 0)
        .attr("height", yScale.bandwidth())
        .attr("fill", COLOR_AI_EXPERTS)
        .attr("width", d => xScale(d.aiExperts - d.usAdults));

      const barLabelFont = Math.max(7, Math.min(13, yScale.bandwidth() * 0.38, innerWidth * 0.032));

      barGroups.append("text")
        .attr("class", "bar-label")
        .attr("x", d => xScale(d.usAdults) - 6)
        .attr("y", yScale.bandwidth() / 2)
        .attr("dy", "0.35em")
        .attr("text-anchor", "end")
        .style("font-size", `${barLabelFont}px`)
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
        .style("fill", "#fff")
        .style("font-weight", "700")
        .text(d => d.usAdults + "%")
        .attr("opacity", d => xScale(d.usAdults) > 30 ? 1 : 0);

      barGroups.append("text")
        .attr("class", "bar-label")
        .attr("x", d => xScale(d.aiExperts) + 6)
        .attr("y", yScale.bandwidth() / 2)
        .attr("dy", "0.35em")
        .attr("text-anchor", "start")
        .style("font-size", `${barLabelFont}px`)
        .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
        .style("fill", "#333")
        .style("font-weight", "700")
        .text(d => d.aiExperts + "%");

      if (SHOW_TOOLTIP) {
        barGroups.append("rect")
          .attr("class", "hover-target")
          .attr("x", 0)
          .attr("y", 0)
          .attr("width", innerWidth)
          .attr("height", yScale.bandwidth())
          .attr("fill", "transparent")
          .on("mousemove", function (event, d) {
            tooltip.innerHTML = `<strong style="color:#111;">${d.category}</strong><br>` +
              `<span style="color:${COLOR_US_ADULTS};">\u25A0</span> U.S. Adults: ${d.usAdults}%<br>` +
              `<span style="color:${COLOR_AI_EXPERTS};">\u25A0</span> AI Experts: ${d.aiExperts}%`;
            tooltip.style.left = (event.clientX + 14) + "px";
            tooltip.style.top = (event.clientY - 24) + "px";
            tooltip.style.opacity = "1";
          })
          .on("mouseleave", function () {
            tooltip.style.opacity = "0";
          });
      }
    }

    render();

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 220);
    });

    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(() => render()).observe(document.getElementById("viz"));
    }
  </script>
</body>

</html>
